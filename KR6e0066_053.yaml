body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十回向品第二十五之十二經佛子菩薩摩訶薩於彼一切諸佛剎中於一佛剎一方一處一毛端量有無量無邊不可説數諸大菩薩皆悉成就清淨智慧充滿而住如一佛剎一方一處一毛端量如是盡虗空遍法界一一佛剎一一方一一處一一毛端量悉亦如是是為菩薩摩訶薩以諸善根而為回向普願一切諸佛國土悉具種種妙寶莊嚴如寶莊嚴如是廣説如是香莊嚴華莊嚴鬘莊嚴塗香莊嚴燒香莊嚴末香莊嚴衣莊嚴蓋莊嚴幢莊嚴幡莊嚴摩尼寶莊嚴次第乃至過此百倍皆如寶莊嚴如是廣説論第二十一佛子已下至如是廣説有十一行經明菩薩願以菩薩身遍諸佛剎及寶莊嚴倍過前百千倍分如此段中明願以菩薩身莊嚴佛剎充滿其中下文都結如上莊嚴復過百倍以此善根以將回向經佛子菩薩摩訶薩以法施等所集善根為長養一切善根故回向為嚴淨一切佛剎故回向為成就一切衆生故回向為令一切衆生皆心淨不動故回向為令一切衆生皆入甚深佛法故回向為令一切衆生皆得無能過清淨功德故回向為令一切衆生皆得不可壞清淨福力故回向為令一切衆生皆得無盡智力度諸衆生令入佛法故回向為令一切衆生皆得平等無量清淨言音故回向為令一切衆生皆得平等無礙眼成就盡虗空遍法界等智慧故回向為令一切衆生皆得清淨念知前際劫一切世界故回向為令一切衆生皆得無礙大智慧悉能決了一切法藏故回向為令一切衆生皆得無限量大菩提周遍法界無所障礙故回向為令一切衆生皆得平等無分別同體善根故回向為令一切衆生皆得一切功德具足莊嚴清淨身語意業故回向為令一切衆生皆得同於普賢行故回向為令一切衆生皆得入一切同體清淨佛剎故回向為令一切衆生悉觀察一切智皆趣入圓滿故回向為令一切衆生皆得遠離不平等善根故回向為令一切衆生皆得平等無異相深心次第圓滿一切智故回向為令一切衆生皆得安住一切白法故回向為令一切衆生皆於一念中證一切智得究竟故回向為令一切衆生皆得成滿清淨一切智道故回向佛子菩薩摩訶薩以諸善根普為一切衆生如是回向已論第二十二佛子已下至佛子菩薩摩訶薩以諸善根普為一切衆生如是回向已有二十八行經明菩薩總為衆生如是回向分經復以此善根欲普圓滿演説一切清淨行法力故回向欲成就清淨行威力得不可説不可説法海故回向欲於一一法海具足無量等法界清淨智光明故回向欲開示演説一切法差別句義故回向欲成就無邊廣大一切法光明三昧故回向欲隨順三世諸佛辨才故回向欲成就去來現在一切佛自在身故回向為尊重一切佛可愛樂無障礙法故回向為滿足大悲心救護一切衆生常無退轉故回向欲成就不思議差別法無障礙智心無垢染諸根清淨普入一切衆會道場故回向欲於一切若覆若仰若粗若細若廣若狹小大染淨如是等諸佛國土常轉平等不退法輪故回向欲於念念中得無所畏無有窮盡種種辨才妙法光明開示演説故回向為樂求衆善發心修習諸根轉勝獲一切法大神通智盡能了知一切諸法故回向欲於一切衆會道場親近供養為一切衆生演一切法咸令歡喜故回向論第二十三復以此善根已下至咸令歡喜故回向有十九行經明菩薩以如上回向但欲令説法及行安樂一切衆生令圓滿如法界分經佛子菩薩摩訶薩又以此善根如是回向所謂以住法界無量住回向以住法界無量身業回向以住法界無量語業回向以住法界無量意業回向以住法界無量色平等回向以住法界無量受想行識平等回向以住法界無量蘊平等回向以住法界無量界平等回向以住法界無量處平等回向以住法界無量內平等回向以住法界無量外平等回向以住法界無量發起平等回向以住法界無量深心平等回向以住法界無量方便平等回向以住法界無量信解平等回向以住法界無量諸根平等回向以住法界無量初中後際平等回向以住法界無量業報平等回向以住法界無量染淨平等回向以住法界無量衆生平等回向以住法界無量佛剎平等回向以住法界無量法平等回向以住法界無量世間光明平等回向以住法界無量諸佛菩薩平等回向以住法界無量菩薩行願平等回向以住法界無量菩薩出離平等回向以住法界無量菩薩教化調伏平等回向以住法界無量法界無二平等回向以住法界無量如來衆會道場平等回向論第二十四佛子已下至如來衆會道場平等回向有二十二行經明菩薩以如法施及大願莊嚴廣願化衆生總令住法界平等故回向分經佛子菩薩摩訶薩如是回向時安住法界無量平等清淨身安住法界無量平等清淨語安住法界無量平等清淨心安住法界無量平等諸菩薩清淨行願安住法界無量平等清淨衆會道場安住法界無量平等為一切菩薩廣説諸法清淨智安住法界無量平等能入盡法界一切世界身安住法界無量平等一切法光明清淨無畏能以一音盡斷一切衆生疑網隨其根欲皆令歡喜住於無上一切種智力無所畏自在神通廣大功德出離法中佛子是為菩薩摩訶薩第十住等法界無量回向論第二十五佛子已下至第十等法界無量回向有十一行半經明以如上回向一切善根時得如是身口心業及十種安住法界清淨分從佛子已下舉十種回向所有如文具悉經菩薩摩訶薩以法施等一切善根如是回向時成滿普賢無量無邊菩薩行願悉能嚴淨盡虗空等法界一切佛剎令一切衆生亦得如是具足成就無邊智慧了一切法於念念中見一切佛出興於世於念念中見一切佛無量無邊自在力所謂廣大自在力無著自在力無礙自在力不思議自在力淨一切衆生自在力立一切世界自在力現不可説語言自在力隨時應現自在力住不退轉神通智自在力演説一切無邊法界俾無有餘自在力出生普賢菩薩無邊際眼自在力以無礙耳識聞持無量諸佛正法自在力一身結跏趺坐周遍十方無量法界於諸衆生無所迫隘自在力以圓滿智普入三世無量法自在力又得無量清淨所謂一切衆生清淨一切佛剎清淨一切法清淨一切處遍知智清淨遍虗空界無邊智清淨得一切差別言音智以種種言音普應衆生清淨放無量圓滿光普照一切無邊世界清淨出生一切三世菩薩行智清淨一念中普入三世一切諸佛衆會道場智清淨入無邊一切世間令一切衆生皆作所應作清淨如是等皆得具足皆得成就皆已修治皆得平等皆悉現前皆悉知見皆悉悟入皆已觀察皆得清淨到於彼岸論第二十六菩薩摩訶薩已下至到於彼岸有二十四行經明菩薩以如上法施等善根回向皆願一切衆生得見佛入佛知見同佛所得分此已上是正舉十箇回向門竟經爾時佛神力故十方各百萬佛剎微塵數世界六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震吼遍吼等遍吼擊遍擊等遍擊佛神力故法如是故雨衆天華天鬘天末香天諸雜香天衣服天珍寶天莊嚴具天摩尼寶天沉水香天栴檀香天上妙蓋天種種幢天雜色幡阿僧祇諸天身無量百千億不可説天妙法音不可思議天讚佛音阿僧祇天歡喜音咸稱善哉無量阿僧祇百千那由他諸天恭敬禮拜無數天子常念諸佛希求如來無量功德心不捨離無數天子作衆妓樂歌詠讚歎供養如來百千阿僧祇諸天放大光明普照盡虗空遍法界一切佛剎現無量阿僧祇諸佛境界如來化身出過諸天如於此世界兜率陀天宮説如是法周遍十方一切世界兜率天宮悉亦如是論長科第十三佛神力故已下至一切世界兜率天宮悉亦如是有十六行經明佛威動地興供分如地震動段中動有三義一説教威感動二大衆聞法悅樂動三推佛神德致令動諸天興供有二義一説法教門招感供二諸天聞法歡喜供興供中有二義一華香幡蓋供二諸天歌讚禮敬放光等供如供養色數如經可知如一切佛剎現無量阿僧祇諸佛境界如來化身出過諸天者此是説法現德法境相稱故現非由天供也一切世界兜率天宮悉亦如是都結十方同此經爾時復以佛神力故十方各過百萬佛剎微塵數世界外各有百萬佛剎微塵數諸菩薩而來集會周遍十方咸作是言善哉善哉佛子乃能説此諸大回向佛子我等皆同一號名金剛幢悉從金剛光世界金剛幢佛所來詣此土彼諸世界悉以佛神力故而説是法衆會眷屬文辭句義皆亦如是不增不減我等皆承佛神力從彼土來為汝作證如我來此衆會為汝作證十方所有一切世界兜率天宮寶莊嚴殿諸菩薩衆來為作證亦復如是論第十四爾時復以佛神力故已下至亦復如是有十行經明同號菩薩來集作證分爾時佛神力故十方各舉過百萬佛剎微塵數者十住百十行百千此位百萬明升進知見智之增廣之量如是百萬世界塵數之外而來者處迷不及云外升進悟解入位云來百萬佛剎微塵數菩薩同名金剛幢來歎善哉稱歎金剛幢菩薩者明智會道同名亦同故亦明今時之智會與古合故亦是達如是等剎塵之境總是金剛智無迷惑故世界名金剛光亦如是經爾時金剛幢菩薩承佛神力觀察十方一切衆會暨于法界已善知文義增廣大心大悲普覆一切衆生繫心安住三世佛種善入一切佛功德法成就諸佛自在之身觀諸衆生心之所樂及其所種一切善根悉分別知隨順法身為現清淨妙色之身即於是時而説頌曰論第十五爾時已下有六行半經明金剛幢菩薩説頌分明歎金剛幢菩薩説頌之德如文可知已下有九十四行頌兩行一頌如文自具其中隨位授記作佛漸漸經劫廣者明隨位升進智慧大悲廣故非是有時日歲月劫量延促廣也皆是約修行之位安立佛果之名經菩薩成就法智慧悟解無邊正法門為法光明調御師了知無礙真實法菩薩為法大導師開示甚深難得法引導十方無量衆悉令安住正法中菩薩已飲佛法海法雲普雨十方界法日出現於世間闡揚妙法利羣生常為難遇法施主了知入法巧方便法光清淨照其心於世説法恆無畏善修於法自在心悉能悟入諸法門成就甚深妙法海普為衆生擊法鼓宣説甚深希有法以法長養諸功德具足清淨法喜心示現世間佛法藏諸佛法王所灌頂成就法性智藏身悉能解了法實相安住一切衆善法菩薩修行第一施一切如來所讚喜所作皆蒙佛忍可以此成就人中尊菩薩成就妙法身親從諸佛法化生為利衆生作法燈演説無量最勝法隨所修行妙法施則亦觀察彼善根所作衆善為衆生悉以智慧而回向所有成佛功德法悉以回施諸羣生願令一切皆清淨到佛莊嚴之彼岸十方佛剎無有量悉具無量大莊嚴如是莊嚴不可思盡以莊嚴一國土如來所有清淨智願令衆生皆具足猶如普賢真佛子一切功德自莊嚴成就廣大神通力往詣世界悉周遍一切衆生無有餘皆使修行菩薩道諸佛如來所開悟十方無量諸衆生一切皆令如普賢具足修行最上行諸佛菩薩所成就種種差別諸功德如是功德無有邊願使衆生悉圓滿菩薩具足自在力所應學處皆往學示現一切大神通普詣十方無量土菩薩能於一念頃覲等衆生無數佛又復於一毛端中盡攝諸法皆明見世間衆生無有量菩薩悉能分別知諸佛無量等衆生大心供養咸令盡種種名香上妙華衆寶衣裳及幡蓋分布法界咸充滿發心普供十方佛一毛孔中悉明見不思議數無量佛一切毛孔皆如是普禮一切世間燈舉身次第恭敬禮如是無邊諸最勝亦以言辭普稱讚窮盡未來一切劫一如來所供養具其數無量等衆生如是供養一如來一切如來亦復然供養讚歎諸如來盡彼世間一切劫世間劫數可終盡菩薩供養無休懈一切世間種種劫於爾所劫修諸行恭敬供養一如來盡一切劫無厭足如無量劫供一佛供一切佛皆如是亦不分別是劫數於所供養生疲厭法界廣大無邊際菩薩觀察悉明了以大蓮華遍布中施等衆生無量佛寶華香色皆圓滿清淨莊嚴甚微妙一切世間無可喻持以供養人中尊衆生數等無量剎諸妙寶蓋滿其中悉以供養一如來供一切佛皆如是塗香無比最殊勝一切世間未曾有以此供養天人師窮盡衆生數等劫末香燒香上妙華衆寶衣服莊嚴具如是供養諸最勝歡喜奉事無厭足等衆生數照世燈念念成就大菩提亦以無邊偈稱述供養人中調御者如衆生數佛世尊皆修無上妙供養如衆生數無量劫如是讚歎無窮盡如是供養諸佛時以佛神力皆周遍悉見十方無量佛安住普賢菩薩行過去未來及現在所有一切諸善根令我常修普賢行速得安住普賢地一切如來所知見世間無量諸衆生悉願具足普賢行為聰慧者所稱讚此是十方諸大士共所修治回向行諸佛如來為我説此回向行最無上十方世界無有餘其中一切諸衆生莫不咸令得開覺悉使常如普賢行如其回向行布施亦復堅持於禁戒精進長時無退怯忍辱柔和心不動禪定持心常一緣智慧了境同三昧去來現在皆通達世間無有得其邊菩薩身心及語業如是所作皆清淨一切修行無有餘悉與普賢菩薩等譬如法界無分別戲論染著皆永盡亦如涅槃無障礙心常如是離諸取智者所有回向法諸佛如來已開示種種善根悉回向是故能成菩薩道佛子善學此回向無量行願悉成滿攝取法界盡無餘是故能成善逝力若欲成就佛所説菩薩廣大殊勝行宜應善住此回向是諸佛子號普賢一切衆生猶可數三世心量亦可知如是普賢諸佛子功德邊際無能測一毛度空可得邊衆剎為塵可知數如是大仙諸佛子所住行願無能量論第二隨文解釋者云何為等法界無量回向釋曰如法界無中邊回向心無中邊如法界無作者回向心無作者法界無來去遠近回向心無來去遠近法界如虗空回向智如虗空法界不思議回向智不思議法界無所依回向智無所依法界一切諸佛之所共住如無依智一切佛之所共住法界非三世及一切生滅時分所攝回向之智非三世時分所攝法界圓滿三世事業在於現前回向之智圓三世事業在於現前法界有無自在回向之智有無自在為令自他皆如法界無礙自在如諸佛故以是名為等法界無量回向大意令一切發菩提心者一如法界諸德用自在圓滿廣大無限離大小性不屬一二三百千萬等有限量故等無限量法世間出世間大智大悲喜捨等法界衆生界故若不如是回向設求菩提但得二乘住寂菩提菩薩樂生淨土皆住門外三車露地白牛不當其分此十回向令諸三乘得出世心者令達世間生死之性自性法界令起大悲與一切衆生皆得令見衆生性是法界智故得平等悲門入普光明圓智之宅故不令久住草庵化城即如維摩居士所説一期法門是令三乘回向之少分法華露地白牛之乘略陳一分之寶所總與法界門普光明大智佛果普賢行海是普終畢也如此當部經中十回向門為回十住十行中大悲大智法身萬行功德莊嚴自他滯障悲敬不真知見不廣悲心不普心不廣大不稱無限法界將此回向均治令等稱法界無礙無限自在性故若不如是以無限回向發願普為無限法界衆生即自住真門偏生淨土不依法界無礙垢淨平等無限同體大悲不成佛果故如是十回向均十信十住十行及十地十一地行門總在其中此義十地位更不別配佛果但取此位十箇佛果上名總同同名為妙菩薩名號十地位中菩薩上名與此十回向位菩薩總名金剛但幢與藏別明妙用之佛果及所行之法與此無殊但蘊積功終大悲功滿名之為藏非是異此回向位外別法也是故善財十回向中善友即長者天神地神所表十地知識九箇夜天總是女衆一箇是如來為太子時妻以表純修大悲之位明十住十行修行智位十回向以願力均融令智悲等進十地蘊修令大智大悲深廣成備故以十箇女衆表之十一地悲滿成普賢行門即明以悲興智即以佛母摩耶為十一地初善知識能生一切諸佛為表母是悲位佛是智故以悲生智故云摩耶生佛故故得幻生法門此明悲智德成普賢行滿故明其進修次第如是安立若以修行一時同進即如善財十住位中第二海門國海雲比丘是成就初發心住悲智門以此義故於中有阿修羅王等十王是表入生死之行故又海雲是此回向位中能入生死大海故又生死海即佛海故故云有佛出現説普眼經著十王等表萬行自在也乃至十住第七住休捨優婆夷等亦是但以成熟慣習增降處論之又此五位法門總不出一剎那際始終成故總無前後之義故第六會他化自在天宮説十地法門十地品第二十六之一論約釋此品以四門分別一釋品名目二釋品來意三敘其升進次第四隨文解釋第一釋品名目者何故名為十地品釋曰以明如來普光明智以成地體如經如是菩薩已踐如來普光明地即大圓鏡智是所説四智及一切種一切智之差別以此為智體以諸菩薩雖登十住十行十回向不離此體道力未充更以十波羅蜜十重進修令其道力圓滿名為十地又以一波羅蜜中而自具十法名為十地十十之中具百百不移十故名為十地乃至十百十千十萬十千萬十億乃至十不可説明十數該含一多無盡故云十地此十地之法通因十即通十信所信十箇佛果即以普光明殿所説十箇佛果不動智佛為初信故乃至無礙智佛解脫智佛通十箇智佛為所信之果進修之中經十住十行十回向還將十信之中十箇智果以成此十地之體十箇智佛以不動智佛為本不動智佛以普光明智為本普光明智以無依住智為本又無依住智以一切衆生為本如善財見彌勒菩薩彌勒菩薩還令善財却見初善知識文殊師利是其義也乃至於五位滿不離初信之佛果也以此十地之法通初徹末一際法門是故號名十地品品者均分義一多次第是進同別階級義故此乃是無升進中進修無層級中層級且略言之十地之體若無十信能信自心初佛果者十地亦不成故十信之初心無十地十一地之佛果亦無成信心故始終總全是不動智之果故能信自心者亦佛果故所信佛果亦佛果故修行之身亦佛果故如是信心方得成信其所修因果終始不異不動智佛故是故此經十住十行十回向皆有隨位進修因果十佛號故十地十一地以取十回向中佛果通號更不別立佛名號故為此後十地十一地但取十回向中理智大悲妙用蘊積使德行功熟更無異法以此義故十回向中十箇佛果總同名號之為妙為明十回向已和會理事悲智妙用法成故以此如來亦不云升天他化天王亦不云遙見亦無迎佛及以興供古人云十地無迎佛及敷座者以經來文未足者此非為得經之意也但為法則如十回向中大願及智悲修令圓滿如彼故無敷座等事為明法則依地前舊法不更別有加行進修以十地法門但依十信十住中法則以不動智為體以十住中十箇月佛十行中十箇眼佛十回向中十箇妙佛以為十信中不動智佛上加行進修十地同此準知不移初法第二釋品來意者為明己説地前三十心竟以十回向方法和會理智大悲及廣興大願竟但依前法則以積行蘊修令使功成滿前智願令使大悲深厚功畢以是此品須來是故善財以九箇夜神皆是女天以表慈悲故一箇佛為太子時妻號曰瞿波以表十地慈悲法喜以悅一切衆生以此十地是蘊積慈悲滿前智願故以此十地之初歡喜地得願求一切佛法心故如後地中所説故又以三十七箇菩薩俱名為藏亦表此十地俱依地前之法以三十七助菩提分法助成地前志樂智悲大願令行滿故含容衆德成滿無功諸佛德門名之為藏一箇菩薩獨名解脫月是三十七箇助菩提行中得法清涼之果故一一皆有所表思之可解是故以此十地品成就地前志樂智悲大願令功畢故此品須來第三敘其升進次第約立三門一明三乘一乘十地同異二明隨位進修次第三明重敘説法之處及座體一明三乘一乘十地同異者有二義第一三乘十地第二一乘十地第一三乘十地者如仁王經雖安立內凡外凡菩薩修六波羅蜜作六種人王若修檀波羅蜜得作小國王并修戒波羅蜜作粟散王并修忍波羅蜜得作鐵輪王王一閻浮提并修精進波羅蜜作銅輪王王二天下并修禪波羅蜜作銀輪王王三天下并修般若波羅蜜得作金輪王王四天下具足千子自檀戒二度是外凡夫菩薩信心位自忍進定慧四種度門是內凡位是十住十行十回向中位也十地中名十聖位修十波羅蜜得作十種天王該管已上天位自忉利為首若約斷惑見道之中三乘中地前修六波羅蜜以空觀折伏現行五見及五鈍使且令伏息所有煩惱如呪毒蛇不能害物伏而不起空觀心成達心境本性無生名為見道修道小乘以空觀滅情入寂身智總亡地上菩薩得三種意生身而不隨空而滅智故為不了根本無明住地是如來根本智故受三界外變易生死故已捨分段生死三種意生身者初二三地得三摩跋提樂意生身明從定發正慧念用故四五六地得覺法自性意生身明覺法自性任性生故七八九十地得種類俱生無行無作意生身明無功任運生無作意故五見者一身見二邊見三見取四戒取五邪見此已上五見名利使能障見道與見道作煩惱小乘修空滅智菩薩達法是空有智慧有慈悲之行或生淨土或處世間利生隨意樂自在五鈍使者一貪二嗔三癡四慢五疑通前為十使此能障修道上隨事之行不能稱理如是十使煩惱小乘先斷見道上煩惱後斷修道中煩惱大乘菩薩於諸煩惱以諸波羅蜜如理通融無斷無證如上總明權教大乘中菩薩約簡斷惑地位得果如是十地菩薩修法空無生菩薩得十種意生身於三界業外受變易生死是生死無明住地未能了知如是菩薩猶於一乘佛果華嚴經未聞設聞不信不順不證不入猶有厭苦心多一向樂求出世淨土猶欣淨土在於他方佛果在三祇之後華嚴經云設有菩薩無量劫行六波羅蜜得六神通及修種種菩提分法為不聞此大方廣佛華嚴經猶名假名菩薩不真菩薩設復聞時不信不順不證不入如法華經不退諸菩薩亦復不能知總其例也又云設有菩薩讀誦八萬四千法藏悉皆通利為人解説得六神通此未為難暫讀此經是即為難或為一分劣解衆生發菩提心者三祇之劫方成佛故三乘不退菩薩是十真如觀或是觀空不退不是無明為根本智發心不退此已前明時劫定實淨土及穢土全隔在於他方欣厭之徒安立諸地故第二一乘十地者從十信之心即信自心根本無明具分別見便為不動智佛即文殊師利覺首目首等菩薩是其位也以自信自心無始無明為不動智文殊師利即為自心理智妙慧用也法界大智大悲門普賢行海是自己所行之行如是信已以為信心是故從經之初為例如來成道之果及十普賢并海月光大明菩薩及神天等五十衆以為現果成信門諸菩薩神天等衆示現入法獲益所有入法皆同佛所得故明信從自心無明上見不動智佛故信亦是佛悟亦是佛以不異佛智體用為進修故作此信時普見一切衆生所有心量皆從如來大智而有凡聖一體同一智慧無有二性如金光明經天女發願此語不虗者願三千大千世界衆生悉皆金色具大人相當時稱願一切衆生悉皆金色具大人相如彼經廣明又如此經如來出現品云衆生種種樂及諸方便智皆依佛智起又云應信自心中常有諸佛出興於世轉正法輪從如是信已以方便三昧發生悟入現本智慧與佛契同名生如來智慧家為真佛子從此初住住佛所住種如來性名清淨智慧從此慧已經十住十行十回向位位之中配十箇所修行之人十箇世界國土十箇修行行下之佛果如前釋十信十住十行十回向位中所配當者是今此十地位中修行之人即金剛藏等三十八箇菩薩是三十七箇是三十七助道法助前十回向中悲智妙用功終不立自位佛果為明十回向中以大願力已圓理智大悲事畢十地但以助道行力成之使熟及至十一地佛果總如十回向位也解脫月菩薩一人表是能請法之人亦表三十七助道之中解脫清涼之法樂也故有此三十八菩薩三十七同名為藏唯一人名解脫月即是表三十七助道之中無煩惱之果故音切鬘莫班切蘊於粉切裳市羊切隘於介切暨居義切瞿求于切
