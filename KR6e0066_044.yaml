body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十回向品第二十五之三論第三等一切佛回向以忍波羅蜜為體餘九為伴表法中以善財童子所見可樂城東大莊嚴幢無憂林中無上勝長者是也為城名可樂依主所行之行立其名故為明得法成忍人見可樂住城東者為明忍為覺行之首為表東方角亢氐房之位主衆善之首房為青龍主吉慶位故以東方為陽為生萬物之首明忍為萬行之首生衆福故故居城東也大莊嚴幢者忍隨違境不動也是幢義無憂林者明忍成行滿如林廣蔭也號無上勝者衆行之中不勝忍也衆行之中無忍不成行故餘廣如經説二義如前第一長科當段經意者從此一段經中約科為十段經佛子云何為菩薩摩訶薩等一切佛回向佛子此菩薩摩訶薩隨順修學去來現在諸佛世尊回向之道如是修學回向道時見一切色乃至觸法若美若惡不生愛憎心得自在無諸過失廣大清淨歡喜悅樂離諸憂惱心意柔耎諸根清涼論一佛子云何菩薩摩訶薩等一切佛回向已下至諸根清涼有五行半經明學佛回向心得自在清涼分經佛子菩薩摩訶薩獲得如是安樂之時復更發心回向諸佛作如是念願以我今所種善根令諸佛樂轉更增勝所謂不可思議佛所住樂無有等比佛三昧樂不可限量大慈悲樂一切諸佛解脫之樂無有邊際大神通樂最極尊重大自在樂廣大究竟無量力樂離諸知覺寂靜之樂住無礙住恆正定樂行無二行不變異樂論二佛子已下至不變異樂有七行半經是菩薩回向佛樂分經佛子菩薩摩訶薩以諸善根回向佛已復以此善回向菩薩所謂願未滿者令得圓滿心未淨者令得清淨諸波羅蜜未滿足者令得滿足安住金剛菩提之心於一切智得不退轉不捨大精進守護菩提門一切善根能令衆生捨離我慢發菩提心所願成滿安住一切菩薩所住獲得菩薩明利諸根修習善根證薩婆若論三佛子已下至證薩婆若有七行經明回向菩薩行願分薩婆若此云一切智經佛子菩薩摩訶薩以諸善根如是回向菩薩已復以回向一切衆生願一切衆生所有善根乃至極少一彈指頃見佛聞法恭敬聖僧彼諸善根皆離障礙念佛圓滿念法方便念僧尊重不離見佛心得清淨獲諸佛法集無量德淨諸神通捨法疑念依教而住如為衆生如是回向為聲聞辟支佛回向亦復如是又願一切衆生永離地獄餓鬼畜生閻羅王等一切惡處增長無上菩提之心專意勤求一切種智永不毀謗諸佛正法得佛安樂身心清淨證一切智論四佛子已下至證一切智有十行經明回向一切衆生令得離苦分經佛子菩薩摩訶薩所有善根皆以大願發起正發起積集正積集增長正增長悉令廣大具足充滿論五佛子已下至具足充滿有兩行經明菩薩行由願廣大充滿分經佛子菩薩摩訶薩在家宅中與妻子俱未曾暫捨菩提之心正念思惟薩婆若境自度度彼令得究竟以善方便化己眷屬令入菩薩智令成熟解脫雖與同止心無所著以本大悲處於居家以慈心故隨順妻子於菩薩清淨道無所障礙菩薩摩訶薩雖在居家作諸事業未曾暫捨一切智心所謂若著衣裳若噉滋味若服湯藥澡漱塗摩回旋顧視行住坐臥身語意業若睡若寤如是一切諸有所作心常回向薩婆若道繫念思惟無時捨離為欲饒益一切衆生安住菩提無量大願攝取無數廣大善根勤修諸善普救一切永離一切憍慢放逸決定趣於一切智地終不發意向於餘道常觀一切諸佛菩提永捨一切諸雜染法修行一切菩薩所學於一切智道無所障礙住於智地愛樂誦習以無量智集諸善根心不戀樂一切世間亦不染著所行之行專心受持諸佛教法菩薩如是處在居家普攝善根令其增長回向諸佛無上菩提論六佛子已下至回向諸佛無上菩提有十八行半經明菩薩以本大悲處俗無染著分經佛子菩薩爾時乃至施與畜生之食一摶一粒咸作是願當令此等捨畜生道利益安樂究竟解脫永度苦海永滅苦受永除苦蘊永斷苦覺苦聚苦行苦因苦本及諸苦處願彼衆生皆得捨離菩薩如是專心繫念一切衆生以彼善根而為上首為其回向一切種智菩薩初發菩提之心普攝衆生修諸善根悉以回向欲令永離生死曠野得諸如來無礙快樂出煩惱海修佛法道慈心遍滿悲力廣大普使一切得清淨樂守護善根親近佛法出魔境界入佛境界斷世間種植如來種住於三世平等法中菩薩摩訶薩如是所有已集當集現集善根悉以回向復作是念如過去諸佛菩薩所行恭敬供養一切諸佛度諸衆生令永出離勤加修習一切善根悉以回向而無所著所謂不依色不著受無倒想不作行不取識捨離六處不住世法樂出世間知一切法皆如虗空無所從來不生不滅無有真實無所染著遠離一切諸分別見不動不轉不失不壞住於實際無相離相唯是一相如是深入一切法性常樂習行普門善根悉見一切諸佛衆會如彼過去一切如來善根回向我亦如是而為回向解如是法證如是法依如是法發心修習不違法相知所修行如幻如影如水中月如鏡中像因緣和合之所顯現乃至如來究竟之地論七佛子已下至如來究竟之地有二十五行半經明施與畜生食願永離衆苦得樂分經佛子菩薩摩訶薩復作是念如過去諸佛修菩薩行時以諸善根如是回向未來現在悉亦如是我今亦應如彼諸佛如是發心以諸善根而為回向第一回向勝回向最勝回向上回向無上回向無等回向無等等回向無比回向無對回向尊回向妙回向平等回向正直回向大功德回向廣大回向善回向清淨回向離惡回向不隨惡回向菩薩如是以諸善根正回向已成就清淨身語意業住菩薩住無諸過失修習善業離身語惡心無瑕穢修一切智住廣大心知一切法無有所作住出世法世法不染分別了知無量諸業成就回向善巧方便永拔一切取著根本佛子是為菩薩摩訶薩第三等一切佛回向論八佛子已下至第三等一切佛回向有十四行經明菩薩等一切諸佛回向分經菩薩摩訶薩住此回向深入一切諸如來業趣向如來勝妙功德入深清淨智慧境界不離一切諸菩薩業善能分別巧妙方便入深法界善知菩薩修行次第入佛種性以巧方便分別了知無量無邊一切諸法雖復現身於世中生而於世法心無所著論九菩薩摩訶薩已下至心無所著有六行經明菩薩入佛功德深入法界善知菩薩修行次第分經爾時金剛幢菩薩承佛神力普觀十方即説頌言論十爾時已下一行經明金剛幢菩薩觀衆説頌分經彼諸菩薩摩訶薩修過去佛回向法亦學未來現在世一切導師之所行於諸境界得安樂諸佛如來所稱讚廣大光明清淨眼悉以回向大聰哲菩薩身根種種樂眼耳鼻舌亦復然如是無量上妙樂悉以回向諸最勝一切世間衆善法及諸如來所成就於彼悉攝無有餘盡以隨喜益衆生世間隨喜無量種令此回向為衆生人中師子所有樂願使羣萌悉圓滿一切國土諸如來凡所知見種種樂願令衆生皆悉得而為照世大明燈菩薩所得勝妙樂悉以回向諸羣生雖為羣生故回向而於回向無所著菩薩修行此回向興起無量大悲心如佛所修回向德願我修行悉成滿如諸最勝所成就一切智乘微妙樂及我在世之所行諸菩薩行無量樂示入衆趣安隱樂恆守諸根寂靜樂悉以回向諸羣生普使修成無上智非身語意即是業亦不離此而別有但以方便滅癡冥如是修成無上智菩薩所修諸行業積集無量勝功德隨順如來生佛家寂然不亂正回向十方一切諸世界所有衆生咸攝受悉以善根回向彼願令具足安隱樂不為自身求利益欲令一切悉安樂未曾暫起戲論心但觀諸法空無我十方無量諸最勝所見一切真佛子悉以善根回向彼願使速成無上覺一切世間含識類等心攝取無有餘以我所行諸善業令彼衆生速成佛無量無邊諸大願無上導師所演説願諸佛子皆清淨隨其心樂悉成滿普觀十方諸世界悉以功德施於彼願令皆具妙莊嚴菩薩如是學回向心不稱量諸二法但恆了達法無二諸法若二若不二於中畢竟無所著十方一切諸世間悉是衆生想分別於想非想無所得如是了達於諸想彼諸菩薩身淨已則意清淨無瑕穢語業已淨無諸過當知意淨無所著一心正念過去佛亦憶未來諸導師及以現在天人尊悉學於其所説法三世一切諸如來智慧明達心無礙為欲利益衆生故回向菩提集衆業彼第一慧廣大慧不虗妄慧無倒慧平等實慧清淨慧最勝慧者如是説論已上有四十八行頌兩行一頌所頌前法如文具明不煩更解第二隨文釋義者何故名為等一切佛回向為此第三回向成其忍門明無貪瞋癡三業如佛佛所行願皆悉願為故云等一切佛回向令願行一如佛故又前云不壞回向以次等一切諸佛回向明次第合然第四至一切處回向者以精進波羅蜜為體餘九為伴以善財所見比丘尼名師子嚬伸住輸那國此曰勇猛城名迦陵迦林此云鬬諍時也明此比丘尼能和斷鬬諍此表第四回向行精進業利物之相表比丘者明離染清潔尼者慈音明此精進行門離染慈悲以為行體號師子頻伸者明已得四無礙智已得四種無畏故師子者明智無畏也頻伸者卷舒自在也明以清淨大智勇猛自在卷舒説法利生善和斷鬬諍皆悉從伏無量諸衆生見聞不同廣如經説意表此第四回向中行精進之行表智悲之相故無染慈悲説法自在表悲常隨苦流智常無染是摩尼義四無礙智者一義無礙智二法無礙智三辭無礙智四樂説無礙智四無畏者一一切智無畏二漏盡無畏三説障道無畏四説盡苦道無畏二義如前第一長科此一段經意義為八段經佛子云何為菩薩摩訶薩至一切處回向佛子此菩薩摩訶薩修習一切諸善根時作是念言願此善根功德之力至一切處譬如實際無處不至至一切物至一切世間至一切衆生至一切國土至一切法至一切虗空至一切三世至一切有為無為至一切語言音聲願此善根亦復如是遍至一切諸如來所供養三世一切諸佛過去諸佛所願悉滿未來諸佛具足莊嚴現在諸佛及其國土道場衆會遍滿一切虗空法界願以信解大威力故廣大智慧無障礙故一切善根悉回向故以如諸天諸供養具而為供養充滿無量無邊世界論一佛子云何為菩薩摩訶薩至一切處回向已下至無邊世界有十二行經明菩薩所修善根如實際遍三世供養分經佛子菩薩摩訶薩復作是念諸佛世尊普遍一切虗空法界種種業所起十方不可説一切世界種世界不可説佛國土佛境界種種世界無量世界無分齊世界轉世界側世界仰世界覆世界如是一切諸世界中現住於壽示現種種神通變化彼有菩薩以勝解力為諸衆生堪受化者於彼一切諸世界中現為如來出興於世以至一切處智普遍開示如來無量自在神力法身遍住無有差別平等普入一切法界如來藏身不生不滅善巧方便普現世間證法實性超一切故得不退轉無礙力故生於如來無障礙見廣大威德種性中故論二佛子已下至廣大威德種性中故有十二行經明諸佛興世如法身遍往無有差別廣大利益分釋義云如世界種即如華藏世界種是也約先德云數三千大千世界至一恆河沙數為一世界海又數世界海至一恆河沙為一世界性又數世界性至一恆河沙為一世界種云種種世界云衆生雜多也如轉世界者或圓形轉或流轉如江河是如日月亦是皆無住止名轉側世界如四天王天在須彌山側仰世界可知覆世界如胡蜂窠等是亦如世界成就品説已下如經自具經佛子菩薩摩訶薩以其所種一切善根願於如是諸如來所以衆妙華及衆妙香鬘蓋幢幡衣服燈燭及餘一切諸莊嚴具以為供養若佛形像若佛塔廟悉亦如是以此善根如是回向所謂不亂回向一心回向自意回向尊敬回向不動回向無住回向無依回向無衆生心回向無躁競心回向寂靜心回向復作是念盡法界虗空界去來現在一切劫中諸佛世尊得一切智成菩提道無量名字各各差別於種種時現成正覺悉皆住壽盡未來際一一各以法界莊嚴而嚴其身道場衆會周遍法界一切國土隨時出興而作佛事如是一切諸佛如來我以善根普皆回向願以無數香蓋無數香幢無數香幡無數香帳無數香網無數香像無數香光無數香𦦨無數香雲無數香座無數香經行地無數香所住處無數香世界無數香山無數香海無數香河無數香樹無數香衣服無數香蓮華無數香宮殿無量華蓋廣説乃至無量華宮殿無邊鬘蓋廣説乃至無邊鬘宮殿無等塗香蓋廣説乃至無等塗香宮殿不可數粖香蓋廣説乃至不可數粖香宮殿不可稱衣蓋廣説乃至不可稱衣宮殿不可思寶蓋廣説乃至不可思寶宮殿不可量燈光明蓋廣説乃至不可量燈光明宮殿不可説莊嚴具蓋廣説乃至不可説莊嚴具宮殿不可説不可説摩尼寶蓋不可説不可説摩尼寶幢如是摩尼寶幡摩尼寶帳摩尼寶網摩尼寶像摩尼寶光摩尼寶𦦨摩尼寶雲摩尼寶座摩尼寶經行地摩尼寶所住處摩尼寶剎摩尼寶山摩尼寶海摩尼寶河摩尼寶樹摩尼寶衣服摩尼寶蓮華摩尼寶宮殿皆不可説不可説如是一一諸境界中各有無數欄楯無數宮殿無數樓閣無數門闥無數半月無數却敵無數窗牖無數清淨寶無數莊嚴具以如是等諸供養物恭敬供養如上所説諸佛世尊願令一切世間皆得清淨一切衆生咸得出離住十力地於一切法中得無礙法明令一切衆生具足善根悉得調伏其心無量等虗空界往一切剎而無所至入一切土施諸善法常得見佛植諸善根成就大乘不著諸法具足衆善立無量行普入無邊一切法界成就諸佛神通之力得於如來一切智智譬如無我普攝諸法我諸善根亦復如是普攝一切諸佛如來咸悉供養無有餘故普攝一切無量諸法悉能悟入無障礙故普攝一切諸菩薩衆究竟皆與同善根故普攝一切諸菩薩行以本願力皆圓滿故普攝一切菩薩法明了達諸法皆無礙故普攝諸佛大神通力成就無量諸善根故普攝諸佛力無所畏發無量心滿一切故普攝菩薩三昧辨才陀羅尼門善能照了無二法故普攝諸佛善巧方便示現如來大神力故普攝三世一切諸佛降生成道轉正法輪調伏衆生入般涅槃恭敬供養悉周遍故普攝十方一切世界嚴淨佛剎咸究竟故普攝一切諸廣大劫於中出現修菩薩行無斷絶故普攝一切所有趣生悉於其中現受生故普攝一切諸衆生界具足普賢菩薩行故普攝一切諸惑習氣悉以方便令清淨故普攝一切衆生諸根無量差別咸了知故普攝一切衆生解欲令離雜染得清淨故普攝一切化衆生行隨其所應為現身故普攝一切應衆生道悉入一切衆生界故普攝一切如來智性護持一切諸佛教故論三佛子已下至護持一切諸佛教故有六十四行經明菩薩以衆多無盡如法性供養雲供養如法性無邊衆多如來普攝諸善根分經佛子菩薩摩訶薩以諸善根如是回向時用無所得而為方便不於業中分別報不於報中分別業雖無分別而普入法界雖無所作而恆住善根雖無所起而勤修勝法不信諸法而能深入不有於法而悉知見若作不作皆不可得知諸法性恆不自在雖悉見諸法而無所見普知一切而無所知菩薩如是了達境界知一切法因緣為本見於一切諸佛法身至一切法離染實際解了世間皆如變化明達衆生唯是一法無有二性不捨業境善巧方便於有為界示無為法而不滅壞有為之相於無為界示有為法而不分別無為之相菩薩如是觀一切法畢竟寂滅成就一切清淨善根而起救護衆生之心智慧明達一切法海常樂修行離愚癡法已具成就出世功德不更修學世間之法得淨智眼離諸癡翳以善方便修回向道論四佛子已下至以善方便修回向道有十六行半經明菩薩修回向以無所得而為方便修一切善根分經佛子菩薩摩訶薩以諸善根如是回向稱可一切諸佛之心嚴淨一切諸佛國土教化成就一切衆生具足受持一切佛法作一切衆生最上福田為一切商人智慧導師作一切世間清淨日輪一一善根充遍法界悉能救護一切衆生皆令清淨具足功德論五佛子已下至具足一切功德有六行經總結已上供養功德分經佛子菩薩摩訶薩如是回向時能護持一切佛種能成熟一切衆生能嚴淨一切國土能不壞一切諸業能了知一切諸法能等觀諸法無二能遍往十方世界能了達離欲實際能成就清淨信解能具足明利諸根佛子是為菩薩摩訶薩第四至一切處回向論六佛子已下至第四至一切處回向有六行經明都結已上遍一切處回向所作令佛種不斷廣嚴淨佛剎分經菩薩摩訶薩住此回向時得至一切處身業普能應現一切世界故得至一切處語業於一切世界中演説法故得至一切處意業受持一切佛所説法故得至一切處神足通隨衆生心悉往應故得至一切處隨證智普能了達一切法故得至一切處總持辨才隨衆生心令歡喜故得至一切處入法界於一毛孔中普入一切世界故得至一切處遍入身於一衆生身普入一切衆生身故得至一切處普見劫一一劫中常見一切諸如來故得至一切處普見念一一念中一切諸佛悉現前故佛子菩薩摩訶薩得至一切處回向能以善根如是回向論七菩薩摩訶薩已下至能以善根如是回向有十二行半經明住此回向時得身語意業遍十方一切處分經爾時金剛幢菩薩承佛威力普觀十方而説頌言論八爾時已下一行經明金剛幢菩薩觀衆説頌分經內外一切諸世間菩薩悉皆無所著不捨饒益衆生業大士修行如是智十方所有諸國土一切無依無所住不取活命等衆法亦不妄起諸分別普攝十方世界中一切衆生無有餘觀其體性無所有至一切處善回向普攝有為無為法不於其中起妄念如於世間法亦然照世燈明如是覺菩薩所修諸業行上中下品各差別悉以善根回向彼十方一切諸如來菩薩回向到彼岸隨如來學悉成就恆以妙智善思惟具足人中最勝法清淨善根普回向利益羣迷恆不捨悉令一切諸衆生得成無上照世燈未曾分別取衆生亦不妄想念諸法雖於世間無染著亦復不捨諸含識菩薩常樂寂滅法隨順得至涅槃境亦不捨離衆生道獲如是等微妙智菩薩未曾分別業亦不取著諸果報一切世間從緣生不離因緣見諸法深入如是諸境界不於其中起分別一切衆生調御師於此明了善回向論已上有二十二行頌兩行一頌如文自具第二隨文釋義者云何至一切處回向約位有十一一法身至一切處二智身至一切處三大願至一切處四供養諸佛至一切處五見聞聽受諸法至一切處六遍現色身至一切處七開悟衆生至一切處八不出毛孔至一切處九遍滿十方等于法界而無去來至一切處十入一衆生身心等一切衆生身心至一切處十一入一佛身毛孔等一切佛身毛孔至一切處回向又回向者有十法一以無作法回向有作法二以有作法回向無作法三以一法回向多法四以多法回向一法五於諸有法回向無法六於無法回向有法七以世間法回向出世間法八以出世間法回向世間法九以一切自性無回向以為方便有回向法十以一切有回向法以為自性無回向法為令滯有無者得自在故生死涅槃無障礙故得大神通無法拘留故供養諸佛教化衆生一多同別皆得自在故以誠實心起大願雲周覆法界虗空界興種種供具供養三世一切諸佛皆願自他福德圓滿故是故名為至一切處回向大意以修得十住十行之中法身理智即依此法起大願大悲依無作理智起神通行使不滯染淨不為染淨二法心所拘留入神通自在門不著神通不著自在為神通諸法性自離故第五無盡功德藏回向者以禪波羅蜜為體以善財童子所見婆須蜜女以為所行行之人所住國土名為險難城名寶莊嚴以歎德中心無分別普知諸法一身端坐充滿法界於自身現一切剎所明禪體遍周自在為明禪與智悲會無二體用自在故以國名險難者以真智會俗城名寶莊嚴者會俗體自真明定亂兩融智悲不礙隨塵不染故號城名寶莊嚴婆須蜜女者此云世友能與世人為師友故亦曰天友能與諸天作師友或曰易寶或以此女善巧方便易取衆生一切智寶此女身金色目髮紺青若聞説法若暫見若執手若坐其座總得三昧為明禪體遍周與智會故道合見者總皆是禪體智悲相會之流若也別見之流常對面不覩其容也但為定與智會智與悲冥隨根接俗號之為女非即但為女也十住中第五主禪門即俗士長者號為解脫明俗體本真衆生身本來佛國故長者身含佛國明衆生身亦然但禪觀相應即見十行中即以寶髻長者以明禪門以本自居宅十層之閣宅有八門市上接俗引來宅內即明以智為禪體就俗引生故云市上引入智境名歸宅內今十回向之內以婆須蜜女以為禪門即明十回向以智悲為禪體以女表之以致其像用之表法即以所行俗事用彰智隨悲行處世染而不汙若也未悟俗塵為業所留要須戒定慧志求出世之智若也達智業亡要須處纏不汙方便利生皆令解脫切須知根接引不得惑亂衆生要須依根受藥二義如前一長科當段經意者於此段長科為十三段經佛子云何為菩薩摩訶薩無盡功德藏回向佛子此菩薩摩訶薩以懺除一切諸業重障所起善根禮敬三世一切諸佛所起善根勸請一切諸佛説法所起善根聞佛説法精勤修習悟不思議廣大境界所起善根於去來今一切諸佛一切衆生所有善根皆生隨喜所起善根去來今世一切諸佛善根無盡諸菩薩衆精勤修習所得善根三世諸佛成等正覺轉正法輪調伏衆生菩薩悉知發隨喜心所生善根三世諸佛從初發心修菩薩行成最正覺乃至示現入般涅槃般涅槃已正法住世乃至滅盡於如是等皆生隨喜所有善根菩薩如是念不可説諸佛境界及自境界乃至菩提無障礙境如是廣大無量差別一切善根凡所積集凡所信解凡所隨喜凡所圓滿凡所成就凡所修行凡所獲得凡所知覺凡所攝持凡所增長悉以回向莊嚴一切諸佛國土如過去世無邊際劫一切世界一切如來所行之處所謂無量無數佛世界種佛智所知菩薩所識大心所受莊嚴佛剎清淨業行所流所引應衆生起如來神力之所示現諸佛出世淨業所成普賢菩薩妙行所興一切諸佛於中成道示現種種自在神力盡未來際所有如來應正等覺遍法界住當成佛道當得一切清淨莊嚴功德佛土盡法界虗空界無邊無際無斷無盡皆從如來智慧所生無量妙寶之所莊嚴所謂一切香莊嚴一切華莊嚴一切衣莊嚴一切功德藏莊嚴一切諸佛力莊嚴一切佛國土莊嚴如來所都不可思議同行宿緣諸清淨衆於中止住未來世中當成正覺一切諸佛之所成就非世所覩菩薩淨眼乃能照見此諸菩薩具大威德宿植善根知一切法如幻如化普行菩薩諸清淨業入不思議自在三昧善巧方便能作佛事放佛光明普照世間無有限極現在一切諸佛世尊悉亦如是莊嚴世界無量形相無量光色悉是功德之所成就無量香無量寶無量樹無數莊嚴無數宮殿無數音聲隨順宿緣諸善知識示現一切功德莊嚴無有窮盡所謂一切香莊嚴一切鬘莊嚴一切粖香莊嚴一切寶莊嚴一切幡莊嚴一切寶繒綵莊嚴一切寶欄楯莊嚴阿僧祇金網莊嚴阿僧祇河莊嚴阿僧祇雲雨莊嚴阿僧祇音樂奏微妙音如是等無量無數莊嚴之具莊嚴一切盡法界虗空界十方無量種種業起佛所了知佛所宣説一切世界其中所有一切佛土所謂莊嚴佛土清淨佛土平等佛土妙好佛土威德佛土廣大佛土安樂佛土不可壞佛土無盡佛土無量佛土無動佛土無畏佛土光明佛土無違逆佛土可愛樂佛土普照明佛土嚴好佛土精麗佛土妙巧佛土第一佛土勝佛土殊勝佛土最勝佛土極勝佛土上佛土無上佛土無等佛土無比佛土無譬喻佛土如是過去未來現在一切佛土所有莊嚴菩薩摩訶薩以己善根發心回向願以如是去來現在一切諸佛所有國土清淨莊嚴悉以莊嚴於一世界如彼一切諸佛國土所有莊嚴皆悉成就皆悉清淨皆悉聚集皆悉顯現皆悉嚴好皆悉住持如一世界如是盡法界虗空界一切世界悉亦如是三世一切諸佛國土種種莊嚴皆悉具足論一佛子已下至皆悉具足有六十一行經明菩薩凡所隨喜回向悉皆具足圓滿分經佛子菩薩摩訶薩復以善根如是回向願我所修一切佛剎諸大菩薩皆悉充滿其諸菩薩體性真實智慧通達善能分別一切世界及衆生界深入法界及虗空界捨離愚癡成就念佛念法真實不可思議念僧無量普皆周遍亦念於捨法日圓滿智光普照見無所礙從無得生生諸佛法為衆勝上善根之主發生無上菩提之心住如來力趣薩婆若破諸魔業淨衆生界深入法性永離顛倒善根大願皆悉不空如是菩薩充滿其土生如是處有如是德常作佛事得佛菩提清淨光明具法界智現神通力一身充滿一切法界得大智慧入一切智所行之境善能分別無量無邊法界句義於一切剎皆無所著而能普現一切佛土心如虗空無有所依而能分別一切法界善能入出不可思議甚深三昧趣薩婆若住諸佛剎得諸佛力開示演説阿僧祇法而無所畏隨順三世諸佛善根普照一切如來法界悉能受持一切佛法知阿僧祇諸語言法善能演出不可思議差別音聲入於無上佛自在地普遊十方一切世界而無障礙行於無諍無所依法無所分別修習增廣菩提之心得善巧智善知句義能隨次第開示演説願令如是諸大菩薩莊嚴其國充滿分布隨順安住熏修極熏修純淨極純淨恬然宴寂於一佛剎隨一方所皆有如是無數無量無邊無等不可數不可稱不可思不可量不可説不可説不可説諸大菩薩周遍充滿如一方所一切方所亦復如是如一佛剎盡虗空遍法界一切佛剎悉亦如是論二佛子已下至一切佛剎悉亦如是有三十行經明菩薩以大願願菩薩衆海圓滿十方莊嚴國剎分經佛子菩薩摩訶薩以諸善根方便回向一切佛剎方便回向一切菩薩方便回向一切如來方便回向一切佛菩提方便回向一切廣大願方便回向一切出要道方便回向淨一切衆生界方便回向於一切世界常見諸佛出興於世方便回向常見如來壽命無量方便回向常見諸佛遍周法界轉無障礙不退法輪論三佛子已下至轉無障礙不退法輪有七行經明方便回向分經佛子菩薩摩訶薩以諸善根如是回向時普入一切佛國土故一切佛剎皆悉清淨普至一切衆生界故一切菩薩皆悉清淨普願一切諸佛國土佛出興故一切法界一切佛土諸如來身超然出現論四佛子已下至超然出現有四行半經明願清淨佛剎至一切衆剎佛常超然出現分經佛子菩薩摩訶薩以如是等無比回向趣薩婆若其心廣大猶如虗空無有限量入不思議知一切業及以果報皆悉寂滅心常平等無有邊際普能遍入一切法界論五佛子已下至入一切法界有三行半經明菩薩達一切智知業果寂滅分音切噉徒敢切澡子老切漱蘇奏切裳辰羊切顧古悟切彈徒干切頃去穎切寤悟音睡是為切戀力轉切摶度官切粒立音蘊於問切瑕胡加切哲陟列切萌莫耕切劑才細切躁則到切競渠敬切亢苦郎切氐都兮切蜂夫容切窠苦和切𧷮尸羊切
