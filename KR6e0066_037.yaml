body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論夜摩天宮偈讚品第二十論將釋此品約作三門分別一釋品名目二釋品來意三隨文釋義第一釋品名目者明升夜摩天宮以説十行之法此品以功德林等十菩薩衆各各以當位之行以偈都讚當位之法故名偈讚品第二釋品來意者明欲説十行之法先須偈都讚十行之中因果法門故此品須來若不先舉所行之因果十行有何依成第三隨文釋義者於此一品之中約作二門分別一長科經意二隨文解釋第一長科經意者約作五段長科經爾時佛神力故十方各有一大菩薩一一各與佛剎微塵數菩薩俱從十萬佛剎微塵數國土外諸世界中而來集會其名曰功德林菩薩慧林菩薩勝林菩薩無畏林菩薩慚愧林菩薩精進林菩薩力林菩薩行林菩薩覺林菩薩智林菩薩此諸菩薩所從來國所謂親慧世界幢慧世界寶慧世界勝慧世界燈慧世界金剛慧世界安樂慧世界日慧世界淨慧世界梵慧世界此諸菩薩各於佛所淨修梵行所謂常住眼佛無勝眼佛無住眼佛不動眼佛天眼佛解脫眼佛審諦眼佛明相眼佛最上眼佛紺青眼佛是諸菩薩至佛所已頂禮佛足隨所來方各化作摩尼藏師子之座於其座上結跏趺坐論第一爾時佛神力故已下至結跏趺坐有十三行半經明隨位菩薩功德林等十菩薩并陳自行佛因果來集分第二隨文釋義者於此分中義分為三一釋菩薩名及配隨位進修之因果二釋剎土遠近之意三釋菩薩各各同號遍周第一釋菩薩名及配隨位進修之因果者約有十種因果第一功德林菩薩者如十住位中初生佛智慧家故菩薩名法慧及財慧等此位明從慧行行福智二報廣多故以林為名也又林者廣多義覆蔭義莊嚴義身幹枝條華葉果實相資義明行位菩薩以無性智慧莊嚴萬行枝條大悲為葉覆蔭攝化一切衆生皆令自他菩提華果悉開發故如川澤有林衆鳥歸若人有行多人依是故十行菩薩目之名林此當歡喜行主檀波羅蜜門如善財十行之初善知識名為善見在林中經行亦如此也國名三眼者如此位佛果號為眼也國名親慧世界者明此十行親從佛慧所生為因亦常與一切衆生以為親近佛果號為常住眼佛為親從佛智慧生故所有知根利俗直令得其常住之智眼故明自得如來智慧之眼所有利生亦令他得智眼故明以如來智慧觀根利生之智即是當位佛果也功德林是表所行行之人親慧世界是當位所修行智慧之因常住眼佛是當位知根見解之果也與根本智相應名常住眼佛第二慧林菩薩者明智慧如林廣多義故此是饒益行以智慧饒益一切衆生令不迷故行戒波羅蜜此位以智慧為戒體故如善財童子十行中善知識釋天童子行戒波羅蜜以算法相法印法即安置村營城邑吉凶之地是智慧故十住之中以法身為戒體此十行之中以智慧為戒體故幢慧世界是所修行因以慧為戒體於生死中不傾動故無勝眼佛是所行之果以慧眼知根餘無勝故第三勝林菩薩者此是無違逆行主忍波羅蜜諸行之中忍行最在初無忍不成行也故號勝林菩薩如善財童子於此位中善知識是優婆夷名為具足為忍波羅蜜總攝衆行慈悲喜捨總在其中明優婆夷者表慈悲行也素服被髮是戒忍之相處其一室室開四門表慈育衆生四攝法也十千侍女萬行具也以一小器濟慧無窮者表離慢自高四攝無限故明一一波羅蜜互含用故勝林菩薩是行行之人寶慧世界是所修行之法明以忍為衆行之寶可貴重故無住眼佛即是忍中之佛果也明雖行忍行而不念所行也第四無畏林菩薩者明常行精進即於生死利人天之無畏也主無屈撓行為以智慧知時知法知根利物不撓其事不滯其功故如善財善知識明智居士是此位中善知識也為以明智利衆生即行無屈撓故住大興城是精進義故於市肆衢道者明饒益廣多無限利益故須臾繫念作意方便故仰視虗空隨所須物惠利衆生皆從空下者明智如空應智念故空為智本智不異空故是故觀空物隨智現也是故空者衆法之本以此觀之明一切功德總從空智而有無畏林菩薩者是此位行行之人勝慧世界是修行之法不動眼佛是此位中之佛果故明精進之位不隨物變故佛號不動眼故於境不動名為精進第五慚愧林菩薩是無癡亂行主禪波羅蜜為具慚愧而行禪為禪定發慧即行無癡亂故如善財知識寶髻長者是此位中善知識也在於市中明行中禪體閙而恆寂執善財手將詣所居之宅明引接也明於生死市中引接將詣所居智果故明觀果知因其宅寶嚴十層八門院有八門閣有十層八門明八正道十層之閣約十波羅蜜之報一如十度之行從下向上排之自具法則至文方明此約禪體總收萬行慚愧林菩薩是此位所修行之人燈慧世界是所行之法為定能起慧明照物故世界名燈也天眼佛者是此位佛果也為定能淨諸根故號天眼佛第六精進林菩薩此是善現行主般若波羅蜜門為以般若善現衆行以益含生故號精進林如善財此位中善知識號普眼長者明初救身命次施飲食後與説法一一隨根明智慧成就故精進林是修行之人金剛慧世界是修行之法明智慧破煩惱名金剛故解脫眼佛是此位之佛果第七力林菩薩是無著行主方便波羅蜜明以方便處俗利生同其行流處世無著成大悲行是為力林也以真入俗處纏不汙是故名為力林如善財此位善知識號無厭足王為行大悲自化現身作諸不善還自化其身追捉治罰或斷命根苦當治之令實衆生懼而斷惡救護衆生愛而不捨名無厭足力林菩薩是能行行之人安樂慧世界是所修之法審諦眼佛是此位果也為此位是成大慈悲門故名安樂世界約安樂衆生得名佛號審諦眼者審知衆生應何法化故方始調伏第八行林菩薩是難得行主願波羅蜜難得能得名為行林此智位難可升故名難得能得如善財童子此位善知識王名大光是第八智隨大願滿衆生意行大饒益普施衆生世間樂具一切智寶悉皆施之行林菩薩是能行行之人日慧世界是所修之法此位智體增明世界名日慧明相眼佛是此位之果為此位智體增明佛果號明相眼佛第九覺林菩薩是善法行主力波羅蜜如善財此位善知識號不動優婆夷是第九法師位何故為女身為明處法師位時貞潔慈悲柔軟以女表之此女發心已經閻浮提微塵劫自發心來心無一念五欲之想明貞潔慈悲柔軟是法師之德也是故此菩薩號曰覺林主力波羅蜜覺林菩薩是行行之人淨慧世界是修行之法最上眼佛是所修行之果為智慧淨故佛號最上眼第十智林菩薩是真實慧行故主智波羅蜜在此名位相似可知如善財此位知識號出家外道名為遍行明得智自在能同邪見攝諸邪見云三千之境九十六種外道我皆為之智林菩薩是能修行之人梵慧世界是所修之法紺青眼佛是此位之果紺青是十行之智一終之滿明淨照燭之極故第二釋剎土遠近之意經云十方一一各與佛剎微塵數菩薩俱從十方十萬佛剎微塵數國土之外諸世界中而來集會者十住云百佛剎微塵此位云十萬者明進升智慧之增廣迷心及諸境為塵之量迷執所居名之為國心隨境轉名之為諸國土之外執亡智契名之為來明智遍周境無不達故號菩薩一一菩薩例然總明達迷智遍第三釋各各同號菩薩遍周者明心迷諸境塵表無明廣多故心悟智通遐周剎海一切種智無不同其見故即各各名號遍周明迷時無境不惑悟已無境不智是諸菩薩已下頂禮佛足明致敬升座化座摩尼藏表十行處生死而化衆生行常無垢故摩尼座者離垢寶也藏者含藏義師子者無畏也此明凡行有染聖行無垢也師子依主立名故總明修行者智德所行之法經如此世界中夜摩天上菩薩來集一切世界悉亦如是其諸菩薩世界如來所有名號悉等無別論第二如此世界已下至悉等無別可兩行經都舉十方世界菩薩來集此分經爾時世尊從兩足上放百千億妙色光明普照十方一切世界夜摩宮中佛及大衆靡不皆現論第三爾時世尊已下至靡不皆現可兩行經明放光所在分爾時世尊從兩足趺上放百千億光明者十信足下輪中放光十住足指端放光此十行之中足趺上明次第隨位升進表法光從十千百千百億千億妙色光明總明隨位升進也凡足下足指端足趺上總不離所行之行經爾時功德林菩薩承佛威力普觀十方而説頌言論第四爾時功德林菩薩一行經明觀法説頌分自此長行已下有十段頌文是十林菩薩各各自頌當位所修行之法以此十法共成一行如是一一行中皆具十行各各隨自行位中名目下義即是所讚之法如文具明經佛放大光明普照於十方悉見天人尊通達無障礙佛坐夜摩宮普遍十方界此事甚奇特世間所希有須夜摩天王偈讚十如來如此會所見一切處咸爾彼諸菩薩衆皆同我等名十方一切處演説無上法所從諸世界名號亦無別各於其佛所淨修於梵行彼諸如來等名號悉亦同國土皆豐樂神力悉自在十方一切處皆謂佛在此或見在人間或見住天宮如來普安住一切諸國土我等今見佛處此天宮殿昔發菩提願普及十方界是故佛威力充遍難思議遠離世所貪具足無邊德故獲神通力衆生靡不見遊行十方界如空無所礙一身無量身其相不可得佛功德無邊云何可測知無住亦無去普入於法界爾時慧林菩薩承佛威力普觀十方而説頌言世間大導師離垢無上尊不可思議劫難可得值遇佛放大光明世間靡不見為衆廣開演饒益諸羣生如來出世間為世除癡冥如是世間燈希有難可見已修施戒忍精進及禪定般若波羅蜜以此照世間如來無與等求比不可得不了法真實無有能得見佛身及神通自在難思議無去亦無來説法度衆生若有得見聞清淨天人師永出諸惡趣捨離一切苦無量無數劫修習菩提行不能知此義不可得成佛不可思議劫供養無量佛若能知此義功德超於彼無量剎珍寶滿中施於佛不能知此義終不成菩提爾時勝林菩薩承佛威力普觀十方而説頌言譬如孟夏月空淨無雲曀赫日揚光輝十方靡不充其光無限量無有能測知有目斯尚然何況盲冥者諸佛亦如是功德無邊際不可思議劫莫能分別知諸法無來處亦無能作者無有所從生不可得分別一切法無來是故無有生以生無有故滅亦不可得一切法無生亦復無有滅若能如是解斯人見如來諸法無生故自性無所有如是分別知此人達深義以法無性故無有能了知如是解於法究竟無所解所説有生者以現諸國土能知國土性其心不迷惑世間國土性觀察悉如實若能於此知善説一切義爾時無畏林菩薩承佛威力普觀十方而説頌言如來廣大身究竟於法界不離於此座而遍一切處若聞如是法恭敬信樂者永離三惡道一切諸苦難設往諸世界無量不可數專心欲聽聞如來自在力如是諸佛法是無上菩提假使欲暫聞無有能得者若有於過去信如是佛法已成兩足尊而作世間燈若有當得聞如來自在力聞已能生信彼亦當成佛若有於現在能信此佛法亦當成正覺説法無所畏無量無數劫此法甚難值若有得聞者當知本願力若有能受持如是諸佛法持已廣宣説此人當成佛況復勤精進堅固心不捨當知如是人決定成菩提爾時慚愧林菩薩承佛威力普觀十方而説頌言若人得聞是希有自在法能生歡喜心疾除疑惑網一切知見人自説如是言如來無不知是故難思議無有從無智而生於智慧世間常暗冥是故無能生如色及非色此二不為一智無智亦然其體各殊異如相與無相生死及涅槃分別各不同智無智如是世界始成立無有敗壞相智無智亦然二相非一時如菩薩初心不與後心俱智無智亦然二心不同時譬如諸識身各各無和合智無智如是究竟無和合如阿伽陀藥能滅一切毒有智亦如是能滅於無智如來無有上亦無與等者一切無能比是故難值遇爾時精進林菩薩承佛威力普觀十方而説頌言諸法無差別無有能知者唯佛與佛知智慧究竟故如金與金色其性無差別法非法亦然體性無有異衆生非衆生二俱無真實如是諸法性實義俱非有譬如未來世無有過去相諸法亦如是無有一切相譬如生滅相種種皆非實諸法亦復然自性無所有涅槃不可取説時有二種諸法亦復然分別有殊異如依所數物而有於能數彼性無所有如是了知法譬如算數法增一至無量數法無體性智慧故差別譬如諸世間劫燒有終盡虗空無損壞佛智亦如是如十方衆生各取虗空相諸法亦如是世間妄分別爾時力林菩薩承佛威力普觀十方而説頌言一切衆生界皆在三世中三世諸衆生悉住五蘊中諸蘊業為本諸業心為本心法猶如幻世間亦如是世間非自作亦復非他作而其得有成亦復得有壞世間雖有成世間雖有壞了達世間者此二不應説云何為世間云何非世間世間非世間但是名差別三世五蘊法説名為世間彼滅非世間如是但假名云何説諸蘊諸蘊有何性蘊性不可滅是故説無生分別此諸蘊其性本空寂空故不可滅此是無生義衆生既如是諸佛亦復然佛及諸佛法自性無所有能知此諸法如實不顛倒一切知見人常見在其前爾時行林菩薩承佛威力普觀十方而説頌言譬如十方界一切諸地種自性無所有無處不周遍佛身亦如是普遍諸世界種種諸色相無住無來處但以諸業故説名為衆生亦不離衆生而有業可得業性本空寂衆生所依止普作衆色相亦復無來處如是諸色相業力難思議了達其根本於中無所見佛身亦如是不可得思議種種諸色相普現十方剎身亦非是佛佛亦非是身但以法為身通達一切法若能見佛身清淨如法性此人於佛法一切無疑惑若見一切法本性如涅槃是則見如來究竟無所住若修習正念明了見正覺無相無分別是名法王子爾時覺林菩薩承佛威力遍觀十方而説頌言譬如工畫師分布諸彩色虗妄取異相大種無差別大種中無色色中無大種亦不離大種而有色可得心中無彩畫彩畫中無心然不離於心有彩畫可得彼心恆不住無量難思議示現一切色各各不相知譬如工畫師不能知自心而由心故畫諸法性如是心如工畫師能畫諸世間五蘊悉從生無法而不造如心佛亦爾如佛衆生然應知佛與心體性皆無盡若人知心行普造諸世間是人則見佛了佛真實性心不住於身身亦不住心而能作佛事自在未曾有若人欲了知三世一切佛應觀法界性一切唯心造爾時智林菩薩承佛威力普觀十方而説頌言所取不可取所見不可見所聞不可聞一心不思議有量及無量二俱不可取若有人欲取畢竟無所得不應説而説是為自欺誑己事不成就不令衆歡喜有欲讚如來無邊妙色身盡於無數劫無能盡稱述譬如隨意珠能現一切色無色而現色諸佛亦如是又如淨虗空非色不可見雖現一切色無能見空者諸佛亦如是普現無量色非心所行處一切莫能覩雖聞如來聲音聲非如來亦不離於聲能知正等覺菩提無來去離一切分別云何於是中自言能得見諸佛無有法佛於何有説但隨其自心謂説如是法論第五從初頌已下有十段經明十行之中各申自行法門因果分已下如名之義各歎當位所行之法達名知法可知十行品第二十一論將釋此品約作三門分別一釋品名目二釋品來意三隨文釋義第一釋品名目者此品正説十種行門名為十行品第二釋品來意者此夜摩天宮本意説十行品為表此天蓮華開為晝合為夜為此天光自相照及無有日月但看蓮華開合而辨晝夜名為時分天夜摩者梵語也如此位菩薩知衆生心欲開發時應時引接未應度者與作得度因緣以此處而表之故於此處説十種行門前之兩品且明至此天處而稱歎之此一品正説十行門故此品須來明前之十住猶依須彌之頂此之十行依空所行表行無著也第三隨文解釋中約分為二一長科經意二隨文解説第一長科經意者此之一品經網作十四段長科第一爾時已下至是為十有二十五行經明同號功德林佛共加持功德林菩薩正説十行第二佛子已下至第一歡喜行有四十三行經明正説初歡喜行之法門第三佛子已下至第二饒益行有四十二行經明饒益行如是上下總一品通偈頌有十四段經末後兩段長行初一段動地興供分次一段功德林觀衆説頌分次二百二行頌説頌歎法分一品上下總通為十四段如經自有分劑不煩科文經爾時功德林菩薩承佛神力入菩薩善思惟三昧入是三昧已十方各過萬佛剎微塵數世界外有萬佛剎微塵數諸佛皆號功德林而現其前告功德林菩薩言善哉佛子乃能入此善思惟三昧善男子此是十方各萬佛剎微塵數同名諸佛共加於汝亦是毗盧遮那如來往昔願力威神之力及諸菩薩衆善根力令汝入是三昧而演説法為增長佛智故深入法界故了知衆生界故所入無礙故所行無障故得無量方便故攝取一切智性故覺悟一切諸法故知一切諸根故能持説一切法故所謂發起諸菩薩十種行善男子汝當承佛威神之力而演此法是時諸佛即與功德林菩薩無礙智無著智無斷智無師智無癡智無異智無失智無量智無勝智無懈智無奪智何以故此三昧力法如是故爾時諸佛各伸右手摩功德林菩薩頂時功德林菩薩即從定起告諸菩薩言佛子菩薩行不可思議與法界虗空界等何以故菩薩摩訶薩學三世諸佛而修行故佛子何等是菩薩摩訶薩行佛子菩薩摩訶薩有十種行三世諸佛之所宣説何等為十一者歡喜行二者饒益行三者無違逆行四者無屈撓行五者無癡亂行六者善現行七者無著行八者難得行九者善法行十者真實行是為十論第一爾時已下至是為十有二十五行經明同號功德林佛共加持功德林菩薩正説十行分於此分中約作四門分別一明三昧名二明同號佛數三明諸佛所以共入定菩薩同號四明同號諸佛來加第一明三昧名者何以名善思惟三昧三昧者云離沈掉定之異名且約禪定中有四種禪一愚夫所行禪二觀察義禪三念真如禪四如來禪今云善思惟三昧者是觀察義禪為審定其法善須觀察正念思惟安立法門為後學者而作法則故第二明同號佛數者舉萬佛剎微塵數佛皆號功德林明若迷其心境無明與無限剎塵不殊若了達心源智慧功德等十方而無盡第三明所以與入定菩薩而同號者以自一心洞曉與法界福智無差今此菩薩入此定門以與一切諸佛契同福慧遂得同號佛來加持明與十方諸佛智慧解行同故福德功德同故第四明同號佛來加者有六種加一言歎加以言歎譽故二毗盧遮那願力加乘往願故三毗盧遮那神力加契佛神力故四諸菩薩衆善根加同善根故五諸佛與智加得十種無礙智故六諸佛以手摩頂加安慰許説法故已下明功德林菩薩即從定起正説十種行門如下十種行中以十波羅蜜為體經佛子何等為菩薩摩訶薩歡喜行佛子此菩薩為大施主凡所有物悉能慧施其心平等無有悔吝不望果報不求名稱不貪利養但為救護一切衆生攝受一切衆生饒益一切衆生為學習諸佛本所修行憶念諸佛本所修行愛樂諸佛本所修行清淨諸佛本所修行增長諸佛本所修行住持諸佛本所修行顯現諸佛本所修行演説諸佛本所修行令諸衆生離苦得樂佛子菩薩摩訶薩修此行時令一切衆生歡喜愛樂隨諸方土有貧乏處以願力故往生於彼豪貴大富財寶無盡假使於念念中有無量無數衆生詣菩薩所白言仁者我等貧乏靡所資贍飢羸困苦命將不全唯願慈哀施我身肉令我得食以活其命爾時菩薩即便施之令其歡喜心得滿足如是無量百千衆生而來乞求菩薩於彼曾無退怯但更增長慈悲之心以是衆生咸來乞求菩薩見之倍復歡喜作如是念我得善利此等衆生是我福田是我善友不求不請而來教我入佛法中我今應當如是修學不違一切衆生之心又作是念願我已作現作當作所有善根令我未來於一切世界一切衆生中受廣大身以是身肉充足一切飢苦衆生乃至若有一小衆生未得飽足願不捨命所割身肉亦無有盡以此善根願得阿耨多羅三藐三菩提證大涅槃願諸衆生食我肉者亦得阿耨多羅三藐三菩提獲平等智具諸佛法廣作佛事乃至入於無餘涅槃若一衆生心不滿足我終不證阿耨多羅三藐三菩提菩薩如是利益衆生而無我想衆生想有想命想種種想補特伽羅想人想摩納婆想作者想受者想但觀法界衆生界無邊際法空法無所有法無相法無體法無處法無依法無作法作是觀時不見自身不見施物不見受者不見福田不見業不見報不見果不見大果不見小果爾時菩薩觀去來今一切衆生所受之身尋即壞滅便作是念奇哉衆生愚癡無智於生死內受無數身危脆不停速歸壞滅若已壞滅若今壞滅若當壞滅而不能以不堅固身求堅固身我當盡學諸佛所學證一切智知一切法為諸衆生説三世平等隨順寂靜不壞法性令其永得安隱快樂佛子是名菩薩摩訶薩第一歡喜行論第一歡喜行中檀波羅蜜為體有四十三行經分為五段一佛子何等為歡喜行已下至令一切衆生歡喜愛樂有九行半經明行檀波羅蜜學佛所修行分二隨諸方土有貧乏處已下至不違一切衆生之心有十行半經明此位菩薩見貧乏之處誓願生彼富貴家悉捨資財及以身命饒益分三又作如是念已下至三藐三菩提有八行半經明菩薩於飢餓劫中作廣大身捨之濟乏四菩薩如是已下至不見大果不見小果有六行半經明知真無想分補特伽羅想此曰數數取趣摩納婆想者此曰少年亦曰儒童意云不分別善惡老少悉皆施與五從爾時菩薩觀去來今已下至第一歡喜行有七行半經明觀衆生不堅自求堅固身令永安隱分經佛子何等為菩薩摩訶薩饒益行此菩薩護持淨戒於色聲香味觸心無所著亦為衆生如是宣説不求威勢不求種族不求富饒不求色相不求王位如是一切皆無所著但堅持淨戒作如是念我持淨戒必當捨離一切纏縛貪求熱惱諸難逼迫毀謗亂濁得佛所讚平等正法佛子菩薩如是持淨戒時於一日中假使無數百千億那由他諸大惡魔詣菩薩所一一各將無量無數百千億那由他天女皆於五欲善行方便端正姝麗傾惑人心執持種種珍玩之具欲來惑亂菩薩道意爾時菩薩作如是念此五欲者是障道法乃至障礙無上菩提是故不生一念欲想心淨如佛唯除方便教化衆生而不捨於一切智心佛子菩薩不以欲因緣故惱一衆生寧捨身命而終不作惱衆生事菩薩自得見佛已來未曾心生一念欲想何況從事若或從事無有是處爾時菩薩但作是念一切衆生於長夜中想念五欲趣向五欲貪著五欲其心決定耽染沈溺隨其流轉不得自在我今應當令此諸魔及諸天女一切衆生住無上戒住淨戒已於一切智心無退轉得阿耨多羅三藐三菩提乃至入於無餘涅槃何以故此是我等所應作業應隨諸佛如是修學作是學已離諸惡行計我無知以智入於一切佛法為衆生説令除顛倒然知不離衆生有顛倒不離顛倒有衆生不於顛倒內有衆生不於衆生內有顛倒亦非顛倒是衆生亦非衆生是顛倒顛倒非內法顛倒非外法衆生非內法衆生非外法一切諸法虗妄不實速起速滅無有堅固如夢如影如幻如化誑惑愚夫如是解者即能覺了一切諸行通達生死及與涅槃證佛菩提自得度令他得度自解脫令他解脫自調伏令他調伏自寂靜令他寂靜自安隱令他安隱自離垢令他離垢自清淨令他清淨自涅槃令他涅槃自快樂令他快樂佛子此菩薩復作是念我當隨順一切如來離一切世間行具一切諸佛法住無上平等處等觀衆生明達境界離諸過失斷諸分別捨諸執著善巧出離心恆安住無上無説無依無動無量無邊無盡無色甚深智慧佛子是名菩薩摩訶薩第二饒益行論第二饒益行中以戒波羅蜜為體有四十二行經分為五段一佛子何等為菩薩饒益行已下至得佛所讚平等正法有六行半經明於五塵境界不著分二佛子菩薩如是持淨戒時已下至一切智心有八行經明魔將天女不能惑亂分三佛子已下至無餘涅槃有八行半經明菩薩不以五欲惱衆生分四何以故已下至令他快樂有十三行半經明善自調伏方能説法令他得樂分五佛子已下至饒益行有六行經明得離世間行入甚深智慧分經佛子何等為菩薩摩訶薩無違逆行此菩薩常修忍法謙下恭敬不自害不他害不兩害不自取不他取不兩取不自著不他著不兩著亦不貪求名聞利養但作是念我當常為衆生説法令離一切惡斷貪瞋癡憍慢覆藏慳嫉諂誑令恆安住忍辱柔和佛子菩薩成就如是忍法假使有百千億那由他阿僧祇衆生來至其所一一衆生化作百千億那由他阿僧祇口一一口出百千億那由他阿僧祇語所謂不可喜語非善法語不悅意語不可愛語非仁賢語非聖智語非聖相應語非聖親近語深可厭惡語不堪聽聞語以是言辭毀辱菩薩又此衆生一一各有百千億那由他阿僧祇手一一手各執百千億那由他阿僧祇器仗逼害菩薩如是經於阿僧祇劫曾無休息菩薩遭此極大楚毒身毛皆豎命將欲斷作是念言我因是苦心若動亂則自不調伏自不守護自不明了自不修習自不正定自不寂靜自不愛惜自生執著何能令他心得清淨菩薩爾時復作是念我從無始劫住於生死受諸苦惱如是思惟重自勸勵令心清淨而得歡喜善自調攝自能安住於佛法中亦令衆生同得此法復更思惟此身空寂無我我所無有真實性空無二若苦若樂皆無所有諸法空故我當解了廣為人説令諸衆生滅除此見是故我今雖遭苦毒應當忍受為慈念衆生故饒益衆生故安樂衆生故憐愍衆生故攝受衆生故不捨衆生故自得覺悟故令他覺悟故心不退轉故趣向佛道故是名菩薩摩訶薩第三無違逆行論第三無違逆行以忍波羅蜜為體有三十行經分為三段一佛子已下至忍辱柔和有五行半經明不害自他忍辱柔和分二佛子已下至令他心得清淨有十三行半經明菩薩身語加害堪忍分三菩薩爾時已下至無違逆行有十行半經明菩薩觀空成忍分經佛子何等為菩薩摩訶薩無屈撓行此菩薩修諸精進所謂第一精進大精進勝精進殊勝精進最勝精進最妙精進上精進無上精進無等精進普遍精進性無三毒性無憍慢性不覆藏性不慳嫉性無諂誑性自慚愧終不為惱一衆生故而行精進但為斷一切煩惱故而行精進但為拔一切惑本故而行精進但為除一切習氣故而行精進但為知一切衆生界故而行精進但為知一切衆生死此生彼故而行精進但為知一切衆生煩惱故而行精進但為知一切衆生心樂故而行精進但為知一切衆生境界故而行精進但為知一切衆生諸根勝劣故而行精進但為知一切衆生心行故而行精進但為知一切法界故而行精進但為知一切佛法根本性故而行精進但為知一切佛法平等性故而行精進但為知三世平等性故而行精進但為得一切佛法智光明故而行精進但為證一切佛法智故而行精進但為知一切佛法一實相故而行精進但為知一切佛法無邊際故而行精進但為得一切佛法廣大決定善巧智故而行精進但為得分別演説一切佛法句義智故而行精進佛子菩薩摩訶薩成就如是精進行已設有人言汝頗能為無數世界所有衆生以一一衆生故於阿鼻地獄經無數劫備受衆苦令彼衆生一一得值無數諸佛出興於世以見佛故具受衆樂乃至入於無餘涅槃汝乃當成阿耨多羅三藐三菩提能爾不耶答言我能設復有人作如是言有無量阿僧祇大海汝當以一毛端滴之令盡有無量阿僧祇世界盡末為塵彼滴及塵一一數之悉知其數為衆生故經爾許劫於念念中受苦不斷菩薩行不以聞此語故而生一念悔恨之心但更增上歡喜踊躍深自慶幸得大善利以我力故令彼衆生永脫諸苦菩薩以此所行方便於一切世界中令一切衆生乃至究竟無餘涅槃是名菩薩摩訶薩第四無屈撓行論第四無屈撓行以精進波羅蜜為體有三十七行半經分為三段一佛子已下至一切佛法句義故而行精進有二十二行半經明菩薩不求世利為求佛一切智故行精進分二佛子菩薩摩訶薩已下至答言我能有六行經明菩薩為衆生入地獄受苦無辭勞分三設復有人已下至無屈撓行有八行半經明菩薩為饒益衆生故多劫受苦不辭勞分經佛子何等為菩薩摩訶薩離癡亂行此菩薩成就正念心無散亂堅固不動最上清淨廣大無量無有迷惑以是正念故善解世間一切語言能持出世諸法言説所謂能持色法非色法言説能持建立色自性言説乃至能持建立受想行識自性言説心無癡亂於世間中死此生彼心無癡亂入胎出胎心無癡亂發菩提意心無癡亂事善知識心無癡亂勤修佛法心無癡亂覺知魔事心無癡亂離諸魔業心無癡亂於不可説劫修菩薩行心無癡亂此菩薩成就如是無量正念於無量阿僧祇劫中從諸佛菩薩善知識所聽聞正法所謂甚深法廣大法莊嚴法種種莊嚴法演説種種名句文身法菩薩莊嚴法佛神力光明無上法正希望決定解清淨法不著一切世間法分別一切世間法甚廣大法離癡翳照了一切衆生法一切世間共法不共法菩薩智無上法一切智自在法菩薩聽聞如是法已經阿僧祇劫不忘不失心常憶念無有間斷何以故菩薩摩訶薩於無量劫修諸行時終不惱亂一衆生令失正念不壞正法不斷善根心常增長廣大智故復次此菩薩摩訶薩種種音聲不能惑亂所謂高大聲粗濁聲極令人恐怖聲悅意聲不悅意聲喧亂耳識聲沮壞六根聲此菩薩聞如是等無量無數好惡音聲假使充滿阿僧祇世界未曾一念心有散亂所謂正念不亂境界不亂三昧不亂入甚深法不亂行菩提行不亂發菩提心不亂憶念諸佛不亂觀真實法不亂化衆生智不亂淨衆生智不亂決了甚深義不亂不作惡業故無惡業障不起煩惱故無煩惱障不輕慢法故無有慢法障不誹謗正法故無有報障佛子如上所説如是等聲一一充滿阿僧祇世界於無量無數劫未曾斷絶悉能壞亂衆生身心一切諸根而不能壞此菩薩心菩薩入三昧中住於聖法思惟觀察一切音聲善知音聲生住滅相善知音聲生住滅性如是聞已不生於貪不起於瞋不失於念善取其相而不染著知一切聲皆無所有實不可得無有作者亦無本際與法界等無有差別菩薩如是成就寂靜身語意行至一切智永不退轉善入一切諸禪定門知諸三昧同一體性了一切法無有邊際得一切法真實智慧得離音聲甚深三昧得阿僧祇諸三昧門增長無量廣大悲心是時菩薩於一念中得無數百千三昧聞如是聲心不惑亂令其三昧漸更增廣作如是念我當令一切衆生安住無上清淨念中於一切智得不退轉究竟成就無餘涅槃是名菩薩摩訶薩第五離癡亂行論第五離癡亂行以禪波羅蜜為體有四十九行經分為六段一佛子已下至修菩薩行心無癡亂有十行經明以正念隨於生死中利生無亂分二此菩薩已下至心常憶念無有間斷有九行經明菩薩聞持正念不亂分三何以故已下至未曾一念心有散亂有七行半經明以正念於好惡音聲無散亂分四所謂正念不亂已下至而不能壞此菩薩心有八行半經明聞法及利生無餘障分五菩薩入三昧中已下至等無差別有五行經明觀聲無體堪忍分六菩薩如是成就寂靜身語意行已下至離癡亂行有九行經明身口意淨堪入諸法不離一性分音切紺古暗切撓奴巧切贍時艷切羸力為切脆取藏切謗北浪切姝昌朱切欺去其切乏伐音遭祖勞切豎臣庾切堪苦含切嫉疾音誹方尾切穩烏本切玩五貫切豪乎刀切畫胡卦切彩七宰切幹古案切罰伐音耎而兗切曀於計切吝良刃切儒如音
