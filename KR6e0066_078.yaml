body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論如來出現品第三十七之一論將釋此品約立四門一釋品名目二釋品來意三釋如來放光加文殊普賢所由四隨文釋義一釋品名目者何故名為如來出現品為從第二會普光明殿説十信心以不動智佛為初信首次無礙智佛等餘九佛是十信中進修又明一智中具十種智故隨行立名從十信中信進修行不離根本智不動智體起大悲願行修差別智成大慈悲至此位滿名為如來出現品明前初會菩提場中出現始成正覺者是毗盧遮那佛出現此品中出現是菩薩進修五位行解智悲位滿出現故名出現品亦如善財見德生童子有德童女表智悲二行滿故便見慈氏如來是表如來出現義是故如來以光加此二人問答説如來出現之門文殊表現根本智普賢是差別智成就饒益衆生之門二釋品來意者明前五位中文殊普賢及佛果三法已周此明佛果行圓滿故此品須來三釋如來放光加文殊普賢所由者明如來眉間光是佛中道佛果智光以灌文殊之頂者明佛果智德高勝為令文殊起問佛果之門如來放口中光灌普賢口者明普賢是差別智滿欲令説法故問曰何故如來不自説此品所以放光加此文殊普賢二人答曰以表法故令後學者易解故非是如來自不能説云何為表法答曰為明文殊是佛法身現根本智者普賢菩薩是佛升進修行差別智者明至此位根本智及差別智齊滿周圓方始名為如來出現表以法身自性白淨無垢中能現自體無依明淨本智問差別智自説自己修行行解之心與古今諸佛合其智德方是自己所行覺行圓滿佛故是故如來放光加之成法則故明一切菩薩果滿功終法皆如是佛所放光許至佛位故法非謬故表明如是法身根本智差別智利生萬行齊備周圓方是自己如來出現表文殊是現根本智者普賢是説法者佛是果也思之可見大意明文殊普賢是成就佛果理智行門還令説佛出現之法佛是根本智自體無言凡是有言皆是差別智初會菩提場中毗盧遮那佛出現者明初會菩提場非是毗盧遮那如來放光成法與初發心修行者為樣式故明表法身根本智與差別利生行周圓滿故令此二人説自佛與古佛出興恰相似故如是文殊普賢是古今諸佛之共法若初發心者從初發信心已來皆悉遊履此之文殊普賢二行至此方滿故如是進修皆不離初信中不動智佛十智之體故以明時不動智不動行不動能遍遊十方不動一入多不動多入一不動小入大不動乃至如經所明為達身心理智無性無依情識繫亡法會常爾故以此五位升進或升天表法或身遍十方終成不離普光明殿本智之體一剎那際是故此自果已終之法還不離説信心之處普光明殿説還如善財至慈氏如來還見文殊信心初友入普賢身相似恐後學者迷法一一以善財將行表之令易解故大意依此可知又約此一部之經有三終因果二種常道一從初菩提場至毗盧遮那品有六品經是佛自分五位中因果即以十普賢海月光大明菩薩通神天等五十衆是二發信心菩薩五位通信心即六位因果者從第二會於普光明殿説佛名號品已下至第八會普光明殿如來出現品有三十二品經明菩薩發心因果一終此三十二品中第三禪佛華三昧品未來是此修行中加行之次第三自文殊師利至大塔廟説普照法界修多羅門化善財令南求五十三勝友明以行勸修五位一終之因果為表但説教由恐在行還迷以置善財是發心能行行者五十三善知識是已行行之人一一求學升進與後發菩提心者作五位升進之樣令不迷其行故其中意至文方釋二種常道者如法界品離世間品於出離道常利衆生恆真法界非虗妄也常真法界是常道佛果故恆利世間利生無求自利是佛常道之普賢行也是名此經三終因果二種常道如第二會至第八會中如來出現品是明發心菩薩升進五位一終付囑流通總在此品明此品是五位進升果圓之末也有人於法界品終覓付囑流通此為未得經之意趣以法界品總該一部教體及以三世古今無本末時分寂用之大體非是安立加行置因果所為但以引接菩薩發心乘法界乘引接迷徒至此如來出現品以明經五位加行進修功熟處方論流通付囑故若論根本法界性自不迷性自不悟無出無沒不成不壞無流無通也此付囑流通意從凡夫未悟令加行功終處説故非在法界品後也如法界品直論一切諸佛功終之果是自流通不須付囑如法界品中如來師子座暨于法界無有邊涯此明果極也如此如來出現品明信心者五位加行功終之力方始純實創登功畢二行圓周便説付囑流通明果初滿故方人常道法界非古今始末之量也流通此法名曰流通即法界品是為自以法界功滿常以法界行勸衆生以方便行倣而學之名為付囑流通方便行者即五位中方法是也即諸波羅蜜四攝四無量三十七品大願大智大悲等是一切諸佛法皆如是方能成也四隨文釋義者於此一品之中長科兩段經爾時世尊從眉間白毫相中放大光明名如來出現無量百千億那由他阿僧祇光明以為眷屬其光普照十方盡虗空法界一切世界右繞十匝顯現如來無量自在覺悟無數諸菩薩衆震動一切十方世界除滅一切諸惡道苦映蔽一切諸魔宮殿顯示一切諸佛如來坐菩提座成等正覺及以一切道場衆會作是事已而來右繞菩薩衆會入如來性起妙德菩薩頂時此道場一切大衆身心踊躍生大歡喜作如是念甚奇希有今者如來放大光明必當演説甚深大法爾時如來性起妙德菩薩於蓮華座上偏袒右肩右跽合掌一心向佛而説頌言正覺功德大智出普達境界到彼岸等於三世諸如來是故我今恭敬禮已升無相境界岸而現妙相莊嚴身放於離垢千光明破魔軍衆咸令盡十方所有諸世界悉能震動無有餘未曾恐怖一衆生善逝威神力如是虗空法界性平等已能如是而安住一切含生無數量咸令滅惡除衆垢苦行勤勞無數劫成就最上菩提道於諸境界智無礙與一切佛同其性導師放此大光明震動十方諸世界已現無量神通力而復還來入我身決定法中能善學無量菩薩皆來集令我發起問法心是故我今請法王今此衆會皆清淨善能度脫諸世間智慧無邊無染著如是賢勝咸來集利益世間尊導師智慧精進皆無量今以光明照大衆令我問於無上法誰於大仙深境界而能真實具開演誰是如來法長子世間尊導願顯示爾時如來即於口中放大光明名無礙無畏百千億阿僧祇光明以為眷屬普照十方盡虗空等法界一切世界右繞十匝顯現如來種種自在開悟無量諸菩薩衆震動一切十方世界除滅一切諸惡道苦映蔽一切諸魔宮殿顯示一切諸佛如來坐菩提座成等正覺及以一切道場衆會作是事已而來右繞菩薩衆會入普賢菩薩摩訶薩口其光入已普賢菩薩身及師子座過於本時及諸菩薩身座百倍唯除如來師子之座爾時如來性起妙德菩薩問普賢菩薩摩訶薩言佛子佛所示現廣大神變令諸菩薩皆生歡喜不可思議世莫能如是何瑞相普賢菩薩摩訶薩言佛子我於往昔見諸如來應正等覺示現如是廣大神變即説如來出現法門如我惟忖今現此相當説其法説是語時一切大地悉皆震動出生無量問法光明時性起妙德菩薩問普賢菩薩言佛子菩薩摩訶薩應云何知諸佛如來應正等覺出現之法願為我説佛子此諸無量百千億那由他菩薩衆會皆久修淨業念慧成就到於究竟大莊嚴岸具一切佛威儀之行正念諸佛未曾忘失大悲觀察一切衆生決定了知諸大菩薩神通境界已得諸佛神力所加能受一切如來妙法具如是等無量功德皆已來集佛子汝已曾於無量百千億那由他佛所承事供養成就菩薩最上妙行於三昧門皆得自在入一切佛祕密之處知諸佛法斷衆疑惑為諸如來神力所加知衆生根隨其所樂為説真實解脫之法隨順佛智演説佛法到於彼岸有如是等無量功德善哉佛子願説如來應正等覺出現之法身相言音心意境界所行之行成道轉法輪乃至示現入般涅槃見聞親近所生善根如是等事願皆為説時如來性起妙德菩薩欲重明此義向普賢菩薩而説頌曰善哉無礙大智慧善覺無邊平等境願説無量佛功德佛子聞已皆欣慶菩薩云何隨順入諸佛如來出興世云何身語心境界及所行處願皆説云何諸佛成正覺云何如來轉法輪云何善逝般涅槃大衆聞已心歡喜若有見佛大法王親近增長諸善根願説彼諸功德藏衆生見已何所獲若有得聞如來名若現在世若涅槃於彼福藏生深信有何等利願宣説此諸菩薩皆合掌瞻仰如來仁及我大功德海之境界淨衆生者願為説願以因緣及譬喻演説妙法相應義衆生聞已發大心疑盡智淨如虗空如遍一切國土中諸佛所現莊嚴身願以妙音及譬喻示佛菩提亦如彼十方千萬諸國土億那由他無量劫如今所集菩薩衆於彼一切悉難見此諸菩薩咸恭敬於微妙義生渴仰願以淨心具開演如來出現廣大法爾時普賢菩薩摩訶薩告如來性起妙德等諸菩薩大衆言佛子此處不可思議所謂如來應正等覺以無量法而得出現何以故非以一緣非以一事如來出現而得成就以十無量百千阿僧祇事而得成就何等為去所謂過去無量攝受一切衆生菩提心所成故過去無量清淨殊勝志樂所成故過去無量救護一切衆生大慈大悲所成故過去無量相續行願所成故過去無量修諸福智心無厭足所成故過去無量供養諸佛教化衆生所成故過去無量智慧方便清淨道所成故過去無量清淨功德藏所成故過去無量莊嚴道智所成故過去無量通達法義所成故佛子如是無量阿僧祇法門圓滿成於如來論第一從初爾時世尊已下至佛子如是無量阿僧祇法門圓滿成於如來於中并頌有一百行半經明如來放光加文殊普賢令説如來出現分隨文釋義分為五段第一從初爾時世尊從眉間放白毫相光已下至而説頌言有十二行半經明佛放光灌文殊頂令問法分第二二十行頌明文殊師利菩薩稱歎如來德及放光加持之意請問誰堪演説佛境界分第三爾時如來即於口中放大光明已下至頌有三十五行經明如來放光入普賢口令文殊知問法所在并舉問如來出現十法分第四二十行頌明文殊師利菩薩重頌前所請説如來出現十法分第五爾時普賢菩薩摩訶薩已下至佛子如是無量阿僧祇法門圓滿成於如來明普賢告衆如來出現有十無量百千阿僧祇事而得成就分已上五段是佛光加文殊普賢令相問答説佛出現分光加之意前已敘竟大意表法中明升進修行法身根本智差別智慈悲行十方圓終處名為如來出現故放光加令文殊普賢二人明理智體用參徹是如來出現明文殊是十方一切諸佛之法身妙理現根本智慧之門普賢是十方一切諸佛差別智萬行大悲之門今明五位進修至此位此二法圓滿名自佛出現故放眉間光灌文殊頂令問自佛果極至頂法門放口中光是説教之光令説自己佛果極至頂差別萬行智悲十方圓滿法故以此二人表法令學者易解故非是如來自不能説又表根本智非言所及也此一品經表明法身根本智差別智悲萬行圓滿故十地十一地已前加行此位真俗二法功終其義如文自明第二佛子譬如三千大千世界已下有十段經明普賢菩薩説如來出現身境界及所行行十事之法分於此段中演説如來十種出現門中有十段經文説如來出現有十百千阿僧祇事其十者第一明如來十無量出現經佛子譬如三千大千世界非以一緣非以一事而得成就以無量緣無量事方乃得成所謂興布大雲降霪大雨四種風輪相續為依其四者何一名能持能持大水故二名能消能消大水故三名建立建立一切諸處所故四名莊嚴莊嚴分布咸善巧故如是皆由衆生共業及諸菩薩善根所起令於其中一切衆生各隨所宜而得受用佛子如是等無量因緣乃成三千大千世界法性如是無有生者無有作者無有知者無有成者然彼世界而得成就如來出現亦復如是非以一緣非以一事而得成就以無量因緣無量事相乃得成就所謂曾於過去佛所聽聞受持大法雲雨因此能起如來四種大智風輪何等為四一者念持不忘陀羅尼大智風輪能持一切如來大法雲雨故二者出生止觀大智風輪能消竭一切煩惱故三者善巧回向大智風輪能成就一切善根故四者出生離垢差別莊嚴大智風輪令過去所化一切衆生善根清淨成就如來無漏善根力故如來如是成等正覺法性如是無生無作而得成就佛子是為如來應正等覺出現第一相菩薩摩訶薩應如是知復次佛子譬如三千大千世界將欲成時大雲降雨名曰洪霔一切方處所不能受所不能持唯除大千界將欲成時佛子如來應正等覺亦復如是興大法雲雨大法雨名成就如來出現一切二乘心志狹劣所不能受所不能持唯除諸大菩薩心相續力佛子是為如來應正等覺出現第二相菩薩摩訶薩應如是知復次佛子譬如衆生以業力故大雲降雨來無所從去無所至如來應正等覺亦復如是以諸菩薩善根力故興大法雲雨大法雨亦無所從來無所至去佛子是為如來應正等覺出現第三相菩薩摩訶薩應如是知復次佛子譬如大雲降霔大雨大千世界一切衆生無能知數若欲算計徒令發狂唯大千世界主摩醯首羅以過去所修善根力故乃至一滴無不明了佛子如來應正等覺亦復如是興大法雲雨大法雨一切衆生聲聞獨覺所不能知若欲思量心必狂亂唯除一切世間主菩薩摩訶薩以過去所修覺慧力故乃至一文一句入衆生心無不明了佛子是為如來應正等覺出現第四相菩薩摩訶薩應如是知復次佛子譬如大雲降雨之時有大雲雨名為能滅能滅火災有大雲雨名為能起能起大水有大雲雨名為能止能止大水有大雲雨名為能成能成一切摩尼諸寶有大雲雨名為分別分別三千大千世界佛子如來出現亦復如是興大法雲雨大法雨有大法雨名為能滅能滅一切衆生煩惱有大法雨名為能起能起一切衆生善根有大法雨名為能止能止一切衆生見惑有大法雨名為能成能成一切智慧法寶有大法雨名為分別分別一切衆生心樂佛子是為如來應正等覺出現第五相菩薩摩訶薩應如是知復次佛子譬如大雲雨一味水隨其所雨無量差別如來出現亦復如是雨於大悲一味法水隨宜説法無量差別佛子是為如來應正等覺出現第六相菩薩摩訶薩應如是知復次佛子譬如三千大千世界初始成時先成色界諸天宮殿次成欲界諸天宮殿次成於人及餘衆生諸所住處佛子如來出現亦復如是先起菩薩諸行智慧次起緣覺諸行智慧次起聲聞善根諸行智慧次起其餘衆生有為善根諸行智慧佛子譬如大雲雨一味水隨諸衆生善根異故所起宮殿種種不同如來大悲一味法雨隨衆生器而有差別佛子是為如來應正等覺出現第七相菩薩摩訶薩應如是知復次佛子譬如世界初欲成時有大水生遍滿三千大千世界生大蓮華名如來出現功德寶莊嚴遍覆水上光照十方一切世界時摩醯首羅淨居天等見是華已即決定知於此劫中有爾所佛出興于世佛子爾時其中有風輪起名善淨光明能成色界諸天宮殿有風輪起名淨光莊嚴能成欲界諸天宮殿有風輪起名堅密無能壞能成大小諸輪圍山及金剛山有風輪起名勝高能成須彌山王有風輪起名不動能成十大山王何等為十所謂佉陀羅山仙人山伏魔山大伏魔山持雙山尼民陀羅山目真鄰陀山摩訶目真鄰陀山香山雪山有風輪起名為安住能成大地有風輪起名為莊嚴能成地天宮殿龍宮殿乾闥婆宮殿有風輪起名無盡藏能成三千大千世界一切大海有風輪起名普光明藏能成三千大千世界諸摩尼寶有風輪起名堅固根能成一切諸如意樹佛子大雲所雨一味之水無有分別以衆生善根不同故風輪不同風輪差別故世界差別佛子如來出現亦復如是具足一切善根功德放於無上大智光明名不斷如來種不思議智普照十方一切世界與諸菩薩一切如來灌頂之記當成正覺出興於世佛子如來出現復有無上大智光明名清淨離垢能成如來無漏無盡智復有無上大智光明名普照能成如來普入法界不思議智復有無上大智光明名持佛種性能成如來不傾動力復有無上大智光明名迥出無能壞能成如來無畏無壞智復有無上大智光明名一切神通能成如來諸不共法一切智智復有無上大智光明名出生變化能成如來令見聞親近所生善根不失壞智復有無上大智光明名普隨順能成如來無盡福德智慧之身為一切衆生而作饒益復有無上大智光明名不名究竟能成如來甚深妙智隨所開悟令三寶種永不斷絶復有無上大智光明名種種莊嚴能成如來相好嚴身令一切衆生皆生歡喜復有無上大智光明名不可壞能成如來法界虗空界等殊勝壽命無有窮盡佛子如來大悲一味之水無有分別以諸衆生欲樂不同根性各別而起種種大智風輪令諸菩薩成就如來出現之法佛子一切如來同一體性大智輪中出生種種智慧光明佛子汝等應知如來於一解脫味出生無量不可思議種種功德衆生念言此是如來神力所造佛子此非如來神力所造佛子乃至一菩薩不於佛所曾種善根能得如來少分智慧無有是處但以諸佛威德力故令諸衆生具佛功德而佛如來無有分別無成無壞無有作者亦無作法佛子是為如來應正等覺出現第八相菩薩摩訶薩應如是知復次佛子如依虗空起四風輪能持水輪何等為四一名安住二名常住三名究竟四名堅固此四風輪能持水輪水輪能持大地令不散壞是故説地輪依水輪水輪依風輪風輪依虗空虗空無所依雖無所依能令三千大千世界而得安住佛子如來出現亦復如是依無礙慧光明起佛四種大智風輪能持一切衆生善根何等為四所謂普攝衆生皆令歡喜大智風輪建立正法令諸衆生皆生愛樂大智風輪守護一切衆生善根大智風輪具一切方便通達無漏界大智風輪是為四佛子諸佛世尊大慈救護一切衆生大悲度脫一切衆生大慈大悲普遍饒益然大慈大悲依大方便善巧大方便善巧依如來出現如來出現依無礙慧光明無礙慧光明無有所依佛子是為如來應正等覺出現第九相菩薩摩訶薩應如是知復次佛子譬如三千大千世界既成就已饒益無量種種衆生所謂水族衆生得水饒益陸地衆生得地饒益宮殿衆生得宮殿饒益虗空衆生得虗空饒益如來出現亦復如是種種饒益無量衆生所謂見佛生歡喜者得歡喜益住淨戒者得淨戒益住諸禪定及無量者得聖出世大神通益住法門光明者得因果不壞益住無所有光明者得一切法不壞益是故説言如來出現饒益一切無量衆生佛子是為如來應正等覺出現第十相菩薩摩訶薩應如是知佛子菩薩摩訶薩知如來出現則知無量知成就無量行故則知廣大知周遍十方故則知無來去知離生住滅故則知無行無所行知離心意識故則知無身知如虗空故則知平等知一切衆生皆無我故則知無盡知遍一切剎無有盡故則知無退知盡後際無斷絶故則知無壞知如來智無有對故則知無二知平等觀察為無為故則知一切衆生皆得饒益本願回向自在滿足故爾時普賢菩薩摩訶薩欲重明此義而説頌言十力大雄最無上譬如虗空無等等境界廣大不可量功德第一超世間十力功德無邊量心意思量所不及人中師子一法門衆生億劫莫能知十方國土碎為塵或有算計知其數如來一毛功德量千萬億劫無能説如人持尺量虗空復有隨行計其數虗空邊際不可得如來境界亦如是或有能於剎那頃悉知三世衆生心設經衆生數等劫不能知佛一念性譬如法界遍一切不可見取為一切十力境界亦復然遍於一切非一切真如離妄恆寂靜無生無滅普周遍諸佛境界亦復然體性平等不增減譬如實際而非際普在三世亦非普導師境界亦如是遍於三世皆無礙法性無作無變易猶如虗空本清淨諸佛性淨亦如是本性非性離有無法性不在於言論無説離説恆寂滅十力境界性亦然一切文辭果能辨了知諸法性寂滅如鳥飛空無有迹以本願力現色身令見如來大神變若有欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙是故佛子應善聽我以少譬明佛境十力功德不可量為悟衆生今略説導師所現於身業語業心業諸境界轉妙法輪般涅槃一切善根我今説譬如世界初安立非一因緣而可成無量力便諸因緣成此三千大千界如來出現亦如是無量功德乃得成剎塵心念尚可知十力生因莫能測譬如劫初雲澍雨而起四種大風輪衆生善根菩薩力成此三千各安住十力法雲亦如是起智風輪清淨意昔所回向諸衆生普導令成無上果如有大雨名洪澍無有處所能容受唯除世界將成時清淨虗空大風力如來出現亦如是普雨法雨充法界一切劣意無能持唯除清淨廣大心譬如空中澍大雨無所從來無所去作者受者悉亦無自然如是普充洽十力法雨亦如是無去無來無造作本行為因菩薩力一切大心咸聽受譬如空雲澍大雨一切無能數其滴唯除三千自在王具功德力悉明了善逝法雨亦如是一切衆生莫能測唯除於世自在人明見如觀掌中寶譬如空雲澍大雨能滅亦起亦能斷一切珍寶悉能成三千所有皆分別十力法雨亦如是滅惑起善斷諸見一切智寶皆使成衆生心樂悉分別譬如空中雨一味隨其所雨各不同豈彼雨性有分別然隨物異法如是如來法雨非一異平等寂靜離分別然隨所化種種殊自然如是無邊相譬如世界初成時先成色界天宮殿次及欲天次人處乾闥婆宮最後成如來出現亦如是先起無邊菩薩行次化樂寂諸緣覺次聲聞衆後衆生諸天初見蓮華瑞知佛當出生歡喜水緣風力起世間宮殿山川悉成立如來宿善大光明巧別菩薩與其記所有智輪體皆淨各能開示諸佛法譬如樹林依地有地依於水得不壞水輪依風風依空而其虗空無所依一切佛法依慈悲慈悲復依方便立方便依智智依慧無礙慧身無所依譬如世界既成立一切衆生獲其利地水所住及空居二足四足皆蒙益法王出現亦如是一切衆生獲其利若有見聞及親近悉使滅除諸惑惱如來出現法無邊世間迷惑莫能知為欲開悟諸含識無譬喻中説其譬論第二明如來出現有十無量身經佛子諸菩薩摩訶薩應云何見如來應正等覺身佛子諸菩薩摩訶薩應於無量處見如來身何以故諸菩薩摩訶薩不應於一法一事一身一國土一衆生見於如來應遍一切處見於如來佛子譬如虗空遍至一切色非色處非至非不至何以故虗空無身故如來身亦如是遍一切處遍一切衆生遍一切法遍一切國土非至非不至何以故如來身無身故為衆生故示現其身佛子是為如來身第一相諸菩薩摩訶薩應如是見復次佛子譬如虗空寬廣非色而能顯現一切諸色而彼虗空無有分別亦無戲論如來身亦復如是以智光明普照明故令一切衆生世出世間諸善根業皆得成就而如來身無有分別亦無戲論何以故從本已來一切執著一切戲論皆永斷故佛子是為如來身第二相諸菩薩摩訶薩應如是見復次佛子譬如日出於閻浮提無量衆生皆得饒益所謂破暗作明變濕令燥生長草木成熟穀稼廓徹虗空開敷蓮華行者見道居者辦業何以故日輪普放無量光故佛子如來智日亦復如是以無量事普益衆生所謂滅惡生善破愚為智大慈救護大悲度脫令其增長根力覺分令生深信捨離濁心令得見聞不壞因果令得天眼見歿生處令心無礙不壞善根令智修明開敷覺華令其發心成就本行何以故如來廣大智慧日身放無量光普照耀故佛子是為如來身第三相諸菩薩摩訶薩應如是見復次佛子譬如日出於閻浮提先照一切須彌山等諸大山王次照黑山次照高原然後普照一切大地日不作念我先照此後照於彼但以山地有高下故照有先後如來應正等覺亦復如是成就無邊法界智輪常放無礙智慧光明先照菩薩摩訶薩等諸大山王次照緣覺次照聲聞次照決定善根衆生隨其心器示廣大智然後普照一切衆生乃至邪定亦皆普及為作未來利益因緣令成熟故而彼如來大智日光不作是念我當先照菩薩大行乃至後照邪定衆生但放光明平等普照無礙無障無所分別佛子譬如日月隨時出現大山幽谷普照無私如來智慧亦復如是普照一切無有分別隨諸衆生根欲不同智慧光明種種有異佛子是為如來身第四相諸菩薩摩訶薩應如是見復次佛子譬如日出生盲衆生無眼根故未曾得見雖未曾見然為日光之所饒益何以故因此得知晝夜時節受用種種衣服飲食令身調適離衆患故如來智日亦復如是無信無解毀戒毀見邪命自活生盲之類無信眼故不見諸佛智慧日輪雖不見佛智慧日輪亦為智日之所饒益何以故以佛威力令彼衆生所有身苦及諸煩惱未來苦因皆消滅故佛子如來有光明名積集一切功德有光明名普照一切有光明名清淨自在照有光明名出大妙音有光明名普解一切語言法令他歡喜有光名明示現永斷一切疑自在境界有光明名無住智自在普照有光明名永斷一切戲論自在智有光明名隨所應出妙音聲有光明名出清淨自在音莊嚴國土成熟衆生佛子如來一一毛孔放如是等千種光明五百光明普照下方五百光明普照上方種種剎中種種佛所諸菩薩衆其菩薩等見此光明一時皆得如來境界十頭十眼十耳十鼻十舌十身十手十足十地十智皆悉清淨彼諸菩薩先所成就諸處諸地見彼光明轉更清淨一切善根皆悉成熟趣一切智住二乘者滅一切垢其餘一分生盲衆生身既快樂心亦清淨柔耎調伏堪修念智地獄餓鬼畜生諸趣所有衆生皆得快樂解脫衆苦命終皆生天上人間佛子彼諸衆生不覺不知以何因緣以何神力而來生此彼生盲者作如是念我是梵天我是梵化是時如來住普自在三昧出六十種妙音而告之言汝等非是梵天亦非梵化亦非帝釋護世所作皆是如來威神之力彼諸衆生聞是語已以佛神力皆知宿命生大歡喜心歡喜故自然而出優曇華雲香雲音樂雲衣雲蓋雲幢雲幡雲末香雲寶雲師子幢半月樓閣雲歌詠讚歎雲種種莊嚴雲皆以尊重心供養如來何以故此諸衆生得淨眼故如來與彼授阿耨多羅三藐三菩提記佛子如來智日如是利益生盲衆生令得善根具足成熟佛子是為如來身第五相諸菩薩摩訶薩應如是見復次佛子譬如月輪有四奇特未曾有法何等為四一者映蔽一切星宿光明二者隨逐於時示現虧盈三者於閻浮提澄淨水中影無不現四者一切見者皆對目前而此月輪無有分別無有戲論佛子如來身月亦復如是有四奇特未曾有法何等為四所謂映蔽一切聲聞獨覺學無學衆隨其所宜示現壽命修短不同而如來身無有增減一切世界淨心衆生菩提器中影無不現一切衆生有瞻對者皆謂如來唯現我前隨其心樂而為説法隨其地位令得解脫隨所應化令見佛身而如來身無有分別無有戲論所作利益皆得究竟佛子是為如來身第六相諸菩薩摩訶薩應如是見復次佛子譬如三千大千世界大梵天王以少方便於大千世界普現其身一切衆生皆見梵王現在已前而此梵王亦不分身無種種身佛子諸佛如來亦復如是無有分別無有戲論亦不分身無種種身而隨一切衆生心樂示現其身亦不作念現若干身佛子是為如來身第七相諸菩薩摩訶薩應如是見復次佛子譬如醫王善知衆藥及諸呪論閻浮提中諸所有藥用無不盡復以宿世諸善根力大明呪力為方便故衆生見者病無不愈彼大醫王知命將終作是念言我命終後一切衆生無所依怙我今宜應為現方便是時醫王合藥塗身明呪力持令其終後身不分散不萎不枯威儀視聽與本無別凡所療治悉得除差佛子如來應正等覺無上醫王亦復如是於無量百千億那由他劫鍊治法藥已得成就修學一切方便善巧大明呪力皆到彼岸善能除滅一切衆生諸煩惱病及住壽命經無量劫其身清淨無有思慮無有動用一切佛事未嘗休息衆生見者諸煩惱病悉得消滅佛子是為如來身第八相諸菩薩摩訶薩應如是見音切袒堂爛切跪溪委切燥先到切廓苦郭切忖錯本切怙戶音萎於追切跽其几切倍薄亥切囑之玉切
