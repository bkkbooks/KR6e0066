body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十回向品第二十五之七論第五十五捨妓女經佛子菩薩摩訶薩所有一切內宮眷屬妓侍衆女皆顏貌端正才能具足談笑歌舞悉皆巧妙種種衣服種種華香而以嚴身見者歡喜情無厭足如是寶女百千萬億那由他數皆由菩薩善業所生隨意自在敬順無失盡以布施諸來乞者而於其中無愛樂心無顧戀心無耽著心無繫縛心無執取心無貪染心無分別心無隨逐心無取相心無樂欲心菩薩爾時觀諸善根為欲令一切衆生咸得出離故回向得佛法喜故回向於不堅固中而得堅固故回向得金剛智不可壞心故回向入佛道場故回向到於彼岸故回向得無上菩提心故回向能以智慧了達諸法故回向出生一切善根故回向入三世諸佛家故回向佛子菩薩摩訶薩住如是法生如來家增長諸佛清淨勝因出生最勝一切智道深入菩薩廣大智業滅除一切世間垢惱常能供施功德福田為諸衆生宣説妙法善巧安立令其修習諸清淨行常勤攝取一切善根菩薩爾時以諸善根如是回向所謂願一切衆生常得無量三昧眷屬菩薩勝定相續不斷願一切衆生常樂見佛悉入諸佛莊嚴三昧願一切衆生成就菩薩不思議定自在遊戲無量神通願一切衆生人如實定得不壞心願一切衆生盡獲菩薩甚深三昧於諸禪定而得自在願一切衆生得解脫心成就一切三昧眷屬願一切衆生種種三昧皆得善巧悉能攝取諸三昧相願一切衆生得勝智三昧普能學習諸三昧門願一切衆生得無礙三昧入深禪定終不退失願一切衆生得無著三昧心恆正受不取二法是為菩薩摩訶薩布施一切內宮眷屬時善根回向為欲令一切衆生皆得不壞清淨眷屬故為欲令一切衆生皆得菩薩眷屬故為欲令一切衆生悉得滿足佛法故為欲令一切衆生滿足一切智力故為欲令一切衆生證於無上智慧故為欲令一切衆生得於隨順眷屬故為欲令一切衆生得同志行人共居故為欲令一切衆生具足一切福智故為欲令一切衆生成就清淨善根故為欲令一切衆生得善和眷屬故為欲令一切衆生成就如來清淨法身故為欲令一切衆生成就次第如理辨才善説諸佛無盡法藏故為欲令一切衆生永捨一切世俗善根同修出世清淨善根故為欲令一切衆生淨業圓滿成就一切清淨法故為欲令一切衆生一切佛法皆悉現前以法光明普嚴淨故論第五十六施所愛妻子經佛子菩薩摩訶薩能以所愛妻子布施猶如往昔須達拏太子現莊嚴王菩薩及餘無量諸菩薩等菩薩爾時乘薩婆若心行一切施淨修菩薩布施之道其心清淨無有中悔罄捨所珍求一切智令諸衆生淨深志樂成菩提行觀菩薩道念佛菩提住佛種性菩薩摩訶薩成辦如是布施心已決定志求如來之身自觀己身繫屬一切不得自在又以其身普攝衆生猶如寶洲給施一切未滿足者令其滿足菩薩如是護念衆生欲令自身作第一塔普使一切皆生歡喜欲於世間生平等心欲為衆生作清涼池欲與衆生一切安樂欲為衆生作大施主智慧自在了知菩薩所行之行而能如是大誓莊嚴趣一切智願成無上智慧福田普念衆生常隨守護而能成辦自身利益智慧光明普照於世常勤憶念菩薩施心恆樂觀察如來境界佛子菩薩摩訶薩以無縛無著解脫心布施妻子所集善根如是回向所謂願一切衆生住佛菩提起變化身周遍法界轉不退輪願一切衆生得無著身願力周行一切佛剎願一切衆生捨愛憎心斷貪恚結願一切衆生為諸佛子隨佛所行願一切衆生於諸佛所生自己心不可沮壞願一切衆生常為佛子從法化生願一切衆生得究竟處成就如來自在智慧願一切衆生證佛菩提永離煩惱願一切衆生能具演説佛菩提道常樂修行無上法施願一切衆生得正定心不為一切諸緣所壞願一切衆生坐菩提樹成最正覺開示無量從法化生諸善男女是為菩薩摩訶薩布施妻子善根回向為令衆生悉皆證得無礙解脫無著智故論第五十七施舍宅經佛子菩薩摩訶薩莊嚴舍宅及諸資具隨有乞求一切施與行布施法於家無著遠離一切居家覺觀厭惡家業資生之具不貪不味心無繫著知家易壞心恆厭捨都於其中無所愛樂但欲出家修菩薩行以諸佛法而自莊嚴一切悉捨心無中悔常為諸佛之所讚歎舍宅財物隨處所有悉以惠施心無戀著見有乞求心生喜慶菩薩爾時以此善根如是回向所謂願一切衆生捨離妻子成就出家第一之樂願一切衆生解脫家縛入於非家諸佛法中修行梵行願一切衆生捨離慳垢樂一切施心無退轉願一切衆生永離家法少欲知足無所藏積願一切衆生出世俗家住如來家願一切衆生得無礙法滅除一切障礙之道願一切衆生離家屬愛雖現居家心無所著願一切衆生善能化誘不離家法説佛智慧願一切衆生身現在家心常隨順佛智而住願一切衆生在居家地住於佛地普令無量無邊衆生發歡喜心是為菩薩摩訶薩布施舍宅時善根回向為令衆生成就菩薩種種行願神通智故論第五十八施園林臺榭經佛子菩薩摩訶薩布施種種園林臺榭遊戲快樂莊嚴之處作是念言我當為一切衆生作好園林我當為一切衆生示現法樂我當施一切衆生歡喜之意我當示一切衆生無邊喜樂我當為一切衆生開淨法門我當令一切衆生發歡喜心我當令一切衆生得佛菩提我當令一切衆生成滿大願我當於一切衆生猶如慈父我當令一切衆生智慧觀察我當施一切衆生資生之具我當於一切衆生猶如慈母生長一切善根大願佛子菩薩摩訶薩如是修行諸善根時於惡衆生不生疲厭亦不誤起棄捨之心設滿世間一切衆生悉不知恩菩薩於彼初無謙恨不生一念求反報心但欲滅其無量苦惱於諸世間心如虗空無所染著普觀諸法真實之相發大誓願滅衆生苦永不厭捨大乘志願滅一切見修諸菩薩平等行願佛子菩薩摩訶薩如是觀察已攝諸善根悉以回向所謂願一切衆生念念滋生無量善法成就無上園林之心願一切衆生得不動法見一切佛皆令歡喜願一切衆生樂法園苑得諸佛剎園苑妙樂願一切衆生得淨妙心常見如來神足園林願一切衆生得佛戲樂常善遊戲智慧境界願一切衆生得遊戲樂普詣佛剎道場衆會願一切衆生成就菩薩解脫遊戲盡未來劫行菩薩行心無疲倦願一切衆生見一切佛充滿法界發廣大心住佛園林願一切衆生悉能遍往一切佛剎一一剎中供養諸佛願一切衆生得善欲心清淨莊嚴一切佛剎是為菩薩摩訶薩布施一切園林臺榭善根回向為令衆生見一切佛遊戲一切佛園林故論第五十九施廣大施會經佛子菩薩摩訶薩作百千億那由他無量無數廣大施會一切清淨諸佛印可終不損惱於一衆生普令衆生遠離衆惡淨三業道成就智慧開置無量百千億那由他阿僧祇清淨境界積集無量百千億那由他阿僧祇資生妙物發甚難得菩提之心行無限施令諸衆生住清淨道初中後善生淨信解隨百千億無量衆生心之所樂悉令歡喜以大慈悲救護一切承事供養三世諸佛為欲成就一切佛種修行布施心無中悔增長信根成滿勝行念念增進檀波羅蜜菩薩爾時以諸善根如是回向所謂願一切衆生發大乘心悉得成就摩訶衍施願一切衆生皆悉能行大會施盡施善施最勝施無上施最無上施無等等施超諸世間施一切諸佛所稱歎施願一切衆生作第一施主於諸惡趣勉濟衆生皆令得入無礙智道修平等願如實善根得無差別證自境智願一切衆生安住寂靜諸禪定智入不死道究竟一切神通智慧勇猛精進具足諸地莊嚴佛法到於彼岸永不退轉願一切衆生設大施會終不疲厭給濟衆生無有休息究竟無上一切種智願一切衆生恆勤種植一切善根到於無量功德彼岸願一切衆生常蒙諸佛之所稱歎普為世間作大施主功德具足充滿法界遍照十方施無上樂願一切衆生設大施會廣集善根等攝衆生到於彼岸願一切衆生成最勝施普令衆生住第一乘願一切衆生為應時施永離非時大施究竟願一切衆生成就善施到佛丈夫大施彼岸願一切衆生究竟常行大莊嚴施盡以一切諸佛為師悉皆親近興大供養願一切衆生住清淨施集等法界無量福德到於彼岸願一切衆生於諸世間為大施主誓度羣品住如來地是為菩薩摩訶薩設大施會善根回向為令衆生行無上施究竟佛施成就善施不可壞施供諸佛施無恚恨施救衆生施成一切智施常見諸佛施善精進施成就一切菩薩功德諸佛智慧廣大施故論第六十施一切資生分經佛子菩薩摩訶薩布施一切資生之物心無貪惜不求果報於世富樂無所希望離妄想心善思惟法為欲利益一切衆生審觀一切諸法實性隨諸衆生種種不同所用所求各各差別成辦無量資生之具所有嚴飾悉皆妙好行無邊施行一切施盡內外施行此施時增志樂力獲大功德成就心寶常能守護一切衆生皆令發生殊勝志願初未曾有求反報心所有善根等三世佛悉以圓滿一切種智佛子菩薩摩訶薩以此布施所有善根回向衆生願一切衆生清淨調伏願一切衆生滅除煩惱嚴淨一切諸佛剎土願一切衆生以清淨心於一念中周遍法界願一切衆生智慧充滿虗空法界願一切衆生得一切智普入三世調伏衆生於一切時常轉清淨不退法輪願一切衆生具一切智善能示現神通方便饒益衆生願一切衆生悉能悟入諸佛菩提盡未來劫於十方界常説正法曾無休息令諸衆生普得聞知願一切衆生於無量劫修菩薩行悉得圓滿願一切衆生於一切世界若染若淨若小若大若粗若細若覆若仰或一莊嚴或種種莊嚴所可演説在世界數諸世界中修菩薩行靡不周遍願一切衆生於念念中常作三世一切佛事教化衆生向一切智論第六十一隨諸衆生所須一切阿僧祇物施經佛子菩薩摩訶薩隨諸衆生一切所須以如是等阿僧祇物而為給施為令佛法相續不斷大悲普救一切衆生安住大慈修菩薩行於佛教誨終無違犯以巧方便修行衆善不斷一切諸佛種性隨求悉與而無患厭一切悉捨未曾中悔常勤回向一切智道時十方國土種種形類種種趣生種種福田皆來集會至菩薩所種種求索菩薩見已普皆攝受心生歡喜如見善友大悲哀愍思滿其願捨心增長無有休息亦不疲厭隨其所求悉令滿足離貧窮苦時諸乞者心大欣慶轉更稱傳讚揚其德美聲遐布悉來歸往菩薩見已歡喜無量假使百千億那由他劫受帝釋樂無數劫受夜摩天樂無量劫受兜率陀天樂無邊劫受善變化天樂無等劫受他化自在天樂不可數劫受梵王樂不可稱劫受轉輪王王三千樂不可思劫受遍淨天樂不可説劫受淨居天樂悉不能及菩薩摩訶薩見乞者來歡喜愛樂欣慶踊躍信心增長志樂清淨諸根調順信解成滿乃至增進諸佛菩提佛子菩薩摩訶薩以此善根為欲利益一切衆生故回向為欲安樂一切衆生故回向為欲令一切衆生得大義利故回向為令一切衆生悉得清淨故回向為令一切衆生悉求菩提故回向為令一切衆生悉得平等故回向為令一切衆生悉得賢善心故回向為令一切衆生悉入摩訶衍故回向為令一切衆生悉得賢善智慧故回向為令一切衆生悉具普賢菩薩行願滿十力乘現成正覺故回向佛子菩薩摩訶薩以諸善根如是回向時身口意業皆悉解脫無著無繫無衆生想無命者想無補伽羅想無人想無童子想無生者想無作者想無受者想無有想無無想無今世後世想無死此生彼想無常想無無常想無三有想無無三有想非想非非想如是非縛回向非縛解回向非業回向非業報回向非分別回向非無分別回向非思回向非思已回向非心回向非無心回向佛子菩薩摩訶薩如是回向時不著內不著外不著能緣不著所緣不著因不著果不著法不著非法不著思不著非思不著色不著色生不著色滅不著受想行識不著受想行識生不著受想行識滅佛子菩薩摩訶薩若能於此諸法不著則不縛色不縛色生不縛色滅不縛受想行識不縛受想行識生不縛受想行識滅若能於此諸法不縛則亦於諸法不解何以故無有少法若現生若已生若當生無法可取無法可著一切諸法自相如是無有自性自性相離非一非二非多非無量非小非大非狹非廣非深非淺非寂靜非戲論非處非非處非法非非法非體非非體非有非非有菩薩如是觀察諸法則為非法於言語中隨世建立非法為法不斷諸業道不捨菩薩行求一切智終無退轉了知一切業緣如夢音聲如響衆生如影諸法如幻而亦不壞因緣業力了知諸業其用廣大解一切法皆無所作行無作道未嘗暫廢佛子此菩薩摩訶薩住一切智若處非處普皆回向一切智性於一切處皆悉回向無有退轉以何義故説名回向永度世間至於彼岸故名回向永出諸蘊至於彼岸故名回向度言語道至於彼岸故名回向離種種想至於彼岸故名回向永斷身見至於彼岸故名回向永離依處至於彼岸故名回向永絶所作至於彼岸故名回向永出諸有至於彼岸故名回向永捨諸取至於彼岸故名回向永出世法至於彼岸故名回向佛子菩薩摩訶薩如是回向時則為隨順佛住隨順法住隨順智住隨順菩提住隨順義住隨順回向住隨順境界住隨順行住隨順真實住隨順清淨住佛子菩薩摩訶薩如是回向則為了達一切諸法則為承事一切諸佛無有一佛而不承事無有一法而不供養無有一法而可滅壞無有一法而可乖違無有一物而可貪著無有一法而可厭離不見內外一切諸法有少滅壞違因緣道法力具足無有休息論已上此一段回向中總有六十一種施一一施中十種大願六十一願中有十種回向以表捨一切所著成一切無所著諸性無作供養諸佛教化衆生行無盡行故經佛子是為菩薩摩訶薩第六隨順堅固一切善根回向菩薩摩訶薩住此回向時常為諸佛之所護念堅固不退入深法性修一切智隨順法義隨順法性隨順一切堅固善根隨順一切圓滿大願具足隨順堅固之法一切金剛所不能壞於諸法中而得自在論從佛子是為菩薩摩訶薩第六隨順堅固一切善根回向已下至於諸法中而得自在有六行經都結已下回向之功經爾時金剛幢菩薩觀察十方觀察衆會觀察法界已入於字句甚深之義修習無量廣大之心以大悲心普覆世間長去來今佛種性心入於一切諸佛功德成就諸佛自在力身觀諸衆生心之所樂隨其善根所可成熟依法性身為現色身承佛神力而説頌言論從爾時金剛幢已下有六行經明金剛幢菩薩觀衆説頌歎法分經菩薩現身作國王於世位中最無等福德威光勝一切普為羣萌興利益其心清淨無染著於世自在咸遵敬弘宣正法以訓人普使衆生獲安隱現生貴族升王位常依正教轉法輪稟性仁慈無毒虐十方敬仰皆從化智慧分別常明了色相才能皆具足臨馭率土靡不從摧伏魔軍悉令盡堅持淨戒無違犯決志堪忍不動搖永願蠲除忿恚心常樂修行諸佛法飲食香鬘及衣服車騎牀蓐座與燈菩薩悉以給濟人并及所餘無量種為利益故而行施令其開發廣大心於尊勝處及所餘意皆清淨生歡喜菩薩一切皆周給內外所有悉能捨必使其心永清淨不令暫爾生狹劣或施於頭或施眼或施於手或施足皮肉骨髓及餘物一切皆捨心無吝菩薩身居大王位種族豪貴人中尊開口出舌施羣生其心歡喜無憂戀以彼施舌諸功德回向一切諸衆生普願藉此勝因緣悉得如來廣長舌或施妻子及王位或施其身作僮僕其心清淨常歡喜如是一切無憂悔隨所樂求咸施與應時給濟無疲厭一切所有皆能散諸來求者普滿足為聞法故施其身修諸苦行求菩提復為衆生捨一切求無上智不退轉以於佛所聞正法自捨其身充給侍為欲普救諸羣生發生無量歡喜心彼見世尊大導師能以慈心廣饒益是時踊躍生歡喜聽受如來深法味菩薩所有諸善根悉以回向諸衆生普皆救護無有餘永使解脫常安樂菩薩所有諸眷屬色相端嚴能辨慧華鬘衣服及塗香種種莊嚴皆具足此諸眷屬甚希有菩薩一切皆能施專求正覺度羣生如是之心無暫捨菩薩如是諦思惟備行種種廣大業悉以回向諸含識而不生於取著心菩薩捨彼大王位及以國土諸城邑宮殿樓閣與園林僮僕侍衛皆無吝彼於無量百千劫處處周行而施與因以教導諸羣生悉使超升無上岸無量品類各差別十方世界來萃止菩薩見已心欣慶隨其所乏令滿足如三世佛所回向菩薩亦修如是業調御人尊之所行悉皆隨學到彼岸菩薩觀察一切法誰為能入此法者云何為入何所入如是布施心無住菩薩回向善巧智菩薩回向方便法菩薩回向真實義於其法中無所著心不分別一切業亦不染著於業果知菩提性從緣起入深法界無違逆不於身中而有業亦不依止於心住智慧了知無業性以因緣故業不失心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉空寂菩薩已到色彼岸受想行識亦如是超出世間生死流其心謙下常清淨諦觀五蘊十八界十二種處及己身於此一一求菩提體性畢竟不可得不取諸法常住相於斷滅相亦不著法性非有亦非無業理次第終無盡不於諸法有所住不見衆生及菩提十方國土三世中畢竟求之無可得若能如是觀諸法則如諸佛之所解雖求其性不可得菩薩所行亦不虗菩薩了法從緣有不違一切所行道開示解説諸業迹欲使衆生悉清淨是為智者所行道一切如來之所説隨順思惟入正義自然覺悟成菩提諸法無生亦無滅亦復無來無有去不於此死而生彼是人悟解諸佛法了達諸法真實性而於法性無分別知法無性無分別此人善入諸佛智法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得一切諸佛所覺了悉皆攝取無有餘雖説三世一切法如是等法悉非有如諸法性遍一切菩薩回向亦復然如是回向諸衆生常於世間無退轉論今上下長行及八十二行頌於中文義自具不煩更釋且略釋回向名目云何隨順堅固一切善根回向經云佛子如是回向時即為隨順佛住隨順法住隨順智住隨順菩提住總明行檀波羅蜜周遍剎海不壞法身智身成就通化長大慈悲等佛所行故為名也又釋以理順行以行順理以智順悲以悲順智以方便願力引生智海成就悲門均調自在名為隨順堅固善根回向論主頌曰法身理智無體性平等清淨無造作方便以願力莊嚴神通變化行充滿法無自性從緣生緣生不失無作性説興回向大願雲周遍無邊一切行不離緣體性無生智如影響充法界智體如願如普賢回向大願皆無實雖復無實不廢緣雖復從緣性無作菩薩所興諸行雲智無來去如影現假使教化諸羣生猶如化人度幻衆大約如世造立宮室要以功成論其現自施功功體各無自性及至成功事畢還以無功而益人設宮室有覆養之功亦復不云養育此回向大願亦復如是為理智雖有淨煩惱之功不興回向大願無覆育饒益大慈悲之功此之回向從初發心住具足有之但約升進勝劣言之亦約説文廣狹言爾亦以時不遷論也總五位一時説也古今無前後義也第七等隨順一切衆生回向以方便波羅蜜為體主大悲門前六波羅蜜是修出生死心此第七已後四波羅蜜是方便智入生死中教化衆生是故表法中善財知識觀世音菩薩以為此第七隨順一切衆生大悲回向中行故此新經翻為觀自在菩薩不可依也舊經名觀世音菩薩者是為十方世界共為一佛國無別西方別有阿彌陀是如來權設引有為小蒙方便隨心專念攝餘惡心隨心念處得見化佛稱自心量諸德謬解謂此娑婆世界無觀世音此改舊經本作觀自在云觀自在者但約名彰行中但彰觀照世間出世間無相理智自在非明慈悲之行也觀世音菩薩文殊普賢此三法是古今三世一切佛之共行十方共同文殊主法身妙慧之理普賢明智身知根成萬行之門觀世音明大慈悲處生死三人之法成一人之德號毗盧遮那一切衆生總依此三法號之為佛少一不成今此一位依舊不依新翻又依梵云光世音菩薩明以教光行光大慈悲之光等衆生而利物即一切處文殊一切處普賢亦得名一切處光世音今言觀世音者取正念心成依心應現而立名也不可以為觀自在所表法也觀自在者約名表法義中是表第六般若波羅蜜位也非是方便波羅蜜入生死同衆生行以四攝四無量不斷煩惱之名此由翻譯者誤也觀世音住居補怛洛迦此云小白華樹山觀世音菩薩居之為諸菩薩説慈悲經此山多有小白華樹其華甚香經云住山西阿者西為金為白虎主殺位明於殺位以主慈悲門正趣菩薩東來以明智位至文方釋經云佛子云何為菩薩摩訶薩等隨順一切衆生回向已下至説頌長科為二十段經佛子云何為菩薩摩訶薩等隨順一切衆生回向佛子此菩薩摩訶薩隨所積集一切善根所謂小善根大善根廣善根多善根無量善根種種善根微塵數善根阿僧祇善根無邊際善根不可思善根不可量善根佛境界善根法境界善根僧境界善根善知識境界善根一切衆生境界善根方便善巧境界善根修諸善心境界善根內境界善根外境界善根無邊助道法境界善根勤修一切捨善根立勝志究竟持淨戒善根一切捨無不受堪忍善根常精進心無退善根以大方便入無量三昧善根以智慧善觀察善根知一切衆生心行差別善根集無邊功德善根勤修習菩薩業行善根普覆育一切世間善根論第一從初佛子已下至一切世間善根有十四行經明菩薩自集已上三十二種無邊善根分經佛子菩薩摩訶薩於此善根修行安住趣入攝受積集辦具悟解心淨開示發起時得堪忍心閇惡趣門善攝諸根威儀具足遠離顛倒正行圓滿堪為一切諸佛法器能作衆生福德良田為佛所念長佛善根住諸佛願行諸佛業心得自在等三世佛趣佛道場入如來力具佛色相超諸世間不樂生天不貪富樂不著諸行一切善根悉以回向為諸衆生功德之藏住究竟道普覆一切於虗妄道中拔出衆生令其安住一切善法遍諸境界無斷無盡開一切智菩提之門建立智幢嚴淨大道普能示現一切世間令除垢染心善調伏生如來家淨佛種性功德具足作大福田為世所依安立衆生咸令清淨常勤修習一切善根論第二佛子已下至修習一切善根有十四行經明菩薩如上所修三十二種無限福田善根回向為一切衆生功德之藏分經佛子菩薩摩訶薩以淨志願菩提心力修諸善根時作是念言此諸善根是菩提心之所積集是菩提心之所思惟是菩提心之所發起是菩提心之所志樂是菩提心之所增益皆為憐愍一切衆生皆為趣求一切種智皆為成就如來十力作是念時善根增進永不退轉論第三佛子已下至永不退轉有六行經明菩薩念如上善根不離無作無依菩提心所積集憐愍一切衆生分經佛子菩薩摩訶薩復作是念願我以此善根果報盡未來劫修菩薩行悉以惠施一切衆生悉以回向一切衆生普遍無餘願令阿僧祇世界珍寶充滿阿僧祇世界衣服充滿阿僧祇世界妙香充滿阿僧祇世界莊嚴具充滿阿僧祇世界無量摩尼寶充滿阿僧祇世界妙華充滿阿僧祇世界上味充滿阿僧祇世界財貨充滿阿僧祇世界牀座充滿蓋以寶帳敷以妙衣阿僧祇世界種種莊嚴寶冠充滿假使一人盡未來劫常來求索以此等物而惠施之未曾厭倦而有休息如於一人於一切衆生悉亦如是論第四佛子已下至悉亦如是有十一行半經明菩薩發願願如上所修無限善根所有果報盡未來劫所修如上善根悉以回向一切衆生令十方世界衆寶充滿惠施無限衆生分經佛子菩薩摩訶薩如是施時無虗偽心無希望心無名譽心無中悔心無熱惱心但發專求一切智道心一切悉捨心哀愍衆生心教化成熟心皆令安住一切智智心佛子菩薩摩訶薩以諸善根如是回向盡未來劫常行惠施住一切智智心論第五佛子已下至常行惠施住一切智智心有五行半經明菩薩無五種心常行惠施成五種心分如經自具無虗偽心為首已上五段結前三十二種善根竟經佛子菩薩摩訶薩復作是念我為一衆生故欲令阿僧祇世界寶象充滿七支具足性極調順上立金幢金網彌覆種種妙寶而為莊嚴以用布施願令阿僧祇世界寶馬充滿如龍馬王種種衆寶莊嚴之具而嚴飾之持用布施願令阿僧祇世界妓女充滿悉能敷奏種種妙音持用布施願令阿僧祇世界男女充滿持用布施願令阿僧祇世界己身充滿發菩提心而用布施願令阿僧祇世界己頭充滿起不放逸心而用布施願令阿僧祇世界己眼充滿而用布施願令阿僧祇世界己身血肉及以骨髓充滿其中心無顧戀持用布施願令阿僧祇世界自在王位充滿其中持用布施願令阿僧祇世界奴僕作使充滿其中持用布施菩薩摩訶薩以如是等種種諸物盡未來劫安住廣大一切施心施一衆生如一衆生盡衆生界一切衆生皆如是施論第六佛子已下至皆如是施有十六行半經明菩薩以如是等阿僧祇象馬王妓女及自身等十種不可數物盡不可數劫而常施分經佛子菩薩摩訶薩於一世界盡未來劫修菩薩行以是等物施一衆生如是給施一切衆生皆令滿足如於一世界於盡虗空遍法界一切世界中悉亦如是大悲普覆終無間息普加哀愍隨其所須供給供養不令施行遇緣而息乃至不於一彈指頃生疲倦心論第七佛子已下至無有一彈指頃生疲倦心有六行經明菩薩以如上十種施滿足無限衆生盡無限劫無一念疲勞分經佛子菩薩摩訶薩如是施時生於此心所謂無著心無縛心解脫心大力心甚深心善攝心無執心無壽者心善調伏心不散亂心不妄計心具種種實性心不求果報心了達一切法心住大回向心善決諸義心令一切衆生住無上智心生大法光明心入一切智智心論第八佛子已下至入一切智智心有六行經明菩薩以如上布施以十種無著解脫心為施者分經佛子菩薩摩訶薩以所集善根於念念中如是回向所謂願一切衆生財寶豐足無所乏少願一切衆生成就無盡大功德藏願一切衆生具足一切安隱快樂願一切衆生增長菩薩摩訶薩業願一切衆生成滿無量第一勝法願一切衆生得不退轉一切智乘願一切衆生普見十方一切諸佛願一切衆生永離世間諸惑塵垢願一切衆生皆得清淨平等之心願一切衆生離諸難處得一切智論第九佛子已下至得一切智有九行經明菩薩以如上十種無限施起十種無限願願一切衆生得一切智分音切舞文甫切妓渠義切戀力轉切拏女加切悔呼外切中陟仲切榭徐夜切索所百切衍以淺切族昨木切虐魚約切馭魚據切蠲古玄切騎奇記切蓐如欲切譽羊洳切頃去頴切閇博計切怛當割切謬美幼切
