body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之四經爾時文殊師利菩薩勸諸比丘發阿耨多羅三藐三菩提心已漸次南行經歷人間至福城東住莊嚴幢娑羅林中往昔諸佛曾所止住教化衆生大塔廟處亦是世尊於往昔時修菩薩行能捨無量難捨之處是故此林名稱普聞無量佛剎此處常為天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人之所供養時文殊師利與其眷屬到此處已即於其處說普照法界修多羅百萬億那由他修多羅以為眷屬說此經時於大海中有無量百千億諸龍而來其所聞此法已深厭龍趣正求佛道咸捨龍身生天人中一萬諸龍於阿耨多羅三藐三菩提得不退轉復有無量無數衆生於三乘中各得調伏時福城人聞文殊師利童子在莊嚴幢娑羅林中大塔廟處論第二漸次南行經歷人間至福城東是文殊入俗人間說普照法界修多羅門即在福城東娑羅林大塔廟處也又此一段從爾時文殊師利菩薩勸諸比丘已下至娑羅林大塔廟處有十五行半經復分為兩段一爾時文殊師利菩薩已下至人與非人之所供養有七行半經明文殊師利行往人間至所堪授化緣之分二時文殊師利與其眷屬已下至大塔廟處有八行經明文殊師利說普照法界修多羅門聞法獲益分爾時文殊師利菩薩勸諸比丘發菩提心已都結前法漸次南行經歷人間者明菩薩接引向明以離為明經人間者明菩薩大悲為不請之友就根引化故福城者約人多修福以立城名亦約聖者所止皆為福德莊嚴幢者有二義一過去諸佛曾於此處難捨能捨破所著故名之為幢二此處古佛塔廟并有林木森聳高妙之所莊嚴大塔廟者名稱十方佛國遠聞名之為大亦約說法界門無裏外中間見亡名之為大於中安置尊者之形像不可毀壞名之為塔廟亦名為幢有梵僧云其此塔廟南邊打鼓北邊不聞故世間名為大也娑羅云高聳也天龍夜叉已下明天龍八部及人常所供養故文殊師利與其眷屬者所同來菩薩神天六千之衆說普照法界修多羅者是根本智明徹遍周隨根遍故百萬億那由他者當此溝也大意不可說修多羅以為眷屬此明差別智遍周應根授益修多羅此云長行經說此經時大海中已下明無量龍聞法悉捨龍身生天人中一萬諸龍發無上菩提得不退轉及無數衆生三乘中各得調伏明各自依根隨差別智得自根性法門已上明普照法界修多羅隨根濟益門如經自具經無量大衆從其城出來詣其所時有優婆塞名曰大智與五百優婆塞眷屬俱所謂須達多優婆塞婆須達多優婆塞福德光優婆塞有名稱優婆塞施名稱優婆塞月德優婆塞善慧優婆塞大慧優婆塞賢護優婆塞賢勝優婆塞如是等五百優婆塞俱來詣文殊師利童子所頂禮其足右繞三匝退坐一面復有五百優婆夷所謂大慧優婆夷善光優婆夷妙身優婆夷可樂身優婆夷賢優婆夷賢德優婆夷賢光優婆夷幢光優婆夷德光優婆夷善目優婆夷如是等五百優婆夷來詣文殊師利童子所頂禮其足右繞三匝退坐一面復有五百童子所謂善財童子善行童子善戒童子善威儀童子善勇猛童子善思童子善慧童子善覺童子善眼童子善臂童子善光童子如是等五百童子來詣文殊師利童子所頂禮其足右繞三匝退坐一面復有五百童女所謂善賢童女大智居士女童女賢稱童女美顏童女堅慧童女賢德童女有德童女梵授童女德光童女善光童女如是等五百童女來詣文殊師利童子所頂禮其足右繞三匝退坐一面爾時文殊師利童子知福城人悉已來集隨其心樂現自在身威光赫奕蔽諸大衆以自在大慈令彼清涼以自在大悲起說法心以自在智慧知其心樂以廣大辨才將為說法復於是時觀察善財以何因緣而有其名知此童子初入胎時於其宅內自然而出七寶樓閣其樓閣下有七伏藏於其藏上地自開裂生七寶牙所謂金銀琉璃頗梨真珠硨磲瑪瑙善財童子處胎十月然後誕生形體支分端正具足其七大藏縱廣高下各滿七肘從地踊出光明照耀復於宅中自然而有五百寶器種種諸物自然盈滿所謂金剛器中盛一切香於香器中盛種種衣美玉器中盛滿種種上味飲食摩尼器中盛滿種種殊異珍寶金器盛銀銀器盛金金銀器中盛滿琉璃及摩尼寶頗梨器中盛滿硨磲硨磲器中盛滿頗梨瑪瑙器中盛滿真珠真珠器中盛滿瑪瑙火摩尼器中盛滿水摩尼水摩尼器中盛滿火摩尼如是等五百寶器自然出現又雨衆寶及諸財物一切庫藏悉令充滿以此事故父母親屬及善相師共呼此兒名曰善財又知此童子已曾供養過去諸佛深種善根信解廣大常樂親近諸善知識身語意業皆無過失淨菩薩道求一切智成佛法器其心清淨猶如虗空回向菩提無所障礙爾時文殊師利菩薩如是觀察善財童子已安慰開喻而為演說一切佛法所謂說一切佛積集法說一切佛相續法說一切佛次第法說一切佛衆會清淨法說一切佛法輪化導法說一切佛色身相好法說一切佛法身成就法說一切佛言辭辨才法說一切佛光明照耀法說一切佛平等無二法爾時文殊師利童子為善財童子及諸大衆說此法已殷勤勸喻增長勢力令其歡喜發阿耨多羅三藐三菩提心又令憶念過去善根作是事已即於其處復為衆生隨宜說法然後而去爾時善財童子從文殊師利所聞佛如是種種功德一心勤求阿耨多羅三藐三菩提隨文殊師利而說頌曰三有為城郭憍慢為垣墻諸趣為門戶愛水為池塹愚癡暗所覆貪恚火熾然魔王作君主童蒙依止住貪愛為徽纆諂誑為轡勒疑惑蔽其眼趣入諸邪道慳嫉憍盈故入於三惡處或墮諸趣中生老病死苦妙智清淨日大悲圓滿輪能竭煩惱海願賜少觀察妙智清淨月大慈無垢輪一切悉施安願垂照察我一切法界王法寶為先導遊空無所礙願垂教敕我福智大商主勇猛求菩提普利諸羣生願垂守護我身被忍辱甲手提智慧劒自在降魔軍願垂拔濟我住法須彌頂定女常恭侍滅惑阿修羅帝釋願觀我三有凡愚宅惑業地趣因仁者悉調伏如燈示我道捨離諸惡趣清淨諸善道超諸世間者示我解脫門世間顛倒執常樂我淨想智眼悉能離開我解脫門善知邪正道分別心無怯一切決了人示我菩提路住佛正見地長佛功德樹雨佛妙法華示我菩提道去來現在佛處處悉周遍如日出世間為我說其道善知一切業深達諸乘行智慧決定人示我摩訶衍願輪大悲轂信軸堅忍轄功德寶莊校令我載此乘總持廣大箱慈愍莊嚴蓋辨才鈴震響使我載此乘梵行為茵褥三昧為婇女法鼓震妙音願與我此乘四攝無盡藏功德莊嚴寶慚愧為羈鞅願與我此乘常轉布施輪恆塗淨戒香忍辱牢莊嚴令我載此乘禪定三昧箱智慧方便軛調伏不退轉令我載此乘大願清淨輪總持堅固力智慧所成就令我載此乘普行為周校悲心作徐轉所向皆無怯令我載此乘堅固如金剛善巧如幻化一切無障礙令我載此乘廣大極清淨普與衆生樂虗空法界等令我載此乘淨諸業惑輪斷諸流轉苦摧魔及外道令我載此乘智慧滿十方莊嚴遍法界普洽衆生願令我載此乘清淨如虗空愛見悉除滅利益一切衆令我載此乘願力速疾行定心安隱住普運諸含識令我載此乘如地不傾動如水普饒益如是運衆生令我載此乘四攝圓滿輪總持清淨光如是智慧日願示我令見已入法王位已著智王冠已繫妙法繒願能慈顧我爾時文殊師利菩薩如象王回觀善財童子作如是言善哉善哉善男子汝已發阿耨多羅三藐三菩提心復欲親近諸善知識問菩薩行修菩薩道善男子親近供養諸善知識是具一切智最初因緣是故於此勿生疲厭善財白言唯願聖者廣為我說菩薩應云何學菩薩行應云何修菩薩行應云何趣菩薩行應云何行菩薩行應云何淨菩薩行應云何入菩薩行應云何成就菩薩行應云何隨順菩薩行應云何憶念菩薩行應云何增廣菩薩行應云何令普賢行速得圓滿爾時文殊師利菩薩為善財童子而說頌言善哉功德藏能來至我所發起大悲心勤求無上覺已發廣大願除滅衆生苦普為諸世間修行菩薩行若有諸菩薩不厭生死苦則具普賢道一切無能壞福光福威力福處福淨海汝為諸衆生願修普願行汝見無邊際十方一切佛皆悉聽聞法受持不忘失汝於十方界普見無量佛成就諸願海具足菩薩行善入方便海安住佛菩提能隨導師學當成一切智汝遍一切剎微塵等諸劫修行普賢行成就菩提道汝於無量剎無邊諸劫海修行普賢行成滿諸大願此無量衆生聞汝願歡喜皆發菩提意願學普賢乘爾時文殊師利菩薩說此頌已告善財童子言善哉善哉善男子汝已發阿耨多羅三藐三菩提心求菩薩行善男子若有衆生能發阿耨多羅三藐三菩提心是事為難能發心已求菩薩行倍更為難善男子若欲成就一切智智應決定求真善知識善男子求善知識勿生疲懈見善知識勿生厭足於善知識所有教誨皆應隨順於善知識善巧方便勿見過失善男子於此南方有一國土名為勝樂其國有山名曰妙峯於彼山中有一比丘名曰德雲汝可往問菩薩云何學菩薩行菩薩云何修菩薩行乃至菩薩云何於普賢行疾得圓滿德雲比丘當為汝說論第三辨根與法成行門從無量大衆從其城出直至經末總是文殊師利觀察善財及其人數并往南方妙峯山上以次南行詢求五十三人為善知識用五位因果進修行門欲令後人倣之成行故云辨根與法成行門於此一段之中復分為兩段第一從無量大衆從其城出已下至爾時文殊師利菩薩如象王回有九十四行半經明福城四衆咸集文殊師利隨所樂求為其說法令得清涼及別觀善財推其因果勸令親近善知識分第二爾時文殊師利如象王回已下直至經末名知根與法令其成行發生後學門從初第一段中九十四行半經約分為六段一從無量大衆從其城出來詣其所已下至五百童女有二十一行半經是大衆來集分二爾時文殊師利童子已下至回向菩提無所障礙有二十五行經明文殊師利菩薩觀察善財名字所因及歎往昔善根今生果報分三爾時文殊師利菩薩如是觀察善財童子已已下至說一切佛無二法有六行半經明文殊師利知善財根堪而為說法分四爾時文殊師利童子已下至然後而去有四行半經明文殊師利為善財及大衆說法已而去分五爾時善財童子已下至而說頌言有兩行半經明善財聞法生信已勤求無上菩提向文殊師利說頌自歎三有苦輪及請法教授分六說頌中有三十四行頌明善財自嗟苦本以頌請法自利利他分其此一段三十四行頌中初四行頌自嗟生死苦因下有三十行頌是歎文殊師利菩薩德及請法門分隨文釋義者如第一段中四衆來集經云無量大衆從其城出及其列數但言五百者此明約能發菩提心以五位十波羅蜜成其數不從人為數以五位修行中十波羅蜜互體有百為一中有十故且如檀波羅蜜為主餘九為伴戒波羅蜜為主餘九為伴忍波羅蜜為主餘九為伴餘皆倣此如是百波羅蜜於十住十行十回向十地十一地升進見道治惑習氣深淺上隨行名殊安立五百若約普賢行總該法界無盡剎海即有不可說不可說佛剎微塵數諸波羅蜜今且但約五位中一位有百波羅蜜五位五百前言一萬龍皆發菩提心者即明萬行圓滿須達多者此云善給施無依怙者亦名給孤獨婆須達多者此云財施亦曰有善施行如是四衆并一萬龍發菩提心衆數有五衆如龍衆及五百優婆塞五百優婆夷竝是居世俗流信心純厚童子童女皆是二十已下年未弱冠無染世欲清信男女名曰童子童女年幼創啓初心歸法流而受教名曰童子童女童者創蒙也立下里為童為年居未長立志德於閭里之間號童子年居長者能有清淨信心但云清信士女已上列衆但隨名下義是所修之德或以形貌立名如大智居士女以父之號智德立名餘准知之經云威光赫奕者明文殊師利身色盛明映於大衆如文殊師利觀察善財名字因緣以初入胎時於其宅內自然出七寶樓閣者此從因感果不可無因而有報生明先世信心能信自心具足白淨無垢法身及無依住普光明智以為信種名之為胎如信位中普光明殿說金色世界不動智者是以白淨無垢法身名為金色世界也普光明智號為不動智佛為本無性可動故即今號無明者是為往世信此自心無明及一切衆生無明總是一切諸佛法身清淨智種以此信心名之為胎以此信胎生於世間報得十寶樓閣此信心胎以智慧觀照力之所成就云七寶及七伏藏竝約七種助道分之所報生已下七數例然處胎十月者於信心中行十波羅蜜也世法滿也誕生者出世智生也形體支分端正者以八正道法之所成就故宅中自然而有五百寶器種種諸物自然盈滿諸寶器中間映相嚴者明於先世信種之中信佛因果五位行門十波羅蜜五百行門七覺八正同異萬行始終因果總在信中之所報得是今生以此信還能發心不離一生一百一十城之法門一時頓印無虧信處成一百一十之法門不出娑羅之林而身遍遊諸國只為塵含法界性自如然智該三世古今一念此乃約法界實然不依凡情虗妄餘義向下對文方明此以約因辨名約報辨因竟經云又此童子已曾供養過去諸佛深種善根信解廣大者明往世信種今生信滿爾時文殊師利菩薩所謂一切佛積集法者明積集十波羅蜜四攝四無量三十七品助道之分五位加行一百一十城之法門一百一十城之法門者以五位中有五十箇所修之因果即如前十住中十箇慧菩薩是即十箇佛果同號為月者是如是十行中十林菩薩十眼佛等十回向中十幢菩薩十妙佛等如是十地十一地皆依此十回向中菩薩佛因果如是五位五十重因果上各具進修因果分為一百不離根本三世諸佛恆常法界體中十波羅蜜為一百一十以初從十住之中以方便三昧顯發法身根本智慧乘法界乘行普賢行以治習氣安立次第治惑習氣差別之門以此一百箇因果以為治惑習之升降次第十箇波羅蜜下理智悲願之因果即是法界體中普賢常爾之行與一切發菩提心者以為履踐之跡是故名乘如來乘直至道場以初發心即乘法界中文殊普賢體用理智大悲願行門故即道場本之體用也已下善財童子善知識五十三人是前五位中行相故明前五位但說其法恐迷其行今此文殊師利菩薩欲令善財起求法之樣重明前菩薩五位中行相法則令其後學者倣之故安立此五十三人成一百一十重之因果門故明於法界體中安立文殊為法身佛根本智普賢為差別智彌勒佛是此文殊普賢理中無作之果以此三法成一法界體用自在無礙之門遍與五位中五十箇菩薩以為因果還如前以法界體中十波羅蜜為所乘之行隨其勝進中五位上五十重波羅蜜皆有因果如是五十善知識中一中有二五十中有百通法界中本常行十波羅蜜為一百一十文殊普賢彌勒佛果此三法但為一法界無功果中大用自在門但與一切勝進菩薩作因果以明勝進之功然自無因果故猶如帝王自無階品但以威德自在而與一切官屬隨有功者而作階品故問曰何故在此取彌勒佛為佛果何不取毗盧遮那如來以為佛果答曰明毗盧遮那是已成之果彌勒是當來之佛果明如今毗盧遮那佛所初發菩提心一念成當來彌勒佛果契會相應故同於彌勒樓閣之內會三世時劫日月總一時故明以根本智印印三世古今無前後故經云積集法說一切佛相續法乃至一切佛次第法總如上釋訖一切佛衆會清淨法明一切佛衆會皆同一清淨故身土衆會不相障礙重重重重以相映徹故自以如文自具如此三十四行頌初四行頌自歎生死由三有為首輪回諸苦生老不休已下三十行頌明善財歎文殊德并及請法三有為城郭者明善財自歎居三有中自固其不出如處城郭三有者欲界有色界有無色界有此三有身一切衆生不能出離憍慢者非禮為憍輕他曰慢又有七慢慢慢過慢不如慢增上慢我慢邪慢諸趣者所謂見趣戒趣又有三趣邪定趣不定趣正定趣又有四惡趣又人天五戒十善趣又二乘厭苦出世間趣大乘菩薩淨土趣一乘菩薩智悲圓會未自在趣如是等諸趣隨善惡言之皆是門戶所入之業愛水為池塹以愛能津潤生死故如池塹愚癡者能迷真諦號曰愚癡凡夫有八萬四千十地菩薩有二十二種隨位不了愚癡若隨五位上一百一十種愚癡若了成一百一十種解脫貪恚火熾然者三界煩惱以貪為十使之首恚為瞋之眷屬無明為總覆慢為輕自輕輕他疑與五見俱能障聖道共成生死之因果疑亡見謝智乃現前十使之中疑與五見俱能障聖道貪瞋癡慢而能障修道行者若於行中不以道治之還於生死中隨業流轉不得自在今以經之略言其貪恚二門餘八總例居其義以此貪恚二障一切善根不生故如火熾然魔王作君主者所謂四魔陰魔煩惱魔天魔生死魔童蒙依止住者所謂覆障令心不明名為童蒙貪愛為徽纆者前因貪起恚此因貪起愛以自纏縛徽纆者執縛罪人之繩諂誑為轡勒者明樂著虗誑被制御故疑惑覆其眼者以於正道生疑趣入諸邪道者以於無性現智生疑即邪道生也慳嫉憍盈故者慳有五種住處家舍財物不樂稱讚他善於法吝惜不樂與人是為五嫉者憎餘勝己憍者自縱為憍不拘禮故奢者不儉也如愛恚慢嫉慳但為下界五結色愛無色愛掉舉慢無明通上界下界五結以如是十使五結四魔入於三惡道生老病死苦得出世者不為已上善財歎三界生死苦因緣竟已下三十行頌歎德請法如文自明如是三界煩惱初地二地治下界惑三地治上二界惑四地出三界五地習世技六地世出世慧具足七地入生死等三界六道行大慈悲八地無功用智悲圓九地十地佛用方滿十一地普賢行周十二地功齊法界理智恆然十住法則一分與此十地行門法用相似但勝進不同十行但論無染行門十回向中會融悲願如下五十三善知識具彰至位具明第二文殊師利知根與法令其成行發生後學門中約立五門一明信心已發二明聖者攝受三明聖者勸親近善友四明善財請問云何學菩薩道五明文殊指授修行所歸一明信心已發者如經云善男子汝已發阿耨多羅三藐三菩提者此是信心菩提入位菩薩以三昧行方能顯得理行相顯業盡純明二明聖者攝受者經云爾時文殊師利菩薩如象王回者是攝受義如大聖無方智圓形遍隨根對現不背衆生一切衆生如應見者皆悉對面時諸衆生各不相知但謂聖者獨與我語今言文殊師利見善財所謂如象王回者是知根採顧攝受與法故三明聖者勸親近善友者經云善男子親近供養諸善知識是具足一切智最初因緣是故於此勿生疲厭此一切智是菩提心無所得因此而現名根本智以無所得為體而照現萬法為用四明善財請法者經云云何學菩薩道有十一問請菩薩道問曰何故但云求菩薩道不云學菩提心答曰為菩提無所得無所修無所學無所行是故但求菩薩道學菩薩行然菩提心自恆明現如下妙峯山上得憶念諸佛智慧光明門者託事表法以艮為山艮為止以約止心無念妄想不生正慧現前名為憶念以正慧與一切諸佛無相妙理合故以此無相正慧現前普照心境身邊等五見總亡萬境虗寂見亡業謝名曰光明故言憶念諸佛智慧光明門此明三昧禪定是方便行能顯理智體用二門圓周自在乃至不可說三昧總是現正智之方便是行故如十波羅蜜中唯智波羅蜜是無功用自在之果餘九波羅蜜是助顯之行從初發心住十十互參如鍊真金轉轉明淨而令成就種種莊嚴業亡智滿行周入因陀羅網法門方可稱法界功堪任運從初發心住皆以菩提心無作用無所修無所行為體而求修學普賢一切無盡行門以此但求菩薩道學菩薩行無作菩提隨行自明以行行之中常有禪波羅蜜助顯體用理智轉令明白自在故大意初發心住以無念無作三昧加行方便助顯菩提以菩提無體無性與一切諸行作無住之緣以此求菩薩諸行以諸行即菩提無體性故若於行外別修菩提即聲聞緣覺及空觀菩薩菩提非一乘文殊普賢理智萬行悲願自在菩提以是如來對權教菩薩說諸行無常是生滅法以權教菩薩修㭊法明空觀破三界有如來對此說諸行無常未明三界諸有即菩提用故以此一乘實教菩薩但求菩薩道行菩薩行即菩提用明理智體用總該不別求也若也別求菩提即體用各別二見恆存不名乘不思議乘故是故但求菩薩道無別菩提也以明菩提無求無發心無所行無處所無問無答無得無證行一切行具普賢道無行無修是菩提大用圓滿故但求菩薩道學菩薩行故始可得名初發心時便成正覺五明文殊師利指授修行所歸者經云善男子於此南方有一國土名為勝樂其國有山名曰妙峯於彼山中有一比丘名曰德雲者是也又於此知根與法令其成行發生後學門中直至經末長科為八段一從爾時文殊師利如象王回已下至爾時文殊師利菩薩說此頌已并頌有二十二行經明文殊師利勸發善財童子親近善知識明趣入十住以定會理契真門即妙峯山上德雲比丘所得憶念諸佛智慧光明門是以次向下至王女慈行童女有十箇善知識總是十住位中善知識也從此妙峯山已下約立七門一從信趣入十住以定會理契真門十住品是二依真發起諸行門即善見比丘并已下共有十善知識是十行品是三理智大悲願行會融門即從鬻香長者青蓮華等已下十善知識是十回向品是四蘊修悲智成德門即夜神婆珊婆演底并已下共有十善知識是十地品是五悲終起智成佛門即佛母摩耶夫人并下共有十善知識是十定品已下共有十品是六修行已滿佛果門即慈氏如來是如來出現品經是七法界自在無功大用如因陀羅網互參圓融門無功法界大用是法界品是明總法界該括所收如是五十三善知識起此行門方便令後發菩提心者識其五位進修行門令易解故前雖說法在行恐迷是故令善財重起行門表示令學者不錯謬故第一從信趣入十住以定會理契真門中從爾時文殊師利菩薩如象王回已下至願學普賢乘并頌有二十二行經於此段中分為四段一爾時文殊師利菩薩如象王回已下至是故於此勿生疲厭有五行經明文殊師利稱歎善財發菩提心勸近善知識勿生疲厭分二善財白言已下至云何令普賢行速得圓滿有五行半經明善財請問十一問菩薩所行分三爾時文殊師利菩薩已下可有一行經明文殊師利說頌讚歎善財分四正申其頌頌云若有諸菩薩不厭生死苦則具普賢道一切無能壞者明以生死苦為菩提即無所壞若離生死苦修菩薩行發菩提心即有所壞何以故即有生死涅槃染淨二障所壞即有是非二見斷常所壞又云若入方便海安住佛菩提能隨導師學當成一切智者明以大願大悲萬行海為方便方可安住佛菩提若於一切法一切行一法不明一行不行即菩提心不得圓滿以菩提心無障礙無體性一法一行上有取有捨即有障礙取捨但以法界普光明智海印之無法不徹以此但求菩薩行滿即菩提心圓滿以菩薩行與菩提心無一異俱不俱無合散故二不可得故如是而行菩薩行故生死涅槃二不可得故謂於生死安住涅槃如是修行一切菩薩行長大慈大悲大願滿普賢道故自餘如文自明又第一從信趣入十住以定會理契真門中從爾時文殊師利菩薩說此頌已至德雲比丘當為汝說有十二行半經約分五段一從爾時已下有兩行半經明文殊師利歎善財能發無上菩提心分二善男子已下至倍更為難有兩行經明歎善財求善知識倍更為難分三善男子已下至應決定求真善知識有一行經明求一切智應決定求真善知識分四善男子已下至勿見過失有兩行半經明文殊師利教誡善財見善知識無厭足勿見過失分如文自具五善男子已下至德雲比丘為汝演說有四行半經約有五法一示善知識所居方面二示善知識所居國土三示善知識所居處所四舉善知識約德立名五舉善知識道德堪能演說何法一示善知識所居之方面者何故令往南方以明託方隅而表法以南為正為離為明以離中虗以中虗故離為明為日為九天在身為頭為目為心心達虗無智日自明故取之像表其道也是故經云明鍊十方一切儀式主方神方者法也但取其法大象無方如日行於天明麗於地智行於空明麗於萬物無不知無不明取之一法十方混然二示善知識所居國土者南方有國名為勝樂者為明理智虗無能淨煩惱名為勝樂三示善知識住處其國有山名曰妙峯者無念淨禪名之為山心空智現名之為妙理淨智明慧能破惑名之為峯以艮為山為止為童蒙為小男為門闕以止為初明以三陽爻生之始為正月一下止則正字也以十一月一陽生十二月二陽生正月三陽生故取之為正月故三陽生故以三為正又三陽生處火生於寅以火為日日生於寅以日生於寅是明初生處故名為童蒙小男位故取之以像表之以法以文殊師利居東北方清涼山者取摩竭提國菩提場是東北方此山是南閻浮洲菩提場之東北是此閻浮提衆山之王以艮為山王故一萬菩薩於中止住是文殊師利主伴萬行圓滿之侶也故以文殊主法身根本智之妙慧為一切諸佛啓蒙之師即有一切處文殊師利亦乃一切衆生皆自有之皆從此法初入聖智也初生佛家與一切諸佛同一智慧解脫知見從茲之後學差別智起願行成大慈悲號曰普賢法界行也是故如來取像世間法則用表法令易解故即以勝樂國妙峯山取像明其三陽生處以艮為止以止則明初生故以明初生號曰童蒙亦以文殊師利以發蒙入聖之初故故號文殊為童子菩薩因化立名故以發起一切衆生入無相理妙智慧故此明以方便三昧現根本智初生一切諸佛智慧家故故立名也以取像表法令學者先以心無念慮寂靜不動如山王無相妙理智慧便現自心智慧得解脫清涼不即要身足登山也是故十住位於須彌頂上說十箇隨位升進佛果皆號之為月同此妙峯山德雲比丘已下十箇善知識創從凡夫位得法清涼樂也此明善財舉行用彰十住門言妙峯山者意明從定方能顯發自心根本智慧如諸佛見萬法無性萬法無相萬法無依萬法無有本末住處契此法已名為住佛所住方得見亡業謝生聖智流中學差別智成就法界無限普賢大用廣化無盡一切法界衆生皆使入於根本智之知見故亦可凡心初學先入山樂靜方學定心用現正智亦是方便亦可得名勝樂國妙峯山也以心離俗境樂修寂靜亦是勝樂義引凡方便種種利生但不住其中也四舉善知識約德立名名為德雲者以德雲能雨法灑潤衆生令得清涼之義比丘者此云滅諍以滅有無是非煩惱之諍故云滅諍以身邊等五見及有無二見能障道故先須以無念無思三昧止之正智方現故云滅諍故以妙峯山表其比丘三昧行智現定亡寂用自在方能說教以潤童蒙名為德雲故居艮為蒙位以止是潤生啓明之初以比丘德雲居山之頂取像表法明此位從信心凡夫創始以三昧加行啓蒙入聖位中十住之首至法頂故與無相妙智慧會處號為妙峯以妙智慧能說教處潤益含生號名德雲修學如是方便現其自心正智現前其妙峯山德雲比丘之義總在己躬乃至文殊普賢佛果總皆自有以方便三昧理智現前利衆生行行之即是一如經具明此明於法界品中安立如是五位行門明五位方便修行行門總以法界佛果為體以法界普光明根本智具普賢差別智為大用故始終本末不移此也以進修生熟處安立諸位起一百一十城之法門總共同一十波羅蜜行一三十七道品一四攝四無量心總別同異成壞六門在其中也以智照之可見一百一十城義如前福城東已釋訖五舉善知識道德所能者此善知識堪能說示菩薩行之加行具普賢行之五位門戶是故文殊令善財問德雲比丘云何學菩薩行云何修菩薩行乃至云何於普賢行疾得圓滿德雲比丘當為汝說此是入十住之初心名初發心住音切肘陟友切徽許歸切纏莫北切轡祕音軸直玉切轄胡瞎切箱思羊切茵因音褥辱音羈居宜切鞅於兩切軛於革切森所金切聳息勇切閭力居切灑沙下切契苦計切
