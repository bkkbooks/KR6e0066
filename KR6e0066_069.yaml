body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十定品第二十七之三經佛子云何為菩薩摩訶薩智光明藏三昧佛子彼菩薩摩訶薩住此三昧能知未來一切世界一切劫中所有諸佛若已説若未説若已授記若未授記種種名號各各不同所謂無數名無量名無邊名無等名不可數名不可稱名不可思名不可量名不可説名當出現於世當利益衆生當作法王當興佛事當説福利當讚善義當説白分義當淨治諸惡當安住功德當開示第一義諦當入灌頂位當成一切智彼諸如來修圓滿行發圓滿願入圓滿智有圓滿衆備圓滿莊嚴集圓滿功德悟圓滿法得圓滿果具圓滿相成圓滿覺彼諸如來名姓種族方便善巧神通變化成熟衆生入般涅槃如是一切皆悉了知此菩薩於一念中能入一劫百劫千劫百千劫百千億那由他劫入閻浮提微塵數劫入四天下微塵數劫入小千世界微塵數劫入中千世界微塵數劫入大千世界微塵數劫入百佛剎微塵數劫入百千佛剎微塵數劫入百千億那由他佛剎微塵數劫入無數佛剎微塵數劫入無量佛剎微塵數劫入無邊佛剎微塵數劫入無等佛剎微塵數劫入不可數佛剎微塵數劫入不可稱佛剎微塵數劫入不可思佛剎微塵數劫入不可量佛剎微塵數劫入不可説佛剎微塵數劫入不可説不可説佛剎微塵數劫如是未來一切世界所有劫數能以智慧皆悉了知以了知故其心復入十種持門何者為十所謂入佛持故得不可説佛剎微塵數諸佛護念入法持故得十種陀羅尼光明無盡辨才入行持故出生圓滿殊勝諸願入力持故無能映蔽無能摧伏入智持故所行佛法無有障礙入大悲持故轉於不退清淨法輪入差別善巧句持故轉一切文字輪淨一切法門地入師子受生法持故開法關鑰出欲淤泥入智力持故修菩薩行常不休息入善友力持故令無邊衆生普得清淨入無住力持故入不可説不可説廣大劫入法力持故以無礙方便智知一切法自性清淨佛子菩薩摩訶薩住此三昧已善巧住不可説不可説劫善巧住不可説不可説剎善巧知不可説不可説種種衆生善巧知不可説不可説衆生異相善巧知不可説不可説同異業報善巧知不可説不可説精進諸根習氣相續差別諸行善巧知不可説不可説無量染淨種種思惟善巧知不可説不可説法種種義無量文字演説言詞善巧知不可説不可説種種佛出現種族時節現相説法施為佛事入般涅槃善巧知不可説不可説無邊智慧門善巧知不可説不可説一切神通無量變現佛子譬如日出世間所有村營城邑宮殿屋宅山澤鳥獸樹林華果如是一切種種諸物有目之人悉得明見佛子日光平等無有分別而能令目見種種相此大三昧亦復如是體性平等無有分別能令菩薩知不可説不可説百千億那由他差別之相佛子此菩薩摩訶薩如是了知時令諸衆生得十種不空何等為十一者見不空令諸衆生生善根故二者聞不空令諸衆生得成熟故三者同住不空令諸衆生心調伏故四者發起不空令諸衆生如言而作通達一切諸法義故五者行不空令無邊世界皆清淨故六者親近不空於不可説不可説佛剎諸如來所斷不可説不可説衆生疑故七者願不空隨所念衆生令作勝供養成就諸願故八者善巧法不空皆令得住無礙解脫清淨智故九者雨法雨不空於不可説不可説諸根衆生中方便開示一切智行令住佛道故十者出現不空現無邊相令一切衆生皆蒙照故佛子菩薩摩訶薩住此三昧得十種不空時諸天王衆皆來頂禮諸龍王衆興大香雲諸夜叉王頂禮其足阿修羅王恭敬供養迦樓羅王前後圍繞諸梵天王悉來勸請緊那羅王摩睺羅伽王咸共稱讚乾闥婆王常來親近諸人王衆承事供養佛子是為菩薩摩訶薩第六智光明藏大三昧善巧智論第六智光明藏三昧者明此菩薩能知未來一切諸劫中所有諸佛若已説法若未説法皆悉能知故智光明藏者不離一念含三世劫智名之為藏餘義如文自具於中八部王等名依初會已釋名此不表法但以供養恭敬法故親近如來經佛子云何為菩薩摩訶薩了知一切世界佛莊嚴三昧佛子此三昧何故名了知一切世界佛莊嚴佛子菩薩摩訶薩住此三昧能次第入東方世界能次第入南方世界西方北方四維上下所有世界悉亦如是能次第入皆見諸佛出興於世亦見彼佛一切神力亦見諸佛所有遊戲亦見諸佛廣大威德亦見諸佛最勝自在亦見諸佛大師子吼亦見諸佛所修諸行亦見諸佛種種莊嚴亦見諸佛神足變化亦見諸佛衆會雲集衆會清淨衆會廣大衆會一相衆會多相衆會處所衆會居止衆會成熟衆會調伏衆會威德如是一切悉皆明見亦見衆會其量大小等閻浮提亦見衆會等四天下亦見衆會等小千界亦見衆會等中千界亦見衆會量等三千大千世界亦見衆會充滿百千億那由他佛剎亦見衆會充滿阿僧祇佛剎亦見衆會充滿百佛剎微塵數佛剎亦見衆會充滿千佛剎微塵數佛剎亦見衆會充滿百千億那由他佛剎微塵數佛剎亦見衆會充滿無數佛剎微塵數佛剎亦見衆會充滿無量佛剎微塵數佛剎亦見衆會充滿無邊佛剎微塵數佛剎亦見衆會充滿無等佛剎微塵數佛剎亦見衆會充滿不可數佛剎微塵數佛剎亦見衆會充滿不可稱佛剎微塵數佛剎亦見衆會充滿不可思佛剎微塵數佛剎亦見衆會充滿不可量佛剎微塵數佛剎亦見衆會充滿不可説佛剎微塵數佛剎亦見衆會充滿不可説不可説佛剎微塵數佛剎亦見諸佛於彼衆會道場中示現種種相種種時種種國土種種變化種種神通種種莊嚴種種自在種種形量種種事業菩薩摩訶薩亦見自身往彼衆會亦自見身在彼説法亦自見身受持佛語亦自見身善知緣起亦自見身住在虗空亦自見身住於法身亦自見身不生染著亦自見身不住分別亦自見身無有疲倦亦自見身普入諸智亦自見身普知諸義亦自見身普入諸地亦自見身普入諸趣亦自見身普知方便亦自見身普住佛前亦自見身普入諸力亦自見身普入真如亦自見身普入無諍亦自見身普入諸法如是見時不分別國土不分別衆生不分別佛不分別法不執著身不執著身業不執著心不執著意譬如諸法不分別自性不分別音聲而自性不捨名字不滅菩薩摩訶薩亦復如是不捨於行隨世所作而於此二無所執著佛子菩薩摩訶薩見佛無量光色無量形相圓滿成就平等清淨一一現前分明證了或見佛身種種光明或見佛身圓光一尋或見佛身如盛日色或見佛身微妙光色或見佛身作清淨色或見佛身作黃金色或見佛身作金剛色或見佛身作紺青色或見佛身作無邊色或見佛身作大青摩尼寶色或見佛身其量七肘或見佛身其量八肘或見佛身其量九肘或見佛身其量十肘或見佛身二十肘量或見佛身三十肘量如是乃至一百肘量一千肘量或見佛身一俱盧舍量或見佛身半由旬量或見佛身一由旬量或見佛身十由旬量或見佛身百由旬量或見佛身千由旬量或見佛身百千由旬量或見佛身閻浮提量或見佛身四天下量或見佛身小千界量或見佛身中千界量或見佛身大千界量或見佛身百大千世界量或見佛身千大千世界量或見佛身百千大千世界量或見佛身百千億那由他大千世界量或見佛身無數大千世界量或見佛身無量大千世界量或見佛身無邊大千世界量或見佛身無等大千世界量或見佛身不可數大千世界量或見佛身不可稱大千世界量或見佛身不可思大千世界量或見佛身不可量大千世界量或見佛身不可説大千世界量或見佛身不可説不可説大千世界量佛子菩薩如是見諸如來無量色相無量形狀無量示現無量光明無量光明網其光分量等于法界於法界中無所不照普令發起無上智慧又見佛身無有染著無有障礙上妙清淨佛子菩薩如是見於佛身而如來身不增不減譬如虗空於蟲所食芥子孔中亦不減小於無數世界中亦不增廣其諸佛身亦復如是見大之時亦無所增見小之時亦無所減佛子譬如月輪閻浮提人見其形小而亦不減月中住者見其形大而亦不增菩薩摩訶薩亦復如是住此三昧隨其心樂見諸佛身種種化相言辭演法受持不忘而如來身不增不減佛子譬如衆生命終之後將受生時不離於心所見清淨菩薩摩訶薩亦復如是不離於此甚深三昧所見清淨佛子菩薩摩訶薩住此三昧成就十種速疾法何者為十所謂速增諸行圓滿大願速以法光照耀世間速以方便轉於法輪度脫衆生速隨衆生業示現諸佛清淨國土速以平等智趣入十力速與一切如來同住速以大慈力摧破魔軍速斷衆生疑令生歡喜速隨勝解示現神變速以種種妙法言辭淨諸世間佛子此菩薩摩訶薩復得十種法印印一切法何等為十一者同去來今一切諸佛平等善根二者同諸如來得無邊際智慧法身三者同諸如來住不二法四者同諸如來觀察三世無量境界皆悉平等五者同諸如來得了達法界無礙境界六者同諸如來成就十力所行無礙七者同諸如來永絶二行住無諍法八者同諸如來教化衆生恆不止息九者同諸如來於智善巧義善巧中能善觀察十者同諸如來與一切佛平等無二佛子若菩薩摩訶薩成就此了知一切世界佛莊嚴大三昧善巧方便門是無師者不由他教自入一切佛法故是丈夫者能開悟一切衆生故是清淨者知心性本淨故是第一者能度脫一切世間故是安慰者能開曉一切衆生故是安住者未住佛種性者令得住故是真實知者入一切智門故是無異想者所言無二故是住法藏者誓願了知一切佛法故是能雨法雨者隨衆生心樂悉令充足故佛子譬如帝釋於頂髻中置摩尼寶以寶力故威光轉盛其釋天王初獲此寶則得十法出過一切三十三天何等為十一者色相二者形體三者示現四者眷屬五者資具六者音聲七者神通八者自在九者慧解十者智用如是十種悉過一切三十三天菩薩摩訶薩亦復如是初始獲得此三昧時則得十種廣大智藏何等為十一者照耀一切佛剎智二者知一切衆生受生智三者普作三世變化智四者普入一切佛身智五者通達一切佛法智六者普攝一切淨法智七者普令一切衆生入法身智八者現見一切法普眼清淨智九者一切自在到於彼岸智十者安住一切廣大法普盡無餘智佛子菩薩摩訶薩住此三昧復得十種最清淨威德身何等為十一者為照耀不可説不可説世界故放不可説不可説光明輪二者為令世界咸清淨故放不可説不可説無量色相光明輪三者為調伏衆生故放不可説不可説光明輪四者為親近一切諸佛故化作不可説不可説身五者為承事供養一切諸佛故雨不可説不可説種種殊妙香華雲六者為承事供養一切佛及調伏一切衆生故於一一毛孔中化作不可説不可説種種音樂七者為成熟衆生故現不可説不可説種種無量自在神變八者為於十方種種名號一切佛所請問法故一步超過不可説不可説世界九者為令一切衆生見聞之者皆不空故現不可説不可説種種無量清淨色相身無能見頂十者為與衆生開示無量祕密法故發不可説不可説音聲語言佛子菩薩摩訶薩得此十種最清淨威德身已能令衆生得十種圓滿何等為十一者能令衆生得見於佛二者能令衆生深信於佛三者能令衆生聽聞於法四者能令衆生知有佛世界五者能令衆生見佛神變六者能令衆生念所集業七者能令衆生定心圓滿八者能令衆生入佛清淨九者能令衆生發菩提心十者能令衆生圓滿佛智佛子菩薩摩訶薩令衆生