body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之十五論第五險難國婆須蜜女主無盡功德藏回向經爾時善財童子大智光明照啓其心思惟觀察見諸法性得了知一切言音陀羅尼門得受持一切法輪陀羅尼門得與一切衆生作所歸依大悲力得觀察一切法義理光明門得充滿法界清淨願得普照十方一切法智光明得遍莊嚴一切世界自在力得普發起一切菩薩業行圓滿願漸次遊行至險難國寶莊嚴城處處尋覓婆須蜜多女城中有人不知此女功德智慧作如是念今此童子諸根寂靜智慧明了不迷不亂諦視一尋無有疲懈無所取著目視不瞬心無所動甚深寬廣猶如大海不應於此婆須蜜女有貪愛心有顛倒心生於淨想生於欲想不應為此女色所攝此童子者不行魔行不入魔境不沒欲泥不被魔縛不應作處已能不作有何等意而求此女其中有人先知此女有智慧者告善財言善哉善哉善男子汝今乃能推求尋覓婆須蜜女汝已獲得廣大善利善男子汝應決定求佛果位決定欲為一切衆生作所依怙決定欲拔一切衆生貪愛毒箭決定欲破一切衆生於女色中所有淨想善男子婆須蜜女於此城內市之北自宅中住時善財童子聞是語已歡喜踊躍往詣其門見其住宅廣博嚴麗寶牆寶樹及以寶塹一一皆有十重圍繞其寶塹中香水盈滿金沙布地諸天寶華優鉢羅華波頭摩華拘物頭華芬陀利華遍覆水上宮殿樓閣處處分布門闥窗牖相望間列咸施網鐸悉置幡幢無量珍奇以為嚴飾琉璃為地衆寶間錯燒諸沉水塗以栴檀懸衆寶鈴風動成音散諸天華遍布其地種種嚴麗不可稱說諸珍寶藏其數百千十大園林以為莊嚴爾時善財見此女人顏貌端嚴色相圓滿皮膚金色目髮紺青不長不短不粗不細欲界人天無能與比音聲美妙超諸梵世一切衆生差別言音悉皆具足無不解了深達字義善巧談說得如幻智入方便門衆寶纓絡及諸嚴具莊嚴其身如意摩尼以為寶冠而冠其首復有無量眷屬圍繞皆共善根同一行願福德大藏具足無盡時婆須蜜多女從其身出廣大光明普照宅中一切宮殿遇斯光者身得清涼爾時善財前詣其所頂禮其足合掌而住白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能教誨願為我說彼即告言善男子我得菩薩解脫名離貪欲際隨其欲樂而為現身若天見我我為天女形貌光明殊勝無比如是乃至人非人等而見我者我即為現人非人女隨其樂欲皆令得見若有衆生欲意所纏來詣我所我為說法彼聞法已則離貪欲得菩薩無著境界三昧若有衆生暫見於我則離貪欲得菩薩歡喜三昧若有衆生暫與我語則離貪欲得菩薩無礙音聲三昧若有衆生暫執我手則離貪欲得菩薩遍往一切佛剎三昧若有衆生暫升我座則離貪欲得菩薩解脫光明三昧若有衆生暫觀於我則離貪欲得菩薩寂靜莊嚴三昧若有衆生見我頻伸則離貪欲得菩薩摧伏外道三昧若有衆生見我目瞬則離貪欲得菩薩佛境界光明三昧若有衆生抱持於我則離貪欲得菩薩攝一切衆生恆不捨離三昧若有衆生唼我脣吻則離貪欲得菩薩增長一切衆生福德藏三昧凡有衆生親近於我一切皆得住離貪際入菩薩一切智地現前無礙解脫善財白言聖者種何善根修何福業而得成就如是自在答言善男子我念過去有佛出世名為高行其王都城名曰妙門善男子彼高行如來哀愍衆生入於王城蹈彼門閫其城一切悉皆震動忽然廣博衆寶莊嚴無量光明遞相映徹種種寶華散布其地諸天音樂同時俱奏一切諸天充滿虗空善男子我於彼時為長者妻名曰善慧見佛神力心生覺悟則與其夫往詣佛所以一寶錢而為供養是時文殊師利童子為佛侍者為我說法令發阿耨多羅三藐三菩提心善男子我唯知此菩薩離貪欲際解脫如諸菩薩摩訶薩成就無邊巧方便智其藏廣大境界無比而我云何能知能說彼功德行善男子於此南方有城名善度中有居士名瑟胝羅彼常供養栴檀座佛塔汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子頂禮其足繞無量匝殷勤瞻仰辭退而去論第一正入當位法門者從爾時善財童子已下至我唯知此菩薩離貪欲際解脫門於此段中約立五門一念善知識教思惟升進二漸次遊行至險難國寶莊嚴城三處處推求婆須蜜女四於此城內市之北於自宅內而得見之五見已禮敬正申所求并授善財離貪欲際解脫隨所樂欲而為現身隨文釋義中善財於市之北自宅中住者以生死繁多為市北為坎位坎是北方主黑也是衆迷愚衆生之位也菩薩居此迷流愛海闤闠之處同行接生令其發明自宅中住者以衆生生死海是菩薩自所住宅菩薩以大悲故住一切衆生生死宅中度脫衆生成就普賢之行具足無量功德如經云善財童子往詣其門見其住宅廣博嚴麗已下廣說莊嚴此是初見其依報次爾時善財見此女人顏貌端嚴乃至皮膚金色是見其正報及諸藝能已下具如經說爾時善財前詣其所已下申請所求善男子已下正授善財所行之法菩薩解脫名離貪欲際以此解脫隨其樂欲而為現身十方三界所見不同如經具明又經云若有衆生暫見我者即離貪欲得菩薩歡喜三昧者明有信者而修禪定禪悅其心故若有衆生暫與我語者則離貪欲得菩薩無量音聲三昧者明從定發慧了音聲無體若有衆生執我手者則離貪欲得菩薩遍往一切佛剎三昧者是引接義如是已下升座是無相智增義暫觀於我是觀照義嚬伸是法悅義目瞬是見諦入佛智境也抱持於我者攝受不捨衆生義唼我脣吻者受教說法義凡有親近於我一一皆得離貪欲際入菩薩一切智地者都舉諸有親近無空過者皆獲一切智門此明二乘及出纏菩薩但求離苦未入大慈悲入於生死海同事接生門不達法界自在智王處染淨而無垢會無依處普光明智圓滿十方任運利生無縛無解方名永離貪欲際也厭而出纏無大悲行智未究竟有所依在修行不應以得心一分無相無願無作空解脫行莫以為足應修智悲發起願求誓度衆生學差別智盡三界法無不皆知明用三界事便成法界善照自他十二緣生成一切智了無邊劫與今無二不求餘處別有出世解脫涅槃以無作無依智印三界法本唯佛法法本如是無別思求一依十住十行十回向法門圓會自當相稱此婆須蜜女是會第五無盡功德藏回向門為以行齊生死是非見亡以法界禪門真俗二染俱盡以性等法界智周有無無行不行無生不利招多福德故名無盡功德藏善財白言聖者種何善根修何功德已下其女與善財說自往昔因高行如來出世為長者妻布施寶錢及文殊師利勸發大菩提心以是因緣得如斯解脫我唯知此離貪欲際解脫者明往因以捨所重寶錢是離貪文殊師利勸發無性菩提心是離欲如一寶錢其所施不多為心貴重故能捨與多非異此是無盡功德藏回向亦以禪波羅蜜為體明圓通諸法是寶錢義約智門中諸位通治約位門中以治第五回向中以出世禪入於生死真俗染淨不自在障行不自在遍衆生障治令自在故第二推德升進中從如諸菩薩摩訶薩已下至辭退而去有六行經分為五門一推德升進二示其方所及以城名善度三舉善知識居士名瑟胝羅四舉善知識所行事業供養栴檀塔座五禮敬辭退而去隨文釋義者南方如初釋城名善度者約此長者善度衆生故居士名瑟胝羅者此云包攝為此居士智慧廣大包攝十方一切法門具云悉怛𭌆曳此翻為慈氏為明以第六出世智慧處俗行慈方便利生以行成名故第六善度城瑟胝羅居士主隨順堅固一切善根回向經爾時善財童子漸次遊行至善度城詣居士宅頂禮其足合掌而立白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能誘誨願為我說居士告言善男子我得菩薩解脫名不般涅槃際善男子我不生心言如是如來已般涅槃如是如來現般涅槃如是如來當般涅槃我知十方一切世界諸佛如來畢竟無有般涅槃者唯除為欲調伏衆生而示現耳善男子我開栴檀座如來塔門時得三昧名佛種無盡善男子我念念中入此三昧念念得知一切無量殊勝之事善財白言此三昧者境界云何居士答言善男子我入此三昧隨其次第見此世界一切諸佛所謂迦葉佛拘那含牟尼佛拘留孫佛尸棄佛毗婆尸佛提舍佛弗沙佛無上勝佛無上蓮華佛如是等而為上首於一念頃得見百佛得見千佛得見百千佛得見億佛千億佛百千億佛阿庾多億佛那由他億佛乃至不可說不可說世界微塵數佛如是一切次第皆見亦見彼佛初始發心種諸善根獲勝神通成就大願修行妙行具波羅蜜入菩薩地得清淨忍摧伏魔軍成正等覺國土清淨衆會圍繞放大光明轉妙法輪神通變現種種差別我悉能持我悉能憶悉能觀察分別顯示未來彌勒佛等一切諸佛現在毗盧遮那佛等一切諸佛悉亦如是如此世界十方世界所有三世一切諸佛聲聞獨覺諸菩薩衆悉亦如是善男子我唯得此菩薩所得不般涅槃際解脫如諸菩薩摩訶薩以一念智普知三世一念遍入一切三昧如來智日恆照其心於一切法無有分別了一切佛悉皆平等如來及我一切衆生等無有二知一切法自性清淨無有思慮無有動轉而能普入一切世間離諸分別住佛法印悉能開悟法界衆生而我云何能知能說彼功德行善男子於此南方有山名補怛洛迦彼有菩薩名觀自在汝詣彼問菩薩云何學菩薩行修菩薩道即說頌言海上有山多聖賢衆寶所成極清淨華果樹林皆遍滿泉流池沼悉具足勇猛丈夫觀自在為利衆生住此山汝應往問諸功德彼當示汝大方便時善財童子頂禮其足繞無量匝已殷勤瞻仰辭退而去論第一正入當位法門中從爾時善財童子已下至我唯知此菩薩所有佛不涅槃際解脫於此段中約立五門一漸次遊行至善度城二詣居士宅頂禮其足三合掌而立正申所求四居士為善財正說所行之法所行解脫門名不涅槃際五舉所現行供養栴檀座塔者經云我開栴檀座如來塔門時得三昧名佛種無盡者明一切衆生分別心皆是如來智慧種同於諸佛智慧種無有生滅等相此同十住中第六住十地中第六地十行中第六行以十住十行中第六出世間之智慧門回向入纏處俗中智慧利生之行故為居士身處世化俗置一塔室於中安置一栴檀座不置形像表第六智慧門達無相法也以此塔座供養諸佛現在其前明無相法無有三世古今之見為以自佛智慧與一切諸佛智慧無相體同皆為一際一切衆生亦與一切諸佛智慧本來一際為諸衆生說如斯法令諸衆生開佛知見悟佛知見入佛知見故城名善度居士名含攝含攝一切諸佛一切衆生智慧皆一體不生滅故既是諸佛智慧無生滅性一切衆生亦不生滅以此法故得一切諸佛不入涅槃此意明如座上無相是佛故善財白言此三昧境界云何已下是居士答入此三昧見佛之數此界他方三世諸佛總皆得見所有見佛之數如經具明意明諸佛衆生無生滅相方便以將其栴檀座塔引接表示令一切衆生達自身心性相智慧如栴檀座塔本來無相本來佛也明性相皆無俱不生滅達相如化了性如空智無依住何有生滅此是隨順堅固一切善根回向以般若波羅蜜為體餘九為伴此治出世智慧處生死中行大慈悲不自在障令得自在故第二推德升進中從如諸菩薩摩訶薩至辭退而去并頌有十四行經分為五門一推德升進二示善知識方所三舉山名補怛洛迦四舉善知識名觀自在正號觀世音五禮敬辭退隨文釋義者山名補怛洛迦者此云小白華樹山為此山多生白華樹其華甚香香氣遠及為明此聖者修慈悲行門以謙下極小為行也華者明開敷萬行故此慈悲謙小和悅行華開敷教化行香遠熏一切衆生皆令聞其名者發菩提心故舉善知識名觀自在者以舊經云觀世音為正梵云光世音以慈悲光照世間聞苦便救有待念而方救者意令彼回心專緣善法發心令功德善根深固也問觀自在可無慈悲何以要須光世音答曰夫一切菩薩約行成名約名行表位雖一切菩薩皆具智慧二門今以名行表升進要須以名表法今此第七隨順一切衆生回向成處世慈悲門以光世音名是慈悲之號以為表位行門令升進也觀自在者但明觀照成出世般若義自在故以表觀世間苦表悲門不如觀世音之號法華中云普賢菩薩從東方寶威德上王佛所來者又餘經云觀世音在西方阿彌陀佛所者總是如來密意方便表法成名意云東方是智西方是悲以方表法實無方所但約東為春陽發生日出普照二十八宿中東方角及房心等七星皆為衆善位以表智門西方七宿昂畢參等主白虎秋殺義昂為刑獄多主罰惡以觀世音主之而實佛國一方滿十方一塵含法界何有方所而存自他隔礙別佛也先德翻經之士以三乘教謂此方無觀世音以觀自在充號此非實得法界毗盧遮那如來境智道理於法華經中會三入一門中具有此三法文殊普賢觀世音菩薩表法身無相慧及根本智即文殊之行主之表從根本智起差別行以普賢主之表大慈悲心恆處苦流不求出離以觀世音主之以此三法屬於一人所行行令具足遍周一切衆生界教化衆生令無有餘名毗盧遮那佛即明一切處文殊一切處普賢一切處觀世音一切處毗盧遮那乃至微塵中重重充遍且約略明也如海上有山多賢聖者此約南海之上亦主生死海上餘義如文具明亦約慈悲為泉流第七補怛洛山觀世音菩薩主隨順一切衆生回向經爾時善財童子一心思惟彼居士教入彼菩薩解脫之藏得彼菩薩能隨念力憶彼諸佛出現次第念彼諸佛相續次第持彼諸佛名號次第觀彼諸佛所說妙法知彼諸佛具足莊嚴見彼諸佛成正等覺了彼諸佛不思議業漸次遊行至於彼山處處求覓此大菩薩見其西面巖谷之中泉流瑩映樹林蓊香草柔軟右旋布地觀自在菩薩於金剛寶石上結跏趺坐無量菩薩皆坐寶石恭敬圍繞而為宣說大慈悲法令其攝受一切衆生善財見已歡喜踊躍合掌諦觀目不暫瞬作如是念善知識者則是如來善知識者一切法雲善知識者諸功德藏善知識者難可值遇善知識者十力寶因善知識者無盡智炬善知識者福德根芽善知識者一切智門善知識者智海導師善知識者至一切智助道之具便即往詣大菩薩所爾時觀自在菩薩遙見善財告言善來汝發大乘意普攝衆生起正直心專求佛法大悲深重救護一切普賢妙行相續現前大願深心圓滿清淨勤求佛法悉能領受積集善根恆無厭足順善知識不違其教從文殊師利功德智慧大海所生其心成熟得佛勢力已獲廣大三昧光明專意希求甚深妙法常見諸佛生大歡喜智慧清淨猶如虗空既自明了復為他說安住如來智慧光明爾時善財童子頂禮觀自在菩薩足繞無數匝合掌而住白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能教誨願為我說菩薩告言善哉善哉善男子汝已能發阿耨多羅三藐三菩提心善男子我已成就菩薩大悲行解脫門善男子我以此菩薩大悲行門平等教化一切衆生相續不斷善男子我住此大悲行門常在一切諸如來所普現一切衆生之前或以布施攝取衆生或以愛語或以利行或以同事攝取衆生或現色身攝取衆生或現種種不思議色淨光明網攝取衆生或以音聲或以威儀或為說法或現神變令其心悟而得成熟或為化現同類之形與其共居而成熟之善男子我修行此大悲行門願常救護一切衆生願一切衆生離險道怖離熱惱怖離迷惑怖離繫縛怖離殺害怖離貧窮怖離不活怖離惡名怖離於死怖離大衆怖離惡趣怖離黑暗怖離遷移怖離愛別怖離怨會怖離逼迫身怖離逼迫心怖離憂悲怖復作是願願諸衆生若念於我若稱我名若見我身皆得免離一切怖畏善男子我以此方便令諸衆生離怖畏已復教令發阿耨多羅三藐三菩提心永不退轉善男子我唯得此菩薩大悲行門如諸菩薩摩訶薩已淨普賢一切願已住普賢一切行常行一切諸善法常入一切諸三昧常住一切無邊劫常知一切三世法常詣一切無邊剎常息一切衆生惡常長一切衆生善常絶衆生生死流而我云何能知能說彼功德行爾時東方有一菩薩名曰正趣從空中來至娑婆世界輪圍山頂以足按地其娑婆世界六種震動一切皆以衆寶莊嚴正趣菩薩放身光明映蔽一切日月星電天龍八部釋梵護世所有光明皆如聚墨其光普照一切地獄畜生餓鬼閻羅王處令諸惡趣衆苦皆滅煩惱不起憂悲悉離又於一切諸佛國土普雨一切華香纓絡衣服幢蓋如是所有諸莊嚴具供養於佛復隨衆生心之所樂普於一切諸宮殿中而現其身令其見者皆悉歡喜然後來詣觀自在所時觀自在菩薩告善財言善男子汝見正趣菩薩來此會不白言已見告言善男子汝可往問菩薩云何學菩薩行修菩薩道論第一正入當位法門中從爾時善財童子已下至我唯知此大悲行門於此段中約立五門一念善知識教思惟升進二漸次遊行至於彼山處處求覓此大菩薩三見其西面巖谷之中觀世音菩薩於金剛寶石上結跏趺坐四善財見已歡喜觀世音遙見善財稱歎五善財頂禮申請觀世音為說大慈悲行解脫門隨文釋義者如第五婆須蜜女以師子嚬伸引接成悲舉行及報身相及境界所居皆寶莊嚴至第六第七回向為大悲至極就物利生不就自報就衆生界穢境而居巖谷泉流瑩映樹林蓊香草柔軟右旋布地觀世音菩薩坐金剛寶石無量菩薩皆坐寶石此是所居處表巖谷明險道惡趣流泉瑩映者明慈悲瑩徹樹林蓊者表慈心蔭密香草柔軟者表和言芳教熏悅人心右旋布地者表衆生順化布慈悲地令有所歸觀世音菩薩坐金剛石者表以金剛智用隨悲行堅實深重無所傾動也結跏趺坐者智悲交徹也無量菩薩皆坐寶石上悲行堅厚也善財諦觀目不暫瞬者敬法貴人慈心見徹無別念也善財歎德如經具明善財往詣觀世音所觀世音菩薩遙見善財即云善來并諸稱歎未及致敬先有是言者明大悲深厚先致慰問及稱歎然後頂禮旋繞申其所請觀世音菩薩授與善財大悲行解脫門明回向第七住第七地中修出世慈悲令成入俗慈悲之行至此位中菩薩是第七等隨順一切衆生回向滿故入俗智亦於此行故如下文指位雖在東方有菩薩名為正趣及至見時還同會而居表此位菩薩入俗現行悲智齊也至次下文和會經云善男子我住此大悲行門常在一切諸佛如來所普現一切衆生之前以四攝事攝衆生廣如經說意明不離根本智十方世界對現色身慈悲利物已下廣明觀世音菩薩自所誓願利衆生事行如下具明我唯得此菩薩大悲行門已下是推德升進此是等隨順一切衆生回向門方便波羅蜜為主餘九為伴約智門中諸位通治約位門中治十住十行中出世大悲處俗不自在障令得自在也第二推德升進中從如諸菩薩已下至修菩薩道有十八行半經分為五門一推德升進二示善知識方所三舉善知識名為正趣四重歎善知識光明威德神通普化五勸令往問問曰此何意不云辭退而去答曰為此觀世音菩薩會中見正趣菩薩表智悲二位在此位齊滿表悲終即無明之智自成明悲智無二體故不辭去也又明從師子嚬伸比丘尼修悲起智從此第八回向至第十回向地神即從智成悲即天神是智地神是悲明智悲合體即普賢行自在此明智悲應真體通神性名之天地之神非世鬼神也觀世音菩薩云東方有一菩薩名曰正趣者明正智無邪故云正趣從空而來者明智體無依性無形質神無不遍自體真空起如幻身應緣利物一剎那際響應十方性無往來以虗空而現幻像故云從空而來東方者表是智也云南方表法為虗無為明為離離中虗為明為正為日離者麗也以明麗於地以北方為坎為黑以子為陰極癸為陰終以背黑而從明背邪而從正是初啓蒙之位故往南方今至第八真如相回向即明東方為智為震為雷為音聲為青龍為春生為福德為吉慶日生於寅出於卯定是非於辰巳也至午已來總屬陽位午為陽極未為陽終自未至丑是陰位以此第八智增明真如相回向即取東方為智明照萬邪故入於生死震動萬有令明生故教化衆生達真如故照愚夫道成君子之德故破邪道成正智故照一切惡生一切善故長諸善根成白淨無垢吉祥福德故故東方表智西方表悲以此二位明悲智齊故正趣菩薩從東方來白華山西一處而見以明東表智西表悲此觀音正趣會悲智二位一分始終自此已去從智行悲也即次後天地之神是以明從悲行智即行狹不終以智行悲即行廣無限自在故如十地位滿智悲功成十一地中還以悲為體以智為用即摩耶是悲生佛是智如是一一位中升進皆有意趣總別同異如東西南北表自有趣求啓迷發明即往南方表之若明智悲益俗即東西表之觀音在白華山西者白者金位也西方白表金位也主將位也東方者木位主青像主相位也相主生將主殺如來以約世間法則安立法門令世間易解故以此殺害之處置大慈悲之門以為救苦以東方春生之位置大智之門以表智生衆善令易達其事故如老子云上將軍居右偏將軍居左明上者明而具慈恐妄殺也而實大象混然何有方形而可得也但約法立名設其則也然智悲之道以一法而滿十方以一行而行一切萬行雖然約世軌則設法不無如世陳設者是隨方應用也是故此經觀世音菩薩云東方有菩薩名為正趣表第八智位照世間大夜故此同十住十行十地十一地第八無功智之大用故位同升進生熟逆順有異此正趣菩薩從空中來至娑婆世界輪圍山頂以足指按地其娑婆世界六種震動者表智能破暗衆生惑滅境亡散也智現妄亡妄業所報得大地之境界亦亡散故地動動者散也如定現前妄亡智應報境盡亡足指按地者智之所行也表以法空起智現前衆執皆散輪圍山是妄所執之執境無依智現所執境無以禪觀方明不可以想心斟酌一切皆以衆寶莊嚴者明妄亡境滅隨智淨福相應即諸功德便現放身光明映蔽一切日月星電天龍八部釋梵護世四王所有光明皆如聚墨其光普照一切地獄畜生者如三界之光皆有漏業隨生滅心功德所生皆未離生滅我所有漏業果皆有自他能所得業在如真理智無漏無我無作具法性清淨任性大慈悲之智光非世所及無有隔障邊際分劑可及十方洞徹六道遍周故已下智悲之行如經具明第八正趣菩薩主真如相回向經爾時善財童子敬承其教遽即往詣彼菩薩所頂禮其足合掌而立白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能教誨願為我說正趣菩薩言善男子我得菩薩解脫名普門速疾行善財言聖者於何佛所得此法門所從來剎去此幾何發來久如告言善男子此事難知一切世間天人阿修羅沙門婆羅門等所不能了唯勇猛精進無退無怯諸菩薩衆已為一切善友所攝諸佛所念善根具足志樂清淨得菩薩根有智慧眼能聞能持能解能說善財言聖者我承佛神力善知識力能信能受願為我說正趣菩薩言善男子我從東方妙藏世界普勝生佛所而來此土於彼佛所得此法門從彼發來已經不可說不可說佛剎微塵數劫一一念中舉不可說不可說佛剎微塵數步一一步過不可說不可說世界微塵數佛剎一一佛剎我皆遍入至其佛所以妙供具而為供養此諸供具皆是無上心所成無作法所印諸如來所忍諸菩薩所歎善男子我又普見彼世界中一切衆生悉知其心悉知其根隨其欲解現身說法或放光明或施財寶種種方便教化調伏無有休息如從東方南西北方四維上下亦復如是善男子我唯得此菩薩普速疾行解脫能疾周遍到一切處如諸菩薩摩訶薩普於十方無所不至智慧境界等無差別善布其身悉遍法界至一切道入一切剎知一切法到一切世平等演說一切法門同時照耀一切衆生於諸佛所不生分別於一切處無有障礙而我云何能知能說彼功德行善男子於此南方有城名墮羅鉢底其中有神名曰大天汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子頂禮其足繞無數匝殷勤瞻仰辭退而去音切瞬舒閨切唼子合切吻無粉切閫苦本切蓊鳥孔切闤戶關切闠胡對切怙胡古切胝張尼切乃定切
