body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論賢首品第十二之二經若常信奉於諸佛則能持戒修學處若常持戒修學處則能具足諸功德戒能開發菩提本學是勤修功德地於戒及學常順行一切如來所稱美若常信奉於諸佛則能興集大供養若能興集大供養彼人信佛不思議若常信奉於尊法則聞佛法無厭足若聞佛法無厭足彼人信法不思議若常信奉清淨僧則得信心不退轉若得信心不退轉彼人信力無能動若得信力無能動則得諸根淨明利若得諸根淨明利則能遠離惡知識若能遠離惡知識則得親近善知識若得親近善知識則能修習廣大善若能修習廣大善彼人成就大因力若人成就大因力則得殊勝決定解若得殊勝決定解則為諸佛所護念若為諸佛所護念則能發起菩提心若得發起菩提心則能勤修佛功德若能勤修佛功德則得生在如來家若得生在如來家則善修行巧方便若善修行巧方便則得信樂心清淨若得信樂心清淨則得增上最勝心若得增上最勝心則常修習波羅蜜若常修習波羅蜜則能具足摩訶衍若能具足摩訶衍則能如法供養佛若能如法供養佛則能念佛心不動若能念佛心不動則常覩見無量佛若常覩見無量佛則見如來體常住若見如來體常住則能知法永不滅若能知法永不滅則得辯才無障礙若能辯才無障礙則能開演無邊法若能開演無邊法則能慈愍度眾生若能慈愍度眾生則得堅固大悲心若能堅固大悲心則能愛樂甚深法若能愛樂甚深法則能捨離有為過若能捨離有為過則離憍慢及放逸若離憍慢及放逸則能兼利一切眾若能兼利一切眾則處生死無疲厭若處生死無疲厭則能勇健無能勝若能勇健無能勝則能發起大神通若能發起大神通則知一切眾生行若知一切眾生行則能成就諸羣生若能成就諸羣生則得善攝眾生智若得善攝眾生智則能成就四攝法若能成就四攝法則與眾生無限利若與眾生無限利則具最勝智方便若具最勝智方便則住勇猛無上道若住勇猛無上道則能摧殄諸魔力若能摧殄諸魔力則能超出四魔境若能超出四魔境則得至於不退地若得至於不退地則得無生深法忍若得無生深法忍則為諸佛所授記若為諸佛所授記則一切佛現其前若一切佛現其前則了神通深密用若了神通深密用則為諸佛所憶念若為諸佛所憶念則以佛德自莊嚴若以佛德自莊嚴則獲妙福端嚴身若獲妙福端嚴身則身晃耀如金山若身晃耀如金山則相莊嚴三十二若相莊嚴三十二則具隨好為嚴飾若具隨好為嚴飾則身光明無限量若身光明無限量則不思議光莊嚴若不思議光莊嚴其光則出諸蓮華其光若出諸蓮華則無量佛坐華上示現十方靡不徧悉能調伏諸眾生若能如是調眾生則現無量神通力若現無量神通力則住不可思議土演說不可思議法令不思議眾歡喜若說不可思議法令不思議眾歡喜則以智慧辯才力隨眾生心而化誘若以智慧辯才力隨眾生心而化誘則以智慧為先導身語意業恒無失若以智慧為先導身語意業恒無失則其願力得自在普隨諸趣而現身若其願力得自在普隨諸趣而現身則能為眾說法時音聲隨類難思議若能為眾說法時音聲隨類難思議則於一切眾生心一念悉知無有餘若於一切眾生心一念悉知無有餘則知煩惱無所起永不沒溺於生死若知煩惱無所起永不沒溺於生死則獲功德法性身以法威力現世間若獲功德法性身以法威力現世間則獲十地十自在修行諸度勝解脫若得十地十自在修行諸度勝解脫則獲灌頂大神通住於最勝諸三昧若獲灌頂大神通住於最勝諸三昧則於十方諸佛所應受灌頂而昇位若於十方諸佛所應受灌頂而昇位則蒙十方一切佛手以甘露灌其頂若蒙十方一切佛手以甘露灌其頂則身充徧如虗空安住不動滿十方若身充徧如虗空安住不動滿十方則彼所行無與等諸天世人莫能知論六若常信奉於諸佛已下九十五行頌明增進修行獲果分經菩薩勤修大悲行願度一切無不果見聞聽受若供養靡不皆令獲安樂彼諸大士威神力法眼常全無缺減十善妙行等諸道無上勝寶皆令現譬如大海金剛聚以彼威力生眾寶無減無增亦無盡菩薩功德聚亦然或有剎土無有佛於彼示現成正覺或有國土不知法於彼為說妙法藏無有分別無功用於一念頃徧十方如月光影靡不周無量方便化羣生於彼十方世界中念念示現成佛道轉正法輪入寂滅乃至舍利廣分布或現聲聞獨覺道或現成佛普莊嚴如是開闡三乘教廣度眾生無量劫或現童男童女形天龍及以阿脩羅乃至摩睺羅伽等隨其所樂悉令見眾生形相各不同行業音聲亦無量如是一切皆能現海印三昧威神力嚴淨不可思議剎供養一切諸如來放大光明無有邊度脫眾生亦無限智慧自在不思議說法言辭無有礙施戒忍進及禪定智慧方便神通等如是一切皆自在以佛華嚴三昧力一微塵中入三昧成就一切微塵定而彼微塵亦不增於一普現難思剎彼一塵內眾多剎或有有佛或無佛或有襍染或清淨或有廣大或狹小或復有成或有壞或有正住或傍住或如曠野熱時焰或如天上因陀網如一塵中所示現一切微塵悉亦然此大名稱諸聖人三昧解脫神通力若欲供養一切佛入于三昧起神變能以一手徧三千普供一切諸如來十方所有勝妙華塗香粖香無價寶如是皆從手中出供養道樹諸最勝無價寶衣襍妙香寶幢幡蓋皆嚴好真金為華寶為帳莫不皆從掌中雨十方所有諸妙物應可奉獻無上尊掌中悉雨無不備菩提樹前持供佛十方一切諸妓樂鐘鼓琴瑟非一類悉奏和雅妙音聲靡不從於掌中出十方所有諸讚頌稱歎如來實功德如是種種妙言辭皆從掌內而開演菩薩右手放淨光光中香水從空雨普灑十方諸佛土供養一切照世燈又放光明妙莊嚴出生無量寶蓮華其華色相皆殊妙以此供養於諸佛又放光明華莊嚴種種妙華集為帳普散十方諸國土供養一切大德尊又放光明香莊嚴種種妙香集為帳普散十方諸國土供養一切大德尊又放光明粖香嚴種種粖香聚為帳普散十方諸國土供養一切大德尊又放光明衣莊嚴種種名衣集為帳普散十方諸國土供養一切大德尊又放光明寶莊嚴種種妙寶集為帳普散十方諸國土供養一切大德尊又放光明蓮莊嚴種種蓮華集為帳普散十方諸國土供養一切大德尊又放光明纓莊嚴種種妙纓集為帳普散十方諸國土供養一切大德尊又放光明幢莊嚴其幢絢煥備眾色種種無量皆殊好以此莊嚴諸佛土種種襍寶莊嚴蓋眾妙繒幡共垂飾摩尼寶鐸演佛音執持供養諸如來手出供具難思議如是供養一導師一切佛所皆如是大士三昧神通力菩薩住在三昧中種種自在攝眾生悉以所行功德法無量方便而開誘或以供養如來門或以難思布施門或以頭陀持戒門或以不動堪忍門或以苦行精進門或以寂靜禪定門或以決了智慧門或以所行方便門或以梵住神通門或以四攝利益門或以福智莊嚴門或以因緣解脫門或以根力正道門或以聲聞解脫門或以獨覺清淨門或以大乘自在門或以無常眾苦門或以無我壽者門或以不淨離欲門或以滅盡三昧門隨諸眾生病不同悉以法藥而對治隨諸眾生心所樂悉以方便而滿足隨諸眾生行差別悉以善巧而成就如是三昧神通相一切天人莫能測有妙三昧名隨樂菩薩住此普觀察隨宜示現度眾生悉使歡心從法化劫中飢饉灾難時悉與世間諸樂具隨其所欲皆令滿普為眾生作饒益或以飲食上好味寶衣嚴具眾妙物乃至王位皆能捨令好施者悉從化或以相好莊嚴身上妙衣服寶纓絡華鬘為飾香塗體威儀具足度眾生一切世間所好尚色相顏容及衣服隨應普現愜其心俾樂色者皆從道迦陵頻伽美妙音俱枳羅等妙音聲種種梵音皆具足隨其心樂為說法八萬四千諸法門諸佛以此度眾生彼亦如其差別法隨世所宜而化度眾生苦樂利衰等一切世間所作法悉能應現同其事以此普度諸眾生一切世間眾苦患深廣無涯如大海與彼同事悉能忍令其利益得安樂若有不識出離法不求解脫離諠憒菩薩為現捨國財常樂出家心寂靜家是貪愛繫縛所欲使眾生悉免離故示出家得解脫於諸欲樂無所愛菩薩示行十種行亦行一切大人法諸仙行等悉無餘為欲利益眾生故若有眾生壽無量煩惱微細樂具足菩薩於中得自在示受老病死眾患或有貪欲瞋恚癡煩惱猛火常熾然菩薩為現老病死令彼眾生悉調伏如來十力無所畏及以十八不共法所有無量諸功德悉以示現度眾生記心教誡及神足悉是如來自在用彼諸大士皆示現能使眾生盡調伏菩薩種種方便門隨順世法度眾生譬如蓮華不著水如是在世令深信雅思淵才文中王歌舞談說眾所欣一切世間眾技術譬如幻師無不現或為長者邑中主或為賈客商人導或為國王及大臣或作良醫善眾論或於曠野作大樹或為良藥眾寶藏或作寶衣隨所求或以正道示眾生若見世界始成立眾生未有資身具是時菩薩為工匠為之示現種種業不作逼惱眾生物但說利益世間事呪術藥艸等眾論如是所有皆能說一切仙人殊勝行人天等類同信仰如是難行苦行法菩薩隨應悉能作或作外道出家人或在山林自勤苦或露形體無衣服而於彼眾作師長或現邪命種種行習行非法以為勝或現梵志諸威儀於彼眾中為上首或受五熱隨日轉或持牛狗及鹿戒或著壞衣奉事火為化是等作導師或有示謁諸天廟或復示入恒河水食根果等悉示行於彼常思已勝法或現蹲踞或翹足或臥艸棘及灰上或復臥杵求出離而於彼眾作師首如是等類諸外道觀其意解與同事所示苦行世靡堪令彼見已皆調伏眾生迷惑稟邪教住於惡見受眾苦為其方便說妙法悉令得解真實諦或邊呪語說四諦或善密語說四諦或人直語說四諦或天密語說四諦分別文字說四諦決定義理說四諦善破於他說四諦非外所動說四諦或八部語說四諦或一切語說四諦隨彼所解語言音為說四諦令解脫所有一切諸佛法皆如是說無不盡知語境界不思議是名說法三昧力論七菩薩勤修大悲行已下一百五十一行頌明菩薩得果行悲教化眾生及興供自在分經有勝三昧名安樂能普救度諸羣生放大光明不思議令其見者悉調伏所放光明名善現若有眾生遇此光必令獲益不唐捐因是得成無上智彼先示現於諸佛示法示僧示正道亦示佛塔及形像是故得成此光明又放光明名照耀暎蔽一切諸天光所有暗障靡不除普為眾生作饒益此光覺悟一切眾令執燈明供養佛以燈供養諸佛故得成世中無上燈然諸油燈及蘇燈亦然種種諸明炬眾香妙藥上寶燭以是供佛獲此光又放光明名濟度此光能覺一切眾令其普發大誓心度脫欲海諸羣生若能普發大誓心度脫欲海諸羣生則能越渡四瀑流示道無憂解脫城於諸行路大水處造立橋梁及船筏毀呰有為讚寂靜是故得成此光明又放光明名滅愛此光能覺一切眾令其捨離於五欲專思解脫妙法味若能捨離於五欲專思解脫妙法味則能以佛甘露雨普滅世間諸渴愛惠施池井及泉流專求無上菩提道毀呰五欲讚禪定是故得成此光明又放光明名歡喜此光能覺一切眾令其愛慕佛菩提發心願證無師道造立如來大悲像眾相莊嚴坐華座恒歎最勝諸功德是故得成此光明又放光明名愛樂此光能覺一切眾令其心樂於諸佛及以樂法樂眾僧若常心樂於諸佛及以樂法樂眾僧則在如來眾會中逮成無上深法忍開悟眾生無有量普使念佛法僧寶及示發心功德行是故得成此光明又放光明名福聚此光能覺一切眾令行種種無量施以此願求無上道設大施會無遮限有來求者皆滿足不令其心有所乏是故得成此光明又放光明名具智此光能覺一切眾令於一法一念中悉解無量諸法門為諸眾生分別法及以決了真實義善說法義無虧減是故得成此光明又放光明名慧燈此光能覺一切眾令知眾生性空寂一切諸法無所有演說諸法空無主如幻如𦦨水中月乃至猶如夢影像是故得成此光明又放光名法自在此光能覺一切眾令得無盡陀羅尼悉持一切諸佛法恭敬供養持法者給侍守護諸賢聖以種種法施眾生是故得成此光明又放光明名能捨此光覺悟慳眾生令知財寶悉非常恒樂惠施心無著慳心難調而能調解財如夢如浮雲增長慧施清淨心是故得成此光明又放光明名除熱此光能覺毀禁者普使受持清淨戒發心願證無師道勸引眾生受持戒十善業道悉清淨又令發向菩提心是故得成此光明又放光明名忍嚴此光覺悟瞋恚者令彼除瞋離我慢常樂忍辱柔和法眾生暴惡難可忍為菩提故心不動常樂稱揚忍功德是故得成此光明又放光明名勇猛此光覺悟嬾墮者令彼常於三寶中恭敬供養無疲厭若彼常於三寶中恭敬供養無疲厭則能超出四魔境速成無上佛菩提勸化眾生令進策常勤供養於三寶法欲滅時專守護是故得成此光明又放光明名寂靜此法能覺亂意者令其遠離貪恚癡心不動搖而正定捨離一切惡知識無義談說襍染行讚歎禪定阿蘭若是故得成此光明又放光明名慧嚴此光覺悟愚迷者令其證諦解緣起諸根智慧悉通達若能證諦解緣起諸根智慧悉通達則得日燈三昧法智慧光明成佛果國財及己皆能捨為菩提故求正法聞已專勤為眾說是故得成此光明又放光明名佛慧此光覺悟諸含識令見無量無邊佛各各坐寶蓮華上讚佛威德及解脫說佛自在無有量顯示佛力及神通是故得成此光明又放光明名無畏此光照觸恐怖者非人所持諸毒害一切皆令疾除滅能於眾生施無畏遇有惱害皆勸止拯濟厄難孤窮者以是得成此光明又放光明名安隱此光能照疾病者令除一切諸苦痛悉得正定三昧樂施以良藥救眾患妙寶延命香塗體酥油乳蜜充飲食以是得成此光明又放光明名見佛此光覺悟將歿者令隨憶念見如來命𣧩得生其淨國見有臨𣧩勸念佛又示尊像令瞻敬俾於佛所深歸仰是故得成此光明又放光明名樂法此光能覺一切眾令於正法常欣樂聽聞演說及書寫法欲盡時能演說令求法者意充滿於法愛樂勤修行是故得成此光明又放光明名妙音此光開悟諸菩薩能令三界所有聲聞者皆是如來音以大音聲稱讚佛及施鈴鐸諸音樂普使世間聞佛音是故得成此光明又放光名施甘露此光開悟一切眾令捨一切放逸行具足修習諸功德說有為法非安隱無量苦惱悉充徧恒樂稱揚寂滅樂是故得成此光明又放光明名最勝此光開悟一切眾令於佛所普聽聞戒定智慧增上法常樂稱揚一切佛勝戒勝定殊勝慧如是為求無上道是故得成此光明又放光明名寶嚴此光能覺一切眾令得寶藏無窮盡以此供養諸如來以諸種種上妙寶奉施於佛及佛塔亦以慧施諸貧乏是故得成此光明又放光明名香嚴此光能覺一切眾令其聞者悅可意決定當成佛功德人天妙香以塗地供養一切最勝王亦以造塔及佛像是故得成此光明又放光名襍莊嚴寶幢幡蓋無央數焚香散華奏眾樂城邑內外皆充滿本以微妙妓樂音眾香妙華幢蓋等種種莊嚴供養佛是故得成此光明又放光明名嚴潔令地平坦猶如掌莊嚴佛塔及其處是故得成此光明又放光明名大雲能起香雲雨香水以水灑塔及庭院是故得成此光明又放光明名嚴具令倮形者得上服嚴身妙物而為施是故得成此光明又放光明名上味能令飢者獲美食種種珍饌而為施是故得成此光明又放光明名大財令貧乏者獲寶藏以無盡物施三寶是故得成此光明又放光名眼清淨能令盲者見眾色以燈施佛及佛塔是故得成此光明又放光明耳清淨能令聾者悉善聽鼓樂娛佛及佛塔是故得成此光明又放光明鼻清淨昔未聞香皆得聞以香施佛及佛塔是故得成此光明又放光名舌清淨能以美音稱讚佛永除麤惡不善語是故得成此光明又放光名身清淨諸根缺者令具足以身禮佛及佛塔是故得成此光明又放光名意清淨令失心者得正念修行三昧悉自在是故得成此光明又放光名色清淨令見難思諸佛色以眾妙色莊嚴塔是故得成此光明又放光名聲清淨令知聲性本空寂觀聲緣起如谷響是故得成此光明又放光名香清淨令諸臭穢悉香潔香水洗塔菩提樹是故得成此光明又放光名味清淨能除一切味中毒恒供佛僧及父母是故得成此光明又放光名觸清淨能令惡觸皆柔輭戈鋌劒戟從空雨皆令變作妙華鬘以昔曾於道路中塗香散華布衣服迎送如來令蹈上是故今獲光如是又放光名法清淨能令一切諸毛孔悉演妙法不思議眾生聽者咸欣悟因緣所生無有生諸佛法身非是身法性常住如虗空以說其義光如是論八從有勝三昧名安樂已下有一百六十行頌明放光明因果分經如是等比光明門如恒河沙無限數悉從大仙毛孔出一一作業各差別如一毛孔所放光無量無數如恒沙一切毛孔悉亦然此是大仙三昧力如其本行所得光隨彼宿緣同行者今放光明故如是此是大仙智自在往昔同修於福業及有愛樂能隨喜見其所作亦復然彼於此光咸得見若有自修眾福業供養諸佛無央數於佛功德常願求是此光明所開覺譬如生盲不見日非為無日出世間諸有目者悉明見各隨所務修其業大士光明亦如是有智慧者皆悉見凡夫邪信劣解人於此光明莫能覩摩尼宮殿及輦乘妙寶靈香以塗瑩有福德者自然備非無福者所能處大士光明亦如是有深智者咸照觸邪信劣解凡愚人無有能見此光明若有聞此光差別能生清淨深信解永斷一切諸疑網速成無上功德幢論九如是等比光明門已下二十行頌明光出處及光差別分經有勝三昧能出現眷屬莊嚴皆自在一切十方諸國土佛子眾會無倫匹有妙蓮華光莊嚴量等三千大千界其身端坐悉充滿是此三昧神通力復有十剎微塵數妙好蓮華所圍遶諸佛子眾於中坐住此三昧威神力宿世成就善因緣具足修行佛功德此等眾生遶菩薩悉共合掌觀無厭譬如明月在星中菩薩處眾亦復然大士所行法如是入此三昧威神力如於一方所示現諸佛子眾共圍遶一切方中悉如是住此三昧威神力有勝三昧名方網菩薩住此廣開示一切方中普現身或現入定或從出或於東方入正定而於西方從定出或於西方入正定而於東方從定出或於餘方入正定而於餘方從定出如是入出遍十方是名菩薩三昧力盡於東方諸國土所有如來無數量悉現其前普親近住於三昧寂不動而於西方諸世界一切諸佛如來所皆現從於三昧起廣修無量諸供養盡於西方諸國土所有如來無數量悉現其前普親近住於三昧寂不動而於東方諸世界一切諸佛如來所皆現從於三昧起廣修無量諸供養如是十方諸世界菩薩悉入無有餘或現三昧寂不動或現恭敬供養佛於眼根中入正定於色塵中從定出示現色性不思議一切人天莫能知於色塵中入正定於眼起定心不亂說眼無生無有起性空寂滅無所作於耳根中入正定於聲塵中從定出分別一切語言音諸天世人莫能知於聲塵中入正定於耳起定心不亂說耳無生無有起性空寂滅無所作於鼻根中入正定於香塵中從定出普得一切上妙香諸天世人莫能知於香塵中入正定於鼻起定心不亂說鼻無生無有起性空寂滅無所作於舌根中入正定於味塵中從定出普得一切諸上味諸天世人莫能知於味塵中入正定於舌起定心不亂說舌無生無有起性空寂滅無所作於身根中入正定於觸塵中從定出善能分別一切觸諸天世人莫能知於觸塵中入正定於身起定心不亂說身無生無有起性空寂滅無所作於意根中入正定於法塵中從定出分別一切諸法相諸天世人莫能知於法塵中入正定從意起定心不亂說意無生無有起性空寂滅無所作童子身中入正定壯年身中從定出壯年身中入正定老年身中從定出老年身中入正定善女身中從定出善女身中入正定善男身中從定出善男身中入正定比丘尼身從定出比丘尼身入正定比丘身中從定出比丘身中入正定學無學身從定出學無學身入正定辟支佛身從定出辟支佛身入正定現如來身從定出於如來身入正定諸天身中從定出諸天身中入正定大龍身中從定出大龍身中入正定夜叉身中從定出夜叉身中入正定鬼神身中從定出鬼神身中入正定一毛孔中從定出一毛孔中入正定一切毛孔從定出一切毛孔入正定一毛端頭從定出一毛端頭入正定一微塵中從定出一微塵中入正定一切塵中從定出一切塵中入正定金剛地中從定出金剛地中入正定摩尼樹上從定出摩尼樹上入正定佛光明中從定出佛光明中入正定於河海中從定出於河海中入正定於火大中從定出於火大中入正定於風起定心不亂於風大中入正定於地大中從定出於地大中入正定於天宮殿從定出於天宮殿入正定於空起定心不亂是名無量功德者三昧自在難思議十方一切諸如來於無量劫說不盡論十從有勝三昧能出現已下八十一行頌明三昧自在分如此同異無礙自在大方網三昧門入出隱現同時自在者隨眾生業異所見差別諸佛得道自在故隨眾生業自在故然如來心無作性故智隨影應無去來性而可取捨如響應聲喻如水潛流隨諸卉木各滋生喻如春陽生艸木喻如水養魚龍喻如地所生草木喻如火成食喻如風發生所益眾生長短壽生喻以喻思之以智照之執計情亡任真之智本合如是為執計故設得一分出世道果亦不能為大自在故音切衍演音殄徒典切晃胡廣切減古湛切曠苦謗切琴渠吟切瑟所吉切絢許縣切煥呼貫切饉渠吝切枳居紙切諠虛元切憒公對切蹲存音踞居御切瀑蒲報切筏浮月切呰資爾切嬾落旱切墮徒果切拯整音慢莫半切倮力果切鋌市連切戟几極切愜牽恊切賈公戶切蹈導音
