body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十無盡藏品第二十二論將釋此品三門如前一釋品名目者為此説十種藏依法立名可知第二釋品來意者此位已説十種行以此十無盡藏成前十行之法使令無盡成後十回向之法使令進向令使行門不滯是故此品須來第三長科經意者分為二門一長科經意二隨文釋義一長科經意者於此一品經中大段隨十藏名目總有十一段經其文如下經爾時功德林菩薩復告諸菩薩言佛子菩薩摩訶薩有十種藏過去未來現在諸佛已説當説今説何等為十所謂信藏戒藏慚藏愧藏聞藏施藏慧藏念藏持藏辨藏是為十佛子何等為菩薩摩訶薩信藏此菩薩信一切法空信一切法無相信一切法無願信一切法無作信一切法無分別信一切法無所依信一切法不可量信一切法無有上信一切法難超越信一切法無生若菩薩能如是隨順一切法生淨信已聞諸佛法不可思議心不怯弱聞一切佛不可思議心不怯弱聞衆生界不可思議心不怯弱聞法界不可思議心不怯弱聞虗空界不可思議心不怯弱聞涅槃界不可思議心不怯弱聞過去世不可思議心不怯弱聞未來世不可思議心不怯弱聞現在世不可思議心不怯弱聞入一切劫不可思議心不怯弱何以故此菩薩於諸佛所一向堅信知佛智慧無邊無盡十方無量諸世界中一一各有無量諸佛於阿耨多羅三藐三菩提已得今得當得已出世今出世當出世已入涅槃今入涅槃當入涅槃彼諸佛智慧不增不減不生不滅不進不退不近不遠無知無捨此菩薩入佛智慧成就無邊無盡信得此信已心不退轉心不雜亂不可破壞無所染著常有根本隨順聖人住如來家護持一切諸佛種性增長一切菩薩信解隨順一切如來善根出生一切諸佛方便是名菩薩摩訶薩信藏菩薩住此信藏則能聞持一切佛法為衆生説皆令開悟論第一從初爾時功德林菩薩已下至為衆生説皆令開悟有二十八行半經明正舉十無盡藏名并陳十種信法分於此分中復分為六一爾時功德林已下至是為十有四行經明正説十藏之名分二佛子已下至生淨信已有五行半經明初舉十種信法分三聞諸佛法不可思議已下至何以故有七行半經明聞法生信已於法不怯分四此菩薩已下至無知無捨有五行半經明知一切諸佛出世入涅槃無遠近取捨分五此菩薩入佛智慧已下至一切諸佛方便有四行半經明入此信藏生在佛家順諸佛善根方便分六是名菩薩已下一行半經明總結信成能演法分此信是十行之中位內之信文殊師利覺首等是十信位中信心故經佛子何等為菩薩摩訶薩戒藏此菩薩成就普饒益戒不受戒不住戒無悔恨戒無違諍戒不損惱戒無雜穢戒無貪求戒無過失戒無毀犯戒云何為普饒益戒此菩薩受持淨戒本為利益一切衆生云何為不受戒此菩薩不受行外道諸所有戒但性自精進奉持三世諸佛如來平等淨戒云何為不住戒此菩薩受持戒時心不住欲界不住色界不住無色界何以故不求生彼而持戒故云何為無悔恨戒此菩薩恆得安住無悔恨心何以故不作重罪不行諂詐不破淨戒故云何為無違諍戒此菩薩不非先制不更造立心常隨順向涅槃戒具足受持無所毀犯不以持戒惱他衆生令其生苦但願一切心常歡喜而持於戒云何為不惱害戒此菩薩不因於戒學諸呪術造作方藥惱害衆生但為救護一切衆生而持於戒云何為不雜戒此菩薩不著邊見不持雜戒但觀緣起持出離戒云何為無貪求戒此菩薩不現異相彰已有德但為滿足出離法故而持於戒云何為無過失戒此菩薩不自貢高言我持戒見破戒人亦不輕毀令他愧恥但一其心而持於戒云何為無毀犯戒此菩薩永斷煞盜邪淫妄語兩舌惡口及無義語貪瞋邪見具足受持十種善業菩薩持此無犯戒時作是念言一切衆生毀犯淨戒皆由顛倒唯佛世尊能知衆生以何因緣而生顛倒毀犯淨戒我當成就無上菩提廣為衆生説真實法令離顛倒是名菩薩摩訶薩第二戒藏論第二佛子何等為菩薩戒藏已下至是名菩薩第二戒藏於中有二十八行半經於此段中復分為三一佛子已下至無毀犯戒有三行半經明正舉十種戒名號分二云何已下至十種善業有二十一行經明正説十種戒之持犯分三菩薩持此至第二戒藏有四行半經明此十行菩薩持戒無毀犯分經佛子何等為菩薩摩訶薩慚藏此菩薩憶念過去所作諸惡而生於慚謂彼菩薩心自念言我無始世來與諸衆生皆悉互作父母兄弟姊妹男女具貪瞋癡憍慢諂誑及餘一切諸煩惱故更相惱害遞相凌奪姦淫傷殺無惡不造一切衆生悉亦如是以諸煩惱備造衆惡是故各各不相恭敬不相尊重不相承順不相謙下不相啓導不相護惜更相煞害互為怨讎自惟我身及諸衆生去來現在行無漸法三世諸佛無不知見今若不斷此無慚行三世諸佛亦當見我我當云何猶行不止甚為不可是故我應專心斷除證阿耨多羅三藐三菩提廣為衆生説真實法是名菩薩摩訶薩第三慚藏論第三佛子已下至第三慚藏有十三行半經於此段中復分為二一佛子已下至應專心斷除有十二行經明斷無慚行具於慚行分二有一行半經明具足於慚善為衆生説法分經佛子何等為菩薩摩訶薩愧藏此菩薩自愧昔來於五欲中種種貪求無有厭足因此增長貪恚癡等一切煩惱我今不應復行是事又作是念衆生無智起諸煩惱具行惡法不相恭敬不相尊重乃至展轉互為怨讎如是等惡無不備造造已歡喜追求稱歎盲無慧眼無所知見於母人腹中入胎受生成垢穢身畢竟至於髮白面皺有智慧者觀此但是從淫欲生不淨之法三世諸佛皆悉知見若我於今猶行是事則為欺誑三世諸佛是故我當修行於愧速成阿耨多羅三藐三菩提廣為衆生説真實法是名菩薩摩訶薩第四愧藏論第四佛子已下至是名菩薩愧藏於中有十二行經於中大意復分為三一佛子已下至復行是事有三行經明自念於五欲境無始長貪求分二又作是念已下至我當修行於愧有七行經明念衆生愚癡為於五欲互為怨讎菩薩知之應自斷分三速成菩提已下一行半經善為衆生説真實法分經佛子何等為菩薩摩訶薩聞藏此菩薩知是事有故是事有是事無故是事無是事起故是事起是事滅故是事滅是世間法是出世間法是有為法是無為法是有記法是無記法何等為是事有故是事有謂無明有故行有何等為是事無故是事無謂識無故名色無何等為是事起故是事起謂愛起故苦起何等為是事滅故是事滅謂有滅故生滅何等為世間法所謂色受想行識何等為出世間法所謂戒定慧解脫解脫知見何等為有為法所謂欲界色界無色界衆生界何等為無為法所謂虗空涅槃數緣滅非數緣滅緣起法性住何等為有記法謂四聖諦四沙門果四辨四無所畏四念處四正勤四神足五根五力七覺分八聖道分何等為無記法謂世間有邊世間無邊世間亦有邊亦無邊世間非有邊非無邊世間有常世間無常世間亦有常亦無常世間非有常非無常如來滅後有如來滅後無如來滅後亦有亦無如來滅後非有非無我及衆生有我及衆生無我及衆生亦有亦無我及衆生非有非無過去有幾如來般涅槃幾聲聞辟支佛般涅槃未來有幾如來幾聲聞辟支佛幾衆生現在有幾佛住幾聲聞辟支佛住幾衆生住何等如來最先出何等聲聞辟支佛最先出何等衆生最先出何等如來最後出何等聲聞辟支佛最後出何等衆生最後出何法最在初何法最在後世間從何處來去至何所有幾世界成有幾世界壞世界從何處來去至何所何者為生死最初際何者為生死最後際是名無記法菩薩摩訶薩作如是念一切衆生於生死中無有多聞不能了知此一切法我當發意持多聞藏證阿耨多羅三藐三菩提為諸衆生説真實法是名菩薩摩訶薩第五多聞藏論第五佛子已下至多聞藏有三十四行半經明聞藏於此段中復分為三一佛子已下至無記法有四行經明舉十事有無分二何等為是事有已下至是名無記法有二十六行半經明正説十種事有無分初從十二緣説無明有故行有識無故名色無愛起故苦起有滅故生滅此上四事識之與愛皆從無明妄計諸有從生今達有本無即十二緣滅十二緣滅非智有生非智有滅但除其病其智無依無形無為而靈通萬有無思而現無作而成學之者以止觀兩門功終方會此之一辦後之十法總終聖教具陳識相對治異解已下如文具明三菩薩已下四行經明菩薩念諸衆生無多聞慧我求多聞藏廣為説法分經佛子何等為菩薩摩訶薩施藏此菩薩行十種施所謂分減施竭盡施內施外施內外施一切施過去施未來施現在施究竟施佛子云何為菩薩分減施此菩薩稟性仁慈好行慧施若得美味不專自受要與衆生然後方食凡所受物悉亦如是若自食時作是念言我身中有八萬戶蟲依於我住我身充樂彼亦充樂我身飢苦彼亦飢苦我今受此所有飲食願令衆生普得充飽為施彼故而自食之不貪其味復作是念我於長夜愛著其身欲令充飽而受飲食今以此食惠施衆生願我於身永斷貪著是名分減施云何為菩薩竭盡施佛子此菩薩得種種上味飲食香華衣服資生之具若自以受用則安樂延年若輟己施人則窮苦夭命時或有人來作是言汝今所有悉當與我菩薩自念我無始已來以飢餓故喪身無數未曾得有如毫末許饒益衆生而獲善利今我亦當同於往昔而捨其命是故應為饒益衆生隨其所有一切皆捨乃至盡命亦無所吝是名竭盡施云何為菩薩內施佛子此菩薩年方少盛端正美好香華衣服以嚴其身始受灌頂轉輪王位七寶具足王四天下時或有人來白王言大王當知我今衰老身嬰重疾焭獨羸頓死將不久若得王身手足血肉頭目骨髓我之身命必冀存活唯願大王莫更籌量有所顧惜但見慈念以施於我爾時菩薩作是念言今我此身後必當死無一利益宜時疾捨以濟衆生念已施之心無所悔是名內施云何為菩薩外施佛子此菩薩年盛色美衆相具足名華上服而以嚴身始受灌頂轉輪王位七寶具足王四天下時或有人來白王言我今貧窶衆苦逼迫唯願仁慈特垂矜念捨此王位以贍於我我當統領受王福樂爾時菩薩作是念言一切榮盛必當衰歇於衰歇時不能復更饒益衆生我今宜應隨彼所求充滿其意作是念已即便施之而無所悔是名外施云何為菩薩內外施佛子此菩薩如上所説處輪王位七寶具足王四天下時或有人而來白言此轉輪位王處已久我未曾得唯願大王捨之與我并及王身為我臣㒒爾時菩薩作是念言我身財寶及以王位悉是無常敗壞之法我今盛壯富有天下乞者現前當以不堅而求堅法作是念已即便施之乃至以身恭勤作役心無所悔是名內外施云何為菩薩一切施佛子此菩薩亦如上説處輪王位七寶具足王四天下時有無量貧窮之人來詣其前而作是言大王名稱周聞十方我等欽風故來至此吾曹今者各有所求願普垂慈令得滿足時諸貧人從彼大王或乞國土或乞妻子或乞手足血肉心肺頭目髓腦菩薩是時心作是念一切恩愛會當別離而於衆生無所饒益我今為欲永捨貪愛以此一切必離散物滿衆生願作是念已悉皆施與心無悔恨亦不於衆生而生厭賤是名一切施云何為菩薩過去施此菩薩聞過去諸佛菩薩所有功德聞已不著了達非有不起分別不貪不味亦不求取無所依倚見法如夢無有堅固於諸善根不起有想亦無所倚但為教化取著衆生成熟佛法而為演説又復觀察過去諸法十方推求都不可得作是念已於過去法畢竟皆捨是名過去施云何為菩薩未來施此菩薩聞未來諸佛之所修行了達非有不取於相不別樂往生諸佛國土不味不著亦不生厭不以善根回向於彼亦不於彼而退善根常勤修行未曾廢捨但欲因彼境界攝取衆生為説真實令成熟佛法然此法者非有處所非無處所非內非外非近非遠復作是念若法非有不可不捨是名未來施云何為菩薩現在施此菩薩聞四天王衆天三十三天夜摩天兜率陀天化樂天他化自在天梵天梵身天梵輔天梵衆天大梵天光天少光天無量光天光音天淨天少淨天無量淨天遍淨天廣天少廣天無量廣天廣果天無煩天無熱天善見天善現天色究竟天乃至聞聲聞緣覺具足功德聞已其心不迷不沒不聚不散但觀諸行如夢不實無有貪著為令衆生捨離惡趣心無分別修菩薩道成就佛法而為開演是名現在施云何為菩薩究竟施佛子此菩薩假使有無量衆生或有無眼或有無耳或無鼻舌及以手足來至其所告菩薩言我身薄祜諸根殘缺唯願仁慈以善方便捨己所有令我具足菩薩聞之即便施與假使由此經阿僧祇劫諸根不具亦不心生一念悔惜但自觀身從初入胎不淨微形胞段諸根生老病死又觀此身無有真實無有慚愧非賢聖物臭穢不潔骨節相持血肉所塗九孔常流人所惡賤作是觀已不生一念愛著之心復作是念此身危脆無有堅固我今云何而生戀著應以施彼充滿其願如我所作以此開導一切衆生令於身心不生貪愛悉得成就清淨智身是名究竟施是為菩薩摩訶薩第六施藏論第六佛子已下至施藏有九十三行經於此段中復分為二一佛子已下至分減施有三行半經明都舉十種施藏分二此菩薩已下直至是名菩薩第六施藏總説前十種施藏分已上十種施理事盡含如文自具經佛子何等為菩薩摩訶薩慧藏此菩薩於色如實知色集如實知色滅如實知色滅道如實知於受想行識如實知受想行識集如實知受想行識滅如實知受想行識滅道如實知於無明如實知無明集如實知無明滅如實知無明滅道如實知於愛如實知愛集如實知愛滅如實知愛滅道如實知於聲聞如實知聲聞法如實知聲聞集如實知聲聞涅槃如實知於獨覺如實知獨覺法如實知獨覺集如實知獨覺涅槃如實知於菩薩如實知菩薩法如實知菩薩集如實知菩薩涅槃如實知云何知知從業報諸行因緣之所造作一切虗假空無有實非我非堅固無有少法可得成立欲令衆生知其實性廣為宣説為説何等説諸法不可壞何等法不可壞色不可壞受想行識不可壞無明不可壞聲聞法獨覺法菩薩法不可壞何以故一切法無作無作者無言説無處所不生不起不與不取無動轉無作用菩薩成就如是等無量慧藏以少方便了一切法自然明達不由他悟此慧無盡藏有十種不可盡故説為無盡何等為十所謂多聞善巧不可盡故親近善知識不可盡故善分別句義不可盡故入深法界不可盡故以一味智莊嚴不可盡故集一切福德心無疲倦不可盡故入一切陀羅尼門不可盡故能分別一切衆生語言音聲不可盡故能斷一切衆生疑惑不可盡故為一切衆生現一切佛神力教化調伏令修行不斷不可盡故是為十是為菩薩摩訶薩第七慧藏住此藏者得無盡智慧普能開悟一切衆生論第七佛子已下至開悟一切衆生有三十行經於此段中復分為五一佛子已下至涅槃如實知有十一行經且舉如實知世間法出世間法根末所集體相分二云何知已下至廣為宣説有三行經明都舉前法從緣所生本無所有分三為説何等已下至不由他悟有六行經明正説前受想行等無體成壞分四此慧藏已下至是為十有八行半經明十不可盡分五已下一行半經明得法善説分經佛子何等為菩薩摩訶薩念藏此菩薩捨離癡惑得具足念憶念過去一生二生乃至十生百生千生百千生無量百千生成劫壞劫成壞劫非一成劫非一壞劫非一成壞劫百劫千劫百千億那由他乃至無量無數無邊無等不可數不可稱不可思不可量不可説不可説不可説劫念一佛名號乃至不可説不可説佛名號念一佛出世説授記乃至不可説不可説佛出世説授記念一佛出世説修多羅乃至不可説不可説佛出世説修多羅如修多羅祇夜授記伽陀尼陀那憂陀那本事本生方廣未曾有譬喻論議亦如是念一衆會乃至不可説不可説衆會念演一法乃至演不可説不可説法念一根種種性乃至不可説不可説根種種性念一根無量種種性乃至不可説不可説根無量種種性念一煩惱種種性乃至不可説不可説煩惱種種性念一三昧種種性乃至不可説不可説三昧種種性此念有十種所謂寂靜念清淨念不濁念明徹念離塵念離種種塵念離垢念光耀念可愛樂念無際礙念菩薩住是念時一切世間無能嬈亂一切異論無能變動往世善根悉得清淨於諸世法無所染著衆魔外道所不能壞轉身受生無所忘失過現未來説法無盡於一切世界中與衆生同住曾無過咎入一切諸佛衆會道場無所障礙一切佛所悉得親近是名菩薩摩訶薩第八念藏論第八佛子已下至念藏有二十七行經於中大意復分為二一佛子已下至不可説三昧種種性有十八行經明得無限正念諸法分二此念有十種已下至第八念藏有九行經明得十正念時於一切法無過失分如十二部經名中祇夜此云應誦伽陀此云諷誦尼陀那此云因緣經優陀那此云無問自説經佛子何等為菩薩摩訶薩持藏此菩薩持諸佛所説修多羅文句義理無有忘失一生持乃至不可説不可説生持持一佛名號乃至不可説不可説佛名號持一劫數乃至不可説不可説劫數持一佛授記乃至不可説不可説佛授記持一修多羅乃至不可説不可説修多羅持一衆會乃至不可説不可説衆會持演一法乃至演不可説不可説法持一根無量種種性乃至不可説不可説根無量種種性持一煩惱種種性乃至不可説不可説煩惱種種性持一三昧種種性乃至不可説不可説三昧種種性佛子此持藏無邊難滿難至其底難得親近無能制伏無量無盡具大威力是佛境界唯佛能了是名菩薩摩訶薩第九持藏論第九佛子已下有十四行經於中大意復分為二一佛子已下至不可説三昧種種性有十一行半經明聞持一切諸法無限分二佛子已下有三行經明此位菩薩所説諸法無限唯佛能了知故名持藏分經佛子何等為菩薩摩訶薩辨藏此菩薩有深智慧了知實相廣為衆生演説諸法不違一切諸佛經典説一品法乃至不可説不可説品法説一佛名號乃至不可説不可説佛名號如是説一世界説一佛授記説一修多羅説一衆會説演一法説一根無量種種性説一煩惱無量種種性説一三昧無量種種性乃至説不可説不可説三昧無量種種性或一日説或半月一月説或百年千年百千年説或一劫百劫千劫百千劫説或百千億那由他劫説或無數無量乃至不可説不可説劫説劫數可盡一文一句義理難盡何以故此菩薩成就十種無盡藏故成就此藏得攝一切法陀羅尼門現在前百萬阿僧祇陀羅尼以為眷屬得此陀羅尼已以法光明廣為衆生演説於法其説法時以廣長舌出妙音聲充滿十方一切世界隨其根性悉令滿足心得歡喜滅除一切煩惱纏垢善入一切音聲言語文字辨才令一切衆生佛種不斷淨心相續亦以法光明而演説法無有窮盡不生疲倦何以故此菩薩成就盡虗空遍法界無邊身故是為菩薩摩訶薩第十辨藏此藏無窮盡無分段無間無斷無變異無隔礙無退轉甚深無底難可得入普入一切佛法之門論第十佛子已下一段有二十四行經於中其意復分為三一佛子已下至何以故有十二行經明此位菩薩辨藏無盡分二此菩薩成就十種無盡藏已下至第十辨藏有十行經明正説十種辨藏分三有兩行經明辨藏無限分經佛子此十種無盡藏有十種無盡法令諸菩薩究竟成就無上菩提何等為十饒益一切衆生故以本願善回向故一切劫無斷絶故盡虗空界悉開悟心無限故回向有為而不著故一念境界一切法無盡故大願心無變異故善攝取諸陀羅尼故一切諸佛所護念故了一切法皆如幻故是為十種無盡法能令一切世間所作悉得究竟無盡大藏論第十一段中有八行經明總舉前十藏成後回向法門分此十種藏為成當位自分十行令成滿故亦成後十回向法門故每位皆然已上釋十行法門竟音切諂丑琰切誑居況切姊子音妹昧音瞋昌真切癡丑之切皺側救切嬰於盈切焭渠營切羸力為切髓息委切籌直由切窶其矩切迫百音贍市艷切矜居令切詣魚計切役亦音腦奴老切肺芳計切祜胡古切缺苦穴切胞包音胎台音穢於廢切嬈乃鳥切遞特計切
