故如是此品説佛位內普賢行願虗空不可量剎塵不可比無限重重無限重重廣如經自具如是多劫是一剎那際多如是如來普賢行是一剎那中無盡故準前第二會所問合有十頂品來文未至壽量品第三十一論將釋此品約作三門一釋品來意二釋説教之主三隨文釋義一釋品來意者明前品既是阿僧祇此即合便有壽量二釋説教之主者説此品教主以心王菩薩説者明佛壽量以心王為體以心王表命自在故即明如來心王之命隨根延促長短任物自在而實如來無壽命者無長短者故三隨文釋義者此之一品經明佛壽量長短約未悟者作節級令知如來壽量無盡以少顯多以短顯長若不如是云何能知佛之壽量然實如來無長短命性無生滅故如來壽命如根本智無生無滅無去無來故約以十佛之命表之無盡故經爾時心王菩薩摩訶薩於衆會中告諸菩薩言佛子此娑婆世界釋迦牟尼佛剎一劫於極樂世界阿彌陀佛剎為一日一夜極樂世界一劫於袈裟幢世界金剛堅佛剎為一日一夜袈裟幢世界一劫於不退轉音聲輪世界善勝光明蓮華開敷佛剎為一日一夜不退轉音聲輪世界一劫於離垢世界法幢佛剎為一日一夜離垢世界一劫於善燈世界師子佛剎為一日一夜善燈世界一劫於妙光明世界光明藏佛剎為一日一夜妙光明世界一劫於難超過世界法光明蓮華開敷佛剎為一日一夜難超過世界一劫於莊嚴慧世界一切神通光明佛剎為一日一夜莊嚴慧世界一劫於鏡光明世界月智佛剎為一日一夜佛子如是次第乃至過百萬阿僧祇世界最後世界一劫於勝蓮華世界賢勝佛剎為一日一夜普賢菩薩及諸同行大菩薩等充滿其中菩薩住處品第三十二論將釋此品約作三門一釋品來意二釋説法之主三隨文釋義一釋品來意者前有如來壽命住劫此品佛以菩薩行持世間人間海中攝化遍故此方如是十方國土及閻浮提例然且約住處雖有所依化行無方不至總是身含佛剎毛容法界之衆於剎那際應十方而等周對現色身隨根普見為明菩薩住持攝化境界此品須來二釋説法之主者明菩薩攝化住持之行是心王自在隨智之行故令心王菩薩説此住處之品總明隨自心王起智用故明以普賢行隨行成忍已後皆名心王於世自在明不與物違經爾時心王菩薩摩訶薩於衆會中告諸菩薩言佛子東方有處名仙人山從昔已來諸菩薩衆於中止住現有菩薩名金剛勝與其眷屬諸菩薩衆三百人俱常在其中而演説法南方有處名勝峯山從昔已來諸菩薩衆於中止住現有菩薩名曰法慧與其眷屬諸菩薩衆五百人俱常在其中而演説法西方有處名金剛𦦨山從昔已來諸菩薩衆於中止住現有菩薩名精進無畏行與其眷屬諸菩薩衆三百人俱常在其中而演説法北方有處名香積山從昔已來諸菩薩衆於中止住現有菩薩名曰香象與其眷屬諸菩薩衆三千人俱常在其中而演説法東北方有處名清涼山從昔已來諸菩薩衆於中止住現有菩薩名文殊師利與其眷屬諸菩薩衆一萬人俱常在其中而演説法海中有處名金剛山從昔已來諸菩薩衆於中止住現有菩薩名曰法起與其眷屬諸菩薩衆千二百人俱常在其中而演説法東南方有處名支提山從昔已來諸菩薩衆於中止住現有菩薩名曰天𭁺與其眷屬諸菩薩衆一千人俱常在其中而演説法西南方有處名光明山從昔已來諸菩薩衆於中止住現有菩薩名曰賢勝與其眷屬諸菩薩衆三千人俱常在其中而演説法西北方有處名香風山從昔已來諸菩薩衆於中止住現有菩薩名曰香光與其眷屬諸菩薩衆五千人俱常在其中而演説法大海之中復有住處名莊嚴窟從昔已來諸菩薩衆於中止住毗舍離南有一住處名善住根從昔已來諸菩薩衆於中止住摩度羅城有一住處名滿足窟從昔已來諸菩薩衆於中止住俱珍那城有一住處名曰法座從昔已來諸菩薩衆於中止住清淨彼岸城有一住處名目真鄰陀窟從昔已來諸菩薩衆於中止住摩蘭陀國有一住處名無礙龍王建立從昔已來諸菩薩衆於中止住甘菩遮國有一住處名出生慈從昔已來諸菩薩衆於中止住震旦國有一住處名那羅延窟從昔已來諸菩薩衆於中止住疏勒國有一住處名牛頭山從昔已來諸菩薩衆於中止住迦葉彌羅國有一住處名曰次第從昔已來諸菩薩衆於中止住增長歡喜城有一住處名尊者窟從昔已來諸菩薩衆於中止住菴浮梨摩國有一住處名見億藏光明從昔已來諸菩薩衆於中止住乾陀羅國有一住處名苫婆羅窟從昔已來諸菩薩衆於中止住論三隨文釋義者支提山者此云淨信為此山見者能生淨信毗舍離城此云廣博為於中印度中最廣大故亦名廣嚴城摩度羅城者此云孔城亦云密蓋皆因古事立名俱珍那城亦名俱陳那俱陳者此云大盆於大盆中畜水若池恆於盆側修仙法常為人説護淨經及養生經後學之徒皆以師法為姓今城因此為稱目真鄰陀窟此云解脫是龍名也鄰陀此云處以有龍在此處聞法得解脫故因此為名摩蘭陀國未翻甘菩遮國未翻震旦或曰支那亦云真丹此翻為思慮為此國人多思慮計度以之為名是此漢國也那羅延此云堅牢疏勒國正云佉路數怛勒此方存略但云疏勒迦葉彌羅國舊云罽賓國此翻為阿誰入昔此國未立之時其有大龍池人莫敢近其後有一羅漢見其形勝宜人居止乃從龍乞容一膝地龍乃許之羅漢化身令大其膝漸滿池中龍以言信捨之而去羅漢以神力乾竭其水令百姓居之建立屋宅衆人咸言我等不因聖師阿誰得入此處故從此語以立其名其國即在北印度境乾陀羅國此云持地以此國多有賢聖居在此國不為他國所侵害故又云乾陀是香羅謂陀羅此云遍也言此國內多生香氣遍故在中印度北北印度南二界中間苫婆羅窟是香華樹名其窟側近多生此樹因名耳此之一品大意明菩薩攝生住持不斷三寶之行但舉此一閻浮提表十方剎土及一切閻浮提總皆準此已上加第三禪佛華會以為七會通下離世間普光明殿中會及法界品逝多林會總為十會音切胝陟尼切庾以主切襟居凝切禰乃禮切鈴巨炎切攞郎可切贍市豔切抾去業切擔丁含切蒱蒲胡切怛丹達切勃薄沒切部迷切薜蒲計切窣倉沒切睥普計切䜝莫計切畔伴音碎蘇外切疏疏音苫式占切垶息營切壤如兩切罽古詣切垓柯開切
