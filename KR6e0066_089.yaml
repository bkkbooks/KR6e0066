body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之二經下方過不可説佛剎微塵數世界海外有世界名一切如來圓滿光普照佛號虗空無礙相智幢王彼佛衆中有菩薩名破一切障勇猛智王與世界海微塵數菩薩俱來向佛所於一切毛孔中出説一切衆生語言海音聲雲出説一切三世菩薩修行方便海音聲雲出説一切菩薩所起願方便海音聲雲出説一切菩薩成滿清淨波羅蜜方便海音聲雲出説一切菩薩圓滿行遍一切剎音聲雲出説一切菩薩成就自在用音聲雲出説一切如來往詣道場破魔軍衆成等正覺自在用音聲雲出説一切如來轉法輪契經門名號海音聲雲出説一切隨應教化調伏衆生法方便海音聲雲出説一切隨時隨善根隨願力普令衆生證得智慧方便海音聲雲到佛所已頂禮佛足即於下方化作現一切如來宮殿形像衆寶莊嚴樓閣及一切寶蓮華藏師子之座著普現道場影摩尼寶冠與其眷屬結跏趺坐上方過不可説佛剎微塵數世界海外有世界名説佛種性無有盡佛號普智輪光明音彼佛衆中有菩薩名法界差別願與世界海微塵數菩薩俱發彼道場來向此娑婆世界釋迦牟尼佛所於一切相好一切毛孔一切身分一切肢節一切莊嚴具一切衣服中現毗盧遮那等過去一切諸佛未來一切諸佛已得授記未授記者現在十方一切國土一切諸佛并其衆會示現過去行檀那波羅蜜及其一切受布施者諸本事海亦現過去行尸羅波羅蜜諸本事海亦現過去行羼提波羅蜜割截肢體心無動亂諸本事海亦現過去行精進波羅蜜勇猛不退諸本事海亦現過去求一切如來禪波羅蜜海而得成就諸本事海亦現過去求一切佛所轉法輪所成就法發勇猛心一切皆捨諸本事海亦現過去樂見一切佛樂行一切菩薩道樂化一切衆生界諸本事海亦現過去所發一切菩薩大願清淨莊嚴諸本事海亦現過去菩薩所成力波羅蜜勇猛清淨諸本事海亦現過去一切菩薩所修圓滿智波羅蜜諸本事海如是一切本事海悉皆遍滿廣大法界至佛所已頂禮佛足即於上方化作一切金剛藏莊嚴樓閣及帝青金剛王蓮華藏師子之座以一切寶光明摩尼王網羅覆其身以演説三世如來名摩尼寶王為髻明珠與其眷屬結跏趺坐論十四爾時東方過不可説佛剎已下至與其眷屬結跏趺坐已下有十段經明十方菩薩來集分明法界中佛果不可説佛剎微塵數本行答前菩薩所問總是自佛果行無盡遍周是故世界名金剛燈雲幢金剛燈雲幢者大悲雨衆法明一切佛皆從此金剛智起大悲之行摧破諸衆生煩惱故名幢也佛號毗盧遮那勝德王者即是行中之果菩薩亦名毗盧遮那願光明者是明以果隨昔願行大慈悲故王者明佛果隨行種種自在無礙以從金剛智起故以是果行名同故與不可説佛剎微塵數菩薩俱來者言行滿令諸菩薩會此法故故云來也此明檀波羅蜜中主伴行滿所有諸來菩薩皆以寶網嚴身者明教行滿故已下九方總以十波羅蜜以次排之總是一佛之金剛智上總別同異之行倣此例知已下如文自明但釋經大意法門經中自具已上六段是答前兩度共四十種問已下亦是前之五段答前問佛三昧神力及佛報境次下十方來集菩薩衆是往所修行身於依報中答前往因所修諸地十波羅蜜以明行滿故莊嚴身亦滿有十箇佛國十佛名號是所行行中因果十佛皆號王者皆明佛果智自在菩薩以網羅覆其身皆明教網具足經如是十方一切菩薩并其眷屬皆從普賢菩薩行願中生以淨智眼見三世佛普聞一切諸佛如來所轉法輪修多羅海已得至於一切菩薩自在彼岸於念念中現大神變親近一切諸佛如來一身充滿一切世界一切如來衆會道場於一塵中普現一切世間境界教化成就一切衆生未曾失時一毛孔中出一切如來説法音聲知一切衆生悉皆如幻知一切佛悉皆如影知一切諸趣受生悉皆如夢知一切業報如鏡中像知一切諸有生起如熱時𦦨知一切世界皆如變化成就如來十力無畏勇猛自在能師子吼深入無盡辨才大海得一切衆生言辭海諸法智於虗空法界所行無礙知一切法無有障礙一切菩薩神通境界悉已清淨勇猛精進摧伏魔軍恆以智慧了達三世知一切法猶如虗空無有違諍亦無取著雖勤精進而知一切智終無所來雖觀境界而知一切有悉不可得以方便智入一切法界以平等智入一切國土以自在力令一切世界展轉相入於一切世界處處受生見一切世界種種形相於微細境現廣大剎於廣大境現微細剎於一佛所一念之頃得一切佛威神所加普見十方無所迷惑於剎那頃悉能往詣如是等一切菩薩滿逝多林皆是如來威神之力論十五如是十方一切菩薩已下至皆是如來威神之力有三十五行經歎如上十方諸來菩薩至德用分又就以報上又加神通所嚴初陳樓閣莊嚴次陳寶地遍周莊嚴次陳虗空莊嚴次陳十方諸菩薩來集身相莊嚴一一莊嚴皆映徹相入互體重重十方諸佛菩薩衆海身土及莊嚴一一相入自在無礙者但約法身根本智為體差別智報得萬事合然故設一切如來起一切神通不離此智起大用故無不自在無不相入無不明淨如是之智以如上五位和會進修乃得成故獨修一法不可得也只可多不離一不可守一以為自然此逝多林及一切法界國土莊嚴不離二法一約往昔所修行理智大慈大悲大願衆行所成二以佛菩薩不思議神通所嚴如經自明是答前諸菩薩四十問經于時上首諸大聲聞舍利弗大目揵連摩訶迦葉離婆多須菩提阿䨲樓馱難陀劫賓那迦旃延富樓那等諸大聲聞在逝多林皆悉不見如來神力如來嚴好如來境界如來遊戲如來神變如來尊勝如來妙行如來威德如來住持如來淨剎亦復不見不可思議菩薩境界菩薩大會菩薩普入菩薩普至菩薩普詣菩薩神變菩薩遊戲菩薩眷屬菩薩方所菩薩莊嚴師子座菩薩宮殿菩薩住處菩薩所入三昧自在菩薩觀察菩薩嚬伸菩薩勇猛菩薩供養菩薩受記菩薩成熟菩薩勇健菩薩法身清淨菩薩智身圓滿菩薩願身示現菩薩色身成就菩薩諸相具足清淨菩薩常光衆色莊嚴菩薩放大光網菩薩起變化雲菩薩身遍十方菩薩諸行圓滿如是等事一切聲聞諸大弟子皆悉不見何以故以善根不同故本不修習見佛自在善根故本不讚説十方世界一切佛剎清淨功德故本不稱歎諸佛世尊種種神變故本不於生死流轉之中發阿耨多羅三藐三菩提心故本不令他住菩提心故本不能令如來種性不斷絶故本不攝受諸衆生故本不勸他修習菩薩波羅蜜故本在生死流轉之時不勸衆生求於最勝大智眼故本不修習生一切智諸善根故本不成就如來出世諸善根故本不得嚴淨佛剎神通智故本不得諸菩薩眼所知境故本不求超出世間不共菩提諸善根故本不發一切菩薩諸大願故本不從如來加被之所生故本不知諸法如幻菩薩如夢故本不得諸大菩薩廣大歡喜故如是皆是普賢菩薩智眼境界不與一切二乘所共以是因緣諸大聲聞不能見不能知不能聞不能入不能得不能念不能觀察不能籌量不能思惟不能分別是故雖在逝多林中不見如來諸大神變復次諸大聲聞無如是善根故無如是智眼故無如是三昧故無如是解脫故無如是神通故無如是威德故無如是勢力故無如是自在故無如是住處故無如是境界故是故於此不能知不能見不能入不能證不能住不能解不能觀察不能忍受不能趣向不能遊履又亦不能廣為他人開闡解説稱揚示現引導勸進令其趣向令其修習令其安住令其證入何以故諸大弟子依聲聞乘而出離故成就聲聞道滿足聲聞行安住聲聞果於無有諦得決定智常住實際究竟寂靜遠離大悲捨於衆生住於自事於彼智慧不能積集不能修行不能安住不能願求不能成就不能清淨不能趣入不能通達不能知見不能證得是故雖在逝多林中對於如來不見如是廣大神變論十六于時上首諸大聲聞舍利弗已下至不見如是廣大神變有五十行經明如上聲聞無如是善根之種如來居逝多林神變莊嚴廣大佛剎菩薩衆海為宿世無根皆悉不見分第二釋聲聞衆名者舍利弗以其母眼明利如鶖鷺鳥目以母之目似鶖鳥狀以為子號大目揵連者此云採菽氏以母姓菽以為名故母是菉豆山之苗裔故摩訶迦葉者以身金色能飲日光在其身像亦云是飲光仙人之裔也摩訶云大離婆多者此云供養須菩提者此云善現阿䨲樓馱此云無滅難陀此云歡喜劫賓那此云黃色是往昔黃頭仙之裔也迦旃延者是一宗之性是此胤故延為胤也富樓那者母號滿慈以取母號如是十大聲聞示同不聞不見如來不思議法界變化之事令樂小法者趣求大故前五百聲聞及世主是先已有種者能隨佛所行故經佛子如恆河岸有百千億無量餓鬼倮形飢渴舉體焦然烏鷲豺狼競來搏撮為渴所逼欲求水飲雖住河邊而不見河設有見者見其枯竭何以故深厚業障之所覆故彼大聲聞亦復如是雖復住在逝多林中不見如來廣大神力捨一切智無明翳瞙覆其眼故不曾種植薩婆若地諸善根故譬如有人於大會中昏睡安寢忽然夢見須彌山頂帝釋所住善見大城宮殿園林種種嚴好天子天女百千萬億普散天華遍滿其地種種衣樹出妙衣服種種華樹開敷妙華謂音樂樹奏天音樂天諸婇女歌詠美音無量諸天於中戲樂其人自見著天衣服普於其處住止周旋其大會中一切諸人雖同一處不知不見何以故夢中所見非彼大衆所能見故一切菩薩世間諸王亦復如是以久積集善根力故發一切智廣大願故學習一切佛功德故修行菩薩莊嚴道故圓滿一切智智法故滿足普賢諸行願故趣入一切菩薩智地故遊戲一切菩薩所住諸三昧故已能觀察一切菩薩智慧境界無障礙故是故悉見如來世尊不可思議自在神變一切聲聞諸大弟子皆不能見皆不能知以無菩薩清淨眼故譬如雪山具衆藥草良醫詣彼悉能分別其諸捕獵放牧之人恆住彼山不見其藥此亦如是以諸菩薩入智境界具自在力能見如來廣大神變諸大弟子唯求自利不欲利他唯求自安不欲安他雖在林中不知不見譬如地中有諸寶藏種種珍異悉皆充滿有一丈夫聰慧明達善能分別一切伏藏其人復有大福德力能隨所欲自在而取奉養父母賑恤親屬老病窮乏靡不均贍其無智慧無福德人雖亦至於寶藏之處不知不見不得其益此亦如是諸大菩薩有淨智眼能入如來不可思議甚深境界能見佛神力能入諸法門能遊三昧海能供養諸佛能以正法開悟衆生能以四攝攝受衆生諸大聲聞不能得見如來神力亦不能見諸菩薩衆譬如盲人至大寶洲若行若住若坐若臥不能得見一切衆寶以不見故不能採取不得受用此亦如是諸大弟子雖在林中親近世尊不見如來自在神力亦不得見菩薩大會何以故無有菩薩無礙淨眼不能次第悟入法界見於如來自在力故譬如有人得清淨眼名離垢光明一切暗色不能為障爾時彼人於夜暗中處在無量百千萬億人衆之內或行或住或坐或臥彼諸人衆形相威儀此明眼人莫不具見其明眼者威儀進退彼諸人衆悉不能覩佛亦如是成就智眼清淨無礙悉能明見一切世間其所示現神通變化大菩薩衆所共圍繞諸大弟子悉不能見譬如比丘在大衆中入遍處定所謂地遍處定水遍處定火遍處定風遍處定青遍處定黃遍處定赤遍處定白遍處定天遍處定種種衆生身遍處定一切語言音聲遍處定一切所緣遍處定入此定者見其所緣其餘大衆悉不能見唯除有住此三昧者如來所現不可思議諸佛境界亦復如是菩薩具見聲聞莫觀譬如有人以翳形藥自塗其眼在於衆會去來坐立無能見者而能悉覩衆會中事應知如來亦復如是超過於世普見世間非諸聲聞所能得見唯除趣向一切智境諸大菩薩如人生已則有二天恆相隨逐一曰同生二曰同名天常見人人不見天應知如來亦復如是在諸菩薩大集會中現大神通諸大聲聞悉不能見譬如比丘得心自在入滅盡定六根作業皆悉不行一切語言不知不覺定力持故不般涅槃一切聲聞亦復如是雖復住在逝多林中具足六根而不知不見不解不入如來自在菩薩衆會諸所作事何以故如來境界甚深廣大難見難知難測難量超諸世間不可思議無能壞者非是一切二乘境界是故如來自在神力菩薩衆會及逝多林普遍一切清淨世界如是等事諸大聲聞悉不知見非其器故論十七佛子如恆河岸有百億無量餓鬼已下至諸大聲聞悉不知見非其器故有七十四行半經有十種喻比聲聞無有廣大菩提善根在其會中不知不見如來自在分其所有十喻經文自明如是聲聞示同不聞不見如來變化神力境界菩薩海衆令諸實是聲聞回心種如來大願大智大慈悲常處生死廣利衆生故經爾時毗盧遮那願光明菩薩承佛神力觀察十方而説頌言汝等應觀察佛道不思議於此逝多林示現神通力善逝威神力所現無央數一切諸世間迷惑不能了法王深妙法無量難思議所現諸神通舉世莫能測以了法無相是故名為佛而具相莊嚴稱揚不可盡今於此林內示現大神力甚深無有邊言辭莫能辨汝觀大威德無量菩薩衆十方諸國土而來見世尊所願皆具足所行無障礙一切諸世間無能測量者一切諸緣覺及彼大聲聞悉皆不能知菩薩行境界菩薩大智慧諸地悉究竟高建勇猛幢難摧難可動諸大名稱士無量三昧力所現諸神變法界悉充滿爾時不可壞精進王菩薩承佛神力觀察十方而説頌言汝觀諸佛子智慧功德藏究竟菩提行安隱諸世間其心本明達善入諸三昧智慧無邊際境界不可量今此逝多林種種皆嚴飾菩薩衆雲集親近如來住汝觀無所著無量大衆海十方來詣此坐寶蓮華座無來亦無住無依無戲論離垢心無礙究竟於法界建立智慧幢堅固不動搖知無變化法而現變化事十方無量剎一切諸佛所同時悉往詣而亦不分身汝觀釋師子自在神通力能令菩薩衆一切俱來集一切諸佛法法界悉平等言説故不同此衆咸通達諸佛常安住法界平等際演説差別法言辭無有盡爾時普勝無上威德王菩薩承佛神力觀察十方而説頌言汝觀無上士廣大智圓滿善達時非時為衆演説法摧伏衆外道一切諸異論普隨衆生心為現神通力正覺非有量亦復非無量若量若無量牟尼悉超越如日在虗空照臨一切處佛智亦如是了達三世法譬如十五夜月輪無減缺如來亦復然白法悉圓滿譬如空中日運行無暫已如來亦如是神變恆相續譬如十方剎於空無所礙世燈現變化於世亦復然譬如世間地羣生之所依照世燈法輪為依亦如是譬如猛疾風所行無障礙佛法亦如是速遍於世間譬如大水輪世界所依住智慧輪亦爾三世佛所依爾時無礙勝藏王菩薩承佛神力觀察十方而説頌言譬如大寶山饒益諸含識佛智亦如是普益於世間譬如大海水澄淨無垢濁見佛亦如是能除諸渴愛譬如須彌山出於大海中世間燈亦爾從於法海出如海具衆寶求者皆滿足無師智亦然見者悉開悟如來甚深智無量無有數是故神通力示現難思議譬如工幻師示現種種事佛智亦如是現諸自在力譬如如意寶能滿一切欲最勝亦復然滿諸清淨願譬如明淨寶普照一切物佛智亦如是普照羣生心譬如八面寶等鑒於諸方無礙燈亦然普照於法界譬如水清珠能清諸濁水見佛亦如是諸根悉清淨爾時化現法界願月王菩薩承佛神力觀察十方而説頌言譬如帝青寶能青一切色見佛者亦然悉發菩提行一一微塵內佛現神通力令無量無邊菩薩皆清淨甚深微妙力無邊不可知菩薩之境界世間莫能測如來所現身清淨相莊嚴普入於法界成就諸菩薩難思佛國土於中成正覺一切諸菩薩世主皆充滿釋迦無上尊於法悉自在示現神通力無邊不可量菩薩種種行無量無有盡如來自在力為之悉示現佛子善修學甚深諸法界成就無礙智明了一切法善逝威神力為衆轉法輪神變普充滿令世皆清淨如來智圓滿境界亦清淨譬如大龍王普濟諸羣生爾時法慧光𦦨王菩薩承佛神力觀察十方而説頌言三世諸如來聲聞大弟子悉不能知佛舉足下足事去來現在世一切諸緣覺亦不知如來舉足下足事況復諸凡夫結使所纏縛無明覆心識而能知導師正覺無礙智超過語言道其量不可測孰有能知見譬如明月光無能測邊際佛神通亦爾莫見其終盡一一諸方便念念所變化盡於無量劫思惟不能了思惟一切智不可思議法一一方便門邊際不可得若有於此法而興廣大願彼於此境界知見不為難勇猛勤修習難思大法海其心無障礙入此方便門心意已調伏志願亦寬廣當獲大菩提最勝之境界爾時破一切魔軍智幢王菩薩承佛神力觀察十方而説頌言智身非是身無礙難思議設有思議者一切無能及從不思議業起此清淨身殊特妙莊嚴不著於三界光明照一切法界悉清淨開佛菩提門出生衆智慧譬如世間日普放慧光明遠離諸塵垢滅除一切障普淨三有處永絶生死流成就菩薩道出生無上覺示現無邊色此色無依處所現雖無量一切不思議菩提一念頃能覺一切法云何欲測量如來智邊際一念悉明達一切三世法故説佛智慧無盡無能壞智者應如是專思佛菩提此思難思議思之不可得菩提不可説超過語言路諸佛從此生是法難思議爾時願智光明幢王菩薩承佛神力觀察十方而説頌言若能善觀察菩提無盡海則得離癡念決定受持法若得決定心則能修妙行禪寂自思慮永斷諸疑惑其心不疲倦亦復無懈怠展轉增進修究竟諸佛法信智已成就念念令增長常樂常觀察無得無依法無量億千劫所修功德行一切悉回向諸佛所求道雖在於生死而心無染著安住諸佛法常樂如來行世間之所有蘊界等諸法一切皆捨離專求佛功德凡夫嬰妄惑於世常流轉菩薩心無礙救之令解脫菩薩行難稱舉世莫能思遍除一切苦普與羣生樂已獲菩提智復愍諸羣生光明照世間度脫一切衆爾時破一切障勇猛智王菩薩承佛神力觀察十方而説頌言無量億千劫佛名難可聞況復得親近永斷諸疑惑如來世間燈通達一切法普生三世福令衆悉清淨如來妙色身一切所欽歎億劫常瞻仰其心無厭足若有諸佛子觀佛妙色身必捨諸有著回向菩提道如來妙色身恆演廣大音辨才無障礙開佛菩提門曉悟諸羣生無量不思議令入智慧門授以菩提記如來出世間為世大福田普導諸含識令其集福行若有供養佛永除惡道畏消滅一切苦成就智慧身若見兩足尊能發廣大心是人恆值佛增長智慧力若見人中勝決意向菩提是人能自知必當成正覺爾時法界差別願智神通王菩薩承佛神力觀察十方而説頌言釋迦無上尊具一切功德見者心清淨回向大智慧如來大慈悲出現於世間普為諸羣生轉無上法輪如來無數劫勤苦為衆生云何諸世間能報大師恩寧於無量劫受諸惡道苦終不捨如來而求於出離寧代諸衆生備受一切苦終不捨於佛而求得安樂寧在諸惡趣恆得聞佛名不願生善道暫時不聞佛寧生諸地獄一一無數劫終不遠離佛而求出惡趣何故願久住一切諸惡道以得見如來增長智慧故若得見於佛除滅一切苦能入諸如來大智之境界若得見於佛捨離一切障長養無盡福成就菩提道如來能永斷一切衆生疑隨其心所樂普皆令滿足論十八明毗盧遮那菩薩等十菩薩説頌分已下有十菩薩並是十方來者各説一頌各隨自名各歎自法是一切諸佛諸菩薩行皆隨菩薩名下義表其頌意可見如初毗盧遮那願光明菩薩是種種光明直是佛果願光者是佛果菩薩中行從初總歎令諸觀察逝多林如來境界次下九箇是總中別各隨菩薩名下義取所頌之法也如不可壞精進王者還頌不可壞精進義王者自在義已下倣此準知經爾時普賢菩薩摩訶薩普觀一切菩薩衆會以等法界方便等虗空界方便等衆生界方便等三世等一切劫等一切衆生業等一切衆生欲等一切衆生解等一切衆生根等一切衆生成熟時等一切法光影方便為諸菩薩以十種法句開發顯示照明演説此師子嚬伸三昧論十九爾時普賢菩薩已下至嚬伸三昧有六行經明普賢菩薩以十等一切方便門欲演説師子嚬伸三昧分經何等為十所謂演説能示現等法界一切佛剎微塵中諸佛出興次第諸剎成壞次第法句演説能示現等虗空界一切佛剎中盡未來劫讚歎如來功德音聲法句演説能示現等虗空界一切佛剎中如來出世無量無邊成正覺門法句演説能示現等虗空界一切佛剎中佛坐道場菩薩衆會法句演説於一切毛孔念念出現等三世一切佛數變化身充滿法界法句演説能令一身充滿十方一切剎海平等顯現法句演説能令一切諸境界中普現三世諸佛神變法句演説能令一切佛剎微塵中普現三世一切佛剎微塵數佛種種神變經無量劫法句演説能令一切毛孔出生三世一切諸佛大願海音盡未來劫開發化導一切菩薩法句演説能令佛師子座量同法界菩薩衆會道場莊嚴等無差別盡未來劫轉於種種微妙法輪法句佛子此十為首論二十何等為十已下至佛子此十為首有十八行經是十種不可説法句分經有十不可説佛剎微塵數法句皆是如來智慧境界爾時普賢菩薩欲重宣此義承佛神力觀察如來觀察衆會觀察諸佛難思境界觀察諸佛無邊三昧觀察不可思議諸世界海觀察不可思議如幻法智觀察不可思議三世諸佛悉皆平等觀察一切無量無邊諸言辭法而説頌言論二十一有十不可説佛剎微塵數法句都結通已下六行經是普賢菩薩觀佛境界説頌分經一一毛孔中微塵數剎海悉有如來坐皆具菩薩衆一一毛孔中無量諸剎海佛處菩提座如是遍法界一一毛孔中一切剎塵佛菩提衆圍繞為説普賢行佛坐一國土充滿十方界無量菩薩雲咸來集其所億剎微塵數菩薩功德海俱從會中起遍滿十方界悉住普賢行皆遊法界海普現一切剎等入諸佛會安坐一切剎聽聞一切法一一國土中億劫修諸行菩薩所修行普明法海行入於大願海住佛境界地了達普賢行出生諸佛法具佛功德海廣現神通事身雲等塵數充滿一切剎普雨甘露法令衆住佛道論於此十行頌中重頌前十無盡句法意明法界體性無礙一多互參大小相入毛孔微塵悉含一切諸佛剎海一一境界皆互容無礙頌云一一毛孔中微塵數剎海悉有如來坐皆具菩薩衆如經具明已上二十一段經明如來以師子嚬伸三昧令五位中升進普賢萬行法門會入法界性自圓滿本無和會普賢行故自此已下如來放眉間光名普照三世法界門令諸菩薩入安住師子嚬伸三昧門已上二十一段且會法界中普賢差別智無礙行滿遠令普賢説頌歎法已下放眉間光即明已法身根本普光明智與法界中無礙自在差別同異普賢行門理智體用一時同會即令文殊説頌歎法以文殊普賢二體成真俗二智法界平等恆然法門此法界中體用二門若無普賢即差別智不行即就寂無悲行無文殊即普賢行是有為是無常故以此二人之法門成一法界之體用一切諸佛法總如是言其佛者但於此二人體用中無所住名之為佛言住佛所住者佛住無住但於此文殊普賢理智萬行體用中而無所住之智而得佛名是故前普賢是以行彰理門後文殊是以理顯行門為言詮立教即名有前後約其法界二法同資元一體用故且以如來舉緣表法即師子嚬伸三昧屬普賢門眉間毫相光明即屬文殊門以光明是法身妙慧所顯得根本智所起師子嚬伸三昧是差別智中行故二人同體方成法界自在之門表根本智自性無言作用言説是普賢所收若也三法別行即是人天生死設得道者名為眇目矬陋或止宿草庵不入法界大宅門故師子嚬伸三昧者是五位中進修已滿理智會融已終加行疲極頓亡法悅充滿不屬升進任智普周現化神通不為而智境應用不作而佛剎互參極微不為小而無盡佛剎海處中盡虗空不為大亘十方咸處纖毫之內此乃縱任智海現寶剎而互參名曰嚬伸稱理而一多身境相容名為三昧嚬伸者舒適悅樂無勞之義意明前五位升進緣有為無為融通作意疲勞明此法界是升進已滿任智適悅衆法自成無作意勞倦故已下放眉間毫相光明名普照三世法界門此以法身根本智顯行自在門屬文殊師利即下以文殊説頌歎法明令此文殊普賢理智法同行故即佛果自然圓滿但體理智體用法界之意不可逐於紙素竹帛著録鈔寫前後名言為名言不可一時但取理智知其總別同異成壞然為迷情初啓先須諸善行方便以顯理門因理智明如十波羅蜜中九波羅蜜是行唯智波羅蜜是果餘九波羅蜜是助顯智之方便體用以是如來出現品前先明普賢行滿出現品內方明果行一時文殊普賢佛以光加二人共為一箇理智萬行體用令此初以普賢會法界大用之體現師子嚬伸三昧之門印之以三昧是行故次眉間光明名普照三世法界門令諸菩薩安住師子嚬伸三昧者即明法身根本智照現差別智為一體用方名入法界門是故已前二十一段經是以行會理無著門即以普賢為主文殊為伴已下如來放眉間光名普照三世法界門即是以理會行圓融自在無礙門即以文殊為主普賢為伴如是主伴參融方名法界自在從爾時世尊欲令諸菩薩安住如來師子嚬伸廣大三昧故已下直至不離此逝多林如來之所名以理會行圓融自在無礙門於此段中復分為六段經爾時世尊欲令諸菩薩安住如來師子嚬伸廣大三昧故從眉間白毫相放大光明其光名普照三世法界門以不可説佛剎微塵數光明而為眷屬普照十方一切世界海諸佛國土時逝多林菩薩大衆悉見一切盡法界虗空界一切佛剎一一微塵中各有一切佛剎微塵數諸佛國土種種名種種色種種清淨種種住處種種形相如是一切諸國土中皆有大菩薩坐於道場師子座上成等正覺菩薩大衆前後圍繞諸世間主而為供養或見於不可説佛剎量大衆會中出妙音聲充滿法界轉正法輪或見在天宮殿龍宮殿夜叉宮殿乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等諸宮殿中或在人間村邑聚落王都大處現種種姓種種名種種身種種相種種光明住種種威儀入種種三昧現種種神變或時自以種種言音或令種種諸菩薩等在於種種大衆會中種種言辭説種種法如此會中菩薩大衆見於如是諸佛如來甚深三昧大神通力如是盡法界虗空界東西南北四維上下一切方海中依於衆生心想而住始從前際至今現在一切國土身一切衆生身一切虗空道其中一一毛端量處一一各有微塵數剎種種業起次第而住悉有道場菩薩衆會皆亦如是見佛神力不壞三世不壞世間於一切衆生心中現其影像隨一切衆生心樂出妙言音普入一切衆會中普現一切衆生前色相有別智慧無異隨其所應開示佛法教化調伏一切衆生未曾休息其有見此佛神力者皆是毗盧遮那如來於往昔時善根攝受或昔曾以四攝所攝或是見聞憶念親近之所成熟或是往昔教其令發阿耨多羅三藐三菩提心或是往昔於諸佛所同種善根或是過去以一切智善巧方便教化成熟是故皆得入於如來不可思議甚深三昧盡法界虗空界大神通力或入法身或入色身或入往昔所成就行或入圓滿諸波羅蜜或入莊嚴清淨行輪或入菩薩諸地或入成正覺力或入佛所住三昧無差別大神變或入如來力無畏智或入佛無礙辨才海彼諸菩薩以種種解種種道種種門種種入種種理趣種種隨順種種智慧種種助道種種方便種種三昧入如是等十不可説佛剎微塵數佛神變海方便門論一爾時世尊欲令諸菩薩已下至佛神變海方便門有四十四行經明諸菩薩蒙佛光照得無量神變海方便門分爾時世尊欲令諸菩薩安住師子嚬伸三昧放眉間白毫相光明名普照三世法界門者以此光是法性身中根本普光明智此智現前時即見三世久遠如今一體無盡劫生死亦不移現前總無體性成大智海衆法清涼便以衆生起差別智知根利生普周剎海無有休息名為普賢行即經已下文中獲不可説諸三昧門教化無限諸衆生門具如經説如文自具音切羼初限切焦初消切鷲就音捕步音獵良涉切賑章刃切恤息聿切牧木音䨲奴豆切裸郎果切鶖秋音鷺路音菽式竹切裔余制切矬昨禾切翳於計切瞙莫音
