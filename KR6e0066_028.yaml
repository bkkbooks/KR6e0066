body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論光明覺品第九之餘經爾時光明過百萬世界徧照東方一億世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中各見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍遶悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲說此頌言智慧無等法無邊超諸有海到彼岸壽量光明悉無比此功德者方便力所有佛法皆明了常觀三世無厭倦雖緣境界不分別此難思者方便力樂觀眾生無生想普見諸趣無趣想恒住禪寂不繫心此無礙慧方便力善巧通達一切法正念勤修涅槃道樂於解脫離不平此寂滅人方便力有能勸向佛菩提趣如法界一切智善化眾生入於諦此住佛心方便力佛所說法皆隨入廣大智慧無所礙一切處行悉已臻此自在修方便力恒住涅槃如虗空隨心化現靡不周此依無相而為相到難到者方便力晝夜日月及年劫世界始終成壞相如是憶念悉了知此時數智方便力一切眾生有生滅色與非色想非想所有名字悉了知此住難思方便力過去現在未來世所有言說皆能了而知三世悉平等此無比解方便力論八二十行頌歎如來智慧方便德令信心者樂學修行故經爾時光明過一億世界徧照東方十億世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍遶悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲說此頌言廣大苦行皆修習日夜精勤無厭怠已度難度師子吼普化眾生是其行眾生流轉愛欲海無明網覆大憂迫至仁勇猛悉斷除誓亦當然是其行世間放逸著五欲不實分別受眾苦奉行佛教常攝心誓度於斯是其行眾生著我入生死求其邊際不可得普事如來獲妙法為彼宣說是其行眾生無怙病所纏常淪惡趣起三毒大火猛𦦨恒燒熱淨心度彼是其行眾生迷惑失正道常行邪徑入闇宅為彼大然正法燈永作照明是其行眾生漂溺諸有海憂難無涯不可處為彼興造大法船皆令得度是其行眾生無知不見本迷惑癡狂險難中佛哀愍彼建法橋正念令昇是其行見諸眾生在險道老病死苦常逼迫修諸方便無限量誓當悉度是其行聞法信解無疑惑了性空寂不驚怖隨形六道徧十方普教羣迷是其行論九二十行頌歎如來廣大苦行精進德令信心者修行故經爾時光明過十億世界徧照東方百億世界千億世界百千億世界那由他億世界百那由他億世界千那由他億世界百千那由他億世界如是無數無量無邊無等不可數不可稱不可思不可量不可說盡法界虗空界所有世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍遶悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲說此頌言一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力十方無比善名稱永離諸難常歡喜普詣一切國土中廣為宣揚如是法為利眾生供養佛如其意獲相似果於一切法悉順知徧十方中現神力從初供佛意柔忍入深禪定觀法性普勸眾生發道心以此速成無上果十方求法情無異為修功德令滿足有無二相悉滅除此人於佛為真見普往十方諸國土廣說妙法興義利住於實際不動搖此人功德同於佛如來所轉妙法輪一切皆是菩提分若能聞已悟法性如是之人常見佛不見十力空如幻雖見非見如盲覩分別取相不見佛畢竟離著乃能見眾生隨業種種別十方內外難盡見佛身無礙徧十方不可盡見亦如是譬如空中無量剎無來無去徧十方生成滅壞無所依佛徧虗空亦如是論十二十行頌歎如來實性無三世德無二相徧周一切令信心者修學故已上文殊師利說此十頌歎佛十德令起信心者發信進修行故此光明覺品舉佛果法令信心者正自入信信同諸佛果法不移法身不動智菩薩行徧周一體自古及今更無他法凡聖一性同無性味同大願大慈大悲大智文殊妙慧普賢萬行之味總為動寂一體用故如是信修從初發心一時竝進以此十信位內置一百四十大願成大悲行法身慧身智身一時俱進故法身者即十色世界是智身者即十智佛是慧身者即文殊師利是大悲者即一百四十大願成之是如是已上諸法皆是此光明覺品悉皆信入如問明品即是已入信中問答法則成其信力修行故問曰何故成十信門皆文殊師利說法答曰為明文殊是十方諸佛妙慧善簡擇正邪正邪既定方以行修行即名普賢行也次第合然故明文殊師利是童子菩薩以因創發啟蒙入信之首故因行成名也問曰五位法中菩薩入定方說何故信位不入定說答信是凡夫生滅心信未入證故無定也以五位是入體應真無作之理智非無思而顯不可以有情求之故須入定菩薩問明品第十論將釋此品約分三門一釋品名目二釋品來意三隨文釋義一釋品名目者為成十種信根長十種信力文殊師利覺首等互為主伴問十種法明故故為問明品二釋品來意者前品如來足下輪中放光開覺所照佛境遠近令信心者一一觀之無礙令心行廣大稱法界故又文殊師利菩薩以十偈頌歎佛十德勸令信心者修行故此問明品即是明十信心者正修行之行及斷疑故有此品來也三隨文釋義者於此品一段文中有十一段經明文殊覺首十菩薩等互為主伴問十種法明各以菩薩之名即表十信所行之行文殊還以名下之行以相諮問十菩薩等各以自行之法以頌答之令信心者依而倣學其十問十頌其文如下最下一段都結十方同此經爾時文殊師利菩薩問覺首菩薩言佛子心性是一云何見有種種差別所謂往善趣惡趣諸根滿缺受生同異端正醜陋苦樂不同業不知心心不知業受不知報報不知受心不知受受不知心因不知緣緣不知因智不知境境不知智時覺首菩薩以頌答曰仁今問是義為曉悟羣蒙我如其性答唯仁應諦聽諸法無作用亦無有體性是故彼一切各各不相知譬如河中水湍流競奔逝各各不相知諸法亦如是亦如大火聚猛𦦨同時發各各不相知諸法亦如是又如長風起遇物咸鼓扇各各不相知諸法亦如是又如眾地界展轉因依住各各不相知諸法亦如是眼耳鼻舌身心意諸情根以此常流轉而無能轉者法性本無生示現而有生是中無能現亦無所現物眼耳鼻舌身心意諸情根一切空無性妄心分別有如理而觀察一切皆無性法眼不思議此見非顛倒若實若不實若妄若非妄世間出世間但有假言說論第一爾時文殊師利菩薩已下六行經是文殊菩薩起二十問善惡因果或一字一問或一句一問總有二十問向下十一行頌是覺首菩薩答初一行頌是歎能問之人及勸聽後十行頌是答所問之法文殊善問世間善惡因果不相知業能成就善惡因果覺首菩薩便以法不相知以真理答但為迷真自作業爾知真者但以全業是真末後一行頌明真妄總亡舉喻及法說故如文自具思之可見文順理顯不煩更釋於此十一行頌中義分為三一科頌意二釋菩薩名三配隨位因果一科頌意者此十一行一行是一頌初行歎能問及勸聽次下十行文各自具明初一行頌頌法無作無性次一行舉喻水流不相知准意知之不煩更科二釋菩薩名者為明覺此隨流生死業體本性恒真而無流轉眼耳鼻舌身意恒如法知非流轉生死性故亦無虗妄亦無真實但為無貪瞋癡愛真智慧法名之為真故說如斯法利眾生故名為自覺覺他大道心眾生者故為以此當體無明諸業因果上自覺覺他令知法界自性真理真妄兩亡名為覺首以信此法初名之為首此明十信初心全信自身眼耳鼻舌身意及以一切眾生全體真妄兩亡唯佛智海故故以不動智佛十智如來為十信位中自己果故金色世界妙色世界蓮華色世界等十色世界是十信之中所信之理文殊師利覺首財首等十菩薩眾是十信之行以行立名得名知行一一菩薩倣行解上而立名故已下菩薩例然世界名妙色即是覺首菩薩所覺之理無礙智佛即是覺首當位所修佛果以此信心明諸業因果真妄兩亡即智用無礙故三配隨位因果者常以自心本不動智佛為本信心之因以進修得此無礙智佛是隨位佛果此乃但依問答及菩薩名號佛名號世界形色取其意趣理自分明勿須疑也經爾時文殊師利菩薩問財首菩薩言佛子一切眾生非眾生云何如來隨其時隨其命隨其身隨其行隨其解隨其言論隨其心樂隨其方便隨其思惟隨其觀察於如是諸眾生中為現其身教化調伏時財首菩薩以頌答曰此是樂寂滅多聞者境界我為仁宣說仁今應聽受分別觀內身此中誰是我若能如是解彼達我有無此身假安立住處無方所諦了是身者於中無所著於身善觀察一切皆明見知法皆虗妄不起心分別壽命因誰起復因誰退滅猶如旋火輪初後不可知智者能觀察一切有無常諸法空無我永離一切相眾報隨業生如夢不真實念念常滅壞如前後亦爾世間所見法但以心為主隨解取眾相顛倒不如實世間所言論一切是分別未曾有一法得入於法性能緣所緣力種種法出生速滅不暫停念念悉如是論第二爾時文殊師利菩薩已下五行經是文殊師利問財首菩薩言如來十種方便隨時之法初舉非眾生即約覺首所答業體純真後問如來十種隨時之化何緣而有財首為成信心約實而答隨時是假如下十行頌中具明於此十行頌中義分為三一科其頌意二釋菩薩名三配隨位因果一科頌意者此十行頌中一行一頌初一行頌中初兩句歎所問法非小器所堪是多聞者之境界次兩句今如問當說及勸聽已下九行頌是財首以實而答如文具明二釋菩薩名者為將如下頌中善達真假法財而惠施眾生故名為財首以十信心中法財初始益生之行名之為首世界名蓮華色者明此信中以法聖財饒益眾生令其自他性無染著號曰世界名為蓮華色以法施人破迷成智名為滅暗智佛明當位信中自具法門理行智之因果故財首是當位之行已下例然三配隨位因果者常以自心根本不動智佛文殊師利為信心之因進修得解脫智佛財首菩薩是隨位之行果故佛是智果餘者例然倣此經爾時文殊師利菩薩問寶首菩薩言佛子一切眾生等有四大無我無我所云何而有受苦受樂端正醜陋內好外好少受多受或受現報或受後報然法界中無美無惡時寶首菩薩以頌答曰隨其所行業如是果報生作者無所有諸佛之所說譬如淨明鏡隨其所對質現像各不同業性亦如是亦如田種子各各不相知自然能出生業性亦如是又如巧幻師在彼四衢道示現眾色相業性亦如是如機關木人能出種種聲彼無我非我業性亦如是亦如眾鳥類從㲉而得出音聲各不同業性亦如是譬如胎藏中諸根悉成就體相無來處業性亦如是又如在地獄種種諸苦事彼悉無所從業性亦如是譬如轉輪王成就勝七寶來處不可得業性亦如是又如諸世界大火所燒然此火無來處業性亦如是論第三爾時已下四行半經是文殊師利問寶首菩薩先總舉眾生同有四大無我無我所云何已下有十問業因果法已下有十行頌是寶首菩薩答前十問故初明舉體無分別二明受業之好醜由行所生具如經說大意達體業亡迷真業起故於此十行頌中義分為三一科頌意二釋菩薩名三配隨位因果一科頌意者初兩句是歎果報由行生次兩句歎業體本真本無所有是諸佛所說已下九行一行一頌舉喻顯法達法無業法業無二由行不同如文可知二釋菩薩名者明此信位達業即法體不復有業名之法寶以此法寶益生為信首故故名寶首明此是北方是師位以威儀軌則以利眾生故佛號威儀智佛世界名薝蔔華者此華黃色明是利眾生之福德色也黃者福慶之氣內應白淨外現黃相故如來為人天之師衣緇衣像北方坎故內應白淨無染之理外現黃相即明以利生白淨無染之福相以為世界之名以利眾生德行庠序佛號威儀智佛常以法寶利生達業性真名為寶首菩薩總是第四信心自所得法因果理智之號問曰何故北方為師為君答曰像水利潤萬物又水流慕下像為君為師者就愚濟迷使令發明又明北方坎為下位像為君為師者常以謙下之行令眾生所歸益之以道潤之故君子常謙處下位而濟物發明故故以北方坎為君為師夫大方無隅但取其義表德故餘位如名號品已釋一佛號徧十方故此以隨方表法故如周易泰卦乾下坤上初九拔茅連茹為茅潔白柔弱其根甘甜像君子有德如茅柔弱潔白甘和可以引而接之與仕也然茅非君子以物喻之然此方隅非佛也以法喻之令知法也佛智無依依物名智其方無方以法成方也非東西南北如情所見方故三配隨位因果者常以自心本不動智佛為始信心之因進修得威儀智佛為第四精進波羅蜜中之果也經爾時文殊師利菩薩問德首菩薩言佛子如來所悟唯是一法云何乃說無量諸法現無量剎化無量眾演無量音示無量身知無量心現無量神通普能震動無量世界示現無量殊勝莊嚴顯示無邊種種境界而法性中此差別相皆不可得時德首菩薩以頌答曰佛子所問義甚深難可了智者能知此常樂佛功德譬如地性一眾生各別住地無一異念諸佛法如是亦如火性一能燒一切物火𦦨無分別諸佛法如是亦如大海一波濤千萬異水無種種殊諸佛法如是亦如風性一能吹一切物風無一異念諸佛法如是亦如大雲雷普雨一切地雨滴無差別諸佛法如是亦如地界一能生種種芽非地有殊異諸佛法如是如日無雲曀普照於十方光明無異性諸佛法如是亦如空中月世間靡不見非月往其處諸佛法如是譬如大梵王應現滿三千其身無別異諸佛法如是論第四爾時已下六行經是文殊問德首菩薩如來所悟是一法云何已下有十問如文具明已下有十行頌是德首菩薩答於此說頌中義分為三一科頌之意二釋菩薩名三配隨位因果一科頌意者此十行頌中初一行歎所問之義甚深唯智所知次下九行頌一行一頌如文具明大意明不異一法界修行無量法門無量法門秪是一法界性不可滯一不作多不可滯多不是一如十玄義思之以無依住智照之可見二釋菩薩名者名德首者為明此位不離一法界性以消癡愛及一切煩惱而常修習一切諸功德以名為德首世界名青蓮華者明此第五信心是禪波羅蜜故心淨無染無貪愛癡故此是東北方佛號明相智明此位進修之果得法心淨故如艮位寅丑兩間明相現故故佛號明相智用此方隅以表禪定法故以東北方是艮艮為山山表安靜不動義是禪定義故三配隨位因果者常以自心根本不動智佛為所信之因進修得明相智佛為果也經爾時文殊師利菩薩問目首菩薩言佛子如來福田等一無異云何而見眾生布施果報不同所謂種種色種種形種種家種種根種種財種種主種種眷屬種種官位種種功德種種智慧而佛於彼其心平等無異思惟時目首菩薩以頌答曰譬如大地一隨種各生芽於彼無怨親佛福田亦然又如水一味因器有差別佛福田亦然眾生心故異亦如巧幻師能令眾歡喜佛福田如是令眾生敬悅如有才智王能令大眾喜佛福田如是令眾悉安樂譬如淨明鏡隨色而現像佛福田如是隨心獲眾報如何揭陀藥能療一切毒佛福田如是滅諸煩惱患亦如日出時照耀於世間佛福田如是滅除諸黑闇亦如淨滿月普照於大地佛福田亦然一切處平等譬如毗藍風普震於大地佛福田如是動三有眾生譬如大火起能燒一切物佛福田如是燒一切有為論第五爾時已下五行半經是文殊問目首菩薩如來福田等一無異所謂已下有十問具如經說已下有十行頌是目首所答三門如前一科頌意者此十行頌一行一頌其頌意答前所問佛福田是一云何布施果報不同其義有二不同一明佛自福田不同二明眾生所施福田不同一明佛自福田不同者明如來身目髮紺青身金色丹脣素齒一身之上色各不同華藏世界莊嚴萬異者總明法性理智中具有以法性理智中本具無量功德故有隨行報得莊嚴者如如來身有九十七種大人之相者是法身智體自具故如來有無量隨好功德莊嚴是隨行報得故如外邊依正報中金剛地是法性身報得是正報寶樹莊嚴世界是法性隨行報得是依報宮殿樓閣是法性大智隨大慈悲含育眾生業上報得師子座是法性隨智轉法輪報得蓮華藏世界是法性隨行教化眾生無染性報得香水海是法性隨大悲心謙下饒益行報得香河右漩是隨順法性進修教化眾生報得總不離法性大智隨行報殊一一行中皆有無量行門互為主伴以此莊嚴依報正報一一境界中有無量同異此是觀因知果以此准知總是一性中隨用不同故二眾生布施福田果報不同者此乃由心輕重有智無智謙下高心所求有異總是一心中隨用不同二釋菩薩名者名為目首明此位是東南方辰巳之間像此信心進修智目漸高善知福田因果等報名為目首是故如來常取辰巳以為齋戒之則如前名號品已釋准彼知之三配因果者還以自心本不動智佛為因此位究竟智佛為進修之果經爾時文殊師利菩薩問勤首菩薩言佛子佛教是一眾生得見云何不即悉斷一切諸煩惱縛而得出離然其色蘊受蘊想蘊行蘊識蘊欲界色界無色界無明貪愛無有差別是則佛教於諸眾生或有利益或無利益時勤首菩薩以頌答曰佛子善諦聽我今如實答或有速解脫或有難出離若欲求除滅無量諸過惡當於佛法中勇猛常精進譬如微少火樵濕速令滅於佛教法中懈怠者亦然如鑽燧求火未出而數息火勢隨止滅懈怠者亦然如人持日珠不以物承影火終不可得懈怠者亦然譬如赫日照孩稚閉其目怪言何不覩懈怠者亦然如人無手足欲以芒艸箭徧射破大地懈怠者亦然如以一毛端而取大海水欲令盡乾竭懈怠者亦然又如劫火起欲以少水滅於佛教法中懈怠者亦然如有見虗空端居不搖動而言普騰躍懈怠者亦然論第六爾時文殊師利已下五行半經是文殊問勤首佛教是一云何得見者有斷煩惱不斷煩惱不同等然其已下十問已下有十行頌是勤首菩薩所答於中三門如前一科頌意者此十行頌初一行勸聽次一行頌勸聞法勤修已下八行責其懈怠如文具明二釋菩薩名者名為勤首為明前目首善示福田因果佛號究竟智此位當須勤而行之故名勤首佛號最勝智為明勤修勝進即得最勝智為果故三配隨位因果者還以本不動智佛為因最勝智佛為進修之果經爾時文殊師利菩薩問法首菩薩言佛子如佛所說若有眾生受持正法悉能除斷一切煩惱何故復有受持正法而不斷者隨貪瞋癡隨慢隨覆隨忿隨恨隨嫉隨慳隨誑隨諂勢力所轉無有離心能受持法何故復於心行之內起諸煩惱時法首菩薩以頌答曰佛子善諦聽所問如實義非但以多聞能入如來法如人水所漂懼溺而渴死於法不修行多聞亦如是如人設美饍自餓而不食於法不修行多聞亦如是如人善方藥自疾不能救於法不修行多聞亦如是如人數他寶自無半錢分於法不修行多聞亦如是如有生王宮而受餒與寒於法不修行多聞亦如是如聾奏音樂悅彼不自聞於法不修行多聞亦如是如盲繢眾像示彼不自見於法不修行多聞亦如是譬如海船師而於海中死於法不修行多聞亦如是如在四衢道廣說眾好事內自無實德不行亦如是論第七爾時已下六行經是文殊問法首如佛所說若有眾生受持正法悉能除斷一切煩惱何故有受持正法而不斷者於中有十一問如文具明於中有十行頌是法首所答三門義如前一科頌意者此十行頌中初一句勸聽次一句歎能問次兩句責多聞者不修行已下九行頌一行一頌責多聞而心不精專不能斷煩惱如文具明二釋菩薩名者名為法首為明此是西北方戌亥兩間明愚迷長夜中能以正法自利利他專求無懈名為法首世界名金剛者以堅精無怠是自世界託西北方乾卦乾為堅剛佛號自在智者以自精勤觀照達理業亡名為自在智佛三配隨位因果者還以自心本不動智佛為因進修得自在智佛為果經爾時文殊師利菩薩問智首菩薩言佛子於佛法中智為上首如來何故或為眾生讚歎布施或讚持戒或讚堪忍或讚精進或讚禪定或讚智慧或復讚歎慈悲喜捨而終無有唯以一法而得出離成阿耨多羅三藐三菩提者時智首菩薩以頌答曰佛子甚希有能知眾生心如仁所問義諦聽我今說過去未來世現在諸導師無有說一法而得於道者佛知眾生心性分各不同隨其所應度如是而說法慳者為讚施毀禁者讚戒多瞋為讚忍好懈讚精進亂意讚禪定愚癡讚智慧不仁讚慈愍怒害讚大悲憂慼為讚喜曲心讚歎捨如是次第修漸具諸佛法如先立基堵而後造宮室施戒亦復然菩薩眾行本譬如建城郭為護諸人眾忍進亦如是防護諸菩薩譬如大力王率土咸戴仰定慧亦如是菩薩所依賴亦如轉輪王能與一切樂四等亦如是與諸菩薩樂論第八爾時已下有五行經是文殊問智首如來唯一法而得出離又於佛法中以智為首何故讚歎布施等總有十問大意明十波羅蜜四無量心畢竟無體何須用為已下有十行頌是智首菩薩答如文具明於中三門如前一科頌意者此十行頌中初一行頌歎能問及勸聽已下九行一行一頌如文具明智首答意明諸助道法隨根遣病若不修學無性菩提不成如頌中分明舉喻況說可知但須依法有病即治之如除堆阜道自無礙自病已除還與人服故藥藥之與方終無捨離二釋菩薩名者名為智首以明智能知根權施法藥四攝四無量十波羅蜜三十七助菩提分隨病生起增多之處而令服之顯發菩提無作之性漸令依本名為智首此是下方世界明以布施戒忍進定等十波羅蜜門如地能生發一切白淨之法故世界名頗棃此是白色如水精寶色佛號梵智者明心如大地荷負萬有常安淨故梵者淨也三配隨位因果者還以自心本不動智佛為因進修得心智寂靜為果表地體安靜故經爾時文殊師利菩薩問賢首菩薩言佛子諸佛世尊唯以一道而得出離云何今見一切佛土所有眾事種種不同所謂世界眾生界說法調伏壽量光明神通眾會教儀法住各有差別無有不具一切佛法而成阿耨多羅三藐三菩提者時賢首菩薩以頌答曰文殊法常爾法王唯一法一切無礙人一道出生死一切諸佛身唯是一法身一心一智慧力無畏亦然如本趣菩提所有迴向心得如是剎土眾會反說法一切諸佛剎莊嚴悉圓滿隨眾生行異如是見不同佛剎與佛身眾會及言說如是諸佛法眾生莫能見其心已清淨諸願皆具足如是明達人於此乃能覩隨眾生心樂及以業果力如是見差別此佛威神故佛剎無分別無憎無有愛但隨眾生心如是見有殊以是於世界所見各差別非一切如來大仙之過咎一切諸世界所應受化者常見人中雄諸佛法如是論第九爾時已下是文殊問賢首一切諸佛一道而得出離云何今見種種不同所謂已下有十問下有十行頌是賢首答於中三門如前一科頌意者此十行頌中初兩行歎法王唯一法一身一智已下八行頌於中大意有四一歎差別佛土因本迴向心所成為明迴向之就根益物身土教儀悉皆就根二明諸佛自報之境非是行因方見三明眾差別之事皆由眾生之心行異故隨自心見別非佛之異四明佛神力能就根現法二釋菩薩名者名為賢首為明得此十種信心信佛果德與自心體一善諳疑滯通塞入其賢位故名賢首此是上方位也意明此信位心智及境悉如虗空無所不含皆無妨礙是賢仁之德故名賢首又世界名平等色為明既是上方明身心與空合故世界名平等色佛號觀察智明以其自心空智慧門善能觀察諸法皆空無所染著是故名觀察智佛三配隨位因果者還以自心根本性空無分別不動智佛為因以進修至此法空觀察智佛為果明不動智是體觀察智佛是用至此明體用圓滿因果一性以是義故還說如來一身一心一智慧法門明契果會因始末無二總以一為根本故問曰何故頌初云文殊法常爾答曰為文殊是諸佛之慧不動智是體文殊是用以將此一切諸佛一切眾生根本智之體用門與一切信心者作因果體用故使依本故迄至究竟果滿與因不異無二性故方名初發心畢竟心二種不別明此十信心難發難信難入聞之者皆云我是凡夫何猶可得是佛故說少分信者即贊神通道力是故當知且須如是正信方始以正信正見法力加行如法進修分分無明薄解脫智慧明依自得法淺深漸當神通德用隨自己得信猶未得何索神通說言漸漸者不移一時一法性一智慧無依住無所得中漸漸故以十玄六相義圓之法性理中無有漸頓但為無始無明慣習習熟卒令契理純熟難故而有漸漸其漸漸者畢竟無始終延促長短等量故名為漸漸音切逸弋質切覩當古切湍他喘切奔博昆切機飢音衢仇于切㲉苦角切濤徒刀切滴都力切曀於計切揭九謁切療力照切藍落咸切闇暗音髮發音樵昨焦切濕詩入切鑽作丸切燧徐醉切孩戶來切稚直利切閉博計切射神夜切箭作殿切騰徒登切躡尼業切嫉疾音瞋昌真切忿撫吻切渴苦葛切饍善音餓五箇切餒奴罪切聾盧紅切慼倉亦切舡火江切讚作斡切基居之切堵當古切礙艾音戴帶音咎臼音毀許委切緇側其切茹人恕切甜徒兼切
