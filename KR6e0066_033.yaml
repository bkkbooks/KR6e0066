body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十住品第十五之餘論第五隨文釋義者長科為六段經爾時法慧菩薩承佛威力入菩薩無量方便三昧以三昧力十方各千佛剎微塵數世界之外有千佛剎微塵數諸佛皆同一號名曰法慧普現其前告法慧菩薩言善哉善哉善男子汝能入是菩薩無量方便三昧善男子十方各千佛剎微塵數諸佛悉以神力共加於汝又是毗盧遮那如來往昔願力威神之力及汝所修善根力故入此三昧令汝説法為增長佛智故深入法界故善了衆生界故所入無礙故所行無障故得無等方便故入一切智性故覺一切法故知一切根故能持説一切法故所謂發起諸菩薩十種住善男子汝當承佛威神之力而演此法是時諸佛即與法慧菩薩無礙智無著智無斷智無癡智無異智無失智無量智無勝智無懈智無奪智何以故此三昧力法如是故是時諸佛各伸右手摩法慧菩薩頂法慧菩薩即從定起告諸菩薩言佛子菩薩住處廣大與法界虗空等佛子菩薩住三世諸佛家彼菩薩住我今當説論第一從爾時法慧菩薩已下至菩薩住我今當説此一段有十九行半經明法慧菩薩入定諸佛加持分於中大意有十一釋菩薩名二明入三昧之意三明三昧之力四明十方佛來現其前與法慧同號五明十方佛與力共根六明毗盧遮那如來往昔願力使然七明法慧菩薩自善根力能入三昧八明入定因緣九明十方諸佛與十智十明法慧出定演説十種住門一釋菩薩名者如十信位中菩薩下名悉同名之為首為明信心以信為首此十住位中已生諸佛智慧家故下名悉同名之為慧為明入聖法流中得佛智慧同佛知見善簡正邪契會正法名之法慧若也自己不能同諸佛智慧知見者自邪未明焉能簡邪見也是故此位能同一切諸佛知見故得一切同名法慧佛而現其前以為印信定其詮表也以與十方諸佛智慧同故二明入三昧之意者如十信位中且以生滅心信自心所有無始無明能分別心便即信為自心根本不動智佛未有方便三昧合其體用故是故十信位中十箇世界皆名為色為十信未入法性之流以生滅心而信解故故十箇世界名之為色如此十住位中以方便三昧無沉掉心能現自體無生滅智慧故是故一切修道者初以聞解信入次以無思契同依本無作用之本智慧故故須入三昧以淨攀緣染習力故無作真智方明現故以是義故須入三昧三者云正昧者云定總言正定正定者無沉掉也無思所緣境也亦無攝持伏滅心也無欣無厭任性無思任理不作智自明矣是名方便是名無量以淨無量妄想故不可以情量思度所知故故名無量方便三昧三者正也昧之云定明情識昧正智自明如色界無色界三昧皆以息想慮而得之聲聞緣覺三昧修厭患觀而對治樂觀空而滅悲智以寂滅為樂權教菩薩樂觀空而行六度離苦本而生淨國設有住此界者言留惑而化衆生皆非法爾合然無出沒故以此義故此方便三昧者為一切衆生迷法界體用五欲情生以不造作心現本智故便將根本定體淨所妄情名為方便非是別於真外別有假安立之定名為方便譬如以水清寶能清濁水為珠淨緣現本淨水非是珠能作得淨水方便三昧亦復如是為以萬法無作本自淨緣現得本自無作智慧力故故名方便但天人外道三乘所有因果皆有所作以此所生皆有處所皆有果報廣狹淨穢差別等事於此佛華嚴一乘法門以無住無作任性法門所有其生任無依智無依止心智幻生身稱真法界於一切衆生前對現色身然其體相無來去然亦不作神通變化之事雖然普現三世一切業果在剎那之中然亦不住三世遠近及剎那之見於此經所作三昧智慧一切願行總是任理智之運為非有作有修欣厭之法也三明三昧之力者其力有五一定體淨欲遍周力二定能顯智慧同佛力三定能同佛身相名號現前力四定能契佛所知見得諸佛共所加持力五定能生在如來家為真佛子住佛智慧力一定體而能淨欲遍周力者為以此無作定體而能淨諸欲妄心身同於虗空無表裏遍周虗空法界故二定能顯智慧同佛力者為無作用定能現無作用自然慧故為一切衆生皆具足如來自然智慧為迷境情起緣五欲心障故以修無作定為方便佛智自然智便現故三定能同佛身相名號現前力者為以無作定顯得自法身智身無作白淨無垢與一切諸佛法身智慧合故是故十方各千佛剎微塵數諸佛同名法慧而現其前以智慧契會同佛知見故是故皆佛號與自己同名名為法慧云十方各千佛剎微塵為數量者為明隨位進修智慧遍周升降之數十行之中云萬佛剎微塵十回向位中云百萬佛剎微塵以彰智慧升進為對迷時即不可説剎塵煩惱為對悟時即不可説剎塵佛國及佛智慧也四定能契佛所知見得諸佛加持力者諸佛加持有七一同名號加持令不疑故二言讚加持令入位者心安隱故三毗盧遮那師弟加持彰本願故四神力加持與本師會同本神力智慧故五自善根力加持以自修方便定顯本智慧故六得十方同號佛皆與十種智力加持以説法同諸如來辨無礙故七得十方同號諸佛手摩其頂加持明至佛知見之頂許可不謬故有是七種加持也五定能生在如來家為真佛子住佛智慧力者為以無作定體顯本智慧同諸如來解脫智慧故經諸佛子菩薩住有十種過去未來現在諸佛已説當説今説何者為十所謂初發心住治地住修行住生貴住具足方便住正心住不退住童真住法王子住灌頂住是名菩薩十住去來現在諸佛所説論第二從出定後明正説十種住名目分如文可見經佛子云何為菩薩發心住此菩薩見佛世尊形貌端嚴色相圓滿人所樂見難可值遇有大威力或見神足或聞記別或聽教誡或見衆生受諸劇苦或聞如來廣大佛法發菩提心求一切智論第三有十法明正説發心之因分即是見佛身色端嚴或聞教誡等是經此菩薩緣十種難得法而發於心何者為十所謂是處非處智善惡業報智諸根勝劣智種種解差別智種種界差別智一切至處道智諸禪解脫三昧智宿命無礙智天眼無礙智三世漏普盡智是為十佛子此菩薩應勸學十法何者為十所謂勤供養佛樂住生死主導世間令除惡業以勝妙法常行教誨歎無上法學佛功德生諸佛前恆蒙攝受方便演説寂靜三昧讚歎遠離生死輪回為苦衆生作歸依處何以故欲令菩薩於佛法中心轉增廣有所聞法即自開解不由他教故佛子云何為菩薩治地住此菩薩於諸衆生發十種心何者為十所謂利益心大悲心安樂心安住心憐愍心攝受心守護心同己心師心導師心是為十佛子此菩薩應勸學十法何者為十所謂誦習多聞虗間寂靜近善知識發言和悅語必知時心無怯怖了達於義如法修行遠離愚迷安住不動何以故欲令菩薩於諸衆生增長大悲有所聞法即自開解不由他教故佛子云何為菩薩修行住此菩薩以十種行觀一切法何等為十所謂觀一切法無常一切法苦一切法空一切法無我一切法無作一切法無味一切法不如名一切法無處所一切法離分別一切法無堅實是為十佛子此菩薩應勸學十法何者為十所謂觀察衆生界法界世界觀察地界水界火界風界觀察欲界色界無色界何以故欲令菩薩智慧明了有所聞法即自開解不由他教故佛子云何為菩薩生貴住此菩薩從聖教中生成就十法何者為十所謂永不退轉於諸佛所深生淨信善觀察法了知衆生國土世界業行果報生死涅槃是為十佛子此菩薩應勸學十法何者為十所謂了知過去未來現在一切佛法修習過去未來現在一切佛法圓滿過去未來現在一切佛法了知一切諸佛平等何以故欲令增進於三世中心得平等有所聞法即自開解不由他教故佛子云何為菩薩具足方便住此菩薩所修善根皆為救護一切衆生饒益一切衆生安樂一切衆生哀愍一切衆生度脫一切衆生令一切衆生離諸災難令一切衆生出生死苦令一切衆生發生淨信令一切衆生悉得調伏令一切衆生咸證涅槃佛子此菩薩應勸學十法何者為十所謂知衆生無邊知衆生無量知衆生無數知衆生不思議知衆生無量色知衆生不可量知衆生空知衆生無所作知衆生無所有知衆生無自性何以故欲令其心轉復增勝無所染著有所聞法即自開解不由他教故佛子云何為菩薩正心住此菩薩聞十種法心定不動何者為十所謂聞讚佛毀佛於佛法中心定不動聞讚法毀法於佛法中心定不動聞讚菩薩毀菩薩於佛法中心定不動聞讚菩薩毀菩薩所行法於佛法中心定不動聞説衆生有量無量於佛法中心定不動聞説衆生有垢無垢於佛法中心定不動聞説衆生易度難度於佛法中心定不動聞説法界有量無量於佛法中心定不動聞説法界有成有壞於佛法中心定不動聞説法界若有若無於佛法中心定不動是為十佛子此菩薩應歡學十法何者為十所謂一切法無相一切法無體一切法不可修一切法無所有一切法無真實一切法空一切法無性一切法如幻一切法如夢一切法無分別何以故欲令其心轉復增進得不退轉無生法忍有所聞法即自開解不由他教故佛子云何為菩薩不退住此菩薩聞十種法堅固不退何者為十所謂聞有佛無佛於佛法中心不退轉聞有法無法於佛法中心不退轉聞有菩薩無菩薩於佛法中心不退轉聞有菩薩行無菩薩行於佛法中心不退轉聞有菩薩修行出離修行不出離於佛法中心不退轉聞過去有佛過去無佛於佛法中心不退轉聞未來有佛未來無佛於佛法中心不退轉聞現在有佛現在無佛於佛法中心不退轉聞佛智有盡佛智無盡於佛法中心不退轉聞三世一相三世非一相於佛法中心不退轉是為十佛子此菩薩應勸學十種廣大法何者為十所謂説一即多説多即一文隨於義義隨於文非有即有有即非有無相即相相即無相無性即性性即無性何以故欲令增進於一切法善能出離有所聞法即自開解不由他教故佛子云何為菩薩童真住此菩薩住十種業何者為十所謂身行無失語行無失意行無失隨意受生知衆生種種欲知衆生種種解知衆生種種界知衆生種種業知世界成壞神足自在所行無礙是為十佛子此菩薩應勸學十種法何者為十所謂知一切佛剎動一切佛剎持一切佛剎觀一切佛剎詣一切佛剎遊行無數世界領受無數佛法現變化自在身出廣大遍滿音一剎那中承事供養無數諸佛何以故欲令增進於一切法能得善巧有所聞法即自開解不由他教故佛子云何為菩薩法王子住此菩薩善知十種法何者為十所謂善知諸衆生受生善知諸煩惱現起善知習氣相續善知所行方便善知無量法善解諸威儀善知世界差別善知前際後際事善知演説世諦善知演説第一義諦是為十佛子此菩薩應勸學十種法何者為十所謂法王處善巧法王處軌度法王處宮殿法王處趣入法王處觀察法王灌頂法王力持法王無畏法王宴寢法王讚歎何以故欲令增進心無障礙有所聞法即自開解不由他教故佛子云何為菩薩灌頂住此菩薩得成就十種智何者為十所謂震動無數世界照耀無數世界住持無數世界往詣無數世界嚴淨無數世界開示無數衆生觀察無數衆生知無數衆生根令無數衆生趣入令無數衆生調伏是為十佛子此菩薩身及身業神通變現過去智未來智現在智成就佛土心境界智境界皆不可知乃至法王子菩薩亦不能知佛子此菩薩應勸學諸佛十種智何者為十所謂三世智佛法智法界無礙智法界無邊智充滿一切世界智普照一切世界智住持一切世界智知一切衆生智知一切法智知無邊諸佛智何以故欲令增長一切種智有所聞法即自開解不由他教故論第四有十法明初發心住所緣如來十種勝智并取此位十法至下十住之終總有二百箇法門共成十住之位一一住內皆有二十箇法門十法以成當位之門十法以為升進之行經文自具不煩更釋約知分劑以行行之經爾時佛神力故十方各一萬佛剎微塵數世界六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震吼遍吼等遍吼擊遍擊等遍擊雨天妙華天末香天華鬘天雜香天寶衣天寶雲天莊嚴具天諸音樂不鼓自鳴放天光明及妙音聲如此四天下須彌山頂帝釋殿上説十住法現諸神變十方所有一切世界悉亦如是又以佛神力故十方各過一萬佛剎微塵數世界有十佛剎微塵數菩薩來詣於此充滿十方作如是言善哉善哉佛子善説此法我等諸人同名法慧所從來國同名法雲彼土如來皆名妙法我等佛所亦説十住衆會眷屬文句義理悉亦如是無有增減佛子我等承佛神力來入此會為汝作證如於此會十方所有一切世界悉亦如是爾時法慧菩薩承佛威力觀察十方暨于法界而説頌曰論第五明説教威感大地震動從此段中科為六段一明大地六種十八相動二明天雨十種供養三明總結十方同説四明十方威感遠近五明十方同號菩薩咸來作證六明十方佛果名妙法此明從妙慧而説此法經見最勝智微妙身相好端嚴皆具足如是尊重甚難遇菩薩勇猛初發心見無等比大神通聞説記心及教誡諸趣衆生無量苦菩薩以此初發心聞諸如來普勝尊一切功德皆成就譬如虗空不分別菩薩以此初發心三世因果名為處我等自性為非處欲悉了知真實義菩薩以此初發心過去未來現在世所有一切善惡業欲悉了知無不盡菩薩以此初發心諸禪解脫及三昧雜染清淨無量種欲悉了知入住出菩薩以此初發心隨諸衆生根利鈍如是種種精進力欲悉了達分別知菩薩以此初發心一切衆生種種解心所好樂各差別如是無量欲悉知菩薩以此初發心衆生諸界各差別一切世間無有量欲悉了知其體性菩薩以此初發心一切有為諸行道一一皆有所至處悉欲了知其實性菩薩以此初發心一切世界諸衆生隨業漂流無暫息欲得天眼皆明見菩薩以此初發心過去世中曾所有如是體性如是相欲悉了知其宿住菩薩以此初發心一切衆生諸結惑相續現起及習氣欲悉了知究竟盡菩薩以此初發心隨諸衆生所安立種種談論語言道如其世諦悉欲知菩薩以此初發心一切諸法離言説性空寂滅無所作欲悉明達此真義菩薩以此初發心欲悉震動十方國傾覆一切諸大海具足諸佛大神通菩薩以此初發心欲一毛孔放光明普照十方無量土一一光中覺一切菩薩以此初發心欲以難思諸佛剎悉置掌中而不動了知一切如幻化菩薩以此初發心欲以無量剎衆生置一毛端不迫隘悉知無人無有我菩薩以此初發心欲以一毛滴海水一切大海悉令竭而悉分別知其數菩薩以此初發心不可思議諸國土盡抹為塵無遺者欲悉分別如其數菩薩以此初發心過去未來無量劫一切世間成壞相欲悉了達窮其際菩薩以此初發心三世所有諸如來一切獨覺及聲聞欲知其法盡無餘菩薩以此初發心無量無邊諸世界欲以一毛悉稱舉如其體相悉了知菩薩以此初發心無量無數輪圍山欲令悉入毛孔中如其大小皆得知菩薩以此初發心欲以寂靜一妙音普悉十方隨類演如是皆令淨明了菩薩以此初發心一切衆生語言法一言演説無不盡悉欲了知其自性菩薩以此初發心世間言音靡不作悉令其解證寂滅欲得如是妙舌根菩薩以此初發心欲使十方諸世界有成壞相皆得見而悉知從分別生菩薩以此初發心一切十方諸世界無量如來悉充滿欲悉了知彼佛法菩薩以此初發心種種變化無量身一切世界微塵等欲悉了達從心起菩薩以此初發心過去未來現在世無量無數諸如來欲於一念悉了知菩薩以此初發心欲具演説一句法阿僧祇劫無有盡而令文義各不同菩薩以此初發心十方一切諸衆生隨其流轉生滅相欲於一念皆明達菩薩以此初發心欲以身語及意業普詣十方無所礙了知三世皆空寂菩薩以此初發心菩薩如是發心已應令往詣十方國恭敬供養諸如來以此使其無退轉菩薩勇猛求佛道住於生死不疲厭為彼稱歎使順行如是令其無退轉十方世界無量剎悉在其中作尊主為諸菩薩如是説以此令其不退轉最勝最上最第一甚深微妙清淨法勸諸菩薩説與人如是教令離煩惱一切世間無與等不可傾動摧伏處為彼菩薩常稱讚如是教令不退轉佛是世間大力主具足一切諸功德令諸菩薩住是中以此教為勝丈夫無量無邊諸佛所悉得往詣而親近常為諸佛所攝受如是教令不退轉所有寂靜諸三昧悉皆演暢無有餘為彼菩薩如是説以此令其不退轉摧滅諸有生死輪轉於清淨妙法輪一切世間無所著為諸菩薩如是説一切衆生墮惡道無量重苦所纏迫與作救護歸依處為諸菩薩如是説此是菩薩發心住一向志求無上道如我所説教誨法一切諸佛亦如是第二治地住菩薩應當發起如是心十方一切諸衆生願使悉順如來教利益大悲安樂心安住憐愍攝受心守護衆生同己心師心及以導師心已住如是勝妙心次令誦習求多聞常樂寂靜正思惟親近一切善知識發言和悅離粗獷言必知時無所畏了達於義如法行遠離愚迷心不動此是初學菩提行能行此行真佛子我今説彼所應行如是佛子應勤學第三菩薩修行住當依佛教勤觀察諸法無常苦及空無有我人無動作一切諸法不可樂無如名字無處所無所分別無真實如是觀者名菩薩次令觀察衆生界及以勸觀於法界世界差別盡無餘於彼咸應勸觀察十方世界及虗空所有地水與火風欲界色界無色界悉勸觀察咸令盡觀察彼界各差別及其體性咸究竟得如是教勤修行此則名為真佛子第四生貴住菩薩從諸聖教而出生了達諸有無所有超過彼法生法界信佛堅固不可壞觀法寂滅心安住隨諸衆生悉了知體性虗妄無真實世間剎土業及報生死涅槃悉如是佛子於法如是觀從佛親生名佛子過去未來現在世其中所有諸佛法了知積集及圓滿如是修學令究竟三世一切諸如來能隨觀察悉平等種種差別不可得如是觀者達三世如我稱揚讚歎者此是四住諸功德若能依法勤修行速成無上佛菩提從此第五諸菩薩説名具足方便住深入無量巧方便發生究竟功德業菩薩所修衆福德皆為救護諸羣生專心利益與安樂一向哀愍令度脫為一切世除衆難引出諸有令歡喜一一調伏無所遺皆令具德向涅槃一切衆生無有邊無量無數不思議及以不可稱量等聽受如來如是法此第五住真佛子成就方便度衆生一切功德大智尊以如是法而開示第六正心圓滿住於法自性無迷惑正念思惟離分別一切天人莫能動聞讚毀佛與佛法菩薩及以所行行衆生有量若無量有垢無垢難易度法界大小及成壞若有若無心不動過去未來今現在諦念思惟恆決定一切諸法皆無相無體無性空無實如幻如夢離分別常樂聽聞如是義第七不退轉菩薩於佛及法菩薩行若有若無出不出雖聞是説無退動過去未來現在世一切諸佛有以無佛智有盡或無盡三世一相種種相一即是多多即一文隨於義義隨文如是一切展轉成此不退人應為説若法有相及無相若法有性及無性種種差別互相屬此人聞已得究竟第八菩薩童真住身語意行皆具足一切清淨無諸失隨意受生得自在知諸衆生心所樂種種意解各差別及其所有一切法十方國土成壞相逮得速疾妙神通一切處中隨念往於諸佛所聽聞法讚歎修行無懈倦了知一切諸佛國震動加持亦觀察超過佛土不可量遊行世界無邊數阿僧祇法悉咨問所欲受身皆自在言音善巧靡不充諸佛無數咸承事第九菩薩王子住能見衆生受生別煩惱現習靡不知所行方便皆善了諸法各異威儀別世界不同前欲際如其世俗第一義悉善了知無有餘法王善巧安立處隨其處所所有法法王宮殿若趣入及以於中所觀見法王所有灌頂法神力加持無怯畏宴寢宮室及歎譽以此教詔法王子如是為説靡不盡而令其心無所著於此了知修正念一切諸佛現其前第十灌頂真佛子成滿最上第一法十方無數諸世界悉能震動光普照住持往詣亦無餘清淨莊嚴皆具足開示衆生無有數觀察知根悉能盡發心調伏亦無邊咸令趣向大菩提一切法界咸觀察十方國土皆往詣其中身及身所作神通變現難可測三世佛土諸境界乃至王子無能了一切見者三世智於諸佛法明了智法界無礙無邊智充滿一切世界智照耀世界住持智了知衆生諸法智及知正覺無邊智如來為説咸令盡如是十住諸菩薩皆從如來法化生隨其所有功德行一切天人莫能測過去未來現在世發心求佛無有邊十方國土皆充滿莫不當成一切智一切國土無邊際世界衆生法亦然惑業心樂各差別依彼而發菩提意始求佛道一念心世間衆生及二乘斯等尚亦不能知何況所餘功德行十方所有諸世界能以一毛悉稱舉彼人能知此佛子趣向如來智慧行十方所有諸大海悉以毛端滴令盡彼人能知此佛子一念所修功德行一切世界抹為塵悉能分別知其數如是之人乃能見此諸菩薩所行道去來現在十方佛一切獨覺及聲聞悉以種種妙辨才開示初發菩提心發心功德不可量充滿一切衆生界衆智共説無能盡何況所餘諸妙行論第六明法慧承威説頌歎法分於此段中總有二百行頌以歎十住位中二百箇法門文自具足不煩釋也如灌頂住者如將淨水從頂而灌遍身而下如此位菩薩以法界智無中邊體等虗空界以對現一切衆生宜應現身一時等雨法雨無不灌注故故名灌頂住亦為登此位時十方諸佛手灌其頂亦名灌頂住音切奪徒活切懈戒音誡戒音值直至切劇渠力切憐力延切迫百音隘鳥介切暨其既切纏直連切誨呼績切咨子思切寢七稔切獷古猛切欣許斤切愍敏音掉徒弔切貌貌同劑在細切狹胡甲切
