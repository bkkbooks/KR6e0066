body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論初發心功德品第十七之餘經爾時佛神力故十方各一萬佛剎微塵數世界六種震動所謂動遍動等遍動起遍起等遍起踊遍踊等遍踊震遍震等遍震吼遍吼等遍吼擊遍擊等遍擊論三十五爾時佛神力已下至等遍擊有三行半經明大地震動分經兩衆天華天香天末香天華鬘天衣天寶天莊嚴具作天妓樂放天光明及天音聲論三十六天雨衆華已下至及天音聲有兩行經明諸天興供分證成分如動地興供明法威力亦明大衆法悅心悅地動明心境體無二故境由心現故經是時十方各過十佛剎微塵數世界外有萬佛剎微塵數佛同名法慧各現其身在法慧菩薩前作如是言善哉善哉法慧汝於今者能說此法我等十方各萬佛剎微塵數佛亦說是法一切諸佛悉如是說論三十七是時十方已下至悉如是說有四行半經明十方同號佛來現其前歎譽許可法同分如十方各過萬佛剎微塵數佛同名法慧來現其前者為明與十方諸佛智慧合故萬佛剎塵者明升進修行啓迷悟法之量十信十十住百十行千總是明升進見諦解迷悟法之名經汝說此法時有萬佛剎微塵數菩薩發菩提心我等今者悉授其記於當來世過千不可說無邊劫同一劫中而得作佛出興於世皆號清淨心如來所住世界各各差別我等悉當護持此法令未來世一切菩薩未曾聞者皆悉得聞論三十八汝說此法時已下至皆悉得聞有五行經明說此法時十方各過萬佛剎塵菩薩發心授記分如萬佛剎微塵數菩薩發心授過千不可說劫成佛之記皆同號之為清淨心者亦明達如是千不可說劫量法門總清淨故故佛號清淨心非是實有如情所見長遠之劫也總明當位隨迷悟法之名不是存其劫量之說如妄情所見也自此已下直至品末如文自具如文稱歎經如此娑婆世界四天下須彌頂上說如是法令諸衆生聞已受化如是十方百千億那由他無數無量無邊無等不可數不可稱不可思不可量不可說盡法界虗空界諸世界中亦說此法教化衆生其說法者同名法慧悉以佛神力故世尊本願力故為欲顯示佛法故為以智光普照故為欲開闡實義故為令證得法性故為令衆會悉歡喜故為欲開示佛法因故為得一切佛平等故為了法界無有二故說如是法論三十九如此娑婆世界已下至說如是法有九行半經明十方所說法人及法門一時同說分經爾時法慧菩薩普觀盡虗空界十方國土一切衆會欲悉成就諸衆生故欲悉淨治諸業果報故欲悉開顯清淨法界故欲悉拔除雜染根本故欲悉增長廣大信解故欲悉令知無量衆生根故欲悉令知三世法平等故欲悉令觀察涅槃界故欲增長自清淨善根故承佛威力即說頌言論四十爾時法慧已下至說頌有六行半經明法慧菩薩觀欲所緣之法說頌稱歎分已下頌文有二百四十二行四行一頌其頌有六十段頌都計有二百四十行末後兩行頌總結頌意歎勸發心初一百六十八行是總都歎佛果已來五位及信等諸法明初發心者志樂智德總含一切諸佛智德體用始成一念初發心菩薩位也方明初發心境與心不二若志樂毫釐不似如來所修法身悲智願行者不名初發心菩薩故經為利世間發大心其心普遍於十方衆生國土三世法佛及菩薩最勝海究竟虗空等法界所有一切諸世間如諸佛法皆往詣如是發心無退轉慈念衆生無暫捨離諸惱害普饒益光明照世為所歸十方護念難思議十方國土悉趣入一切色形皆示現如佛福智廣無邊隨順修因無所著有剎仰住或傍覆粗妙廣大無量種菩薩一發最上心悉能往詣皆無礙菩薩勝行不可說皆勤修習無所住見一切佛常欣樂普入於其深法海哀愍五趣諸羣生令除垢穢普清淨紹隆佛種不斷絶摧滅魔宮無有餘已住如來平等性善修微妙方便道於佛境界起信心得佛灌頂心無著兩足尊所念報恩心如金剛不可沮於佛所行能照了自然修習菩提行諸趣差別想無量業果及心亦非一乃至根性種種殊一發大心悉明見其心廣大等法界無依無變如虗空趣向佛智無所取諦了實際離分別知衆生心無生想了達諸法無法想雖普分別無分別億那由剎皆往詣無量諸佛妙法藏隨順觀察悉能入衆生根行靡不知到如是處如世尊清淨大願恆相應樂供如來不退轉人天見者無厭足常為諸佛所護念其心清淨無所依雖觀深法而不取如是思惟無量劫於三世中無所著其心堅固難制沮趣佛菩提無障礙志求妙道除蒙惑周行法界不告勞知語言法皆寂滅但入真如絶異解諸佛境界悉順觀達於三世心無礙菩薩始發廣大心即能遍往十方剎法門無量不可說智光普照皆明了大悲廣度最無比慈心普遍等虗空而於衆生不分別如是清淨遊於世十方衆生悉慰安一切所作皆真實恆以淨心不異語常為諸佛共加護過去所有皆憶念未來一切悉分別十方世界普入中為度衆生令出離菩薩具足妙智光善了因緣無有疑一切迷惑皆除斷如是而遊於法界魔王宮殿悉摧破衆生翳膜咸除滅離諸分別心不動善了如來之境界三世疑網悉已除於如來所起淨信以信得成不動智智清淨故解真實為令衆生得出離盡於後際普饒益長時勤苦心無厭乃至地獄亦安受福智無量皆具足衆生根欲悉了知及諸業行無不見如其所樂為說法了知一切空無我慈念衆生恆不捨以一大悲微妙音普入世間而演說放大光明種種色普照衆生除黑暗光中菩薩坐蓮華為衆闡揚清淨法於一毛端現衆剎諸大菩薩皆充滿衆會智慧各不同悉能明了衆生心十方世界不可說一念周行無不盡利益衆生供養佛於諸佛所問深義於諸如來作父想為利衆生修覺行智慧善巧通法藏入深智處無所著隨順思惟說法界經無量劫不可盡智雖善入無處所無有疲厭無所著三世諸佛家中生證得如來妙法身普為羣生現衆色譬如幻師無不作或現始修殊勝行或現初生及出家或現樹下成菩提或為衆生示涅槃菩薩所住希有法唯佛境界非二乘身語意想皆已除種種隨宜悉能現菩薩所得諸佛法衆生思惟發狂亂智入實際心無礙普現如來自在力此於世間無與等何況復增殊勝行雖未具足一切智已獲如來自在力已住究竟一乘道深入微妙最上法善知衆生時非時為利益故現神通分身遍滿一切剎放淨光明除世暗譬如龍王起大雲普雨妙雨悉充洽觀察衆生如幻夢以業力故常流轉大悲哀愍咸救拔為說無為淨法性佛力無量此亦然譬如虗空無有邊為令衆生得解脫億劫勤修而不倦種種思惟妙功德善修無上第一業於諸勝行恆不捨專念生成一切智一身示現無量身一切世界悉周遍其心清淨無分別一念難思力如是於諸世間不分別於一切法無妄想雖觀諸法而不取恆救衆生無所度一切世間唯是想於中種種各差別知想境界險且深為現神通而救脫譬如幻師自在力菩薩神變亦如是身遍法界及虗空隨衆生心靡不見能所分別二俱離雜染清淨無所取若縛若解智悉忘但願普與衆生樂一切世間唯想力以智而入心無畏思惟諸法亦復然三世推求不可得能入過去畢前際能入未來畢後際能入現在一切處常勤觀察無所有隨順涅槃寂滅法住於無諍無所依心如實際無與等專向菩提永不退修諸勝行無退怯安住菩提不動搖佛及菩薩與世間盡於法界皆明了欲得最勝第一道為一切智解脫王應當速發菩提心永盡諸漏利羣生趣向菩提心清淨功德廣大不可說為利衆生故稱述汝等諸賢應善聽無量世界盡為塵一一塵中無量剎其中諸佛皆無量悉能明見無所取善知衆生無生想善知言語無語想於諸世界心無礙悉善了知無所著其心廣大如虗空於三世事悉明達一切疑惑皆除滅正觀佛法無所取十方無量諸國土一念往詣心無著了達世間衆苦法悉住無生真實際無量難思諸佛所悉往彼會而覲謁常為上首問如來菩薩所修諸願行心常憶念十方佛而無所依無所取恆勸衆生種善根莊嚴國土令清淨一切趣生三有處以無礙眼咸觀察所有習性諸根解無量無邊悉明見衆生心樂悉了知如是隨宜為說法於諸染淨皆通達令彼修治入於道無量無數諸三昧菩薩一念皆能入於中想智及所緣悉善了知得自在菩薩獲此廣大智疾向菩提無所礙為欲利益諸羣生處處宣揚大人法善知世間長短劫一月半月及晝夜國土各別性平等常勤觀察不放逸普詣十方諸世界而於方處無所取嚴淨國土悉無餘亦不曾生淨分別衆生是處若非處及以諸業感報別隨順思惟入佛力於此一切悉了知一切世間種種性種種所行住三有利根及與中下根如是一切咸觀察淨與不淨種種解勝劣及中悉明見一切衆生至處行三有相續皆能說禪定解脫諸三昧染淨因起各不同及以先世苦樂殊淨修佛力咸能見衆生業惑續諸趣斷此諸趣得寂滅種種漏法永不生并其習種悉了知如來煩惱皆除盡大智光明照於世菩薩於佛十力中雖未證得亦無疑菩薩於一毛孔中普現十方無量剎或有雜染或清淨種種業作皆能了一微塵中無量剎無量諸佛及佛子諸剎各別無雜亂如一一切悉明見於一毛孔見十方盡虗空界諸世間無有一處空無佛如是佛剎悉清淨於毛孔中見佛剎復見一切諸衆生三世六趣各不同晝夜月時有縛解如是大智諸菩薩專心趣向法王位於佛所住順思惟而獲無邊大歡喜菩薩分身無量億供養一切諸如來神通變現勝無比佛所行處皆能住無量佛所皆鑽仰所有法藏悉耽味見佛聞法勤修行如飲甘露心歡喜已獲如來勝三昧善入諸法智增長信心不動如須彌普作羣生功德藏慈心廣大遍衆生悉願疾成一切智而恆無著無依處離諸煩惱得自在哀愍衆生廣大智普攝一切同於己知空無相無真實而行其心不懈退菩薩發心功德量億劫稱揚不可盡以出一切諸如來獨覺聲聞安樂故十方國土諸衆生皆悉施安無量劫勸持五戒及十善四禪四等諸定處復於多劫施安樂令斷諸惑成羅漢彼諸福聚雖無量不與發心功德比論以此初頌有一百六十八行且總歎信等六位因果及如來智德總歎令初發心者法之相似經又教億衆成緣覺獲無諍行微妙道以彼而校菩提心算數譬喻無能及一念能過塵數剎如是經於無量劫此諸剎數尚可量發心功德不可知過去未來及現在所有劫數無邊量此諸劫數猶可知發心功德無能測以菩提心遍十方所有分別靡不知一念三世悉明達利益無量衆生故十方世界諸衆生欲解方便意所行及以虗空際可測發心功德難知量菩薩志願等十方慈心普洽諸羣生悉使修成佛功德是故其力無邊際衆生欲解心所樂諸根方便行各別於一念中悉了知一切智智心同等一切衆生諸惑業三有相續無暫斷此諸邊際尚可知發心功德難思議發心能離業煩惱供養一切諸如來業惑既離相續斷普於三世得解脫一念供養無邊佛亦供無數諸衆生悉以香華及妙鬘寶幢幡蓋上衣服美食珍座經行處種種宮殿悉嚴好毗盧遮那妙寶珠如意摩尼發光曜念念如是持供養經無量劫不可說其人福聚雖復多不及發心功德大所說種種衆譬喻無有能及菩提心以諸三世人中尊皆從發心而得生發心無礙無齊限欲求其量不可得一切智智誓必成所有衆生皆永度發心廣大等虗空生諸功德同法界所行普遍如無異永離衆著佛平等一切法門無不入一切國土悉能往一切智境咸通達一切功德皆成就一切能捨恆相續淨諸戒品無所著具足無上大功德常勤精進不退轉入深禪定恆思惟廣大智慧共相應此是菩薩最勝地出生一切普賢道三世一切諸如來靡不護念初發心悉以三昧陀羅尼神通變化共莊嚴十方衆生無有量世界虗空亦如是發心無量過於彼是故能生一切佛菩提心是十力本亦為四辨無畏本十八不共亦復然莫不皆從發心得諸佛色相莊嚴身及以平等妙法身智慧無著所應供悉以發心而得有一切獨覺聲聞乘色界諸禪三昧樂及無色界諸三昧悉以發心作其本一切人天自在樂及以諸趣種種樂進定根力等衆樂靡不皆由初發心以因發起廣大心則能修行六種度勸諸衆生行正行於三界中受安樂住佛無礙實義智所有妙業咸開闡能令無量諸衆生悉斷惑業向涅槃智慧光明如淨日衆行具足猶滿月功德常盈譬巨海無垢無礙同虗空普發無邊功德願悉與一切衆生樂盡未來際依願行常勤修習度衆生無量大願難思議願令衆生悉清淨空無相願無依處以願力故皆明顯了法自性如虗空一切寂滅悉平等法門無數不可說為衆生說無所著十方世界諸如來悉共讚歎初發心此心無量德所嚴能到彼岸同於佛如衆生數爾許劫說其功德不可盡以住如來廣大家三界諸法無能喻欲知一切諸佛法宜應速發菩提心此心功德中最勝必得如來無礙智衆生心行可數知國土微塵亦復然虗空邊際乍可量發心功德無能測出生三世一切佛成就世間一切樂增長一切勝功德永斷一切諸疑惑開示一切妙境界盡除一切諸障礙成就一切清淨剎出生一切如來智欲見十方一切佛欲施無盡功德藏欲滅衆生諸苦惱宜應速發菩提心論然後七十四行頌始重頌前四十段中校量發心功德廣大之量如文具明隨文稱歎四行一頌准例知之如是校量初發心功德設使以等虗空無限境以一切樂具總供養無限衆生皆令得人天勝樂又教令得四沙門果及辟支佛及三乘出世菩提如是虗空境界及所度衆生雖等然未令所化衆生得成佛亦不可比於此教中初發心乘如來大智等佛所行普化衆生皆成佛故發菩提心以是義故雖然所舉境界廣狹雖等所化衆生成佛不成佛不等故不可為比故是故此品下文云初發心菩薩不於三世少有所得所謂若諸佛若諸佛法若菩薩若菩薩法若獨覺若獨覺法若聲聞若聲聞法乃至廣說如經但為唯求一切智於諸法界心無所著發菩提心略說菩提其法有四一聲聞菩提二緣覺菩提三權教菩薩菩提四一乘菩薩佛果菩提前三竝是出世菩提佛果菩提是法身大智大悲真俗萬行法界圓滿菩提無出入故三乘菩提雖觀四諦十二緣而亦未知四諦十二緣之實體非獨二乘不知三種意生身菩薩位登十地猶未能悉知唯一乘菩薩以智方知至十地品具明但且略而總言三乘中觀苦集滅道及十二緣生及行六波羅蜜菩薩厭苦欣真但求出世大悲菩薩方云留惑潤生一乘菩薩以智觀四諦十二緣生無明即智苦諦即聖諦於生死涅槃無解縛性是故此經名苦聖諦集聖諦如是十聖諦十十二因緣總是法界自性無縛無解自在之緣不名無明不名苦諦如是總觀萬法如是名為一乘法界緣起智悲自在任性緣生一切眼耳鼻舌身莫不皆是法界緣起自在法門一切諸佛知見神通道力以此而有但以禪定觀照諸波羅蜜而顯發之是故學者應如是修如是悟入已下頌文四行一頌如文自具不煩更釋有智之士隨文稱歎令衆發心明法品第十八論將釋此品約作三門分別一釋品名目二釋品來意三隨文釋義第一釋品名目者此品為明前之升須彌頂品偈讚品十住品梵行品初發心功德品五品法門已發菩提之心得廣大功德此精進慧所問之法有二義一令前五品之法其心更明二令後所行之法轉勝明白故云明法品明升進前後法故是精進慧菩薩啓請法慧菩薩言所有大願悉使滿足獲諸菩薩廣大之藏此明前所得法使令更明後之升進使令明白是修十行之向長養本位十住之法第二釋品來意及名目如前第三隨文釋義分之為二一長科經意二隨文解釋第一長科經意者約科為三段第一初爾時已下長行有三十三行半經通偈頌有五十五行半明精進慧菩薩請法分第二爾時法慧菩薩已下有六行經明法慧菩薩許說分第三佛子菩薩摩訶薩已下直至品末通偈頌總明正說法分從初第一請法分中義分為二一科此一段經之文意第二隨文解義第一科此一段經文意者約科為三段經爾時精進慧菩薩白法慧菩薩言佛子菩薩摩訶薩初發求一切智心成就如是無量功德具大莊嚴升一切智乘入菩薩正位捨諸世間法得佛出世法去來現在諸佛攝受決定至於無上菩提究竟之處彼諸菩薩於佛教中云何修習令諸如來皆生歡喜入諸菩薩所住之處一切大行皆得清淨所有大願悉使滿足獲諸菩薩廣大之藏隨所應化常為說法而恆不捨波羅蜜行所念衆生咸令得度紹三寶種使不斷絶善根方便皆悉不虗佛子彼諸菩薩以何方便能令此法當得圓滿願垂哀愍為我宣說此諸大會靡不樂聞論第一爾時已下至靡不樂聞有十二行經明精進慧菩薩初起請法門分第二隨文解釋者從初爾時者爾猶此云說此法時也精進慧菩薩者約位加行成名此通十箇慧之通稱為令欲成此位之升進必藉精進之功慧者照燭義精進者無思義以無思之慧照燭有作之功有作本自無者萬法本來自淨萬法自淨名之為精無巧智應知根利生名之為進此約成位進修之稱也菩薩者如常說也白法慧菩薩者白者明也明著名言申其所明也云升一切智乘者明入此位也以此位菩薩乘一切智乘生如來家入佛種智為佛之子恆蒙諸佛之所攝受故明智相應堪與益故故云攝受云獲諸菩薩廣大之藏者如十回向中智藏悲藏等十藏是也云以何方便已下正說中十十法門是經復次如諸菩薩摩訶薩常勤修習滅除一切無明黑暗降伏魔怨制諸外道永滌一切煩惱心垢悉能成就一切善根永出一切惡趣諸難淨治一切大智境界成就一切菩薩諸地諸波羅蜜總持三昧六通三明四無所畏清淨功德莊嚴一切諸佛國土及諸相好身語心行成就滿足善知一切諸佛如來力無所畏不共佛法一切智智所行境界為欲成熟一切衆生隨其心樂而取佛土隨根隨時如應說法種種無量廣大佛事及餘無量諸功德法諸行諸道及諸境界皆悉圓滿疾與如來功德平等於諸如來應正等覺百千阿僧祇劫修菩薩行時所集法藏悉能守護開示演說諸魔外道無能沮壞攝持正法無有窮盡於一切世界演說法時天王龍王夜叉王乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王梵王如來法王皆悉守護一切世間恭敬供養同灌其頂常為諸佛之所護念一切菩薩亦皆愛敬得善根力增長白法開演如來甚深法藏攝持正法以自莊嚴一切菩薩所行次第願皆演說論第二復次如諸已下至菩薩所行次第願皆演說有二十一行經明精進慧菩薩并舉當位應所修行之行及獲益重勸說守護法分云六通者身通天耳通天眼通宿命通他心通漏盡通身通者於一剎那際身隨智用周遍十方對現色身隨根普應天耳通者耳根常聞十方一切諸聲天眼通者眼根常見十方一切粗細等色宿命通者智隨三世一切衆生死此生彼所作業行因果悉能知之他心通者一念能知三世一切衆生心念所欲漏盡通者隨智遍知一切諸法而無情欲順癡愛心此經又有十種通如十通品說三明者一宿命二天眼三漏盡是名三明四無畏者一一切智無畏二漏盡無畏三說障道無畏四說盡苦道無畏相好者此經十身相海也力無所畏者十力也一是處非處力二業力三定力四根力五欲力六性力七一切至處道力八宿命力九天眼力十漏盡力是為十三世業果名為處了達非有名非處善知衆生業因果心定不動如山王衆生根品上中下欲樂種種各差別種種世間諸性分一切道法各不同宿命遍知三世業天眼十方無礙了隨諸分別滿十方心無雜染常無垢如是十種得自在是名如來無畏力十八不共者一佛身無過失二口無過失三念無過失四想無過失五心無不定常在三昧六無不知已捨七者欲無減八者精進無失九念無減十慧無減十一解脫無減十二解脫知見無減十三身業隨智慧行十四口業隨智慧行十五意業隨智慧行十六智慧知過去無礙事十七智慧知未來無礙事十八智慧知現在無礙事所言無過失者妙善相應所言無減者所作善法常無忘失云一切智智者云種種智無盡智此明差別智無盡故如守護分中有二義一明初發心菩薩守護一切諸佛法藏而能為人演說二得天王夜叉王如來法王等守護經爾時精進慧菩薩欲重宣其義而說頌言論第三爾時已下可一行經明精進慧以偈說重請法分經大名稱者善能演菩薩所成功德法深入無邊廣大行具足清淨無師智若有菩薩初發心成就福德智慧乘入離生位超世間普獲正等菩提法彼復云何佛教中堅固勤修轉增勝令諸如來悉歡喜佛所住地速當入所行清淨願皆滿及得廣大智慧藏常能說法度衆生而心無依無所著菩薩一切波羅蜜悉善修行無缺減所念衆生咸救度常持佛種使不絶所作堅固不唐捐一切功成得出離如諸勝者所修行彼清淨道願宣說永破一切無明暗降伏衆魔及外道所有垢穢悉滌除得近如來大智慧永離惡趣諸險難淨治大智殊勝境獲妙道力鄰上尊一切功德皆成就證得如來最勝智住於無量諸國土隨衆生心而說法及作廣大諸佛事云何而得諸妙道開演如來正法藏常能受持諸佛法無能超勝無與等云何無畏如師子所行清淨如滿月云何修習佛功德猶如蓮華不著水論如以偈重請分中有二十二行頌初二行頌歎能說法主已下二十行兩行一頌初兩行歎初發心菩薩智慧福德超世獲益次兩行頌勸說升進之行次兩行頌明大智度衆生無著次兩行頌明衆行無缺利生令佛種不絶次兩行頌明堅固功成出離法勝重勸請說次兩行頌明破暗降魔之道亦願請說次兩行頌明如來所得之法亦勸請說次兩行頌明云何演說如來法末後兩行頌明云何令初發心無畏如師子無著如蓮華經爾時法慧菩薩告精進慧菩薩言善哉佛子汝今為欲多所饒益多所安樂多所惠利哀愍世間諸天及人問於如是菩薩所修清淨之行佛子汝住實法發大精進增長不退已得解脫能作是問同於如來諦聽諦聽善思念之我今承佛威神之力為汝於中說其少分論第二爾時法慧菩薩已下有六行經明法慧菩薩許說分於此分中所歎能問之人如文可知第三正說分中復分為二第一長科經意第二隨文釋義第一長科經意者從佛子菩薩已發一切智心已下至品末長科為二十段經佛子菩薩摩訶薩已發一切智心應離癡暗精勤守護無令放逸佛子菩薩摩訶薩住十種法名不放逸何者為十一者護持衆戒二者遠離愚癡淨菩提心三者心樂質直離諸諂誑四者勤修善根無有退轉五者恆善思惟自所發心六者不樂親近在家出家一切凡夫七者修諸善業而不願求世間果報八者永離二乘行菩薩道九者樂修衆善令不斷絶十者恆善觀察自相續力佛子若諸菩薩行此十法是則名為住不放逸論第一從初佛子已下至住不放逸有十行經明住十種不放逸法分經佛子菩薩摩訶薩住不放逸得十種清淨何者為十一者如說而行二者念智成就三者住於深定不沈不舉四者樂求佛法無有懈息五者隨所聞法如理觀察具足出生巧妙智慧六者入深禪定得佛神通七者其心平等無有高下八者於諸衆生上中下類心無障礙猶如大地等作利益九者若見衆生乃至一發菩提之心尊重承事猶如和尚十者於授戒和尚及阿闍梨一切菩薩諸善知識法師之所常生尊重承事供養佛子是名菩薩住不放逸十種清淨論第二佛子已下至十種清淨有十行半經明住不放逸得十清淨法分第二隨文解釋者從正說分中菩薩摩訶薩二十段文中但隨經文義隱言幽方可解之經文自顯處如文自具不煩更釋如文中深入禪定不沈不舉者不沈離聲聞滅盡定亦離上二界息慮禪如色界初禪滅下欲界愁憂不生得一分輕安寂靜無欲界愛有寂靜愛水灾便至楞伽經云津潤妄想能生內外水界以愛為津潤故水大至如色界第二禪能滅欲界憂苦不生得一分輕安寂靜為有覺有觀能緣靜境猶在火灾便至如第三禪無覺無觀有禪悅樂心有喜動風灾便至如第四禪身心寂滅離出入息喜動亦無三灾不至唯妙色身如白銀清淨光潔衣如金色四禪身長二十里衣長四十里已下三禪倍倍減半如初會中已釋如是四禪皆是息心令靜以為勢分乃至空處識處無所有處非想非非想定皆是破除升進令念不生住寂定故如是破色界靜色令成無色界空識又破見空之識亦空名識處定又破識空之見亦無名無所有定又破無所有心此無想無想之想亦無名非想非非想定如是上界修禪皆是作意存情伏心不起不是任性無為無沈無掉稱真理智寂用自在不作而為之定也如欲界定攀緣五欲名掉色無色界定名沈又聲聞緣覺定名沈空觀菩薩行六波羅蜜生於淨土名掉舉如是三乘之定皆有沈掉為垢淨未亡見道不真有欣厭故二乘之定雖無三界現行之惑皆是厭患對治伏滅無為無能起惑我生不起悲智亦亡住滅定者頭上擊鼓亦不聞知化火燒父母分段身者入變易生死如是二乘斷惑不分別法意勢相似或有聲聞以十二緣生法得道如是三乘觀行緣覺聲聞淨土菩薩所得道者皆是出世三乘互用通為九乘大體以約勝鬘經得伏三界煩惱不起得意生身無分段生死得變易生死非是應真任智自在無出入體任智應衆生利樂不息廣如勝鬘之意以是義故色界無色界及三乘禪有沈有掉如大乘中留惑潤生菩薩道前安立三十心菩薩習種性性種性道種性方入聖種性四攝四無量心三十七助道品觀十波羅蜜名目相似若以攝化境界及見佛數量意生身智生身成佛因果總皆不同以是義故如是留惑潤生菩薩所修定亦沈亦掉為但得三種意生身未得如來智生身故乃至七八九十地得種類俱生無行作意生身菩薩但得三界煩惱中空觀折伏現行不起於意生中自在故非是生如來一切種智家故非是於如來一切種智中起慣習故所云成佛定滿三祇所見佛境初地菩薩但云供養及攝化百佛世界但得百法明門如此華嚴經者初發心菩薩初發如來一切種智之心名為菩提心如初發心住創生一切諸佛一切種智大智慧家生初發心時便成正覺為會諸佛一切種智與自智一故成佛不出剎那之際以智境界非延促故攝化境界遍百佛剎微塵又多百佛明智境德用無盡無限重重故此猶約隨位進修之言計體一即一切無限也如十地中初地菩薩供養多百佛多百千佛雖數不離百數然多百即無限與單百即無比是故四念四攝四無量心十波羅蜜一一法悉皆無限是故此十住菩薩所修定業不屬世間出世間沈掉之定也已釋住於深定不沈不舉竟如云深入禪定得佛神通者如上色界無色界天及三乘神通色無色界神通息心想淨報得神通二乘神通依定前所念淨土菩薩神通得清淨意樂通如三種意生身是如此經中入深禪定得佛神通者以心稱理元無出入體無靜亂體無造作性任理自真不生不伏理真智應性自遍周三世十方一時普應對現色身隨以智應而化羣品而無來往亦不變化名佛神通智無依止無形色體無來去性性自遍周非三世攝而能普應三世之法名曰神通是故經云智入三世而無來往為三世是衆生情所妄安井實有故為智體無形色不造作而應羣品名之為神圓滿十方無法不知無根不識名之為通音切瞙莫音饒如招切覲渠吝切謁於揭切鑽則官切沮慈呂切耽丁含切晝之又切缺苦穴切著智呂切藉慈易慈夜二切
