body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論賢首品第十二之三經一切如來咸共説衆生業報難思議諸龍變化佛自在菩薩神力亦難思欲以譬喻而顯示終無有喻能喻此然諸智慧聰達人因於譬故解其義聲聞心住八解脫所有變現皆自在能以一身現多身復以多身為一身於虗空中入火定行住坐臥悉在空身上出水身下火身上出火身下水如是皆於一念中種種自在無邊量彼不具足大慈悲不為衆生求佛道尚能現此難思事況大饒益自在力譬如日月遊虗空影像普遍於十方泉池陂澤器中水衆寶河海靡不現菩薩色像亦復然十方普現不思議此皆三昧自在法唯有如來能證了如淨水中四兵像各各別異無文雜劒戟弧矢類甚多鎧胄車輿非一種隨其所有相差別莫不皆於水中現而水本自無分別菩薩三昧亦如是海中有神名善音其音普順海衆生所有語言皆辨了令彼一切悉歡悅彼神具有貪恚癡猶能善解一切音況復總持自在力而不能令衆歡喜有一婦人名辨才父母求天而得生若有離惡樂真實入彼身中生妙辨彼有貪欲瞋恚癡猶能隨行與辨才何況菩薩具智慧而不能與衆生益譬如幻師知幻法能現種種無量事須臾示作日月歲城邑豐饒大安樂幻師具有貪恚癡猶能幻力悅世間況復禪定解脫力而不能令衆歡喜天阿修羅鬬戰時修羅敗衄而退走兵仗車輿及徒旅一時竄匿莫得見彼有貪欲瞋恚癡尚能變化不思議況住神通無畏法云何不能現自在釋提桓因有象王彼知天主欲行時自化作頭三十二一一六牙皆具足一一牙上七池水清淨香潔湛然滿一一清淨池水中各七蓮華妙嚴飾彼諸嚴飾蓮華上各各有七天玉女悉善妓執奏衆樂而與帝釋相娛樂彼象或復捨本形自化其身同諸天威儀進止悉齊等有此變現神通力彼有貪欲瞋恚癡尚能現此諸神通何況具足方便智而於諸定不自在如阿修羅變化身蹈金剛際海中立海水至深僅其半首共須彌正齊等彼有貪欲瞋恚癡尚能現此大神通況伏魔怨照世燈而無自在威神力天阿修羅共戰時帝釋神力難思議隨阿修羅軍衆數現身等彼而與敵諸阿修羅發是念釋提桓因來向我必取我身五種縛由是彼衆悉憂悴帝釋現身有千眼手持金剛出火𦦨被甲持仗極威嚴修羅望見咸退伏彼以微小福德力猶能摧破大怨敵何況救度一切者具足功德不自在忉利天中有天鼓從天業報而生得知諸天衆放逸時空中自然出此音一切五欲悉無常如水聚沫性虗偽諸有如夢如陽𦦨亦如浮雲水中月放逸為怨為苦惱非甘露道生死徑若有作諸放逸行入於死滅大魚口世間所有衆苦本一切聖人皆厭患五欲功德滅壞性汝應愛樂真實法三十三天聞此音悉共來升善法堂帝釋為説微妙法咸令順寂除貪愛彼音無形不可見猶能利益諸天衆況隨心樂現色身而不濟度諸羣生天阿修羅共鬬時諸天福德殊勝力天鼓出音告其衆汝等宜應勿憂怖諸天聞此所告音悉除憂畏增益力時阿修羅心震懼所將兵衆咸退走甘露妙定如天鼓恆出降魔寂靜音大悲哀愍救一切普使衆生滅煩惱帝釋普應諸天女九十有二那由他令彼各各心自謂天王獨與我娛樂如天女中身普應善法堂內亦如是能於一念現神通悉至其前為説法帝釋具有貪恚癡能令眷屬悉歡喜況大方便神通力而不能令一切悅他化自在六天王於欲界中得自在以業惑苦為骨網繫縛一切諸凡夫彼有貪欲瞋恚癡猶於衆生得自在況具十種自在力而不能令衆同行三千世界大梵王一切梵天所住處悉能現身於彼坐演暢微妙梵音聲彼住世間梵道中禪定神通尚如意況出世間無有上於禪解脫不自在摩醯首羅智自在大海龍王降雨時悉能分別數其滴於一念中皆辨了無量億劫勤修學得是無上菩提智云何不於一念中普知一切衆生心衆生業報不思議以大風力起世間巨海諸山天宮殿衆寶光明萬物種亦能興雲降大雨亦能散滅諸雲氣亦能成熟一切穀亦能安樂諸羣生風不能學波羅蜜亦不學佛諸功德猶成不可思議事何況具足諸願者男子女人種種聲一切鳥獸諸音聲大海川流靁震聲皆能稱悅衆生意況復知聲性如響逮得無礙妙辨才普應衆生而説法而不能令世間喜海有希奇殊特法能為一切平等印衆生寶物及川流普悉包容無所拒無盡禪定解脫者為平等印亦如是福德智慧諸妙行一切普修無厭足大海龍王遊戲時普於諸處得自在興雲充遍四天下其雲種種莊嚴色第六他化自在天於彼雲色如真金化樂天上赤珠色兜率陀天霜雪色夜摩天上琉璃色三十三天瑪瑙色四王天上頗梨色大海水上金剛色緊那羅中妙香色諸龍住處蓮華色夜叉住處白鵝色阿修羅中山石色單越處金𦦨色閻浮提中青寶色餘二天下雜莊嚴隨衆所樂而應之又復他化自在天雲中電耀如日光化樂天上如月光兜率天上閻浮金夜摩天上珂雪色三十三天金𦦨色四王天上衆寶色大海之中赤珠色緊那羅界琉璃色龍王住處寶藏色夜叉所住頗梨色阿修羅中瑪瑙色單越境火珠色閻浮提中帝青色餘二天下雜莊嚴如雲色相電亦然他化靁震如梵音化樂天中天鼓音兜率天上歌唱音夜摩天上天女音於彼三十三天上如緊那羅種種音護世四王諸天所如乾闥婆所出音海中兩山相擊聲緊那羅中簫笛聲諸龍城中頻伽聲夜叉住處龍女聲阿修羅中天鼓聲於人道中海潮聲他化自在雨妙香種種雜華為莊嚴化樂天雨多羅華曼陀羅華及澤香兜率天上雨摩尼具足種種寶莊嚴髻中寶珠如月光上妙衣服真金色夜摩中雨幢幡蓋華鬘塗香妙嚴具赤真珠色上妙衣及以種種衆妓樂三十三天如意珠堅黑沈水栴檀香金雞羅多摩等妙華香水相雜雨護世城中雨美膳色香味具增長力亦雨難思衆妙寶悉是龍王之所作又復於彼大海中霔雨不斷如車軸復雨無盡大寶藏亦雨種種莊嚴寶緊那羅界雨纓絡衆色蓮華衣及寶婆利師迦末利香種種樂音皆具足諸龍城中雨赤珠夜叉城內光摩尼阿修羅中雨兵仗摧伏一切諸怨敵單越中雨纓絡亦雨無量上妙華弗婆瞿耶二天下悉雨種種莊嚴具閻浮提雨清淨水微細悅澤常應時長養衆華及果藥成熟一切諸苗稼如是無量妙莊嚴種種雲電及靁雨龍王自在悉能作而身不動無分別彼於世界海中住尚能現此難思力況入法海具功德而不能為大神變彼諸菩薩解脫門一切譬喻無能顯我今以此諸譬喻略説於其自在力論十一從如來咸共説已下有一百五十八行頌明舉一喻況説分經第一智慧廣大慧真實智慧無邊慧勝慧及以殊勝慧如是法門今已説此法希有甚奇特若人聞已能忍可能信能受能讚説如是所作甚為難世間一切諸凡夫信是法者甚難得若有勤修清淨福以昔因力乃能信一切世界諸羣生少有欲求聲聞乘求獨覺者轉復少趣大乘者甚難遇趣大乘者猶為易能信此法倍更難況復持誦為人説如法修行真實解有以三千大千界頂戴一劫身不動彼之所作未為難信是法者乃為難有以手擎十佛剎盡於一劫空中住彼之所作未為難能信此法乃為難論十二從第一智慧廣大慧已下有十四行頌明信佛智慧自欲同知難信分經十剎塵數衆生所悉施樂具經一劫彼之福德未為勝信此法者為最勝十剎塵數如來所悉皆承事盡一劫若於此品能誦持其福最勝過於彼論十三從十剎塵數衆生所已下有四行頌明信樂受持得福分經時賢首菩薩説此偈已十方世界六反震動魔宮隱蔽惡道休息十方諸佛普現其前各以右手而摩其頂同聲讚言善哉善哉快説此法我等一切悉皆隨喜論十四時賢首菩薩已下三行半經明賢首菩薩所説法門威感十方諸佛摩頂許可分二隨文釋義者文自具明不煩更釋幽隱難知者方可解之已前總明以果成信竟入真實證如下升帝釋天宮説十住法門是此一會升須彌山品是序分餘五品經是正説分至明三品末後動地雨華是流通分升須彌山頂品第十三論此十住位中有六品經一升須彌頂品二頂上偈讚品三十住品四梵行品五發心功德品六明法品如是六品共成十住法門將釋此品義分為三一釋品來意二以處表法三隨文釋義一釋品來意者明前於普光明殿人間地上成十信之心已終此妙峯之頂明從十信入十住入位之升進故此品須來二以處表法者明此山於七重金輪圍山七重大海之內出水高八萬四千由旬縱廣亦爾四寶所成東面黃金西白銀南吠琉璃北瑪瑙上有四埵埵有八輔天衆四八三十二中心名妙高頂天帝釋在其上居寶宮殿通為帝釋天三十三天總以帝釋為主帝釋有四名一名天帝釋二名憍尸迦三名釋提桓四名因陀羅大意名能主為能為諸天作主故此妙峯山四寶合成諸天寶宮殿在上莊嚴故為妙峯山此山之外七重金山及七重大海廣量金翅鳥兩翼相去三百三十六萬里迅疾能飛一鼓翼萬萬九千里七日七夜方至其頂其山在大海之中形如腰鼓崒然高聳非以手足攀攬之所能登為表此十住法門創生如來智慧之家為真佛子不可以有生滅尋思觀察及多聞心想攀攬所得故以將妙峯山用況表之令後人倣學山者高勝義故像此十住住佛所住法身妙智慧海故是出世高勝義故妙峯山者不動義諸天所居妙樂義莊嚴義像此位菩薩以方便三昧寂然不動無思無心不收不攝任性而定稱平等理與法身合忽然妙慧從此定生無始無明總無所得住佛妙慧都無所依得法妙樂智慧莊嚴出過情見諸佛所説解脫微妙經典無不解了為生在如來智慧家故三界無明一時頓盡唯有習氣煩惱漸漸以法治之如下十住品云佛子菩薩住處廣大與法界虗空等佛子菩薩住三世諸佛家故又如初發心功德品云應知此人即與三世諸佛同等即與三世諸佛如來境界平等即與三世諸佛如來功德平等得如來一身無量身究竟平等真實智慧才發心時即為十方一切諸佛所共稱歎乃至震動一切世界及一切世界中示現成佛等如文廣明不可同於三乘方便教説地前三賢菩薩得折伏現行無明地上見道為此經法教門依一切諸佛根本不動智而發心故以乘如來一切智乘而發心故於此十住位中能與如來同智慧故不同三乘但將三空觀且折伏現行於此經中發心之者從佛不動智而發菩提心設有餘習還以無依住智治之還是根本智不伏不斷為本寂用自在故無體可斷故無可伏故設修三昧任性淨故亦無收攝亦不伏捺故任自淨故設行分別任性智慧隨事用為亦無取捨故如是任法調治習氣使稱理智令慣習增明如佛願行而隨事世間成長大悲不出不沒故以心境一真無出沒故是故經中以阿修羅王等表之處大海而不出不沒等喻問曰何故不升四天王宮而超至帝釋宮答曰為四天王在妙峯山半傍住非是可表升法頂處至相盡現智慧莊嚴住不退故善財童子於妙峯山得憶念諸佛智慧光明門同此位故準例可知以超情塵之迹以山表之非要登山也已入如來智慧於衆中堪為主導故非要為帝釋也第三隨文釋義中義分為三一總科一品二明如來身行遍周等印如下經云十方一切諸世界中悉亦如是明十方一切妙峯山總見如來升妙峯山頂三隨文釋義經爾時如來威神力故十方一切世界一一四天下閻浮提中悉見如來坐於樹下各有菩薩承佛神力而演説法靡不自謂恆對於佛爾時世尊不離一切菩提樹下而上升須彌向帝釋殿時天帝釋在妙勝殿前遙見佛來即以神力莊嚴此殿置普光明藏師子之座其座悉以妙寶所成十千層級迥極莊嚴十千金網彌覆其上十千種帳十千種蓋周回間列十千繒綺以為垂帶十千珠纓周遍交絡十千衣服敷布座上十千天子十千梵王前後圍繞十千光明而為照耀爾時帝釋奉為如來敷置座已曲躬合掌恭敬向佛而作是言善來世尊善來善逝善來如來應正等覺唯願哀愍處此宮殿爾時世尊即受其請入妙勝殿十方一切諸世界中悉亦如是爾時帝釋以佛神力諸宮殿中所有樂音自然止息即自憶念過去佛所種諸善根而説頌言迦葉如來具大悲諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥拘那牟尼見無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥迦羅鳩馱如金山諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗舍浮佛無三垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥尸棄如來離分別諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥毗婆尸佛如滿月諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥弗沙明達第一義諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥提舍如來辨無礙諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥波頭摩佛淨無垢諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥然燈如來大光明諸吉祥中最無上彼佛曾來入此殿是故此處最吉祥如此世界中忉利天王以如來神力故偈讚十佛所有功德十方世界諸釋天王悉亦如是讚佛功德爾時世尊入妙勝殿結跏趺坐此殿忽然廣博寬容如其天衆諸所住處十方世界悉亦如是論一長科一品者於此品中長科為十段第一從爾時已下三行經明佛神力普現十方二爾時已下一行半經明佛不離菩提樹下而上升須彌向帝釋殿三時天帝釋已下可七行經明帝釋遙見佛來嚴殿敷座四曲躬合掌已下可兩行經明帝釋請佛入殿五爾時世尊已下三句經是如來十方一時受請入殿六十方一切世界已下三句經是結十方普會同此七爾時帝釋已下可一行半經明佛神力樂音自息八即自憶念已下四句明帝釋自念過去善根説頌歎佛來此九如此世界中已下兩行半經都結此處以偈歎佛十方同然十爾時已下可兩行經明如來處座而坐殿廣博寬容并結十方同此三隨文釋義者云不離菩提樹者明菩提體無去來遠近處所可離可到故又如來智身無表裏體遍周故又法界非大小毫剎相容故又心境無二相無中邊方所故又諸法無自性一多恆圓滿故帝釋遙見佛來者有二義一事二表法一事者為如來於無去來性示去來之相故言遙見二表法者明帝釋示同未悟不見如來智身遍周與心一體故言遙見佛來又信解為遙見自心入位為佛來帝釋即以神力莊嚴此殿者亦有二義一事二表法其事可知二表法者自加行也安置普光明師子之座者亦有二義一約位置座二約帝釋自德根堪一約位置座者約此十住位中法位也為十住中得一切諸佛智慧光明之藏於一切法自在無畏故置此座故如十行位中於夜摩宮中化作寶蓮華師子之座此約行位在一切生死具大悲行萬行以理智體得無染故以是義故以蓮華為座體在此十住位中以得一切諸佛智慧光明普照萬法故安置普光明藏師子之座此十住中安置其座十千層級十行中化作百萬層級師子之座為十住位中初始入位明須彌之上猶連地居明心有所得從信創會見法之報以此義故師子座須有安置又方便三昧是安置故十行位中約十住位中理智妙慧功成即十行位中以妙用而化其座又約行從空而立還約位在夜摩空居之天云座十千層級又百萬層級及帝釋天宮夜摩天總明隨位升進行相若也正入法智慧流不出毫塵遍諸剎海其座乃至十回向十地高下嚴飾各各隨位不同準例知之其座上莊嚴皆十千者明萬行報得故如十千金網者約能以教行之網漉衆生之果報故十千種帳者明養育義以於一切處為佛為天為大力士之神擁護養育衆生行之果報所得故十千種蓋者是大悲義以大悲心覆養一切衆生之果報所得故十千繒綺者以一行中行無盡差別行一言音中具差別教皆明白可觀之果也十千珠瓔者明萬行普周莊嚴智境化利衆生無休息之果所得故如一一塵中皆有無盡普賢身者是也十千衣服是於一切生死海柔和善忍覆養含生之果故十千天子者明能行萬行之人十千梵王者明於行中智慧自在故十千光明照耀者明智慧照耀能破自他迷暗長夜令大明故已上皆是舉此位之果德用成莊嚴令發心入位菩薩識果行因無疑惑故從曲躬已下明帝釋於如來致敬請佛入宮明行謙行也如來受請明從信入住如文可知二約帝釋自德最下明帝釋得宿念力於過去佛所種善根説頌歎佛者明以三昧力自見身心體性同古今佛智慧善根故已下十佛是當位之功用合古也於説頌中有二十行頌兩行一頌初兩行頌歎迦葉佛具云迦葉波此云飲光此是其姓亦以身光殊特能飲諸天及日月等光皆悉不現故次兩行歎拘那牟尼佛正云迦那牟尼言拘那者此云金也牟尼者佛也以金色為號次兩行歎迦羅鳩馱具云迦羅鳩村馱佛此云所應斷已斷次兩行歎毗舍浮佛此云遍一切自在次兩行歎尸棄佛正云式棄那此云持髻或曰有髮次兩行歎毗婆尸佛此云淨觀或曰勝觀或曰種種觀次兩行歎弗沙佛正云勃沙此云增盛次兩行歎提舍佛正云底沙此云説法度人次兩行歎波頭摩華佛正云鉢特忙此赤蓮華也次兩行歎然燈如來前之二佛是此今賢劫中佛後之七佛是前劫中佛以明創入十住之門古今法則相會明古佛今佛法不異故入此位者會同不別故言吉祥者歎此山頂是福善之處故明升進者以三昧力身心不動如山王總會古今諸佛同智慧故第九如此世界中忉利天已下有四行經於中義分為四一舉此世界歎佛功德二總舉十方同然三爾時已下明如來入殿升座而坐四明其殿忽然廣博普容諸天住處此明約如來無自他之德合然令大衆得見以明令大衆入位同此已上釋升須彌品竟大約此明以三昧力正入定時身心蕩然稱法界性無表裏光明朗徹是忽然廣博義亦是普光明藏師子之座義智慧現前是佛來義一一如是會理修行不可但逐名言也須彌頂上偈讚品第十四論將釋此品約作四門分別一釋品名目二釋品來意三都會此十住六品之經意四隨文釋義一釋品名目者以法慧等十箇菩薩各以自己當位隨位進修之法還自以偈讚讚之令信終菩薩倣之悟入故此品名為偈讚品明古今諸佛同會此智殿悲宮俱會古今之佛自身是未來之佛與古佛道合故二釋品來意者明前已創升須彌帝釋以偈歎佛此品明十住位當位菩薩將當位法門以偈讚之令信心者得入位故故有此品須來初歎過去佛次歎今現在佛未來佛者即入此位者是也是故經中不云未來十佛是過去佛盧舍那是現在佛修行始入位者是未來佛三都會十住之內須彌之上説六品經意者一升須彌品明信終升進二須彌頂上偈讚品明偈讚當位之法勸修升進之理三説十住品明當位所行之行四説梵行品明總十住之中所持無相之性戒五發心功德品明於十住之中發心所得功德之量六明法品即明當位之法升進向十行之因此六品明當位之修行因果及向十行之因四隨文釋義中復分為二一長科一品經意二隨文釋義一長科一品經意者義分為十一段經爾時佛神力故十方各有一大菩薩一一各與佛剎微塵數菩薩俱從百佛剎微塵數國土外諸世界中而來集會其名曰法慧菩薩一切慧菩薩勝慧菩薩功德慧菩薩精進慧菩薩善慧菩薩智慧菩薩真實慧菩薩無上慧菩薩堅固慧菩薩所從來土所謂因陀羅華世界波頭摩華世界寶華世界優鉢羅華世界金剛華世界妙香華世界悅意華世界阿盧那華世界那羅陀華世界虗空華世界各於佛所淨修梵行所謂殊特月佛無盡月佛不動月佛風月佛水月佛解脫月佛無上月佛星宿月佛清淨月佛明了月佛是諸菩薩至佛所已頂禮佛足隨所來方各化作毗盧遮那藏師子之座於其座上結跏趺坐如此世界中須彌頂上菩薩來集一切世界悉亦如是彼諸菩薩所有名字世界佛號悉等無別爾時世界從兩足指放百千億妙色光明普照十方一切世界須彌頂上帝釋宮中佛及大衆靡不皆現爾時法慧菩薩承佛威神普觀十方而説頌言論一從爾時佛神力故已下有十九行半經明佛以神力令衆來集分於此分中十九行半經復分為七段一從爾時佛神力故五行半經明菩薩來集二所從來土已下三行半經明菩薩世界之名三各於佛所淨修梵行已下三行經明本所事佛四是諸菩薩至佛所已下兩行經明菩薩來已化座而坐五如此世界中已下兩行經明都結十方世界菩薩同然六爾時世尊已下兩行半經明佛足指端放光普照一切處帝釋宮殿十信足輪下放光此十住中足指端放光明位勝進十行足趺十回向膝上十地眉間毫中放光此光表法位升進故還是第一會中現相品所放眉間之光以果成信入位之光足指光者明照入此住位者身心智慧宮殿表入聖之初故足指端放光也七爾時已下一行經明法慧菩薩説頌歎佛餘義隨文可知約科文之意即悉其意如初菩薩來集共世界名并本所事佛總都會配當位法及法門因果始可得見其意況從法慧菩薩是此位中所修之行人約所得如來智慧立名世界名因陀羅華世界是所修之法殊特月佛是初發心住位中約法所修之果云因陀羅者此云能主也華者是開敷感果義為此十住中初發心菩薩即能十方一切世界中示現成佛故世界名能主以能示現主導一切衆生故以其行華能開敷自他智慧果故經云一一各與佛剎微塵數同名法慧菩薩俱者明智慧解行了悟遍知是境界故以達自心一切總爾故一迷一切迷一悟一切悟此明唯應度者自迷解故智慧遍故云從百佛剎微塵數國土外諸世界中來者明迷云國土之外迷解云來但以迷無明暗障廣多以比之世界塵數悟之解行廣多故亦比之如世界之塵智慧與無明相似但只隔迷悟故是故此經下文云有三千大千世界量等經卷內小衆生身中是其義也佛號殊特月者殊者勝也特者奇也月者清涼也明入此位菩薩生住如來智慧家時無始無明煩惱炎熱惡道熾然一時頓滅唯有如來智慧朗然清涼如月故明此短菩薩創始入真以能破煩惱惑熱處立自己佛果之名以次十行十回向隨位升進菩薩名佛世界名各各隨位差別十行中佛果名號下名悉同名之為眼為知根利衆生處立名十回向中佛果名號上名悉同名之為妙為於生死中利衆生之妙用自在故至位方明又云十方諸來法慧等十菩薩衆各於佛所淨修梵行者明各於自心法身智慧能淨煩惱清涼如月處立名為各於佛所淨修梵行梵者淨也以明此位菩薩妙慧現前諸行體自淨故為法性智慧任法運為體無生滅故明以體無生滅處以標自心佛果故是故有發心之士應當如是以方便無作無思任性之定而自顯發自心無性佛智慧門即能於煩惱無所染汙便即名之殊特月佛隨所來方各化作毗盧遮那藏師子之座者此法慧菩薩是東方之位明入位之首破暗之初如日初出東方能破暗故以世間之名名為殊特以智慧明能破自他無始長夜之迷暗故是故佛果名之殊特月佛以初發心已為天人師以是世界名能主華其化所作之座名毗盧遮那藏師子之座者是佛果座也明毗盧者光也遮那者遍也明遍座無始一切無明煩惱以化作一切大智慧光明藏遍照一切心境化成法界自在解脫之門師子者得無畏也已上總依主釋結跏趺坐者會妄想而為真智慧故故為結跏趺坐此十住位中十箇菩薩同於善財童子於妙峯山頂上初入信之後入十住之初德雲比丘下至慈行童女法門相似文殊師利菩薩以明初發信心以此經中圓會教行使令後學者令易解故但説其教不著行行之人難解了故以是義故初會舉佛果神天示入法而勸修以明一一皆同佛知見第二會勸生信解以不動智佛以成信門次説入位進修之教則十信十行十回向十地十一地法門法界品中舉善財童子是能行五位行者以教行具彰令易解故若不如是雖見教法在行猶迷是故於此一部之經因果理智教行仁士一一具彰也令修道者倣學不謬故此十住入真見道之初心與後十行十回向十地十一地為正覺之果故如人百歲以初生為長故人生十子初生為長音切弧戶吾切矢式視切鎧苦亥切輿以諸切臾豫音敗薄賣切衄女育切輿以諸切竄七亂切匿女力切僅渠吝切沫末音悴子對切罥古兗切鵝五何切電殿音珂苦何切吠符廢切埵丁果切攬盧敢切湛直檻切快苦怪切層自登切級居邑切繒疾陵切綺虛彼切鳩居求切馱唐佐切涼呂張切絡盧各切捺奴曷切漉盧谷切膝息七切謬靡幼切徹尹列切寬苦丸切崒昨沒切
