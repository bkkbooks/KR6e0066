body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論阿僧祇品第三十論將釋此品約立四門一釋品來意二釋能問之主三釋說法之主四隨文釋義一釋品來意者明前十定十通十忍三品明該括因果初終始末不遷剎那之際已成神通法忍具足明一切諸佛所施因果教行方便果行相資始終不絕不離剎那之時如仁王經一念中具九十剎那一剎那經九百生滅如是三世佛果及普賢方便行總時不遷故但以剎那為量不立生滅之名設論生滅但於剎那內安立更無長短自此已下至如來出現品明佛果之中三業廣大自在行門且如阿僧祇一品明如來心業廣大自在二如來壽量品明如來命廣大自在三菩薩住處品明如來行攝生廣大常住自在四佛不思議法品明歎佛三業神德廣大自在五如來十身相海品明佛身業報得莊嚴廣大自在六如來隨好光明功德品明佛三業所順法身所感之功德廣大自在依纓絡經配第三禪說佛華三昧有百萬億頌即是此普賢行品是其略也當第七會合名佛華三昧品七普賢行品明佛三業果行徧周廣大自在八如來出現品明佛覺行徧周常於一切世間無時不出現廣大自在此之八品經總歎佛果行智德三業功用及莊嚴報相廣大自在故以次此品須來二釋能問法主者菩薩名心王此明得心成忍之後心業自在名之為王三釋能說法之主者此品何故如來自說明此數法廣大下位智所不及唯佛能究竟故此是佛果二愚非至差別智滿方了即此阿僧祇品隨好光明功德品二品法是如來自說自餘五位各各隨位菩薩自說十信菩薩說十信法即文殊覺首等是十住菩薩說十住法即法慧財慧等是如是准此例知以此此品非至差別智果滿佛位方明還是如來自說故所問之主還是如來心智自在名之為王表心自在故方堪能問總是佛自在之心故設教法則令學者倣之故說行以普賢主之以行成忍即以王主之又此數法智滿佛果方終以智徧故任運而知非是加行作意而知以此佛自說故經爾時心王菩薩白佛言世尊諸佛如來演說阿僧祇無量無邊無等不可數不可稱不可思不可量不可說不可說不可說世尊云何阿僧祇乃至不可說不可說耶佛告心王菩薩言善哉善哉善男子汝今為欲令諸世間入佛所知數量之義而問如來應正等覺善男子諦聽諦聽善思念之當為汝說時心王菩薩唯然受教佛言善男子一百洛叉為一俱胝俱胝俱胝為一阿庾多阿庾多阿庾多為一那由他那由他那由他為一頻婆羅頻婆羅頻婆羅為一矜羯羅矜羯羅矜羯羅為一阿伽羅阿伽羅阿伽羅為一最勝最勝最勝為一摩婆上聲羅摩婆羅摩婆羅為一阿婆上聲羅阿婆羅阿婆羅為一多婆上聲羅多婆羅多婆羅為一界分界分界分為一普摩普摩普摩為一禰摩禰摩禰摩為一阿婆上聲鈴阿婆鈴阿婆鈴為一彌伽上聲婆彌伽婆彌伽婆為一毗攞伽毗攞伽毗攞伽為一毗伽上聲婆毗伽婆毗伽婆為一僧羯邏摩僧羯邏摩僧羯邏摩為一毗薩羅毗薩羅毗薩羅為一毗贍婆毗贍婆毗贍婆為一毗盛上聲伽毗盛伽毗盛伽為一毗素陀毗素陀毗素陀為一毗婆訶毗婆訶毗婆訶為一毗薄底毗薄底毗薄底為一毗佉擔毗佉擔毗佉擔為一稱量稱量稱量為一一持一持一持為一異路異路異路為一顛倒顛倒顛倒為一三末耶三末耶三末耶為一毗覩羅毗覩羅毗覩羅為一奚婆上聲羅奚婆羅奚婆羅為一伺察伺察伺察為一周廣周廣周廣為一高出高出高出為一最妙最妙最妙為一泥羅婆泥羅婆泥羅婆為一訶理婆訶理婆訶理婆為一一動一動一動為一訶理蒱訶理蒱訶理蒱為一訶理三訶理三訶理三為一奚魯伽奚魯伽奚魯伽為一達攞步陀達攞步陀達攞步陀為一訶魯那訶魯那訶魯那為一摩魯陀摩魯陀摩魯陀為一懺慕陀懺慕陀懺慕陀為一瑿攞陀瑿攞陀瑿攞陀為一摩魯摩摩魯摩摩魯摩為一調伏調伏調伏為一離憍慢離憍慢離憍慢為一不動不動不動為一極量極量極量為一阿麼怛羅阿麼怛羅阿麼怛羅為一勃麼怛羅勃麼怛羅勃麼怛羅為一伽麼怛羅伽麼怛羅伽麼怛羅為一那麼怛羅那麼怛羅那麼怛羅為一奚麼怛羅奚麼怛羅奚麼怛羅為一麼怛羅麼怛羅麼怛羅為一鉢羅麼怛羅鉢羅麼怛羅鉢羅麼怛羅為一尸婆麼怛羅尸婆麼怛羅尸婆麼怛羅為一翳羅翳羅翳羅為一薜羅薜羅薜羅為一諦羅諦羅諦羅為一偈羅偈羅偈羅為一窣步羅窣步羅窣步羅為一泥羅泥羅泥羅為一計羅計羅計羅為一細羅細羅細羅為一睥羅睥羅睥羅為一謎羅謎羅謎羅為一娑攞荼娑攞荼娑攞荼為一謎魯陀謎魯陀謎魯陀為一契魯陀契魯陀契魯陀為一摩覩羅摩覩羅摩覩羅為一娑母羅娑母羅娑母羅為一阿野娑阿野娑阿野娑為一迦麼羅迦麼羅迦麼羅為一摩伽婆摩伽婆摩伽婆為一阿怛羅阿怛羅阿怛羅為一䤈魯邪䤈魯邪䤈魯邪為一薜魯婆薜魯婆薜魯婆為一羯羅波羯羅波羯羅波為一訶婆婆訶婆婆訶婆婆為一毗婆上聲羅毗婆羅毗婆羅為一那婆上聲羅那婆羅那婆羅為一摩攞羅摩攞羅摩攞羅為一娑婆上聲羅娑婆羅娑婆羅為一迷攞普迷攞普迷攞普為一者麼羅者麼羅者麼羅為一䭾麼羅䭾麼羅䭾麼羅為一鉢攞麼陀鉢攞麼陀鉢攞麼陀為一毗伽摩毗伽摩毗伽摩為一烏波䟦多烏波䟦多烏波䟦多為一演說演說演說為一無盡無盡無盡為一出生出生出生為一無我無我無我為一阿畔多阿畔多阿畔多為一青蓮華青蓮華青蓮華為一鉢頭摩鉢頭摩鉢頭摩為一僧祇僧祇僧祇為一趣趣趣為一至至至為一阿僧祇阿僧祇阿僧祇為一阿僧祇轉阿僧祇轉阿僧祇轉為一無量無量無量為一無量轉無量轉無量轉為一無邊無邊