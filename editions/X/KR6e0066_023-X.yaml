此第十卷中總舉一百箇世界種圍遶中心十一箇二十重世界種布列而住近輪圍山十箇世界種上下四重高下與此中心十一箇世界種相似中間相去極遠自餘九十箇世界種不云重數大數有一百一十一箇世界種於中表意如前已釋經諸佛子如是十不可說佛剎微塵數香水海中有十不可說佛剎微塵數世界種皆依現一切菩薩形摩尼王幢莊嚴蓮華住各各莊嚴際無有間斷各各放寶色光明各各光明雲而覆其上各各莊嚴具各各劫差別各各佛出現各各演法海各各眾生徧充滿各各十方普趣入各各一切佛神力所加持此一一世界種中一切世界依種種莊嚴住遞相接連成世界網於華藏莊嚴世界海種種差別周徧建立爾時普賢菩薩欲重宣其義承佛威力而說頌言華藏世界海法界等無別莊嚴極清淨安住於虗空此世界海中剎種難思議一一皆自在各各無雜亂華藏世界海剎種善安布殊形異莊嚴種種相不同諸佛變化音種種為其體隨其業力現剎種妙嚴飾須彌山城網水漩輪圍形廣大蓮華開彼彼互圍遶山幢樓閣形旋輪金剛形如是不思議廣大諸剎種大海真珠𦦨光網不思議如是諸剎種悉在蓮華住一一諸剎種光網不可說光中現眾剎普徧十方海一切諸剎種所有莊嚴具國土悉入中普見無有盡剎種不思議世界無邊際種種妙嚴好皆由大仙力一切剎種中世界不思議或成或有壞或有已壞滅譬如林中葉有生亦有落如是剎種中世界有成壞譬如依樹林種種果差別如是依剎種種種眾生住譬如種子別生果各殊異業力差別故眾生剎不同譬如心王寶隨心見眾色眾生心淨故得見清淨剎譬如大龍王興雲徧虗空如是佛願力出生諸國土如幻師呪術能現種種事眾生業力故國土不思議譬如眾繢像畫師之所作如是一切剎心畫師所成眾生身各異隨心分別起如是剎種種莫不皆由業譬如見導師種種色差別隨眾生心行見諸剎亦然一切諸剎際周布蓮華網種種相不同莊嚴悉清淨彼諸蓮華網剎網所安住種種莊嚴事種種眾生居或有剎土中險惡不平坦由眾生煩惱於彼如是見雜染及清淨無量諸剎種隨眾生心起菩薩力所持或有剎土中雜染又清淨斯由業力起菩薩之所化有剎放光明離垢寶所成種種妙嚴飾諸佛令清淨一一剎種中劫燒不思議所現雖敗惡其處常堅固由眾生業力出生多剎土依止於風輪及以水輪住世界法如是種種見不同而實無有生亦復無滅壞一一心念中出生無量剎以佛威神力悉見淨無垢有剎泥土成其體甚堅硬黑闇無光照惡業者所居有剎金剛成雜染大憂怖苦多而樂少薄福之所處或有用鐵成或以赤銅作石山險可畏罪惡者充滿剎中有地獄眾生苦無捄常在黑闇中𦦨海所燒然或復有畜生種種醜陋形由其自惡業常受諸苦惱或見閻羅界飢渴所煎逼登上大火山受諸極重苦或有諸剎土七寶所合成種種諸宮殿斯由淨業得汝應觀世間其中人與天淨業果成就隨時受快樂一一毛孔中億剎不思議種種相莊嚴未曾有迫隘眾生各各業世界無量種於中取著生受苦樂不同有剎眾寶成常放無邊光金剛妙蓮華莊嚴淨無垢有剎光為體依止光輪住金色栴檀香𦦨雲普照明有剎月輪成香衣悉周布於一蓮華內菩薩皆充滿有剎眾寶成色相無諸垢譬如天帝網光明恒照耀有剎香為體或是金剛華摩尼光影形觀察甚清淨或有難思剎華旋所成就化佛皆充滿菩薩普光明或有清淨剎悉是眾華樹妙枝布道場蔭以摩尼雲有剎淨光照金剛華所成有是佛化音無邊列成網有剎如菩薩摩尼妙寶冠或有如座形從化光明出或是栴檀粖或是眉間光或佛光中音而成斯妙剎有見清淨剎以一光莊嚴或見多莊嚴種種皆奇妙或用十國土妙物作嚴飾或以千土中一切為莊校或以億剎物莊嚴於一土種種相不同皆如影像現不可說土物莊嚴於一剎各各放光明如來願力起或有諸國土願力所淨治一切莊嚴中普見眾剎海諸修普賢願所得清淨土三世剎莊嚴一切於中現佛子汝應觀剎種威神力未來諸國土如夢悉令見十方諸世界過去國土海咸於一剎中現像猶如化三世一切佛及以其國土於一剎種中一切悉觀見一切佛神力塵中現眾生種種悉明見如影無真實或有眾多剎其形如大海或如須彌山世界不思議有剎善安住其形如帝網或如樹林形諸佛滿其中或作寶輪形或作蓮華狀八隅備眾飾種種悉清淨或有如座形或復有三隅或如佉勒迦城郭梵王身或如天主髻或有如半月或如摩尼山或如日輪形或有世界形譬如香海漩或作光明輪佛昔所嚴淨或有輪網形或有壇墠形或如佛毫相肉髻廣長眼或有如佛手或如金剛杵或如𦦨山形菩薩悉周徧或如師子形或如海蚌形無量諸色相體性各差別於一剎種中剎形無有盡皆由佛願力護念得安住有剎住一劫或住於十劫乃至過百千國土微塵數或於一劫中見剎有成壞或無量無數乃至不思議或有剎有佛或有剎無佛或有惟一佛或有無量佛國土若無佛他方世界中有佛變化來為現諸能事歿天與降神處胎及出生魔降成正覺轉無上法輪隨眾生心樂示現種種相為轉妙法輪悉應其根欲一一佛剎中一佛出興世經於億千歲演說無上法眾生非法器不能見諸佛若有心樂者一切處皆見一一剎土中各有佛興世一切剎中佛億數不思議此中一一佛現無量神變悉徧於法界調伏眾生海有剎無光明黑闇多恐懼苦觸如刀劒見者自酸毒或有諸天光或有宮殿光或日月光明剎網難思議有剎自光明或樹放淨光未曾有苦惱眾生福力故或有山光明或有摩尼光或以燈光明悉眾生業力或有佛光明菩薩滿其中有是蓮華光𦦨色甚嚴好有剎華光照有以香水照塗香燒香照皆由淨願力有以雲光照摩尼蜯光照佛神力光照能宣悅意聲或以寶光照或金剛𦦨照淨音能遠震所至無眾苦或有摩尼光或是嚴具光或道場光明照耀眾會中佛放大光明化佛滿其中其光普照觸法界悉周徧有剎甚可畏號叫大苦聲其聲極酸楚聞者生厭怖地獄畜生道及以閻羅處是濁惡世界恒出憂苦聲或有國土中常出可樂音悅意順其教斯由淨業得或有國土中恒聞帝釋音或聞梵天音一切世主音或有諸剎土雲中出妙聲寶海摩尼樹及樂音徧滿諸佛圓光內化聲無有盡及菩薩妙音周聞十方剎不可思議國普轉法輪聲願海所出聲修行妙音聲三世一切佛出生諸世界名號皆具足音聲無有盡或有剎中聞一切佛力音地度及無量如是法皆演普賢誓願力億剎演妙音其音若靁震住劫亦無盡佛於清淨國示現自在音十方法界中一切無不聞論十二第十卷經末一段頌都頌已前諸世界海安住虗空或淨或穢純雜同居而不相障皆由業力所起經文廣博不可子細科文文句亂繁障其義趣於中義味大意前已略述餘之廣義經文自具不同小經小經即須多引外文莊飾其義此大部一乘之典餘經義與此多不相應意況與三乘全別不可例此經典此已上十卷經明三度舉果一前如來始成正覺及座內眾舉佛果行果明佛自證二眉間眾是舉佛中道行果與一切未信者作成信之因三華藏世界海明是所向前座內眾眉間眾所行之行報得之果大意以佛報業之果答前三十七問見果知因使後學者如是倣之行如是行願得如是果報音切淵烏玄切怨於袁切讎市流切堞徒頰切魔莫和切軌居水切幄於角切埤頻支切堄研禮切繢胡對切燒書曜切硬五更切怖普布切醜昌有切隘於戒切杵昌與切蜯蒲項切觸五欲切號胡刀切叫占弔音酸蘇官切楚初舉切趣七千切
