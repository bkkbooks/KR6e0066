body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論華藏世界品第五之三經諸佛子此蓮華因陀羅網香水海右旋次有香水海名積集寶香藏世界種名一切威德莊嚴以一切佛法輪音聲為體此中最下方有世界名種種出生形如金剛依種種金剛山幢住金剛寶光雲而覆其上佛剎微塵數世界圍遶純一清淨佛號蓮華眼此上過佛剎微塵數世界有世界名喜見音佛號生喜樂此上過佛剎微塵數世界有世界名寶莊嚴幢佛號一切智此上過佛剎微塵數世界有世界名多羅華普照佛號無垢寂妙音此上過佛剎微塵數世界有世界名變化光佛號清淨空智慧月此上過佛剎微塵數世界有世界名眾妙間錯佛號開示福德海密雲相此上過佛剎微塵數世界有世界名一切莊嚴具妙音聲佛號歡喜雲此上過佛剎微塵數世界有世界名蓮華池佛號名稱幢此上過佛剎微塵數世界有世界名一切寶莊嚴佛號嚬伸觀察眼此上過佛剎微塵數世界有世界名淨妙華佛號無盡金剛智此上過佛剎微塵數世界有世界名蓮華莊嚴城佛號日藏眼普光明此上過佛剎微塵數世界有世界名無量樹峯佛號一切法靁音此上過佛剎微塵數世界有世界名日光明佛號開示無量智此上過佛剎微塵數世界有世界名依止蓮華葉佛號一切福德山此上過佛剎微塵數世界有世界名風普持佛號日耀根此上過佛剎微塵數世界有世界名光明顯現佛號身光普照此上過佛剎微塵數世界有世界名香靁音金剛寶普照佛號最勝華開敷相此上過佛剎微塵數世界有世界名帝網莊嚴形如欄楯依一切莊嚴海住光𦦨樓閣雲彌覆其上二十佛剎微塵數世界圍遶純一清淨佛號示現無畏雲諸佛子此積集寶香藏香水海右旋次有香水海名寶莊嚴世界種名普無垢以一切微塵中佛剎神變聲為體此中最下方有世界名淨妙平坦形如寶身依一切寶光輪海住種種栴檀摩尼真珠雲彌覆其上佛剎微塵數世界圍遶純一清淨佛號難摧伏無等幢此上過佛剎微塵數世界有世界名熾然妙莊嚴佛號蓮華慧神通王此上過佛剎微塵數世界有世界名微妙相輪幢佛號十方大名稱無盡光此上過佛剎微塵數世界有世界名𦦨藏摩尼妙莊嚴佛號大智慧見聞皆歡喜此上過佛剎微塵數世界有世界名妙華莊嚴佛號無量力最勝智此上過佛剎微塵數世界有世界名出生淨微塵佛號超勝梵此上過佛剎微塵數世界有世界名普光明變化香佛號香象金剛大力勢此上過佛剎微塵數世界有世界名光明旋佛號義成善名稱此上過佛剎微塵數世界有世界名寶纓珞海佛號無比光徧照此上過佛剎微塵數世界有世界名妙華燈幢佛號究竟功德無礙慧燈此上過佛剎微塵數世界有世界名善巧莊嚴佛號慧日波羅蜜此上過佛剎微塵數世界有世界名栴檀華普光明佛號無邊慧法界音此上過佛剎微塵數世界有世界名帝網幢佛號燈光迥照此上過佛剎微塵數世界有世界名淨華輪佛號法界日光明此上過佛剎微塵數世界有世界名大威耀佛號無邊功德海法輪音此上過佛剎微塵數世界有世界名同安住寶蓮華池佛號開示入不可思議智此上過佛剎微塵數世界有世界名平坦地佛號功德寶光明王此上過佛剎微塵數世界有世界名香摩尼聚佛號無盡福德海妙莊嚴此上過佛剎微塵數世界有世界名微妙光明佛號無等力普徧音此上過佛剎微塵數世界有世界名十方普堅固莊嚴照耀其形八隅依心王摩尼輪海住一切寶莊嚴帳雲彌覆其上二十佛剎微塵數世界圍遶純一清淨佛號普眼大明燈諸佛子此寶莊嚴香水海右旋次有香水海名金剛寶聚世界種名法界行以一切菩薩地方便法音聲為體此中最下方有世界名淨光照耀形如珠貫依一切寶色珠纓海住菩薩珠髻光明摩尼雲而覆其上佛剎微塵數世界圍遶純一清淨佛號最勝功德光此上過佛剎微塵數世界有世界名妙蓋佛號法自在慧此上過佛剎微塵數世界有世界名寶莊嚴師子座佛號大龍淵此上過佛剎微塵數世界有世界名出現金剛座佛號昇師子座蓮華臺此上過佛剎微塵數世界有世界名蓮華勝音佛號智光普開悟此上過佛剎微塵數世界有世界名善慣習佛號持地妙光王此上過佛剎微塵數世界有世界名喜樂音佛號法燈王此上過佛剎微塵數世界有世界名摩尼藏因陀羅網佛號不空見此上過佛剎微塵數世界有世界名眾妙地藏佛號𦦨身幢此上過佛剎微塵數世界有世界名金光輪佛號淨治眾生行此上過佛剎微塵數世界有世界名須彌山莊嚴佛號一切功德雲普照此上過佛剎微塵數世界有世界名眾樹形佛號寶華相淨月覺此上過佛剎微塵數世界有世界名無怖畏佛號最勝金光炬此上過佛剎微塵數世界有世界名大名稱龍王幢佛號觀等一切法此上過佛剎微塵數世界有世界名示現摩尼色佛號變化日此上過佛剎微塵數世界有世界名光𦦨燈莊嚴佛號寶蓋光徧照此上過佛剎微塵數世界有世界名香光雲佛號思惟慧此上過佛剎微塵數世界有世界名無怨讎佛號精進勝慧海此上過佛剎微塵數世界有世界名一切莊嚴具光明幢佛號普現悅意蓮華自在王此上過佛剎微塵數世界有世界名毫相莊嚴形如半月依須彌山摩尼華海住一切莊嚴熾盛光摩尼王雲而覆其上二十佛剎微塵數世界圍遶純一清淨佛號清淨眼諸佛子此金剛寶聚香水海右旋次有香水海名天城寶堞世界種名燈𦦨光明以普示一切平等法輪音為體此中最下方有世界名寶月光𦦨輪形如一切莊嚴具依一切寶莊嚴華海住琉璃色師子座雲而覆其上佛剎微塵數世界圍遶純一清淨佛號日月自在光此上過佛剎微塵數世界有世界名須彌寶光佛號無盡法寶幢此上過佛剎微塵數世界有世界名眾妙光明幢佛號大華聚此上過佛剎微塵數世界有世界名摩尼光明華佛號人中最自在此上過佛剎微塵數世界有世界名普音佛號一切智徧照此上過佛剎微塵數世界有世界名大樹緊那羅音佛號無量福德自在龍此上過佛剎微塵數世界有世界名無邊淨光明佛號功德寶華光此上過佛剎微塵數世界有世界名最勝音佛號一切智莊嚴此上過佛剎微塵數世界有世界名眾寶間飾佛號寶𦦨須彌山此上過佛剎微塵數世界有世界名清淨須彌音佛號出現一切行光明此上過佛剎微塵數世界有世界名香水蓋佛號一切波羅蜜無礙海此上過佛剎微塵數世界有世界名師子華網佛號寶𦦨幢此上過佛剎微塵數世界有世界名金剛妙華燈佛號一切大願光此上過佛剎微塵數世界有世界名一切法光明地佛號一切法廣大真實義此上過佛剎微塵數世界有世界名真珠粖平坦莊嚴佛號勝慧光明網此上過佛剎微塵數世界有世界名琉璃華佛號寶積幢此上過佛剎微塵數世界有世界名無量妙光輪佛號大威力智海藏此上過佛剎微塵數世界有世界名明見十方佛號淨修一切功德幢此上過佛剎微塵數世界有世界名可愛樂梵音形如佛手依寶光網海住菩薩身一切莊嚴雲而覆其上二十佛剎微塵數世界圍遶純一清淨佛號普照法界無礙光論十此第九卷經都有十箇二十重世界種遶此中心世界種總都有十一箇二十重世界種於中意趣前已釋畢經爾時普賢菩薩復告大眾言諸佛子後離垢𦦨藏香水海東次有香水海名變化微妙身此海中有世界種名善布差別方次有香水海名金剛眼幢世界種名莊嚴法界橋次有香水海名種種蓮華妙莊嚴世界種名恒出十方變化次有香水海名無間寶王輪世界種名寶蓮華莖密雲次有香水海名妙香𦦨普莊嚴世界種名毗盧遮那變化行次有香水海名寶粖閻浮幢世界種名諸佛護念境界次有香水海名一切色熾然光世界種名最勝光徧照次有香水海名一切莊嚴具境界世界種名寶𦦨燈如是等不可說佛剎微塵數香水海其最近輪圍山香水海名頗棃地世界種名常放光明以世界海清淨劫音聲為體此中最下方有世界名可愛樂淨光幢佛剎微塵數世界圍遶純一清淨佛號最勝三昧精進慧此上過十佛剎微塵數世界與金剛幢世界齊等有世界名香莊嚴幢十佛剎微塵數世界圍遶純一清淨佛號無障礙法界燈此上過三佛剎微塵數世界與娑婆世界齊等有世界名放光藏佛號徧法界無障礙慧明此上過七佛剎微塵數世界至此世界種最上方有世界名最勝身香二十佛剎微塵數世界圍遶純一清淨佛號覺分華諸佛子彼無盡光明輪香水海外次有香水海名具足妙光世界種名徧無垢次有香水海名光耀蓋世界種名無邊普莊嚴次有香水海名妙寶莊嚴世界種名香摩尼軌度形次有香水海名出佛音聲世界種名善建立莊嚴次有香水海名香幢須彌藏世界種名光明徧滿次有香水海名栴檀妙光明世界種名華𦦨輪次有香水海名風力持世界種名寶𦦨雲幢次有香水海名帝釋身莊嚴世界種名真珠藏次有香水海名平坦嚴淨世界種名毗琉璃粖種種莊嚴如是等不可說佛剎微塵數香水海其最近輪圍山香水海名妙樹華世界種名出生諸方廣大剎以一切佛摧伏魔音為體此中最下方有世界名𦦨炬幢佛號世間功德海此上過十佛剎微塵數世界與金剛幢世界齊等有世界名出生寶佛號師子力寶雲此上與娑婆世界齊等有世界名衣服幢佛號一切智海王於此世界種最上方有世界名寶纓珞師子光明佛號善變化蓮華幢諸佛子彼金剛𦦨光明香水海外次有香水海名一切莊嚴具瑩飾幢世界種名清淨行莊嚴次有香水海名一切寶華光耀海世界種名功德相莊嚴次有香水海名蓮華開敷世界種名菩薩摩尼冠莊嚴次有香水海名妙寶衣服世界種名淨珠輪次有香水海名可愛華徧照世界種名百光雲照耀次有香水海名徧虗空大光明世界種名寶光普照次有香水海名妙華莊嚴幢世界種名金月眼纓珞次有香水海名真珠香海藏世界種名佛光明次有香水海名寶輪光明世界種名善化現佛境界光明如是等不可說佛剎微塵數香水海其最近輪圍山香水海名無邊輪莊嚴底世界種名無量方差別以一切國土種種言說音為體此中最下方有世界名金剛華蓋佛號無盡相光明普門音此上過十佛剎微塵數世界有世界與金剛幢世界齊等名出生寶衣幢佛號福德雲大威勢此上與娑婆世界齊等有世界名眾寶具妙莊嚴佛號勝慧海於此世界種最上方有世界名日光明衣服幢佛號智日蓮華雲諸佛子彼帝青寶莊嚴香水海外次有香水海名阿脩羅宮殿世界種名香水光所持次有香水海名寶師子莊嚴世界種名徧示十方一切寶次有香水海名宮殿色光明雲世界種名寶輪妙莊嚴次有香水海名出大蓮華世界種名妙莊嚴徧照法界次有香水海名燈𦦨妙眼世界種名徧觀察十方變化次有香水海名不思議莊嚴輪世界種名十方光明普名稱次有香水海名寶積莊嚴世界種名燈光照耀次有香水海名清淨寶光明世界種名須彌無能為礙風次有香水海名寶衣欄楯世界種名如來身光明如是等不可說佛剎微塵數香水海其最近輪圍山香水海名樹莊嚴幢世界種名安住帝網以一切菩薩智地音聲為體此中最下方有世界名妙金色佛號香𦦨勝威光此上過十佛剎微塵數世界與金剛幢世界齊等有世界名摩尼樹華佛號無礙普現此上與娑婆世界齊等有世界名毗琉璃妙莊嚴佛號法自在堅固慧於此世界種最上方有世界名梵音妙莊嚴佛號蓮華開敷光明王諸佛子彼金剛輪莊嚴底香水海