body:
  text: 大周新譯大方廣佛華嚴經序天𠕋金輪聖神皇帝製蓋聞造化權輿之首天道未分龜龍繫象之初人文始著雖萬八千歲同臨有截之區七十二君詎識無邊之義由是人迷四忍輪迴於六趣之中家纏五蓋沒溺於三塗之下及夫鷲巖西峙象駕東驅慧日法王超四大而高視中天調御越十地以居尊包括鐵圍延促沙劫其為體也則不生不滅其為相也則無去無來念處正勤三十七品為其行慈悲喜捨四無量法運其心方便之力難思圓對之機多緒混太空而為量豈算數之能窮入纖芥之微區匪名言之可述無得而稱者其唯大覺歟朕曩劫殖因叨承佛記金僊降旨大雲之偈先彰玉扆披詳寶雨之文後及加以積善餘慶俯集微躬遂得地平天成河清海晏殊禎絕瑞既日至而月書貝葉靈文亦時臻而歲洽踰海越漠獻賝之禮備焉架險航深重譯之詞罄矣大方廣佛華嚴經者斯乃諸佛之密藏如來之性海視之者莫識其指歸挹之者罕測其涯際有學無學志絕窺覦二乘三乘寧希聽受最勝種智莊嚴之跡既隆普賢文殊願行之因斯滿一句之內包法界之無邊一毫之中置剎土而非隘摩竭陀國肇興妙會之緣普光法堂爰敷寂滅之理緬惟奧義譯在晉朝時逾六代年將四百然一部之典纔獲三萬餘言唯啟半珠未窺全寶朕聞其梵本先在于闐國中遣使奉迎近方至此既覩百千之妙頌乃披十萬之正文以證聖元年歲次乙未月旅姑洗朔惟戊申以其十四日辛酉於大徧空寺親受筆削敬譯斯文遂得甘露流津預夢庚申之夕膏雨灑潤後覃壬戌之辰式開實相之門還符一味之澤以聖曆二年歲次己亥十月壬午朔八日己丑繕寫畢功添性海之波瀾廓法界之彊域大乘頓教普被於無窮方廣真詮遐該於有識豈謂後五百歲忽逢金口之言娑婆境中俄啟珠凾之祕所冀闡揚沙界宣暢塵區竝兩曜而長懸彌十方而永布一窺寶偈慶溢心靈三復幽宗喜盈身意雖則無說無示理符不二之門然因言顯言方闡大千之義輒申鄙作爰題序云大方廣佛華嚴經合論序宋沙門慧研奉王旨撰夫法界之真源也濬十重之藏海涌萬德之華王體用齊彰身剎互含於影像果因相入智悲交煥於靈真原其無性妙光若金波而粲影幻生齊應同眾水以分形良由瞥循一照之精明倐晦千光之圓鑒返認創成於心體雲點太清依心發動於輪迴波搖玉海故我毗盧遮那如來愍乎寢惑布以身雲於一切法而坐道場於一切智而成正覺說此大方廣佛華嚴經也繇是即閻浮之境界統華嚴之莊嚴星羅於五位神天鏡寫於十方剎海彫宮紺殿含莫限之勞生玉樹金臺誕微塵之佛子一念未移於蓮座九天同發於雷音神光開十會法門寶澤潤三周因果故此經初世主雲集同心嘿請有三十七問備陳體用因果法門則一部雄文之宗極也謂藏身為體行海為用以體起用斷習為因以用全體習盡為果中有神通之義心境互彰者則明因果相入體用一揆是以從心念法明體起用則菩薩神通從境宣音明用全體則佛神通咸諸妙門同醻此問若夫法無宗旨人莫准憑爰彰古佛之果因以顯今人之證信是以初會世尊光騰皓齒海眾雲舒則示乎果也次乃玉毫相中誕諸佛子則示乎因也後以普賢承威宣華藏海則因全果也然以毗盧印之則明古佛果因總答前法又以智海無性因覺妄而成凡達妄原虗即凡心而見佛故第二會普光明殿以佛果為凡心信因三會妙峯山凡心相盡成佛住四會夜摩天以智從用成佛行五會兜率天智行相入成佛迴向六會他化天自他同體成佛地七會三禪天智行清淨成佛華八會普光明殿自因成果為佛出現九會普光明殿因果圓融即普賢常行十會給孤園諸位齊明同彰法界此則發心因果總答前法次復圓悟一真恐迷修進不盡千門之惑習焉成萬行之智悲故以善財特行軌範初參文殊佛智信因南詢諸友發行治習入慈氏閣習盡成果再面文殊因果同時便見普賢法界原行此顯修道行門一周因果良以三周十會之玄稱三十七義之指歸一字法門書海墨而無盡二乘權學諒涯涘而莫窮故此教非貝巖所編乃文殊結集總三部一部有十三千大千世界微塵數偈一四天下微塵數品一部有四十九萬八千八百偈一千二百品一部有十萬偈四十八品隱乎龍藏未擅閻浮逮從正法光餘年將五百則第十四代祖師龍樹運神海藏觀前二部非世人所及乃誦後部歸于五天傳布千年方垂華夏東晉初譯地涌靈泉唐朝次翻天降甘露玄宗開元中太原有逸士李通玄者間代淨名也而神鑒物表陶情釋氏因閱華嚴義疏嘆云大教弘芳多家繁製勞文白首豈暇進修遂窮八十卷之真詮總括四十軸之玄論夜驅神筆舒玉齒之祥光日探幽玄感天童之給饍張皇教海羅列義天大中載無諸有高僧志寧緬思後進之披尋難測法門之豐富遂合經論文旨相須然其義類繁衍未圓品藻慧研因參雲水叨覽指歸敢搵牋毫整斯漏略列經論以標舉彰教理而相收義朗文清不假猊臺而抱帙神輝智發何勞鷲嶺以尋師總圓一部一百二十卷粤有報恩光教道場正覺空慧禪師永安傳心祖印味道華嚴仰聞王旨以傾金開印傳通而廣益慧研虔膺制命俾序真文輙述大綱深慚麗則所冀長光佛日將兩曜以齊明永贊金輪等二儀而遠大時龍集乾德歲旅丁卯蕤賓之月望日序大方廣佛華嚴經合論序唐福州開元寺沙門志寧述邈矣曠古太素為混沌之先存而不論道為一生之始洪儒之子浴歸沂水之濱周聖孔明樂在先王之道安有得於太空之量現法界於一塵之中耘除始終蔑彼生滅太虗不能齊量無為猶是假名常用而常無居有而非有華嚴經者蓋非羅漢結集亦非小聖傳持大本華嚴非佛不能知見中本華嚴住地菩薩乃能知之小本華嚴即十萬之偈今之所傳只獲四萬五千餘偈即八十卷經是也此准華嚴經纂靈記中說也經云此經不入二乘人手若無大心凡夫此之法門即當散滅經有十玄六相義如結綰眾絲帝網天珠重重各有條貫談端舉一則萬類齊歸義海千殊爛如星布以緣生為旨以法界性為宗法身與報化同時體用別無二相以華嚴為遊履以菩提心為家以萬德萬行為家業以文殊為種智以普賢為行華以毗盧遮那為結果之身以四十二位而為眷屬演則彌綸法界卷則巨海毛端會萬象雖以云多入塵毛尚有餘地圓融行布理事互參行布圓融主伴交現如斷金之杖一即是多如斷杖之金多即是一隨觀一境四種法界圓頓現前一地初登百門妙義聯綿俱集證趣七地功用方休八地定力轉深起智還由諸佛風帆既便任運而行其勢不停直至法雲之地會中十地普眼初遊未見普賢佛前大智十大聲聞不覩逝多之勝事良由發心既小大願未圓等覺妙覺現前爾乃二愚方盡此經法界無始無終佛身非有成與不成大智無滅無生常以利人為本普慧二百大問普賢二千法詶法界性本如如出沒卷舒自在經云如人化心化作佛化與不化等無異一切諸佛成菩提成與不成無差別善財童子成道只在一生六千比丘發智不由多劫白牛之駕將悟即以超於大乘金色世界現前文殊之智全證法華龍女成佛只在剎那妙峯見佛光明初住便登正覺但隨圓見网取漸修頓悟只在剎那如牛食肥膩之草大唐忻代之間有長者姓李號通玄其實異人莫知來處造斯經論四十卷成彼有記云猛虎䭾經引於巖下下筆之後常得天人餉食乃至論終身亦去世後人獲其藁本傳寫流行其論所明與諸家疏義稍有差別經有十處十會義搜瓔珞經文瓔珞經兩卷是四十品之妙文文在第三禪說十十以為圓數豈合只有三十九品之文恐是梵本翻譯之時有所流落今尋經見義又似貫華甘露澤流猶如瓶寫去聖懸遠誰復證明十萬之途孰能往檢亦如生公忍死清辯留身後若勘同方知義在普光明殿三會豈乃成三善財福城之東良亦成其會數志寧雖不親觀造論皆憑人世盛傳覽此論文稍似得其大意今見此方君子好善之流以論與經難為和會志寧不揆衰邁才無能為今將論文注於經下使後之覽者無費乃心纔始開經便得見論稽首諸佛毗盧遮那一切聖賢願垂加護論從第八卷起註入經兼論與經共成一百二十卷願諸達士罔有怪焉論有會釋七卷不入註文今亦寫附於初矣釋大方廣佛華嚴經論主李長者事迹李長者諱通玄莫詳所自或有詢其本者但言滄州人開元二十七年三月望日曳策荷笈至于太原盂縣西四十里同穎鄉村名大賢有高山奴者尚德慕士延納無倦長者徑詣其門山奴諦瞻神儀知非常器遂罄折禮接請歸安居每旦唯食棗十顆柏葉餅子如匕大者一枚自爾不交外人掩室獨處含毫臨紙曾無虗時如是者三稔一旦捨山奴南去五六里至馬氏古佛堂自搆土室寓于其側端居宴默于茲十年後復囊挈經書遵道而去二十里餘次韓氏別業即今冠蓋村焉忽逢一虎當塗馴伏如有所待長者語之曰吾將著論釋華嚴經可與吾擇一捿止處言畢虎起長者徐而撫之遂將所挈之囊挂于虎背任其所止於是虎望神福山原直下三十餘里當一土龕前便自蹲駐長者旋收囊裝置於龕內虎乃屢顧妥尾而去其龕瑩潔圓迴廣袤尋丈自然而有非人力成龕之四旁舊無泉㵎長者始來之夕風雷暴作拔去一古松高三百餘尺及旦松根之下化為一潭深極數尋迴還五十餘步甘逾瑞露色奪琉璃時人號為長者泉至今澄明未曾增減𠍴陽之歲祈之必應長者製論之夕心窮玄奧口出白光照耀龕中以代燈燭居山之後忽有二女子容華絕世皆可笄年俱衣大布之衣悉以白巾幪首姓氏居處一無所言常為長者汲水焚香供給紙筆卯辰之際輙具淨饌甘珍畢備置長者前齋罷撤器莫知所止歷于五祀曾不闕時及其著論將終遂爾絕迹謹按華嚴舊傳東晉三藏佛䭾䟦陀羅於江都謝司空寺譯經有二青衣童子忽自庭沼而出承事梵僧爇香添缾不離座右每欲將夕還潛沼中日日皆然率為常事及譯畢寫淨沉默無迹長者感通事符曩昔長者身長七尺二寸廣眉朗目丹唇紫肥長髯美茂修臂圓直髮彩紺色毛端右旋質狀無倫風姿特異殊妙之相靡不具足首冠樺皮之冠身披麻衣長裙博袖散腰而行亦無韋帶居常跣足不務將迎放曠人天無所拘制忽一日出山訪舊止之里適值野人聚族合樂長者徧語之曰汝等好住吾將欲歸眾乃罷樂驚惶相顧咸皆惻愴必謂長者却還滄州揮涕同詞懇請留止長者曰縱在百年會當歸去於是舉眾却送長者入山至其龕所復語之曰去住常然耳汝等可各還家及眾旋踵之頃嵐霧四起景物不分行路之人咸共駭異翌日長叟結徒登山禮候但見姿容端儼已坐化於龕中矣時當三月二十八日報齡九十六有一巨蛇蟠當龕外張目呀口不可向近眾乃歸誠致祝某等今欲收長者全身將營殯藏乞潛威靈願得就事蛇因攝形不現耆舊潸泣舉荷擇地於大山之陰累石為墳蓋取堅淨即神福山逝多蘭若今方山是也初長者隱化之日及成墳之時煙雲凝布巖谷震蕩有二白鶴哀唳當空二鹿相叫連夕其餘飛走悲鳴滿山鄉原之人相率變服追攀孺慕若喪所天每當建齋即墳上雲起七七如是良足異夫長者平昔之時每年常於三月末間設十方賢聖淨會不以女人造食貴使觸事精誠至於棗核米泔不許輙棄齋畢任用犬彘徧霑如斯之會遵承到今未曾廢絕至大曆九年二月六日有僧廣超於逝多蘭若獲長者所著論二部一是大方廣佛新華嚴經論四十卷一是十二緣生解迷顯智成悲十明論一卷傳寫揚顯徧於并汾廣超門人道光能繼師志肩負二論同遊燕趙昭示淮泗使後代南北學人悉得參閱論文宗承長者皆超光二僧流布之功耳其為論也統貫經意標表法身廓性海於無邊歷剎塵而不動分泮眾教極彼源流融鎔上乘會此華藏俾迷徑者獲道滯教者忘機可謂毗盧之指歸華嚴之日月矣若非聖人愍世降生開導昏瞑孰能條釋大典指授大心歟長者行止玄微固難遐究虗空不可等度況擬求邊際耶比歲僧元覘特抵方山求長者遺迹初禮石墳次尋龕址龕前有松三株一已查立俱是長者手植長者將化之月一株遂枯至今二株常有靈鶴結巢於頂又於壽陽南界解愁村遇李士源者乃傳論僧廣超之猶子也示長者真容圖瞻禮而迴斯為滿願矣向之云云蓋在摭實枝葉華藻無所務焉雲居散人馬支纂錄大方廣佛新華嚴經合論目錄序一沙門慧研奉王旨撰序二沙門志寧論主事迹目錄卷第一之第七會釋卷第八世主妙嚴品第一之一卷第九世主妙嚴品第一之二卷第十世主妙嚴品第一之三卷第十一世主妙嚴品第一之四卷第十二世主妙嚴品第一之五卷第十三世主妙嚴品第一之六卷第十四世主妙嚴品第一之七卷第十五世主妙嚴品第一之八卷第十六世主妙嚴品第一之九卷第十七世主妙嚴品第一之十卷第十八如來現相品第二卷第十九如來現相品第二之餘普賢三昧品第三卷第二十世界成就品第四卷第二十一華藏世界品第五之一卷第二十二華藏世界品第五之二卷第二十三華藏世界品第五之三卷第二十四毗盧遮那品第六卷第二十五佛名號品第七卷第二十六佛名號品第七之餘卷第二十七四聖諦品第八光明覺品第九卷第二十八光明覺品第九之餘菩薩問明品第十卷第二十九菩薩問明品第十之餘淨行品第十一賢首品第十二之一卷第三十賢首品第十二之二卷第三十一賢首品第十二之三昇須彌山頂品第十三須彌頂上偈讚品第十四卷第三十二須彌頂上偈讚品第十四之餘十住品第十五卷第三十三十住品第十五之餘卷第三十四梵行品第十六初發心功德品第十七卷第三十五初發心功德品第十七之餘明法品第十八卷第三十六明法品第十八之餘昇夜摩天宮品第十九卷第三十七夜摩天宮偈讚品第二十十行品第二十一卷第三十八十行品第二十一之餘卷第三十九十無盡藏品第二十二卷第四十昇兜率天宮品第二十三卷第四十一昇兜率天宮品第二十三之餘卷第四十二兜率天宮偈讚品第二十四十迴向品第二十五之一卷第四十三十迴向品第二十五之二卷第四十四十迴向品第二十五之三卷第四十五十迴向品第二十五之四卷第四十六十迴向品第二十五之五卷第四十七十迴向品第二十五之六卷第四十八十迴向品第二十五之七卷第四十九十迴向品第二十五之八卷第五十十迴向品第二十五之九卷第五十一十迴向品第二十五之十卷第五十二十迴向品第二十五之十一卷第五十三十迴向品第二十五之十二十地品第二十六之一卷第五十四十地品第二十六之二卷第五十五十地品第二十六之三卷第五十六十地品第二十六之四卷第五十七十地品第二十六之五卷第五十八十地品第二十六之六卷第五十九十地品第二十六之七卷第六十十地品第二十六之八卷第六十一十地品第二十六之九卷第六十二十地品第二十六之十卷第六十三十地品第二十六之十一卷第六十四十地品第二十六之十二卷第六十五十地品第二十六之十三卷第六十六十地品第二十六之十四卷第六十七十定品第二十七之一卷第六十八十定品第二十七之二卷第六十九十定品第二十七之三卷第七十十定品第二十七之四卷第七十一十定品第二十七之五十通品第二十八卷第七十二十通品第二十八之餘十忍品第二十九卷第七十三阿僧祇品第三十壽量品第三十一菩薩住處品第三十二卷第七十四佛不思議法品第三十三之一卷第七十五佛不思議法品第三十三之餘如來十身相海品第三十四卷第七十六如來十身相海品第三十四之餘如來隨好光明功德品第三十五卷第七十七如來隨好光明功德品第三十五之餘普賢行品第三十六卷第七十八如來出現品第三十七之一卷第七十九如來出現品第三十七之二卷第八十如來出現品第三十七之三卷第八十一離世間品第三十八之一卷第八十二離世間品第三十八之二卷第八十三離世間品第三十八之三卷第八十四離世間品第三十八之四卷第八十五離世間品第三十八之五卷第八十六離世間品第三十八之六卷第八十七離世間品第三十八之七卷第八十八入法界品第三十九之一卷第八十九入法界品第三十九之二卷第九十入法界品第三十九之三卷第九十一入法界品第三十九之四卷第九十二入法界品第三十九之五卷第九十三入法界品第三十九之六卷第九十四入法界品第三十九之七卷第九十五入法界品第三十九之八卷第九十六入法界品第三十九之九卷第九十七入法界品第三十九之十卷第九十八入法界品第三十九之十一卷第九十九入法界品第三十九之十二卷第一百入法界品第三十九之十三卷第一百一入法界品第三十九之十四卷第一百二入法界品第三十九之十五卷第一百三入法界品第三十九之十六卷第一百四入法界品第三十九之十七卷第一百五入法界品第三十九之十八卷第一百六入法界品第三十九之十九卷第一百七入法界品第三十九之二十卷第一百八入法界品第三十九之二十一卷第一百九入法界品第三十九之二十二卷第一百十入法界品第三十九之二十三卷第一百十一入法界品第三十九之二十四卷第一百十二入法界品第三十九之二