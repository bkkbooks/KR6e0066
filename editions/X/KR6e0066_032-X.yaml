body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論須彌頂上偈讚品第十四之餘論第二一切慧菩薩世界名波頭摩華佛號無盡月於此義中義分為五一釋菩薩名二釋世界名三釋隨位進修佛果之號四釋其座體五定其所來方面第一釋菩薩名者所以名一切慧以隨位進修中達一切法無體無性非迷執故此當第二治地住修戒波羅蜜中十波羅蜜以一切法無體性非染淨以為戒體故如此十住位梵行品是其戒體二釋世界名者所以世界名波頭摩華此云赤蓮華也為表戒相無染處世赫弈開敷莊嚴萬行感果可觀義也三釋隨位進修佛果之號者佛號無盡月為菩薩名一切慧佛果還號無盡月明因果相似故即明一切慧是修行得一切佛智慧之人世界是所修行之法佛果是治地住中所得之果明能清涼一切煩惱故四座體如前已釋五定其所來方面者是南方之眾也為表南方是離位是虗無義是文章義是赤色赫弈義如日正南照萬象而圓明義是故菩薩名一切慧世界名赤蓮華佛號無盡月此是善財童子見海雲比丘見佛說普眼經以義思之自當明矣第三勝慧菩薩義分為四一明菩薩名二明所居國土三明隨位佛果之號四明從所來方一明菩薩名者所以名勝慧為明隨位進修更明淨故不移一法勝前位故二明世界名者所以名寶華世界此明忍波羅蜜已得一切諸佛之智慧以道體而能行忍行華者行也明以忍行莊嚴智慧法身三明佛果之號所以佛號不動月者以得理成行達心境而無可動故明能堪忍也月者清涼義四明從所來方者是西方之眾以西方為秋為殺為苦諦以慈悲位在中如十迴向中善財見觀音在金剛山之西為明金為殺位以表眾苦之處以修其慈忍以是義故菩薩名勝慧世界名寶華佛號不動月總明得法成忍之力用勝故此是寶華義此是修行住對治法也此是善財見善住比丘得無礙法門以能忍故第四菩薩名功德慧於此義中分之為四一明菩薩名二明世界名三明佛果之號四明從所來方一明菩薩名者云何名功德慧此位修精進波羅蜜勤行利物廣益眾生故招多功德以立其名二明世界名者所以名優鉢羅華此云青蓮華諸色蓮華此華最勝為明諸行之中精進最勝故以此華為所居法體故一切萬行以此為功三明佛果之號所以名為風月佛為明精進波羅蜜離慢無懈一念成佛速疾如風又明精勤觀照定慧如風能消染淨無明塵垢香臭悉吹如風能清涼故四明所從來方者是此方之眾北方者是坎位是黑是愚是世間嶮盜之義又為師為君之位以是義故以精進波羅蜜勤修利益之行破迷離暗速令成佛是故菩薩號功德慧世界名青蓮華佛果號之為風月佛也以風能淨諸垢故此已上是生貴住中對治法門故此當善財第四善知識彌伽長者說輪字法門了俗諦法而令愚黑者得出世樂故第五菩薩名精進慧者於此義中四義如前一所以名精進慧明此位是具足方便住精勤修習方便定門以彰深智慧故以立其名又一行之中具無量行故於定位起精進之名精進之上起功德之名以明諸行參用一行具無量行故二世界名金剛華者以法性為禪體起妙慧揀擇正邪不壞是金剛義故華者行也以明定慧能揀擇之妙用故三佛果名水月者為定體能淨能清涼能現萬像如水故四明所從來方者是東北方之眾東北者是艮位也為山為石為門闕為童蒙為初明為高顯為寂靜為止以明定體徧與諸位諸行修進啟蒙發明清涼惑熱進修始終之本末故為艮為歲始年終之本末故為初明為止故菩薩名精進慧世界名金剛華佛號為水月此是善財第五善知識解脫長者主禪門於其身中現十佛剎塵佛國土總在身中十方各十佛剎微塵之數佛國土總在身中明禪體周徧故第六善慧菩薩四義如前一明菩薩名者明此正心住修般若波羅蜜智慧門故菩薩名善慧二妙香華世界者以明妙用智慧之香華開敷自他佛果明智慧說教見香華義故三佛號解脫月者明妙慧分明心境解脫故四明所從來方者此是東南方之眾東南方是巽位巽為風教為言說以像此位以智慧善說妙法教化眾生令解脫故是故菩薩名善慧世界名妙香華佛果號解脫月此當善財第六海幢比丘位身心寂然離出入息身出化身徧法界故明寂用自在得寂滅神通第七菩薩名智慧四義如前一明菩薩名智慧者明此不退住是第七成大慈悲門以智慧成滿方能隨俗善入生死以此為名二世界名悅意華者以有智慧在於生死隨順六道同事利生知根悅俗皆令得入法悅無憂故名悅意華三佛號無上月者明諸行之中慈悲為首為濟利眾生為最勝故故號之名無上月四所從來方者西南方也是坤位為信順為母為地為眾明方便波羅蜜以大悲為母入於一切眾生生死之地同一切眾生之行而教化之令信順入正法故是故菩薩名智慧世界名悅意華佛號為無上月此當善財第七善知識休捨優婆夷此云滿願以大慈悲行滿眾生願故像此方西南為母義表悲位故第八真實慧菩薩四義如前一明菩薩名者以此第八童真住中行願波羅蜜以真實智慧不謬誤眾生故二明世界名者世界名阿盧那華此云紅蓮華此華赤白分明是其紅色為此位是第八住智增位明以大智隨願行悲令智悲圓滿如紅蓮華赤白分明白表智赤表悲故世界名紅蓮華表隨真智處生死而無染如蓮華處水赤白開敷而可觀故三明佛號星宿月者為此位真智朗明知根器而了差別故佛號為星宿月表了眾生差別根性分明也四所來方者是西北方為乾為父為堅剛為天為團圓白淨能現眾色咸處其中以是義故菩薩名真實慧世界名紅蓮華佛號星宿月總明大智圓明能現眾生根器差別如天現象品物分明此當善財第八善知識仙人毗目瞿沙此云出聲可畏明真智圓明出語眾邪可畏仙人者為表此位智增無染故又表得智同邪化邪見故第九無上慧菩薩四義如前一明菩薩名者以此位是力波羅蜜法王子住善說法故名無上慧二世界名者所以世界名那羅陀華者那羅者此云人也陀云為持為此華香潔殊妙人持帶佩表此位菩薩以善說妙法殊妙聞之者得戒定慧解脫知見五分法身之香人皆持誦帶佩故世界名那羅陀華三明何故佛號清淨月此位菩薩善說法故為大法師能淨自他煩惱故佛號清淨月四從所來方者是下方之眾明下方是金剛是水是風輪能持世間故表此位菩薩善說妙法能持世間軌度法則令人倣學是故菩薩名無上慧世界名那羅陀華佛號清淨月此位同善財見勝熱婆羅門昇刀山入火聚隨諸人天所來見者皆得道而去此明菩薩智滿同邪攝諸異道令入正見故第十堅固慧菩薩四義如前一明所以菩薩名堅固慧者以此位是灌頂住行智波羅蜜能堅固利益一切眾生以為其名二世界名虗空華者以智慧日照明世間及出世間總無依住以此為名三明所以佛號明了月者以此位大智圓明普照世間無不明了以此為名四所來方者是上方之眾上方者為虗空為日月星辰表大智無依不依空有明鑒萬象如日月星辰是故菩薩名堅固慧世界名虗空華佛號明了月此位是善財童子見師子幢王女名慈行童女師子幢王女者明智悲圓滿以此十住一終已生在佛家會融十法悲智一終圓滿也以從初住創生佛家修智行悲即王女慈行十地修悲已滿於十一地初以悲行智即佛母摩耶幻生諸佛佛是大智母是大悲廣意至文方明如下十段頌文隨文可知一依如前科文釋過已上菩薩名世界名十箇佛果總是此十住之中隨位進修因果之號約隨方而表法約入法而成名如上所配之可知經佛放淨光明普見世導師須彌山王頂妙勝殿中住一切釋天王請佛入宮殿悉以十妙頌稱讚諸如來彼諸大會中所有菩薩眾皆從十方至化座而安坐彼會諸菩薩皆同我等名所從諸世界名字亦如是本國諸世尊名號悉亦同各於其佛所淨修無上行佛子汝應觀如來自在力一切閻浮提皆言佛在中我等今見佛住於須彌頂十方悉亦然如來自在力一一世界中發心求佛道依於如是願修習菩提行佛以種種身遊行徧世間法界無所礙無能測量者慧光恒普照世闇悉除滅一切無等倫云何可測知論二從法慧菩薩承威說頌已下十行頌是明法慧菩薩歎佛放光集眾分經爾時一切慧菩薩承佛威力普觀十方而說頌言假使百千劫常見於如來不依真實義而觀救世者是人取諸相增長癡惑網繫縛生死獄盲冥不見佛觀察於諸法自性無所有如其生滅相但是假名說一切法無生一切法無滅若能如是解諸佛常現前法性本空寂無取亦無見性空即是佛不可得思量若知一切法體性皆如是斯人則不為煩惱所染著凡夫見諸法但隨於相轉不了法無相以是不見佛牟尼離三世諸相悉具足住於無所住普徧而不動我觀一切法皆悉得明了今見於如來決定無有疑法慧先已說如來真實性我從彼了知菩提難思議論三爾時已下明一切慧承威說十行頌明歎無相法為真實經爾時勝慧菩薩承佛威力普觀十方而說頌言如來大智慧希有無等倫一切諸世間思惟莫能及凡夫妄觀察取相不如理佛離一切相非彼所能見迷惑無知者妄取五蘊相不了彼真性是人不見佛了知一切法自性無所有如是解法性則見盧舍那因前五蘊故後蘊相續起於此性了知見佛難思議譬如闇中寶無燈不可見佛法無人說雖慧莫能了亦如目有瞖不見淨妙色如是不淨心不見諸佛法又如明淨日瞽者莫能見無有智慧心終不見諸佛若能除眼翳捨離於色想不見於諸法則得見如來一切慧先說諸佛菩提法我從於彼聞得見盧舍那論四爾時已下明勝慧菩薩說十行頌歎凡夫迷五蘊之真性由人說之方了經爾時功德慧菩薩承佛威力普觀十方而說頌言諸法無真實妄取真實相是故諸凡夫輪迴生死獄言詞所說法小智妄分別是故生障礙不了於自心不能了自心云何知正道彼由顛倒慧增長一切惡不見諸法空恒受生死苦斯人未能有清淨法眼故我昔受眾苦由我不見佛故當淨法眼觀其所應見若得見於佛其心無所取此人則能見如佛所知法若見佛真法則名大智者斯人有淨眼能觀察世間無見即是見能見一切法於法若有見此則無所見一切諸法性無生亦無滅奇哉大導師自覺能覺他勝慧先已說如來所悟法我等從彼聞能知佛真性論五爾時功德慧說十行頌明妄取諸法真實之相經爾時精進慧菩薩承佛威力觀察十方而說頌言若住於分別則壞清淨眼愚癡邪見增永不見諸佛若能了邪法如實不顛倒知妄本自真見佛則清淨有見則為垢此則未為見遠離於諸見如是乃見佛世間言語法眾生妄分別知世皆無生乃是見世間若見見世間見則世間相如實等無異此名真見者若見等無異於物不分別是見離諸惑無漏得自在諸佛所開示一切分別法是悉不可得彼性清淨故法性本清淨如空無有相一切無能說智者如是觀遠離於法想不樂一切法此亦無所修能見大牟尼如德慧所說此名見佛者所有一切行體性皆寂滅論六爾時精進慧說十行頌歎諸法自體無見妄見迷真經爾時善慧菩薩承佛威力普觀十方而說頌言希有大勇健無量諸如來離垢心解脫自度能度彼我見世間燈如實不顛倒如於無量劫積智者所見一切凡夫行莫不速歸盡其性如虗空故說無有盡智者說無盡此亦無所說自性無盡故得有難思盡所說無盡中無眾生可得知眾生性爾則見大名稱無見說為見無生說眾生若見若眾生了知無體性能見及所見見者悉除遣不壞於真法此人了知佛若人了知佛及佛所說法則能照世間如佛盧舍那正覺善開示一法清淨道精進慧大士演說無量法若有若無有彼想皆除滅如是能見佛安住於實際論七爾時善慧菩薩說十行頌歎無眾生可盡法非有無二見經爾時智慧菩薩承佛威力普觀十方而說頌言我聞最勝教即生智慧光普照十方界悉見一切佛此中無少物但有假名字若計有我人則為入險道諸取著凡夫計身為實有如來非所取彼終不得見此人無慧眼不能得見佛於無量劫中流轉生死海有諍說生死無諍即涅槃生死及涅槃二俱不可得若逐倒名字取著此二法此人不如實不知聖妙道若生如是想此佛此最勝顛倒非實義不能見正覺能知此實體寂滅真如相則見正覺尊超出語言道言語說諸法不能顯實相平等乃能見如法佛亦然正覺過去世未來及現在永斷分別根是故說名佛論八爾時智慧菩薩說十行頌歎言說不能及真經爾時真實慧菩薩承佛威力普觀十方而說頌言寧受地獄苦得聞諸佛名不受無量樂而不聞佛名所以於往昔無數劫受苦流轉生死中不聞佛名故於法不顛倒如實而現證離諸和合相是名無上覺現在非和合去來亦復然一切法無相是則佛真體若能如是觀諸法甚深義則見一切佛法身真實相於實見真實非實見不實如是究竟解是故名為佛佛法不可覺了此名覺法諸佛如是修一法不可得知以一故眾知以眾故一諸法無所依但從和合起無能作所作唯從業想生云何知如是異此無有故一切法無住定處不可得諸佛住於此究竟不動搖論九爾時真實慧菩薩說十行頌歎諸法無合散性經爾時無上慧菩薩承佛威力普觀十方而說頌言無上摩訶薩遠離眾生想無有能過者故號為無上諸佛所得處無作無分別麤者無所有微細亦復然諸佛所行境於中無有數正覺遠離數此是佛真法如來光普照滅除眾闇冥是光非有照亦復非無照於法無所著無念亦無染無住無處所不壞於法性此中無有二亦復無有一大智善見者如理巧安住無中無有二無二亦復無三界一切空是則諸佛見凡夫無覺解佛令住正法諸法無所住悟此見自身非身而說身非起而現起無身亦無見是佛無上身如是實慧說諸佛妙法性若聞此法者當得清淨眼論十爾時無上慧說十行頌歎佛所得法體無分別不屬名數經爾時堅固慧菩薩承佛威力普觀十方而說頌言偉哉大光明勇健無上士為利羣迷故而興於世間佛以大悲心普觀諸眾生見在三有中轉迴受眾苦唯除正等覺具德尊導師一切諸天人無能救護者若佛菩薩等不出於世間無有一眾生而能得安樂如來等正覺及諸賢聖眾出現於世間能與眾生樂若見如來者為得大善利聞佛名生信則是世間塔我等見世尊為得大利益聞如是妙法悉當成佛道諸菩薩過去以佛威神力得清淨慧眼了諸佛境界今見盧舍那重增清淨信佛智無邊際演說不可盡勝慧等菩薩及我堅固慧無數億劫中說亦不能盡論十一爾時堅固慧說十行頌歎佛大悲出興利益已上十菩薩各說十行頌和會入位法令身心諸計皆無所依離於偏執住佛所住十住品第十五論將釋此品約作五門分別一釋品名目二釋品來意三明品之宗趣四都會斷惑次第五隨文釋義一釋品名目此品說十種住門名為十住品二明品來意者為前品是偈讚勸修之門此品明正舉修行十住之行是故此品須來十住者生諸佛大智慧中住入此位永不退還故名之為住三明品宗趣者明此品說十種住二十種進修因果為正宗又住佛所住以為正宗明此十住位中各有兩種因果各各當位之中初舉十法是忻趣增上之緣後舉十法是當位之內修學之果如文具明四會當十住位中斷惑次第者如初發心住治地住修行住此三種住中明總修出世間心破諸世間煩惱纏縛其世間煩惱如善財所說頌根本煩惱有十隨煩惱總有六其十種根本煩惱者一欲二色三無色此是三界根本所縛處四憍慢五諸趣六愛七愚癡八貪九恚十心魔王是為十又隨煩惱總有六者一諂二誑三疑惑四慳五嫉六嬌盈善財頌曰三有為城郭憍慢為垣墻諸趣為門戶愛水為池壍愚癡為闇覆貪恚火熾然魔王作君主童蒙依止住貪愛為徽纆諂誑為轡勒疑惑蔽其眼趣入諸邪見慳嫉憍盈故入於三惡道此約內心所起不約身見邊見見取戒取邪見內心成智諸見自是解脫以此一乘教體但約悟無明而成大智用諸見而作自在以此不論五見如十信位文殊師利問法首菩薩有十一種煩惱云何為十一一貪二瞋三愚癡四慢五覆六忿七恨八嫉九慳十誑十一諂如般若經中五蘊十二緣等如上煩惱以十住中初發心住治地住修行住此三住一時頓成根本智慧即如善財於妙峯山上見德雲比丘得諸佛智慧光明門即除已上世間諸煩惱障以成佛智慧光明故如善財妙峯山上信眼明淨智光照耀普觀境界離一切障此是初發心住第二海門國見海雲比丘除心境迷真作十二緣生觀令無障故即見海中有佛出現說普眼經明見自他十二緣生成大智海是佛義故心境總是經故明前得佛智慧觀十二緣生成大智海心境普周自在徧故此是治地住以十二緣生治令成如來智地故第三海岸國見善住比丘除心境不明淨障得菩薩無礙解脫門能見一切眾生根器業行死此生彼悉皆明見此是修行住於此三種住中明得出纏心自在故總以十信心自信一切三界分別無明是根本不動智佛於初發心住中以自在決定解力信眼清淨智光照耀普觀境界離一切障契會悟入十住初心以隨位進修中安立五十箇佛果次第法門方便皆不動智以為根本已上初發心住治地住修行住明得十住中出纏心勝七故善財初二三善知識皆是比丘明離纏解脫表此三住位中行相故第四生貴住明對治世間法則及生死煩闠不自在障令自在故即如善財於市肆之上見彌伽長者說輪字經即表生死市鄽閙處常寂於一一字猶如車輪一多圓滿互體相成又如帝釋寶網互為緣起映徹重重一字之中有無盡字句為世間名句文身引諸未學以成教軌即俗士彌伽以成其行為令得出世心後須明世間靜亂緣起生死之性萬法無生無滅及世間名字義理一切眾生語言互相成就如古者伏羲之類是也第五具足方便住對治真俗身邊二見令大智境界得自在破不自在障故如善財見解脫長者即入三昧名普攝一切佛剎無邊陀羅尼十方各現十佛剎微塵數佛國土海清淨莊嚴總在身中即明一切眾生身總含無邊佛剎體相無礙為明真俗色相皆如光影互相容故無中邊故欲令六十二見無邊諸見性解脫故第六正心住對治智慧寂用不自在障即如善財見海幢比丘於經行地側結跏趺坐離出入息無別思覺於其身上各隨身分皆出化身如雲廣覆周徧十方隨應所見此明寂用無礙故此已上總明世間出世間和會皆解脫故如是已後四波羅蜜入俗行悲令自在故第七不退住對治大慈大悲同行攝生不圓滿自在障令圓滿故即如善財於普莊嚴園見休捨優婆夷謂善財言我有八萬四千那由他同行眷屬常居此園明大悲位中行方便波羅蜜同於八萬四千不可說一切眾生煩惱總共同事教化利益經云其餘眾生住此園者亦皆普得不退轉位明能行悲智行者悉同此也第八童真住對治處纏同事世間餘習智不清淨障令清淨故即如善財見毗目瞿沙仙人表大智清潔無所染故休捨優婆夷與仙人住處同名俱是海潮處者明此悲智一體無染而不汙若隨悲修智猶有習氣染境之心即此第七第八兩位和會一終是也若也隨智行慈無有染習即師子幢王女慈行童女是可以思之得見其意第九法王子住對治說法不自在障令自在故即如善財見勝熱婆羅門以登刀山入於火聚行苦行時隨天龍神人及非人來者無不獲益而已十灌頂住對治悲智不自在清淨障令得清淨即如善財見師子幢王女慈行童女王者智自在故女者表隨悲同事無染習故明智滿從悲處世間故即同事而無習氣故已上十種對治皆一念心上初發心時一行之中一時之內無前後際對治此十種障法成一法一心一智慧一行之中十十無盡法門皆以自心不動智佛為體以法事之中合具此十種無盡法門同別一多自在故以此十種對治一時令慣習自在故不同三乘權教約劣解眾生存世間三世之性說佛果在三僧祇之外以自心根本無明分別之種便成不動智佛以法界體用以為信進悟入之門從信及入位進修乃至經十住十行十迴向十地十一地總不離本不動智佛不離一時一念一法一行上而有無邊無量不可說不可說法界虗空界微塵數法門何以故為從法界及根本不動智上為信進悟入故法合如然故如龍女剎那成佛善財一生以取佛果法界無性無生為一生非延促生故為法界體無情量延促長短去來今故諸有信者應如是知如今成佛與過去未來一切諸佛一時成佛以法界智體無別時故如一滴之水入大海中便同大海無新舊水故故去情方見非識心知如三乘中十住菩薩猶受三界分段生死分學生空觀對治闡提不信障十行菩薩分作法空觀修自利利他行對治聲聞自利障十迴向菩薩作法空觀成起大悲願力垂形六道教化眾生對治獨覺自度障此明三乘中三十心菩薩對治地前三種障但除正使未除習氣十地菩薩斷其餘習如初地菩薩見自身真如佛性故名見道位從二地至七地是修道位猶有功用而修其行從八地至十地名究竟位不假功用任運至佛果故又如三乘中十二住地一種性住十解門是二解行住十迴向是也三歡喜住初地是四增上戒住二地是五增上慧住三地是六道品相應增上慧住四地是七諦相應增上慧住五地是八緣起相應增上慧住六地是九有行有開發無相住七地是十無行無開發無相住八地是十一無礙住九地是十二最上菩提住十地是又如三乘中地前三賢菩薩得伏忍十地與佛地得寂滅忍又望勝鬘經羅漢辟支佛淨土菩薩總是伏忍以空觀伏現行十使不起為不識無明住地煩惱故猶不識云何名斷煩惱但伏現行不起得三種意生身受三界外變易生死如是菩薩為行六波羅蜜得六神通福德神通竝勝人天唯非修佛果法界門故是門外三車艸庵仍聲聞辟支佛三乘菩薩不同其德出三界行六神通名則相似行六波羅蜜功德果報不同故如是三乘六通菩薩等於大方廣佛華嚴經不聞不信如此經云設有菩薩經無量那由他劫修六波羅蜜得六神通猶不聞此華嚴經典猶名假名菩薩不真菩薩設復聞時不信不入如法華亦然如三乘中三種意生身者初一二三地名三摩䟦提樂法意生身二四五六地名覺法自性意生身三七八九十地名種類俱生無行作意生身欲廣引云云自有三乘教自明約會對治如是如此一乘教都無如上三乘之趣以為根本無明住地煩惱便為一切諸佛不動智一切眾生皆自有之只為智體無性無依不能自了會緣方了云何為會緣會緣有三種一會苦緣遇苦方能發心二會樂緣久處人天內心明慧達世樂果生死無常方始求真三見佛及一乘菩薩而能發心求佛種智以會三緣近正善知友而能自覺無明本是佛智三乘同然為意樂淺深各別以因本智上而生信心約本智而為悟入以不離本智故於初發心住即五位齊周雖列十住十行十迴向十地十一地行法位門進修軌度如王寶印一印無差以一心大智之印印無始三世總在一時無邊諸法智印咸徧以智等諸佛故以智等眾生心故以智等諸法故以智無中邊表裏三世長短近遠故為智過虗空量故如世虗空無所了知如無分別智虗空一念而能分別過虗空等法門是故經言一切虗空猶可量諸佛說法不可量以是義故以自心根本無明體用而見不動智與一切諸佛及以一切眾生同一體性同一境界同一智海以是發心之初住佛種智家故纔發心時即於十方現身成佛如初發心功德品自明以是義故於此十住位中入初發心住者住一切諸佛智慧大悲海境界中住即五位通修以初住及十地不離一佛智慧境界故但明生熟慣習勝劣安立住地之名為智體之中非三世情攝故一如龍女一剎那之際已具三生普賢行滿佛果亦就如文殊師利菩薩頌云一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力明知三乘三祇出世成佛是權方便教此教約實法不說以願力成佛等事設以願力成行還以約實成佛不說以願力暫成故是故當知從十住中初入位菩薩即五位通修為十住行相通有十行十迴向十地等法門故如十住中七八兩住還修悲智九住中是法師位十住中悲智圓滿如是五位行相相似故如善財十住中善知識一一智慧境界皆悉無極但為約法身大智大悲之上法具無盡須當安立五位行門總是一心一智一時智等徧滿所行之道是故起信進修行者於大智境界莫作三世近遠延促之見違智境界故失本大智之境逐情識故隨相轉故此會第四斷惑次第竟如此五位斷惑次第如空無時如圓鏡頓照如摩尼寶能同眾色如一滴之水入大海中等同無二以大智慧之圓鏡普印諸作莫不皆成無作用之大用故無三世之一時故音切翳於計切瞽古音麤倉胡切偉于鬼切壍七念切徽許歸切纏莫北切轡兵媚切闠胡對切𨞬直連切閙奴教切闕去月切
