body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十地品第二十六之三論第四隨文釋義者於此品經中長科四段一序分二正説三動地興供四説頌歎法第一序分者從初爾時世尊已下至法界智印善印故於中有四段經名為序分二從爾時十方諸佛各伸右手已下至三十九卷中受持修習然後至於一切智地此一段是正説分三動地興供分者從爾時佛神力故已下至而説頌言是四説頌歎法分者從其心寂滅恆調順已下至三十九卷經末是第一序分中復分四段經爾時世尊在他化自在天王宮摩尼寶藏殿與大菩薩衆俱其諸菩薩皆於阿耨多羅三藐三菩提不退轉悉從他方世界來集住一切菩薩智所住境入一切如來智所入處勤行不息善能示現種種神通諸所作事教化調伏一切衆生而不失時為成菩薩一切大願於一切世一切劫一切剎勤修諸行無暫懈息具足菩薩福智助道普益衆生而恆不匱到一切菩薩智慧方便究竟彼岸示入生死及以涅槃而不廢捨修菩薩行善入一切菩薩禪定解脫三昧三摩鉢底神通明智諸所施為皆得自在獲一切菩薩自在神力於一念頃無所動作悉能往詣一切如來道場衆會為衆上首請佛説法護持諸佛正法之輪以廣大心供養承事一切諸佛常勤修習一切菩薩所行事業其身普現一切世間其音普及十方法界心智無礙普見三世一切菩薩所有功德悉已修行而得圓滿於不可説劫説不能盡論第一爾時世尊在他化自在天已下至説不能盡有十八行經歎諸來菩薩志德分釋義者從爾時世尊在他化自在天宮者明如來智身應位而現故託處表法明此菩薩十地道終至欲界頂故又為衆生故而修行十地非為自己有所求故名為他化又為十地道終降心境魔得自在故入離垢三昧白淨清潔法合然故處欲界頂常處三昧不住淨心不居禪界故為明此十地功終法雲普潤不拘垢淨對現色身故於此天説此十地故是故初會中自在天王獲益頌曰佛身遍周等法界普應衆生悉現前種種教門常化誘於法自在能開悟問曰何以故如來降此他化天中何故不云天王遙見佛來及敷座迎逆莊嚴偈讚等事答曰此位但依前兜率天宮法門回向願行悲智之法行之更無異法以此不陳餘事但積德依前願海功終智極不假更須法事表其升進和會但依法故又問何故不次第至化樂天因何越升他化天説其十地答曰明十地向前須依次第和會理智悲願升降會融得所十回向和融悲願理智齊均廣狹稱周法界等衆生量表法處於中道還於處中處説中道之義説十回向和會悲願理智即於欲界處兜率天是上下俱有二天説十地處中即於欲界上際色界下際欲明不拘染淨即理智大悲自在又説十一地等覺法門於第三禪説表利衆生之行滿法樂利生似彼三禪悅樂第四禪表佛果遍周妙用圓滿故又十地超化樂十一地超二禪又明倍倍智高越次第故摩尼寶藏殿者表無垢大慈能含覆育物故明此位一無情取自安樂心但饒益衆生長大悲故故處摩尼無垢寶藏殿表之與大菩薩衆俱即是金剛藏等三十七表三十七助道法衆解脫月一人明一一助道下當體皆是解脫清涼樂故明即助即正道為地前見道正見已終十地助顯成熟不同三乘十地見道地前資糧為此一乘教從初依如來根本智發信心修薩婆若智故不依空觀折伏現行煩惱十地方得意生身故此教雖説如來無量色受想行識及心意者明不壞俗境以達成差別智故非同伏惑留生往生淨土故或云三千之境為佛境故望此教中初信心之中但約無限佛境塵含十方毛容法界為信進修行不云三千大千為佛報境一如賢首品是所信欣修之門發心功德品是十住悟入之德經云其諸菩薩皆於無上正等菩提得不退轉者菩提有五一小乘菩提二二乘菩提三空觀行六波羅蜜菩薩菩提四修十種相似真如觀修十波羅蜜有十真如障十一種粗重二十二種愚癡菩提五依十種如來智修十波羅蜜以無盡劫為一剎那際契無盡多生為一生一念迷解即佛智慧菩提此明依根本智發菩提心如起信論亦有此文依本覺故而有不覺又云覺心源故名究竟覺明知依如來智上而有不覺依無明上而有覺者於此覺者隨根種性有此五種覺法差別如此經菩提並一乘佛果根本智上不退菩提如起信論説或云超劫成佛云我於無量劫修行成佛道者皆為懈慢衆生作無數方便或云要經三僧祇方得成佛者此皆逐世情説為三乘不依根本智發心此教約智發心若以智論之不隨迷情直以不可數阿僧祇劫以為無時以此無時假施設一剎那際攝無限三世無限三世劫總不出一剎那際經云智入三世而無來往如是三僧祇劫情有智無以智收情情居智內無量劫情有在剎那際智中若取情虗智實元來總無時體始終無時可遷二事校量只可從實不從虗也經云悉從他方世界來集者以從十回向法來成十地名之他方故法界性中無別他方以未至位處名他方故乃至諸位例然住一切菩薩智所住境者但五位菩薩智境總同至此十地中佛智境故入如來智所入處者為依如來根本智發心入行差別智成大悲故善入一切菩薩禪定者一如十定品説三摩鉢底神通明智明三昧能起智印神通三之云正此云正慧以三摩者三昧鉢底者慧於一念頃無所動作悉能往詣一切道場者以三昧智印性自遍故無表裏故常與智俱無動散故經其名曰金剛藏菩薩寶藏菩薩蓮華藏菩薩德藏菩薩蓮華德藏菩薩日藏菩薩蘇利耶藏菩薩無垢月藏菩薩於一切國土普現莊嚴藏菩薩毗盧遮那智藏菩薩妙德藏菩薩栴檀德藏菩薩華德藏菩薩俱蘇摩德藏菩薩優鉢羅德藏菩薩天德藏菩薩福德藏菩薩無礙清淨智德藏菩薩功德藏菩薩那羅延德藏菩薩無垢藏菩薩離垢藏菩薩種種辨才莊嚴藏菩薩大光明網藏菩薩淨威德光明王藏菩薩金莊嚴大功德光明王藏菩薩一切相莊嚴淨德藏菩薩金剛𦦨德相莊嚴藏菩薩光明𦦨藏菩薩星宿王光照藏菩薩虗空無礙智藏菩薩妙音無礙藏菩薩陀羅尼功德持一切衆生願藏菩薩海莊嚴藏菩薩須彌德藏菩薩淨一切功德藏菩薩如來藏菩薩佛德藏菩薩解脫月菩薩如是等無數無量無邊無等不可數不可稱不可思不可量不可説諸菩薩摩訶薩衆金剛藏菩薩而為上首論第二其名曰已下至而為上首有十八行經是菩薩列名分其名曰金剛藏菩薩者以智慧為金剛能破諸惑故藏者明智德遍周名之為藏寶藏菩薩者法寶遍周名之寶藏蓮華藏菩薩者明於衆行及涅槃生死無所染著故德藏菩薩者明衆德圓滿故蓮華德藏菩薩者明無染衆行莊嚴智德故日藏菩薩者明大智照用也蘇利耶藏菩薩者此云日之照用也無垢月藏菩薩者明大慈悲心照俗破煩惱焰故於一切國土普現莊嚴藏菩薩者明福智二事遍周故毗盧遮那智藏菩薩者云光明遍照之智故俱蘇摩德藏菩薩者明此菩薩有德見者悅意如華故名悅意華也優鉢羅德藏菩薩者取青蓮華為喻以義取之可知星宿王光照藏菩薩者明自在無礙差別智分明故如是諸菩薩以名下義解之可見此一段有三十八菩薩三十七箇菩薩同名為藏者即表三十七助道行門如解脫月一人即表三十七助道行中助菩提分清涼之果故與諸菩薩作請法之主故令諸大衆聞法修行得清涼樂故經爾時金剛藏菩薩承佛神力入菩薩大智慧光明三昧入是三昧已即時十方各過十億佛剎微塵數世界外各有十億佛剎微塵數諸佛同名金剛藏而現其前作如是言善哉善哉金剛藏乃能入是菩薩大智慧光明三昧善男子此是十方各十億佛剎微塵數諸佛共加於汝以毗盧遮那如來應正等覺本願力故威神力故亦是汝勝智力故欲令汝為一切菩薩説不思議諸佛法光明故所謂令入智地故攝一切善根故善簡擇一切佛法故廣知諸法故善能説法故無分別智清淨故一切世法不染故出世善根清淨故得不思議智境界故得一切智人智境界故又令得菩薩十地始終故如實説菩薩十地差別相故緣念一切佛法故修習分別無漏法故善選擇觀察大智光明巧莊嚴故善入決定智門故隨所住處次第顯説無所畏故得無礙辨才光明故住大辨才地善決定故憶念菩薩心不忘失故成熟一切衆生界故能遍至一切處決定開悟故善男子汝當辨説此法門差別善巧法所謂承佛神力如來智明所加故淨自善根故普淨法界故普攝衆生故深入法身智身故受一切佛灌頂故得一切世間最高大身故超一切世間道故清淨出世善根故滿足一切智智故論第三爾時金剛藏菩薩已下至滿足一切智智故有二十五行經明金剛藏菩薩入定同號諸佛皆來現前勸喻令説十地法門分入定分中義分為四段一爾時金剛藏菩薩有一行半經總有三句經文明金剛藏菩薩入定分二入是三昧已下至而現其前有兩行經明同號諸佛來現前分三作如是言已下至能遍至一切處決定開悟故有十六行經明以二十二事因緣入此三昧分四善男子已下有五行經明十方諸佛勸金剛藏菩薩令説法分經云金剛藏菩薩承佛神力入菩薩大智光明三昧者以如來智慧以為信進修行所作一切佛事總是佛神力無我自作故名三昧菩薩大智慧光明即是如來眉間所放十地智慧中道之光明名菩薩力焰明亦是初會中如來放眉間光名一切菩薩力智光明總是十地道終佛智慧光明今入三昧還是此之智慧三昧説十地道之智慧名菩薩大智慧光明以根本智成菩薩大悲行故十方各過十億佛剎微塵數世界外各有十億佛剎微塵數諸佛同號金剛藏者十億表數之圓滿無盡故云世界外者從十住十行十回向中佛果為外今成此十地智德佛果名來現其前故所以與入定菩薩同名者明入定者智慧會及與本位佛智合故言十億佛剎塵為數者明無作智體用遍周故故言十億佛剎微塵數佛共加者明位至會源自力與佛力會故故下文亦是汝勝智力故汝以毗盧遮那如來應正等覺本願力故威神力故者明升此十地法門皆以十回向中一切諸佛大願發起若無十大願回向此位不能自成故威神力者由初發心皆乘如來一切智乘威神之力而升此十地故不離如來所作一切智用故若不由乘如來一切智乘云何至此十地之位此智通因徹果同智地故是故於此教中十信十住十行十回向位位有佛果故此十地十一地中佛果取十回向中佛果同妙用也通十信并五位進修中有六十重佛果若但取入位有五十重佛果通修行因共有一百重因果以佛本位中十波羅蜜自具十重因果明修行者皆依此佛本因果上起五位修行升進以依本起名一百一十城之法門總通取十回向中佛果同名為妙以此十地十一地不更別立佛果之號以十地十一地法同十回向法故如佛本位十波羅蜜者如初會舉果勸修中如來是佛果次十箇菩薩上名悉同號為普者明佛果位中普賢菩薩隨十波羅蜜隨行名殊此是佛本因果行門故四十衆神天倣此而起隨十住十行十回向十地位進修行別十波羅蜜亦隨升進行上亦名別通十普賢四十衆神天有五十以十波羅蜜隨行五位上升進即有五十箇菩薩行因五十箇佛果通為一百常不離本佛果本十普賢行名一十通四十衆神天為五十箇波羅蜜行一中攝十即有五百種差別智門方成萬行圓滿佛也即安立一剎那際為升進始終之時例如龍女是剎那不出三生成佛亦取十定品中以剎那際降神初生及入涅槃以為時體本來如是見時日遷者情隨妄想也已上釋汝以毗盧遮那如來應正等覺本願力故威神力故竟此一段釋本發心及成果之因緣皆乘初會中毗盧遮那智力十普賢行四十衆神天所行行力倣此而修名乘佛神力是如來願力亦是汝勝智力故已下十二行都舉入三昧之所為有二十二因緣文義可知第四段善男子有五行經是勸説分有十事因緣如文自明云滿一切智智者一滿根本智二滿差別智經爾時十方諸佛與金剛藏菩薩無能映奪身與無礙樂説辨與善分別清淨智與善憶念不忘力與善決定明了慧與至一切處開悟智與成道自在力與如來無所畏與一切智人觀察分別諸法門辨才智與一切如來上妙身語意具足莊嚴何以故得此三昧法如是故本願所起故善淨深心故善淨智輪故善積集助道故善修治所作故念其無量法器故知其清淨信解故得無錯謬總持故法界智印善印故論第四爾時十方諸佛已下至法界智印善印故有九行經明十方諸佛與金剛藏菩薩十種力令説法自在分於此諸佛與力加持中義分為三一明諸佛十種加持二明十種因緣法入是三昧三明諸菩薩請説法一爾時已下至具足莊嚴有五行半經明十方諸佛與金剛藏菩薩十種力加持分二何以故已下有四行經明舉十種因緣法合入是三昧分於此欲説十地法時諸佛加持有六一十方諸佛同名現前加二毗盧遮那本願威神加三諸佛與金剛藏十種法力加四諸佛以言讚歎加五諸佛各伸右手摩頂加六如來放光灌頂加三如諸菩薩請説有四一如來放光光臺勸説二解脫月三請三諸菩薩同請四通諸佛放光勸説總有六種加持四重請一勸説第二正説分中從爾時十方諸佛各伸右手已下至動地興供已來正説十地且從初第一歡喜地中長科為十段經爾時十方諸佛各伸右手摩金剛藏菩薩頂摩頂已金剛藏菩薩從三昧起普告一切菩薩衆言諸佛子諸菩薩願善決定無雜不可見廣大如法界究竟如虗空盡未來際遍一切佛剎救護一切衆生為一切諸佛所護入過去未來現在諸佛智地佛子何等為菩薩摩訶薩智地佛子菩薩摩訶薩智地有十種過去未來現在諸佛已説當説今説我亦如是説何等為十一者歡喜地二者離垢地三者發光地四者𦦨慧地五者難勝地六者現前地七者遠行地八者不動地九者善慧地十者法雲地佛子此菩薩十地三世諸佛已説當説今説佛子我不見有諸佛國土其中如來不説此十地者何以故此是菩薩摩訶薩向菩提最上道亦是清淨法光明門所謂分別演説菩薩諸地佛子此處不可思議所謂諸菩薩隨證智論第一爾時十方諸佛各伸右手已下至隨證智一段有十六行半經明十方諸佛手摩金剛藏菩薩頂令起正説十種地名分經爾時金剛藏菩薩説此菩薩十地名已默然而住不復分別是時一切菩薩衆聞菩薩十地名不聞解釋咸生渴仰作如是念何因何緣金剛藏菩薩唯説菩薩十地名而不解釋解脫月菩薩知諸大衆心之所念以頌問金剛藏菩薩曰何故淨覺人念智功德具説諸上妙地有力不解釋一切咸決定勇猛無怯弱何故説地名而不為開演諸地妙義趣此衆皆欲聞其心無怯弱願為分別説衆會悉清淨離懈怠嚴潔能堅固不動具功德智慧相視咸恭敬一切悉專仰如蜂念好蜜如渴思甘露論第二爾時金剛藏菩薩已下長行有五行通偈頌有十行經明金剛藏菩薩默然不説法解脫月菩薩知衆之心為衆請説十地法門分經爾時大智無所畏金剛藏菩薩聞説是已欲令衆會心歡喜故為諸佛子而説頌言菩薩行地事最上諸佛本顯示分別説第一希有難微細難可見離念超心地出生佛境界聞者悉迷惑持心如金剛深信佛勝智知心地無我能聞此勝法如空中彩畫如空中風相牟尼智如是分別甚難見我念佛智慧最勝難思議世間無能受默然而不説論第三爾時大智無所畏金剛藏菩薩已下長行通偈頌有七行經明金剛藏菩薩以申默然不説之意經爾時解脫月菩薩聞是説已白金剛藏菩薩言佛子今此衆會皆悉已集善淨深心善潔思念善修諸行善集助道善能親近百千億佛成就無量功德善根捨離癡惑無有垢染深心信解於佛法中不隨他教善哉佛子當承佛神力而為演説此諸菩薩於如是等甚深之處皆能證知爾時解脫月菩薩欲重宣其義而説頌曰願説最安隱菩薩無上行分別於諸地智淨成正覺此衆無諸垢志解悉明潔承事無量佛能知此地義論第四爾時解脫月菩薩已下通頌有九行經明解脫月菩薩重請説法分經爾時金剛藏菩薩言佛子雖此衆集善淨思念捨離愚癡及以疑惑於甚深法不隨他教然有其餘劣解衆生聞此甚深難思議事多生疑惑於長夜中受諸衰惱我愍此等是故默然爾時金剛藏菩薩欲重宣其義而説頌曰雖此衆淨廣智慧甚深明利能決擇其心不動如山王不可傾覆猶大海有行未久解未得隨識而行不隨智聞此生疑墮惡道我愍是等故不説論第五爾時金剛藏菩薩已下長行及頌有九行經明金剛藏菩薩恐劣解隨識者不能生信分經爾時解脫月菩薩重白金剛藏菩薩言佛子願承佛神力分別説此不思議法此人當得如來護念而生信受何以故説十地時一切菩薩法應如是得佛護念得護念故於此智地能生勇猛何以故此是菩薩最初所行成就一切諸佛法故譬如書字數説一切皆以字母為本字母究竟無有少分離字母者佛子一切佛法皆以十地為本十地究竟修行成就得一切智是故佛子願為演説此人必為如來所護令其信受爾時解脫月菩薩欲重宣其義而説頌曰善哉佛子願演説趣入菩提諸地行十方一切自在尊莫不護念智根本此安住智亦究竟一切佛法所從生譬如書數字母攝如是佛法依於地論第六爾時解脫月菩薩已下一段通頌有十四行半經明解脫月三請此衆堪聞若有得聞佛所護念願説無疑分經爾時諸大菩薩衆一時同聲向金剛藏菩薩而説頌言上妙無垢智無邊分別辨宣暢深美言第一義相應念持清淨行十力集功德辨才分別義説此最勝地定戒集正心離我慢邪見此衆無疑念唯願聞善説如渴思冷水如飢念美食如病憶良藥如蜂貪好蜜我等亦如是願聞甘露法善哉廣大智願説入諸地成十力無礙善逝一切行論第七爾時諸大菩薩衆已下并頌有六行半經明大衆同請分經爾時世尊從眉間出清淨光明名菩薩力𦦨明百千阿僧祇光明以為眷屬普照十方一切世界靡不周遍三惡道苦皆得休息又照一切如來衆會顯現諸佛不思議力又照十方一切世界一切諸佛所加説法菩薩之身作是事已於上虗空中成大光明雲網臺而住時十方諸佛悉亦如是從眉間出清淨光明其光名號眷屬作業悉同於此又亦照此娑婆世界佛及大衆并金剛藏菩薩身師子座已於上虗空中成大光明雲網臺時光臺中以諸佛威神力故而説頌言佛無等等如虗空十力無量勝功德人間最勝世中上釋師子法加於彼佛子當承諸佛力開此法王最勝藏諸地廣智勝妙行以佛威神分別説若為善逝力所加當得法寶入其心諸地無垢次第滿亦具如來十種力雖住海水劫火中堪受此法必得聞其有生疑不信者永不得聞如是義應説諸地勝智道入住展轉次修習從行境界法智生利益一切衆生故論第八爾時世尊已下并頌有二十一行經明十方世界如來各放眉間光灌金剛藏菩薩頂互相照燭光化成臺光臺出音聲勸説十地分經爾時金剛藏菩薩觀察十方欲令大衆增淨信故而説頌曰如來大仙道微妙難可知非念離諸念求見不可得無生亦無滅性淨恆寂然離垢聰慧人彼智所行處自性本空寂無二亦無盡解脫於諸趣涅槃平等住非初非中後非言辭所説出過於三世其相如虗空寂滅佛所行言説莫能及地行亦如是難説難可受智起佛境界非念離心道非蘊界處門智知意不及如空中鳥迹難説難可示如是十地義心意不能了慈悲及願力出生入地行次第圓滿心智行非慮境是境界難見可知不可説佛力故開演汝等應敬受如是智入行億劫説不盡我今但略説真實義無餘一念恭敬待我承佛力説勝法微妙音譬喻字相應無量佛神力咸來入我身此處難宣示我今説少分論第九爾時金剛藏菩薩已下長行并頌有十三行經明金剛藏菩薩歎十地法門甚深出過情意識唯智所知非言所及承諸佛威神略説少許分此九段門中大意有十文自具足不煩更釋其十事者一諸佛摩頂明印可許説二總舉十種地名三默止待請方宣明法可貴不輕授物四解脫月知時而三請五金剛藏菩薩恐器劣而三止六大衆咸同請七明堪聞者諸佛所加不堪者元自不聞八明光臺出音勸説九明佛光灌頂十明金剛藏菩薩辭退法深難説略説少分大意明此十地體與十信十住十行十回向十一地互作依止故是故從十信十住十行十回向總有十地行門次第為以一箇如來自在無礙大智同行一箇十波羅蜜以為方便進修故總是初會十普賢法故是故解脫月菩薩言以字母等喻一切書字及數説無離字母一切佛法皆以十地為本明此十地法通因徹果不離如來根本智依十普賢行修差別智故滿薩婆若海故是故從初舉果勸修中放眉間光名菩薩力智光明入佛足下輪中用成十信今還於如來眉間放光名菩薩力𦦨明灌金剛藏菩薩頂用説十地足下光明以果成因生信此光明説十地是所信之果終是故今還放初所信之十地智果之光用灌加持金剛藏菩薩頂令説此十地之行從頂入者明十地是一切菩薩中道智果頂故至一切智之盡處故是故如來出現品法界品總於如來眉間放光總明果體智光圓滿處故又光從頂入者明以從智頂處世行悲稱十回向中所發大願令行滿故明此十地長養大慈悲門赴所願滿足故是以善財知識以十女天表之十一地明悲滿從智遍利衆生以佛母摩耶生佛表之須妙得其意方可知真成信解之門升進之路不窮大教無可以指南音切匱求位切映於命切謬美幼切蜂方容切傾去營切逾羊朱切
