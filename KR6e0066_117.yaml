body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之三十經此是大悲清淨智利益世間慈氏尊灌頂地中佛長子入如來境之住處一切名聞諸佛子已入大乘解脫門遊行法界心無著此無等者之住處施戒忍進禪智慧方便願力及神通如是大乘諸度法悉具足者之住處智慧廣大如虗空普知三世一切法無礙無依無所取了諸有者之住處善能解了一切法無性無生無所依如鳥飛空得自在此大智者之住處了知三毒真實性分別因緣虗妄起亦不厭彼而求出此寂靜人之住處三解脫門八聖道諸蘊處界及緣起悉能觀察不趣寂此善巧人之住處十方國土及衆生以無礙智咸觀察了性皆空不分別此寂滅人之住處普行法界悉無礙而求行性不可得如風行空無所行此無依者之住處普見惡道羣生類受諸楚毒無所歸放大慈光悉除滅此哀愍者之住處見諸衆生失正道譬如生盲踐畏途引其令入解脫城此大導師之住處見諸衆生入魔網生老病死常逼迫令其解脫得慰安此勇健人之住處見諸衆生嬰惑病而興廣大悲愍心以智慧藥悉除滅此大醫王之住處見諸羣生沒有海沈淪憂迫受衆苦悉以法船而救之此善度者之住處見諸衆生在惑海能發菩提妙寶心悉入其中而濟拔此善漁人之住處恆以大願慈悲眼普觀一切諸衆生從諸有海而拔出此金翅王之住處譬如日月在虗空一切世間魔不蜀智慧光明亦如是此照世者之住處菩薩為化一衆生普盡未來無量劫如為一人一切爾此救世者之住處於一國土化衆生盡未來劫無休息一一國土咸如是此堅固意之住處十方諸佛所説法一座普受咸令盡盡未來劫恆悉然此智海人之住處遍遊一切世界海普入一切道場海供養一切如來海此修行者之住處修行一切妙行海發起無邊大願海如是經於衆劫海此功德者之住處一毛端處無量剎佛衆生劫不可説如是明見靡不周此無礙眼之住處一念普攝無邊劫國土諸佛及衆生智慧無礙悉正知此具德人之住處十方國土碎為塵一切大海以毛滴菩薩發願數如是此無礙者之住處成就總持三昧門大願諸禪及解脫一一皆住無邊劫此真佛子之住處無量無邊諸佛子種種説法度衆生亦説世間衆技術此修行者之住處成就神通方便智修行如幻妙法門十方五趣悉現生此無礙者之住處菩薩始從初發心具足修行一切行化身無量遍法界此神力者之住處一念成就菩提道普作無邊智慧業世情思慮悉發狂此難量者之住處成就神通無障礙遊行法界靡不周其心未嘗有所得此淨慧者之住處菩薩修行無礙慧入諸國土無所著以無二智普照明此無我者之住處了知諸法無依止本性寂滅同虗空常行如是境界中此離垢人之住處普見羣生受諸苦發大仁慈智慧心願常利益諸世間此悲愍者之住處佛子住於此普現衆生前猶如日月輪遍除生死暗佛子住於此普順衆生心變現無量身充滿十方剎佛子住於此遍遊諸世界一切如來所無量無數劫佛子住於此思量諸佛法無量無數劫其心無厭倦佛子住於此念念入三昧一一三昧門闡明諸佛境佛子住於此悉知一切剎無量無數劫衆生佛名號佛子住於此一念攝諸劫但隨衆生心而無分別想佛子住於此修習諸三昧一一心念中了知三世法佛子住於此結跏身不動普現一切剎一切諸趣中佛子住於此飲諸佛法海深入智慧海具足功德海佛子住於此悉知諸剎數世數衆生數佛名數亦然佛子住於此一念悉能了一切三世中國土之成壞佛子住於此普知佛行願菩薩所修行衆生根性欲佛子住於此見一微塵中無量剎道場衆生及諸劫如一微塵內一切塵亦然種種咸具足處處皆無礙佛子住於此普觀一切法衆生剎及世無起無所有觀察衆生等法等如來等剎等諸願等三世悉平等佛子住於此教化諸羣生供養諸如來思惟諸法性無量千萬劫所修願智行廣大不可量稱揚莫能盡彼諸大勇猛所行無障礙安住於此中我合掌敬禮諸佛之長子聖德慈氏尊我今恭敬禮願垂顧念我論已上八十九行頌是善財童子重頌前慈氏菩薩所居樓閣住處并歎慈氏菩薩之德如文具明經爾時善財童子以如是等一切菩薩無量稱揚讚歎法而讚毗盧遮那莊嚴藏大樓閣中諸菩薩已曲躬合掌恭敬頂禮一心願見彌勒菩薩親近供養乃見彌勒菩薩摩訶薩從別處來無量天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩𬑟羅伽王釋梵護世及本生處無量眷屬婆羅門衆及餘無數百千衆生前後圍繞而共來向莊嚴藏大樓觀所善財見已歡喜踊躍五體投地時彌勒菩薩觀察善財指示大衆歎其功德而説頌曰汝等觀善財智慧心清淨為求菩提行而來至我所善來圓滿慈善來清淨悲善來寂滅眼修行無懈倦善來清淨意善來廣大心善來不退根修行無懈倦善來不動行常求善知識了達一切法調伏諸羣生善來行妙道善來住功德善來趣佛果未曾有疲倦善來德為體善來法所滋善來無邊行世間難可見善來離迷惑世法不能染利衰毀譽等一切無分別善來施安樂調柔堪受化諂誑瞋慢心一切悉除滅善來真佛子普詣於十方增長諸功德調柔無懈倦善來三世智遍知一切法普生功德藏修行不疲厭文殊德雲等一切諸佛子令汝至我所示汝無礙處具修菩薩行普攝諸羣生如是廣大人今來至我所為求諸如來清淨之境界問諸廣大願而來至我所去來現在佛所成諸行業汝欲皆修學而來至我所汝於善知識欲求微妙法欲受菩薩行而來至我所汝念善知識諸佛所稱歎令汝成菩提而來至我所汝念善知識生我如父母養我如乳母增我菩提分如醫療衆疾如天灑甘露如日示正道如月轉淨輪如山不動搖如海無增減如船師濟渡而來至我所汝觀善知識猶如大猛將亦如大商主又如大導師能建正法幢能示佛功德能滅諸惡道能開善趣門能顯諸佛身能守諸佛藏能持諸佛法是故願瞻奉欲滿清淨智欲具端正身欲生尊貴家而來至我所汝等觀此人親近善知識隨其所修學一切應順行以昔福因緣文殊令發心隨順無違逆修行不懈倦父母與親屬宮殿及財産一切皆捨離謙下求知識淨治如是意永離世間身當生佛國土受諸勝果報善財見衆生生老病死苦為發大悲意勤修無上道善財見衆生五趣常流轉為求金剛智破彼諸苦輪善財見衆生心田甚荒穢為除三毒刺專求利智犂衆生處癡暗盲冥失正道善財為導師示其安隱處忍鎧解脫乘智慧為利劒能於三有內破諸煩惱賊善財法船師普濟諸含識令過爾𦦨海疾至淨寶州善財正覺日智光大願輪周行法界空普照羣迷宅善財正覺月白法悉圓滿慈定清涼光等照衆生心善財勝智海依於直心住菩提行漸深出生衆法寶善財大心龍升於法界空興雲霔甘澤生成一切果善財然法燈信炷慈悲油念器功德光滅除三毒暗覺心迦羅邏悲胞慈為肉菩提分肢節長於如來藏增長福德藏清淨智慧藏開顯方便藏出生大願藏如是大莊嚴救護諸羣生一切天人中難聞難可見如是智慧樹根深不可動衆行漸增長普蔭諸羣生欲生一切德欲問一切法欲斷一切疑專求善知識欲破諸惑魔欲除諸見垢欲解衆生縛專求善知識當滅諸惡道當示人天路令修功德行疾入涅槃城當度諸見難當截諸見網當枯愛欲水當示三有道當為世依怙當作世光明當成三界師示其解脫處亦當令世間普離諸想著普覺煩惱睡普出愛欲泥當了種種法當淨種種剎一切咸究竟其心大歡喜汝行極調柔汝心甚清淨所欲修功德一切當圓滿不久見諸佛了達一切法嚴淨衆剎海成就大菩提當滿諸行海當知諸法海當度衆生海如是修諸行當到功德岸當生諸善品當與佛子等如是心決定當斷一切惑當淨一切業當伏一切魔滿足如是願當生妙智道當開正法道不久當捨離惑業諸苦道一切衆生輪沈迷諸有輪汝當轉法輪令其斷苦輪汝當持佛種汝當淨法種汝能集僧種三世悉周遍當斷衆愛網當裂衆見網當救衆苦網當成此願網當度衆生界當淨國土界當習智慧界當成此心界當令衆生喜當令菩薩喜當令諸佛喜當成此歡喜當見一切趣當見一切剎當見一切佛當成此佛見當放破暗光當放息熱光當放滅惡光滌除三有苦當開天趣門當開佛道門當示解脫門普使衆生入當示於正道當絶於邪道如是勤修行成就菩提道當修功德海當渡三有海普使羣生海出於衆苦海當於衆生海消竭煩惱海令修諸行海疾入大智海汝當增智海汝當修行海諸佛大願海汝當咸滿足汝當入剎海汝當觀衆海汝當以智力普飲諸法海當覲諸佛雲當起供養雲當聽妙法雲當興此願雲普遊三有室普壞衆惑室普入如來室當行如是道普入三昧門普遊解脫門普住神通門周行於法界普現衆生前普對諸佛前譬如日月光當成如是力所行無動亂所行無染著如鳥行虗空當成此妙用譬如因陀網剎網如是住汝當悉往詣如風無所礙汝當入法界遍往諸世界普見三世佛心生大欣慶汝於諸法門已得及當得應生大喜躍無貪亦無厭汝是功德器能隨諸佛教能修菩薩行得見此奇特如是諸佛子億劫難可遇況見其功德所修諸妙道汝生於人中大獲諸善利得見文殊等無量諸功德已離諸惡道已出諸難處已超衆苦患善哉勿懈怠已離凡夫地已住菩薩地當滿智慧地速入如來地菩薩行如海佛智同虗空汝願亦復然應生大欣慶諸根不懈倦志願恆決定親近善知識不久悉成滿菩薩種種行皆為調衆生普行諸法門慎勿生疑惑汝具難思福及以真實信是故於今日得見諸佛子汝見諸佛子悉獲廣大利一一諸大願一切咸信受汝於三有中能修菩薩行是故諸佛子示汝解脫門非是法器人與佛子同住設經無量劫莫知其境界汝見諸菩薩得聞如是法世間甚難有應生大喜慶諸佛護念汝菩薩攝受汝能順其教行善哉住壽命已生菩薩家已具菩薩德已長如來種當升灌頂位不久汝當得與諸佛子等見苦惱衆生悉置安隱處如下如是種必獲如是果我今慶慰汝汝應大欣悅無量諸菩薩無量劫行道未能成此行今汝皆獲得信樂堅進力善財成此行若有敬慕心亦當如是學一切功德行皆從願欲生善財已了知常樂勤修習如龍布密雲必當霔大雨菩薩起願智決定修諸行若有善知識示汝普賢行汝當好承事慎勿生疑惑汝於無量劫為欲妄捨身今為求菩提此捨方為善汝於無量劫具受生死苦不曾事諸佛未聞如是行汝今得人身值佛善知識聽受菩提行云何不歡喜雖遇佛興世亦值善知識其心不清淨不聞如是法若於善知識信樂心尊重離疑不疲厭乃聞如是法若有聞此法而興誓願心當知如是人已獲廣大利如是心清淨當得近諸佛亦近諸菩薩決定成菩提若入此法門則具諸功德永離衆惡趣不受一切苦不久捨此身往生佛國土常見十方佛及以諸菩薩往因今淨解及事善友力增長諸功德如水生蓮華樂事善知識勤供一切佛專心聽聞法當行勿懈倦汝是真法器當具一切法當修一切道當滿一切願汝以信解心而來禮敬我不久當普入一切諸佛會善哉真佛子恭敬一切佛不久具諸行到佛功德岸汝當往大智文殊師利所彼當令汝得普賢深妙行爾時彌勒菩薩摩訶薩在衆會前稱讚善財大功德藏善財聞已歡喜踊躍身毛皆豎悲泣哽噎起立合掌恭敬瞻仰繞無量匝以文殊師利心念力故衆華纓絡種種妙寶不覺忽然自盈其手善財歡喜即以奉散彌勒菩薩摩訶薩上時彌勒菩薩摩善財頂為説頌言善哉善哉真佛子普策諸根無懈倦不久當具諸功德猶如文殊及與我時善財童子以頌答曰我念善知識億劫難值遇今得咸親近而來詣尊所我以文殊故見諸難見者彼大功德尊願速還瞻覲論第五爾時善財童子以如是等一切菩薩無量稱揚讚歎法已下是善財欲見彌勒菩薩彌勒從外而來為大衆歎善財功德分此明菩薩常以不居自報隨俗攝生所有隨後之衆是所攝之衆化來至果餘如文自明經爾時善財童子合掌恭敬重白彌勒菩薩摩訶薩言大聖我已先發阿耨多羅三藐三菩提心而我未知菩薩云何學菩薩行云何修菩薩道大聖一切如來授尊者記一生當得阿耨多羅三藐三菩提若一生當得無上菩提則已超越一切菩薩所住處則已出過一切菩薩離生位則已圓滿一切波羅蜜則已深入一切諸忍門則已具足一切菩薩地則已遊戲一切解脫門則已成就一切三昧法則已通達一切菩薩行則已證得一切陀羅尼辨才則已於一切菩薩自在中而得自在則已積集一切菩薩助道法則已遊戲智慧方便則已出生大神通智則已成就一切學處則已圓滿一切妙行則已滿足一切大願則已領受一切佛所記則已了知一切諸乘門則已堪受一切如來所護念則已能攝一切佛菩提則已能持一切佛法藏則已能持一切諸佛菩薩祕密藏則已能於一切菩薩衆中為上首則已能為破煩惱魔軍大勇將則已能作出生死曠野大導師則已能作治諸惑重病大醫王則已能於一切衆生中為最勝則已能於一切世主中得自在則已能於一切聖人中最第一則已能於一切聲聞獨覺中最增上則已能於生死海中為船師則已能布調伏一切衆生網則已能觀一切衆生根則已能攝一切衆生界則已能守護一切菩薩衆則已能談議一切菩薩事則已能往詣一切如來所則已能住止一切如來會則已能現身一切衆生前則已能於一切世法無所染則已能超越一切魔境界則已能安住一切佛境界則已能到一切菩薩無礙境則已能精勤供養一切佛則已與一切諸佛法同體性已繫妙法繒已受佛灌頂已住一切智已能普生一切佛法已能速踐一切智位大聖菩薩云何學菩薩行云何修菩薩道隨所修學疾得具足一切佛法悉能度脫所念衆生普能成滿所發大願普能究竟所起諸行普能安慰一切天人不負自身不斷三寶不虗一切佛菩薩種能持一切諸佛法眼如是等事願皆為説爾時彌勒菩薩摩訶薩觀察一切道場衆會指示善財而作是言諸仁者汝等見此長者子今於我所問菩薩行諸功德不諸仁者此長者子勇猛精進志願無雜深心堅固恆不退轉具勝希望如救頭然無有厭足樂善知識親近供養處處尋求承事請法諸仁者此長者子曩於福城受文殊教展轉南行求善知識經由一百一十善知識已然後而來至於我所未曾暫起一念疲懈諸仁者此長者子甚為難有趣向大乘乘於大慧發大勇猛擐大悲甲以大慈心救護衆生起大精進波羅蜜行作大商主護諸衆生為大法船渡諸有海住於大道集大法寶修諸廣大助道之法如是之人難可得聞難可得見難得親近同居共行何以故此長者子發心救護一切衆生令一切衆生解脫諸苦超諸惡趣離諸險難破無明暗出生死野息諸趣輪度魔境界不著世法出欲淤泥斷貪鞅解見縛壞想宅絶迷道摧慢幢拔惑箭撤睡蓋裂愛網滅無明渡有流離諂幻淨心垢斷癡惑出生死諸仁者此長者子為被四流漂汩者造大法船為被見泥沒溺者立大法橋為被癡暗昏迷者然大智燈為行生死曠野者開示聖道為嬰煩惱重病者調和法藥為遭生老死苦者飲以甘露令其安隱為入貪恚癡火者沃以定水使得清涼多憂惱者慰喻使安繫有獄者曉誨令出入見網者開以智劒住界城者示諸脫門在險難者導安隱處懼結賊者與無畏法墮惡趣者授慈悲手拘害蘊者示涅槃城界蛇所纏解以聖道著於六處空聚落者以智慧光引之令出住邪濟者令入正濟近惡友者示其善友樂凡法者誨以聖法著生死者令其趣入一切智城諸仁者此長者子恆以此行救護衆生發菩提心未嘗休息求大乘道曾無懈倦飲諸法水不生厭足恆勤積集助道之行常樂清淨一切法門修菩薩行不捨精進成滿諸願善行方便見善知識情無厭足事善知識身不疲懈聞善知識所有教誨常樂順行未曾違逆諸仁者若有衆生能發阿耨多羅三藐三菩提心是為希有若發心已又能如是精進方便習諸佛法倍為希有又能如是求菩薩道又能如是淨菩薩行又能如是事善知識又能如是如救頭然又能如是順知識教又能如是堅固修行又能如是集菩提分又能如是不求一切名聞利養又能如是不捨菩薩純一之心又能如是不樂家宅不著欲樂不戀父母親戚知識但樂追求菩薩伴侶又能如是不顧身命唯願勤修一切智道應知展轉倍更難得諸仁者餘諸菩薩經於無量百千萬億那由他劫乃能滿足菩薩願行乃能親近諸佛菩提此長者子於一生內則能淨佛剎則能化衆生則能以智慧深入法界則能成就諸波羅蜜則能增廣一切諸行則能圓滿一切大願則能超出一切魔業則能承事一切善友則能清淨諸菩薩道則能具足普賢諸行爾時彌勒菩薩摩訶薩如是稱歎善財童子種種功德令無量百千衆生發菩提心已告善財言善哉善哉善男子汝為饒益一切世間汝為救護一切衆生汝為勤求一切佛法故發阿耨多羅三藐三菩提心善男子汝獲善利汝善得人身汝善住壽命汝善值如來出現汝善見文殊師利大善知識汝身是善器為諸善根之所潤澤汝為白法之所資持所有解欲悉已清淨已為諸佛共所護念已為善友共所攝受何以故善男子菩提心者猶如種子能生一切諸佛法故菩提心者猶如良田能長衆生白淨法故菩提心者猶如大地能持一切諸世間故菩提心者猶如淨水能洗一切煩惱垢故菩提心者猶如大風普於世間無所礙故菩提心者猶如盛火能燒一切諸見薪故菩提心者猶如淨日普照一切諸世間故菩提心者猶如盛月諸白淨法悉圓滿故菩提心者猶如明燈能放種種法光明故菩提心者猶如淨目普見一切安危處故菩提心者猶如大道普令得入大智城故菩提心者猶如正濟令其得離諸邪法故菩提心者猶如大車普能運載諸菩薩故菩提心者猶如門戶開示一切菩薩行故菩提心者猶如宮殿安住修習三昧法故菩提心者猶如園苑於中遊戲受法樂故菩提心者猶如舍宅安隱一切諸衆生故菩提心者則為所歸利益一切諸世間故菩提心者則為所依諸菩薩行所依處故菩提心者猶如慈父訓導一切諸菩薩故菩提心者猶如慈母生長一切諸菩薩故菩提心者猶如乳母養育一切諸菩薩故菩提心者猶如善友成益一切諸菩薩故菩提心者猶如君主勝出一切二乘人故菩提心者猶如帝王一切願中得自在故菩提心者猶如大海一切功德悉入中故菩提心者如須彌山於諸衆生心平等故菩提心者如鐵圍山攝持一切諸世間故菩提心者猶如雪山長養一切智慧藥故菩提心者猶如香山出生一切功德香故菩提心者猶如虗空諸妙功德廣無邊故菩提心者猶如蓮華不染一切世間法故菩提心者如調慧象其心善順不獷㑦故菩提心者如良善馬遠離一切諸惡性故菩提心者如調御師守護大乘一切法故菩提心者猶如良藥能治一切煩惱病故菩提心者猶如坑穽陷沒一切諸惡法故菩提心者猶如金剛悉能穿徹一切法故菩提心者猶如香篋能貯一切功德香故菩提心者猶如妙華一切世間所樂見故菩提心者如白旃檀除衆欲熱使清涼故菩提心者如黑沈香能熏法界悉周遍故菩提心者如善見藥王能破一切煩惱病故菩提心者如毗笈摩藥能拔一切諸惑箭故菩提心者猶如帝釋一切主中最為尊故菩提心者如毗沙門能斷一切貧窮苦故菩提心者如功德天一切功德所莊嚴故菩提心者如莊嚴具莊嚴一切諸菩薩故菩提心者如劫燒火能燒一切諸有為故菩提心者如無生根藥長養一切諸佛法故菩提心者猶如龍珠能銷一切煩惱毒故菩提心者如水清珠能清一切煩惱濁故菩提心者如如意珠周給一切諸貧乏故菩提心者如功德瓶滿足一切衆生心故菩提心者如如意樹能雨一切莊嚴具故菩提心者如鵝羽衣不受一切生死垢故菩提心者如白氎線從本已來性清淨故菩提心者如快利犂能治一切衆生田故菩提心者如那羅延能摧一切我見敵故菩提心者猶如快箭能破一切諸苦的故菩提心者猶如利矛能穿一切煩惱甲故菩提心者猶如堅甲能護一切如理心故菩提心者猶如利刀能斬一切煩惱首故菩提心者猶如利劒能斷一切憍慢鎧故菩提心者如勇將幢能伏一切諸魔軍故菩提心者猶如利鋸能截一切無明樹故菩提心者猶如利斧能伐一切諸苦樹故菩提心者猶如兵仗能防一切諸苦難故菩提心者猶如善手防護一切諸度身故菩提心者猶如好足安立一切諸功德故菩提心者猶如眼藥滅除一切無明翳瞙故菩提心者猶如鉗鑷能拔一切身見刺故菩提心者猶如臥具息除生死諸勞苦故菩提心者如善知識能解一切生死縛故菩提心者如好珍財能除一切貧窮事故菩提心者如大導師善知菩薩出要道故菩提心者猶如伏藏出功德財無匱乏故菩提心者猶如涌泉生智慧水無窮盡故菩提心者猶如明鏡普現一切法門像故菩提心者猶如蓮華不染一切諸罪垢故菩提心者猶如大河流引一切度攝法故菩提心者如大龍王能雨一切妙法雨故菩提心者猶如命根任持菩薩大悲身故菩提心者猶如甘露能令安住不死界故菩提心者猶如大網普攝一切諸衆生故菩提心者猶如罥索攝取一切所應化故菩提心者猶如鉤餌出有淵中所居者故菩提心者如阿伽陀藥能令無病永安隱故菩提心者如除毒藥悉能消歇貪愛毒故菩提心者如善持呪能除一切顛倒毒故菩提心者猶如疾風能卷一切諸障霧故菩提心者如大寶洲出生一切覺分寶故菩提心者如好種性出生一切白淨法故菩提心者猶如住宅諸功德法所依處故菩提心者猶如市肆菩薩商人貿易處故菩提心者如鍊金藥能治一切煩惱垢故菩提心者猶如好蜜圓滿一切功德味故菩提心者猶如正道令諸菩薩入智城故菩提心者猶如好器能持一切白淨法故菩提心者猶如時雨能滅一切煩惱塵故菩提心者則為住處一切菩薩所住處故菩提心者則為壽行不取聲聞解脫果故菩提心者如淨琉璃自性明潔無諸垢故菩提心者如帝青寶出過世間二乘智故菩提心者如更漏鼓覺諸衆生煩惱睡故菩提心者如清淨水性本澄潔無垢濁故菩提心者如閻浮金映奪一切有為善故菩提心者如大山王超出一切諸世間故菩提心者則為所歸不拒一切諸來者故菩提心者則為義利能除一切衰惱事故菩提心者則為妙寶能令一切心歡喜故菩提心者如大施會充滿一切衆生心故菩提心者則為尊勝諸衆生心無與等故菩提心者猶如伏藏能攝一切諸佛法故菩提心者如因陀羅網能伏煩惱阿修羅故菩提心者如婆樓那風能動一切所應化故菩提心者如因陀羅火能燒一切諸惑習故菩提心者如佛支提一切世間應供養故音切擐患音撤丑列切汩古沒切飲於禁切㑦郎計切穽靜音笈居業切氎徒葉切鋸九御切矛莫矦切鉗巨淹切鑷疑業切餌二音椰耶音莫侯切拒其呂切
