body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論兜率天宮偈讚品第二十四論將釋此品三門如前第一釋品名目者明以金剛幢等十菩薩各從異佛剎來處兜率天宮至如來所各化作妙寶師子之座已各以十回向法門因果而偈讚之故名偈讚品異佛剎者從十行中來入十回向第二釋品來意者此品為欲成十回向中因果法門故須此品來也第三隨文解釋中義分為二第一長科經意第二隨文釋義一長科經意者於此一品大意前後總作十一段長科經爾時佛神力故十方各有一大菩薩一一各與萬佛剎微塵數諸菩薩俱從萬佛剎微塵數國土外諸世界中來詣佛所其名曰金剛幢菩薩堅固幢菩薩勇猛幢菩薩光明幢菩薩智幢菩薩寶幢菩薩精進幢菩薩離垢幢菩薩星宿幢菩薩法幢菩薩所從來國謂妙寶世界妙樂世界妙銀世界妙金世界妙摩尼世界妙金剛世界妙波頭摩世界妙優鉢羅世界妙栴檀世界妙香世界各於佛所淨修梵行所謂無盡幢佛風幢佛解脫幢佛威儀幢佛明相幢佛常幢佛最勝幢佛自在幢佛梵幢佛觀察幢佛其諸菩薩至佛所已頂禮佛足以佛神力即化作妙寶藏師子之座寶網彌覆周匝遍滿諸菩薩衆隨所來方各於其上結加趺坐其身悉放百千億那由他阿僧祇清淨光明此無量光皆從菩薩清淨心寶離衆過惡大願所起顯示一切諸佛自在清淨之法以諸菩薩平等願力能普救護一切衆生一切世間之所樂見見者不虗悉得調伏其菩薩衆悉已成就無量功德所謂遍遊一切諸佛國土無所障礙見無依止清淨法身以智慧身現無量身遍往十方承事諸佛入於諸佛無量無邊不可思議自在之法住於無量一切智門以智光明善了諸法於諸法中得無所畏隨所演説窮未來際辨才無盡以大智慧開總持門慧眼清淨入深法界智慧境界無有邊際究竟清淨猶若虗空如此世界兜率天宮諸菩薩衆如是來集十方一切兜率天宮悉有如是名號菩薩而來集會所從來國諸佛名號亦皆同等無有差別爾時世尊從兩膝輪放百千億那由他光明普照十方盡法界虗空界一切世界彼諸菩薩皆見於此佛神變相此諸菩薩亦見於彼一切如來神變之相如是菩薩皆與毗盧遮那如來於往昔時同種善根修菩薩行悉已悟入諸佛自在甚深解脫得無差別法界之身入一切土而無所住見無量佛悉往承事於一念中周行法界自在無礙心意清淨如無價寶無量無數諸佛如來常加護念其與其力到於究竟第一彼岸恆以淨念住無上覺念念恆入一切智處以小入大以大入小皆得自在通達無礙已得佛身與佛同住獲一切智從一切智而生其身一切如來所行之處悉能隨入開闡無量智慧法門到金剛幢大智彼岸獲金剛定斷諸疑惑已得諸佛自在神通普於一切十方國土教化調伏百千萬億無數衆生於一切數雖無所著善能修學成就究竟方便安立一切諸法如是等百千億那由他不可説無盡清淨三世一切無量功德藏諸菩薩衆皆來集會在於佛所因光所見一切佛所悉亦如是爾時金剛幢菩薩承佛神力普觀十方而説頌言論一從爾時佛神力故已下至而説頌言五十二行經明金剛幢等十菩薩衆十方來集彰因示果不二分於此分中義分為十段一爾時佛神力故已下至來詣佛所是諸衆來集分二其名曰已下至法幢菩薩舉所來十菩薩名號分三所從來國已下至妙香世界是諸菩薩所從來國土分四各於佛所淨修梵行已下至觀察幢佛舉本所事佛之號分五其諸菩薩已下至無量功德有八行經明諸來菩薩化座而坐放光顯德饒益分六所謂已下至猶若虗空有七行經明諸來菩薩見無依止清淨法身智慧遍遊十方事佛自在無礙分七如此世界已下至無有差別明都結十方同此來集分八爾時世尊已下至神變之相明如來放光所在普照十方彼此大衆皆相見分九如是菩薩已下至皆來集會有十六行經明諸來菩薩往因同佛善根至法究竟自在分十在於佛所因光所見已下至頌有兩行經明都結十方同此世界菩薩集會分第二隨文解釋者於此五十二行經約立十門一明十方菩薩所來之法二釋菩薩名下之義三釋十世界之所表四釋十佛名號之因果五釋十菩薩來至佛所所化之座體六釋菩薩身光之因七明菩薩所得何法而能自在化滿十方八釋如來放光處所表法九明諸來菩薩衆海從誰發心十明隨位進修因果一明菩薩所來之法者經云一一各與萬佛剎微塵數者為明升進之法智之知見勝前位故十住云百十行云千十回向云萬俱從萬佛剎微塵數國土外諸世界中來詣佛所者明迷法云外世界智達名來詣佛所云萬佛剎微塵數者是迷悟之數也二釋菩薩名下之義者其名曰金剛幢菩薩者菩薩前已釋訖金剛幢者明堅固不動義前十行位菩薩名林表行覆蔭廣多義故此位菩薩以幢為稱者明大悲之行處生死大海能摧破一切衆生煩惱自智無傾動故十行明以行自卑和怨義十回向明大智堅強隨悲破怨自在義此約檀度行堅固幢菩薩者此大悲為戒體故勇猛幢菩薩者此約大悲為忍是勇猛義光明幢菩薩者此約大悲為精進之體長處生死之夜以智發明故智幢菩薩者此位大智於生死之中恆明常破暗故以為定體寶幢菩薩者明以大悲大智慧善施教網名為寶幢明教可貴故非世寶也精進幢菩薩者此位是第七方便行善能知根同事處俗不迷同塵不污是精進幢義故離垢幢菩薩者此是第八願波羅蜜自無生死以智隨願利生故常無垢也星宿幢菩薩者此力波羅蜜法王位成差別智明善知衆根猶如星宿大小皆明法幢菩薩者此位是智波羅蜜善安立諸法無能摧破者是法幢義故此已上是能行行之人三釋世界名者所從來國謂妙寶世界明以妙法普施含生是可貴義世界名妙樂者明大悲為戒處生死利衆生令得大樂妙銀世界者明以法身理智以成忍體猶如白銀柔耎明淨妙金世界者明精進利俗無有勞倦不虧真理黃中致福悉皆金色也妙摩尼世界者明法性自淨用而無垢自在以為定體故妙金剛世界者明無性妙慧能破虗妄不自壞故妙波頭摩世界者是赤蓮華也明此以大悲方能同色香而無染故妙優鉢羅華世界者青蓮華色也第八以智隨悲之行清潔不汙以青蓮華色處泥不汙以用表之妙栴檀世界者以此法師位成説法香也妙香世界者明此位大智大悲隨位功終以無依無作之妙智而滿十方無來去智法音隨遍無有形故但云妙香不云形類表勝前有迹故此已上十世界名是此十回向位行中之法故言妙世界者是隨生死教化衆生理智妙用也世間以土地山河為世界智仁以智德妙用為世界四攝十佛名號因果者經云各於佛所淨修梵行者明隨位進修加行佛果即如下十箇佛是所謂無盡幢佛者明此十回向大悲之位所施無盡以成佛果之號其施如下回向品自明風幢佛者明巽為風為白淨為言説為赤為日為明為白淨即如風無形色而香臰悉吹皆令淨故又巽為雞知時而鳴故像知根而垂教也上值天門開衆善也巽為已盛陽之始也定是非之時也明齋戒法則之時故巽為言説為口為面門談衆善也能治辛丑丑為小男以衆言説化童蒙也以此言之風幢佛是此戒波羅蜜之風化果號也解脫幢佛者是忍位中果也忍力已成無不解脫此是西方兌為卑下義威儀幢佛此主北方佛果共信位中北方威儀智佛同號此主北方師範位也以威儀庠序以接童蒙故以約行為果號明相幢佛此與十信位東北方明相智佛同號故明約坎為所治丑為信心寅為契理始明借方表法也主丑為山山為不動不動即靜靜能發明明禪之始也入定之始正慧開敷以十回向之位不離十信所信之法於彼法上以為安立此明十回向之定體能發大悲利俗之明慧故如常幢佛與十信中第六究竟智佛亦相似總約隨位升進波羅蜜上立佛果號之名總不離十信所信果一如善財至彌勒佛果還指善財見文殊者是也明文殊是啓蒙信果之位發行進修不離舊迹今文殊菩薩住清涼山是此閻浮一境之東北主艮位表啓蒙發明之首故故為童子菩薩以實言之本是十方諸佛無性理之妙慧成佛莫不由之此門即一切衆生盡有迷理自惑而不見若悟理者現行分別是也以定照之方明故艮為止也自餘準例隨名會位知之五釋諸菩薩來所化座之體者經云化作妙寶師子之座以法寶利生教行網故以寶網彌覆座上十信位中座體約果成名以寶蓮華藏為體十住位中約得如來智慧大悲而成體即以毗盧遮那藏為體即師子座號毗盧遮那藏十行位中以行淨離垢師子座即以蓮華藏為體十回向位明大悲處生死設教行普該萬法不拘一法故座體直以寶為名不限色類以教行遍周而漉衆生故座有寶網彌覆其上六釋菩薩身光者明此位菩薩以大悲行處世利物任智慧而照衆生即淨光恆照七明菩薩得何法而自在者經云見無依止清淨法身以智身現無量故是明見法無依止性一切無明便為妙用智慧即能通化無方八釋如來放光處所表法者明十信足下輪中放光以信為初如十住足指端明入聖位之初十行足趺明依聖性法身起行十回向即於膝上放光者明表法光明以膝者人之坐起回旋卷舒自在之所由也明此回向位法門是回真處俗解脫無染之大智以悲願利生處生死而恆涅槃處涅槃與生死無礙自在以放光處表之十地眉間表中道果光也九明諸菩薩從誰發心者皆於自心無始分別無明為發心之始達此無始無明為大圓鏡智故即與十方毗盧遮那如來同善根故若離此智無成佛期無見佛日是故經云如是菩薩皆與毗盧遮那往昔同善根故明達自無明成大智體諸佛共此智也十明隨位進修因果者明金剛幢菩薩是所修行之人妙寶世界是所修之行無盡幢佛是所行之果餘九例知倣此已下有十段頌一段十行一行一頌所頌之法是此當位十回向位中都調治綱紀之門如文自具更加文釋文繁義沉表法難知方可約釋餘如文自具經如來不出世亦無有涅槃以本大願力示現自在法是法難思議非心所行處智慧到彼岸乃見諸佛境色身非是佛音聲亦復然亦不離色聲見佛神通力少智不能知諸佛實境界久修清淨業於此乃能了正覺無來處去亦無所從清淨妙色身神力故顯現無量世界中示現如來身廣説微妙法其心無所著智慧無邊際了達一切法普入於法界示現自在力衆生及諸法了達皆無礙普現衆色像遍於一切剎欲求一切智速成無上覺應以淨妙心修習菩提行若有見如來如是威神力當於最勝尊供養勿生疑論二如來不出世已下有十行頌明佛以實示權分經爾時堅固幢菩薩承佛神力普觀十方而説頌言如來勝無比甚深不可説出過語言道清淨如虗空汝觀人師子自在神通力已離於分別而令分別見導師為開演甚深微妙法以是因緣故現此無比身此是大智慧諸佛所行處若欲了知者常應親近佛意業常清淨供養諸如來終無疲厭心能入於佛道具無盡功德堅住菩提心以是疑網除觀佛無厭足通達一切法是乃真佛子此人能了知諸佛自在力廣大智所説欲為諸法本應起勝希望志求無上覺若有尊敬佛念報於佛恩彼人終不離一切諸佛住何有智慧人於佛得見聞不修清淨願履佛所行道論三爾時堅固幢菩薩已下有十行頌明歎佛身性相無比要常親近供養無疲大願成滿方能履佛所行道分經爾時勇猛幢菩薩承佛神力普觀十方而説頌言譬如明淨眼因日覩衆色淨心亦復然佛力見如來如以精進力能盡海源底智力亦如是得見無量佛譬如良沃田所種必滋長如是淨心地出生諸佛法如人獲寶藏永離貧窮苦菩薩得佛法離垢心清淨譬如伽陀藥能消一切毒佛法亦如是滅諸煩惱患真實善知識如來所稱讚以彼威神故得聞諸佛法設於無數劫財寶施於佛不知佛實相此亦不名施無量衆色相莊嚴於佛身非於色相中而能見於佛如來等正覺寂然恆不動而能普現身遍滿十方界譬如虗空界不生亦不滅諸佛法如是畢竟無生滅論四爾時勇猛幢菩薩已下有十行頌明佛及法要以淨心淨行方了見佛有為不堪分經爾時光明幢菩薩承佛神力普觀十方而説頌言人間及天上一切諸世界普見於如來清淨妙色身譬如一心力能生種種心如是一佛身普現一切佛菩提無二法亦復無諸相而於二法中現相莊嚴身了法性空寂如幻而生起所行無有盡導師如是現三世一切佛法身悉清淨隨其所應化普現妙色身如來不念言我作如是身自然而示現未嘗起分別法界無差別亦無所依止而於世間中示現無量身佛身非變化亦復非非化於無化法中示有變化形正覺不可量法界虗空等深廣無涯底言語道悉絶如來善通達一切處行道法界衆國土所往皆無礙論五光明幢菩薩有十行頌明一佛身而生多佛身如幻而生起分經爾時智幢菩薩承佛神力普觀十方而説頌言若人能信受一切智無礙修習菩提行其心不可量一切國土中普現無量身而身不在處亦不住於法一一諸如來神力示現身不可思議劫算數莫能盡三世諸衆生悉可知其數如來所示現其數不可得或時示一二乃至無量身普現十方剎其實無二種譬如淨滿月普現一切水影像雖無量本月未曾二如是無礙智成就等正覺普現一切剎佛體亦無二非一亦非二亦復非無量隨其所應化示現無量身佛身非過去亦復非未來一念現出生成道及涅槃如幻所作色無生亦無起佛身亦如是示現無有生論六爾時智幢菩薩已下有十行頌明佛智無依無作不造不內不外而能現形普遍分經爾時寶幢菩薩承佛神力普觀十方而説頌言佛身無有量能示有量身隨其所應覩導師如是現佛身無處所充滿一切處如空無邊際如是難思議非心所行處心不於中起諸佛境界中畢竟無生滅如翳眼所覩非內亦非外世間見諸佛應知亦如是饒益衆生故如來出世間衆生見有出而實無興世不可以國土晝夜而見佛歲月一剎那當知悉如是衆生如是説某日佛成道如來得菩提實不繫於日如來離分別非世超諸數三世諸導師出現皆如是譬如淨日輪不與昏夜合而説某日夜諸佛法如是三世一切劫不與如來合而説三世佛導師法如是論七爾時寶幢菩薩已下有十行頌明如來所有應現非情所為任智無功衆生自業應見分此段約自修行之行智現相應故非時分知立時分者是情故多時少時俱是情經爾時精進幢菩薩承佛神力普觀十方而説頌言一切諸導師身同義亦然普於十方剎隨應種種現汝觀牟尼尊所作甚奇特充滿於法界一切悉無餘佛身不在內亦復不在外神力故顯現導師法如是隨諸衆生類先世所集業如是種種身示現各不同諸佛身如是無量不可數唯除大覺尊無有能思議如以我難思心業莫能取佛難思亦爾非心業所現如剎不可思而見淨莊嚴佛難思亦爾妙相無不現譬如一切法衆緣故生起見佛亦復然必假衆善業譬如隨意珠能滿衆生心諸佛法如是悉滿一切願無量國土中導師興於世隨其願力故普應於十方論八爾時精進幢菩薩已下有十行頌明佛身非內外十方佛同等無有內身對衆生業現分經爾時離垢幢菩薩承佛神力普觀十方而説頌言如來大智光普淨諸世間世間既淨已開示諸佛法設有人欲見衆生數等佛靡不應其心而實無來處以佛為境界專念而不息此人得見佛其數與心等成就白淨法具足諸功德彼於一切智專念心不捨導師為衆生如應演説法隨於可化處普現最勝身佛身及世間一切皆無我悟此成正覺復為衆生説一切人師子無量自在力示現念等身其身各不同世間如是身諸佛身亦然了知其自性是則説名佛如來普知見明了一切法佛法及菩提二俱不可得導師無來去亦復無所住遠離諸顛倒是名等正覺論九爾時離垢幢菩薩已下有十行頌明如來以無心無思無依之智性無表裏對現十方隨根普應分經爾時星宿幢菩薩承佛神力普觀十方而説頌言如來無所住普住一切剎一切土皆往一切處咸見佛隨衆生心普現一切身成道轉法輪及以般涅槃諸佛不思議誰能思議佛誰能見正覺誰能現最勝一切法皆如諸佛境亦然乃至無一法如中有生滅衆生妄分別是佛是世界了達法性者無佛無世界如來普現前令衆生信喜佛體不可得彼亦無所見若能於世間遠離一切著無礙心歡喜於法得開悟神力之所現即此説名佛三世一切時求悉無所有若能如是知心意及諸法一切悉知見疾得成如來言語中顯示一切佛自在正覺超語言假以語言説論十爾時星宿幢菩薩已下有十行頌明以如來無心意識可名為佛衆生以有心意識及住寂滅心者總不能見佛分經爾時法幢菩薩承佛神力普觀十方而説頌言寧可恆具受一切世間苦終不遠如來不覩自在力若有諸衆生未發菩提心一得聞佛名決定成菩提若有智慧人一念發道心必成無上尊慎莫生疑惑如來自在力無量劫難遇若生一念信速登無上道設於念念中供養無量佛未知真實法不名為供養若聞如是法諸佛從此生雖經無量苦不捨菩提行一聞大智慧諸佛所入法普於法界中成三世導師雖盡未來際遍遊諸佛剎不求此妙法終不成菩提衆生無始來生死久流轉不了真實法諸佛故興世諸法不可壞亦無能壞者自在大光明普示於世間論十一爾時法幢菩薩已下有十行頌明寧受衆苦不捨如來分已上各説一法共成十回向心或但説有衆生著有或但説無衆生著無如經星宿幢菩薩頌云衆生妄分別是佛是世界了達法性者無佛無世界如下文法幢菩薩頌云寧可恆具受一切世間苦終不遠如來不覩自在力此二頌皆相成就有無恐墮邊見餘例知如觀十方何意為觀衆意之同別亦觀十方世界諸佛法同不二十回向品第二十五之一論將釋此品三門如前一釋品名目者此品何故名為十回向答曰以十住初生諸佛智慧家雖有第七方便波羅蜜成大悲行然為創始應真修理智出世心多行悲行劣故於初發心住於妙峯山頂見比丘名為德雲得憶念諸佛智慧光明門雖知已後次第十善知識以十波羅蜜互相參入和融諸行早以具足然當隨本位行門勝劣全異此明同中別令升進故如十行位中為行之首即以三眼國比丘名善見即以林中經行用表其十行以智眼慧眼法眼觀根利生化令出俗故以比丘所表為十行廣大覆蔭衆多以林所表如此十回向位中明前二位出俗心多大悲行劣以將十住初心所得諸佛之智慧十行之中出世之行門處俗利生故名回向回真入俗利生故名回向是故此位表法善知識即以鬻香長者名號青蓮華表之明此十回向法門如合和香法以將諸衆香合成為一丸互相資益以成遍熏十回向者亦復如是以戒定慧解脫解脫知見五分法身之香和合大慈大悲諸波羅蜜四攝四無量涅槃生死諸塵勞門共成一箇法界之真香皆從大願為首是故此位名為回向長者名青蓮華者表此位行不染垢淨涅槃也又長者明處俗流智長於世人名之為長者青蓮華者明色諸華之中此華色香第一以表五位行門此十回向法門第一何以然者為此十回向法門以大願力會融悲智生死涅槃成一法界之真自在法故能資前位佛果使具普賢行門圓滿故亦成後位十地十一地行門使慣習自在故明前後十住十行十地十一地總是此十回向位中理智大類大智大悲所圓融故以此十回向位通前徹後總通收故故表青蓮華衆華之中色香最為殊勝出過餘華也又以表兜率天宮於諸三界此天殊勝何以故為世間三世諸佛皆在此天長菩提心滿化世間故向上化樂天他化天樂放逸故又向上色界無色界是樂靜心多故已下夜摩忉利是著樂之處天非知足故四天王天四面而居非正位故是故此天處欲界之天上下處中故又此天而修三福德人之共生處故何者為三一修施二持戒三修定自餘諸天不修三福令均平故皆偏多也修戒施二福是故餘天或多放逸或多樂靜是故上生經云樂欲長菩提心者來生此天是故此天説此十回向門於此表法勝故又向下忉利夜摩向上化樂他化此天於此五天處中故故説十回向和會智悲均平令處中故故於此天説十回向故故將此處表所説法門又將鬻香長者號青蓮華所表法位以此義之可解是故名十回向以表十波羅蜜行參和一多同別之門故為十種回向以表無盡故以大願風吹智慈雲令普雨故二釋品來意者大意如前所述可知三隨文釋義者義分為二第一長科經意第二隨文釋義一長科經意者從爾時已下至第三十三卷末總作十五段長科經爾時金剛幢菩薩承佛神力入菩薩智光三昧入是三昧已十方各過十萬佛剎微塵數世界外有十萬佛剎微塵數諸佛皆同一號號金剛幢而現其前咸稱讚言善哉善哉善男子乃能入此菩薩智光三昧善男子此是十方各十萬佛剎微塵數諸佛神力共加於汝亦是毗盧遮那如來往昔願力威神之力及由汝智慧清淨故諸菩薩善根增勝故令汝入是三昧而演説法為令諸菩薩得清淨無畏故具無礙辨才故入無礙智地故住一切智大心故成就無盡善根故滿足無礙白法故入於普門法界故現一切佛神力故前際念智不斷故得一切佛護持諸根故以無量門廣説衆法故聞悉解了受持不忘故攝諸菩薩一切善根故成辦出世助道故不斷一切智智故開發大願故解釋實義故了知法界故令諸菩薩皆悉三喜故修一切佛平等善根故護持一切如來種性故所謂演説諸菩薩十回向佛子汝當承佛威神之力而演此法得佛護念故安住佛家故增益出世功德故得陀羅尼光明故入無障礙佛法故大光明普照法界故集無過失淨法故住廣大智境界故得無障礙法光故爾時諸佛即與金剛幢菩薩無量智慧與無留礙辨與分別句義善方便與無礙法光明與如來平等身與無量差別淨音聲與菩薩不思議善觀察三昧與不可沮壞一切善根回向智與觀察一切法成就巧方便與一切處説一切法無斷辨何以故入此三昧善根力故爾時諸佛各以右手摩金剛幢菩薩頂金剛幢菩薩得摩頂已即從定起告諸菩薩言佛子菩薩摩訶薩有不可思議大願充滿法界普能救護一切衆生所謂修學去來現在一切佛回向論第一從品初爾時已下至去來現在一切佛回向有三十三行經是十方諸佛加金剛幢菩薩令説十回向分於此分中復分為四段一爾時金剛幢菩薩已下至演説諸菩薩十回向有十八行半經明金剛幢菩薩入定諸佛與同號加持分二佛子汝當承佛威神之力已下至無障礙法光故有四行半經明諸佛勸説十回向法門分三爾時已下至善根力故六行經明諸佛與金剛幢十種法力加持分四爾時已下至去來現在一切佛回向有四行經明諸佛以手摩頂令金剛幢菩薩出定説法分第二隨文釋義者約立十門一釋入三昧因緣二釋三昧之名三明諸來佛剎遠近四明諸佛之數五明諸佛同號所緣六明佛來現前稱三七明諸佛共加入定八明諸佛摩頂因緣九明出定告衆歎法十明正説十種回向第一明入三昧之因緣者為欲令後學菩薩知軌則故為知三昧方便現智令明淨故為知三昧之力能令説法智慧簡擇自在分明故三世諸佛法則合如是故故須入定二釋三昧之名者何故名為智光三昧為以成就大悲之門非大智而不顯如十住中顯佛智慧與自心同合即以方便三昧無作無思如淨水澄明日月萬象自然現徹如十行之內三昧即名號善思惟則明於理隨事法差別名善思惟如此十回向所入三昧名智光者則以智行悲明處俗無染以此智光照俗無俗不真是以鬻香長者青蓮華表之用明處俗無染十住十行比丘以為標首以明出俗之功一依善財知識表之是故此位圓悲智之自在故故三昧名為智光三昧三明諸來佛剎遠近者明隨位勝進智慧增廣十行云萬佛剎塵此位云十萬佛剎微塵表勝進過前四明諸佛之數者經云十方各十萬佛剎微塵數明進修智業廣大與十方如來智體功用合故五諸佛同號所緣者何故十方諸佛與入定菩薩同號為金剛幢而現其前者有二義一如前所釋進修智會二以佛名號及如來身而現入定菩薩前明處位不惑斷自他之疑故成法印故又智既合同身亦無二故六明諸佛來現稱讚金剛幢明以言加令入定者印法不惑亦令當學之徒斷除疑惑故又身智既同説法亦等故七明諸佛共加入定者所云共加者有二義一自智所會合佛德故二諸佛隨智與力二緣會故名之為加又為自雖不疑斷他惑故諸佛與加成法則故又説佛加持有六一同名號加與同名故二現身加而現其前故三言讚加以言讚歎故四毗盧遮那往昔願力加五與十種法加如文自具六以十方諸佛手摩其頂加八明諸佛手摩其頂因緣何故手摩其頂明右手者作用之便明諸佛以右手引接令出定説法又自作用與諸佛作用相及故又諸佛許可到法際故以當位有自位際法也九明出定告衆歎法者經文自具十明正説十種回向如經下文此釋初段三十三行經竟音切翳於計切昏呼昆切倦渠卷切庠似羊切沃烏哭切鬻羊六切
