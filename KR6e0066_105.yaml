body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之十八經爾時善財童子見聞如上所現一切諸希有事念念觀察思惟解了深入安住承佛威力及解脫力則得菩薩不思議大勢力普喜幢自在力解脫何以故與喜目夜神於往昔時同修行故如來神力所加持故不思議善根所祐助故得菩薩諸根故生如來種中故得善友力所攝受故受諸如來所護念故毗盧遮那如來曾所化故彼分善根已成熟故堪修普賢菩薩行故爾時善財童子得此解脫已心生歡喜合掌向喜目觀察衆生夜神以偈讚曰無量無數劫學佛甚深法隨其所應化顯現妙色身了知諸衆生沈迷嬰妄想種種身皆現隨應悉調伏法身恆寂靜清淨無二相為化衆生故示現種種形於諸蘊界處未曾有所著示行及色身調伏一切衆不著內外法已渡生死海而現種種身住於諸有界遠離諸分別戲論所不動為著妄想者弘宣十力法一心住三昧無量劫不動毛孔出化雲供養十方佛得佛方便力念念無邊際示現種種身普攝諸羣生了知諸有海種種業莊嚴為説無礙法令其悉清淨色身妙無比清淨如普賢隨諸衆生心示現世間相爾時善財童子説此頌已白言天神汝發阿耨多羅三藐三菩提心為幾時耶得此解脫其已久如爾時喜目觀察衆生主夜神以頌答曰我念過去世過於剎塵劫剎號摩尼光劫名寂靜音百萬那由他俱胝四天下其王數亦爾各各自臨馭中有一王都號曰香幢寶莊嚴最殊妙見者皆欣悅中有轉輪王其身甚微妙三十二種相隨好以莊嚴蓮華中化生金色光明身騰空照遠近普及閻浮界其王有千子勇猛身端正臣佐滿一億智慧善方便嬪御有十億顏容狀天女利益調柔意慈心給侍王其王以法化普及四天下輪圍大地中一切皆豐盛我時為寶女具足梵音聲身出金色光照及千由旬日光既已沒音樂咸寂然大王及侍御一切皆安寢彼時德海佛出興於世間現顯神通力充滿十方界放大光明海一切剎塵數種種自在身遍滿於十方地震出妙音普告佛興世天人龍神衆一切皆歡喜一一毛孔中出佛化身海十方皆遍滿隨應説妙法我時於夢中見佛諸神變亦聞深妙法心生大歡喜一萬主夜神共在空中住讚歎佛興世同時覺悟我賢慧汝應起佛已現汝國劫海難值遇見者得清淨我時便寐寤即覩清淨光觀此從何來見佛樹王下諸相莊嚴體猶如寶山王一切毛孔中放大光明海見已心歡喜便生此念言願我得如佛廣大神通力我時尋覺悟大王并眷屬令見佛光明一切皆欣慶我時與大王騎從千萬億衆生亦無量俱行詣佛所我於二萬歲供養彼如來七寶四天下一切皆奉施時彼如來説功德普雲經普應羣生心莊嚴諸願海夜神覺悟我令我得利益我願作是身覺諸放逸者我從此初發最上菩提願往來諸有中其心無忘失從此後供養十億那由佛恆受人天樂饒益諸羣生初佛功德海第二功德燈第三妙寶幢第四虗空智第五蓮華藏第六無礙慧第七法月王第八智燈輪第九兩足尊寶𦦨山燈王第十調御師三世華光音如是等諸佛我悉曾供養然未得慧眼入於解脫海從此次第有一切寶光剎其劫名天勝五百佛興世最初月光輪第二名日燈第三名光幢第四寶須彌第五名華𦦨第六號燈海第七熾然佛第八天藏佛九光明王幢十普智光王如是等諸佛我悉曾供養尚於諸法中無而計為有從此復有劫名曰梵光明世界蓮華燈莊嚴極殊妙彼有無量佛一一無量衆我悉曾供養尊重聽聞法初寶須彌佛二功德海佛三法界音佛四法震雷佛五名法幢佛六名地光佛七名法力光八名虗空覺第九須彌光第十功德雲如是等如來我悉曾供養未能明了法而入諸佛海次後復有劫名為功德月爾時有世界其名功德幢彼中有諸佛八十那由他我皆以妙供深心而敬奉初乾闥婆王二名大樹王三功德須彌第四寶眼佛第五盧舍那第六光莊嚴第七法海佛第八光勝佛九名賢勝佛第十法王佛如是等諸佛我悉曾供養然未得深智入於諸佛海此後復有劫名為寂靜慧剎號金剛寶莊嚴悉殊妙於中有千佛次第而出興衆生少煩惱衆會悉清淨初金剛佛二無礙力佛三名法界影四號十力燈第五名悲光第六名戒海第七忍燈輪第八法輪光九名光莊嚴十名寂靜光如是等諸佛我悉曾供養猶未能深悟如空清淨法遊行一切剎於彼修諸行次第復有劫名為善出現剎號香燈雲淨穢所共成億佛於中現莊嚴剎及劫所説種種法我皆能憶持初名廣稱佛次名法海佛三名自在王四名功德雲第五法勝佛第六天冠佛第七智𦦨佛第八虗空立第九兩足尊名普生殊勝第十無上士眉間勝光明如是一切佛我悉曾供養然猶未能淨離諸障礙道次第復有劫名集堅固王剎號寶幢王一切善分布有五百諸佛於中而出現我恭敬供養求無礙解脫最初功德輪其次寂靜音次名功德海次名日光王第五功德王第六須彌相次名法自在次佛功德王第九福須彌第十光明王如是等諸佛我悉曾供養所有清淨道普入淨無餘然於所入門未能成就忍次第復有劫名為妙勝主剎號寂靜音衆生煩惱薄於中有佛現八十那由他我悉曾供養修行最勝道初佛名華聚次佛名海藏次名功德生次號天王髻第五摩尼藏第六真金山第七寶聚尊第八法幢佛第九名勝財第十名智慧此十為上首供養無不盡次第復有劫名曰千功德爾時有世界號善化幢燈六十億那由諸佛興於世最初寂靜幢其次奢摩他第三百燈王第四寂靜光第五雲密陰第六日大明七號法燈光八名殊勝𦦨九名天勝藏十名大吼音如是等諸佛我悉常供養未得清淨忍深入諸法海次第復有劫名無著莊嚴爾時有世界名曰無邊光中有三十六那由他佛現初功德須彌第二虗空心第三具莊嚴第四法雷音第五法界聲第六妙音雲第七照十方第八法海音第九功德海第十功德幢如是等諸佛我悉曾供養次有佛出現名為功德幢我為月面天供養人中主時佛為我説無依妙法門我聞專念持出生諸願海我得清淨眼寂滅定總持能於念念中悉見諸佛海我得大悲藏普明方便眼增長菩提心成就如來力見衆生顛倒執常樂我淨愚癡暗所覆妄想起煩惱行止見稠林往來貪欲海集於諸惡趣無量種種業一切諸趣中隨業而受身生老死衆患無量苦逼迫為彼衆生故我發無上心願得如十方一切十力尊緣佛及衆生起於大願雲從是修功德趣入方便道願雲悉彌覆普入一切道具足波羅蜜充滿於法界速入於諸地三世方便海一念修諸佛一切無礙行佛子我爾時得入普賢道了知十法界一切差別門善男子於汝意云何彼時轉輪聖王名十方主能紹隆佛種者豈異人乎文殊師利童子是也爾時夜神覺悟我者普賢菩薩之所化耳我於爾時為王寶女蒙彼夜神覺悟於我令我見佛發阿耨多羅三藐三菩提心自從是來經佛剎微塵數劫不墮惡趣常生人天於一切處常見諸佛乃至於妙燈功德幢佛所得此大勢力普喜幢菩薩解脫以此解脫如是利益一切衆生善男子我唯得此大勢力普喜幢解脫門如諸菩薩摩訶薩於念念中普詣一切諸如來所疾能趣入一切智海於念念中以發趣門入於一切諸大願海於念念中以願海門盡未來劫念念出生一切諸行一一行中出生一切剎微塵數身一一身普入一切法界門一一法界門一切佛剎中隨衆生心説諸妙行一切剎一一塵中悉見無邊諸如來海一一如來所悉見遍法界諸佛神通一一如來所悉見往劫修菩薩行一一如來所受持守護所有法輪一一如來所悉見三世一切如來諸神變海而我云何能知能説彼功德行善男子此衆會中有一夜神名普救衆生妙德汝詣彼問菩薩云何入菩薩行淨菩薩道時善財童子頂禮其足繞無數匝殷勤瞻仰辭退而去論第一正入當位法門中從爾時善財童子已下至我唯知此普喜幢解脫門於此殿約分五門一念善知識教思惟升進二善財意欲詣喜目觀察衆生夜神所三夜神神力加持善財令知親近善知識多所饒益四善財蒙加持已速發此念自知由親近善知識能勇猛勤修一切智道五善財詣喜目夜神所觀察夜神攝化衆生饒益境界從此所見夜神在於如來衆會道場坐蓮華藏師子之座已下長科為十二段一爾時善財童子發是念已至皆令歡喜而得利益有五行半經明初觀察喜目夜天攝化境界分二所謂出無量化身雲充滿十方一切世界已下至如是宣説一切菩薩種種行法而為利益於中有八十三行經明以十波羅蜜攝化衆生分三復於一一諸毛孔中出無量種種衆生身雲已下至主方神等相似身雲周遍十方充滿法界有十七行半經明喜目夜神毛孔化身十方同類攝衆生分四於彼一切衆生之前現種種聲已下至從初發心所集功德有八行經明喜目神出現遍滿十方音聲説喜目神初發心來所有功德親近諸佛及所行波羅蜜海分五所謂承事一切諸善知識已下至令無量衆生住如來地有四十六行半經明前所現音聲所説喜目神所修行及供養諸佛教化衆生境界分六爾時善財童子見聞如上所現一切諸希有事已下至堪修普賢菩薩行故有八行半經明善財童子見如上教化境界得入此喜目夜神所行法名不思議大勢力普喜幢自在力解脫法門分七爾時善財童子已下一行半經明善財説頌歎喜目神功德分八頌中有十行頌明正申頌意歎夜神道德分九爾時善財童子已下三行經明善財問夜神得解脫久近分十我念過去世已下至其心不忘失有二十六行頌明夜神答善財住劫久近分十一從此後供養十億那由他佛已下至了知十法界一切無差別有六十五行頌答善財住劫供養諸佛久近多少之數於此供養分中有十一段一段有十佛名號十一段佛名號皆配十一地中隨位升進一地配十佛名號十地配百佛名號十一地配一佛名號明後一攝前多故明一地具十地行故以十波羅蜜互參成故第一初明從此供養十那由他佛者配初歡喜地明初總攝末故初含多故願廣大故初地明勝願發心初即多故是總相義此初地是第三地中初地故乃至十地是第三地中十地故初佛功德海者是第三地中初地檀波羅蜜門為主餘九為伴以此位是第三地中前後地內十波羅蜜總在此位中餘位亦倣此相收如帝網相入一入多故此明忍體總收因果遍也五位中位位皆然第二一切寶光剎其劫名天勝者第二離垢地戒波羅蜜為戒體故天者表淨戒自在也此戒淨自在勝於煩惱名為天勝故五百佛興世者以戒波羅蜜為主五位中五百箇波羅蜜總以戒淨體收名為五百佛興世若於自心境自體無垢外若別見他佛是人未離魔業初佛號月光輪者表戒光圓滿餘九佛號是戒中主伴波羅蜜因果名號如下如是等諸佛我悉曾供養尚於諸法中無而計為有者為智波羅蜜未圓明升進未熟戒取猶在表以升進生熟論之至於十地智波羅蜜圓明有五百重升進習氣生熟不同此明總相中別同中之異以一發菩提心已受無量安樂所修生熟十地猶存十一地方盡二愚至佛位為對習氣安立諸地諸位治之計其智理十地差別如空中鳥迹然其約習氣同別行相非無第三從此復有劫名曰梵光明者是第三發光地名以發光地位修八禪都治三界習障欲界樂欲障上二界樂禪障現第一義天光淨無障號劫名梵光明梵名淨也治三界染淨習氣一分淨故名為淨光明世界名蓮華燈此是當位行無染名也莊嚴極殊妙以忍波羅蜜為莊嚴故名極殊妙以忍為行首彼有無量佛者以明忍體總收諸行故云彼有無量佛我悉供養者以忍辱供敬為供養一切佛故初寶須彌佛者以第三地忍辱謙敬為行中高勝故如須彌山高勝也此佛為主餘佛為此忍中之伴已下一一隨十地十一地十波羅蜜萬行主伴配之一切諸佛皆依此五位行中理智悲願得佛果故離此法別見佛者無有是處以智所行及處説名劫量大智之境都無有時日歲月也皆須約自實佛實智實法而論不可隨自他虗妄見若也智滿行周一切總佛已下第四地配精進波羅蜜以八十那由他佛者表八正覺道為精進行體故餘八邢之行非佛故那由他者萬行總數次第五地禪波羅蜜中劫名寂靜音剎號金剛寶表法性身為禪體明語默皆寂靜也金剛總明禪體無壞性於中有千佛次第而出興者表禪體攝用歸本以十地中一地有百波羅蜜為主伴此禪位中收十地位為千次第也第六地般若為主有劫名善出現者表智慧善能出現諸法剎號香燈雲表智慧為香破暗為燈説法普覆為雲億佛於中現者以般若從用以億數舉之前位千此位億也第七地中有五百佛於中而出興者表方便波羅蜜通收五位門中出世智慧總入俗同事成大悲行故舉五百佛為行數劫名集堅固王者處纏不污方名堅固王者自在義八地有八十那由他佛者表無功用之大用已終八正之行總備九地六十億那由他佛者一那由他當此溝是此第二十數表法師之位法雲普雨六道化周亦表第一般若總通十地位雨法雨滿故十地中有三十六那由他佛者表智圓三世六位齊明因果徹故以智增明三世六位無始終一圓智故十一地有一佛者表收三世六位為一法界無礙大用故此收別同本依根本智故成普賢門佛果圓故一多徹故一如經細看文義皆自有此意非是人情強安立也第十二段中善男子已下至我唯知此大勢力普喜幢解脫門有九行半經明都結已上發心始末因果劫量分於此段中彼轉輪聖王名十方主能紹隆佛種者豈異人乎文殊師利是爾時夜天神覺悟我者普賢菩薩之所化也其王寶女蒙彼夜神所化者即此喜目夜神是表法是依根本智法身之理起差別智行大慈悲不限時劫以佛剎微塵數以況之經如是等劫量修行得此大勢力普喜幢解脫者明第三地修三界別別對治四禪八定得自在故處世行慈悲行忍行一分終故始於一切善惡衆生常歡喜不厭故以此修行劫數答前善財所問發心久近故明忍性遍周一時總答又明智無前後故經云禪波羅蜜所有資具者明施戒忍精進四念觀三十七道品等是禪家資具亦以五停心觀十八事物空間寂靜是禪家資具亦以師第法智之正教是禪家資具亦以十波羅蜜與四攝四無量為助顯法界體用自在是禪家資具此是第三發光地善知識以忍波羅蜜為主餘九為伴治三界中住禪染淨二障令行大慈悲使無礙故如是染淨二習一分微薄始於善惡衆生一分不生厭捨得大勢力普喜幢解脫門前五位十地中言説所陳恐不能了至此位中善財以求善知識以名目處所男女長者比丘比丘尼優婆塞優婆夷菩薩夜神等名行相狀託法及事以表之使令易解第二推德升進門中從如諸菩薩摩訶薩已下至辭退而去有十四行經約分為五門一推德升進二示善知識所在三舉善知識名號夜神名普救護衆生妙德四勸善財令往詣五禮敬辭去隨文釋義者在此會中有夜神者明菩提及智悲圓滿名在此會中夜神如前所釋此是十地中第四𦦨慧地生諸佛家位住菩提位長大慈悲門以第二地夜神名普德淨光在菩提場內明與菩提心相會為初地是勝願發心二地方會真體得中道故自此已後直至十地長養大慈悲心方終十一地純是普賢之處世妙行前三地治三界業一終名為發光地此地生如來家淨慧現前名𦦨慧地自餘如文自具第四衆會中普救衆生妙德夜神主𦦨慧地經爾時善財童子於喜目觀察衆生夜神所聞普喜幢解脫門信解趣入了知隨順思惟修習念善知識所有教誨心無暫捨諸根不散一心願得見善知識普於十方勤求匪懈願常親近生諸功德與善知識同一善根得善知識巧方便行依善知識入精進海於無量劫常不遠離作是願已往詣普救衆生妙德夜神所時彼夜神為善財童子示現菩薩調伏衆生解脫神力以諸相好莊嚴其身於兩眉間放大光明名智燈普照清淨幢無量光明以為眷屬其光普照一切世間照世間已入善財頂充滿其身善財爾時即得究竟清淨輪三昧得此三昧已悉見二神兩處中間所有一切地塵水塵及以火塵金剛摩尼衆寶微塵華香纓絡諸莊嚴具如是一切所有微塵一一塵中各見佛剎微塵數世界成壞及見一切地水火風諸大積聚亦見一切世界接連皆以地輪任持而住種種山海種種河池種種樹林種種宮殿所謂天宮殿龍宮殿夜叉宮殿乃至摩睺羅伽人非人等宮殿屋宅地獄畜生閻羅王界一切住處諸趣輪轉生死往來隨業受報各各差別靡不悉見又見一切世界差別所謂或有世界雜穢或有世界清淨或有世界趣雜穢或有世界趣清淨或有世界雜穢清淨或有世界清淨雜穢或有世界一向清淨或有世界其形平正或有覆住或有側住如是等一切世界一切趣中悉見此普救衆生夜神於一切時一切處隨諸衆生形貌言辭行解差別以方便力普現其前隨宜化度令地獄衆生免諸苦毒令畜生衆生不相食噉令餓鬼衆生無有飢渴令諸龍等離一切怖令欲界衆生離欲界苦令人趣衆生離暗夜怖毀呰怖惡名怖大衆怖不活怖死怖惡道怖斷善根怖退菩提心怖遇惡知識怖離善知識怖墮二乘地怖種種生死怖異類衆生同住怖惡時受生怖惡種族中受生怖造惡業怖業煩惱障怖執著諸想繫縛怖如是等怖悉令捨離又見一切衆生卵生胎生濕生化生有色無色有想無想非有想非無想普現其前常勤救護為成就菩薩大願力故深入菩薩三昧力故堅固菩薩神通力故出生普賢行願力故增廣菩薩大悲海故得普覆衆生無礙大慈故得普與衆生無量喜樂故得普攝一切衆生智慧方便故得菩薩廣大解脫自在神通故嚴淨一切佛剎故覺了一切諸法故供養一切諸佛故受持一切佛教故積集一切善根修一切妙行故入一切衆生心海而無障礙故知一切衆生諸根教化成熟故淨一切衆生信解除其惡障故破一切衆生無知黑暗故令得一切智清淨光明故時善財童子見此夜神如是神力不可思議甚深境界普現調伏一切衆生菩薩解脫已歡喜無量頭面作禮一心瞻仰時彼夜神即捨菩薩莊嚴之相還復本形而不捨其自在神力爾時善財童子恭敬合掌却住一面以偈讚曰我善財得見如是大神力其心生歡喜説偈而讚歎我見尊妙身衆相以莊嚴譬如空中星一切悉嚴淨所放殊勝光無量剎塵數種種微妙色普照於十方一一毛孔放衆生心數光一一光明端皆出寶蓮華華中出化身能滅衆生苦光中出妙香普熏於衆生復雨種種華供養一切佛兩眉放妙光量與須彌等普觸諸含識令滅愚癡暗口放清淨光譬如無量日普照於廣大毗盧舍那境眼放清淨光譬如無量月普照十方剎悉滅世癡翳現化種種身相狀等衆生充滿十方界度脫三有海妙身遍十方普現衆生前滅除水火賊王等一切怖我承喜目教今得詣尊所見尊眉間相放大清淨光普照十方海悉滅一切暗顯現神通力而來入我身我遇圓滿光心生大歡喜得總持三昧普現十方佛我於所經處悉見諸微塵一一微塵中各見塵數剎或有無量剎一切咸濁穢衆生受諸苦常悲歎號泣或有染淨剎少樂多憂苦示現三乘像往彼而救度或有染淨剎衆生所樂見菩薩常充滿住持諸佛法一一微塵中無量淨剎海毗盧遮那佛往劫所嚴淨佛於一切剎悉坐菩提樹成道轉法輪度脫諸羣生我見普救天於彼無量剎一切諸佛所普皆往供養爾時善財童子説此頌已白普救衆生妙德夜神言天神今此解脫甚深希有其名何等得此解脫其已久如修何等行而得清淨夜神言善男子是處難知諸天及人一切二乘所不能測何以故此是住普賢菩薩行者境界故住大悲藏者境界故救護一切衆生者境界故能淨一切三惡八難者境界故能於一切佛剎中紹隆佛種不斷者境界故能住持一切佛法者境界故能於一切劫修菩薩行成滿大願海者境界故能於一切法界海以清淨智光滅無明暗障者境界故能以一念智慧光明普照一切三世方便海者境界故我承佛力今為汝説善男子乃往古世過佛剎微塵數劫爾時有劫名圓滿清淨世界名毗盧遮那大威德有須彌山微塵數如來於中出現其佛世界以一切香王摩尼寶為體衆寶莊嚴住無垢光明摩尼王海上其形正圓淨穢合成一切嚴具帳雲而覆其上一切莊嚴摩尼輪山千匝圍繞有十萬億那由他四天下皆妙莊嚴或有四天下惡業衆生於中止住或有四天下雜業衆生於中止住或有四天下善根衆生於中止住或有四天下一向清淨諸大菩薩之所止住此界東際輪圍山側有四天下名寶燈華幢國界清淨飲食豐足不藉耕耘而生稻梁宮殿樓閣悉皆奇妙諸如意樹處處行列種種香樹恆出香雲種種鬘樹恆出鬘雲種種華樹常雨妙華種種寶樹出諸奇寶無量色光周匝照耀諸音樂樹出諸音樂隨風吹動演妙音聲日月光明摩尼寶王普照一切晝夜受樂無時間斷此四天下有百萬億那由他諸王國土一一國土有千大河周匝圍繞一一皆以妙華覆上隨流漂動出天樂音一切寶樹列植其岸種種珍奇以為嚴飾舟船來往稱情戲樂一一河間有百萬億城一一城有百萬億那由他聚落如是一切城邑聚落各有無量百千億那由他宮殿園林周匝圍繞此四天下閻浮提內有一國土名寶華燈安隱豐樂人民熾盛其中衆生具行十善有轉輪王於中出現名毗盧遮那妙寶蓮華髻於蓮華中忽然化生三十二相以為嚴好七寶具足王四天下恆以正法教導羣生王有千子端正勇健能伏怨敵百萬億那由他宮人婇女皆悉與王同種善根同修言行同時誕生端正姝妙猶如天女身真金色常放光明諸毛孔中恆出妙香良臣猛將具足十億王有正妃名圓滿面是王女寶端正殊特皮膚金色目髮紺青言同梵音身有天香常放光明照千由旬其有一女名普智𦦨妙德眼形體端嚴色相殊美衆生見者情無厭足爾時衆生壽命無量或有不定而中夭者種種形色種種音聲種種名字種種族姓愚智勇怯貧富苦樂無量品類皆悉不同時或有人語餘人言我身端正汝形鄙陋作是語已遞相毀辱集不善業以是業故壽命色力一切樂事悉皆損減時彼城北有菩提樹名普光法雲音幢以念念出現一切如來道場莊嚴堅固摩尼王而為其根一切摩尼以為其幹衆雜妙寶以為其葉次第分布並相稱可四方上下圓滿莊嚴放寶光明出妙音聲説一切如來甚深境界於彼樹前有一香池名寶華光明演法雷音妙寶為岸百萬億那由他寶樹圍繞一一樹形如菩提樹衆寶纓絡周匝垂下無量樓閣皆寶所成周遍道場以為嚴飾彼香池內出大蓮華名普現三世一切如來莊嚴境界雲須彌山微塵數佛於中出現其第一佛名普智寶𦦨妙德幢於此華上最初得阿耨多羅三藐三菩提無量千歲演説正法成熟衆生其彼如來未成佛時十千年前此大蓮華放淨光明名現諸神通成熟衆生若有衆生遇斯光者心自開悟無所不了知十千年後佛當出現九千年前放淨光明名一切衆生離垢燈若有衆生遇斯光者得清淨眼見一切色知九千年後佛當出現八千年前放大光明名一切衆生業果音若有衆生遇斯光者悉得自知諸業果報知八千年後佛當出現七千年前放大光明名生一切善根音若有衆生遇斯光者一切諸根悉得圓滿知七千年後佛當出現六千年前放大光明名佛不可思議境界音若有衆生遇斯光者其心廣大普得自在知六千年後佛當出現五千年前放大光明名嚴淨一切佛剎音若有衆生遇斯光者悉見一切清淨佛土知五千年後佛當出現四千年前放大光明名一切如來境界無差別燈若有衆生遇斯光者悉能往覲一切諸佛知四千年後佛當出現三千年前放大光明名三世明燈若有衆生遇斯光者悉能現見一切如來諸本事海知三千年後佛當出現二千年前放大光明名如來離翳智慧燈若有衆生遇斯光者則得普眼見一切如來神變一切諸佛國土一切世界衆生知二千年後佛當出現一千年前放大光明名令一切衆生見佛集諸善根若有衆生遇斯光者則得成就見佛三昧知一千年後佛當出現次七日前放大光明名一切衆生歡喜音若有衆生遇斯光者得普見諸佛生大歡喜知七日後佛當出現滿七日已一切世界悉皆震動純淨無染念念普見十方一切清淨佛剎亦現彼剎種種莊嚴若有衆生根性淳熟應見佛者咸詣道場音切騎其寄切姝昌朱切𭔏古孝切號乎刀切幹古案切
