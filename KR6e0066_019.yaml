body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論如來現相品第二之餘經爾時世尊欲令一切菩薩大眾得於如來無邊境界神通力故放眉間光此光名一切菩薩智光明普照耀十方藏其狀猶如寶色燈雲徧照十方一切佛剎其中國土及以眾生悉令顯現又普震動諸世界網一一塵中現無數佛隨諸眾生性欲不同普雨三世一切諸佛妙法輪雲顯示如來波羅蜜海又雨無量諸出離雲令諸眾生永度生死復雨諸佛大願之雲顯示十方諸世界中普賢菩薩道場眾會作是事已右遶於佛從足下入爾時佛前有大蓮華忽然出現其華具有十種莊嚴一切蓮華所不能及所謂眾寶間錯以為其莖摩尼寶王以為其藏法界眾寶普作其葉諸香摩尼而作其䰅閻浮檀金莊嚴其臺妙網覆上光色清淨於一念中示現無邊諸佛神變普能發起一切音聲摩尼寶王影現佛身於音聲中普能演說一切菩薩所修行願此華生已一念之間於如來白毫相中有菩薩摩訶薩名一切法勝音與世界海微塵數諸菩薩眾俱時而出右遶如來經無量帀禮佛足已時勝音菩薩坐蓮華臺諸菩薩眾坐蓮華䰅各於其上次第而坐其一切法勝音菩薩了深法界生大歡喜入佛所行智無疑滯入不可測佛法身海往一切剎諸如來所身諸毛孔悉現神通念念普觀一切法界十方諸佛共與其力令普安住一切三昧盡未來劫常見諸佛無邊法界功德海身乃至一切三昧解脫神通變化即於眾中承佛威神觀察十方而說頌曰佛身充滿於法界普現一切眾生前隨緣赴感靡不周而恒處此菩提座如來一一毛孔中一切剎塵諸佛坐菩薩眾會共圍遶演說普賢之勝行如來安處菩提座一毛示現多剎海一一毛現悉亦然如是普周於法界一一剎中悉安坐一切剎土皆周徧十方菩薩如雲集莫不咸來詣道場一切剎土微塵數功德光明菩薩海普在如來眾會中乃至法界咸充徧法界微塵諸剎土一切眾中皆出現如是分身智境界普賢行中能建立一切諸佛眾會中勝智菩薩僉然坐各各聽法生歡喜處處修行無量劫已入普賢廣大願各各出生眾佛法毗盧遮那法海中修行克證如來地普賢菩薩所開覺一切如來同讚喜已獲諸佛大神通法界周流無不徧一切剎土微塵數常現身雲悉充滿普為眾生放大光各雨法雨稱其心爾時眾中復有菩薩摩訶薩名觀察一切勝法蓮華光慧王承佛威神觀察十方而說頌曰如來甚深智普入於法界能隨三世轉與世為明導諸佛同法身無依無差別隨諸眾生意令見佛色形具足一切智徧知一切法一切國土中一切無不現佛身及光明色相不思議眾生信樂者隨應悉令見於一佛身上化為無量佛雷音徧眾剎演法深如海一一毛孔中光網徧十方演佛妙音聲調彼難調者如來光明中常出深妙音讚佛功德海及菩薩所行佛轉正法輪無量無有邊所說法無等淺智不能測一切世界中現身成正覺各各起神變法界悉充滿如來一一身現佛等眾生一切微塵剎普現神通力爾時眾中復有菩薩摩訶薩名法喜慧光明承佛威神觀察十方而說頌曰佛身常顯現法界悉充滿恒演廣大音普震十方國如來普現身徧入於世間隨眾生樂欲顯示神通力佛隨眾生心普現於其前眾生所見者皆是佛神力光明無有邊說法亦無量佛子隨其智能入能觀察佛身無有生而能示出生法性如虗空諸佛於中住無住亦無去處處皆見佛光明靡不周名稱悉遠聞無體無住處亦無生可得無相亦無形所現皆如影佛隨眾生心為興大法雲種種方便門示悟而調伏一切世界中見佛坐道場大眾所圍遶照曜十方國一切諸佛身皆有無盡相示現雖無量色相終不盡爾時眾中復有菩薩摩訶薩名香𦦨光普明慧承佛威神觀察十方而說頌曰此會諸菩薩入佛難思地一一皆能見一切佛神力智身能徧入一切剎微塵見身在彼中普見於諸佛如影現眾剎一切如來所於彼一切中悉現神通事普賢諸行願修治已明潔能於一切剎普見佛神變身住一切處一切皆平等智能如是行入佛之境界已證如來智等照於法界普入佛毛孔一切諸剎海一切佛國土皆現神通力示現種種身及種種名號能於一念頃普現諸神變道場成正覺及轉妙法輪一切廣大剎億劫不思議菩薩三昧中一念皆能現一切諸佛土一一諸菩薩普入於佛身無邊亦無盡爾時眾中復有菩薩摩訶薩名師子奮迅慧光明承佛威神徧觀十方而說頌曰毗盧遮那佛能轉正法輪法界諸國土如雲悉周徧十方中所有諸大世界海佛神通願力處處轉法輪一切諸剎土廣大眾會中名號各不同隨應演妙法如來大威力普賢願所成一切國土中妙音無不至佛身等剎塵普雨於法雨無生無差別現一切世間無數諸億劫一切塵剎中往昔所行事妙音咸具演十方塵國土光網悉周徧光中悉有佛普化諸羣生佛身無差別充滿於法界能令見色身隨機善調伏三世一切剎所有眾導師種種名號殊為說皆令見過未及現在一切諸如來所轉妙法輪此會皆得聞爾時眾中復有菩薩摩訶薩名法海慧功德藏承佛威神觀察十方而說頌曰此會諸佛子善修眾智慧斯人已能入如是方便門一一國土中普演廣大音說佛所行處周聞十方剎一一心念中普觀一切法安住真如地了達諸法海一一佛身中億劫不思議修習波羅蜜及嚴淨國土一一微塵中能證一切法如是無所礙周行十方國一一佛剎中往詣悉無餘見佛神通力入佛所行處諸佛廣大音法界靡不聞菩薩能了知善入音聲海劫海演妙音其音等無別智周三世者入彼音聲地眾生所有音及佛自在聲獲得音聲智一切皆能了從地而得地住於力地中億劫勤修行所獲法如是爾時眾中復有菩薩摩訶薩名慧燈普明承佛威神觀察十方而說頌曰一切諸如來遠離於眾相若能知是法乃見世導師菩薩三昧中慧光普明了能知一切佛自在之體性見佛真實體則悟甚深法普觀於法界隨願而受身從於福海生安住於智地觀察一切法修行最勝道一切佛剎中一切如來所如是徧法界悉見真實體十方廣大剎億劫勤修行能遊正徧知一切諸法海唯一堅密身一切塵中見無生亦無相普現於諸國隨諸眾生心普現於其前種種示調伏速令向佛道以佛威神故出現諸菩薩佛力所加持普見諸如來一切眾導師無量威神力開悟諸菩薩法界悉周徧爾時眾中復有菩薩摩訶薩名華𦦨髻普明智承佛威神觀察十方而說頌曰一切國土中普演微妙音稱揚佛功德法界悉充滿佛以法為身清淨如虗空所現眾色形令入此法中若有深信喜及為佛攝受當知如是人能生了佛智諸有少智者不能知此法慧眼清淨人於此乃能見以佛威神力觀察一切法入住及出時所見皆明了一切諸法中法門無有邊成就一切智入於深法海安住佛國土出興一切處無去亦無來諸佛法如是一切眾生海佛身如影現隨其解差別如是見導師一切毛孔中各各現神通修行普賢願清淨者能見佛以一一身處處轉法輪法界悉周徧思議莫能及爾時眾中復有菩薩摩訶薩名威德慧無盡光承佛威神觀察十方而說頌曰一一佛剎中處處坐道場眾會共圍遶魔軍悉摧伏佛身放光明徧滿於十方隨應而示現色相非一種一一微塵內光明悉充滿普見十方土種種各差別十方諸剎海種種無量剎悉平坦清淨帝青寶所成或覆或傍住或似蓮華合或圓或四方種種眾形相法界諸剎土周行無所礙一切眾會中常轉妙法輪佛身不思議國土悉在中於其一切處導世演真法所轉妙法輪法性無差別依於一實理演說諸法相佛以圓滿音闡明真實理隨其解差別現無盡法門一切剎土中見佛坐道場佛身如影現生滅不可得爾時眾中復有菩薩摩訶薩名法界普明慧承佛威神觀察十方而說頌曰如來微妙身色相不思議見者生歡喜恭敬信樂法佛身一切相悉現無量佛普入十方界一一微塵中十方國土海無量無邊佛咸於念念中各各現神通大智諸菩薩深入於法海佛力所加持能知此方便若有已安住普賢諸行願見彼眾國土一切佛神力若人有信解及以諸大願具足深智慧通達一切法能於諸佛身一一而觀察色聲無所礙了達於諸境能於諸佛身安住智所行速入如來地普攝於法界佛剎微塵數如是諸國土能令一念中一一塵中現一切諸國土及以神通事悉現一剎中菩薩力如是爾時眾中復有菩薩摩訶薩名精進力無礙慧承佛威神觀察十方而說頌曰佛演一妙音周聞十方剎眾音悉具足法雨皆充徧一切言詞海一切隨類音一切佛剎中轉於淨法輪一切諸國土悉見佛神變聽佛說法音聞已趣菩提法界諸國土一一微塵中如來解脫力於彼普現身法身同虗空無礙無差別色形如影像種種眾相現影像無方所如空無體性智慧廣大人了達其平等佛身不可取無生無起作應物普現前平等如虗空十方所有佛盡入一毛孔各各現神通智眼能觀見毗盧遮那佛願力周法界一切國土中恒轉無上輪一毛現神變一切佛同說經於無量劫不得其邊際如此四天下道場中以佛神力十方各有一億世界海微塵數諸菩薩眾而來集會應知一切世界海一一四天下諸道場中悉亦如是論第四從爾時世尊欲令一切菩薩大眾得如來無邊境界已下一段長行有二十八行半經四百八十四言於中分為兩段一從初十行經明光之德二十八行半經明蓮華出現第一從初明光之德大意有十一令眾除疑獲益二顯光出處三顯光之名四顯光之色五明光所照遠近六明光所照威動世界七光照塵中現無數佛隨根與益八光雨十種法輪雲九光明遶佛十光入佛足輪以成大眾信心明足下是初信入故說十種智佛以為自己信心以不動智為首第二爾時佛前已下十八行半經明蓮華出現於此一段文中大意有十一明華現所由二明華具十種嚴飾三明毫光出眾來坐四明勝音菩薩為主餘者為伴五明上首菩薩勝音之德六明諸佛與勝音之力七明勝音常見諸佛八明勝音神變自在九明勝音觀眾說頌十明正申頌意此之一段經文如來眉間毫出光明名一切菩薩光明普照耀十方藏者明是十地菩薩智滿中道教行之光又毫相中出眾菩薩有世界海微塵數上首名曰一切法勝音即是其十地滿足中道果行將此中道覺行悲智圓滿法界行門毫塵剎海無障礙法答前大眾三十七問使令現在及以未來信此十地法界因果法門行滿十方使令得益是故經云欲令一切菩薩大眾得於如來無邊境界神通力故放眉間光又光體是法界之理勝音大眾之海是其法界之行用故明從十住初心以理智萬行體用不相離也故從十信即與果行令修理智體用法合然故從果行信進又勝音菩薩坐蓮華臺諸菩薩眾坐蓮華䰅明主伴萬行明勝音一行徧一切行一切萬行是勝音一行明法界理智中圓滿無礙自在行故還如前菩薩毛孔流光出菩薩行相似體性一多重重自在無體可礙諸波羅蜜一中具十乃至無盡故緣起互為因果主伴自在故以理智照之可見大意明法界行門一行徧一切行故同別自在十正申頌意中通勝音菩薩有十菩薩各申一段偈頌初二十行頌歎佛身充徧普現眾生前及毛孔剎土眾會無盡相入兩行一頌如文具明無煩更釋大體得大綱紀即得經文自具此十段頌後九段總十行一段總是答前世主所問又明此會菩薩能入如來之境最下有三行經五十一言明都結十方世界同然一時雲集已上現神通及語答前大眾所疑竟示業及法答者如已下世界成就品蓮華藏世界品毗盧遮那品神通法業俱示若通當類總自具法業答故普賢三昧品世界成就品華藏世界品毗盧遮那品此初會六品經是以佛果勸修門普賢三昧品第三論將釋此品略作三門分別一釋品之名二釋品來意三隨文釋義一釋品名者理智無邊名之為普智隨根益稱之曰賢三之云正昧之云定亦云正受為正定不亂能受諸法憶持簡擇故名正受亦云等持為正定能發生正慧等持諸法是故名之等持也為普賢為佛紹法界大智之家諸佛萬行徧周之長子以答前所問三十七問中云何一切菩薩行海出離海神通海波羅蜜海世界海等故須入定善簡眾法答前所問令眾迷解故故須入定然普賢菩薩恒無定亂以示法則故須如是又以初舉果勸修中以入定為法則後十定品中明十地道滿起諸想念方真二釋品來意者明普賢菩薩常在三昧靜亂總真然教化眾生故成法則答所問疑故為善簡擇諸三昧出入同異相故為善擇眾生業海果報佛行業海果報故須入定從定起已說世界成就品華藏世界品毗盧遮那品答前所問故此品須來意明初入法須加定業以顯真門後十定品中明十地真智已終智隨一切眾生想念應根接物方是修道者應如是知三隨文釋義者於此一品經文中義分為二一科其經意二釋三昧名一科其經意者經爾時普賢菩薩摩訶薩於如來前坐蓮華藏師子之座承佛神力入于三昧此三昧名一切諸佛毗盧遮那如來藏身普入一切佛平等性能於法界示眾影像廣大無礙同於虗空法界海漩靡不隨入出生一切諸三昧法普能包納十方法界三世諸佛智光明海皆從此生十方所有諸安立海悉能示現含藏一切佛力解脫諸菩薩智能令一切國土微塵普能容受無邊法界成就一切佛功德海顯示如來諸大願海一切諸佛所有法輪流通護持使無斷絕如此世界中普賢菩薩於世尊前入此三昧如是盡法界虗空界十方三世微細無礙廣大光明佛眼所見佛力能到佛身所現一切國土及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有世界海微塵數諸佛一一佛前有世界海微塵數普賢菩薩皆亦入此一切諸佛毗盧遮那如來藏身三昧爾時一一普賢菩薩皆有十方一切諸佛而現其前彼諸如來同聲讚言善哉善哉善男子汝能入此一切諸佛毗盧遮那如來藏身菩薩三昧佛子此是十方一切諸佛共加於汝以毗盧遮那如來本願力故亦以汝修一切諸佛行願力故所謂能轉一切佛法輪故開顯一切如來智慧海故普照十方諸安立海悉無餘故令一切眾生淨治襍染得清淨故普攝一切諸大國土無所著故深入一切諸佛境界無障礙故普示一切佛功德故能入一切諸法實相增智慧故觀察一切諸法門故了知一切眾生根故能持一切諸佛如來教文海故爾時十方一切諸佛即與普賢菩薩摩訶薩能入一切智性力智與入法界無邊量智與成就一切佛境界智與知一切世界海成壞智與知一切眾生界廣大智與住諸佛甚深解脫無差別諸三昧智與入一切菩薩諸根海智與知一切眾生語言海轉法輪辭辨智與普入法界一切世界海身智與得一切佛音聲智如此世界中如來前普賢菩薩蒙諸佛與如是智如是一切世界海及彼世界海一一塵中所有普賢悉亦如是何以故證彼三昧法如是故是時十方諸佛各舒右手摩普賢菩薩頂其手皆以相好莊嚴妙網光舒香流𦦨發復出諸佛種種妙音及以自在神通之事過現未來一切菩薩普賢願海一切如來清淨法輪及三世佛所有影像皆於中現如此世界中普賢菩薩為十方佛所共摩頂如是一切世界海及彼世界海一一塵中所有普賢悉亦如是為十方佛之所摩頂爾時普賢菩薩即從是三昧而起從此三昧起時即從一切世界海微塵數三昧海門起所謂從知三世念念無差別善巧智三昧門起從知三世一切法界所有微塵三昧門起從現三世一切佛剎三昧門起從現一切眾生舍宅三昧門起從知一切眾生心海三昧門起從知一切眾生各別名字三昧門起從知十方法界處所各差別三昧門起從知一切微塵中各有無邊廣大佛身雲三昧門起從演說一切法理趣海三昧門起普賢菩薩從如是等三昧門起時其諸菩薩一一各得世界海微塵數三昧海雲世界海微塵數陀羅尼海雲世界海微塵數諸法方便海雲世界海微塵數辯才門海雲世界海微塵數修行海雲世界海微塵數普照法界一切如來功德藏智光明海雲世界海微塵數一切如來諸力智慧無差別方便海雲世界海微塵數一切如來一一毛孔中各現眾剎海雲世界海微塵數一一菩薩示現從兜率天宮沒下生成佛轉正法輪般涅槃等海雲如此世界中普賢菩薩從三昧起諸菩薩眾獲如是益如是一切世界海及彼世界海所有微塵一一塵中悉亦如是爾時十方一切世界海以諸佛威神力及普賢菩薩三昧力故悉皆微動一一世界眾寶莊嚴及出妙音演說諸法復於一切如來眾會道場海中普雨十種大摩尼王雲何等為十所謂妙金星幢摩尼王雲光明照耀摩尼王雲寶輪垂下摩尼王雲眾寶藏現菩薩像摩尼王雲稱揚佛名摩尼王雲光明熾盛普照一切佛剎道場摩尼王雲光照十方種種變化摩尼王雲稱讚一切菩薩功德摩尼王雲如日光熾盛摩尼王雲悅意樂音周聞十方摩尼王雲普雨如是十種大摩尼王雲已一切如來諸毛孔中咸放光明於光明中而說頌言普賢徧往於諸剎坐寶蓮華眾所觀一切神通靡不現無量三昧皆能入普賢恒以種種身法界周流悉充滿三昧神通方便力圓音廣說皆無礙一切剎中諸佛所種種三昧現神通一一神通悉周徧十方國土無遺者如一切剎如來所彼剎塵中悉亦然所現三昧神通事毗盧遮那之願力普賢身相如虗空依真而住非國土隨諸眾生心所欲示現普身等一切普賢安住諸大願獲此無量神通力一切佛身所有剎悉現其形而詣彼一切眾海無有邊分身住彼亦無量所現國土皆嚴淨一剎那中見多劫普賢安住一切剎所現神通勝無比震動十方靡不周令其觀者悉得見一切佛智功德力種種大法皆成滿以諸三昧方便門示己往昔菩提行如是自在不思議十方國土皆示現為顯普入諸三昧佛光雲中讚功德爾時一切菩薩眾皆向普賢合掌瞻仰承佛神力同聲讚言從諸佛法而出生亦因如來願力起真如平等虗空藏汝已嚴淨此法身一切佛剎眾會中普賢徧住於其所功德智海光明者等照十方無不見普賢廣大功德海徧往十方親近佛一切塵中所有剎悉能詣彼而明現佛子我曹常見汝諸如來所悉親近住於三昧實境中一切國土微塵劫佛子能以普徧身悉詣十方諸國土眾生大海咸濟渡法界微塵無不入入於法界一切塵其身無盡無差別譬如虗空悉周徧演說如來廣大法一切功德光明者如雲廣大力殊勝眾生海中皆往詣說佛所行無等法為度眾生於劫海普賢勝行皆修習演一切法如大雲其音廣大靡不聞國土云何得成立諸佛云何而出現及以一切眾生海願隨其義如實說此中無量大眾海悉在尊前恭敬住為轉清淨妙法輪一切諸佛皆隨喜論此一段經有八十二行一千三百五十六言其意有十一一從爾時普賢菩薩已下一行半經明承佛威神入定二此三昧已下八行半經明舉三昧名及歎三昧之德三如此世界已下可七行經明都舉普賢入定此界如是十方總然四爾時一一普賢菩薩已下有十一行半經明普賢入定諸佛現前佛力所加佛言讚歎普賢之德五爾時十方一切諸佛已下有七行經明諸佛與普賢十種智六如此世界中已下可三行經明都舉十方世界中普賢一切諸佛一時同與其智法如是故七是時已下可六行經明諸佛以手加持摩普賢頂八如是一切世界海已下可兩行經都舉十方世界同然九爾時普賢菩薩已下九行半經明普賢從三昧起并陳三昧之名十普賢菩薩從如是三昧門起時已下十二行半經明大眾獲益并都結與十方同然十一爾時十方一切世界海已下至偈頌已來有十二行半經明佛力三昧力其地微動及興供末後諸佛毛孔光明說頌歎普賢之德問曰何故前世主妙嚴品末其地六種十八相大動此品何故其地微動答曰前明如來始成正覺大眾賀佛及自皆得佛果之益其益廣大明位極行終以此其地大動此品答世主所問之疑為成初信故其地微動於中菩薩示有疑問寄同得益皆是成其凡夫始信之心是故名為舉果勸修生信分仍是信他佛及菩薩得然未是信自心得也第二會中金色世界不動智佛已去方明信自心得亦然也至第十二卷中諸世間主更作二十八問方明信自心是佛不動智等至文方明此經直至法界品覺城東已來菩薩及一切大眾皆是寄法同迷示行修證唯覺城人間五百童子童女優婆塞優婆夷各具五百一萬諸龍寄位是凡表其凡夫有得入者故若無實得者佛教豈是虗行者哉聖者立樣令凡實得終不虗施應如是知應如是信不自欺誑若有人言此經非是凡夫境界是菩薩所行是人當知滅佛知見破滅正法令其正教世不流通令其世間正見不生斷滅佛種諸有智者不應如是不勸修行設行不得不失善種猶成來世積習勝緣故於此佛毛孔光明說頌中已下有兩段頌於初二十行頌明佛毛孔光明讚普賢德如文具明毛孔光是萬行光還歎普賢萬行二爾時一切諸菩薩已下有二十行頌明大眾歎普賢并請說後三品之法亦如文具明第二釋三昧之名者於此三昧名中義分為三一釋三昧名二釋三昧體用三歎三昧之德一釋三昧之名者名毗盧遮那如來藏身毗盧云光遮那云種種徧照如來是法性之體藏身是含容眾法之智明以理智種種教行之光照燭眾生之器隨根與益如經歎德中具明二釋三昧之體用者此三昧體者以法界根本智為體以差別智為大用又以法界根本智為體隨眾生智為用又以入三昧為體出定為用又以無入無出為體又入出俱為用又以入出俱為體以義准之可見大要言之且以為化眾生法則之中以入定明體後從定起顯示十種定名是用於十箇定名中總以法界無依住智性為體此體亦名首楞嚴定與不可說一切諸三昧諸智慧門為體如歎德中具明如經云世界海漩無不隨入者是三昧之用徹徧一切眾法之名故海者廣大義漩者甚深義明此三昧體用廣大甚深無盡諸佛菩薩及一切十方六道眾生中行皆徧故此一三昧答前三十七問總盡向前以佛神力答前三十七問中云何是佛地佛海佛眼佛耳鼻等今普賢三昧答前三十七問中云何菩薩行海三昧海等問為欲明佛行菩薩行體用徹故以佛為體普賢行海為用以此體用該通諸法無法不盡故佛眼耳鼻舌身意為體能徧知眾生事業為用已下如來與普賢智明普賢智契合佛根本智二智不殊令後信者信自智佛根本智一體無二無疑故十方諸佛手摩其頂者明接引忍可言普賢從三昧起者明定體隨根用處彼復依根獲益名起其用無盡略舉其十以表無盡故餘義經文自具廣明意明佛根本智是定體普賢是用音切鬚須音滯直例切僉七鹽切楞魯登切
