body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十回向品第二十五之八經佛子菩薩摩訶薩如是回向時發歡喜心為令一切衆生得利益安樂故為令一切衆生得平等心故為令一切衆生住能捨心故為令一切衆生住一切施心故為令一切衆生住歡喜施心故為令一切衆生住永離貧窮施心故為令一切衆生住一切財寶施心故為令一切衆生住無數財寶施心故為令一切衆生住普施無量施一切施心故為令一切衆生住盡未來劫無斷施心故為令一切衆生住一切悉捨無悔無惱施心故為令一切衆生住悉捨一切資生之物施心故為令一切衆生住隨順施心故為令一切衆生住攝取施心故為令一切衆生住廣大施心故為令一切衆生住捨無量莊嚴具供養施心故為令一切衆生住無著施心故為令一切衆生住平等施心故為令一切衆生住如金剛極大力施心故為令一切衆生住如日光明施心故為令一切衆生住攝如來智施心故為令一切衆生善根眷屬具足故為令一切衆生善根智慧常現在前故為令一切衆生得不可壞淨心圓滿故為令一切衆生成就最勝清淨善根故為令一切衆生於煩惱睡眠中得覺悟故為令一切衆生滅除一切諸疑惑故為令一切衆生得平等智慧淨功德故為令一切衆生功德圓滿無能壞者故為令一切衆生具足清淨不動三昧故為令一切衆生住不可壞一切智智故為令一切衆生成滿菩薩無量清淨神通行故為令一切衆生修集無著善根故為令一切衆生念去來今一切諸佛心清淨故為令一切衆生出生清淨勝善根故為令一切衆生滅除一切魔所作業障道法故為令一切衆生具足無礙清淨平等功德法故為令一切衆生以廣大心常念諸佛無懈廢故為令一切衆生常近諸佛勤供養故為令一切衆生廣開一切諸善根門普能圓滿白淨法故為令一切衆生無量心廣大心最勝心悉清淨故為令一切衆生成就清淨等施心故為令一切衆生奉持諸佛尸波羅蜜等清淨故為令一切衆生得大堪忍波羅蜜故為令一切衆生住精進波羅蜜常無懈故為令一切衆生住無量定能起種種神通智故為令一切衆生得知一切法無體性般若波羅蜜故為令一切衆生圓滿無邊淨法界故為令一切衆生成滿一切神通清淨善根故為令一切衆生住平等行積集善法悉圓滿故為令一切衆生善入一切諸佛境界悉周遍故為令一切衆生身口意業普清淨故為令一切衆生善業果報普清淨故為令一切衆生了達諸法普清淨故為令一切衆生了達實義普清淨故為令一切衆生修諸勝行普清淨故為令一切衆生成就一切菩薩大願普清淨故為令一切衆生證得一切功德智慧普清淨故為令一切衆生成就一切同體善根回向出生一切智乘普圓滿故為令一切衆生嚴淨一切諸佛國土普圓滿故為令一切衆生見一切佛而無所著普圓滿故為令一切衆生具諸相好功德莊嚴普圓滿故為令一切衆生得六十種音聲發言誠諦皆可信受百千種法而以莊嚴如來無礙功德妙音悉圓滿故為令一切衆生成就十力莊嚴無礙平等心故為令一切衆生得一切佛無盡法明一切辨才普圓滿故為令一切衆生得無上無畏人中之雄師子吼故為令一切衆生得一切智轉不退轉無盡法輪故為令一切衆生了一切法開示演說普圓滿故為令一切衆生以時修習清淨善法普圓滿故為令一切衆生成就導師無上法寶等清淨故為令一切衆生於一莊嚴無量莊嚴大莊嚴諸佛莊嚴普圓滿故為令一切衆生等入三世所有境界悉周遍故為令一切衆生悉能往詣一切佛剎聽受正法無不遍故為令一切衆生智慧利益為世所宗與佛等故為令一切衆生以一切智知一切法普圓滿故為令一切衆生行不動業得無礙果普圓滿故為令一切衆生所有諸根咸得神通能知一切衆生根故為令一切衆生得無差別平等智慧於一相法普清淨故為令一切衆生與理無違一切善根悉具足故為令一切衆生於一切菩薩自在神通悉明達故為令一切衆生得一切佛無盡功德若福若智悉平等故為令一切衆生發菩提心解一切法平等一相無遺缺故為令一切衆生了達正法為世最上福德田故為令一切衆生成就平等清淨大悲為諸施者大力田故為令一切衆生堅固第一無能沮壞故為令一切衆生見必蒙益無能摧伏故為令一切衆生成滿最勝平等心故為令一切衆生善能了達一切諸法得大無畏故為令一切衆生放一光明普照十方一切世界故為令一切衆生普修一切菩薩精進行無懈退故為令一切衆生以一行願普滿一切諸行願故為令一切衆生以一妙音普使聞者皆得解故為令一切衆生悉能具足一切菩薩清淨心故為令一切衆生普得值遇諸善知識咸承事故為令一切衆生修菩薩行調伏衆生不休息故為令一切衆生以妙辨才具一切音隨機廣演無斷盡故為令一切衆生能以一心知一切心以一切善根等回向故為令一切衆生常樂積集一切善根安立衆生於淨智故為令一切衆生得一切智福德智慧清淨身故為令一切衆生善知一切衆生善根觀察回向普成就故為令一切衆生得一切智成等正覺普圓滿故為令一切衆生得具足神通智於一處出興一切諸處皆出興故為令一切衆生得普莊嚴智嚴淨一衆會一切衆會皆嚴淨故為令一切衆生於一佛國土普見一切佛國土故為令一切衆生以一切莊嚴具不可說莊嚴具無量莊嚴具無盡莊嚴具莊嚴一切諸佛國土普周遍故為令一切衆生於一切法悉能決了甚深義故為令一切衆生得諸如來最上第一自在神通故為令一切衆生得非一非異一切功德自在神通故為令一切衆生具足一切平等善根普為諸佛灌其頂故為令一切衆生悉得成滿清淨智身於諸有中最尊勝故論第十佛子已下至於諸有中最尊勝故有一百一十五行半經明菩薩以如上兩段無限布施業普為一切無限種種衆生起一百一十種廣大無限所為衆生等所緣事業而行如上等施願回向故此已上總結已前三十二種無限善根以次象馬等十種施業及大願回向及為衆生等境界竟經佛子菩薩摩訶薩如是悲愍利益安樂一切衆生咸令清淨遠離慳嫉受勝妙樂具大威德生大信解永離瞋恚及諸翳濁其心清淨質直柔耎無有諂曲迷惑愚癡行出離行堅固不壞平等之心永無退轉白淨法力具足成就無惱無失善巧回向常修正行調伏衆生滅除一切諸不善業修行苦行一切善根又勸衆生令其修習普為含識具受衆苦以大智眼觀諸善根知其悉以智慧為性方便回向一切衆生為令一切衆生悉得安住一切清淨功德處故為令一切衆生悉能攝受一切善根知諸功德性及義故為令一切衆生普淨一切諸善根故為令一切衆生於福田境界中種諸善法心無悔故為令一切衆生普能攝受一切衆生一一皆令趣一切智故為令一切衆生普攝一切所有善根一一皆與平等回向而相應故又以諸善根如是回向所謂願一切衆生究竟安隱願一切衆生究竟清淨願一切衆生究竟安樂願一切衆生究竟解脫願一切衆生究竟平等願一切衆生究竟了達願一切衆生究竟安住諸白淨法願一切衆生得無礙眼願一切衆生善調其心願一切衆生具足十力調伏衆生論第十一佛子已下至具足十力調伏衆生有二十三行經明菩薩為慈愍衆生入苦同行以大願接生分經佛子菩薩摩訶薩如是回向時不著業不著報不著身不著物不著剎不著方不著衆生不著無衆生不著一切法不著無一切法論第十二佛子已下至不著無一切法有三行經明菩薩雖以施願回向入苦利益衆生其心有十種不著分經佛子菩薩摩訶薩如是回向時以此善根普施世間願一切衆生成滿佛智得清淨心智慧明了內心寂靜外緣不動增長成就三世佛種論第十三佛子已下至增長成就三世佛種有三行經明菩薩以如上一切善根願一切衆生得智種分云何得入佛智種有四法一得清淨心二智慧明了三內心寂靜四外緣不動如是修治能增長三世諸佛智種故經佛子菩薩摩訶薩修行如是回向之時超出一切無能過者一切世間所有言詞悉共稱讚亦不可盡普修一切菩薩諸行悉能往詣一切佛土普見諸佛無所障礙又能普見一切世界菩薩所行以善方便為諸衆生分別諸法甚深句義得陀羅尼演說妙法盡未來劫無有斷絶為衆生故念念於不可說不可說世界猶如影像普現其身供養諸佛念念嚴淨不可說不可說諸佛國土悉令周遍修行嚴淨佛剎智慧而無厭足念念令不可說不可說百千億那由他衆生清淨成就平等滿足於彼一切諸國土中勤修一切諸波羅蜜攝取衆生成就淨業得無礙耳於不可說不可說諸佛世界一一如來所轉法輪聽聞受持精勤修習不生一念捨離之心住無所得無依止無作無著菩薩神通於一剎那一彈指頃分身普詣不可說諸佛世界與諸菩薩等同一見論第十四佛子已下至與諸菩薩等同一見有十七行半經明菩薩修行如上回向之時神通智力陀羅尼門出過世所稱歎分經佛子菩薩摩訶薩如是修習菩薩行時尚能成滿無量不可說不可說清淨功德憶念稱讚所不能盡況復得成無上菩提一切佛剎平等清淨一切衆生平等清淨一切身平等清淨一切根平等清淨一切業果平等清淨一切衆會道場平等清淨一切圓滿行平等清淨一切法方便智平等清淨一切如來諸願回向平等清淨一切諸佛神通境界平等清淨論第十五佛子已下至神通境界平等清淨有八行經明菩薩如是修行菩薩行時功德出過思量何況得成無上菩提此段明功德作法報生猶尚無限出過思量何況無作自在菩提之理智豈可不能成也言功過也如此段得知法業平等三世互不相違約作略釋經云一切佛剎平等清淨一切衆生平等清淨此約理智說一切根平等清淨乃至四行經總明約理智說經佛子菩薩摩訶薩如是回向時得一切功德清淨歡喜法門無量功德圓滿莊嚴如是回向時衆生不違一切剎剎不違一切衆生剎衆生不違業業不違剎衆生思不違心心不違思思心不違境界境界不違思心業不違報報不違業業不違業道業道不違業法性不違相法相不違性法生不違性法性不違生剎平等不違衆生平等衆生平等不違剎平等一切衆生平等不違一切法平等一切法平等不違一切衆生平等離欲際平等不違一切衆生安住平等一切衆生安住平等不違離欲際平等過去不違未來未來不違過去過去未來不違現在現在不違過去未來世平等不違佛平等佛平等不違世平等菩薩行不違一切智一切智不違菩薩行論第十六佛子已下至不違菩薩行有十五行經明菩薩見法三世體相平等分如經云衆生不違一切剎剎不違一切衆生明依報正報相似剎從心業起故衆生心差別即剎差別如世界成就品具明思不違心者以思從心生即思是心餘倣此知業不違報者報從業生報是業果餘倣此知如業不違業道者明來生受生與現世作業相似餘倣此法性不違相為無性為性無相為相無性中實相即如來身色及妙境是衆生不了無性妄計之相即天人龍鬼畜等是各隨自心所生業相稱餘倣此生不違性明以生是無生無生為生故剎平等不違衆生平等此約理無淨穢已下例然一切衆生安住平等不違離欲際平等者明衆生報居之境與解脫涅槃際無二理性同時無二性故過去不違未來總明三世性同時無二性故三世無體可相違故餘例知佛平等不違菩薩行平等明以佛理智及菩薩體用不離無性經佛子菩薩摩訶薩如是回向時得業平等得報平等得身平等得方便平等得願平等得一切衆生平等得一切剎平等得一切行平等得一切智平等得三世諸佛平等得承事一切諸佛得供養一切菩薩得種一切善根得滿一切大願得教化一切衆生得了知一切業得承事供養一切善知識得入一切清淨衆會道場得通達一切正教得成滿一切白法佛子是為菩薩摩訶薩第七等隨順一切衆生回向論第十七佛子已下至第七等隨順一切衆生回向有九行經明菩薩如是回向時得法業剎三世平等已得承事一切諸佛入一切清淨衆會道場分經云菩薩摩訶薩如是回向時得業平等得報平等得身平等如是十平等法明以回向發願力莊嚴自報得此十平等果故經菩薩摩訶薩成就此回向則能摧滅一切魔怨拔諸欲刺得出離樂住無二性具大威德救護衆生為功德王神足無礙往一切剎入寂滅處具一切身成菩薩行於諸行願心得自在分別了知一切諸法悉能遍生一切佛剎得無礙耳聞一切剎所有音聲得淨慧眼見一切佛未嘗暫捨於一切境界成就善根心無高下於一切法得無所得菩薩摩訶薩以一切善根等隨順一切衆生如是回向論第十八菩薩摩訶薩已下至隨順一切衆生如是回向有九行經明總歎如上回向施願所得之德業用成就分經爾時金剛幢菩薩承佛神力普觀十方而說頌言論第十九爾時已下一行經明金剛幢菩薩觀衆說頌分經菩薩所作諸功德微妙廣大甚深遠乃至一念而修行悉能回向無邊際菩薩所有資生具種種豐盈無限億香象寶馬以駕車衣服珍財悉殊妙或以頭目并手足或持身肉及骨髓悉遍十方無量剎普施一切令充滿無量劫中所修習一切功德盡回向為欲救度諸羣生其心畢竟不退轉菩薩為度衆生故常修最勝回向業普令三界得安樂悉使當成無上果菩薩普興平等願隨其所集清淨業悉以回施諸羣生如是大誓終無捨菩薩願力無限礙一切世間咸攝受如是回向諸羣生未曾暫起分別心普願衆生智明了布施持戒悉清淨精進修行不懈廢如是大誓無休息菩薩回向到彼岸普開清淨妙法門智慧同於兩足尊分別實義得究竟菩薩言詞已通達種種智慧亦如是說法如理無障礙而於其中心不著常於諸法不作二亦復不作於不二於二不二並皆離知其悉是語言道知諸世間悉平等莫非心語一切業衆生幻化無有實所有果報從茲起一切世間之所有種種果報各不同莫不皆由業力成若滅於業彼皆盡菩薩觀察諸世間身口意業悉平等亦令衆生住平等猶如無等大聖尊菩薩善業悉回向普令衆生色清淨福德方便皆具足同於無上調御士菩薩利益諸羣生功德大海盡回向願使威光特超世得成雄猛大力身凡所修習諸功德願使世間普清淨諸佛清淨無倫匹衆生清淨亦如是菩薩於義得善巧能知諸佛最勝法以衆善業等回向願令庶品同如來菩薩了知諸法空一切世間無所有無有造作及作者衆生業報亦不失諸法寂滅非寂滅遠離此二分別心知諸分別是世見入於正位分別盡如是真實諸佛子從於如來法化生彼能如是善回向世間疑惑悉除滅論二十其頌總有四十二行文義自具不煩更釋第二隨文釋義者何故名為等隨順一切衆生回向為明此第七方便波羅蜜主大悲門以六波羅蜜中所修智慧之力入於生死海隨一切衆生根品同行利生故故名等隨順即如十住中第七住大悲位休捨優婆夷云我有同行眷屬八萬四千那由他常居此園者是大意云同一切衆生八萬四千及不可說煩惱悉同行故是此義也亦是此位第七回向與善財所見觀音是此位也可知如此一段回向總有二十段經文餘十九段文義自顯不煩更釋表法中如善財知識十住第七以優婆夷休捨表慈悲位十行第七位表慈悲門以滿足王自化其身作諸罪逆自化其身捉來殺罰以息衆生惡逆此十回向第七即以觀世音表慈悲位也夫大教玄悠文芳義廣法門名句明白宛然十十之數相從萬萬千千次第不可以將小池而添巨海未足以致其深炷微燈而益日光焉能資其遠照此經義弘言備理具辭豐且略釋大意密智幽潛聊申少趣不可加餘經之法相滯此妙章若得意修行者理由定發智以理明悲藉願興行成願發理弘智博願廣悲寬佛種因此而生法界以斯緣濟都結如此餘義後文第八真如相回向以願波羅蜜為體明此位同第八地智增勝以願引生智業成大悲故以願防智為智體淨故利化不弘表法中如善財童子見東方正趣菩薩是其行也從空中來至娑婆世界者明法空智現普周亦無來去觀世音指東方正趣及見時與觀世音同會而見表以願會悲至智明圓悲智令滿故東方表智西方表悲日出照明春陽發生青龍吉祥表智日入昏迷秋霜白虎殺害明智入悲處苦流濟衆生故第八願波羅蜜明防智體性淨以願會悲成普賢行升進隨其行位和會如之二義如前第一長科經意者自初爾時已下至頌已來長科為十段經佛子何者是菩薩摩訶薩真如相回向佛子此菩薩摩訶薩正念明了其心堅住遠離迷惑專意修行深心不動成不壞業趣一切智終不退轉志求大乘勇猛無畏植諸德本普安世間生勝善根修白淨法大悲增長心寶成就常念諸佛護持正法於菩薩道信樂堅固成就無量淨妙善根勤修一切功德智慧為調御師生衆善法以智方便而為回向菩薩爾時慧眼普觀所有善根無量無邊其諸善根修習之時若求緣若辦具若治淨若趣入若專勵若起行若明達若精審若開示如是一切有種種門種種境種種相種種事種種分種種行種種名字種種分別種種出生種種修習其中所有一切善根悉是趣向十方乘心之所建立皆悉回向一切種智唯一無二以諸善根如是回向所謂願得圓滿無礙身業修菩薩行願得清淨無礙口業修菩薩行願得成就無礙意業安住大乘願得圓滿無障礙心淨修一切諸菩薩行願起無量廣大施心周給無邊一切衆生願於諸法心得自在演大法明無能障蔽願得明達一切智處發菩提心普照世間願常正念三世諸佛諦想如來常現在前願住圓滿增上志樂遠離一切諸魔怨敵願得安住佛十力智普攝衆生無有休息願得三昧遊諸世界而於世間無所染著願住諸世界無有疲厭教化衆生恆不休息願起無量思慧方便成就菩薩不思議道願得諸方不迷惑智悉能分別一切世間願得自在神通智力於一念中悉能嚴淨一切國土願得普入諸法自性見一切世間悉皆清淨願得生起無差別智於一剎中入一切剎願以一切剎莊嚴之事顯示一切教化無量無邊衆生願於一佛剎中示無邊法界一切佛剎悉亦如是願得自在大神通智普能往詣一切佛土論第一爾時已下至普能往詣一切佛土有三十五行經明菩薩入此真如相回向位中以自所得善根更加回向發願所緣成位升進分經佛子菩薩摩訶薩以諸善根願得莊嚴一切佛國願得周遍一切世界願得成就智慧觀察如為己身如是回向如是而為一切衆生所謂願一切衆生永離一切地獄畜生閻羅王趣願一切衆生除滅一切障礙之業願一切衆生得周普心平等智慧願一切衆生於怨於親等心攝受皆令安樂智慧清淨願一切衆生智慧圓滿淨光普照願一切衆生思慧成滿了真實義願一切衆生以淨志樂趣求菩提獲無量智願一切衆生普能顯示安隱住處論第二佛子已下至顯示安隱住處有十行經明菩薩觀衆生惡道苦如己身願速出離分經佛子菩薩摩訶薩恆以善心如是回向為令一切衆生遇清涼雲霔法雨故為令一切衆生常值福田勝境界故為令一切衆生皆能善入菩提心藏自護持故為令一切衆生離諸蓋纏善安住故為令一切衆生皆獲無礙神通智故為令一切衆生得自在身普示現故為令一切衆生成就最勝一切種智普興利益無空過故為令一切衆生普攝羣品令清淨故為令一切衆生皆能究竟一切智故為令一切衆生心不動搖無障礙故論第三佛子已下至心不動搖無障礙故有十行經明菩薩以如上回向有十為令衆生得十種大利分經佛子菩薩摩訶薩見可愛樂國土園林草木華果名香上服珍寶財物諸莊嚴具或見可樂村邑聚落或見帝王威德自在或見住處離諸喧雜見是事已以方便智精勤修習出生無量勝妙功德為諸衆生勤求善法心無放逸廣集衆善猶如大海以無盡善普覆一切為衆善法所依之處以諸善根方便回向而無分別開示無量種種善根智常觀察一切衆生心恆憶念善根境界以等真如平等善根回向衆生無有休息菩薩爾時以諸善根如是回向所謂願一切衆生得諸如來可愛樂見見法真性平等平等無所取著圓滿清淨願一切衆生見諸如來甚可愛樂圓滿供養願一切衆生往生一切無諸煩惱甚可愛樂清淨佛剎願一切衆生得見諸佛可愛樂法願一切衆生常樂護持一切菩薩可愛樂行願一切衆生得善知識可愛樂眼見無所礙願一切衆生常見一切可愛樂物無有違逆願一切衆生證得一切可愛樂法而勤護持願一切衆生於一切佛可樂法中得淨光明願一切衆生修諸菩薩一切能捨可愛樂心願一切衆生得無所畏能說一切可愛樂法願一切衆生得諸菩薩極可愛樂甚深三昧願一切衆生得諸菩薩甚可愛樂陀羅尼門願一切衆生得諸菩薩甚可愛樂善觀察智願一切衆生能現菩薩甚可愛樂自在神通願一切衆生能於諸佛大衆會中說可愛樂甚深妙法願一切衆生能以方便開示演說甚可愛樂差別之句願一切衆生常能發起甚可愛樂平等大悲願一切衆生念念發起甚可愛樂大菩提心常令諸根歡喜悅豫願一切衆生能入一切甚可愛樂諸如來家願一切衆生得可愛樂能調伏行調伏衆生無有休息願一切衆生得諸菩薩甚可愛樂無盡辨才演說諸法願一切衆生於不可說不可說劫住於一切可愛樂世界教化衆生心無厭倦願一切衆生以無量方便普能悟入甚可愛樂諸佛法門願一切衆生得可愛樂無礙方便知一切法無有根本願一切衆生得可愛樂離貪欲際知一切法畢竟無二斷一切障願一切衆生得可愛樂離貪欲際知一切法平等真實願一切衆生具足成滿一切菩薩甚可愛樂無戲論法願一切衆生得金剛藏精進之心成可愛樂一切智道願一切衆生具可愛樂無礙善根摧伏一切煩惱怨敵願一切衆生得可愛樂一切智門普於世間現成正覺論第四佛子已下至普於世間現成正覺有四十六行半經明菩薩見勝妙國土及一切妙境以無量大願願一切衆生皆盡普得生在其中并獲衆益分經佛子菩薩摩訶薩修習如是諸善根時得智慧明為善知識之所攝受如來慧日明照其心永滅癡冥勤修正法入諸智業善學智地流布善根充滿法界以智回向盡諸菩薩善根源底以智深入大方便海成就無量廣大善根論第五佛子已下至廣大善根有五行經明菩薩以如上回向善根自增善根分音切嫉疾音刺七四切勵力制切喧呼員切霔注音邑於急切纏直連切村七昆切涼呂張切暫暫音悠由音炷之庶切
