body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十回向品第二十五之四經佛子菩薩摩訶薩如是回向時不分別我及以我所不分別佛及以佛法不分別剎及以嚴淨不分別衆生及以調伏不分別業及業果報不著於思及思所起不壞因不壞果不取事不取法不謂生死有分別不謂涅槃恆寂靜不謂如來證佛境界無有少法與法同止論六佛子已下至無有少法與法同止有六行經明不分別不著不取分經佛子菩薩摩訶薩如是回向時以諸善根普施衆生決定成熟平等教化無相無緣無稱量無虗妄遠離一切分別取著菩薩摩訶薩如是回向已得無盡善根所謂念三世一切諸佛故得無盡善根念一切菩薩故得無盡善根淨諸佛剎故得無盡善根淨一切衆生界故得無盡善根深入法界故得無盡善根修無量心等虗空界故得無盡善根深解一切佛境界故得無盡善根於菩薩業勤修習故得無盡善根了達三世故得無盡善根論七佛子已下至得無盡善根有十行經是菩薩得無盡善根分經佛子菩薩摩訶薩以一切善根如是回向時了一切衆生界無有衆生解一切法無有壽命知一切法無有作者悟一切法無補特伽羅了一切法無有忿諍觀一切法皆從緣起無有住處知一切物皆無所依了一切剎悉無所住觀一切菩薩行亦無處所見一切境界悉無所有論八佛子已下至一切境界悉無所有可六行經明菩薩了衆生界無衆生於法無得證分補特伽羅云數取趣經佛子菩薩摩訶薩如是回向時眼終不見不淨佛剎亦復不見異相衆生無有少法為智所入亦無少智而入於法解如來身非如虗空一切功德無量妙法所圓滿故於一切處令諸衆生積集善根悉充足故論九佛子已下至悉充足故有五行經明菩薩無智入法無法入智分經佛子此菩薩摩訶薩於念念中得不可説不可説十力地具足一切福德成就清淨善根為一切衆生福田此菩薩摩訶薩成就如意摩尼功德藏隨有所須一切樂具悉皆得故隨所遊方悉能嚴淨一切國土隨所行處令不可説不可説衆生皆悉清淨攝取福德修治諸行故論十佛子已下至修治諸行故有六行半經是菩薩成就功德藏堪為衆生福田分經佛子菩薩摩訶薩如是回向時修一切菩薩行福德殊勝色相無比威力光明超諸世間魔及魔民莫能瞻對善根具足大願成就其心彌廣等一切智於一念中悉能周遍無量佛剎智力無量了達一切諸佛境界於一切佛得深信解住無邊智菩提心力廣大如法界究竟如虗空佛子是名菩薩摩訶薩第五無盡功德藏回向論十一佛子已下至第五無盡功德藏回向可七行半經是菩薩福相處世無倫分經菩薩摩訶薩住此回向得十種無盡藏何等為十所謂得見佛無盡藏於一毛孔見阿僧祇諸佛出興世故得入法無盡藏以佛智力觀一切法悉入一法故得憶持無盡藏受持一切佛所説法無忘失故得決定慧無盡藏善知一切佛所説法祕密方便故得解義趣無盡藏善知諸法理趣分齊故得無邊悟解無盡藏以如虗空智通達三世一切法故得福德無盡藏充滿一切諸衆生意不可盡故得勇猛智覺無盡藏悉能除滅一切衆生愚癡翳故得決定辨才無盡藏演説一切佛平等法令諸衆生悉解了故得十力無畏無盡藏具足一切菩薩所行以離垢繒而繫其頂至無障礙一切智故是為十佛子菩薩摩訶薩以一切善根回向時得此十種無盡藏論十二從菩薩摩訶薩已下至十種無盡藏有十四行半經是菩薩得十無盡藏分經云於一毛孔見阿僧祇諸佛世興於出得入法無盡藏者明心性本無大小計盡身為智影國土亦然智淨影明大小相入如因陀羅網境界喻是也經云以佛智力觀一切法悉入一法者明萬境雖多皆一心而起心亡境滅萬境皆虗如淨水中衆影也水亡影滅此約破有成無説又以境約智生智虗境幻多幻相入不離一虗幻不異虗虗不異幻幻虗無二一異總虗此約以智幻虗自在無礙門説此皆借法況説如實所知唯亡思者智會其智會者方可用而常真不惑心境以大願力隨智幻生等衆生數身如應攝化故名無盡功德藏自餘如文自具不煩更解經爾時金剛幢菩薩承佛神力普觀十方而説頌言論十三爾時已下一行經明金剛幢菩薩説頌分經菩薩成就深心力普於諸法得自在以其勸請隨喜福無礙方便善回向三世所有諸如來嚴淨佛剎遍世間所有功德靡不具回向淨剎亦如是三世所有諸佛法菩薩皆悉諦思惟以心攝取無有餘如是莊嚴諸佛剎盡於三世所有劫讚一佛剎諸功德三世諸劫猶可盡佛剎功德無窮盡如是一切諸佛剎菩薩悉見無有餘總以莊嚴一佛土一切佛土悉如是有諸佛子心清淨悉從如來法化生一切功德莊嚴心一切佛剎皆充滿彼諸菩薩悉具足無量相好莊嚴身辨才演説遍世間譬如大海無窮盡菩薩安住諸三昧一切所行皆具足其心清淨無與等光明普照十方界如是無餘諸佛剎此諸菩薩皆充滿未曾憶念聲聞乘亦復不求緣覺道菩薩如是心清淨善根回向諸羣生普欲令其成正道具足了知諸佛法十方所有衆魔怨菩薩威力悉摧破勇猛智慧無能勝決定修行究竟法菩薩以此大願力所有回向無留礙入於無盡功德藏去來現在常無盡菩薩善觀諸行法了達其性不自在既知諸法性如是不妄取業及果報無有色法無色法亦無有想無無想有法無法皆悉無了知一切無所得一切諸法因緣生體性非有亦非無而於因緣及所起畢竟於中無取著一切衆生語言處於中畢竟無所得了知名相皆分別明解諸法悉無我如衆生性本寂滅如是了知一切法三世所攝無有餘剎及諸業皆平等以如是智而回向隨其悟解福業生此諸福相亦如解豈復於中有可得如是回向心無垢永不稱量諸法性了達其性皆非性不住世間亦不出一切所行衆善業悉以回向諸羣生莫不了達其真性所有分別皆除遣所有一切虗妄見悉皆棄捨無有餘離諸熱惱恆清涼住於解脫無礙地菩薩不壞一切法亦不滅壞諸法性解了諸法猶如響悉於一切無所著了知三世諸衆生悉從因緣和合起亦知心樂及習氣未曾滅壞一切法了達業性非是業而亦不違諸法相又亦不壞業果報説諸法性從緣起了知衆生無有生亦無衆生可流轉無實衆生而可説但依世俗假宣示論已上有五十行頌兩行一頌如文自具但如説修行第二隨文釋義者云何名無盡功德藏回向此位明禪與智冥智與悲會以無盡虗空為一道場以無盡衆生無明行相而為佛事身恆承事無盡諸佛而遍周法界化無盡衆生總成佛身表裏相亡始終都盡遍知諸法不壞無心故名無盡功德藏第六隨順堅固一切善根回向此明般若波羅蜜為體以善財知識名瑟胝羅住善度城常供養栴檀座佛塔以為表法名瑟胝羅此云包攝以身含佛剎為名爾住善度國者約化行為名故以此主智慧善度衆生故供養栴檀座佛塔者明戒定慧解脫解脫法身為座體得佛不涅槃際者明戒定慧體無滅沒也廣如經説其座不安形象者明無相理會是佛義故見座入法故城名善度身與空合名為佛國亦名包攝也以明無相智慧是佛不滅度法門以智無生滅故第一長科經意於此一段長科約作六十四段如下此段回向長行中有六十一段經總明行施於段段中皆有三義一明行施心成就二明施已回向菩提三明各發十種願皆願自他成佛已下三段是總結所施之功及金剛幢菩薩觀衆説頌第一身肉手足國城妻子悉捨行施經佛子云何為菩薩摩訶薩隨順堅固一切善根回向佛子此菩薩摩訶薩或為帝王臨御大國威德廣被名震天下凡諸怨敵靡不歸順發號施令悉依正法執持一蓋溥蔭萬方周行率土所向無礙以離垢繒而繫其頂於法自在見者咸伏不刑不罰感德從化以四攝法攝諸衆生為轉輪王一切周給菩薩摩訶薩安住如是自在功德有大眷屬不可沮壞離衆過失見者無厭福德莊嚴相好圓滿形體支分均調具足獲那羅延堅固之身大力成就無能屈伏得清淨業離諸業障具足修行一切布施或施飲食及諸上味或施車乘或施衣服或施華鬘雜香塗香牀座房舍及所住處上妙燈燭病緣湯藥寶器寶車調良象馬悉皆嚴飾歡喜布施或有來乞王所處座若蓋若傘幢幡寶物諸莊嚴具頂上寶冠髻中明珠乃至王位皆無所吝若見衆生在牢獄中捨諸財寶妻子眷屬乃至以身救彼令脫若見獄囚將欲被戮即捨其身以代彼命或見來乞連膚頂髻歡喜施與亦無所吝眼耳鼻舌及以牙齒頭頂手足血肉骨髓心腎肝肺大腸小腸厚皮薄皮手足諸指連肉爪甲以歡喜心盡皆施與或為求請未曾有法投身而下深大火坑或為護持如來正法以身忍受一切苦毒或為求法乃至一字悉能遍捨四海之內一切所有恆以正法化導羣生令修善行捨離諸惡若見衆生損敗他形慈心救之令捨罪業若見如來成最正覺稱揚讚歎普使聞知或施於地造立僧坊房舍殿堂以為住處及施僮僕供承作役或以自身施來乞者或施於佛為求法故歡喜踊躍為衆生故承事供養或捨王位城邑聚落宮殿園林妻子眷屬隨所乞求悉滿其願或捨一切資生之物普設無遮大施之會其中衆生種種福田或從遠來或從近來或賢或愚或好或醜若男若女人與非人心行不同所求各異等皆施與悉令滿足佛子菩薩摩訶薩如是施時發善攝心悉以回向所謂善攝色隨順堅固一切善根善攝受想行識隨順堅固一切善根善攝王位隨順堅固一切善根善攝眷屬隨順堅固一切善根善攝資具隨須堅固一切善根善攝惠施隨順堅固一切善根論第二施食經佛子菩薩摩訶薩隨所施物無量無邊以彼善根如是回向所謂以上妙食施衆生時其心清淨於所施物無貪無著無所顧吝具足行施願一切衆生得智慧食心無障礙了知食性無所貪著但樂法喜出離之食智慧充滿以法堅住攝取善根法身智身清淨遊行哀愍衆生為作福田現受摶食是為菩薩摩訶薩布施食時善根回向論第三施飲經佛子菩薩摩訶薩若施飲時以此善根如是回向所謂願一切衆生飲法味水精勤修習具菩薩道斷世渴愛常求佛智離欲境界得法喜樂從清淨法而生其身常以三昧調攝其心入智慧海興大法雲霔大法雨是為菩薩摩訶薩布施飲時善根回向論第四施味經佛子菩薩摩訶薩布施種種清淨上味所謂辛酸鹹淡及以甘苦種種諸味潤澤具足能令四大安隱調和肌體盈滿氣力疆壯其心清淨常得歡喜咽咀之時不咳不逆諸根明利內藏充實毒不能侵病不能傷始終無患永得安樂以此善根如是回向所謂願一切衆生得最上味甘露充滿願一切衆生得法智味了知一切諸味業用願一切衆生得無量法味了達法界安住實際大法城中願一切衆生作大法雲周遍法界普雨法雨教化調伏一切衆生願一切衆生得勝智味無上法喜充滿身心願一切衆生得無貪著一切上味不染世間一切諸味常勤修習一切佛法願一切衆生得一法味了諸佛法悉無差別願一切衆生得最勝味乘一切智終無退轉願一切衆生得入諸佛無異法味悉能分別一切諸根願一切衆生法味增益常得滿足無礙佛法是為菩薩摩訶薩布施味時善根回向為令一切衆生勤修福德皆悉具足無礙智身故論第五施車乘經佛子菩薩摩訶薩施車乘時以諸善根如是回向所謂願一切衆生皆得具足一切智乘乘於大乘不可壞乘最勝乘最上乘速疾乘大力乘福德具足乘出世間乘出生無量諸菩薩乘是為菩薩摩訶薩施車乘時善根回向論第六施衣經佛子菩薩摩訶薩布施衣時以諸善根如是回向所謂願一切衆生得慚愧衣以覆其身捨離邪道露形惡法顏色潤澤皮膚細軟成就諸佛第一之樂得最清淨一切種智是為菩薩摩訶薩布施衣時善根回向論第七施華經佛子菩薩摩訶薩常以種種名華布施所謂微妙香華種種色華無量奇妙華善見華可喜樂華一切時華天華人華世所珍愛華甚芬馥悅意華以如是等無量妙華供養一切現在諸佛及佛滅後所有塔廟或以供養説法之人或以供養比丘僧寶一切菩薩諸善知識聲聞獨覺父母宗親下至自身及餘一切貧窮孤露布施之時以諸善根如是回向所謂願一切衆生皆得諸佛三昧之華悉能開敷一切諸法願一切衆生皆得如佛見者歡喜心無厭足願一切衆生所見順愜心無動亂願一切衆生具行廣大清淨之業願一切衆生常念善友心無變異願一切衆生如阿伽陀藥能除一切煩惱衆毒願一切衆生成滿大願皆悉得為無上智王願一切衆生智慧日光破愚癡暗願一切衆生菩提淨月增長滿足願一切衆生入大寶洲見善知識具足成就一切善根是為菩薩摩訶薩布施華時善根回向為令衆生皆得清淨無礙智故論第八施鬘經佛子菩薩摩訶薩布施鬘時以諸善根如是回向所謂願一切衆生人所樂見見者欽歎見者親善見者愛樂見者渴仰見者除憂見者生喜見者離惡見者常得親近於佛見者清淨獲一切智是為菩薩摩訶薩布施鬘時善根回向論第九施香經佛子菩薩摩訶薩布施香時以諸善根如是回向願一切衆生具足戒香得不缺戒不雜戒不汙戒無悔戒離纏戒無熱戒無犯戒無邊戒出世戒菩薩波羅蜜戒願一切衆生以是戒故皆得成就諸佛戒身是為菩薩摩訶薩布施香時善根回向為令衆生悉得圓滿無礙戒蘊故論第十施塗香經佛子菩薩摩訶薩施塗香時以諸善根如是回向所謂願一切衆生施香普熏悉能惠捨一切所有願一切衆生戒香普熏得於如來究竟淨戒願一切衆生忍香普熏離於一切險害之心願一切衆生精進香普熏常服大乘精進甲胄願一切衆生定香普熏安住諸佛現前三昧願一切衆生慧香普熏一念得成無上智王願一切衆生法香普熏於無上法得無所畏願一切衆生德香普熏成就一切大功德智願一切衆生菩提香普熏得佛十力到於彼岸願一切衆生清淨白法妙香普熏永滅一切不善之法是為菩薩摩訶薩施塗香時善根回向論第十一施牀座經佛子菩薩摩訶薩施牀座時以諸善根如是回向所謂願一切衆生得諸天牀座證大智慧願一切衆生得賢聖牀座捨凡夫意住菩提心願一切衆生得安樂牀座永離一切生死苦惱願一切衆生得究竟牀座得見諸佛自在神通願一切衆生得平等牀座恆普熏修一切善法願一切衆生得最勝牀座具清淨業世無與等願一切衆生得安隱牀座證真實法具足究竟願一切衆生得清淨牀座修習如來淨智境界願一切衆生得安住牀座得善知識常隨覆護願一切衆生得師子牀座常如如來右脅而臥是為菩薩摩訶薩施牀座時善根回向為令衆生修習正念善護諸根故論第十二施房舍經佛子菩薩摩訶薩施房舍時以諸善根如是回向所謂願一切衆生皆得安住清淨佛剎精勤修習一切功德安住甚深三昧境界捨離一切住處執著了諸住處皆無所有離諸世間住一切智攝取一切諸佛所住住究竟道安樂住處恆住第一清淨善根終不捨離佛無上住處是為菩薩摩訶薩施房舍時善根回向為欲利益一切衆生隨其所應思惟救護故論第十三施住處經佛子菩薩摩訶薩施住處時以諸善根如是回向所謂願一切衆生常獲善利其心安樂願一切衆生依如來住依大智住依善知識住依尊勝住依善行住依大慈住依大悲住依六波羅蜜住依大菩提心住依一切菩薩道住是為菩薩摩訶薩施住處時善根回向為令一切福德清淨故究竟清淨故智清淨故道清淨故法清淨故戒清淨故志樂清淨故信解清淨故願清淨故一切神通功德清淨故論第十四施燈明經佛子菩薩摩訶薩施諸燈明所謂蘇燈油燈寶燈摩尼燈漆燈火燈沉水燈栴檀燈一切香燈無量色光燈施如是等無量燈時為欲利益一切衆生為欲攝受一切衆生以此善根如是回向所謂願一切衆生得無量光普照一切諸佛正法願一切衆生得清淨光照見世間極微細色願一切衆生得離翳光了衆生界空無所有願一切衆生得無邊光身出妙光普照一切願一切衆生得普照光於諸佛法心無退轉願一切衆生得佛淨光一切剎中悉皆顯現願一切衆生得無礙光一光遍照一切法界願一切衆生得無斷光照諸佛剎光明不斷願一切衆生得智幢光普照世間願一切衆生得無量色光照一切剎示現神力菩薩如是施燈明時為欲利益一切衆生安樂一切衆生故以此善根隨逐衆生以此善根攝受衆生以此善根分布衆生以此善根慈愍衆生以此善根覆育衆生以此善根救護衆生以此善根充滿衆生以此善根緣念衆生以此善根等益衆生以此善根觀察衆生是為菩薩摩訶薩施燈明時善根回向如是回向無有障礙普令衆生住善根中論第十五施湯藥經佛子菩薩摩訶薩施湯藥時以諸善根如是回向所謂願一切衆生於諸蓋纏究竟得出願一切衆生永離病身得如來身願一切衆生作大良藥滅除一切不善之病願一切衆生成阿伽陀藥安住菩薩不退轉地願一切衆生成如來藥能拔一切煩惱毒箭願一切衆生親近賢聖滅諸煩惱修清淨行願一切衆生作大藥王永除衆病不令重發願一切衆生作不壞藥樹悉能救療一切衆生願一切衆生得一切智光出衆病箭願一切衆生善解世間方藥之法所有疾病為其救療菩薩摩訶薩施湯藥時為令一切衆生永離衆病故究竟安隱故究竟清淨故如佛無病故拔除一切病箭故得無盡堅固身故得金剛圍山所不壞身故得堅固滿足力故得圓滿不可奪佛樂故得一切佛自在堅固身故以諸善根如是回向論第十六施器物經佛子菩薩摩訶薩悉能惠施一切器物所謂黃金器盛滿雜寶白銀器盛衆妙寶琉璃器盛種種寶頗梨器盛滿無量寶莊嚴具硨磲器盛赤真珠碼瑙器盛滿珊瑚摩尼珠寶白玉器盛衆美食栴檀器盛天衣服金剛器盛衆妙香無量無數種種寶器盛無量無數種種衆寶或施諸佛信佛福田不思議故或施菩薩知善知識難值遇故或施聖僧為令佛法久住世故或施聲聞及辟支佛於諸聖人生淨信故或施父母為尊重故或施師長為恆誘誨令依聖教修功德故或施下劣貧窮孤露大慈大悲愛眼等視諸衆生故專意滿足去來今世一切菩薩檀波羅蜜故以一切物普施一切終無厭捨諸衆生故如是施時於其施物及以受者皆無所著菩薩摩訶薩以如是等種種寶器盛無量寶而布施時以諸善根如是回向所謂願一切衆生成等虗空無邊藏器念力廣大悉能受持世出世間一切經書無有忘失願一切衆生成清淨器能悟諸佛甚深正法願一切衆生成無上寶器悉能受持三世佛法願一切衆生成就如來廣大法器以不壞信攝受三世佛菩提法願一切衆生成就最勝寶莊嚴器住大威德菩提之心願一切衆生成就功德所依處器於諸如來無量智慧生淨信解願一切衆生成就趣入一切智器究竟如來無礙解脫願一切衆生得盡未來劫菩薩行器能令衆生普皆安住一切智力願一切衆生成就三世諸佛種性勝功德器一切諸佛妙音所説悉能受持願一切衆生成就容納盡法界虗空界一切世界一切如來衆會道場器為大丈夫讚説之首勸請諸佛轉正法輪是為菩薩摩訶薩布施器時善根回向為欲普令一切衆生皆得圓滿普賢菩薩行願器故論第十七施種種寶嚴飾車經佛子菩薩摩訶薩以種種車衆寶嚴飾奉施諸佛及諸菩薩師長善友聲聞緣覺如是無量種種福田乃至貧窮孤露之者此諸人衆或從遠來或從近來或承菩薩名聞故來或是菩薩因緣故來或聞菩薩往昔所發施願故來或是菩薩心願故來菩薩是時或施寶車或施金車悉妙莊嚴鈴網覆上寶帶垂下或施上妙琉璃之車無量珍奇以為嚴飾或復施與白銀之車覆以金網駕以駿馬或復施與無量雜寶所莊嚴車覆以寶網駕以香象或復施與栴檀之車妙寶為輪雜寶為蓋寶師子座敷置嚴好百千婇女列坐其上十萬丈夫牽御而行或復施與頗梨寶車衆雜妙寶以為嚴飾端正女人充滿其中寶帳覆上幢幡侍側或復施與瑪瑙藏車飾以衆寶熏諸雜香種種妙華散布莊嚴百千婇女持寶纓絡駕馭均調涉險能安或復施與堅固香車衆寶為輪莊嚴巨麗寶帳覆上寶網垂下種種寶衣敷布其中清淨好香流芬外徹其香美妙稱悅人心無量諸天翼從而行載以衆寶隨時給施或復施與光明寶車種種諸寶妙色映徹衆妙寶網羅覆其上雜寶纓絡周匝垂下散以粖香內外芬潔所愛男女悉載其上佛子菩薩摩訶薩以如是等衆妙寶車奉施佛時以此善根如是回向所謂願一切衆生悉解供養最上福田深信施佛得無量報願一切衆生一心向佛常遇無量清淨福田願一切衆生於諸如來無所吝惜具足成就大捨之心願一切衆生於諸佛所修行施行離二乘願逮得如來無礙解脫一切智智願一切衆生於諸佛所行無盡施入佛無量功德智慧願一切衆生入佛勝智得成清淨無上智王願一切衆生得佛遍至無礙神通隨所欲往靡不自在願一切衆生深入大乘獲無量智安住不動願一切衆生皆能出生一切智法為諸天人最上福田願一切衆生於諸佛所無嫌恨心勤種善根樂求佛智願一切衆生任運能往一切佛剎一剎那中普周法界而無懈倦願一切衆生逮得菩薩自在神通分身遍滿等虗空界一切佛所親近供養願一切衆生得無比身遍往十方而無厭倦願一切衆生得廣大身飛行迅疾隨意所往終無懈退願一切衆生得佛究竟自在威力一剎那中盡虗空界悉現諸佛神通變化願一切衆生修安樂行隨順一切諸菩薩道願一切衆生得速疾行究竟十力智慧神通願一切衆生普入法界十方國土悉盡邊際等無差別願一切衆生行普賢行無有退轉到於彼岸成一切智願一切衆生升於無比智慧之乘隨順法性見如實理是為菩薩摩訶薩以衆寶車奉施現在一切諸佛及佛滅後所有塔廟善根回向為令衆生得於如來究竟出離無礙乘故佛子菩薩摩訶薩以衆寶車施菩薩等善知識時以諸善根如是回向所謂願一切衆生心常憶持善知識教專勤守護令不忘失願一切衆生與善知識同一義利普攝一切與共善根願一切衆生近善知識尊重供養悉捨所有順可其心願一切衆生得善志欲隨逐善友未嘗捨離願一切衆生常得值遇諸善知識專意承奉不違其教願一切衆生樂善知識常不捨離無間無雜亦無誤失願一切衆生能以其身施善知識隨其教命靡有違逆願一切衆生為善知識之所攝受修習大慈遠離諸惡願一切衆生隨善知識聽聞諸佛所説正法願一切衆生與善知識同一善根清淨業果與諸菩薩同一行願究竟十力願一切衆生悉能受持善知識法逮得一切三昧境界智慧神通願一切衆生悉能受持一切正法修習諸行到於彼岸願一切衆生乘於大乘無所障礙究竟成就一切智道願一切衆生悉得止於一切智乘至安隱處無有退轉願一切衆生知如實行隨其所聞一切佛法皆得究竟永無忘失願一切衆生普為諸佛之所攝受得無礙智究竟諸法願一切衆生得無退失自在神通所欲往詣一念皆到願一切衆生往來自在廣行化導令住大乘願一切衆生所行不空載以智乘到究竟位願一切衆生得無礙乘以無礙智至一切處是為菩薩摩訶薩施善知識種種車時善根回向為令衆生功德具足與佛菩薩等無異故佛子菩薩摩訶薩以衆寶車布施僧時起學一切施心智善了心淨功德心隨順捨心僧寶難遇心深信僧寶心攝持正教心住勝志樂得未曾有為大施會出生無量廣大功德深信佛教不可沮壞以諸善根如是回向所謂願一切衆生普入佛法憶持不忘願一切衆生離凡愚法入賢聖處願一切衆生速入聖位能以佛法次第開誘願一切衆生舉世宗重言必信用願一切衆生善入一切諸法平等了知法界自性無二願一切衆生從於如來智境而生諸調順人所共圍繞願一切衆生住離染法滅除一切煩惱塵垢願一切衆生皆得成就無上僧寶離凡夫地入賢聖衆願一切衆生勤修善法得無礙智具聖功德願一切衆生得智慧心不著三世於諸衆中自在如王願一切衆生乘智慧乘轉正法輪願一切衆生具足神通一念能往不可説不可説世界願一切衆生乘虗空身於諸世間智慧無礙願一切衆生普入一切虗空法界諸佛衆會成就第一波羅蜜行願一切衆生得輕舉身殊勝智慧悉能遍入一切佛剎願一切衆生獲無邊際善巧神足於一切剎普現其身願一切衆生得於一切無所依身以神通力如影普現願一切衆生得不思議自在神力隨應可化即現其前教化調伏願一切衆生得入法界無礙方便一念遍遊十方國土是為菩薩摩訶薩施僧寶車善根回向為令衆生普乘清淨無上智乘於一切世間轉無礙法智慧輪故佛子菩薩摩訶薩以衆寶車布施聲聞獨覺之時起如是心所謂福田心尊敬心功德海心能出生功德智慧心從如來功德勢力所生心百千億那由他劫修習心能於不可説劫修菩薩行心解脫一切魔繫縛心摧滅一切魔軍衆心慧光照了無上法心以此施車所有善根如是回向所謂願一切衆生為世所信第一福田具足無上檀波羅蜜願一切衆生離無益語常樂獨處心無二念願一切衆生成最第一清淨福田攝諸衆生令修福業願一切衆生成智慧淵能與衆生無量無數善根果報願一切衆生住無礙行滿足清淨第一福田願一切衆生住無諍法了一切法皆無所作無性為性願一切衆生常得親近最上福田具足修成無量福德願一切衆生能現無量自在神通以淨福田攝諸含識願一切衆生具足無盡功德福田能與衆生如來十力第一乘果願一切衆生為能辦果真實福田成一切智無盡福聚願一切衆生得滅罪法悉能受持所未曾聞佛法句義願一切衆生常勤聽受一切佛法聞悉解悟無空過者願一切衆生聽聞佛法通達究竟如其所聞隨順演説願一切衆生於如來教信解修行捨離一切九十六種外道邪見願一切衆生常見賢聖增長一切最勝善根願一切衆生心常信樂智行之士與諸聖哲同止共歡願一切衆生聽聞佛名悉不唐捐隨其所聞咸得目見願一切衆生善分別知諸佛正教悉能守護持佛法者願一切衆生常樂聽聞一切佛法受持讀誦開示照了願一切衆生信解佛教如實功德悉捨所有恭敬供養是為菩薩摩訶薩施聲聞獨覺種種車時善根回向為令衆生皆得成就清淨第一智慧神通精進修行無有懈怠獲一切智力無畏故佛子菩薩摩訶薩以衆寶車施諸福田乃至貧窮孤獨者時隨其所求一切悉捨心生歡喜無有厭倦仍向彼人自悔責言我應往就供養供給不應勞汝遠來疲頓言已拜跪問訊起居凡有所須一切施與或時施彼摩尼寶車以閻浮提第一女寶充滿其上或復施與金莊嚴車人間女寶充滿其上或復施與妙琉璃車內宮妓女充滿其上或施種種奇妙寶車童女充滿如天婇女或施無數寶莊嚴車寶女滿中柔明辨慧或施所乘妙栴檀車或復施與頗梨寶車悉載寶女充滿其上顏容端正色相無比袨服莊嚴見者欣悅或復施與瑪瑙寶車灌頂王子身載其上或時施與堅固香車所有男女悉載其上或施一切寶莊嚴車載以難捨親善眷屬佛子菩薩摩訶薩以如是等無量寶車隨其所求恭敬施與皆令遂願歡喜滿足以此善根如是回向所謂願一切衆生乘不退轉無障礙輪廣大之乘詣不可思議菩提樹下願一切衆生乘清淨因大法智乘盡未來劫修菩薩行永不退轉願一切衆生乘一切法無所有乘永離一切分別執著而常修習一切智道願一切衆生乘無諂誑正直之乘往諸佛剎自在無礙願一切衆生隨順安住一切智乘以諸佛法共相娛樂願一切衆生皆乘菩薩清淨行乘具足菩薩十出離道及三昧樂願一切衆生乘四輪乘所謂住好國土依止善人集勝福德發大誓願以此成滿一切菩薩清淨梵行願一切衆生得普照十方法光明乘修學一切如來智力願一切衆生乘佛法乘到一切法究竟彼岸願一切衆生載衆福善難思法乘普示十方安隱正道願一切衆生乘大施乘捨慳吝垢願一切衆生乘淨戒乘持等法界無邊淨戒願一切衆生乘忍辱乘常於衆生離瞋濁心願一切衆生乘大精進不退轉乘堅修勝行趣菩提道願一切衆生乘禪定乘速至道場證菩提智願一切衆生乘於智慧巧方便乘化身充滿一切法界諸佛境界願一切衆生乘法王乘成就無畏恆普惠施一切智法願一切衆生乘無所著智慧之乘悉能遍入一切十方於真法性而無所動願一切衆生乘於一切諸佛法乘示現受生遍十方剎而不失壞大乘之道願一切衆生乘一切智最上寶乘滿足普賢菩薩行願而無厭倦是為菩薩摩訶薩以衆寶車施諸福田乃至貧窮孤露之人善根回向為令衆生具無量智歡喜踊躍究竟皆得一切智乘故音切傘蘇扞切溥滂古切吝良刃切宍肉音髓息委切胏方吠切爪側絞切坑苦行切揣初委切霔注音鹹胡緘切肌舌宜切咽於見切咀才與切咳克代切軟軟音芬孚云切馥扶六切愜苦叶切脅虗業切漆七音硨尺遮切磲渠音珊山音瑚胡音誘與久切誨呼內切駿俊音馭遇音庇必至切廕於禁切嫌戶兼切迅信音袨胡練切婇七宰切訊信音跪溪委切娛五居切慳苦間切垢苟音趣七于切數所角切步迷切瑟虱音胝竹尼切肢之音
