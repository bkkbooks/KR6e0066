body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論華藏世界品第五之一論將釋此品略作十門分別一釋品來意二釋品名目三釋華藏世界海因何報得四釋華藏世界形狀安立五配華藏世界安立屬因六釋華藏世界海純雜無礙七釋華藏世界海圓攝三世業境八釋華藏世界本空出生所緣九明華藏世界因何得隱現自在十隨文釋義一釋品來意者此品答前三十七問中佛世界海衆生海波羅蜜海等此品舉如來五位中行業因果報得答前三十七問故此品須來二釋品名目者為説此佛境報得之土蓮華所持含藏一切淨穢境界皆在其中故名華藏三釋華藏世界因何報得者以從初信心至於八地已來恆以大志願力持令其不退菩提諸波羅蜜海教化饒益一切衆生至於八地任利無功當知風輪是大願波羅蜜所成報故衆生世間妄想業風所持如來世間以大願力智風能持諸境為以智能隨願願能成智還以大願法身大智之所報成風輪之體若不以法身一切諸行總有為故若無志願法身無性不能自成何況成他以此三事為緣方堪利生不滯空有進修功熟任利無功且取初因大願為首令持萬境總以大願智風以為持境是故此品下文普散摩尼妙寶華以昔願力空中住如是華藏世界所有莊嚴總是風輪上持諸境由諸福行本從願生還將本因以持諸果以此用願波羅蜜能成一切諸波羅蜜海以本因如此故因果相持今以第八及初發心時願波羅蜜中十波羅蜜以成十種風輪用持其上十種一切莊嚴以願波羅蜜互體相參能持其上諸行報得一切莊嚴如最下風輪名平等是願波羅蜜中檀波羅蜜報得故能持其上一切寶𦦨熾然莊嚴還是願波羅蜜中檀度門法財慧施之所報生還自相持因果相徹法不虗得因不唐捐以次準此用願波羅蜜中十度法門配之十種風輪報得因果相持故還如衆生世間妄想業風最居其下上持水際金剛地山令其安住孛象玄光以成天文運遊不墮蓮華藏體是法身隨行無依住智體之所報得及宮殿總大悲含育之所報得樓閣即是智照觀根順悲濟物之所報得其地金剛平等自性法身之所報得但是諸莊嚴中所有金剛為莊嚴者皆法身隨行之報但是摩尼莊嚴皆法身成戒體隨行報得金剛輪圍山即是大悲戒防護之業之所報得衆華莊嚴者萬行利生開敷衆善之所報得故寶樹莊嚴者建行利生覆蔭含識之所報得如十行位中功德林等十箇菩薩下名悉同名之曰林為行覆蔭故師子座莊嚴者即是以法身隨智建法輪報得故略而言之且復如是廣説報業所因不可具悉夫報不虗得皆有所因若不知因云何修果是故此品之初云此華藏莊嚴世界海是毗盧遮那如來往昔於世界海微塵數佛一一佛所淨修世界海微塵數大願之所嚴淨但云願者為行由願成又下云普賢智地行悉成一切莊嚴從此出如香水海大慈悲業之所報得香水河是進修之行之所報得如下文殊師利常隨衆中總以名表法即見名知行如此華藏世界海見果知因不可別引餘經將來證此此經見名即知法見果即知因方可識此經之意趣餘經法相門戶多不與此經相應餘經云苦諦此經云苦聖諦即義有餘餘經説四諦此經説十種聖諦及十十二因緣若廣説無量差別不可卒申以是義故此配因果不可引於餘教配此經文此經見名知行以果識因如文殊師利常隨之衆云明練十方儀式主方神除滅無明黑暗主夜神一心匪懈闡明佛日主晝神即其例矣此華藏世界報得之體大要總言大願法身大智萬行大慈大悲以此五事成滿盡法界虗空界乃至塵毫之內重重剎海中一切衆生行皆悉等利至八地任用無功自常充遍以此為體非是滯寂自安及人天自求樂果者之所境界故亦非樂生淨土菩薩者境界故此淨土菩薩設修六波羅蜜得六神通亦未能生信故為本不以法界根本智差別智乘發生信進修行故四釋華藏世界海形狀者以無盡大願風輪持大悲水生無邊行華以法性虗空能容萬境重疊無礙於其水上生一大蓮華周空法界名種種蘂香幢明根本智起差別智行差別行名蘂香幢於蓮華內日珠王寶上有大輪圍山經云日珠王蓮華之上者只是華內有寶名曰珠王非別有華也具寶所成林樹香水妙華開敷經自有文具陳其事其華內地金剛所成地具衆寶間錯嚴飾經自具言於其地上無數香水海衆寶為底如經具説一一香水海外各有四天下微塵數香水河右旋圍繞從南向東以次繞之如六甲等為右其河嚴飾經自具言於不可説香水海中一一海內各有一大世界種而住其中其世界種者同流所居名之曰種種者類也如先德釋云三千大千世界數至恆沙為一世界海海世界數至恆沙為一世界性性數至恆沙為一世界種此中世界種有不可説佛剎微塵數一一香水海中各有其一世界種如經且略舉世界種於最中心香水海名名無邊妙華光明中道智悲之妙用為作名也即是風輪向上種種蘂香幢大蓮華之內處中香水海也此中海內出大蓮華名一切香摩尼王莊號有世界種於中而住名普照十方熾然寶光明此世界種上下有二十重世界各各相去佛剎微塵數此娑婆世界在第十三重中最下重中有佛剎微塵數世界周匝圍繞次上重有二佛剎塵次上重中三佛剎塵數世界周匝圍繞一重增一至最上二十重有二十佛剎微塵數世界圍繞如是周旋通中心有十一箇世界種各有二十重上下相去遠近相似此十一箇世界種外周圍至輪圍山復有一百箇世界種隨方各十於中布列直往隨方行列而住近輪圍山周匝十箇世界種各各上下四重重數雖少上下相去極遠每第三重與此娑婆世界齊等最上重或言相去七佛剎塵向下第二重與下相去多言十佛剎微塵數計四重世界還與中心十一箇二十重世界種高下齊等此近輪圍山十箇世界種即有四重餘九十箇世界種不言重數且略舉世界種中心有十一箇世界種周圍有一百箇世界種共有一百一十一箇世界種如天帝網分布而住大都總數有不可説佛剎微塵數諸世界種總於種種蘂香幢大蓮華之上諸香水海各出蓮華諸世界種各各而住即於其大華之上別華而居即是第二重各別蓮華之上布列而住最下有須彌山微塵數風輪而持其上種種莊嚴及持其上重重世界猶如日月衆星以風所持處空而住餘廣者經自有文若廣引文繁恐當不見略陳綱紀粗而言之五配華藏世界海安立屬因者夫果不自生從因而得經云廣大願雲周法界於一切劫化羣生普賢智地行悉成所有莊嚴從此出如經總舉不可説佛剎微塵數世界種者明普賢行攝化之境遍法界故即是座內衆眉間衆所行覺行報得之境總是都舉果行圓周之境於彼但言佛世界微塵衆對不可説佛剎微塵數於彼是略舉數此是廣數如説普賢之行且但言萬行此是略言意在無盡等法界行也即此二重舉果中普賢滿行即如座內衆眉間衆即此華藏莊嚴世界海不可説佛剎微塵世界種如天帝網分布在種種蘂香幢大蓮華之中是其彼果行所攝生報滿果所得之境今在經中不舉大數但舉中心十一箇世界種上下二十重重別相去一佛剎塵最下重世界各有一佛剎塵世界周匝圍繞而住其中次上第二重中即云二佛剎世界周匝圍繞次上第三重中即言三佛剎塵數世界周匝圍繞以次向上一重加一直至最上重世界中有二十佛剎塵世界周匝圍繞此中心十一箇世界種總皆如是此明十一地行門進修攝化境界報得中心十一箇即十一地報得上下二十重漸漸增廣者明十一地行門中一地有兩重因果為地地進修中皆一正果一向果其二十重中所有佛號皆是勝進中因果佛也所有世界是隨位中所化之境界也即明十一地進修攝化層降佛果故各隨位配之可見除此十一箇世界外周圍別舉出一百箇世界種者即明此十一地攝化十波羅蜜行遍輪圍山法界內故且隨方次第各有其十都言一百明遍不可説佛剎塵境界滿故近金剛輪圍山周圍有十箇世界種上下有四重者明十一地中四攝法遍故餘九十箇世界種不云重數者明但是十波羅蜜十中具百所攝化境故此是一箇因果竟自餘十箇四重世界配四攝法更作一配總舉中心十一箇世界種并周圍直至金剛輪圍山一百箇世界種總共有一百一十一箇世界種配十住十行十回向十地十一地五位法各有佛因果都有一百本五位中本自有十重因果為本五位中各有兩重因果即是十此為本五位佛因果與五位中作進修故即如此初會五位佛果是都有一百一十更有一箇世界種為明佛位是一遍一切中作一故若無此一位諸位不成故又明緣生之法皆須有一故緣生之法始成如一三五七九與十作緣但置二四六八十具滿數故是圓數不可加減是佛法世間法皆相似故如一日三日五日七日九日皆一三五七九為法者成緣生無盡一多相徹故明其一者非同時無前後中間故為一不自一與萬法作一故為萬法不自多為一作多故為成緣起法合如是一多自在無作任相成故如俗法一為陽二為陰陽動陰隨不可自用陰若自用即天地兩乖雲不興雨不施皆主伴陰陽動靜相順互為主伴方成緣生兩剛即缺兩柔即離為不成濟故是如來出世意在利生真不隨俗故行無所設也德無所濟也即佛自佛衆生自衆生若為利生施設法則即佛為陽德所設教為陰是故此經名為圓教佛處坎之一而設教即十以坎為師卦故是故普賢菩薩為明設教利生因果緣起法須自在不滯緣生故舉一百一十一世界種配其五位因果有一百一十之門為攝生報得有一箇世界種明其佛位與五位及一切諸行作多故還如眉間之衆勝音菩薩獨坐蓮華臺諸菩薩衆生其華鬚明主伴萬行一多相即故定慧觀之可見十下作一是其土字明仁士之法法合十一今以十一箇世界安立十一地法門四重世界明十波羅蜜四攝法之方便大意舉前座內衆及眉間衆明其所行之行此華藏世界明彼行中報得依果於中雜類世界即明所攝之衆生同住一處而境各異者約法界理智真俗不殊六釋華藏世界純雜無礙者為佛所行之行遍法界衆生界故既是行遍所得依果亦遍但業不相應者同住居而不見猶如靈神及諸鬼趣與人同處人不能見如經云譬如人身常有二天隨逐天常見人人不見天此經為佛行周遍依正亦遍不同三乘推淨土於餘方而致去來自他之相為彼小心根劣者且如是設教網故畢竟求大菩提心者還須歸此不二之門興遍周法界之行願也七明華藏世界圓攝三世業境者此華藏世界海明此教法一念三世故一念者為無念也無念即無三世古今等法以明法身無念一切衆生妄念三世多劫之法不離無念之中以是義故此華藏世界所有莊嚴境界能現諸佛業衆生三世所行行業因果總現其中或過去業現未來中或未來業現過去中或過去未來業現現在中或現在業現過去未來中如百千明鏡俱懸四面前後影像互相徹故為法界之體性無時故妄計三世之業頓現無時法中是故經言智入三世而無來往經云佛子汝應觀剎種威神力未來諸國土如夢悉令見十方諸世界過去國土海咸於一剎中現像猶如化三世一切佛及以其國土於一剎種中一切悉觀見論主頌曰三世無有時妄計三世法以真無妄想一念現三世三世無時者亦無有一念計著三世法總現無時中了達無時法一念成正覺八釋佛國本空何為華藏世界出生所緣者緣何事意緣意有四一為明二乘雖得解脫三界粗業無有福智不利衆生滯於涅槃二為三乘菩薩有樂生淨土淨相常存障法性如理染淨當情知見不普情存淨土不得自在不如此法隱現自在為利衆生顯勝福德故即具相萬差光明顯照若令衆生情無取著如幻雲散一物便無無有所得存其繫故三為怖一切法空衆生為法空無相之理謂言斷見空無福智不樂觀空樂取相縛隨境存業不能解脫者所現福德依正果故令觀空法空却無明成福德業四總為一切三乘及一切凡夫現廣大願行福智境界量度樣式令其倣學不偏執故經云諸佛國土如虗空無等無生無有相為利衆生普嚴淨本願力故住其中九明華藏世界因何得隱現自在者為從一切法空之理隨智現故得隱現自在世間龍鬼具有三毒猶能隱現何況法空空諸三毒純清淨智不能隱現自在如善財入彌勒樓閣以三昧力具見衆莊嚴從三昧起忽然不見一相都無善財白言此莊嚴何處去彌勒答言從來處去曰從何處來曰從菩薩智慧神通來依菩薩智慧神力而住無有去處亦無住處非集非常遠離一切又如幻師作諸幻事無所從來無所至去雖無來去以幻力故分明可見彼莊嚴事亦復如是無所從來亦無所去雖無來去然以慣習不可思議幻智力故及往昔大願力故如是顯現華藏世界亦復如是以如來大願智力法性自體空無性力隱現自在若隨法性萬相都無隨願智力衆相隨現隱現隨緣都無作者但以理智法爾自具不思議功不思議變無能作者自在隱現凡夫執著用作無明執障既無智用自在順法身萬象俱寂隨智用萬象俱生隨大悲常居生死但隨理智生死恆真以此三事隱顯萬端不離一真之智化儀百變十隨文釋義者此一品經長科為十二段經爾時普賢菩薩復告大衆言諸佛子此華藏莊嚴世界海是毗盧遮那如來往昔於世界海微塵數劫修菩薩行時一一劫中親近世界海微塵數佛一一佛所淨修世界海微塵數大願之所嚴淨諸佛子此華藏莊嚴世界海有須彌山微塵數風輪所持其最下風輪名平等住能持其上一切寶𦦨熾然莊嚴次上風輪名出生種種寶莊嚴能持其上淨光照曜摩尼王幢次上風輪名寶威德能持其上一切寶鈴次上風輪名平等𦦨能持其上日光明相摩尼王輪次上風輪名種種普莊嚴能持其上光明輪華次上風輪名普清淨能持其上一切華𦦨師子座次上風輪名聲遍十方能持其上一切珠王幢次上風輪名一切寶光明能持其上一切摩尼王樹華次上風輪名速疾普持能持其上一切香摩尼須彌雲次上風輪名種種宮殿遊行能持其上一切寶色香臺雲諸佛子彼須彌山微塵數風輪最在上者名殊勝威光藏能持普光摩尼莊嚴香水海此香水海有大蓮華名種種光明蘂香幢華藏莊嚴世界海住在其中四方均平清淨堅固金剛輪山周匝圍繞地海衆樹各有區別是時普賢菩薩欲重宣其義承佛神力觀察十方而説頌言世尊往昔於諸有微塵佛所修淨業故獲種種寶光明華藏莊嚴世界海廣大悲雲遍一切捨身無量等剎塵以昔劫海修行力今此世界無諸垢放大光明遍住空風力所持無動搖佛藏摩尼普嚴飾如來願力令清淨普散摩尼妙藏華以昔願力空中住種種堅固莊嚴海光雲垂布滿十方諸摩尼中菩薩雲普詣十方光熾然光𦦨成輪妙華飾法界周流靡不遍一切寶中放淨光其光普照衆生海十方國土皆周遍咸令出苦向菩提寶中佛數等衆生從其毛孔出化形梵主帝釋輪王等一切衆生及諸佛化現光明等法界光中演説諸佛名種種方便示調伏普應羣心無不盡華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在廣大願雲周法界於一切劫化羣生普賢智地行悉成所有莊嚴從此出論第一爾時普賢菩薩已下長行有二十四行經并二十行頌明歎佛往因行菩薩行修淨大願力報得風輪以持華藏世界及衆莊嚴經爾時普賢菩薩復告大衆言諸佛子此華藏莊嚴世界海大輪圍山住日珠王蓮華之上栴檀摩尼以為其身威德寶王以為其峯妙香摩尼而作其輪𦦨藏金剛所共成立一切香水流注其間衆寶為林妙華開敷香草布地明珠開飾種種香華處處盈滿摩尼為網周匝垂覆如是等有世界海微塵數衆妙莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而説頌言世界大海無有邊寶輪清淨種種色所有莊嚴盡奇妙此由如來神力起摩尼寶輪妙香輪及以真珠燈𦦨輪種種妙寶為嚴飾清淨輪圍所安住堅固摩尼以為藏閻浮檀金作嚴飾舒光發𦦨遍十方內外映徹皆清淨金剛摩尼所集成復雨摩尼諸妙寶其寶精奇非一種放淨光明普嚴麗香水分流無量色散諸華寶及栴檀衆蓮競發如衣布珍草羅生悉芬馥無量寶樹普莊嚴開華發蘂色熾然種種名衣在其內光雲四照常圓滿無量無邊大菩薩執蓋焚香充法界悉發一切妙音聲普轉如來正法輪諸摩尼樹寶粖成一一寶粖現光明毗盧遮那清淨身悉入其中普令見諸莊嚴中現佛身無邊色相無央數悉往十方無不遍所化衆生亦無限一切莊嚴出妙音演説如來本願輪十方所有淨剎海佛自在力咸令遍論二爾時已下有八行半經并二十行頌明歎蓮華之上寶輪圍山具衆嚴飾由如來神力所生經爾時普賢菩薩復告大衆言諸佛子此世界海大輪圍山內所有大地一切皆以金剛所成堅固莊嚴不可沮壞清淨平坦無有高下摩尼為輪衆寶為藏一切衆生種種形狀諸摩尼寶以為間錯散衆寶粖布以蓮華香藏摩尼分置其間諸莊嚴具充遍如雲三世一切諸佛國土所有莊嚴而為校飾摩尼妙寶以為其網普現如來所有境界如天帝網於中布列諸佛子此世界海地有如是等世界海微塵數莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而説頌言其地平坦極清淨安住堅固無能壞摩尼處處以為嚴衆寶於中相間錯金剛為地甚可悅寶輪寶網具莊嚴蓮華布上皆圓滿妙衣彌覆悉周遍菩薩天冠寶纓珞悉布其地為嚴好栴檀摩尼普散中咸舒離垢妙光明寶華發𦦨出妙光光𦦨如雲照一切散此妙華及衆寶普覆於地為嚴飾密雲興布滿十方廣大光明無有盡普至十方一切土演説如來甘露法一切佛願摩尼內普現無邊廣大劫最勝智者昔所行於此寶中無不見其地所有摩尼寶一切佛剎咸來入彼諸佛剎一一塵一切國土亦入中妙寶莊嚴華藏界菩薩遊行遍十方演説大士諸弘願此是道場自在力摩尼妙寶莊嚴地放淨光明備衆飾充滿法界等虗空佛力自然如是現諸有修治普賢願入佛境界大智人能知於此剎海中如是一切諸神變論三爾時已下十行半經并二十行頌歎輪圍山內平地金剛所成具足衆寶間錯其地華網莊嚴經爾時普賢菩薩復告大衆言諸佛子此世界海大地中有不可説佛剎微塵數香水海一切妙寶莊嚴其底妙香摩尼莊嚴其岸毗盧遮那摩尼寶王以為其網香水映徹具衆寶色充滿其中種種寶華旋布其上栴檀細粖澄垽其下演佛言音放寶光明無邊菩薩持種種蓋現神通力一切世界所有莊嚴悉於中現十寶階陛行列分布十寶欄楯周匝圍繞四天下微塵數一切寶莊嚴芬陀利華敷榮水中不可説百千億那由他數十寶尸羅幢恆河沙數一切寶衣鈴網幢恆河沙數無邊色相寶華樓閣百千億那由他數十寶蓮華城四天下微塵數衆寶樹林寶𦦨摩尼以為其網恆河沙數栴檀香諸佛言音光𦦨摩尼不可説百千億那由他數衆寶垣牆悉共圍繞周遍嚴飾爾時普賢菩薩欲重宣其義承佛神力觀察十力而説頌言此世界中大地上有香水海摩尼嚴清淨妙寶布其底安住金剛不可壞香藏摩尼積成岸日𦦨珠輪布若雲蓮華妙寶為纓珞處處莊嚴淨無垢香水澄渟具衆色寶華旋布放光明普震音聲聞遠近以佛威神演妙法階陛莊嚴具衆寶復以摩尼為間飾周回欄楯悉寶成蓮華珠網如雲布摩尼寶樹列成行華蘂敷榮光赫奕種種樂音恆競奏佛神通力令如是種種妙寶芬陀利敷布莊嚴香水海香𦦨光明無暫停廣大圓滿皆充遍明珠寶幢恆熾盛妙衣垂布為嚴飾摩尼鈴網演法音令其聞者趣佛智妙寶蓮華作城郭衆彩摩尼所嚴瑩真珠雲影布四隅如是莊嚴香水海垣牆繚繞皆周匝樓閣相望布其上無量光明恆熾然種種莊嚴清淨海毗盧遮那於往昔種種剎海皆嚴淨如是廣大無有邊悉是如來自在力論四爾時已下一十六行半經二十行頌明金剛寶地有衆香水海衆寶為底妙香嚴岸具衆莊飾經爾時普賢菩薩復告大衆言諸佛子一一香水海各有四天下微塵數香水河右旋圍繞一切皆以金剛為岸淨光摩尼以為嚴飾常現諸佛寶色光雲及諸衆生所有言音其河所有漩澓之處一切諸佛所修因行種種形相皆從中出摩尼為網衆寶鈴鐸諸世界海所有莊嚴悉於中現摩尼寶雲以覆其上其雲普現華藏世界毗盧遮那十方化佛及一切佛神通之事復出妙音稱揚三世佛菩薩名其香水中常出一切寶𦦨光雲相續不絶若廣説者一一河各有世界海微塵數莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而説頌言清淨香流滿大河金剛妙寶為其岸寶粖為輪布其地種種嚴飾皆珍好寶階行列妙莊嚴欄楯周回悉殊麗真珠為藏衆華飾種種纓鬘共垂下香水寶光清淨色恆吐摩尼競疾流衆華隨浪皆搖動悉奏樂音宣妙法細粖栴檀作泥垽一切妙寶同洄澓香藏氛氳布在中發𦦨流芬普周遍河中出生諸妙寶悉放光明色熾然其光布影成臺座華蓋珠纓皆具足摩尼王中現佛身光明普照十方剎以此為輪嚴飾地香水映徹常盈滿摩尼為網金為鐸遍覆香河演佛音克宣一切菩提道及以普賢之妙行寶岸摩尼極清淨恆出如來本願音一切諸佛曩所行其音普演皆令見其河所有漩流處菩薩如雲常踊出悉往廣大剎土中乃至法界咸充滿清淨珠王布若雲一切香河悉彌覆其珠等佛眉間相炳然顯現諸佛影論五爾時已下十二行半經二十行頌明各各香海具衆香河其河底岸具諸嚴飾右旋繞海經爾時普賢菩薩復告大衆言諸佛子此諸香水河兩間之地悉以妙寶種種莊嚴一一各有四天下微塵數衆寶莊嚴芬陀利華周匝遍滿各有四天下微塵數衆寶樹林次第行列一一樹中恆出一切諸莊嚴雲摩尼寶王照耀其間種種華香處處盈滿其樹復出微妙音聲説諸如來一切劫中所修大願復散種種摩尼寶王充遍其地所謂蓮華輪摩尼寶王香𦦨光雲摩尼寶王種種嚴飾摩尼寶王現不可思議莊嚴色摩尼寶王日光明衣藏摩尼寶王周遍十方普垂布光網雲摩尼寶王現一切諸佛神變摩尼寶王現一切衆生業報海摩尼寶王如是等有世界海微塵數其香水河兩間之地一一悉具如是莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而説頌言其地平坦極清淨真金摩尼共嚴飾諸樹行列蔭其中聳幹垂條萃若雲枝條妙寶所莊嚴華𦦨成輪光四照摩尼為果如雲布普使十方常現覩摩尼布地皆充滿衆華寶粖共莊嚴復以摩尼作宮殿悉現衆生諸影像諸佛影像摩尼王普散其地靡不周如是赫奕遍十方一一塵中咸見佛妙寶莊嚴善分布真珠燈網相間錯處處悉有摩尼輪一一皆現佛神通衆寶莊嚴放大光光中普現諸化佛一一周行靡不遍悉以十方廣開演摩尼妙寶芬陀利一切水中咸遍滿其華種種各不同悉現光明無盡歇三世所有諸莊嚴摩尼果中皆顯現體性無生不可取此是如來自在力此地一切莊嚴中悉現如來廣大身彼亦不來亦不去佛昔願力皆令見此地一一微塵中一切佛子修行道各見所記當來剎隨其意樂悉清淨論六爾時已下十五行半經二十行頌明香河兩間平地具樹華果衆妙莊嚴芬陀利華此云百葉白蓮華經爾時普賢菩薩復告大衆言諸佛子諸佛世尊世界海莊嚴不可思議何以故諸佛子此華藏莊嚴世界海一切境界一一皆以世界海微塵數清淨功德之所莊嚴爾時普賢菩薩欲重宣其義承佛神力觀察十方而説頌言此剎海中一切處悉以衆寶為嚴飾發𦦨騰空布若雲光明洞徹常彌覆摩尼吐雲無有盡十方佛影於中現神通變化靡暫停一切菩薩咸來集一切摩尼演佛音其音美妙不思議毗盧遮那昔所行於此寶內恆聞見清淨光明遍照尊莊嚴具中皆現影變化分身衆圍繞一切剎海咸周遍所有化佛皆如幻求其來處不可得以佛境界威神力一切剎中如是現如來自在神通事悉遍十方諸國土以此剎海淨莊嚴一切皆於寶中見十方所有諸變化一切皆如鏡中像但由如來昔所行神通願力而出生若有能修普賢行入於菩薩勝智海能於一切微塵中普現其身淨衆剎不可思議億大劫親近一切諸如來如其一切之所行一剎那中悉能現諸佛國土如虗空無等無生無有相為利衆生普嚴淨本願力故住其中論七爾時已下五行經二十行頌都結總歎此世界海如來無量功德莊嚴音切洄戶灰切澓伏音壇徒干切墠常演切佉丘伽切芬分音馥房六切沮才與切映於命切徹丑列切麗力制切蘂如水切澄直陵切垽魚靳切陛旁禮切欄勒丹切楯述尹切渟笛令切競巨敬切奏則候切垣于元切牆才良切繚了音繞而沼切卍萬音歇許揭切孛蒲沒切縛符郭切慣古患切
