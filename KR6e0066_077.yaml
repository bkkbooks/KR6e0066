以自心無自他心故即聖凡一理同體聖凡一理同體即聖凡心法悉知故以聖凡心一理故即身無內外諸見無內外見故即無邊世界虗空界平等自心與虗空界平等即無大小遠近中間既自心無大小遠近中間即智恒徧滿十方世界而無往來既智恒徧滿十方世界而無往來即能隨根對現色身自在既能隨根對現色身自在即應根說法自在即一身多身相入自在已下諸自在法皆如是修行以禪定智慧力性自融通非生滅妄想所知如是自無心無思無妄想之正智性自徧周而無來往隨時隨根為教化一切眾生故現作一切等眾生之事業皆無作者無有處所任性智用故如響應聲無有處所無作者故非往來故已下皆准此智知之修之經何以故菩薩摩訶薩持此法者少作功力疾得阿耨多羅三藐三菩提皆得具足一切佛法悉與三世諸佛法等論第十一何以故已下至與三世諸佛法等有兩行半經明聞此法勸恭敬受持以少方便速成佛分經爾時佛神力故法如是故十方各有十不可說百千億那由他佛剎微塵數世界六種震動雨出過諸天一切華雲香雲末香雲衣蓋幢幡摩尼寶等及以一切莊嚴具雲雨眾妓樂雲雨諸菩薩雲雨不可說如來色相雲雨不可說讚歎如來善哉雲雨如來音聲充滿一切法界雲雨不可說莊嚴世界雲雨不可說增長菩提雲雨不可說光明照耀雲雨不可說神力說法雲如此世界四天下菩提樹下菩提場菩薩宮殿中見於如來成等正覺演說此法十方一切諸世界中悉亦如是論第十二爾時佛神力故已下至一切世界中悉亦如是有十一行經明正法威感地六震動天興供雲供養法分如地動興供有三義一法威感也二諸菩薩聞法適悅三如經云法如是故經云受持此法少作功力疾得菩提者一念無思無依智現即菩提也經爾時佛神力故法如是故十方各過十不可說佛剎微塵數世界外有十佛剎微塵數菩薩摩訶薩來詣此土充滿十方作如是言善哉善哉佛子乃能說此諸佛如來最大誓願授記深法佛子我等一切同名普賢各從普勝世界普幢自在如來所來詣此土悉以佛神力故於一切處演說此法如此眾會如是所說一切平等無有增減我等皆承佛威佛力來此道場為汝作證如此道場我等十佛剎微塵數菩薩而來作證十方一切諸世界中悉亦如是論第十三爾時佛神力故已下至十方一切世界中悉亦如是有十行半經明普勝世界一切處普賢菩薩俱來作證分如十方各過十不可說世界佛剎微塵數世界外有十佛剎微塵數菩薩摩訶薩來詣此土充滿十方者此即是普賢行滿故歎言善哉善哉者歎教法難遇故佛子乃能說此諸佛如來最大誓願受記深法者明普賢行願是理智大悲圓滿法果行已終故以果終是佛受記深法故明法身智身大悲之行塵塵之內具佛普賢無盡行故號曰甚深佛子我等一切同名普賢明法行無二以此名同各從普勝世界普幢自在如來所來者處道謙和名為普勝世界能破自他憍慢及諸煩惱號之普幢幢者明心不隨境動理智悲行重重徧周故名為普勝幢雖處生死不與染俱名為自在此佛號世界是隨行因果之名來詣此土者明昇進位極至此法也以佛神力故於一切處演說此法者前明身業行周此明語業徧周已下如文可見經爾時普賢菩薩摩訶薩以佛神力自善根力觀察十方暨于法界欲開示菩薩行欲宣說如來菩提界欲說大願界欲說一切世界劫數欲明諸佛隨時出現欲說如來隨根熟眾生出現令其供養欲明如來出世功不唐捐欲明所種善根必獲果報欲明大威德菩薩為一切眾生現形說法令其開悟而說頌言論第十四爾時普賢菩薩已下有七行經明普賢菩薩觀眾并陳說頌之意分如經欲開示菩薩行者普賢行是欲說如來行菩提界者法身無性根本智是欲說大願界者是普賢發興大悲願者是欲說一切世界劫數者如下頌中云一劫入一切劫一切劫入一劫一念入一切劫者是欲明如來出世功不唐捐者明應根不失時欲明所種善根必獲果報者明佛菩薩應根眾生獲益欲明大威德菩薩為一切眾生現形說法者明理智徧周無來往而對現色身隨根授法已上十事法皆已下頌中一一具明經汝等應歡喜捨離於諸蓋一心恭敬聽菩薩諸願行往昔諸菩薩最勝人師子如彼所修行我當次第說亦說諸劫數世界并諸業及以無等尊於彼而出興如是過去佛大願出于世云何為眾生滅除諸苦惱一切論師子所行相續滿得佛平等法一切智境界見於過去世一切人師子放大光明網普照十方界思惟發是願我當作世燈具足佛功德十力一切智一切諸眾生貪恚癡熾然我當悉救脫令滅惡道苦發如是誓願堅固不退轉具修菩薩行獲十無礙力如是誓願已修行無退怯所作皆不虗說名論師子於一賢劫中千佛出于世彼所有普眼我當次第說如一賢劫中無量劫亦然彼未來佛行我當分別說如一佛剎種無量剎亦然未來十力尊諸行我今說諸佛次興世隨願隨名號隨彼所得記隨其所壽命隨所修正法專求無礙道隨所化眾生正法住於世隨所淨佛剎眾生及法輪演說時非時次第淨羣生隨諸眾生業所行及信解上中下不同化彼令修習入於如是智修其最勝行常作普賢業廣度諸眾生身業無障礙語業悉清淨意行亦如是三世靡不然菩薩如是行究竟普賢道出生淨智日普照於法界未來世諸劫國土不可說一念悉了知於彼無分別行者能趣入如是最勝地此諸菩薩法我當說少分智慧無邊際通達佛境界一切皆善入所行不退轉具足普賢慧成滿普賢願入於無等智我當說彼行於一微塵中悉見諸世界眾生若聞者迷亂心發狂如於一微塵一切塵亦然世界悉入中如是不思議一一塵中有十方三世法趣剎皆無量悉能分別知一一塵中有無量種佛剎種種皆無量於一靡不知法界中所有種種諸異相趣類各差別悉能分別知深入微細智分別諸世界一切劫成壞悉能明了說知諸劫脩短三世即一念眾行同不同悉能分別知深入諸世界廣大非廣大一身無量剎一剎無量身十方中所有異類諸世界廣大無量相一切悉能知一切三世中無量諸國土具足甚深智悉了彼成敗十方諸世界有成或有壞如是不可說賢德悉深了或有諸國土種種地嚴飾諸趣亦復然斯由業清淨或有諸世界無量種雜染斯由眾生感一切如其行無量無邊剎了知即一剎如是入諸剎其數不可知一切諸世界悉入一剎中世界不為一亦復無雜亂世界有仰覆或高或復下皆是眾生想悉能分別知廣博諸世界無量無有邊知種種是一知一是種種普賢諸佛子能以普賢智了知諸剎數其數無邊際知諸世界化剎化眾生化法化諸佛化一切皆究竟一切諸世界微細廣大剎種種異莊嚴皆由業所起無量諸佛子善學入法界神通力自在普徧於十方眾生數等劫說彼世界名亦不能令盡唯除佛開示世界及如來種種諸名號經於無量劫說之不可盡何況最勝智三世諸佛法從於法界生充滿如來地清淨無礙念無邊無礙慧分別說法界得至於彼岸過法諸世界廣大及微細修習所莊嚴一念悉能知其中人師子修佛種種行成於等正覺示現諸自在如是未來世次第無量劫所有人中尊菩薩悉能知所有諸行願所有諸境界如是勤修行於中成正覺亦知彼眾會壽命化眾生以此諸法門為眾轉法輪菩薩如是知住普賢行地智慧悉明了出生一切佛現在世所攝一切諸佛土深入此諸剎通達於法界彼諸世界中現在一切佛於法得自在言論無所礙亦知彼眾會淨土應化力盡無量億劫常思惟是事調御世間尊所有威神力無盡智慧藏一切悉能知出生無礙眼無礙耳鼻身無礙廣長舌能令眾歡喜最勝無礙心廣大普清淨智慧徧充滿悉知三世法善學一切化剎化眾生化世化調伏化究竟化彼岸世間種種別皆由於想住入佛方便智於此悉明了眾會不可說一一為現身悉使見如來度脫無邊眾諸佛甚深智如日出世間一切國土中普現無休息了達諸世間假名無有實眾生及世界如夢如光影於諸世間法不生分別見善離分別者亦不見分別無量無數劫解之即一念知念亦無念如是見世間無量諸國土一念悉超越經於無量劫不動於本處不可說諸劫即是須臾頃莫見脩與短究竟剎那法心住於世間世間住於心於此不妄起二非二分別眾生世界劫諸佛及佛法一切如幻化法界悉平等普於十方剎示現無量身知身從緣起究竟無所著依於無二智出現人師子不著無二法知無二非二了知諸世間如𦦨如光影如響亦如夢如幻如變化如是隨順入諸佛所行處成就普賢智普照深法界眾生剎染著一切皆捨離而興大悲心普淨諸世間菩薩常正念論師子妙法清淨如虗空而興大方便見世常迷倒發心咸救度所行皆清淨普徧諸法界諸佛及菩薩佛法世間法若見其真實一切無差別如來法身藏普入世間中雖在於世間於世無所著譬如清淨水影像無去來法身徧世間當知亦如是如是離染著身世皆清淨湛然如虗空一切無有生知身無有盡無生亦無滅非常非無常示現諸世間除滅諸邪見開示於正見法性無來去不著我我所譬如工幻師示現種種事其來無所從去亦無所至幻性非有量亦復非無量於彼大眾中示現量無量以此寂定心修習諸善根出生一切佛非量非無量有量及無量皆悉是妄想了達一切趣不著量無量諸佛甚深法廣大深寂滅甚深無量智知甚深諸趣菩薩離迷倒心淨常相續巧以神通力度無量眾生未安者令安安者示道場如是徧法界其心無所著不住於實際不入於涅槃如是徧世間開悟諸羣生法數眾生數了知而不著普雨於法雨充洽諸世間普於諸世界念念成正覺而修菩薩行未曾有退轉世間種種身一切悉了知如是知身法則得諸佛身普知諸眾生諸劫及諸剎十方無涯際智海無不入眾生身無量一一為現身佛身無有邊智者悉觀見一念之所知出現諸如來經於無量劫稱揚不可盡諸佛能現身處處般涅槃一念中無量舍利各差別如是未來世有求於佛果無量菩提心決定智悉知如是三世中所有諸如來一切悉能知名住普賢行如是分別知無量諸行地入於智慧處其輪不退轉微妙廣大智深入如來境入已不退轉說名普賢慧一切最勝尊普入佛境界修行不退轉得無上菩提無量無邊心各各差別業皆由想積集平等悉了知染汙非染汙學心無學心不可說諸心念念中悉知了知非一二非染亦非淨亦復無雜亂皆從自想起如是悉明見一切諸眾生心想各不同起種種世間以如是方便修諸最勝行從佛法化生得名為普賢眾生皆妄起善惡諸趣想由是或生天或復墮地獄菩薩觀世間妄想業所起妄想無邊故世間亦無量一切諸國土想網之所現幻網方便故一念悉能入眼耳鼻舌身意根亦如是世間想別異平等皆能入一一眼境界無量眼皆入種種性差別無量不可說所見無差別亦復無雜亂各隨於自業受用其果報普賢力無量悉知彼一切一切眼境界大智悉能入如是諸世間悉能分別知而修一切行亦復無退轉佛說眾生說及以國土說三世如是說種種悉了知過去中未來未來中現在三世互相見一一皆明了如是無量種開悟諸世間一切智方便邊際不可得論第十五正申頌意此一段頌有一百二十一行竝一時普頌前十法明普賢行終因果理智悲願皆圓滿故如頌中自明音切頑五還切鈍徒困切闕苦穴切庸涌從切啞於雅切懶落旱切墯徒果切洎巨義切汙烏故切蕩徒浪切暨巨至切澍注音
