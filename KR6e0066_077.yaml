body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論如來隨好光明功德品第三十五之餘經佛子假使有人以億那由他佛剎碎為微塵一塵一剎復以爾許微塵數佛剎碎為微塵如是微塵悉置左手持以東行過爾許微塵數世界乃下一塵如是東行盡此微塵南西北方四維上下亦復如是如是十方所有世界若著微塵及不著者悉以集成一佛國土寶手於汝意云何如是佛土廣大無量可思議不答曰不也如是佛土廣大無量希有奇特不可思議若有眾生聞此譬喻能生信解當知更為希有奇特佛言寶手如是如是如汝所說若有善男子善女人聞此譬喻而生信者我授彼記決定當成阿耨多羅三藐三菩提當獲如來無上智慧寶手設復有人以千億佛剎微塵數如上所說廣大佛土抹為微塵以此微塵依前譬喻一一下盡乃至集成一佛國土復抹為塵如是次第展轉乃至經八十反如是一切廣大佛土所有微塵菩薩業報清淨肉眼於一念中悉能明見亦見百億廣大佛剎微塵數佛如頗棃鏡清淨光明照十佛剎微塵數世界寶手如是皆是清淨金網轉輪王甚深三昧福德善根之所成就論十三佛子假使有人已下至末有二十一行經明此清淨金網轉輪王肉眼所見境界廣大難量分隨文釋義者於此品中十三段文約立三門一說光明所因從何所來二蒙光觸者以何因緣三明天鼓從何所因而能說法第一說光所因從何所來者從如來自體性自清淨法身根本無依住智自性清淨功德所生能成相好無所依止故名隨好光明功德品此之光明一切眾生同共有之為不以普賢行願助揚顯發不能顯現普賢願行不以此光明體亦不能得成法界無眼大用是故此經名為覺行互嚴經至此二行圓滿遂乃各各自顯其功前品大人之相因普賢行成還令普賢說故此品隨好光明是佛自果無作法身無依住根本智光是佛自說但依教主以取經意舉光之中其隨好光無量今依此品略舉其三一初舉如來應正等覺有隨好名圓滿王者都陳根本智無依無性而能普照自在名圓滿王別舉此光中隨用云此隨好中出大光明名為熾盛此明隨用能破迷惑七百萬阿僧祇光明而為眷屬者此明隨用備根七百者都數約七菩提分息六道苦乃為七百百者數之長也皆令發起一乘中十地道故為此光體是佛果光光所及者皆依本故又約八地已前有行者開發為七百萬者萬行阿僧祇者明光體備根徧周次舉兜率天為菩薩時放大光明名幢王照十佛剎塵世界地獄眾生得眾苦休息得十種眼耳鼻舌身意清淨捨地獄身生兜率天聞天鼓音而為說法得離垢三昧登十地道此明光照往因十信解心修力不固有因放逸生惡道者遇光苦息三業復本此明三生成果第一生修十信解心心不精專作諸惡業第二生惡道住地獄中三蒙光照觸苦息生兜率天天鼓響音告法成十地果此為三生若也於此教中依智發心專求不懈無放逸心修方便定入佛智慧生如來家為佛真子便名成佛如輪王第一夫人所生太子具輪王相雖未當位是王真種體無差別如是十住初發心菩薩創從信種修方便定自顯正智生如來家雖未有神足通力當其佛位然其真智慧種與佛不殊從此一生加行修治隨其正智入變易生神通自在如人一生身語意業修有為十善尚得生天報得天神通何況正智慧現前法身體會無心作惡專學慈悲豈可不入變易生身也若也直約第一義論通於生死總為變化悟智即佛不約神通為神通是利眾生之權方便故若直取覺義智是正覺自餘神通降生成佛總屬行收今至此品明覺行圓滿佛前之二種光明一名圓滿王一名光幢王者且約佛果法身根本智圓明破惑之大用一切修道不會此根本智光無成佛期二舉足下千輻輪光名圓滿王者明成菩薩昇進加行之光為足表所行行故常放四十種光明者成十信十住十行十迴向地前四位也中有一光隨於一切六道種種諸欲所樂皆令成熟乃至阿鼻地獄受無間苦遇斯光者皆生兜率天天鼓響音說法及以悔除諸惑得離垢三昧或得無依智印定一光是一切六道應根起信之光餘三是十住十行十迴向加行成十地道果滿之光為地前三賢位是圓會悲智願行已終十地但成此地前十迴向之功不別有位以此但放四十光明不放五十也無功之果是佛自位不屬行故明足下光是表十信十住十行十迴向願行之位十地約法而成功滿前願故三右手掌中一隨好光明出現無量自在神力者此表引接光以手是引接義故此乃宜同一切世間三界所行方便非世間天人及三乘所知故且舉此三種光明備世諸有已徧自餘廣多不論第二蒙光觸者何因緣者經意明先世有信心故如經云汝往昔親近眾善知識即明昔曾有信心之種雖造惡業生於地獄為有信種光及其身苦息種存便能發意捨身生天若無先世信種設光照身者不覺不知三明天鼓從何所因緣而能說法如經云但以毗盧遮那三昧力故般若波羅蜜威德力故出音聲大約三緣而得聞之一毗盧遮那菩薩三昧之力二於無體性三昧中有自在無作妙慧三眾生昔曾聞此無性法身大智慧之種方堪得聞如是妙聲迷除得道如離垢三昧者是無性妙理自體無中邊等虗空性性自無垢具無限智慧知見自無我所須以方便定發起方明如法慧菩薩入無量方便三昧是也又如善財於妙峯山上得憶念一切諸佛智慧光明者是也總是十住初心創始顯發故至此品中不離初處滿故還向普光明殿說十信心處說此十一品十一地及佛果之門表此意也不離一念不隔一時而成果故方便三昧者任無作性蕩然自定不收不攝任心自安萬惑自淨道自現爾方可任用施為不失其理然以普賢願行方成悲智大用無作法界緣起之門一如其上五位進修行者是也如經云於色聲香味觸其內具有五百煩惱其外亦有五百煩惱瞋行多者二萬一千貪行多者二萬一千癡行多者二萬一千等分行者二萬一千已上都有八萬四千如色聲香味觸各有五蘊共十使煩惱皆意根為主如是色聲香味觸為外受想行識及意為內如因內外心境成緣皆能成十使煩惱色聲香味觸受想行識及意能所互參內外各十如是內外十種煩惱一一皆能起十使煩惱即內外所緣各有五百煩惱由迷心境內外相資由內五蘊成境因外五境所起能緣由此內外能所二緣十使煩惱因之不息乃至八萬四千如是十使皆因五蘊所成一一使中有百以將十使中五蘊以五蘊成十使一一蘊中一百五蘊中有五百以五蘊成五塵五塵中有五百以塵蘊為內外之上共為一千配七識中有七千分三世三七二十一當二萬一千即依貪瞋癡多者及等分各二萬一千共為八萬四千餘如文自具如十使中各有內外五蘊十使互參即有一百於一百十使一一使皆有五蘊為五百由內心緣外境互為主伴以此內外各有五百共成一千由末那與六識相因作業有七千煩惱法如前配三七二十一亦當二萬一千若約此品法門天鼓所說無生理智及說悔除過惡之法甚善甚妙修道發菩提心者可以持誦作意倣而學之以方便定慧力勤思觀察還同此品剎那成佛於中法門融通次第具如此品如善財童子所見善知識皆云我已先發阿耨多羅三藐三菩提心云何教我學菩薩道者明菩提無求無修無三世故但求其行菩提無修此隨好光明功德但與行作光明令行無依無修作者一切發心者先修方便三昧而以顯之從此理中方當加行是故名以果成因門以因即果門以理智之外無別行故即理事無礙以為進修是故但求其菩薩道即行是菩提明隨行無得故是以發普賢行未圓滿故求菩薩道以菩提無三世不出一剎那萬行皆圓滿故名為佛乘即乃直論智境不分三世延促等障凡夫及三乘謂三無數劫及無限劫是此教中智境不遷之門故以本如是故法如是故非佛神通使然也三乘情見謂佛神通以迷實法本來如是此普光明殿中十一品法是都該一部及無盡古今總不移毫念也須當如是信解修行名悟佛知見入佛知見故當知十地及等妙二位總依十信十住十行十迴向法則而成普賢行品第三十六論將釋此品約作四門分別一釋品名目二釋品來意三釋說教之主四隨文釋義一釋品名目者何故名為普賢行品為明從初會菩提場如來是佛果如十普賢菩薩并已下菩薩神天等眾是佛普賢行故從第二會普光明殿說不動智佛無礙智等十智如來以成十信心明其能信自心是不動智佛是自心之本果餘九亦然文殊師利覺首目首等十首菩薩是自身所行普賢之行以次十住十行十迴向十地十一地所有十十等佛號十十等菩薩名乃至無量佛號無量菩薩名皆是自身自心進修佛果自普賢行直至於此普賢行品是一箇自心佛果一箇自心普賢行至如來出現品方明自己佛果現理智體用方終以此出現品中如來放眉間光灌文殊頂口中光灌普賢口令其理智法身妙慧文殊師利共普賢菩薩自相問答如來出現所有境界方明自身理智妙慧普賢行海佛果進修始終圓滿付囑流通亦在出現品內離世間品是佛果後常道無始終普賢行故法界品是佛常道法界如以佛果後普賢行依義亦可作利世間品是自己道行已滿純是利益世間無世間可離無出世間可至故以普賢行恒利益眾生為本故餘義至後品重明以此品通該十信已來至出現品一勢始終因果本末以立其品名大約此一會十定已來十一品經總以十定之體通收始末不出一剎那際故此品以明佛果位內自行普賢行滿故以立其名二釋品來意者為明前品果極性智光明以利眾生此品明普賢行能利物故有理智無行理智乃處俗不圓有行無理智其行無由出俗故理行體徹方成不二自在之門以此此品須來三釋說教之主者此品何故普賢為能說教之主者為此品行門是普賢之行滿故還令普賢自說明普賢是法身本智妙理之用故二法獨行即不圓故先舉法身性智之光次說普賢之行故四隨文釋義者於此一品經長科為十五段經爾時普賢菩薩摩訶薩復告諸菩薩大眾言佛子如向所演此但隨眾生根器所宜略說如來少分境界何以故諸佛世尊為諸眾生無智作惡計我我所執著於身顛倒疑惑邪見分別與諸結縛恒共相應隨生死流遠如來道故出興于世論第一爾時普賢菩薩已下至出興于世有五行半經明眾生去佛道遠佛乃出世前品所說略說少分境界分隨文釋義者如向所說者言前十身相海品及隨好光明功德品是略說少分為邪見恒與結使繫縛恒相應故遠離如來道不云出現若以正見何出何沒何成何壞何梵何淨若得自心如是平等不染不淨是佛出興結縛者六處結縛眼耳鼻舌身意邪見者所謂八邪邪念邪命邪思邪精進邪定邪語邪業邪慧計我我所者身邊二見是顛倒疑惑者四倒無常計常無我計我非樂計樂不淨計淨如來為如是眾生示現出興略說少分福德境界而實如來無出無沒唯道相應者智境自會不於諸佛作出生滅沒之見但自以定觀二門以治心垢身邊見謝智現相應經佛子我不見一法為大過失如諸菩薩於他菩薩起瞋心者何以故佛子若諸菩薩於餘菩薩起瞋恚心即成就百萬障門故論第二佛子已下至成就百萬障門故有兩行半經明普賢菩薩眾生有大過惡不曾見一過惡若見一菩薩有瞋心成百萬障門分經何等為百萬障所謂不見菩提障不聞正法障生不淨世界障生諸惡趣障生諸難處障多諸疾病障多被謗毀障生頑鈍諸趣障壞失正念障闕少智慧障眼障耳障鼻