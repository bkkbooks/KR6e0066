body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論世主妙嚴品第一之九經復次出現寶光主海神得以等心施一切衆生福德海衆寶莊嚴身解脫門不可壞金剛幢主海神得巧方便守護一切衆生善根解脫門不雜塵垢主海神得能竭一切衆生煩惱海解脫門恆住波浪主海神得令一切衆生離惡道解脫門吉祥寶月主海神得普滅大癡暗解脫門妙華龍髻主海神得滅一切諸趣苦與安樂解脫門普持光味主海神得淨治一切衆生諸見愚癡性解脫門寶𦦨華光主海神得出生一切寶種性菩提心解脫門金剛妙髻主海神得不動心功德海解脫門海潮靁音主海神得普入法界三昧門解脫門爾時出現寶光主海神承佛威力普觀一切主海神衆而說頌言不可思議大劫海供養一切諸如來普以功德施羣生是故端嚴最無比一切世間皆出現衆生根欲靡不知普為弘宣大法海此是堅幢所欣悟一切世間衆導師法雲大雨不可測消竭無窮諸苦海此離垢塵入此門一切衆生煩惱覆流轉諸趣受衆苦為其開示如來境普水宮神入此門佛於難思劫海中修行諸行無有盡永截衆生癡惑網寶月於此能明入佛見衆生常恐怖流轉生死大海中示彼如來無上道龍髻悟解生欣悅諸佛境界不思議法界虗空平等相能淨衆生癡惑網如是持味能宣說佛眼清淨不思議一切境界悉該覽普示衆生諸妙道此是華光心所悟魔軍廣大無央數一剎那中悉摧滅心無傾動難測量金剛妙髻之方便普於十方演妙音其音法界靡不周此是如來三昧境海潮音神所行處復次普發迅流主河神得普雨無邊法雨解脫門普潔泉㵎主河神得普現一切衆生前令永離煩惱解脫門離塵淨眼主河神得以大悲方便普滌一切衆生諸惑塵垢解脫門十方遍吼主河神得恆出饒益衆生音解脫門普救護衆生主河神得於一切含識中恆起無惱害慈解脫門無熱淨光主河神得普示一切清涼善根解脫門普生歡喜主河神得修行具足施令一切衆生永離慳著解脫門廣德勝幢主河神得作一切歡喜福田解脫門光照普世主河神得能令一切衆生雜染者清淨瞋毒者歡喜解脫門海德光明主河神得能令一切衆生入解脫海恆受具足樂解脫門爾時普發迅流主河神承佛威力普觀一切主河神衆而說頌言如來往昔為衆生修治法海無邊行譬如霈澤清炎暑普滅衆生煩惱熱佛昔難宣無量劫以願光明淨世間諸根熟者令悟道此普潔神心所悟大悲方便等衆生悉現其前常化誘普使淨治煩惱垢淨眼見此深歡悅佛演妙音普使聞衆生愛樂心歡喜悉使滌除無量苦此遍吼神之解脫佛昔修習菩提行為利衆生無量劫是故光明遍世間護神憶念生歡喜修昔修行為衆生種種方便令成熟普淨福海除衆苦無熱見此心欣慶施門廣大無窮盡一切衆生咸利益能令見者無慳著此普喜神之所悟佛昔修行實方便成就無邊功德海能令見者靡不欣此勝幢神心悟悅衆生有垢咸淨治一切怨害等生慈故得光照滿虗空普世河神見歡喜佛是福田功德海能令一切離諸惡乃至成就大菩提此海光神之解脫復次柔軟勝味主稼神得與一切衆生法滋味令成就佛身解脫門時華淨光主稼神得能令一切衆生受廣大喜樂解脫門色力勇健主稼神得以一切圓滿法門淨諸境界解脫門增益精氣主稼神得見佛大悲無量神通變化力解脫門普生根果主稼神得普現佛福田令下種無失壞解脫門妙嚴環髻主稼神得普發衆生淨信華解脫門潤澤淨華主稼神得大慈愍濟諸衆生令增長福德海解脫門成就妙香主稼神得廣開示一切行法解脫門見者愛樂主稼神得能令法界一切衆生捨離懈怠憂情等諸惡普清淨解脫門離垢光明主稼神得觀察一切衆生善根隨應說法令衆會歡喜滿足解脫門爾時柔軟勝味主稼神承佛威力普觀一切主稼神衆而說頌言如來無上功德海普現明燈照世間一切衆生咸救護悉與安樂無遺者世尊功德無有邊衆生聞者不唐捐悉使離苦常歡喜此是時華之所入善逝諸力皆圓滿功德莊嚴現世間一切衆生悉調伏此法勇力能明證佛昔修治大悲海其心念念等世間是故神通無有邊增益精氣能觀見佛遍世間常現前一切方便無空過悉淨衆生諸惑惱此普生神之解脫佛是世間大智海放淨光明無不遍廣大信解悉從生如是嚴髻能明入如來觀世起慈心為利衆生而出現示彼恬怡最勝道此淨華神之解脫善逝所修清淨行菩提樹下具宣說如是教化滿十方此妙香神能聽受佛於一切諸世間悉使離憂生大喜所有根欲皆治淨可愛樂神斯悟入如來出現於世間普觀衆生心所樂種種方便而成熟此淨光神解脫門復次吉祥主藥神得普觀一切衆生心而勤攝取解脫門栴檀林主藥神得以光明攝取衆生俾見者無空過解脫門離塵光明主藥神得能以淨方便滅一切衆生煩惱解脫門名稱普聞主藥神得能以大名稱增長無邊善根海解脫門毛孔現光主藥神得大悲幢速赴一切病境界解脫門破暗清淨主藥神得療治一切盲冥衆生令智眼清淨解脫門普發吼聲主藥神得能演佛音說諸法差別義解脫門蔽日光幢主藥神得能作一切衆生善知識令見者咸生善根解脫門明見十方主藥神得清淨大悲藏能以方便令生信解解脫門普發威光主藥神得方便令念佛滅一切衆生病解脫門爾時吉祥主藥神承佛威力普觀一切主藥神衆而說頌言如來智慧不思議悉知一切衆生心能以種種方便力滅彼羣迷無量苦大雄善巧難測量凡有所作無空過必使衆生諸苦滅栴檀林神能悟此汝觀諸佛法如是往昔勤修無量劫而於諸有無所著此離塵光所入門佛百千劫難可遇若有得見及聞名必令獲益無空過此普稱神之所了如來一一毛孔中悉放光明滅衆患世間煩惱皆令盡此現光神所入門一切衆生癡所盲惑業衆苦無量別佛悉蠲除開智照如是破暗能觀見如來一音無限量能開一切法門海衆生聽者悉了知此是大音之解脫汝觀佛智難思議普現諸趣救羣生能令見者皆從化此蔽日幢深悟了如來大悲方便海為利世間而出現廣開正道示衆生此見方神能了達如來普放大光明一切十方無不照令隨念佛生功德此發威光解脫門復次布華如雲主林神得廣大無邊智海藏解脫門擢幹舒光主林神得廣大修治普清淨解脫門生芽發曜主林神得增長種種淨信芽解脫門吉祥淨葉主林神得一切清淨功德莊嚴聚解脫門垂布𦦨藏主林神得普門清淨慧恆周覽法界解脫門妙莊嚴光主林神得普知一切衆生行海而興布法雲解脫門可意靁聲主林神得忍受一切不可意聲演清淨音解脫門香光普遍主林神得十方普現昔所修治廣大行境界解脫門妙光迥曜主林神得以一切功德法饒益世間解脫門華果光味主林神得能令一切見佛出興常敬念不忘莊嚴功德藏解脫門爾時布華如雲主林神承佛威力普觀一切主林神衆而說頌言佛昔修習菩提行福德智慧悉成滿一切諸力皆具足放大光明出世間悲門無量等衆生如來往昔普淨治是故於世能依益此擢幹神之所了若有衆生一見佛必使入於深信海普示一切如來道此妙芽神之解脫一毛所集諸功德劫海宣揚不可盡諸佛方便難思議淨葉能明此深義我念如來於往昔供養剎塵無量佛一一佛所智漸明此𦦨藏神之所了一切衆生諸行海世尊一念悉了知如是廣大無礙智妙莊嚴神能悟入恆演如來寂妙音普生無等大歡喜隨其解欲皆令悟此是靁音所行法如來示現大神通十方國土皆周遍佛昔修行悉令見此普香光所入門衆生譣詖不修德迷惑沈流生死中為彼闡明衆智道此妙光神之所見佛為業障諸衆生經於億劫時乃現其餘念念常令見此味光神所觀察復次寶峯開華主山神得入大寂定光明解脫門華林妙髻主山神得修習慈善根成熟不可思議數衆生解脫門高幢普照主山神得觀察一切衆生心所樂嚴淨諸根解脫門離塵寶髻主山神得無邊劫海勤精進無厭怠解脫門光照十方主山神得以無邊功德光普覺悟解脫門大力光明主山神得能自成熟復令衆生捨離愚迷行解脫門威光普勝主山神得拔一切苦使無有餘解脫門微密光輪主山神得演教法光明顯示一切如來功德解脫門普眼現見主山神得令一切衆生乃至於夢中增長善根解脫門金剛堅固眼主山神得出現無邊大義海解脫門爾時開華匝地主山神承佛威力普觀一切主山神衆而說頌言往修勝行無有邊今獲神通亦無量法門廣闢如塵數悉使衆生深悟喜衆相嚴身遍世間毛孔光明悉清淨大慈方便示一切華林妙髻悟此門佛身普現無有邊十方世界皆充滿諸根嚴淨見者喜此法高幢能悟入歷劫勤修無懈倦不染世法如虗空種種方便化羣生悟此法門名寶髻衆生盲暗入險道佛哀愍彼舒光照普使世間從睡覺威光悟此心生喜昔在諸有廣修行供養剎塵無數佛令衆生見發大願此地大力能明入見諸衆生流轉苦一切業障恆纏覆以智慧光悉滅除此普勝神之解脫一一毛孔出妙音隨衆生心讚諸佛悉遍十方無量劫此是光輪所入門佛遍十方普現前種種方便說妙法廣益衆生諸行海此現見神之所悟法門如海無邊量一音為說悉令解一切劫中演不窮入此方便金剛目復次普德淨華主地神得以慈悲心念念普觀一切衆生解脫門堅福莊嚴主地神得普現一切衆生福德力解脫門妙華嚴樹主地神得普入諸法出生一切佛剎莊嚴解脫門普散衆寶主地神得修習種種諸三昧令衆生除障垢解脫門淨目觀時主地神得令一切衆生常遊戲快樂解脫門金色妙眼主地神得示現一切清淨身調伏衆生解脫門香毛發光主地神得了知一切佛功德海大威力解脫門寂音悅意主地神得普攝持一切衆生言音海解脫門妙華旋髻主地神得充滿佛剎離垢性解脫門金剛普持主地神得一切佛法輪所攝持普出現解脫門爾時普德淨華主地神承佛威力普觀一切主地神衆而說頌言如來往昔念念中大慈悲門不可說如是修行無有已故得堅牢不壞身三世衆生及菩薩所有一切衆福聚悉現如來毛孔中福嚴見已生歡喜廣大寂靜三摩地不生不滅無來去嚴淨國土示衆生此樹華神之解脫佛於往昔修諸行為令衆生銷重障普散衆寶主地神見此解脫生歡喜如來境界無邊際念念普現於世間淨目觀時主地神見佛所行心慶悅妙音無限不思議普為衆生滅煩惱金色眼神能了悟見佛無邊勝功德一切色形皆化現十方法界悉充滿香毛發光常見佛如是普化諸衆生妙音普遍於十方無量劫中為衆說悅意地神心了達從佛得聞深敬喜佛毛孔出香𦦨雲隨衆生心遍世間一切見者皆成熟此是華旋所觀處堅固難壞如金剛不可傾動踰須彌佛身如是處世間普持得見生歡喜復次寶峯光耀主城神得方便利益衆生解脫門妙嚴宮殿主城神得知衆生根教化成熟解脫門清淨喜寶主城神得常歡喜令一切衆生受諸福德解脫門離憂清淨主城神得救諸怖畏大悲藏解脫門華燈𦦨眼主城神得普明了大智慧解脫門𦦨幢明現主城神得普方便示現解脫門盛福威光主城神得普觀察一切衆生令修廣大福德海解脫門淨光明身主城神得開悟一切愚暗衆生解脫門香髻莊嚴主城神得觀如來自在力普遍世間調伏衆生解脫門寶峯光目主城神得能以大光明破一切衆生障礙山解脫門爾時寶峯光耀主城神承佛威力普觀一切主城神衆而說頌言導師如是不思議光明遍照於十方衆生現前悉見佛教化成熟無央數諸衆生根各差別佛悉了知無有餘妙嚴宮殿主城神入此法門心慶悅如來無量劫修行護持往昔諸佛法意常承奉生歡喜妙寶城神悟此門如來昔已能除遣一切衆生諸恐怖而恆於彼起慈悲此離憂神心悟喜佛智廣大無有邊譬如虗空不可量華目城神斯悟悅能學如來之妙慧如來色相等衆生隨其樂欲皆令見𦦨幢明現心能悟習此方便生歡喜如來往修衆福海清淨廣大無邊際福德幢光於此門觀察了悟心欣慶衆生愚迷諸有中如世生盲卒無覩佛為利益興於世清淨光神入此門如來自在無有邊如雲普遍於世間乃至現夢令調伏此是香幢所觀見衆生癡暗如盲瞽種種障蓋所纏覆佛光照徹普令開如是寶峯之所入復次淨莊嚴幢道場神得出現供養佛廣大莊嚴具誓願力解脫門須彌寶光道場神得現一切衆生前成就廣大菩提行解脫門靁音幢相道場神得隨一切衆生心所樂令見佛於夢中為說法解脫門雨華妙眼道場神得能雨一切難捨衆寶莊嚴具解脫門清淨𦦨形道場神得能現妙莊嚴道場廣化衆生令成熟解脫門華纓垂髻道場神得隨根說法令生正念解脫門雨寶莊嚴道場神得能以辨才普雨無邊歡喜法解脫門勇猛香眼道場神得廣稱讚諸佛功德解脫門金剛彩雲道場神得示現無邊色相樹莊嚴道場解脫門蓮華光明道場神得菩提樹下寂然不動而充遍十方解脫門妙光照耀道場神得顯示如來種種力解脫門爾時淨莊嚴幢道場神承佛威力普觀一切道場神衆而說頌言我念如來往昔時於無量劫所修行諸佛出興咸供養故獲如空大功德佛昔修行無盡施無量剎土微塵等須彌光照菩提神憶念善逝心欣慶如來色相無有窮變化周流一切剎乃至夢中常示現靁幢見此生歡喜昔行捨行無量劫能捨難捨眼如海如是捨行為衆生此妙眼神能悟悅無邊色相寶𦦨雲現菩提場遍世間𦦨形清淨道場神見佛自在生歡喜衆生行海無有邊佛普彌綸雨法雨隨其根解除疑惑華纓悟此心歡喜無量法門差別義辨才大海皆能入雨寶嚴具道場神於心念念恆如是於不可說一切土盡世言詞稱讚佛故獲名譽大功德此勇眼神能憶念種種色相無邊樹普現菩提樹王下金剛彩雲悟此門恆觀道樹生歡喜十方邊際不可得佛坐道場智亦然蓮華步光淨信心入此解脫深生喜道場一切出妙音讚佛難思清淨力及以成就諸因行此妙光神能聽受復次寶印手足行神得普雨衆寶生廣大歡喜解脫門蓮華光足行神得示現佛身坐一切光色蓮華座令見者歡喜解脫門最勝華髻足行神得一一心念中建立一切如來衆會道場解脫門攝諸善見足行神得舉足發步悉調伏無邊衆生解脫門妙寶星幢足行神得念念中化現種種蓮華網光明普雨衆寶出妙音聲解脫門樂吐妙音足行神得出生無邊歡喜海解脫門栴檀樹光足行神得以香風普覺一切道場衆會解脫門蓮華光明足行神得一切毛孔放光明演微妙法音解脫門微妙光明足行神得其身遍出種種光明網普照耀解脫門積集妙華足行神得開悟一切衆生令生善根海解脫門爾時寶印手足行神承佛威力普觀一切足行神衆而說頌言佛昔修行無量劫供養一切諸如來心恆慶悅不疲厭喜門深大猶如海念念神通不可量化現蓮華種種香佛坐其上普遊往紅色光神皆覩見諸佛如來法如是廣大衆會遍十方普現佛通不可議最勝華神悉明矚十方國土一切處於中舉足若下足悉能成就諸羣生此善見神心悟喜如衆生數普現身此一一身充法界悉放淨光雨衆寶如是解脫星幢入如來境界無邊際普雨法雨皆充滿衆會覩佛生歡喜此妙音聲之所見佛音聲量等虗空一切音聲悉在中調伏衆生靡不遍如是栴檀能聽受一切毛孔出化音闡揚三世諸佛名聞此音者皆歡喜蓮華光神如是見佛身變現不思議步步色相猶如海隨衆生心悉令見此妙光明之所得十方普現大神通一切衆生悉開悟衆妙華神於此法見已心生大歡喜復次淨喜境界身衆神得憶佛往昔誓願海解脫門光照十方身衆神得光明普照無邊世界解脫門海音調伏身衆神得大音普覺一切衆生令歡喜調伏解脫門淨華嚴髻身衆神得身如虗空周遍住解脫門無量威儀身衆神得示一切衆生諸佛境界解脫門最勝光嚴身衆神得令一切飢乏衆生色力滿足解脫門淨光香雲身衆神得除一切衆生煩惱垢解脫門守護攝持身衆神得轉一切衆生愚癡魔業解脫門普現攝化身衆神得普於一切世主宮殿中顯示莊嚴相解脫門不動光明身衆神得普攝一切衆生皆令生清淨善根解脫門爾時淨喜境界身衆神承佛威力普觀一切身衆神衆而說頌言我憶須彌塵劫前有佛妙光出興世世尊於彼如來所發心供養一切佛如來身放大光明其光法界靡不充衆生遇者心調伏此照方神之所見如來聲震十方國一切言音悉圓滿普覺羣生無有餘調伏聞此心歡慶佛身清淨恆寂滅普現衆色無諸相如是遍住於世間此淨華神之所入導師如是不思議隨衆生心悉令見或坐或行或時住無量威儀所悟門佛百千劫難逢遇出興利益能自在令世悉離貧窮苦最勝光嚴入斯處如來一一齒相間普放香燈光𦦨雲滅除一切衆生惑離垢雲神如是見衆生染惑為重障隨逐魔徑常流轉如來開示解脫道守護執持能悟入我觀如來自在力光布法界悉充滿處王宮殿化衆生此普現神之境界衆生迷妄具衆苦佛在其中常救護皆令滅惑生喜心不動光神所觀見復次妙色那羅延執金剛神得見如來示現無邊色相身解脫門日輪速疾幢執金剛神得佛身一一毛如日輪現種種光明雲解脫門須彌華光執金剛神得化現無量身大神變解脫門清淨雲音執金剛神得無邊隨類音解脫門妙臂天主執金剛神得現為一切世間主開悟衆生解脫門可愛樂光明執金剛神得普開示一切佛法差別門咸盡無遺解脫門大樹靁音執金剛神得以可愛樂莊嚴具攝一切樹神解脫門師子王光明執金剛神得如來廣大福莊嚴聚皆具足明了解脫門密𦦨吉祥目執金剛神得普觀察險惡衆生心為現威嚴身解脫門蓮華摩尼髻執金剛神得普雨一切菩薩莊嚴具摩尼髻解脫門爾時妙色那羅延執金剛神承佛威力普觀一切執金剛神衆而說頌言汝應觀法王法王法如是色相無有邊普現於世間佛身一一毛光網不思議譬如淨日輪普照十方國如來神通力法界悉周遍一切衆生前示現無盡身如來說法音十方莫不聞隨諸衆生類悉令心滿足衆見牟尼尊處世宮殿中普為諸羣生闡揚於大法法海漩澓處一切差別義種種方便門演說無窮盡無邊大方便普應十方國遇佛淨光明悉見如來身供養於諸佛億剎微塵數功德如虗空一切所瞻仰神通力平等一切剎皆現安坐妙道場普現衆生前𦦨雲普照世種種光圓滿法界無不及示佛所行處復次普賢菩薩摩訶薩入不思議解脫門方便海入如來功德海所謂有解脫門名嚴淨一切佛國土調伏衆生令究竟出離有解脫門名普詣一切如來所修具足功德境界有解脫門名安立一切菩薩地諸大願海有解脫門名普現法界微塵數無量身有解脫門名演說遍一切國土不可思議數差別名有解脫門名一切微塵中悉現無邊諸菩薩神通境界有解脫門名一念中見三世劫成壞事有解脫門名示現一切菩薩諸根海各入自境界有解脫門名能以神通力化現種種身遍無邊法界有解脫門名顯示一切菩薩修行法次第門入一切智廣大方便爾時普賢菩薩摩訶薩以自功德復承如來威神之力普觀一切衆會海已即說頌言佛所莊嚴廣大剎等於一切微塵數清淨佛子悉滿中雨不思議最妙法如於此會見佛坐一切塵中悉如是佛身無去亦無來所有國土皆明現顯示菩薩所修行無量趣地諸方便及說難思真實理令諸佛子入法界出生化佛如塵數普應羣生心所欲入深法界方便門廣大無邊悉開演如來名號等世間十方國土悉充遍一切方便無空過調伏衆生皆離垢佛於一切微塵中示現無邊大神力悉坐道場能演說如佛往昔菩提行三世所有廣大劫佛念念中皆示現彼諸成壞一切事不思議智無不了佛子衆會廣無限欲共測量諸佛地諸佛法門無有邊能悉了知甚為難佛如虗空無分別等真法界無所依化現周行靡不至悉坐道場成正覺佛以妙音廣宣暢一切諸地皆明了普現一一衆生前盡與如來平等法復次淨德妙光菩薩摩訶薩得遍往十方菩薩衆會莊嚴道場解脫門普德最勝燈光照菩薩摩訶薩得一念中現無盡成正覺門教化成熟不思議衆生界解脫門普光師子幢菩薩摩訶薩得修習菩薩福德莊嚴出生一切佛國土解脫門普寶𦦨妙光菩薩摩訶薩得觀察佛神通境界無迷惑解脫門普音功德海幢菩薩摩訶薩得於一衆會道場中示現一切佛土莊嚴解脫門普智光照如來境菩薩摩訶薩得隨逐如來觀察甚深廣大法界藏解脫門普覺悅意聲菩薩摩訶薩得親近承事一切諸佛供養藏解脫門普清淨無盡福威光菩薩摩訶薩得出生一切神變廣大加持解脫門普寶髻華幢菩薩摩訶薩得普入一切世間行出生菩薩無邊行門解脫門普相最勝光菩薩摩訶薩得能於無相法界中出現一切諸佛境界解脫門爾時淨德妙光菩薩摩訶薩承佛威力普觀一切菩薩解脫門海已即說頌言十方所有諸國土一剎那中悉嚴淨以妙音聲轉法輪普遍世間無與等如來境界無邊際一念法界悉充滿一一塵中建道場悉證菩提起神變世尊往昔修諸行經於百千無量劫一切佛剎皆莊嚴出現無礙如虗空佛神通力無限量充滿無邊一切劫假使經於無量劫念念觀察無疲厭汝應觀佛神通境十方國土皆嚴淨一切於此悉現前念念不同無量種觀佛百千無量劫不得一毛之分限如來無礙方便門此光普照難思剎如來往劫在世間承事無邊諸佛海是故一切如川騖咸來供養世所尊如來出現遍十方一一塵中無量土其中境界皆無量悉住無邊無盡劫佛於曩劫為衆生修習無邊大悲海隨諸衆生入生死普化衆會令清淨佛住真如法界藏無相無形離諸垢衆生觀見種種身一切苦難皆鎖滅復次海月光大明菩薩摩訶薩得出生菩薩諸地諸波羅蜜教化衆生及嚴淨一切佛國土方便解脫門雲音海光離垢藏菩薩摩訶薩得念念中普入法界種種差別處解脫門智生寶髻菩薩摩訶薩得不可思議劫於一切衆生前現清淨大功德解脫門功德自在王淨光菩薩摩訶薩得普見十方一切菩薩初詣道場時種種莊嚴解脫門善勇猛蓮華髻菩薩摩訶薩得隨諸衆生根解海普為顯示一切佛法解脫門普智雲日幢菩薩摩訶薩得成就如來智永住無量劫解脫門大精進金剛䐡菩薩摩訶薩得普入一切無邊法印力解脫門香𦦨光幢菩薩摩訶薩得顯示現在一切佛始修菩薩行乃至成就智慧聚解脫門大明德深美音菩薩摩訶薩得安住毗盧遮那一切大願海解脫門大福光智生菩薩摩訶薩得顯示如來遍法界甚深境界解脫門爾時海月光大明菩薩摩訶薩承佛威力普觀一切菩薩衆莊嚴海已即說頌言諸波羅蜜及諸地廣大難思悉圓滿無量衆生盡調伏一切佛土皆嚴淨如佛教化衆生界十方國土皆充滿一念心中轉法輪普應羣情無不遍佛於無量廣大劫普現一切衆生前如其往昔廣修治示彼所行清淨處我覩十方無有餘亦見諸佛現神通悉坐道場成正覺衆會聞法共圍繞廣大光明佛法身能以方便現世間普隨衆生心所樂悉稱其根而雨法真如平等無相身離垢光明淨法身智慧寂靜身無量普應十方而演法法王諸力皆清淨智慧如空無有邊悉為開示無遺隱普使衆生同悟入如佛往昔所修治乃至成於一切智今放光明遍法界於中顯現悉明了佛以本願現神通一切十方無不照如佛往昔修治行光明網中皆演說十方境界無有盡無等無邊各差別佛無礙力發大光一切國土皆明顯論已上諸衆皆悉如上以義科文隨義稱歎教門弘大不用文繁得意即得此初會之內四十七衆之中已前七衆前已釋訖音切漩全音澓伏音㵎古雁切霈普貝切軟而兗切恬徒亷切怡與之切檀徒干切栴之連切療力弔切盲莫耕切蠲古玄切擢直角切幹古案切饒如招切𦦨以贍切譣虛檢切詖彼義切怠徒改切匝子合切闢蒲益切懈戒音倦渠卷切染而琰切戲虛義切旋徐專切踰羊朱切瞽公五切綸力脣切譽余恕切矚之欲切騖亡句切
