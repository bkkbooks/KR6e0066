body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論論夫以有情之本依智海以為源含識之流總法身而為體只為情生智隔想變體殊達本情亡知心體合今此大方廣佛華嚴經者明衆生之本際示諸佛之果源其為本也不可以功成其為源也不可以行得功亡本就行盡源成源本無功能隨緣自在者即此毗盧遮那也以本性為先智隨根應大悲濟物以此為名依本如是設其教澤滂流法界以潤含生於是寄位四天示形八相菩提場內現蘭若以始成普光法堂處報身之大宅普賢長子舉果德於藏身文殊小男創啓蒙於金色以海印三昧周法界而降靈用普眼之法門覩塵中之剎海依正二報身土交參因果兩門體用相徹以釋天之寶網彰十剎以重重取離垢之摩尼明十身而隱隱無邊剎境自他不隔於毫端十世古今始終不移於當念其為廣也以虗空而為量其為小也處極微而無跡十方無卷匪虧於小相之中纖塵不舒含十方而非礙於智海果德殊分於五位之門常住法堂示進修於九天之上此方如是十剎同然聖衆如雲海會相入智凡不礙狀多鏡以納衆形彼此無妨若千燈而共一室此經總有四十品之勝典玄開果德之門百萬億之妙言咸舉佛華之行海十身十會闡十十之法門十處十方啓十通而疏十辨出現品內示因果以結始終給孤獨園利人天之明法界目連鶖子隔視聽於對顏六千比丘啓十明於路上覺城東際五衆咸臻古佛廟前同登十智善財發明導首用彰來衆齊然又成五位法門具德行其軌範令使啓蒙易達解行無疑還信首文殊之前正證妙峯之頂經過五衆成一百一十之法門至慈氏之園結會一生之佛果返示文殊之初友明以果同因後入普賢之妙身彰體用圓極此經名大方廣佛華嚴經者大以無方為義方以理智為功廣則毫剎相含佛乃體用無作華喻行門可樂能敷理事之功嚴即依正莊嚴經即貫穿縫綴世主妙嚴品者菩薩示生皆為世主同臻海會故號妙嚴品者類會同流法門均隔為品此經總有四十品之勝典此品建初故稱第一是故言大方廣佛華嚴經世主妙嚴品第一釋此一部之經總作十門分別第一明依教分宗第二明依宗教別第三明教義差別第四明成佛同別第五明見佛差別第六明說教時分第七明淨土權實第八明攝化境界第九明因果延促第十明會教始終第一明依教分宗夫如來成道體應真源理事二門一多相徹智境圓寂何法不周只為器有差殊軌儀各異始終漸頓隨根不同設法應宜大小全別時分因果延促不同化佛本身施詮各異國土淨穢增減不同地位果因自有投分創學之流未諳教跡執權成實迷不進修若不咸舉衆宗類其損益無以了其迷滯者矣今略分十法以辨闡猷使得學者知宗遷權就實不滯其行速證菩提第一小乘戒經為情有為宗第二菩薩戒為情有及真俱示為宗第三般若教說空彰實為宗第四解深密經為不空不有為宗第五楞伽經五法三自性八識二無我為宗第六維摩經以會融染淨二見現不思議為宗第七法華經會權就實為宗第八大集經以守護正法為宗第九涅槃經明佛性為宗第十名大方廣佛華嚴經以此經名一切諸佛根本智慈因圓果滿一多相徹法界理事自在緣起無礙佛乘為宗已上分宗皆是承前先德所立宗旨設有少分增減不同為見解各別大意名目亦多相似如西域及此方諸德各立宗教後當更明第一小乘戒經為情有為宗者為如來創為凡夫造業處說是應作是不應作捨者善不捨者不善如此立教未為實有如此有教且約凡情虗妄之處橫計諸惡以教制之令生人天是故戒序云若欲生天上及生人中者常當護戒足勿令有毀損衆生有為作業虗妄非實得故生人天無常虗妄非實未得法身智身非為實有宗且為情有宗於小乘中為軌持教也如華嚴經持戒即不然經云身是梵行耶身業四威儀乃至佛法僧十衆七遮和尚羯磨壇場等是梵行耶如是諦觀求梵行者了不可得是故名為清淨梵行如梵行品說如是清淨行者名持佛性戒得佛法身故乃至初發心時便成正覺以持佛性戒故與佛體齊理事平等混真法界如是持戒不見自身能持戒者不見他身有破戒者非凡夫行非賢聖行不見自身發菩提心不見諸佛成等正覺若好若惡若有少法可得不名菩提不名淨行當如是觀如是性戒即法身也法身者即如來智慧也如來智慧者即正覺也是故不同小乘有取捨故第二如梵網經菩薩戒為情有及真俱示為宗者如來為凡夫之中有大心衆生樂行慈悲有欣求佛果者說盧舍那佛為本身千百億為化身頓令識末還本故經言如是千百億各接微塵衆俱來至我所又言若人受佛戒即入諸佛位位同大覺已真是諸佛子即為性戒故即為真宗此乃為大心衆生頓示法身性戒下劣者得漸一教應二根如是千百億各接微塵衆俱來至我所明捨權而就實此為實有教當教之內頓示權實故不同小乘前亦無常後亦無常為但生人天故雖然立實有宗不同華嚴經毗盧遮那所說也此經仍隨化身所化方來至本身也圓教之宗一下頓示本身本法界大智報身因果理事齊彰又如華嚴經中世界量與梵網經中蓮華形量亦不同廣狹全別廣如下文所說第三般若教為說空彰實為宗者為如來初為人天凡夫說二乘教繫著理事俱實不能離障為說空教破所繫著故般若經中說十八種空法世間三寶四諦三世等一切皆空空亦空廣如經說此乃空却無明諸障等業無明總盡障業皆無自性涅槃自然顯著此為真有不名空宗雖然為真有所說教門多有成壞故未可為圓如華嚴經具報相好莊嚴能虗能實當部之內當品之中十十菩薩等上下自相輪貫空有之法不獨孤行又以普賢文殊上下交參理事相徹互相交映一部之典品品相徹句句相參一品之中四十品經同入一言之內十萬頌之齊麾一成即一切成一壞即一切壞總以性齊時齊行齊故如上等齊說法亦齊如是齊故如今成佛與三世佛齊成佛故為無三世故為無時故不同彼教成壞別時故因果前後故第四解深密經為不空不有宗者如來說於有教空教之後說此一部之教和會有無二見為不空不有即說九識為純淨無染識如瀑水流生多波浪諸波浪等以水為依五六七八等識皆以阿陀那識為依故如彼波浪以水為依如深密經云如善鏡面若有一影生緣現前唯一影起若二若多影生緣現前有多影起非此鏡面轉變為影亦無受用滅盡可得此明五六七八識所依第九淨識處也又云如是菩薩雖由法住智為依止為建立故此經意欲令於識處便明識體本唯真智故如彼瀑流不離水體而生波浪又如明鏡依彼淨體無所分別含多影像不礙有而常無故如是自心所現識相不離本體無作淨智所現影相都無自他內外等執任用隨智無所分別以破空有二繫為不空不有故深密經頌曰阿陀那識甚深細一切種子如瀑流我於凡愚不開演恐彼分別執為我阿陀那識甚深細者引彼凡流就識成智不同二乘及漸始學菩薩破相成空不同凡夫繫而實有不同彼故不空不有何法不空為智能隨緣照機利物故何法不有為智正隨緣時無性相故無生住滅故以是義故名不空不有此經雖復如是於心識之處令知空有無二華嚴經則不然但彰本身本法界一真之根本智佛體用故混真性相法報之海直為上上根人頓示佛果德一真法界本智以為開示悟入之門不論隨妄而生識等法華經以佛智慧示悟衆生使得清淨故出現於世故不為餘乘若二若三又三乘之人於佛性相之法如來不許彼知解故法華經云種種性相義我及十方佛乃能知是事舍利弗辟支佛及不退諸菩薩皆悉不能知以法華經會三乘權學來歸佛乘實法界故門前三駕且受權乘露地白牛方明實德以此義故於中有少分義意與華嚴經相符龍女即是所乘白牛之乘又與善財同其所得是故華嚴教門直彰本體用法界佛果門直授上根凡夫令其悟入不同深密經中安立五六七八九識施設權門如深密經權施第九阿陀那識意有異途為二乘之人久厭患生死修空滅識直趣空寂又第二時說般若等教為回二乘及漸學菩薩多說空破有以六波羅蜜為行所乘於中二乘雖少分回心及漸學菩薩樂空增勝為彼權學菩薩初對治門還與小乘初對治門少分相似但有一分慈悲增勝未證法身佛性根本智等道理但以空門而為所乘六波羅蜜而為行相初對治門還同二乘無常不淨白骨微塵等觀方入空觀二乘趣滅菩薩留生以空無我等觀折伏我法不令增長元來未是法身佛性根本智為見未真故樂空增勝以是義故解深密經方便安立七八識外別說九識為純淨識云七八識以淨識為依止故未即直為說第八種子識為如來藏者為彼學徒畏苦習故若說業種恆真生怖難信故是故權且安立第九阿陀那識為淨識故欲令不滅識性長大菩提是故維摩經云未具佛法亦不滅受而取證也受既不滅想識亦然如楞伽經直為根熟者說第八識業種為如來藏下文更明維摩經云塵勞之疇為如來種等夫修道之士品類異途解行差殊千端萬別除二乘之外菩薩之乘有四品不同一修空無我菩薩二漸見佛性菩薩三頓見佛性菩薩四以如來自性清淨智以五位加行起差別智滿普賢行成大慈悲菩薩究竟不出剎那際充滿十方佛果門此略示名目下文廣明如華嚴經說有一類菩薩經百千億那由他劫行六波羅蜜不生佛家猶名假名菩薩廣會在下文以雖見佛性未彰智業猶名假名菩薩第五楞伽經以五法三自性八識二無我為宗者彼經於南海中楞伽山說如來於此山下過羅婆那夜叉王與摩諦菩薩乘華宮殿來請如來於此山上說法其山高峻下瞻大海傍無門戶得神通者堪能升往乃表心地法門無修無證者方能升也下瞻大海表其心海本自清淨因境風所轉識浪波動欲明達境自空心海自寂心境俱寂事無不照猶如大海無風日月參羅煥然明現彼經意直為根熟菩薩頓說種子業識為如來藏異彼二乘滅識趣寂者故亦為異彼般若修空菩薩樂空增勝者故直明識體本性全真便成智用故如彼大海無風即境像更明心海法門亦復如是了真即識成智此經異彼深密經意別立九識接引初根漸令留惑長大菩提故不令其心植種於空亦不令其心如彼敗種解深密經乃是入惑之初門楞伽維摩直示惑之本實楞伽即明八識為如來藏淨名即觀身實相觀佛亦然淨名與楞伽略同深密經文與此二部少別也如華嚴經不爾佛身及境界法門行相懸自不同說彼楞伽經即是化身所說境界即是穢土山峯所居法門說識境界為真問答即以大慧菩薩為首化身明教是權大慧且論簡擇如華嚴經教佛身即是本真法報境界即是華藏所居法門即是佛果法界為門問答即是文殊普賢理事智之妙用五位行相因果互融十剎十身體徹相入若論同別未可具言更待下文依位廣辨第六維摩經不思議為宗者維摩經與華嚴十種別一種同別者一淨土莊嚴別二佛身諸相報化別三不思議德神通別四所設法門對根別五諸有聞法來衆別六設教安立法門別七淨名菩薩建行別八所闡法門處所別九常隨佛衆部從別十所付法藏流通別一同者入道方便法門略同一淨土莊嚴別者如維摩經中所說淨土如來以足指按地即三千大千世界若干百千珍寶嚴飾譬如寶莊嚴佛無量功德寶莊嚴土一切大衆歎未曾有而皆自見坐寶蓮華而未說無盡佛剎莊嚴等事在一毫塵中如華嚴經中具說十佛毗盧遮那境界十蓮華藏世界海一一世界海有無盡世界海重重相入一塵之內有無盡世界海圓滿十方佛境界衆生境界互相涉入不相障礙衆寶莊嚴如光如影廣如經說不但獨言三千大千世界之所嚴淨二佛身諸相報化別者說此維摩經是三十二大人之相化佛所說說華嚴經佛是九十七大人之相及十華藏世界海微塵數大人之相實報如來之所說也三不思議德神通別者如維摩經說菩薩神通以須彌之高廣內芥子中能以四大海水入一毛孔又小室之內能容三萬二千師子之座各各高八萬四千由旬八千菩薩五百聲聞百千天人維摩詰置其右手掌擎其大衆往詣菴園又以手斷取東方妙喜佛國來至此土示於大衆送還本處如是神變且為權學三乘聲聞菩薩等衆現如斯事何以故為權教聲聞菩薩等見道未實自他未亡所現神變依根所見皆有往來分劑限量又是一時之間聖意以神力變化起諸小根令漸增進故非是法爾力故如華嚴經中以本法力法如是故能以一塵之內含容十方一切佛剎衆生剎總在塵中世界不小微塵不大十方世界所有微塵一一塵中總皆如是如經所說菩薩於一小衆生身中成等正覺廣度衆生其小衆生不知不覺當知佛以權教引小根故身外見佛現神通力而有來去實教之中以自本覺自覺本心身心性相與佛無異無有內外往來諸見是故毗盧遮那佛不移本處而身遍坐一切道場十方來衆不移本處而隨化往都無來去亦無神力所致是故經言法如是故經中每言以佛神力及法如是力者以佛神力推佛為尊法如是故推其本德都無變化一一國剎身心性相以依本故不隨妄故大小諸境皆如光如影互相映徹周遍十方都無往來都無分限即一一衆生身諸毛孔之內周遍十方不同權教以其神力分劑往來擎來送去致斯妄見違本法身障真菩提本覺性智是故淨名菩薩現斯神變已方陳實教維摩經云觀身實相觀佛亦然我觀如來前際不來後際不去今則不住如阿閦佛品廣明是故權教小見樂欲希奇菩薩稱根粗施接引令生樂學方授實門不可以執化成真恆迷智眼識權就實遷入法界之門有作之法難成隨緣無作無辦作者勞而無功不作隨緣自就無功之功功不虗棄有功之功功皆無常多劫積修終歸敗壞不如一念緣起無生超彼三乘權學等見四所設法門對根別者彼維摩經對二乘根令回向菩提入大乘故又對大乘中滯淨菩薩悲智未滿者令進修故即如衆香世界諸來菩薩衆欲還本土請佛世尊願賜少法如來依根見彼菩薩滯於淨土悲智心劣便為說法令學有盡無盡解脫門下文云不離大慈不捨大悲深發一切智心而不忽忘教化衆生終不厭倦於四攝法常念順行在諸禪定如地獄想於生死中如園觀想見來求者如善師想廣如維摩經說彼經對二乘三乘悲智未滿令且漸修增長悲智未即一下頓示佛門未即說言十住初心便成正覺未即示其廣大妙事皆有分劑故五諸有來衆聞法別者如維摩經中所有來衆除文殊慈氏等大菩薩衆舍利弗等影響聲聞餘外來衆總是三乘之中權學之衆設有於中菩薩生於諸趣同類俱來皆欲成就三乘權學漸令增進未說圓滿諸佛本乘如華嚴經中所有來衆皆是乘如來乘佛智果德自體法身具普賢行而隨影現十方剎海一切道場還成如來所乘本法無有一箇三乘根機設有三乘根機如盲如聾不知不覺猶如盲人對於日月猶如聾人聽天樂音如業貧人對天寶藏如大福德處於地獄亦如餓鬼臨大海邊三乘之器道力未窮未回心者常居法界海中諸佛境界與佛同德同身終不能信不覺不知別求佛見如華嚴經云佛子設有菩薩於無量百千億那由他劫行六波羅蜜修習種種菩提分法若未聞此如來不思議功德法門或時聞已不信不解不順不入不得名為真實菩薩以不能生如來家故當知聞法衆全別維摩經中娑婆之衆彼此未亡香積諸徒垢淨全在當知此類並是見解未真守一方之淨剎雖名菩薩諦道未圓如是之徒未詳佛意雖有欣菩提之志願滯淨剎以居心彼與法身智身懸隔是故法華經云不退諸菩薩其數如恆沙亦復不能知即如華嚴之衆自身與佛身無別自智與佛智無差性相含容一多同別居法界海之智水示作魚龍住涅槃之大宅現陰陽而化物主伴自在交映相參師弟互融因果通徹並是如斯之衆也六設教安立法門別者彼維摩經以淨名居士現少許不思議之通變令二乘回心又處於生死現身有疾令知染淨無二又表菩薩大悲有疾菩薩具陳不二之門建定慧觀智用彰不求之法最要故云夫求法者於一切法應無所求然未似華嚴經具陳十住十行十回向十地等覺五位六位行相因果同別法門七淨名菩薩示行別者淨名為表大悲示入生死現其病行華嚴經毗盧遮那以大悲示入生死成正覺行彰大智能出世故八所闡法門處所別者說維摩經在毗耶離城菴羅園及在淨名之室說華嚴經在摩竭國菩提場中及一切世界及一切塵中說九常隨佛衆別者說維摩經時聲聞為常隨佛衆但具五百說華嚴經時總是一乘大菩薩衆為常隨佛衆具十佛剎微塵大衆總是具普賢文殊體用等衆十所付法藏流通別者彼維摩經囑纍品中說佛告彌勒菩薩言彌勒我今以是無量億阿僧祇劫所集阿耨多羅三藐三菩提法付囑於汝故即以其經付囑已成菩薩已生佛家者華嚴經如來出現品中付囑流通即以其經法付囑凡夫初心始能見道生在佛家者何以然此經難入許人能證以自證故方堪能說表三乘是權但以聖勸修證所有得法未成實故所有說法者亦未實故華嚴經云此經珍寶不入一切餘衆生手唯除如來法王真子生如來家種如來種諸善根者佛子若無此等佛之真子如是法門不久散滅問曰若計佛之真子即十方世界無盡無邊以世界微塵莫知其數何須慮此經若無真子即便散滅答曰此經意者付囑凡夫令覺悟入此法門故令生佛家使其轉教佛種不斷即凡夫令得入真之境若囑纍諸大菩薩凡夫無緣諸聖自明無凡夫修學者凡夫道中佛種即斷此經散滅以此義故付囑凡夫令修不付已前大菩薩舊見道者一入道方便同者維摩經云夫求法者於一切法應無所求乃至觀身實相觀佛亦然我觀如來前際不來後際不去今則無住等是初觀智門略同於入道行相門戶次第軌則全別廣如下明第七法華經會權入實為宗者此經引彼三根之人歸一乘實教故引衆流而歸大海攝三末而還源藏法師等前諸大德會為共教一乘為三乘同聞故華嚴經為別教一乘為不與三乘同聞故參詳此理會此二門法華經引權器以歸真華嚴者頓示大根而直受雖一乘名合法事略同論其軌範有多差別今欲備舉事廣難周略舉十門用知綱目十門者一者教主別二放光別三國土別四請法主別五大會莊嚴真化別六序分之中列衆別七龍女轉身成佛別八龍女成佛所居國土別九六千之衆發心別十受諸聲聞遠記別一教主別者說此法華經即是化身佛說還過去滅度多寶佛來證成此經三世諸佛同共宣說如華嚴經即不然教主即是毗盧遮那為教主故即是法報理智真身具無量相海功德之身之所莊嚴三世諸佛同為一際一時一法界報相重重無有障礙古今一際非三世故舊佛非過去今佛非新出為根本智性相齊理事不異故如是本佛說本法頓受大根故不是化佛故不似法華經有舊佛滅度多寶如來今佛出世說法華經以是義故言教主別二放光明別者說法華經雖放眉間毫相果光所照境界但言萬八千土皆如金色仍有限量不稱無邊無量無盡故但彰果法不彰因位華嚴一部經典教行因果表法光明始終具十後當更明三國土別者說法華經時三變世界令成淨土移諸天人置於他土然後安置他方來衆變此穢境令成淨剎說華嚴經時即此娑婆世界即是蓮華藏世界一一世界互相含入經云一一世界滿十方十方入一亦無餘世界不增亦不減無比功德故如是又云諸佛成道在一小衆生身中化無量衆其彼小衆生不知不覺只為凡聖同體無移轉相纖塵之內自他同體不同法華之會移轉人天方明淨剎此是對權根乃分自他滯見者之所建立是故今明國土別也四請法主別者說法華經時請法主者即是舍利弗以為勸請之首說華嚴經時佛令文殊普賢隨位菩薩各自說自位法門為說法首佛表果法舉果為因起大悲行成根本智果體自成故無言不說也以大悲行從無作根本智起故文殊普賢表因位可說佛果法示悟衆生阿僧祇品世間數法廣大難量唯佛究竟不屬五位中因果門故是佛自位內法門還佛自說隨好光明功德品即是如來自成因果後自說佛法法爾之力恆常福智光明之法門亦不屬五位之內行相因果故佛亦自說此明佛果無二愚也除此二品經外諸餘三十八品皆是五位之內行相法門是故佛不自說總令十信十住十行等當位之內菩薩自說佛但放光表之其所放光表法之相後當廣明當說華嚴經時一無聲聞及小菩薩為請法主皆佛果位內諸大菩薩自相問答安立佛果法門行相為悟大根者故頓將佛果直受為因因即以果為因果即以因為果如種種子等以定慧力思之可見是故今言請法主別五大會莊嚴真化別者如法華會令三千大千世界清淨莊嚴其諸化衆亦皆充滿所來諸佛皆云是化華嚴經即不爾即有十處十會衆皆滿十方不移本處而充法界一一身相及身毛孔國剎重重菩薩佛身互相徹入雜類衆生亦皆無礙身土相徹如影含容所來之衆不壞法身而隨相好法身相好一際無差即相全真無有化也不同餘教說化說真有相參會是故今言大會別也六序分之中列衆別者法華會中先列聲聞衆萬二千人俱次列摩訶波闍波提與眷屬六千人俱此為姨母六千人俱次列耶輸陀羅比丘尼此是佛為太子時夫人佛為太子時有三夫人一名瞿夷二名耶輸三名摩奴舍瞿夷是善財童子十地法雲地善知識表十地法悅能慈故為法利生法悅身心是其妻義次列菩薩八萬人俱次列諸天龍鬼等華嚴經即不然先列菩薩上首有十佛世界微塵數不論其從者次列執金剛神衆已後諸神龍天等衆部類總有五十五衆一一部從各別各各部從各有佛世界微塵數衆或有部從直言無量且於初會通菩提場衆有五十五部衆其於十會之衆後當更明大意論之佛身衆海無邊法界以重重一一諸身普含容而無際一身即以法界為量自他之境都亡法界即自身遍周能所之情見絶約略論之如是十會列衆後當更明從初至八會都不聞聲聞之名九會之中始有比丘三衆至位方明行相七龍女轉身成佛別者如法華經龍女於剎那之際即轉女身具菩薩行南方成佛如華嚴經即不然但使自無情見大智逾明即萬法體真無轉變相如維摩經中舍利弗謂天女曰何故不轉女身天女謂舍利弗我十二年來求女人相了不可得當何所轉如菴提遮女謂舍利弗自男生我女當知萬法本自體如有何可轉如華嚴經入法界品中善財童子善知識文殊普賢比丘比丘尼長者童子優婆夷童女仙人外道五十三人各各自具菩薩行自具佛法隨諸衆生見身不同不云有轉若以法眼觀無俗不真若以世間肉眼觀無真不俗以法華經對權教三根見未盡者令成信種且將女相速轉成佛令生奇特方始發心趣真知見不堪本法而起善根此明且引三權令歸一實又破彼時劫定執三僧祇令於剎那證三世性本來一際無始無終稱法平等裂三乘之見網撤菩薩之草菴令歸法界之門入佛真實之宅故令龍女成佛明非過去久修年始八歲又表今非舊學轉女時分不逾剎那具行佛果無虧毫念法本如是自體無時權學三根自將見隔自迷實法返稱為化不知躬己本事如斯全處宅中猶懷滯見云何界外懸指僧祇此見不離定乖永劫回心見謝方始舊居何如今時滅諸見業徒煩多劫苦困方回如華嚴經法界緣起門明凡聖一真猶存見隔見在即凡情亡即佛稱性緣起俯仰進退屈伸謙敬皆菩薩行無有一法可轉變相有生住滅是故不同龍女轉身成佛八龍女成佛所居國土別者即言南方無垢世界非此娑婆解云心得應真故稱無垢正順本覺故號南方為南北為正故又南為明為虗南為離離中虗八卦中離法心心虗無故則明還依世俗八卦表之餘方雖無八卦之名其方法是一法也故雖然理如是有理即有事故還須有國衆所歸依若有別住南方自他彼此猶隔此乃猶順三乘分引權根而生信解還就佛乘故為三乘餘執勢分難摧且有一分回心自他之情未絶頓印法界之體不同華嚴自他相徹一一微塵之內住因陀羅網之門是故今言所居國土別九六千之衆發心別者如法華經云龍女成佛時娑婆世界菩薩聲聞舉衆皆遙見龍女成佛普為時會人天說法心大歡喜悉遙敬禮又下文娑婆世界三千衆生住不退地三千衆生發菩提心而得受記智積菩薩及舍利弗一切衆會默然信受雖智積菩薩反舍利弗而為智士寄在迷流為利啓蒙故遣教行益濟凡學令成軌躅既娑婆之衆皆遙敬禮六千發意彼此未亡但順三乘權學有為菩提未得普門法界本覺菩提自他同體以此義故故有遙敬禮華嚴經即不然即以普門法界普見法門如來藏身三昧之境因陀羅網莊嚴法門世界海漩重重妙智一時同得為一證一切證一斷一切斷故即自身之內有十身諸佛剎海莊嚴佛身之內即自身之境重重隱現十方世界法爾如斯猶如衆流歸於大海雖未入海潤性無差若入大海皆同鹹味一切衆生亦復如是迷之與悟雖然有殊本來佛海元本不異云何法華經中娑婆之衆有遙敬禮以此事儀法則與華嚴全別只如法界品內六千之衆剎那十眼逾明五百小童一生十身咸證餘衆皆爾善財南詢諸友佛果文殊慈氏已圓復入普賢之身海漩漩門總備理事齊亘無法不彰法界既處塵中何得有遙敬禮是故今言六千之衆發心別十授聲聞遠記別者為法華之中龍女雖復頓印法界無時之門全彰佛果三乘權學雖有信順之心餘風未珍未能頓證遠劫方登故受遠記不同華嚴迷即處凡悟即是佛設有餘習以佛知見而用治之無佛知見但成折伏不得入佛駛水之流還經遠劫方能入也為三乘之初心信根下劣故不能離縛籠繫煩多樂著生死雖求出世根器下劣滯住退還如來於是以生老病死無常不淨剎那滅壞念念不住如是等觀使令觀之令生厭離捨厭心成心居淨穢如來於化教之中為此根故雖復勸修悲智以求佛果仍推淨土在於餘方為彼三乘見分未亡見此娑婆恆常是穢說因說果破彼疑心暫化令淨却攝神力還當見穢三乘教印自有明文則因斯無常觀智習性難回龍女雖頓示佛乘雖信未能即證以是義故法華會內所受記別皆蒙遠劫法華漸引來歸華嚴當時直授發心即佛故以此義故行相不同其此一部之經同門有二一乘如來乘直至道場如來乘者即一乘也如華嚴經賢首品云一切世間羣生類鮮有欲求聲聞乘求緣覺者轉復少求大乘者甚希有求大乘者猶為易能信此法甚為難又經云若有諸衆生其心饜沒者為說聲聞道令離於衆苦若復有衆生其心少明利為說因緣法令得辟支佛若復有衆生樂學慈悲心廣饒益衆生為說菩薩道若復有衆生決定樂大事轉無盡佛法為說一乘道此乃華嚴經中分四乘義也如法華經中門前三駕且示權門露地白牛方明正教佛乘唯有一無二亦無三二三門外之權宗方明露地之實教四乘契會二教共同施設化儀各有差殊又法華云唯此一事實餘二則非真准此一文似立三乘論其契會還成四法唯此一事實者即佛乘事實餘二者即菩薩大乘通緣覺聲聞是餘二為緣覺聲聞厭苦相似故足為龜鏡可以明鑑二龍女一剎那之際印三世性又從凡夫即聖不移毫分此乃與善財童子解行入道法門略同善財一生成佛者不離剎那際證三世性古今總齊還與龍女一剎那際轉身具行成佛一時總畢皆稱本法法如是故立時劫者衆生情塵也善財證此名為一生為三世時劫既盡更有何生故名為一生諸餘施設十種不同前已論訖龍女轉身善財不變為轉無所轉有異故音切滂普郎切徹丑列切匪非尾切虧去危切鶖秋音穿尺絹切縫逢音綴陟衛切諳烏含切猷由音遷千音狹侯夾切繫古詣切互于音映於敬切麾許為切瀑蒲木切疇直由切峻私閏切飾舒弋切擎巨京切劑抂細切閦初六切輸式朱切瞿其俱切逾羊朱切宍肉音裂列音撤直列切庵諳音摧昨回切躅直録切漩似專切鹹咸音殄徒典切駛使音鮮息淺切饜於豔切鑑監音
