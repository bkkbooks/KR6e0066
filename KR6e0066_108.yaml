body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之二十一論第六如來會中守護一切城增長神主現前地經爾時善財童子隨順寂靜音海夜神教思惟觀察所説法門一一文句皆無忘失於無量深心無量法性一切方便神通智慧憶念思擇相續不斷其心廣大證入安住行詣守護一切城夜神所見彼夜神坐一切寶光明摩尼王師子之座無數夜神所共圍繞現一切衆生色相身現普對一切衆生身現不染一切世間身現一切衆生身數身現超過一切世間身現成熟一切衆生身現速往一切十方身現遍攝一切十方身現究竟如來體性身現究竟調伏衆生身善財見已歡喜踊躍頂禮其足繞無量匝於前合掌而作是言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩修菩薩行時云何饒益衆生云何以無上攝而攝衆生云何順諸佛教云何近法王位唯願慈哀為我宣説時彼夜神告善財言善男子汝為救護一切衆生故汝為嚴淨一切佛剎故汝為供養一切如來故汝欲住一切劫救衆生故汝欲守護一切佛種性故汝欲普入十方修諸行故汝欲普入一切法門海故汝欲以平等心遍一切故汝欲普入一切佛法輪故汝欲普隨一切衆生心之所樂雨法雨故問諸菩薩所修行門善男子我得菩薩甚深自在妙音解脫為大法師無所罣礙善能開示諸佛法藏故具大誓願大慈悲力令一切衆生住菩提心故能作一切利衆生事積集善根無有休息故為一切衆生調御之師令一切衆生住薩婆若道故為一切世間清淨法日普照世間令生善根故於一切世間其心平等普令衆生增長善法故於諸境界其心清淨除滅一切諸不善業故誓願利益一切衆生身恆普現一切國土故示現一切本事因緣令諸衆生安住善行故恆事一切諸善知識為令衆生安住佛教故佛子我以此等法施衆生令生白法求一切智其心堅固猶如金剛那羅延藏善能觀察佛力魔力常得親近諸善知識摧破一切業惑障山集一切智助道之法心恆不捨一切智地善男子我以如是淨法光明饒益一切衆生集善根助道法時作十種觀察法界何者為十所謂我知法界無量獲得廣大智光明故我知法界無邊見一切佛所知見故我知法界無限普入一切諸佛國土恭敬供養諸如來故我知法界無畔普於一切法界海中示現修行菩薩行故我知法界無斷入於如來不斷智故我知法界一性如來一音一切衆生無不了故我知法界性淨了如來願普度一切諸衆生故我知法界遍衆生普賢妙行悉周遍故我知法界一莊嚴普賢妙行普莊嚴故我知法界不可壞一切智善根充滿法界不可壞故善男子我作此十種觀察法界集諸善根辦助道法了知諸佛廣大威德深入如來難思境界又善男子我如是正念思惟得如來十種大威德陀羅尼輪何者為十所謂普入一切法陀羅尼輪普持一切法陀羅尼輪普説一切法陀羅尼輪普念十方一切佛陀羅尼輪普説一切佛名號陀羅尼輪普入三世諸佛願海陀羅尼輪普入一切諸乘海陀羅尼輪普入一切衆生業海陀羅尼輪疾轉一切業陀羅尼輪疾生一切智陀羅尼輪善男子此十陀羅尼輪以十千陀羅尼輪而為眷屬恆為衆生演説妙法善男子我或為衆生説聞慧法或為衆生説思慧法或為衆生説修慧法或為衆生説一有法或為衆生説一切有法或為説一如來名海法或為説一切如來名海法或為説一世界海法或為説一切世界海法或為説一佛授記海法或為説一切佛授記海法或為説一如來衆會道場海法或為説一切如來衆會道場海法或為説一如來法輪海法或為説一切如來法輪海法或為説一如來修多羅法或為説一切如來修多羅法或為説一如來集會法或為説一切如來集會法或為説一薩婆若心海法或為説一切薩婆若心海法或為説一乘出離法或為説一切乘出離法善男子我以如是等不可説法門為衆生説善男子我入如來無差別法界門海説無上法普攝衆生盡未來劫住普賢行善男子我成就此甚深自在妙音解脫於念念中增長一切諸解脫門念念充滿一切法界時善財童子白夜神言奇哉天神此解脫門如是希有聖者證得其已久如夜神言善男子乃往古世過世界轉微塵數劫有劫名離垢光明有世界名法界功德雲以現一切衆生業摩尼王海為體形如蓮華住四天下微塵數香摩尼須彌山網中以出一切如來本願音蓮華而為莊嚴須彌山微塵數蓮華而為眷屬須彌山微塵數香摩尼以為間錯有須彌山微塵數四天下一一四天下有百千億那由他不可説不可説城善男子彼世界中有四天下名為妙幢中有王都名普寶華光去此不遠有菩提場名普顯現法王宮殿須彌山微塵數如來於中出現其最初佛名法海雷音光明王彼佛出時有轉輪王名清淨日光明面於其佛所受持一切法海漩修多羅佛涅槃後其王出家護持正法法欲滅時有千部異衆千種説法近於末劫業惑障重諸惡比丘多有鬬諍樂著境界不求功德樂説王論賊論女論國論海論及以一切世間之論時王比丘而語之言奇哉苦哉佛於無量諸大劫海集此法炬云何汝等而共毀滅作是説已上升虗空高七多羅樹身出無量諸色焰雲放種種色大光明網令無量衆生除煩惱熱令無量衆生發菩提心以是因緣彼如來教復於六萬五千歲中而得興盛時有比丘尼名法輪化光是此王女百千比丘尼而為眷屬聞父王語及見神力發菩提心永不退轉得三昧名一切佛教燈又得此甚深自在妙音解脫得已身心柔軟即得現見法海雷音光明王如來一切神力善男子於汝意云何彼時轉輪聖王隨於如來轉正法輪佛涅槃後興隆末法者豈異人乎今普賢菩薩是其法輪化光比丘尼即我身是我於彼時守護佛法令十萬比丘尼於阿耨多羅三藐三菩提得不退轉又令得現見一切佛三昧又令得一切佛法輪金剛光明陀羅尼又令得普入一切法門海般若波羅蜜次有佛興名離垢法光明次有佛興名法輪光明髻次有佛興名法日功德雲次有佛興名法海妙音王次有佛興名法日智慧燈次有佛興名法華幢雲次有佛興名法𦦨山幢王次有佛興名甚深法功德月次有佛興名法智普光藏次有佛興名開示普智藏次有佛興名功德藏山王次有佛興名普門須彌賢次有佛興名一切法精進幢次有佛興名法寶華功德雲次有佛興名寂靜光明髻次有佛興名法光明慈悲月次有佛興名功德𦦨海次有佛興名智日普光明次有佛興名普賢圓滿智次有佛興名神通智光王次有佛興名福德華光燈次有佛興名智師子幢王次有佛興名日光普照王次有佛興名須彌寶莊嚴相次有佛興名日光普照次有佛興名法王功德月次有佛興名開敷蓮華妙音雲次有佛興名日光明相次有佛興名普光明妙法音次有佛興名師子金剛那羅延無畏次有佛興名普智勇猛幢次有佛興名普開法蓮華身次有佛興名功德妙華海次有佛興名道場功德月次有佛興名法炬熾然月次有佛興名普光明髻次有佛興名法幢燈次有佛興名金剛海幢雲次有佛興名名稱山功德雲次有佛興名栴檀妙月次有佛興名普妙光明華次有佛興名照一切衆生光明王次有佛興名功德蓮華藏次有佛興名香𦦨光明王次有佛興名波頭摩華因次有佛興名衆相山普光明次有佛興名普名稱幢次有佛興名須彌普門光次有佛興名功德法城光次有佛興名大樹山光明次有佛興名普德光明幢次有佛興名功德吉祥相次有佛興名勇猛法力幢次有佛興名法輪光明音次有佛興名功德山智慧光次有佛興名無上妙法月次有佛興名法蓮華淨光幢次有佛興名寶蓮華光明藏次有佛興名光𦦨雲山燈次有佛興名普覺華次有佛興名種種功德𦦨須彌藏次有佛興名圓滿光山王次有佛興名福德雲莊嚴次有佛興名法山雲幢次有佛興名功德山光明次有佛興名法日雲燈王次有佛興名法雲名稱王次有佛興名法輪雲次有佛興名開悟菩提智光幢次有佛興名普照法輪月次有佛興名寶山威德賢次有佛興名賢德廣大光次有佛興名普智雲次有佛興名法力功德山次有佛興名功德香𦦨王次有佛興名金色摩尼山妙音聲次有佛興名頂髻出一切法光明雲次有佛興名法輪熾盛光次有佛興名無上功德山次有佛興名精進炬光明雲次有佛興名三昧印廣大光明冠次有佛興名寶光明功德王次有佛興名法炬寶蓋音次有佛興名普照虗空界無畏法光明次有佛興名月相莊嚴幢次有佛興名光明𦦨山雲次有佛興名照無障礙法虗空次有佛興名開顯智光身次有佛興名世主德光明音次有佛興名一切法三昧光明音次有佛興名法音功德藏次有佛興名熾然𦦨法海雲次有佛興名普照三世相大光明次有佛興名普照法輪山次有佛興名法界師子光次有佛興名須彌華光明次有佛興名一切三昧海師子𦦨次有佛興名普智光明燈善男子如是等須彌山微塵數如來其最後佛名法界城智慧燈並於離垢光明劫中出興於世我皆尊重親近供養聽聞受持所説妙法亦於彼一切諸如來所出家學道護持法教入此菩薩甚深自在妙音解脫種種方便教化成熟無量衆生從是已來於佛剎微塵數劫所有諸佛出興於世我皆供養修行其法善男子我從是來於生死夜無明昏寐諸衆生中而獨覺悟令諸衆生守護心城捨三界城住一切智無上法城善男子我唯知此甚深自在妙音解脫令諸世間離戲論語不作二語常真實語恆清淨語如諸菩薩摩訶薩能知一切語言自性於念念中自在開悟一切衆生入一切衆生言音海於一切言辭悉皆辨了明見一切諸法門海於普攝一切法陀羅尼已得自在隨諸衆生心之所疑而為説法究竟調伏一切衆生能普攝受一切衆生巧修菩薩諸無上業深入菩薩諸微細智能善觀察諸菩薩藏能自在説諸菩薩法何以故已得成就一切法輪陀羅尼故而我云何能知能説彼功德行善男子此佛會中有主夜神名開敷一切樹華汝詣彼問菩薩云何學一切智云何安立一切衆生住一切智爾時守護一切城主夜神欲重宣此解脫義為善財童子而説頌曰菩薩解脫深難見虗空如如平等相普見無邊法界內一切三世諸如來出生無量勝功德證入難思真法性增長一切自在智開通三世解脫道過於剎轉微塵劫爾時有劫名淨光世界名為法𦦨雲其城號曰寶華光其中諸佛興於世無量須彌塵數等有佛名為法海音於此劫中先出現乃至其中最後佛名為法界𦦨燈王如是一切諸如來我皆供養聽受法我見法海雷音佛其身普作真金色諸相莊嚴如寶山發心願得成如來我暫見彼如來身即發菩提廣大心誓願勤求一切智性與法界虗空等由斯普見三世佛及以一切菩薩衆亦見國土衆生海而普攀緣起大悲隨諸衆生心所樂示現種種無量身普遍十方諸國土動地舒光悟含識見第二佛而親近亦見十方剎海佛乃至最後佛出興如是須彌塵數等於諸剎轉微塵劫所有如來照世燈我皆親近而瞻奉令此解脫得清淨爾時善財童子得入此菩薩甚深自在妙音解脫故入無邊三昧海入廣大總持海得菩薩大神通獲菩薩大辨才心大歡喜觀察守護一切城主夜神以偈讚曰已行廣大妙慧海已度無邊諸有海長壽無患智藏身威德光明住此衆了達法性如虗空普入三世皆無礙念念攀緣一切境心心永斷諸分別了達衆生無有性而於衆生起大悲深入如來解脫門廣度羣迷無量衆觀察思惟一切法了知證入諸法性如是修行佛智慧普化衆生令解脫天是衆生調御師開示如來智慧道普為法界諸含識説離世間衆怖行已住如來諸願道已受菩提廣大教已修一切遍行力已見十方佛自在天神心淨如虗空普離一切諸煩惱了知三世無量剎諸佛菩薩及衆生天神一念悉了知晝夜日月年劫海亦知一切衆生類種種名相各差別十方衆生生死處有色無色想無想隨順世俗悉了知引導使入菩提路已生如來誓願家已入諸佛功德海法身清淨心無礙隨衆生樂現衆色時善財童子説此頌已禮夜神足繞無量匝殷勤瞻仰辭退而去論第一正入當位法門中從爾時善財已下至我唯知此甚深妙音自在解脫門於此段長科為十段一爾時善財童子已下至守護一切城夜神所有四行半經明正念前法思惟升進分二見彼夜神已下至現究竟調伏衆生身有六行經明夜神所現差別身教化一切衆生分三善財見已歡喜踊躍已下至唯願慈哀為我宣説有五行經明善財申請所求分四明彼夜神告善財言已下至問諸菩薩所修行門有七行經明夜神歎善財志德所求法分五善男子我得甚深自在妙音解脫已下至心恆不捨一切智地有十五行半經明夜神自説自行饒益衆生行門分六善男子我以如是淨法光明已下至入如來難思境界有十四行經明夜神説十種觀察入如來境界分七又善男子我如是正念思惟至聖者證得其已久如有二十九行經明得此妙音解脫得佛陀羅尼為諸衆生説法自在并善財問得法久近分八夜神言善男子乃往古世已下至普入一切法門海般若波羅蜜有三十五行經明答善財得此法久近所見初佛分九次有佛興名離垢法光明已下至住一切智無上法城有六十九行半經明答善財得法久近供養諸佛數量分十我唯知此甚深自在妙音解脫令諸世間恆清淨語已下明推德升進分明菩薩智輪遠離一切分別境界不可以生死中長短染淨廣狹多少如是諸劫分別顯示如前十段門中所有法門如文自具從善財問證得此法其已久如已下以理事相表法中義隱難知處略釋少分以舉大綱意明約報境即法故明以所行之法成其報故因果相似以表所行見報知法經云乃往古世過世界轉微塵數劫者世界轉者是西方大數中數如釋天童子菩薩數法中具明此明轉世界一切衆生微塵數世間名言成大智慧言音海使令世間無粗惡語無雜染語如下文云我得此甚深自在妙音解脫令諸世間離戲論語不二語常真實語恆清淨語者意明變世間一切言説總成般若波羅蜜門以舉世界轉微塵為量以劫名離垢光明者表般若中本三空寂滅理體故世界名法界功德者明智慧是法界中説教功德雲故以現一切衆生業摩尼王海為體者表無性寂滅三空妙慧善知一切衆生業差別海故號之為摩尼王形如蓮華者表智慧妙用辨體相而中虗無染故此世界住四天下微塵數香摩尼須彌山網中者明此三空妙慧住如來無礙四辨之香中故具須彌山微塵數教網也以出一切如來本願音者是第六地以初發心時依一切諸佛而發大願以其轉法輪音遍滿十方開悟一切衆生從此願生故蓮華而為莊嚴者明其法音令一切衆生得無礙智慧也須彌山微塵數蓮華而為眷屬者須彌明智慧高出世間義微塵明智慧廣多義蓮華明智慧無著義眷屬明善分別差別業及諸境界緣生總別同異成壞義須彌山微塵數香摩尼以為間錯者明以差別智慧善説無量戒定慧解脫無垢淨香以為間錯摩尼是離垢義故有須彌山微塵數四天下者但以須彌為四寶所成於大海中高勝義若論此般若智中四無礙辨才等一切衆生言音心數諸業分別量一一四天下有百那由他不可説不可説城者有如是成就那由他不可説不可説衆生法門那由他當此溝數善男子者呼善財之德稱以告其法彼世界中有四天下名為妙幢者於一四無礙辨中總名妙幢中有王都者以根本智為王都名普寶華光者從根本智起差別慧名普寶華光去此不遠有菩提場名普顯現法王宮殿者明以根本智起無上正覺之心成大悲宮差別智慧之殿正法治衆生故須彌山微塵數如來於中出現者一切衆生微塵數煩惱成般若海為佛出現皆依本智為道場起差別智慧能治惑習故其最初佛名法海雷音光明王者明根本智起差別智慧覺觀超出情識之境名為最初佛善能説法號為雷音教光破一切衆生之惑名為光明立法自在能破衆邪在邪邪不能壞名之為王彼佛出時有轉輪王名清淨日光明面者明智慧輪王日光照曜明現如摩尼鏡面顯照萬像故於其佛所受持一切法海漩者明差別慧於根本智受持衆法甚深無際名之海漩修多羅者長行經也佛涅槃後其王出家者表此第六地中十地正覺智終出纏智慧已滿出纏覺觀已亡名佛滅度出世智慧已成十一地中唯普賢入纏行門非是此第六地中十地等三空慧出纏門所及如十定品中三十箇三空慧解脫菩薩皆已入十地灌頂位中以出世無量三昧門三求普賢畢竟覓不得見如來使令想念求之普賢方現意明三空慧但及十地出纏門以此已下但從初至末列一百箇佛果不置後十一地普賢法門此第六地寂滅三空智慧解脫但位至十地佛位覺觀已終名佛涅槃故其王出家者此第六地寂滅三空智慧門是出家義如十住中以海幢比丘入滅定表之其王出家護持正法者以三空慧護持出世正法法欲滅時有千部異衆千種説法近於末劫業惑障重諸惡比丘多有鬬諍乃至不求功德者明此位中但有三空寂滅智慧之門於慈悲無教化故其王現神通現光明種種諸事令其正法六萬五千年而得興盛者六萬者六地升進之數五千年者一位都收五位因果齊進也明空解脫門以智起出世中慈悲如王女亦出家者明於此空智慧門修出世間慈悲乃至并前及後一百箇佛次第出興表此第六般若門但至十地出世佛果位終一地具十也已下都舉供養須彌山微塵數佛但表般若出纏高勝如上一百箇佛是十地升進之果一地配十夜神所有承事供養佛身是十地中修行之行如供養佛剎微塵數佛是法界總相無一物不是佛為一一塵中有無盡佛故已上皆明約法約行成其劫剎國土之果令觀果配因總是法門即事是理以理是事其王及女俱作比丘及尼者為般若波羅蜜三空寂滅門是出生死中智慈之門當時轉輪王者今普賢菩薩是此明智也比丘尼者我身是此明悲也我唯知此甚深自在妙音解脫者此明一音遍法界音復無體無所分別能轉一切法門教化一切衆生名之甚深自在妙音解脫此是第六現前地為一切智慧皆現前故以般若波羅蜜為主餘九為伴此位治三空智慧寂用不自在障令得自在第二推德升進中從如諸菩薩摩訶薩已下至辭退而去約分六門一推德升進二示善知識所在云在此佛會中三舉善知識名云有主夜神名開敷一切樹華四有二十二行頌是主城神重頌前法如文具明五善財以二十行頌歎主城神德如文具明六禮敬辭去此佛會中者明不離此正覺菩提無作不思不為無性之理名此佛會中而開敷一切行華成方便波羅蜜於無生死中入一切生死同事利行四攝之行此同休捨優婆夷八萬四千那由他諸煩惱門皆共同行明第六地出纏解脫已終此第七地以彼出纏門入俗利生而無怖畏以處纏出纏皆平等故長一切大慈悲心令廣大故無限劑故欲令大悲之行遍惡道故攝取衆生至解脫故音切炬巨音陀徒何切摧昨回切畔伴音
