body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論菩薩問明品第十之餘經爾時諸菩薩謂文殊師利菩薩言佛子我等所解各自説已唯願仁者以妙辨才演暢如來所有境界何等是佛境界何等是佛境界因何等是佛境界度何等是佛境界入何等是佛境界智何等是佛境界法何等是佛境界説何等是佛境界知何等是佛境界證何等是佛境界現何等是佛境界廣時文殊師利菩薩以頌答曰如來深境界其量等虗空一切衆生入而實無所入如來深境界所有勝妙因億劫常宣説亦復不能盡隨其心智慧誘進咸令益如是度衆生諸佛之境界世間諸國土一切皆隨入智身無有色非彼所能見諸佛智自在三世無所礙如是慧境界平等如虗空法界衆生界究竟無差別一切悉了知此是如來境一切世界中所有諸音聲佛智皆隨了亦無有分別非識所能識亦非心境界其性本清淨開示諸羣生非業非煩惱無物無住處無照無所行平等行世間一切衆生心普在三世中如來於一念一切悉明達論第十爾時已下明諸菩薩共問文殊師利十一種佛境界已下十行頌是文殊師利答於中三門如前一科頌意此十行頌一行一頌其頌文答前所問頌文自具不煩更釋二釋菩薩名者名文殊師利此云妙德以妙慧善揀正邪自在故云妙德此是東方卯位也明卯主東方震卦震為靁動啓蟄發生之始明此妙慧是震動發生信心之始是故亦云妙生菩薩為明一切諸佛從此慧生十信解故乃至滿足菩提一切願行海故世界名金色者明因舉果體白淨無染法故又明金胎二月表十信為聖胎故一切處金色世界一切處文殊師利明無性淨慧遍故佛號不動智為無明本空無體可動名不動智故但有應境知法應器知根如響應聲無有處所形體可得名之為智無可取捨故名為不動三配當位因果者妙慧為因不動智為果亦互為因果若以妙慧善揀擇法顯智故即以妙慧為因不動智為果若以慧由智起即不動智為因妙慧文殊以為果故或智之與慧總因總果明體用一真無二法故亦智之與慧總非因非果為體無本末依住所得故是性法界自在知見非如世間因果比對可得故此文殊師利不動智佛初起信心亦從此起乃至信終亦不離之故迄至自行圓滿示成正覺亦不離之故此明以佛智慧示悟衆生欲令衆生入佛知見佛知見者文殊師利妙慧不動智佛是此是凡聖等共有之佛示凡夫使令悟入經爾時此娑婆世界中一切衆生所有法差別業差別世間差別身差別根差別受生差別持戒果差別犯戒果差別國土果差別以佛神力悉皆明現如是東方百千億那由他無數無量無邊無等不可數不可稱不可思不可量不可説盡法界虗空界一切世界中所有衆生法差別乃至國土果差別悉以佛神力故分明顯現南西北方四維上下亦復如是論第十一爾時已下有八行經是都舉娑婆九種差別并都舉十方一切差別悉皆以佛神力無不明現如文可知已上但隨文殊師利所問隨位菩薩答依所説頌取其意趣理自分明及以世界佛號菩薩名號即知進修因果總是前莊嚴法性清淨佛剎四種佛剎中金色世界及不動智佛是佛住佛剎餘九世界及九箇智佛是莊嚴法性佛剎及十地已來總是如來出現品是示成正覺佛剎清淨佛剎四諦品是此之一品大意有六一菩薩以名表行二以世界之色表所得之理三以佛名號表所得之智四以方隅表所得之法五成其十信所行之行六明十信進修同異如上已述可知淨行品第十一論將釋此品約作四門分別一釋品名目二釋品來意三釋品宗趣四隨文釋義一釋品名目者何故名為淨行品以無始諸見無明貪瞋癡愛今已發菩提心信樂正法頓翻諸見成其大願長大悲門若但以三空無相對治不生大慈大悲不能成就普賢行故欲行長路非足不行欲行大悲入普賢門充法界行者於一切見聞覺知而無過失便成萬行莊嚴皆勤修習此一百四十大願門便於生死海中見聞覺知一切諸行悉皆清淨入普賢行故故名淨行若無此願設斷煩惱即二乘行故設是菩薩即生淨土以此一百四十大願門頓能淨其一切塵勞行門便成普賢法界行故故名淨行以此大願莊嚴一切世間諸行總為法界一切道場故名淨行以此諸見成大善根故名淨行二釋品來意者為明前問明品是成其十信中解故此品成其十信之行故此品須來乃至果行圓滿已來不離此大願故三釋品宗趣者以智首是下方頗梨色世界佛號梵智明是一切諸佛法本自體白淨無染之智以為能問之人文殊師利菩薩即是一切諸佛善擇妙慧以為説法之主以一切諸佛根本智慧之門善自為問答之主伴説一百四十大願之門以成十信十住十行十回向十地十一地等普賢法界無盡行海以本淨智問其妙慧説其一百四十淨願之門用淨信等六位中染淨無明七地法執現行十地已來法執習氣佛地二愚一時總淨於此信心之中不令偏執以願防之使令寂用無礙故以此諸佛本淨智妙慧門説一百四十大願以防染淨二障以為宗趣故以六位上通信并十住十行十回向十地十一地隨位修道上煩惱六位中一位上有二十故六位共有一百二十根本十無明皆因身見邊見二見有二十共隨位進修染淨煩惱總有一百四十為防此障起一百四十願令此進修者從初信心理事圓融使信心者達其願體無虧自心根本淨智妙擇之慧動寂俱真不偏修故是故華藏世界有如須彌山微塵數風輪所持其上一切莊嚴因大願風輪能持萬行以行招果故因以願力堅持報得風輪持剎故又云如是華藏莊嚴皆從普賢願力起為無願故行乃不成即莊嚴不現不感無盡依果報故由是義故信心之上法性悲智妙慧萬行總依佛有而為進修不得別有若離佛別有自法者不成信心不成十種勝解不成修行設苦行精勤是邪精進勤苦纍劫生人天中一念貪瞋一時焚盡是故此品下文云住去來今諸佛之道隨衆生住恆不捨離如諸法相悉能通達斷一切惡具足衆善當如普賢色像第一一切行願皆得具足已上明宗趣竟意明回凡所執心境差別業皆成願海具普賢門四隨文釋義者於此之中義分為二一科其一品經意二隨文解釋一科其一品經意者於此一品文義分為十四段經爾時智首菩薩問文殊師利菩薩言佛子菩薩云何得無過失身語意業云何得不害身語意業云何得不可毀身語意業云何得不可壞身語意業云何得不退轉身語意業云何得不可動身語意業云何得殊勝身語意業云何得清淨身語意業云何得無染身語意業云何得智為先導身語意業論一從爾時智首菩薩已下從云何得無過失身語意業總有十問於十問中總有一百一十問問世間三業等如下可知經云何得生處具足種族具足家具足色具足相具足念具足慧具足行具足無畏具足覺悟具足論二從云何生處具足問十具足中初種族具足中有二義一世間即是生族姓家為種族二出世間即是生在佛家具佛種性色相念慧等並是佛家非世間故經云何得勝慧第一慧最上慧最勝慧無量慧無數慧不思議慧無與等慧不可量慧不可説慧論三云何已下問十種慧並是出世勝慧如文可知經云何得因力欲力方便力緣力所緣力根力觀察力奢摩他力毗鉢舍那力思惟力論四云何已下問十種力初因力者所謂生生之中任運能發大菩提力欲力者志樂大菩提心無退失故方便力者以大願善自覺悟不費功力故亦能覺他省功不迂回故緣力所緣力者能緣所緣不忘失常興大願故根力者大願善根不失故觀察力者能觀力奢摩他力毗鉢舍那力觀共止雙行二皆自在或先觀後止或先止後觀或即止即觀或即觀即止悉皆自在思惟力者不失正理智常現前故經云何得蘊善巧界善巧處善巧緣起善巧欲界善巧色界善巧無色界善巧過去善巧未來善巧現在善巧論五云何已下十問問十善巧初蘊善巧者明同世間五蘊而生不著五蘊之過界善巧者同十八界及三界法生而不染三界法處善巧者三界六道為處禪定解脫為非處非處皆不離其中而無所染緣起善巧者不壞世間十二緣生處纏不污欲界色界無色界善巧者三界同事而無所著過去未來現在善巧者於過去劫在現在未來劫中現在劫在過去劫中三世中互參皆自在故經云何善修習念覺分擇法覺分精進覺分喜覺分猗覺分定覺分捨覺分空無相無願論六云何已下十問問七覺三空如文可知經云何得圓滿檀波羅蜜尸波羅蜜羼提波羅蜜毗梨耶波羅蜜禪那波羅蜜般若波羅蜜及以圓滿慈悲喜捨論七云何已下十問問六度四無量心如文可知經云何得處非處智力過未現在業報智力根勝劣智力種種界智力種種解智力一切至處道智力禪解脫三昧染淨智力宿住念智力無障礙天眼智力斷諸習智力論八云何已下問佛十力如文可知經云何常得天王龍王夜叉王乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王梵王之所守護恭敬供養論九云何已下十問問十王守護此明願行所及而招致敬經云何得與一切衆生為依為救為歸為趣為炬為明為照為導為勝導為普導論十云何已下十問問云何堪為衆生所依師導如文可知經云何於一切衆生中為第一為大為勝為最勝為妙為極妙為上為無上為無等為無等等論十一云何已下十問問云何於衆生中最勝最妙如文可知經爾時文殊師利菩薩告智首菩薩言善哉佛子汝今為欲多所饒益多所安隱哀愍世間利樂天人問如是義佛子若諸菩薩善用其心則獲一切勝妙功德於諸佛法心無所礙住去來今諸佛之道隨衆生住恆不捨離如諸法相悉能通達斷一切惡具足衆善當如普賢色像第一一切行願皆得具足於一切法無不自在而為衆生第二導師佛子云何用心能獲一切勝妙功德論十二爾時已下至勝妙功德已來有八行半經明文殊領上一百一十問及歎智首善問經佛子菩薩在家當願衆生知家性空免其逼迫孝事父母當願衆生善事於佛護養一切妻子集會當願衆生怨親平等永離貪著若得五欲當願衆生拔除欲箭究竟安隱妓樂聚會當願衆生以法自娛了妓非實若在宮室當願衆生入於聖地永除穢欲著纓絡時當願衆生捨諸偽飾到真實處上升樓閣當願衆生升正法樓徹見一切若有所施當願衆生一切能捨心無愛著衆會聚集當願衆生捨衆聚法成一切智若在厄難當願衆生隨意自在所行無礙捨居家時當願衆生出家無礙心得解脫入僧伽藍當願衆生演説種種無乖諍法詣大小師當願衆生巧事師長習行善法求請出家當願衆生得不退法心無障礙脫去俗服當願衆生勤修善根捨諸罪軛剃除鬚髮當願衆生永離煩惱究竟寂滅著袈裟衣當願衆生心無所染具大仙道正出家時當願衆生同佛出家救護一切自歸於佛當願衆生紹隆佛種發無上意自歸於法當願衆生深入經藏智慧如海自歸於僧當願衆生統理大衆一切無礙受學戒時當願衆生善學於戒不作衆惡受闍梨教當願衆生具足威儀所行真實受和尚教當願衆生入無生智到無依處受具足戒當願衆生具諸方便得最勝法若入堂宇當願衆生升無上堂安住不動若敷牀座當願衆生開敷善法見真實相正身端坐當願衆生坐菩提座心無所著結跏趺坐當願衆生善根堅固得不動地修行於定當願衆生以定伏心究竟無餘若修於觀當願衆生見如實理永無乖諍捨跏趺坐當願衆生觀諸行法悉歸散滅下足住時當願衆生心得解脫安住不動若舉於足當願衆生出生死海具衆善法著下裙時當願衆生服諸善根具足慚愧整衣束帶當願衆生檢束善根不令散失若著上衣當願衆生獲勝善根至法彼岸著僧伽梨當願衆生入第一位得不動法手執楊枝當願衆生皆得妙法究竟清淨嚼楊枝時當願衆生其心調淨噬諸煩惱大小便時當願衆生棄貪瞋癡蠲除罪法事訖就水當願衆生出世法中速疾而往洗滌形穢當願衆生清淨調柔畢竟無垢以水盥掌當願衆生得清淨手受持佛法以水洗面當願衆生得淨法門永無垢染手執錫杖當願衆生設大施會示如實道執時應器當願衆生成就法器受天人供發趾向道當願衆生趣佛所行入無依處若在於道當願衆生能行佛道向無餘法涉路而去當願衆生履淨法界心無障礙見升高路當願衆生永出三界心無怯弱見趣下路當願衆生其心謙下長佛善根見斜曲路當願衆生捨不正道永除惡見若見直路當願衆生其心正直無諂無誑見路多塵當願衆生遠離塵坌獲清淨法見路無塵當願衆生常行大悲其心潤澤若見險道當願衆生住正法界離諸罪難若見衆會當願衆生説甚深法一切和合若見大柱當願衆生離我諍心無有忿恨若見藂林當願衆生諸天及人所應敬禮若見高山當願衆生善根超出無能至頂見棘刺樹當願衆生疾得翦除三毒之刺見樹葉茂當願衆生以定解脫而為蔭映若見華開當願衆生神通等法如華開敷若見樹華當願衆生衆相如華具三十二若見果實當願衆生獲最勝法證菩提道若見大河當願衆生得預法流入佛智海若見陂澤當願衆生疾悟諸佛一味之法若見池沼當願衆生語業滿足巧能演説若見汲井當願衆生具足辨才演一切法若見涌泉當願衆生方便增長善根無盡若見橋道當願衆生廣度一切猶如橋梁若見流水當願衆生得善意欲洗除惑垢見修園圃當願衆生五欲圃中耘除愛草見無憂林當願衆生永離貪愛不生憂怖若見園苑當願衆生勤修諸行趣佛菩提見嚴飾人當願衆生三十二相以為嚴好見無嚴飾當願衆生捨諸飾好具頭陀行見樂著人當願衆生以法自娛歡愛不捨見無樂著當願衆生有為事中心無所樂見歡樂人當願衆生常得安樂樂供養佛見苦惱人當願衆生獲根本智滅除衆苦見無病人當願衆生入真實慧永無疾惱見疾病人當願衆生知身空寂離乖諍法見端正人當願衆生於佛菩薩常生淨信見醜陋人當願衆生於不善事不生樂著見報恩人當願衆生於佛菩薩能知恩德見背恩人當願衆生於有惡人不加其報若見沙門當願衆生調柔寂靜畢竟第一見婆羅門當願衆生永持梵行離一切惡見苦行人當願衆生依於苦行至究竟處見操行人當願衆生堅持志行不捨佛道見著甲胄當願衆生常服善鎧趣無師法見無鎧仗當願衆生永離一切不善之業見論議人當願衆生於諸異論悉能摧伏見正命人當願衆生得清淨命不矯威儀若見於王當願衆生得為法王恆轉正法若見王子當願衆生從法化生而為佛子若見長者當願衆生善能明斷不行惡法若見大臣當願衆生恆守正念習行衆善若見城郭當願衆生得堅固身心無所屈若見王都當願衆生功德共聚心恆喜樂見處林藪當願衆生應為天人之所歎仰入里乞食當願衆生入深法界心無障礙到人門戶當願衆生入於一切佛法之門入其家已當願衆生得入佛乘三世平等見不捨人當願衆生常不捨離勝功德法見能捨人當願衆生永得捨離三惡道苦若見空鉢當願衆生其心清淨空無煩惱若見滿鉢當願衆生具足成滿一切善法若得恭敬當願衆生恭敬修行一切佛法不得恭敬當願衆生不行一切不善之法見慚恥人當願衆生具慚恥行藏護諸根見無慚恥當願衆生捨離無慚住大慈道若得美食當願衆生滿足其願心無羡欲得不美食當願衆生莫不獲得諸三昧味得柔軟食當願衆生大悲所薰心意柔軟得粗澀食當願衆生心無染著絶世貪愛若飯食時當願衆生禪悅為食法喜充滿若受味時當願衆生得佛上味甘露滿足飯食已訖當願衆生所作皆辦具諸佛法若説法時當願衆生得無盡辨廣宣法要從舍出時當願衆生深入佛智永出三界若入水時當願衆生入一切智知三世等洗浴身體當願衆生身心無垢內外光潔盛暑炎毒當願衆生捨離衆惱一切皆盡暑退涼初當願衆生證無上法究竟清涼諷誦經時當願衆生順佛所説總持不忘若得見佛當願衆生得無礙眼見一切佛諦觀佛時當願衆生皆如普賢端正嚴好見佛塔時當願衆生尊重如塔受天人供敬心觀塔當願衆生諸天及人所共瞻仰頂禮於塔當願衆生一切天人無能見頂右繞於塔當願衆生所行無逆成一切智繞塔三匝當願衆生勤求佛道心無懈歇讚佛功德當願衆生衆德悉具稱歎無盡讚佛相好當願衆生成就佛身證無相法若洗足時當願衆生具神足力所行無礙以時寢息當願衆生身得安隱心無動亂睡眠始寤當願衆生一切智覺周顧十方論十三佛子菩薩在家已下有一百四十大願答前所問令十信心菩薩常用其心淨其身口意行如文具明經佛子若諸菩薩如是用心則獲一切勝妙功德一切世間諸天魔梵沙門婆羅門乾闥婆阿修羅等及以一切聲聞緣覺所不能動論十四最下佛子若諸菩薩有三行經明依教而行獲其勝益已上以世間有此一百四十種事法頓翻為一百四十種大願用成十信內修行之心雖是有為之心能成十住已後五位之內理智大悲之海已後入位萬行之海皆由此一百四十大願勝上緣力之所能成故若初發心菩薩無此之願所修解脫皆成聲聞獨覺之行設是菩薩但生淨土無成佛緣為此教中發心菩薩畢竟達此有為成其理智如也賢首品第十二之一論將釋此品約作五門分別一釋品名目二釋品來意三明品之宗趣四明信心退住五隨文解義一釋品名目者何故名為賢首為依行立菩薩之名依菩薩所説之法及行立品之名為賢首者以明信解如來因果普賢五位行門心行調柔順和正直深心正念樂集善根常念利生名之為賢創從凡夫頓彰法界諸佛因果理智一時明現名之為首此依法主解行立名此賢首者乃是於佛果海文殊普賢行之賢首為信佛因果理智之首圓滿法界解行無始終之首故為賢首品以佛文殊普賢之果行成信者之初首故二釋品來意者為第二會已來五品經但明十信菩薩所修行法門及一百四十願等法此品明十信中所欣修佛果所行行願功德廣大故故有此品來也三明宗趣者明已生十信心已得福獲益為宗四明信心退住者有二義一三乘二一乘一三乘者如起信論有三種發心一信成就發心經一萬劫善根相續方至不退二者解行發心以佛菩薩教令發心或自有大悲或以正法欲滅護正法發心論云如是信心成就得入正定聚畢竟不退名住如來種中正因已前二種是不退發心三證發心者若有衆生善根微少久遠已來煩惱深厚雖值於佛亦得供養然起人天種子或二乘種子設求大乘者根則不定或進或退大意自己善根微少依他發心者或以二乘或教令發心者為解行不實皆有得有證有捨有取總住退位又如起信論云若人修行一切善法自然歸順真如法故略説方便有四種一者行根本方便謂觀一切法自性無生離於妄見不住生死觀一切法因緣和合業果不失起於大悲修福德攝化衆生不住涅槃以順法性無生故二者能止方便謂慚愧悔過能止一切惡法不令增長隨順法性離諸過故三者發起善根增長方便謂勤供養禮拜三寶讚歎隨喜勸請諸佛以愛敬心淳厚心故信得增長乃能志求無上之道又因佛法僧力所護故能消業障善根不退以隨順法性離癡障故四者大願平等方便所謂願盡於未來化度一切衆生使無有餘皆令究竟無餘涅槃以順法性廣大遍一切衆生平等無二不念彼此究竟寂滅故菩薩發如是心故則得少分見於法身以見法身故隨其願力能現八相成道利益衆生然是菩薩未名法身以其過去無量世來有漏之業未能決斷隨其所生與微苦相應廣如彼論説計其少分得見法身即是信滿入十住位菩薩已上是三乘發十信滿心入十住初心初發心住上以願力故成佛二一乘發心者如此經十信發心初發心時以初會中如來始成正覺之果普賢菩薩法界微塵毛孔重重無盡隨根本智行果而起信心信他諸佛所得之果以第二會中普光明殿如來報滿之果及行果而自信入修行金色等十色世界即明自覺之理不動智佛等十智如來即明是自心所信自心佛智文殊師利即明自心智上分別妙慧與古今三世諸佛同一體用分毫不差方名為信發心從此信心以佛名號品即明所信十方示成正覺佛果之號遍周四聖諦品即明三世諸佛所説法門遍衆生界隨界名別光明覺品即明如來智慧光明境界遍照法界無有盡極令發信心者以觀觀之令心廣博如佛境故菩薩問明品明十信心菩薩十種所行之法是自己所修之行淨行品一百四十大願即是十信心位所發大願成大悲門具普賢行此賢首品明十信心所欣佛果功德無有盡極明初發十信心誦持此品功德勝過供養十佛剎微塵數佛經於一劫何況隨其解行而以修治如此經十住初心才發心時法爾身遍十方示成正覺在十住位發心功德品中至位方明文繁不引其事所因大意明此經發十信心但以法界不思議乘一切智乘而發其心不依佛不依佛法不依菩薩法不依聲聞法獨覺法不依世間法不依出世間法而發其心但無所依發菩提心但以一切智發菩提心不如三乘依倚物故發菩提心不依三祇劫後有佛果故發菩提心不依現在三世有佛果故發菩提心以是義故入此信者皆無有退故設習氣未淳熟者暫時念退信及住位一往不退為正信自己身心總是法界佛無自他性故以十方諸佛無依住智幻住莊嚴門等法界虗空界法性恆遍十方如影對現色身同自身故本不二故體無差別故十方諸佛智身如影所言如響如是信解當得成佛我今信者亦如是知如是信解云何有退全身全心一切境界總是法界一真法身體用理智住在何所退至何處若也身心有所依住放却依處即有退失自了身心本無依住本無所得一切語言分別如空中響應無作緣任物成聲本無依住了如斯法而生信解即無退轉有所依法而發心者放却所得所依著處即有退轉是故起信論云證發心者多住退位為有所得可證故是故乘此不思議乘一切智無依住乘發菩提心一往不退若有退者只為信心不成故於佛教法及如來所乘有所得故有取捨故未成信故不入信流又此經云設有菩薩經無量百千那由他劫行六波羅蜜具六神通由未聞此大方廣佛華嚴經猶名假名菩薩不真菩薩設復聞時不信不入具如經説如此品頌云一切世界諸羣生少有欲求聲聞乘求獨覺者轉復少趣大乘者甚難遇趣大乘者猶為易能信此法倍更難又如下頌云有以手擎十佛剎盡於一劫空中住彼之所作未為難能信此法倍更難過此難信而能信真信決定不退故又如此經普賢菩薩云但聞如來名號及所説法門聞而不信亦能成金剛智種作如人食少金剛喻若以遠因總不退若以現成佛因即是未信之人五隨文解義者於此一品經義分為二一長科當品二隨文解義一長科當品經意於此一品中長科為十四段經爾時文殊師利菩薩説無濁亂清淨行大功德已欲顯示菩提心功德故以偈問賢首菩薩曰我今已為諸菩薩説佛往修清淨行仁亦當於此會中演暢修行勝功德論一爾時文殊師利已下兩行經兩行頌是文殊師利請説發菩提心功德分經爾時賢首菩薩以偈答曰論二爾時賢首菩薩以偈答曰已下有七百一十六行頌是賢首菩薩答末後三行半經明説頌感諸佛許可分經善哉仁者應諦聽彼諸功德不可量我今隨力説少分猶如大海一滴水若有菩薩初發心誓求當證佛菩提彼之功德無邊際不可稱量無與等何況無量無邊劫具修地度諸功德十方一切諸如來悉共稱揚不能盡如是無邊大功德我今於中説少分譬如鳥足所履空亦如大地一微塵論三從初善哉仁者應諦聽已下八行頌明發心功德廣大難量隨力少説分為明菩提心不可以邊際量故功德還當如是經菩薩發意求菩提非是無因無有緣於佛法僧生淨信以是而生廣大心不求五欲及王位富饒自樂大名稱但為永滅衆生苦利益世間而發心常欲利樂諸衆生莊嚴國土供養佛受持正法修諸智證菩提故而發心論四菩薩發意求菩提已下六行頌明初發心所因分經深心信解常清淨恭敬尊重一切佛於法及僧亦如是志誠供養而發心深信於佛及佛法亦信佛子所行道及信無上大菩提菩薩以是初發心信為道元功德母長養一切諸善法斷除疑網出愛流開示涅槃無上道信無垢濁心清淨滅除憍慢恭敬本亦為法藏第一財為清淨手受衆行信能慧施心無吝信能歡喜入佛法信能增長智功德信能必到如來地信令諸根淨明利信力堅固無能壞信能永滅煩惱本信能專向佛功德信於境界無所著遠離諸難得無難信能超出衆魔路示現無上解脫道信為功德不壞種信能生長菩提樹信能增益最勝智信能示現一切佛是故依行次第説信樂最勝甚難得譬如一切世間中而有隨意妙寶珠論五深心信解常清淨已下十八行頌明信三寶增益分音切奢式車切猗於宜切羼初限切軛厄音統他孔切束王玉切嚼在爵切裙羣音噬時制切盥貫音掌之兩切錫昔音趾之市切怯去業切弱若音謙苦兼切坌蒲悶切棘紀力切陂彼為切翦即淺切沼之繞切圃布音耘于君切苑於遠切操倉到切胄除救切鎧苦改切仗丈音矯居夭切藪蘇口切澀色立切羡似面切寤吾故切睡是為切寢七稔切誘與久切蟄直立切翻孚元切虧去危切娛遇俱切迄呼乙切
