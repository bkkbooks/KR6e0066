body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之三十三經時善財童子見此十種光明相已即作是念我今必見普賢菩薩增益善根見一切佛於諸菩薩廣大境界生決定解得一切智於時善財普攝諸根一心求見普賢菩薩起大精進心無退轉即以普眼觀察十方一切諸佛諸菩薩眾所見境界皆作得見普賢之想以智慧眼觀普賢道其心廣大猶如虗空大悲堅固猶如金剛願盡未來常得隨逐普賢菩薩念念隨順修普賢行成就智慧入如來境住普賢地時善財童子即見普賢菩薩在如來前眾會之中坐寶蓮華師子之座諸菩薩眾所共圍遶最為殊特世無與等智慧境界無量無邊難測難思等三世佛一切菩薩無能觀察見普賢身一一毛孔出一切世界微塵數光明雲徧法界虗空界一切世界除滅一切眾生苦患令諸菩薩生大歡喜見一一毛孔出一切佛剎微塵數種種色香𦦨雲徧法界虗空界一切諸佛眾會道場而以普熏見一一毛孔出一切佛剎微塵數雜華雲徧法界虗空界一切諸佛眾會道場雨眾妙華見一一毛孔出一切佛剎微塵數香樹雲徧法界虗空界一切諸佛眾會道場雨眾妙香見一一毛孔出一切佛剎微塵數妙衣雲徧法界虗空界一切諸佛眾會道場雨眾妙衣見一一毛孔出一切佛剎微塵數寶樹雲徧法界虗空界一切諸佛眾會道場雨摩尼寶見一一毛孔出一切佛剎微塵數色界天身雲充滿法界歎菩提心見一一毛孔出一切佛剎微塵數梵天身雲勸諸如來轉妙法輪見一一毛孔出一切佛剎微塵數欲界天王身雲護持一切如來法輪見一一毛孔念念中出一切佛剎微塵數三世佛剎雲徧法界虗空界為諸眾生無歸趣者為作歸趣無覆護者為作覆護無依止者為作依止見一一毛孔念念中出一切佛剎微塵數清淨佛剎雲徧法界虗空界一切諸佛於中出世菩薩眾會悉皆充滿見一一毛孔念念中出一切佛剎微塵數淨不淨佛剎雲徧法界虗空界令雜染眾生皆得清淨見一一毛孔念念中出一切佛剎微塵數不淨淨佛剎雲徧法界虗空界令雜染眾生皆得清淨見一一毛孔念念中出一切佛剎微塵數不淨佛剎雲徧法界虗空界令純染眾生皆得清淨見一一毛孔念念中出一切佛剎微塵數眾生身雲徧法界虗空界隨其所應教化眾生皆令發阿耨多羅三藐三菩提心見一一毛孔念念中出一切佛剎微塵數菩薩身雲徧法界虗空界稱揚種種諸佛名號令諸眾生增長善根見一一毛孔念念中出一切佛剎微塵數菩薩身雲徧法界虗空界一切佛剎宣揚一切諸佛菩薩從初發意所生善根見一一毛孔念念中出一切佛剎微塵數菩薩身雲徧法界虗空界於一切佛剎一一剎中宣揚一切菩薩願海及普賢菩薩清淨妙行見一一毛孔念念中出普賢菩薩行雲令一切眾生心得滿足具足修習一切智道見一一毛孔出一切佛剎微塵數正覺身雲於一切佛剎現成正覺令諸菩薩增長大法成一切智爾時善財童子見普賢菩薩如是自在神通境界身心徧喜踊躍無量重觀普賢一一身分一一毛孔悉有三千大千世界風輪水輪地輪火輪大海江河及諸寶山須彌鐵圍村營城邑宮殿園苑一切地獄餓鬼畜生閻羅王界天龍八部人與非人欲界色界無色界處日月星宿風雲雷電晝夜月時及以年劫諸佛出世菩薩眾會道場莊嚴如是等事悉皆明見如見此世界十方所有一切世界悉如是見如見現在十方世界前際後際一切世界亦如是見各各差別不相雜亂如於此毗盧遮那如來所示現如是神通之力於東方蓮華德世界賢首佛所現神通力亦復如是如賢首佛所如是東方一切世界如東方南西北方四維上下一切世界諸如來所現神通力當知悉爾如十方一切世界如是十方一切佛剎一一塵中皆有法界諸佛眾會一一佛所普賢菩薩坐寶蓮華師子座上現神通力悉亦如是彼一一普賢身中皆現三世一切境界一切佛剎一切眾生一切佛出現一切菩薩眾及聞一切眾生言音一切佛言音一切如來所轉法輪一切菩薩所成諸行一切如來遊戲神通善財童子見普賢菩薩如是無量不可思議大神通力即得十種智波羅蜜何等為十所謂於念念中悉能周徧一切佛剎智波羅蜜於念念中悉能往詣一切佛所智波羅蜜於念念中悉能供養一切如來智波羅蜜於念念中普於一切諸如來所聞法受持智波羅蜜於念念中思惟一切如來法輪智波羅蜜於念念中知一切佛不可思議大神通事智波羅蜜於念念中說一句法盡未來際辯才無盡智波羅蜜於念念中以深般若觀一切法智波羅蜜於念念中入一切法界實相海智波羅蜜於念念中知一切眾生心智波羅蜜於念念中普賢慧行皆現在前智波羅蜜善財童子既得是已普賢菩薩即伸右手摩觸其頂既摩頂已善財即得一切佛剎微塵數三昧門各以一切佛剎微塵數三昧而為眷屬一一三昧悉見昔所未見一切佛剎微塵數佛大海集一切佛剎微塵數一切智助道具生一切佛剎微塵數一切智上妙法發一切佛剎微塵數一切智大誓願入一切佛剎微塵數大願海住一切佛剎微塵數一切智出要道修一切佛剎微塵數諸菩薩所修行起一切佛剎微塵數一切智大精進得一切佛剎微塵數一切智淨光明如此娑婆世界毗盧遮那佛所普賢菩薩摩善財頂如是十方所有世界及彼世界一一塵中一切世界一切佛所普賢菩薩悉亦如是摩善財頂所得法門亦皆同等爾時普賢菩薩摩訶薩告善財言善男子汝見我此神通力不唯然已見大聖此不思議大神通事唯是如來之所能知普賢告言善男子我於過去不可說不可說佛剎微塵數劫行菩薩行求一切智一一劫中為欲清淨菩提心故承事不可說不可說佛剎微塵數佛一一劫中為集一切智福德具故設不可說不可說佛剎微塵數廣大施會一切世間咸使聞知凡有所求悉令滿足一一劫中為求一切智法故以不可說不可說佛剎微塵數財物布施一一劫中為求佛智故以不可說不可說佛剎微塵數城邑聚落國土王位妻子眷屬眼耳鼻舌身肉手足乃至身命而為布施一一劫中為求一切智首故以不可說不可說佛剎微塵數頭而為布施一一劫中為求一切智故於不可說不可說佛剎微塵數諸如來所恭敬尊重承事供養衣服臥具飲食湯藥一切所須悉皆奉施於其法中出家學道修行佛法護持正教善男子我於爾所劫海中自憶未曾於一念間不順佛教於一念間生瞋害心我我所心自他差別心遠離菩提心於生死中起疲厭心懶墮心障礙心迷惑心唯住無上不可沮壞集一切智助道之法大菩提心善男子我莊嚴佛土以大悲心救護眾生教化成就供養諸佛事善知識為求正法弘宣護持一切內外悉皆能捨乃至身命亦無所恡一切劫海說其因緣劫海可盡此無有盡善男子我法海中無有一文無有一句非是捨施轉輪王位而求得者非是捨施一切所有而求得者善男子我所求法皆為救護一切眾生一心思惟願諸眾生得聞是法願以智光普照世間願為開示出世間智願令眾生悉得安樂願普稱讚一切諸佛所有功德我如是等往昔因緣於不可說不可說佛剎微塵數劫海說不可盡是故善男子我以如是助道法力諸善根力大志樂力修功德力如實思惟一切法力智慧眼力佛威神力大慈悲力淨神通力善知識力故得此究竟三世平等清淨法身復得清淨無上色身超諸世間隨諸眾生心之所樂而為現形入一切剎徧一切處於諸世界廣現神通令其見者靡不欣樂善男子汝且觀我如是色身我此色身無邊劫海之所成就無量千億那由他劫難見難聞善男子若有眾生未種善根及種少善根聲聞菩薩猶尚不得聞我名字況見我身善男子若有眾生得聞我名於阿耨多羅三藐三菩提不復退轉若見若觸若迎若送若暫隨逐乃至夢中見聞我者皆亦如是或有眾生一日一夜憶念於我即得成熟或七日七夜半月一月半年一年百年千年一劫百劫乃至不可說不可說佛剎微塵數劫憶念於我而成熟者或一生或百生乃至不可說不可說佛剎微塵數生憶念於我而成熟者或見我放大光明或見我震動佛剎或生怖畏或生歡喜皆得成熟善男子我以如是等佛剎微塵數方便門令諸眾生於阿耨多羅三藐三菩提得不退轉善男子若有眾生見聞於我清淨剎者必得生此清淨剎中若有眾生見聞於我清淨身者必得生我清淨身中善男子汝應觀我此清淨身爾時善財童子觀普賢菩薩身相好肢節一一毛孔中皆有不可說不可說佛剎海一一剎海皆有諸佛出興於世大菩薩眾所共圍遶又復見彼一切剎海種種建立種種形狀種種莊嚴種種大山周帀圍遶種種色雲彌覆虗空種種佛興演種種法如是等事各各不同又見普賢於一一世界海中出一切佛剎微塵數佛化身雲周徧十方一切世界教化眾生令向阿耨多羅三藐三菩提時善財童子又見自身在普賢身內十方一切諸世界中教化眾生又善財童子親近佛剎微塵數諸善知識所得善根智慧光明比見普賢菩薩所得善根百分不及一千分不及一百千分不及一百千億分乃至算數譬喻亦不能及是善財童子從初發心乃至得見普賢菩薩於其中間所入一切諸佛剎海今於普賢一毛孔中一念所入諸佛剎海過前不可說不可說佛剎微塵數倍如一毛孔一切毛孔悉亦如是善財童子於普賢菩薩毛孔剎中行一步過不可說不可說佛剎微塵數世界如是而行盡未來劫猶不能知一毛孔中剎海次第剎海藏剎海差別剎海普入剎海成剎海壞剎海莊嚴所有邊際亦不能知佛海次第佛海藏佛海差別佛海普入佛海生佛海滅所有邊際亦不能知菩薩眾海次第菩薩眾海藏菩薩眾海差別菩薩眾海普入菩薩眾海集菩薩眾海散所有邊際亦不能知入眾生界知眾生根教化調伏諸眾生智菩薩所住甚深自在菩薩所入諸地諸道如是等海所有邊際善財童子於普賢菩薩毛孔剎中或於一剎經於一劫如是而行乃至或有經不可說不可說佛剎微塵數劫如是而行亦不於此剎沒於彼剎現念念周徧無邊剎海教化眾生令向阿耨多羅三藐三菩提當是之時善財童子則次第得普賢菩薩諸行願海與普賢等與諸佛等一身充滿一切世界剎等行等正覺等神通等法輪等辯才等言辭等音聲等力無畏等佛所住等大慈悲等不可思議解脫自在悉皆同等爾時普賢菩薩摩訶薩即說頌言論第九爾時善財童子依彌勒菩薩摩訶薩教已下至頌此一段明善財已於慈氏所得一生之佛果普印一百一十城之法門方於初信心中金剛藏智菩提場毗盧遮那如來師子座前一切寶蓮華藏座上起等虗空界廣大十種心等以明經歷一百一十城至慈氏一生佛果究竟不離初信心毗盧遮那如來金剛藏智菩提妙理中成便於金剛藏智菩提妙理之中起法界佛果恒常普賢圓周法界妙行以此已下善財於普賢身中行菩薩行普賢摩善財童子頂方明法界中恒常佛果恒常普賢行相及相應方始及得一切諸佛已成舊果普賢舊行至慈氏菩薩明此無三世中一生是見修道行初始入佛果位之生當來降神下生是當來成佛之生以六相法門該之善財亦以今生是見道修行行滿之生來生方明成佛之生以此當來一生之佛果會根本金剛藏智菩提妙理毗盧遮那如來所得之果普賢舊行本來一體具足三世古今不二時復不遷同異自在處法界因陀羅網無礙法門從此慈氏一位法門約分六門一明舉果成因起信門二明已信加行契修門三加行修行契果門四已將所契之果會因門五還依本因圓融門六究竟法界始終因果無二同時不遷門以此六門和會可見其意此一段有十紙已下經明善財於慈氏菩薩所勝進入一生之佛果智境得三世一切境界不忘念莊嚴藏門返印一百一十城之法門入初信心時不出剎那際因圓果滿至金剛藏菩提場毗盧遮那如來師子座前一切寶蓮華藏座上起等虗空界廣大十種心方起恒常法界佛果普賢行以此位中十方佛剎微塵中普賢菩薩一一塵中一時摩善財頂以明佛果法界行滿意明行滿不離因時不遷智不異乃至見佛剎微塵數善知識乃至見普賢身肢節毛孔中國土身以明入法界智境行網一多重重無礙無礙無盡無盡利生常然之門具如文自廣明論文略申經中意趣所以不可具錄其文於此段中長科為十段一爾時善財童子依彌勒菩薩摩訶薩教已下至同住渴仰欲見普賢菩薩有三十三行半經明善財以慈氏菩薩所勝進修行入一生之佛果却會初信心中菩提場普光明殿智境法界恒然寂用無礙因陀羅網境界佛果普賢行海恒圓滿分經云漸次而行經遊一百一十城已到普門國者以一切十方諸佛及一切眾生同為一法界國土無別體故經遊一百一十城者明一時普印前所修法無前後故思惟觀察一心願見文殊師利即見三千大千世界微塵數善知識者即明以文殊師利法身智慧等周普見一切不異文殊之體明總相也此三千大千世界微塵數量者普門國法界初數總相次第意明毛孔中三千大千世界即周十方一一皆等入法界方便不可越數之也次於此金剛藏菩提場中毗盧遮那如來師子座前一切寶蓮華座上起等虗空界廣大心者明以本信心中所信佛果菩提金剛智藏無染大悲之體起一切法界因陀羅網境界普賢恒行之門已下意例然如文廣說此明總收所進修之因果而歸本樣立法如是令使開解一一如是自心觀達修行令使相稱是眾聖賢之大意也意明不離初信心中菩提體根本智修差別智滿普賢行充滿十方塵剎重重普賢行海是自行滿因果不出剎那際中恒以此法恒化眾生不出剎那際無有斷絕始終之念此明毗盧遮那普賢法界無始無終大圓明智恒普印之常行無有出沒休廢之事十方常然身無內外二即於此金剛藏菩提場毗盧遮那如來師子座前一切寶蓮華藏座上起等虗空界廣大心已下至善財童子起如是心時有八行經明善財於初所信心中法界金剛智藏菩提體中起普賢法界大用因果同時無礙分以六相義該之三由自善根如來加被普賢菩薩同善根力已下至是為十有十一行經為明善財見十種瑞相分四又見十種光明相已下至是為十有十七行經明善財見十種光明分五時善財童子見此十種光明相已已下至增長大法成一切智有五十七行經明善財見普賢菩薩在如來前眾會之中坐寶蓮華師子之座及見普賢身一一毛孔中廣大法界分六爾時善財童子見普賢菩薩如是自在神通已下至一切如來遊戲神通有二十三行經明善財重觀普賢身見十方諸佛人天地獄咸在於身毛孔之中分七善財童子見普賢菩薩如是已下至善財童子既得是已有十三行半經明善財童子得十住智徧一切法智波羅蜜分八普賢菩薩即伸右手摩善財頂已下至所得法門亦皆同等有十四行經明此方普賢菩薩摩善財頂及所得法門十方一切世界一切微塵中普賢菩薩一時摩善財頂及善財所得法門皆悉如此分九爾時普賢菩薩摩訶薩告善財言已下至善男子汝應觀我此清淨身有六十行經明普賢菩薩為善財說自謂眾生求出離道修行福智二行以不可說不可說佛剎微塵數劫行菩薩行求一切智於身肉手足肝膽王位財寶及以轉輪王位求一切智利益眾生門無暫時間斷分十爾時善財童子觀普賢菩薩身相好肢節一一毛孔中已下至頌有三十九行經明善財觀普賢菩薩身相好毛孔境界法門一念所入諸佛剎海過前不可說不可說佛剎微塵數位分一毛孔如是一切毛孔亦然廣如經自明經汝等應除諸惑垢一心不亂而諦聽我說如來具諸度一切解脫真實道出世調柔勝丈夫其心清淨如虗空恒放智日大光明普使羣生滅癡闇如來難可得見聞無量億劫今乃值如優曇華時一現是故應聽佛功德隨順世間諸所作譬如幻士現眾業但為悅可眾生心未曾分別起想念爾時諸菩薩聞此說已一心渴仰唯願得聞如來世尊真實功德咸作是念普賢菩薩具修諸行體性清淨所有言說皆悉不虗一切如來共所稱歎作是念已深生渴仰爾時普賢菩薩功德智慧具足莊嚴猶如蓮華不著三界一切塵垢告諸菩薩言汝等諦聽我今欲說佛功德海一滴之相即說頌曰佛智廣大同虗空普徧一切眾生心悉了世間諸妄想不起種種異分別一念悉知三世法亦了一切眾生根譬如善巧大幻師念念示現無邊事隨眾生心種種行往昔諸業誓願力令其所見各不同而佛本來無動念或有處處見佛坐充滿十方諸世界或有其心不清淨無量劫中不見佛或有信解離憍慢發意即得見如來或有諂誑不淨心億劫尋求莫值遇或一切處聞佛音其音美妙令心悅或有百千萬億劫心不淨故不聞者或見清淨大菩薩充滿三千大千界皆已具足普賢行如來於中儼然坐或見此界妙無比佛無量劫所嚴淨毗盧遮那最勝尊於中覺悟成菩提或見蓮華勝妙剎賢首如來住在中無量菩薩眾圍遶能悉勤修普賢行或有見佛無量壽觀自在等所圍遶悉已住於灌頂地充滿十方諸世界或有見此三千界種種莊嚴如妙喜阿閦如來住在中及如香象諸菩薩或見月覺大名稱與金剛幢菩薩等住如圓鏡妙莊嚴普徧十方清淨剎或見日藏世所尊住善光明清淨土及與灌頂諸菩薩充徧十方而說法或見金剛大𦦨佛而與智幢菩薩俱周行一切廣大剎說法除滅眾生翳一一毛端不可說諸佛具相三十二菩薩眷屬共圍遶種種說法度眾生或有觀見一毛孔具足莊嚴廣大剎無量如來悉在中清淨佛子皆充滿或有見一微塵內具有恒沙佛國土無量菩薩悉充滿不可說劫修諸行或有見一毛端處無量塵沙諸剎海種種業起各差別毗盧遮那轉法輪或見世界不清淨或見清淨寶所成如來住壽無量時乃至涅槃諸所現普徧十方諸世界種種示現不思議隨諸眾生心智業靡不化度令清淨如是無上大導師充滿十方諸國土示現種種神通力我說少分汝當聽或見釋迦成佛道已經不可思議劫或見今始為菩薩十方利益諸眾生或有見此釋師子供養諸佛修行道或見人中最勝尊現種種力神通事或見布施或持戒或忍或進或諸禪般若方便願力智隨眾生心皆示現或見究竟波羅蜜或見安住於諸地總持三昧神通智如是悉現無不盡或見修行無量劫住於菩薩堪忍位或現住於不退地或現法水灌其頂或現梵釋護世身或現剎利婆羅門種種色相所莊嚴猶如幻師現眾像或現兜率始降神或見宮中受嬪御或見棄捨諸榮樂出家離俗行學道或見始生或見滅或見出家學異行或見坐於菩提樹降伏魔軍成正覺或有見佛始涅槃或見起塔徧世間或見塔中立佛像以知時故如是現或見如來無量壽與諸菩薩授尊記而成無上大導師次補住於安樂剎或見無量億千劫作佛事已入涅槃或見今始成菩提或見正修諸妙行或見如來清淨月在於梵世及魔宮自在天宮化樂宮示現種種諸神變或見在於兜率宮無量諸天共圍遶為彼說法令歡喜悉共發心供養佛或見住在夜摩天忉利護世龍神處如是一切諸宮殿莫不於中現其像於彼然燈世尊所散華布髮為供養從是了知深妙法恒以此道化羣生或有見佛入涅槃或見初始成菩提或見住於無量劫或見須臾即滅度身相光明與壽命智慧菩提及涅槃眾會所化威儀身如是一一皆無數或現其身極廣大譬如須彌大寶山或見跏趺不動搖充滿無邊諸世界或見圓光一尋量或見千萬億由旬或見照於無量土或見充滿一切剎或見佛壽八十年或壽百千萬億歲或住不可思議劫如是展轉倍過此佛智通達淨無礙一念普知三世法皆從心識因緣起生滅無常無自性於一剎中成正覺一切剎處悉亦成一切入一一亦爾隨眾生心皆示現如來住於無上道成就十力四無畏具足智慧無所礙轉於十二行法輪了知苦集及滅道分別十二因緣法法義樂說詞無礙以是四辯廣開演諸法無我無有相業性不起亦無失一切遠離如虗空佛以方便而分別如來如是轉法輪普震十方諸國土宮殿山河悉搖動不使眾生有驚怖如是普演廣大音隨其根欲皆令解悉使發心除惑垢而佛未始生心念或聞施戒忍精進禪定般若方便智或聞慈悲及喜捨種種音辭各差別或聞四念四正勤神足根力及覺道諸念神通止觀等無量方便諸法門龍神八部人非人梵釋護世諸天眾佛以一音為說法隨其品類皆令解若有貪欲瞋恚癡忿覆慳嫉及憍諂八萬四千煩惱異皆令聞說彼治法若未具修白淨法令其聞說十戒行已能布施調伏人令聞寂滅涅槃音若人志劣無慈愍厭惡生死自求離令其聞說三脫門使得出苦涅槃樂若有自性少諸欲厭背三有求寂靜令其聞說諸緣起依獨覺乘而出離若有清淨廣大心具足施戒諸功德親近如來具慈愍令其聞說大乘音或有國土聞一乘或二或三或四五如是乃至無有量悉是如來方便力涅槃寂靜未曾異智行勝劣有差別譬如虗空體性一鳥飛遠近各不同佛性音聲亦如是普徧一切虗空界隨諸眾生心智殊所聞所見各差別佛以過去修諸行能隨所樂演妙音無心計念此與彼我為誰說誰不說如來面門放大光具足八萬四千數所說法門亦如是普照世界除煩惱具足清淨功德智而常隨順三世間譬如虗空無染著為眾生故而出現示有生老病死苦亦示住壽處於世雖順世間如是現體性清淨同虗空一切國土無有邊眾生根欲亦無量如來智眼皆明見隨所應化示佛道究竟虗空十方界所有人天大眾中隨其形相各不同佛現其身亦如是若在沙門大眾會剃除鬚髮服袈裟執持衣鉢護諸根令其歡喜息煩惱若時親近婆羅門即為示現羸瘦身執杖持瓶恒潔淨具足智慧巧談說吐故納新自充飽吸風飲露無異食若坐若立不動搖現斯苦行摧異道或持彼戒為世師善達醫方等諸論書數天文地眾相及身休咎無不了深入諸禪及解脫三昧神通智慧行言談諷詠共嬉戲方便皆令住佛道或現上服以嚴身首戴華冠蔭高蓋四兵前後共圍遶誓眾宣威伏小王或為聽訟斷獄官善解世間諸法務所有與奪皆明審令其一切悉欣伏或作大臣專弼輔善用諸王治政法十方利益皆周徧一切眾生莫了知或為粟散諸小王或作飛行轉輪帝令諸王子婇女眾悉皆受化無能測或作護世四天王統領諸龍夜叉等為其眾會而說法一切皆令大欣慶或為忉利大天王住善法堂歡喜園首戴華冠說妙法諸天覲仰莫能測或住夜摩兜率天化樂自在魔王所居處摩尼寶宮殿說真實行令調伏或至梵天眾會中說四無量諸禪道普令歡喜便捨去而莫知其往來相或至阿迦尼吒天為說覺分諸寶華及餘無量聖功德然後捨去無知者如來無礙智所見其中一切諸眾生悉以無邊方便門種種教化令成就譬如幻師善幻術現作種種諸幻事佛化眾生亦如是為其示現種種身譬如淨月在虗空令世眾生見增減一切河池現影像所有星宿奪光色如來智月出世間亦以方便示增減菩薩心水現其影聲聞星宿無光色譬如大海寶充滿清淨無濁無有量四洲所有諸眾生一切於中現其像佛身功德海亦爾無垢無濁無邊際乃至法界諸眾生靡不於中現其影譬如淨日放千光不動本處照十方佛日光明亦如是無去無來除世暗譬如龍王降大雨不從身出及心出而能霑洽悉周徧滌除炎熱使清涼如來法雨亦復然不從於佛身心出而能開悟一切眾普使滅除三毒火如來清淨妙法身一切三界無倫匹以出世間言語道其性非有非無故雖無所依無不住雖無不至而不去如空中畫夢所見當於佛體如是觀三界有無一切法不能與佛為譬喻譬如山林鳥獸等無有依空而住者大海摩尼無量色佛身差別亦復然如來非色非非色隨應而現無所住虗空真如及實際涅槃法性寂滅等唯有如是真實法可以顯示於如來剎塵心念可數知大海中水可飲盡虗空可量風可繫無能盡說佛功德若有聞斯功德海而生歡喜信解心如所稱揚悉當獲慎勿於此懷疑念論第十從八行頌已下至經末明普賢稱歎如來法界果德利生廣大無量功德分於說頌中分為三段一初八行頌明普賢菩薩敕眾諦聽欲自說佛功德分二有六行經明眾歡喜樂聞分三以頌略申如來功德少許之分其意頌文自具音切懶落拜切儼魚檢切嬪毗人切背彼艾切閦初六切
