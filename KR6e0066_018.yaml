body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論如來現相品第二論釋此一品義分為三一釋品名目二釋品來意三隨文釋義一釋品名目者此品何故名現相品為諸菩薩神天衆皆悉已集默思心念請法問有三十七問如來知念即於面門舒光現相及集十方衆答前所問此品之內如來兩度放光齒光告衆令集毫光示法令信佛境界及所行因果行門又諸來菩薩毛孔放光通為三度放光故又集十方衆海佛境界相菩薩境界相答前衆所問故名現相品此經表法及集衆如來放光前後總十度放光故一面門齒光集他方之衆二眉間毫光示果成因三足下輪中放光成十信四帝釋宮中足指端放光集衆入道成十住位五夜摩天宮足趺上放光成十行門六兜率天宮膝上放光成十回向七他化天宮眉間毫相放光成十地八如來出現品眉間放光入文殊頂九口中放光入普賢口令此二人問答如來出現始終因果道理十法界品中放眉間光名普照三世法界門是為十如隨好光明功德品常放光明隨根普照此光非獨緣五位進修表法也是常依根攝化光也二釋品來意者此品為前世間主等默念三十七問此品放光集衆示其法相答前衆所問三十七法此品故來三隨文釋義者復分為二一長科經意二科其當品一長科經意者自此現相品乃至普賢三昧品世界成就品華藏世界品毗盧遮那品此五品經總是答前三十七問明舉果勸修分二科其當品者於此當品其意有四經爾時諸菩薩及一切世間主作是思惟云何是諸佛地云何是諸佛境界云何是諸佛加持云何是諸佛所行云何是諸佛力云何是諸佛無所畏云何是諸佛三昧云何是諸佛無能攝取云何是諸佛眼云何是諸佛耳云何是諸佛鼻云何是諸佛舌云何是諸佛身云何是諸佛意云何是諸佛身光云何是諸佛光明云何是諸佛聲云何是諸佛智唯願世尊哀愍我等開示演說又十方世界海一切諸佛皆為諸菩薩說世界海衆生海佛海佛波羅蜜海佛解脫海佛變化海佛演說海佛名號海佛壽量海及一切菩薩誓願海一切菩薩發趣海一切菩薩助道海一切菩薩乘海一切菩薩行海一切菩薩出離海一切菩薩神通海一切菩薩波羅蜜海一切菩薩地海一切菩薩智海願佛世尊亦為我等如是而說爾時諸菩薩威神力故於一切供養具雲中自然出音而說頌言無量劫中修行滿菩提樹下成正覺為度衆生普現身如雲充遍盡未來衆生有疑皆使斷廣大信解悉令發無邊際苦普使除諸佛安樂咸令證菩薩無數等剎塵俱來此會同瞻仰願隨其意所應受演說妙法除疑惑云何了知諸佛地云何觀察如來境佛所加持無有邊願示此法令清淨云何是佛所行處而以智慧能明入佛力清淨廣無邊為諸菩薩應開示云何廣大諸三昧云何淨治無畏法神通力用不可量願隨衆生心樂說諸佛法王如世主所行自在無能制及餘一切廣大法為利益故當開演佛眼云何無有量耳鼻舌身亦復然意無有量復云何願示能知此方便如諸剎海衆生海法界所有安立海及諸佛海亦無邊願為佛子咸開暢永出思議衆度海普入解脫方便海所有一切法門海此道場中願宣說論第一從爾時諸菩薩及一切世間主已下一段長行并偈頌是世主請法分義分為三一從爾時已下至唯願世尊哀愍我等於中長行有八行半經純請十八種佛法二又十方世界海已下有六行半經問佛海菩薩海有十九問通為三十七問三願佛世尊已下可兩行經明菩薩神力故一切供具放光光中說頌請佛斷疑分第一從初爾時諸菩薩及一切世間主作是思惟明心念默請云何是諸佛地法界不思議地是佛地故下文云法性如虗空諸佛於中住此為如來地也云何是諸佛境界如下經云如來處此菩提座一毛示現多剎海一一毛現悉亦然此是如來之境界又法界是如來境界云何是諸佛加持下如來加普賢菩薩入於三昧說佛持故云何是諸佛所行經云無礙行是如來行又普賢行是一切諸佛共所行行故云何是諸佛力經云如來有處非處十種力是云何是諸佛無所畏如來無五怖畏及四無畏是云何是諸佛無能攝取如來無性妙智是無能攝取云何是諸佛眼知一切法智知一切衆生根智名一切種智是佛眼故又此經下文說十眼等是又如十身相海云如來眼有大人相名自在普見雲云何是諸佛耳如法界品云一切諸佛有無障礙耳悉能解了一切音聲云何是諸佛鼻如來鼻有大人相名一切神通智慧於中出現無量化佛坐寶蓮華往諸世界云何是諸佛舌如下經云如來舌有大人相名示現音聲影像雲云何是諸佛身下文云諸佛同法身無依無差別又佛身充滿於法界普現一切衆生前云何是諸佛意如來出現品云云何知如來應正等覺心佛子如來心意識無量俱不可得但智無量故知如來心云何是諸佛身光如來隨好常光隨根照物普周法界云何是諸佛光明光有二種一教光二如此經光明覺品是及前後十度表法光明是云何是諸佛智一切智一切種種分別智是又如下文如來甚深智普入於法界能隨三世轉與世為明導此已上問十八種法竟第二經云唯願世尊哀愍我等有三句經文結請佛說十九種海經云一切諸佛皆為諸菩薩說世界海總舉問竟衆生海釋曰如世間衆生廣多如海故佛海經云如來安處菩提座一毛示現多剎海一一毛現悉亦然如是普周於法界佛波羅蜜海十波羅蜜遍一切菩薩行故佛解脫海如來法身是佛解脫又智慧解脫乃至五分法身戒定慧解脫解脫知見等是佛變化海如下文無體無住處亦無生可得無相亦無形所現皆如影又一切剎土微塵數常現身雲悉充滿又云於一佛身上化為無量身佛演說海下文一一毛孔中光網遍十方演佛妙音聲調彼難調者又一音遍諸根故然如來音聲不從心出不從身出佛名號海如下名號品是如來名號等一切衆生心也佛壽量海如下文佛身如影現生滅不可得是佛壽量海又下文壽量品是及一切菩薩誓願海淨行品等是又十回向品中大願是一切菩薩發趣海如下文云此會諸佛子善修衆智慧其人已能入如斯方便門又下文云從地而得地住於力地中億劫勤修行所獲法如是明從地而得地者不離真法界自體清淨性地而行進修十住十行等法故云從地而得地又十行品是十發趣加行成就令菩提心智悲純熟故一切菩薩助道海三十七助道品是觀身受心法為首一切菩薩乘海乘如來乘不思議乘法界乘是乃至八萬四千乘等一切菩薩行海普賢行是如下經云如是分身智境界普賢行中能建立一切菩薩出離海如五位中加行方便是如下經云此會諸菩薩入佛難思地一一皆能見一切佛神力又下文云普賢諸行願修治已明潔能於一切剎普見佛神變身住一切處一切皆平等智能如是行入佛之境界一切菩薩神通海如下十方佛剎來集菩薩衆及毛孔出衆隨行利生等事是又下十通品亦是又下文一一佛剎中往詣悉無餘見佛神通力入佛所行處一切菩薩波羅蜜海如下經中十方來集大衆身諸毛孔各出十佛世界微塵數光一一光出十佛世界微塵數菩薩悉能遍入一切法界諸安立海教化衆生廣如經具說是波羅蜜海也此是與發心者作普賢樣一切菩薩地海如下經云從地而得地是也又十地品是答又如來地是菩薩地如下經云此會諸菩薩入佛難思地一切菩薩智海根本智是如來智於根本智起差別智教化衆生是菩薩智海乃至十無盡智是也唯願世尊已下三句總結勸請准例十方諸佛既說今佛世尊亦合同說又爾時已下四句明供具說頌已上三十七問向下至毗盧遮那品已來有三種答前所問一如下齒間放光集衆現相神通答二如下眉間毫光出衆現相及十菩薩偈頌答三普賢入定出定以言詮示佛業衆生業因果古今相襲答如世界成就品菩薩衆生染淨報業答前三十七問佛海菩薩行海不離其中又說華藏莊嚴世界海說佛報得所居之土答前三十七問佛境界海衆生海菩薩行海波羅蜜海總不離其中又說古往毗盧遮那品是引古印今令衆生信承襲不斷法不虗來若古無舊跡今從何得以是義故引古佛用印今時成信從此初會一會至毗盧遮那品六品經總明舉果勸修信他已成佛者果德悲智境界行普賢行及報得莊嚴身土分從佛名號品重問二十八問即是舉古佛果門令今世及未來發心者自信自心佛果與古佛果不異及菩薩十信十住十行十回向十地十一地佛眼耳鼻舌身意不異故信自今修不異古法有此二十八種不異之法具如佛名號品所問二十八問之法今古不異令初發心者應如是依古證修使令道不謬故直至法界品總是其答所問之法故若依五位法上有一百一十重佛果菩薩行古今不異若通信位即一百二十重古今佛因果不異至位方明三從供具雲中出音說二十行頌於中義分為四初兩行頌歎佛行滿成佛行遍三世次兩行頌明勸佛為衆除疑得證次兩行頌明大衆已集勸請除疑次云何已下十四行頌明重頌前三十七問問曰大衆何不以言自問因何默念致疑何不自以言讚勸請云何供具雲出音請佛答曰明佛得法界心與一切衆生同心故以心不異故知彼心疑供具說頌者明一切法總法界體也法界不思議一切法不思議故明聖衆心境無二故凡夫迷法界自見心境有二故顛倒生也經爾時世尊知諸菩薩心之所念即於面門衆齒之間放佛剎微塵數光明所謂衆寶華遍照光明出種種音莊嚴法界光明垂布微妙雲光明十方佛坐道場現神變光明一切寶𦦨雲蓋光明充滿法界無礙光明遍莊嚴一切佛剎光明迥建立清淨金剛寶幢光明普莊嚴菩薩衆會道場光明妙音稱揚一切佛名號光明如是等佛剎微塵數一一復有佛剎微塵數光明以為眷屬其光悉具衆妙寶色普照十方各一億佛剎微塵數世界海彼世界海諸菩薩衆於光明中各得見此華藏莊嚴世界海以佛神力其光於彼一切菩薩衆會之前而說頌言無量劫中修行海供養十方諸佛海化度一切衆生海今成妙覺遍照尊毛孔之中出化雲光明普照於十方應受化者咸開覺令趣菩提淨無礙佛昔往來諸趣中教化成熟諸羣生神通自在無邊量一念皆令得解脫摩尼妙寶菩提樹種種莊嚴悉殊特佛於其下成正覺放大光明普威耀大音震吼遍十方普為弘宣寂滅法隨諸衆生心所樂種種方便令開曉往修諸度皆圓滿等於千剎微塵數一切諸力悉已成汝等應往同瞻禮十方佛子等剎塵悉共歡喜而來集已雨諸雲為供養今在佛前專覲仰如來一音無有量能演契經深大海普雨妙法應羣心彼兩足尊宜往見三世諸佛所有願菩提樹下皆宣說一剎那中悉現前汝可速詣如來所毗盧遮那大智海面門舒光無不見今待衆集將演音汝可往觀聞所說論第二從爾時世尊知諸菩薩心之所念已下有一段長行并一偈頌是如來放齒光十方告衆令衆咸集現法答前所問分於此分中大意有十一如來知衆心念有疑二齒光普照三其光有十名四明光具眷屬五陳光色相六明光照遠近七明大衆蒙光彼此相見八明光遍他方衆會九明光能出聲告衆十明十方之衆聞告咸來問曰何故如來面門齒間出光告衆答曰面門及齒明言音出於中故於中出光今欲答衆所疑普告十方佛土大衆來集示法答前三十七問中云何是諸佛地佛境界佛加持佛行佛力等故須口中齒間放光光者除暗義又答前云何是佛光明除現在未來衆心疑暗故口齒者吐納言音說法表告之所由也故於中出光於此光明說其二十行