body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論四聖諦品第八論於此一品之中義分為三一釋品名目二釋品來意三隨文釋義一釋品名目者諦者實義也明如來説四種實義令諸衆生起信解故問曰何故不説多但云四答曰此四種諦義總攝多故為明一切世間不離苦集一切出世間不離滅道滅盡諸苦名為滅諦滅盡涅槃名為道諦三乘涅槃皆有可得此大涅槃無餘可得名為道諦以二乘趣寂菩薩多生淨土又推淨土在餘他方又云菩薩留惑潤生故若不故留煩惱還應必有涅槃可證或有他方淨土可生是故三乘涅槃皆有可得又閻浮提成正覺佛木樹草座是化佛上方摩醯首羅天紅蓮華上佛是實報皆有欣厭故是故三乘四諦厭苦集欣滅道名四諦法輪此一乘經言四聖諦者是其實義何以故達苦性真無欣厭故無有他方別佛剎別淨土故無有染淨涅槃生死有欣厭所修道故所修道者住如法住修如法道不厭不著不欣不取一如法界無去來性無住處性身塵毛孔心之及境皆稱法性如是信解如是修道以是義故一乘四聖諦三乘四諦各各差別各有信解如來依根方便設教皆非凡夫能立如今修道者但隨自信解力便處即作不可例然如法華經為聲聞人説四諦法為緣覺人説十二因緣為諸菩薩説六波羅蜜亦是如來隨時之説如此經十地品五地菩薩作十種諦觀以四聖諦為體六地菩薩作十種十二緣生觀此是如來隨位進修之法大要總言此四聖諦十二緣生法門但一切諸聖一切凡夫起信樂佛法心道未滿者皆從初心觀自他苦故發菩提心樂求道法但依大小勝劣不同四諦十二緣各別但一切世間法四諦義無不該通此是如來語業説法遍周故如纓珞經立九乘法門者意明三乘參用四諦十二緣各自得道差別其九乘者一聲聞聲聞乘二聲聞緣覺乘三聲聞菩薩乘如是三乘同觀四諦十二緣法各自得道不同如是三乘中各有三通為九通此法界不思議乘於解脫道中總有十乘皆得究竟無三界苦諸餘道門皆是人天世間生滅之法設得少樂終竟不離苦本三乘雖得出三界其道未真未是佛果乘故二釋品來意者為明前名號品是説如來身業隨方名號不同各別此品説如來隨方語業隨方説法不離四聖諦故此品須來三隨文釋義者於此一品經文於中總有十二段經經爾時文殊師利菩薩摩訶薩告諸菩薩言諸佛子苦聖諦此娑婆世界中或名罪或名逼迫或名變異或名攀緣或名聚或名刺或名依根或名虗誑或名癰瘡處或名愚夫行諸佛子苦集聖諦此娑婆世界中或名繫縛或名滅壞或名愛著義或名妄覺念或名趣入或名決定或名網或名戲論或名隨行或名顛倒根諸佛子苦滅聖諦此婆娑世界中或名無諍或名離塵或名寂靜或名無相或名無沒或名無自性或名無障礙或名滅或名體真實或名住自性諸佛子苦滅道聖諦此娑婆世界中或名一乘或名趣寂或名導引或名究竟無分別或名平等或名捨擔或名無所趣或名隨聖意或名仙人行或名十藏諸佛子此娑婆世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼密訓世界中或名營求根或名不出離或名繫縛本或名作所不應作或名普鬬諍或名分析悉無力或名作所依或名極苦或名躁動或名形狀物諸佛子所言苦集聖諦者彼密訓世界中或名順生死或名染著或名燒然或名流轉或名敗壞根或名續諸有或名惡行或名愛著或名病源或名分數諸佛子所言苦滅聖諦者彼密訓世界中或名第一義或名出離或名可讚歎或名安隱或名善入趣或名調伏或名一分或名無罪或名離貪或名決定諸佛子所言苦滅道聖諦者彼密訓世界中或名猛將或名上行或名超出或名有方便或名平等眼或名離邊或名了悟或名攝取或名最勝眼或名觀方諸佛子密訓世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼最勝世界中或名恐怖或名分段或名可厭惡或名須承事或名變異或名招引怨或名能欺奪或名難共事或名妄分別或名有勢力諸佛子所言苦集聖諦者彼最勝世界中或名敗壞或名癡根或名大怨或名利刃或名滅味或名仇對或名非己物或名惡導引或名增黑暗或名壞善利諸佛子所言苦滅聖諦者彼最勝世界中或名大義或名饒益或名義中義或名無量或名所應見或名離分別或名最上調伏或名常平等或名可同住或名無為諸佛子所言苦滅道聖諦者彼最勝世界中或名能燒然或名最上品或名決定或名無能破或名深方便或名出離或名不下劣或名通達或名解脫性或名能度脫諸佛子最勝世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼離垢世界中或名悔恨或名資待或名展轉或名住城或名一味或名非法或名居宅或名妄著處或名虗妄見或名無有數諸佛子所言苦集聖諦者彼離垢世界中或名無實物或名但有語或名非潔白或名生地或名執取或名鄙賤或名增長或名重擔或名能生或名粗獷諸佛子所言苦滅聖諦者彼離垢世界中或名無等等或名普除盡或名離垢或名最勝根或名稱會或名無資待或名滅惑或名最上或名畢竟或名破印諸佛子所言苦滅道聖諦者彼離垢世界中或名堅固物或名方便分或名解脫本或名本性實或名不可毀呰或名最清淨或名諸有邊或名受寄全或名作究竟或名淨分別諸佛子離垢世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼豐溢世界中或名愛染處或名險害根或名有海分或名積集成或名差別根或名增長或名生滅故名障礙或名刀劍本或名數所成諸佛子所言苦集聖諦者彼豐溢世界中或名可惡或名名字或名無盡或名分數或名不可愛或名能攫噬或名粗鄙物或名愛著或名器或名動諸佛子所言苦滅聖諦者彼豐溢世界中或名相續斷或名開顯或名無文字或名無所修或名無所見或名無所作或名寂滅或名已燒盡或名捨重擔或名已除壞諸佛子所言苦滅道聖諦者彼豐溢世界中或名寂滅行或名出離行或名勤修證或名安隱去或名無量壽或名善了知或名究竟道或名難修習或名至彼岸或名無能勝諸佛子豐溢世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼攝取世界中或名能劫奪或名非善友或名多恐怖或名種種戲論或名地獄性或名非實義或名貪欲擔或名深重根或名隨心轉或名根本空諸佛子所言苦集聖諦者彼攝取世界中或名貪著或名惡成辦或名過惡或名速疾或名能執取或名想或名有果或名無可説或名無可取或名流轉諸佛子所言苦滅聖諦者彼攝取世界中或名不退轉或名離言説或名無相狀或名可欣樂或名堅固或名上妙或名離癡或名滅盡或名遠惡或名出離諸佛子所言苦滅道聖諦者彼攝取世界中或名離言或名無諍或名教導或名善回向或名大善巧或名差別方便或名如虗空或名寂靜行或名勝智或名能了義諸佛子攝取世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼饒益世界中或名重擔或名不堅或名如賊或名老死或名愛所成或名流轉或名疲勞或名惡相狀或名生長或名利刃諸佛子所言苦集聖諦者彼饒益世界中或名敗壞或名渾濁或名退失或名無力或名喪失或名乖違或名不和合或名所作或名取或名意欲諸佛子所言苦滅聖諦者彼饒益世界中或名出獄或名真實或名離難或名覆護或名離惡或名隨順或名根本或名捨因或名無為或名無相續諸佛子所言苦滅道聖諦者彼饒益世界中或名達無所有或名一切印或名三昧藏或名得光明或名不退法或名能盡有或名廣大路或名能調伏或名有安隱或名不流轉根諸佛子饒益世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼鮮少世界中或名險樂欲或名繫縛處或名邪行或名隨受或名無慚恥或名貪欲根或名恆河流或名常破壞或名炬火性或名多憂惱諸佛子所言苦集聖諦者彼鮮少世界中或名廣地或名能趣或名遠慧或名留難或名恐怖或名放逸或名攝取或名著處或名宅主或名連縛諸佛子所言苦滅聖諦者彼鮮少世界中或名充滿或名不死或名無我或名無自性或名分別盡或名安樂住或名無限量或名斷流轉或名絶行處或名不二諸佛子所言苦滅道聖諦者彼鮮少世界中或名大光明或名演説海或名簡擇義或名和合法或名離取著或名斷相續或名廣大路或名平等因或名淨方便或名最勝見諸佛子鮮少世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼歡喜世界中或名流轉或名出生或名失利或名染著或名重擔或名差別或名內險或名集會或名惡舍宅或名苦惱性諸佛子所言苦集聖諦者彼歡喜世界中或名地或名方便或名非時或名非實法或名無底或名攝取或名離戒或名煩惱法或名狹劣見或名垢聚諸佛子所言苦滅聖諦者彼歡喜世界中或名破依止或名不放逸或名真實或名平等或名善淨或名無病或名無曲或名無相或名自在或名無生諸佛子所言苦滅道聖諦者彼歡喜世界中或名入勝界或名斷集或名超等類或名廣大性或名分別盡或名神力道或名衆方便或名正念行或名常寂路或名攝解脫諸佛子歡喜世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼關鑰世界中或名敗壞相或名如壞器或名我所成或名諸趣身或名數流轉或名衆惡門或名性苦或名可棄捨或名無味或名來去諸佛子所言苦集聖諦者彼關鑰世界中或名行或名憤毒或名和合或名受支或名我心或名雜毒或名虗稱或名乖違或名熱惱或名驚駭諸佛子所言苦滅聖諦者彼關鑰世界中或名無積集或名不可得或名妙藥或名不可壞或名無著或名無量或名廣大或名覺分或名離染或名無障礙諸佛子所言苦滅道聖諦者彼關鑰世界中或名安隱行或名離欲或名究竟實或名入義或名性究竟或名淨現或名攝念或名趣解脫或名救濟或名勝行諸佛子關鑰世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏諸佛子此娑婆世界所言苦聖諦者彼振音世界中或名匿疵或名世間或名所依或名慠慢或名染著性或名駛流或名不可樂或名覆藏或名速滅或名難調諸佛子所言苦集聖諦者彼振音世界中或名須制伏或名心趣或名能縛或名隨念起或名至後邊或名共和合或名分別或名門或名飄動或名隱覆諸佛子所言苦滅聖諦者彼振音世界中或名無依處或名不可取或名轉還或名離諍或名小或名大或名善淨或名無盡或名廣博或名無等價諸佛子所言苦滅道聖諦者彼振音世界中或名觀察或名能摧敵或名了知印或名能入性或名難敵對或名無限義或名能入智或名和合道或名恆不動或名殊勝義諸佛子振音世界説四聖諦有如是等四百億十千名隨衆生心悉令調伏論從爾時文殊師利已下十一段是通中心并十方正説四聖諦義各別不同經諸佛子如此娑婆世尊中説四聖諦有四百億十千名如是東方百千億無數無量無邊無等不可數不可稱不可思不可量不可説盡法界虗空界所有世界彼一一世界中説四聖諦亦各有四百億十千名隨衆生心悉令調伏如東方南西北方四維上下亦復如是諸佛子如娑婆世界有如上所説十方世界彼一切世界亦各有如是十方世界一一世界中説苦聖諦有百億萬種名説集聖諦滅聖諦道聖諦亦各有百億萬種名皆隨衆生心之所樂令其調伏論末後一段是總都説十方世界無盡名目皆是四聖諦為體從此四諦上分作種種法門五蘊十二緣總在其內八萬四千塵勞解脫總在其內如文具説不煩更釋已上佛名號品四聖諦品是自己信進修行中所信之法已下光明覺品現佛境及所行行門遍周如文具明如是已上十信門以根本普光明智為殿體如是進修究竟不離此智也光明覺品第九論將釋此品約作三門分別一釋品名目二釋品來意三隨文釋義一釋品名目者此品名光明覺品為明因如來放十信中足輪下光照燭十方初云一三千大千以次十三千大千以次增廣至不可説法界虗空界為明無盡令信心者了心境廣大無盡無礙與法界虗空界等明其自己法身智身願行亦等故以光所照覺悟信心令修行故以是因緣名光明覺品修行者一一隨光觀照十方已能觀之心亦盡即與法身同體入十住初心入信心者一一隨此寶色燈雲光觀內心及方所總令心境無有內外中間方可入方便三昧入十住法門若不作此寶色光明觀不成一切普賢願海神通道力諸佛大用皆悉不成二釋品來意者為此第二會中普光明殿説十信心明成凡夫自心所契佛果信其前之如來名號品舉佛身眼耳鼻舌等及名號遍周四聖諦品明如來口業説法行行遍周總明佛果遍也令此品放如來信位教行之光覺悟一切令信心者自信自心智境界身行遍周即一切處不動智佛一切處文殊師利一切處覺首目首財首等十首菩薩是也即明信心者自己身語意業名號遍周一如佛故此品須來明已上不動智佛等十箇智佛是信心中所信之果是自己之智與佛本同文殊師利即是自心妙理之慧餘九是行十色世界是所見之法三隨文釋義者經爾時世尊從兩足輪下放百億光明照此三千大千世界百億閻浮提百億弗婆提百億瞿耶尼百億單越百億大海百億輪圍山百億菩薩受生百億菩薩出家百億如來成正覺百億如來轉法輪百億如來入涅槃百億須彌山王百億四天王衆天百億三十三天百億夜摩天百億兜率天百億化樂天百億他化自在天百億梵衆天百億光音天百億遍淨天百億廣果天百億色究竟天其中所有悉皆明現如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞其百億閻浮提中百億如來亦如是坐悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其名曰文殊師利菩薩覺首菩薩財首菩薩寶首菩薩功德首菩薩目首菩薩精進首菩薩法首菩薩智首菩薩賢首菩薩是諸菩薩所從來國所謂金色世界妙色世界蓮華色世界薝蔔華色世界優鉢羅華色世界金色世界寶色世界金剛色世界頗黎色世界平等色世界此諸菩薩各於佛所淨修梵行所謂不動智佛無礙智佛解脫智佛威儀智佛明相智佛究竟智佛最勝智佛自在智佛梵智佛觀察智佛爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言論從初爾時世尊已下有二十四行半經於中大意義分為五一舉光出處二舉光所照境界遠近三舉一切處百億衆會菩薩同集四舉一切處佛剎根本智佛五明一切處文殊同聲一時説頌一舉光出處者經云爾時世尊兩足輪下放百億光明此光是初會中如來放眉間光名一切菩薩智光明普照耀十方藏此光是教化十方菩薩安立十信及五位十地法門次第令隨位進修開敷智眼成其無量福智之海是故名之照耀十方藏又藏者有二義一衆生善根堪受此法名之為藏如文殊師利歎善財童子善哉功德藏能來至我所二大願大悲大智法身總名為藏此光明常照耀十方法界善根衆生而能成就大菩提心大願大悲大智饒益衆生藏者故此如來兩足輪所放光明是彼現相品中眉間之光照十方已其光還來入佛足下為欲以十地果光用成十信故是故於此品中還放彼第一會中所入如來足下之光以成十信如今如來兩足輪下放光是現相品中所入之光故明足下放光者是以果成信初始故如十住位中於如來足指端放光即明入聖之始發迹應真之初故是初生諸佛大智家故十行位中足趺上放光十回向位中膝上放光十地位中眉間放光終而復始還依舊果初以果成因因修果體至功終位極本末不移至位更明今此放兩足輪中之光明以果成信故乃至修行常修果體使慣習成熟故如此從眉間放光足下輪中放光足指端放光足趺上放光膝上放光眉間放光出現品中又於眉間放光名如來出現光明如此六度放光總明成就十信十住十行十回向十地十一地因果法門進修之行相一終故法界品又眉間放光者明此一部之經菩薩五位進修及如來出現所證本法總法界為體故明法界一品是過現未來一切諸佛之本末故是恆法故是法常道不思議故是一切衆生本末故是一切法之本體故二舉光照遠近者初照三千大千之境界次照十百千乃至十億及不可説問曰何故不一時普照而有漸次耶答是一時中漸次為法界中無前後故漸次者為十信中修勝進增勝故三舉一切處百億衆會菩薩同集者明自己信行遍周故四舉一切處佛世界及十智如來者明信心者自己智德果遍周故五一切處文殊師利同時説頌者明信心者自己妙慧釋法遍周總明自有非是他法從初自信如是十色世界十智如來十首菩薩總是自己果行法性大智萬行遍周以成信故從此修行經歷五位不離此也是故發心畢竟二不別如是發心先心難自未得度先度他是故我禮初發心初發以為天人師超勝聲聞及緣覺一如涅槃經説此明從凡入信心者難故為凡夫總自認是凡夫不肯認自心是不動智故是故入十信難明十信心成就任運至十住初發心住故乃至究竟佛果故如三乘中修十信心經十千劫此教中為以根本智法界為教體但以才堪見實即得不論劫量如覺城二千之衆善財為首者是路上發心六千比丘之衆亦皆是智慧猛利人類精奇一聞多曉悟謙恕仁慈專求大道以利含生皆是一生信滿發心入位人也若不信自心元是不動智佛者即永劫飄淪何能利人濟物如經所説若自有縛能解彼縛無有是處是故發心有二種一修信解發心但修十信解故即如前十智如來十首菩薩是二信滿發心十住位初名初發心住故即十慧菩薩十箇月佛是其因果也又就此説頌門中義分為二一明文殊師利説十偈頌歎如來十種德令信心者信解增廣二明信心者心地增廣其光漸增其光漸增者明信心漸勝如文可知一一隨光所照之境以心觀之隨方令心無礙盡十方總然十方觀遍唯有能觀心在復觀能觀之心亦無內外即十方無礙方入十住初心一從文殊説頌中歎如來十種德令信心者漸漸增廣經若有見正覺解脫離諸漏不著一切世彼非證道眼若有知如來體相無所有修習得明了此人疾作佛能見此世界其心不搖動於佛身亦然當成勝智者若於佛及法其心了平等二念不現前當踐難思位若見佛及身平等而安住無住無所入當成難遇者色受無有數想行識亦然若能如是知當作大牟尼世及出世見一切皆超越而能善知法當成大光耀若於一切智發生回向心見心無所生當獲大名稱衆生無有生亦復無有壞若得如是智當成無上道一中解無量無量中解一了彼互生起當成無所畏論一從初十行頌歎如來法身無體性德經爾時光明過此世界遍照東方十佛國土南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現如此處見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞彼一一世界中各有百億閻浮提百億如來亦如是坐悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言衆生無智慧愛刺所傷毒為彼求菩提諸佛法如是普見於諸法二邊皆捨離道成永不退轉此無等輪不可思議劫精進修諸行為度諸衆生此是大仙力導師降衆魔勇健無能勝光中演妙義慈悲故如是以彼智慧心破諸煩惱障一念見一切此是佛神力擊于正法鼓覺悟十方剎咸令向菩提自在力能爾不壞無邊境而遊諸億剎於有無所著彼自在如佛諸佛如虗空究竟常清淨憶念生歡喜彼諸願具足一一地獄中經於無量劫為度衆生故而能忍是苦不惜於身命常護諸佛法無我心調柔能得如來道論二十行頌歎如來大慈悲德為衆生求菩提心故經爾時光明過十世界遍照東方百世界南西北方四維上下亦復如是彼諸世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言佛了法如幻通達無障礙心淨離衆著調伏諸羣生或有見初生妙色如金山住是最後身永作人中月或見經行時具無量功德念慧皆善巧丈夫師子步或見紺青目觀察於十方有時現戲笑為順衆生故或見師子吼殊勝無比身示現最後生所説無非實或有見出家解脫一切縛修治諸佛行常樂觀寂滅或見坐道場覺知一切法到功德彼岸癡暗煩惱盡或見勝丈夫具足大悲心轉於妙法輪度無量衆生或見師子吼威光最殊特超一切世間神通力無等或見心寂靜如世燈永滅種種現神通十方能如是論三十行頌歎如來了法如幻德應緣現身故經爾時光明過百世界遍照東方千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言佛於甚深法通達無與等衆生不能了次第為開示我性未曾有我所亦空寂云何諸如來而得有其身解脫明行者無數無等倫世間諸因量求過不可得佛非世間蘊界處生死法數法不能成故號人師子其性本空寂內外俱解脫離一切妄念無等法如是體性常不動無我無來去而能悟世間無邊悉調伏常樂觀寂滅一相無有二其心不增減現無量神力不作諸衆生業報因緣行而能了無礙善逝法如是種種諸衆生流轉於十方如來不分別度脫無邊類諸佛真金色非有遍諸有隨衆生心樂為説寂滅法論四十行頌歎如來以甚深法德為衆開示故經爾時光明過千世界遍照東方十千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言發起大悲心救護諸衆生永出人天衆如是業應作意常信樂佛其心不退轉親近諸如來如是業應作志樂佛功德其心永不退住於清涼慧如是業應作一切威儀中常念佛功德晝夜無暫斷如是業應作觀無邊三世學彼佛功德常無厭倦心如是業應作觀身如實相一切皆寂滅離我無我著如是業應作等觀衆生心不起諸分別入於真實境如是業應作悉舉無邊界普飲一切海神通大智力如是業應作思惟諸國土色與非色相一切悉能知如是業應作十方國土塵一塵為一佛悉能知其數如是業應作論五十行頌歎佛救護衆生德勸修心者有十種業應作故經爾時光明遍十千世界遍照東方百千世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言若以威德色種族而見人中調御師是為病眼顛倒見彼不能知最勝法如來色形諸相等一切世間莫能測億那由劫共思量色相威德轉無邊如來非以相為體但是無相寂滅法身相威儀悉具足世間隨樂皆得見佛法微妙難可量一切言説莫能及非是和合非不合體性寂滅無諸相佛身無生超戲論非是蘊聚差別法得自在力決定見所行無畏離言道身心悉平等內外皆解脫永劫住正念無著無所繫意淨光明者所行無染著智眼靡不周廣大利衆生一身為無量無量復為一了知諸世間現形遍一切此身無所從亦無所積聚衆生分別故見佛種種身心分別世間是心無所有如來知此法如是見佛身論六十五行頌歎如來無相之相德隨其見者皆得見故經爾時光明過百千世界遍照東方百萬世界南西北方四維上下亦復如是彼一一世界中皆有百億閻浮提乃至百億色究竟天其中所有悉皆明現彼一一閻浮提中悉見如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞悉以佛神力故十方各有一大菩薩一一各與十佛剎微塵數諸菩薩俱來詣佛所其大菩薩謂文殊師利等所從來國謂金色世界等本所事佛謂不動智如來等爾時一切處文殊師利菩薩各於佛所同時發聲説此頌言如來最自在超世無所依具一切功德度脫於諸有無染無所著無想無依止體性不可量見者咸稱歎光明遍清淨塵纍悉蠲滌不動離二邊此是如來智若有見如來身心離分別則於一切法永出諸疑滯一切世間中處處轉法輪無性無所轉導師方便説於法無疑惑永絶諸戲論不生分別心是念佛菩提了知差別法不著於言説無有一與多是名隨佛教多中無一性一亦無有多如是二俱捨普入佛功德衆生及國土一切皆寂滅無依無分別能入佛菩提衆生及國土一異不可得如是善觀察名知佛法義論七十行頌歎如來無依自在德具一切功德令信心者修學故音切癰於龍切瘡楚良切諦帝音顛端年切擔都濫切營于經切析息音鬪都豆切諍側迸切躁精到切歎他斡切敗蒲賣切仇求音鄙彼音賤才線切粗倉胡切獷孤猛切攫居博切噬常制切續似欲切渾戶昆切濁直角切乖古懷切慚昨含切恥敕里切炬其呂切揀古眼切駭呼解切憤符粉切壞滂回切匿奴力切疵疾移切慠五到分慢莫晏切駛疏利切鬱紆欻切單丹音越曰音兜當矦切蘊於問切紺古暗切寨咨此切滌徒歷切
