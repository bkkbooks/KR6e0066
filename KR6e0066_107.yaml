body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之二十論第五去此不遠寂靜音海夜神主難勝地經爾時善財童子於普救衆生妙德夜神所聞菩薩普現一切世間調伏衆生解脫門了知信解自在安住而往寂靜音海夜神所頂禮其足繞無數匝於前合掌而作是言聖者我已先發阿耨多羅三藐三菩提心我欲依善知識學菩薩行入菩薩行修菩薩行住菩薩行唯願慈哀為我宣説菩薩云何學菩薩行云何修菩薩道時彼夜神告善財言善哉善哉善男子汝能依善知識求菩薩行善男子我得菩薩念念出生廣大喜莊嚴解脫門善財言大聖此解脫門為何事業行何境界起何方便作何觀察夜神言善男子我發起清淨平等樂欲心我發起離一切世間塵垢清淨堅固莊嚴不可壞樂欲心我發起攀緣不退轉位永不退轉心我發起莊嚴功德寶山不動心我發起無住處心我發起普現一切衆生前救護心我發起見一切佛海無厭足心我發起求一切菩薩清淨願力心我發起住大智光明海心我發起令一切衆生超過憂惱曠野心我發起令一切衆生捨離愁憂苦惱心我發起令一切衆生捨離不可意色聲香味觸法心我發起令一切衆生捨離愛別離苦怨憎會苦心我發起令一切衆生捨離惡緣愚癡等苦心我發起與一切險難衆生作依怙心我發起令一切衆生出生死苦處心我發起令一切衆生捨離生老病死等苦心我發起令一切衆生成就如來無上法樂心我發起令一切衆生皆受喜樂心發是心已復為説法令其漸至一切智地所謂若見衆生樂著所住宮殿屋宅我為説法令其了達諸法自性離諸執著若見衆生戀著父母兄弟姊妹我為説法令其得預諸佛菩薩清淨衆會若見衆生戀著妻子我為説法令其捨離生死愛染起大悲心於一切衆生平等無二若見衆生住於王宮婇女侍奉我為説法令其得與衆聖集會入如來教若見衆生染著境界我為説法令其得入如來境界若見衆生多瞋恚者我為説法令住如來忍波羅蜜若見衆生其心懈怠我為説法令得清淨精進波羅蜜若見衆生其心散亂我為説法令得如來禪波羅蜜若見衆生入見稠林無明暗障我為説法令得出離稠林黑暗若見衆生無智慧者我為説法令得般若波羅蜜若見衆生染著三界我為説法令出生死若見衆生志意下劣我為説法令其圓滿佛菩提願若見衆生住自利行我為説法令其發起利益一切諸衆生願若見衆生志力微弱我為説法令得菩薩力波羅蜜若見衆生愚癡暗心我為説法令得菩薩智波羅蜜若見衆生色相不具我為説法令得如來清淨色身若見衆生形容醜陋我為説法令得無上清淨法身若見衆生色相粗惡我為説法令得如來微妙色身若見衆生情多憂惱我為説法令得如來畢竟安樂若見衆生貧窮所苦我為説法令得菩薩功德寶藏若見衆生住止園林我為説法令彼勤求佛法因緣若見衆生行於道路我為説法令其趣向一切智道若見衆生在聚落中我為説法令出三界若見衆生住止人間我為説法令其超越二乘之道住如來地若見衆生居住城郭我為説法令其得住法王城中若見衆生住於四隅我為説法令得三世平等智慧若見衆生住於諸方我為説法令得智慧見一切法若見衆生貪行多者我為彼説不淨觀門令其捨離生死愛染若見衆生瞋行多者我為彼説大慈觀門令其得入勤加修習若見衆生癡行多者我為説法令得明智觀諸法海若見衆生等分行者我為説法令其得入諸乘願海若見衆生樂生死樂我為説法令其厭離若見衆生厭生死苦應為如來所化度者我為説法令能方便示現受生若見衆生愛著五蘊我為説法令其得住無依境界若見衆生其心下劣我為顯示勝莊嚴道若見衆生心生憍慢我為其説平等法忍若見衆生其心諂曲我為其説菩薩直心善男子我以此等無量法施攝諸衆生種種方便教化調伏令離惡道受人天樂脫三界縛住一切智我時便得廣大歡喜法光明海其心怡暢安隱適悅復次善男子我嘗觀察一切菩薩道場衆會修種種願行現種種淨身有種種常光放種種光明以種種方便入一切智門入種種三昧現種種神變出種種音聲海具種種莊嚴身入種種如來門詣種種國土海見種種諸佛海得種種辨才海照種種解脫境得種種智光海入種種三昧海遊戲種種諸解脫門以種種門趣一切智種種莊嚴虗空法界以種種莊嚴雲遍覆虗空觀察種種道場衆會集種種世界入種種佛剎詣種種方便海受種種如來命從種種如來所與種種菩薩俱雨種種莊嚴雲入如來種種方便觀如來種種法海入種種智慧海坐種種莊嚴座善男子我觀察此道場衆會知佛神力無量無邊生大歡喜善男子我觀毗盧遮那如來念念出現不可思議清淨色身既見是已生大歡喜又觀如來於念念中放大光明充滿法界既見是已生大歡喜又見如來一一毛孔念念出現無量佛剎微塵數光明海一一光明以無量佛剎微塵數光明而為眷屬一一周遍一切法界消滅一切諸衆生苦既見是已生大歡喜又善男子我觀如來頂及兩肩念念出現一切佛剎微塵數寶𦦨山雲充滿十方一切法界既見是已生大歡喜又善男子我觀如來一一毛孔於念念中出一切佛剎微塵數香光明雲充滿十方一切佛剎既見是已生大歡喜又善男子我觀如來一一相念念出一切佛剎微塵數諸相莊嚴如來身雲遍往十方一切世界既見是已生大歡喜又善男子我觀如來一一毛孔於念念中出不可説佛剎微塵數佛變化雲示現如來從初發心修波羅蜜具莊嚴道入菩薩地既見是已生大歡喜又善男子我觀如來一一毛孔念念出現不可説不可説佛剎微塵數天王身雲及以天王自在神變充遍一切十方法界應以天王身而得度者即現其身而為説法既見是已生大歡喜如天王身雲其龍王夜叉王乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王梵王身雲莫不皆於一一毛孔如是出現如是説法我見是已於念念中生大歡喜生大信樂量與法界薩婆若等昔所未得而今始得昔所未證而今始證昔所未入而今始入昔所未滿而今始滿昔所未見而今始見昔所未聞而今始聞何以故以能了知法界相故知一切法唯一相故能平等入三世道故能説一切無邊法故善男子我入此菩薩念念出生廣大喜莊嚴解脫光明海又善男子此解脫無邊普入一切法界門故此解脫無盡等發一切智性心故此解脫無際入無際畔一切衆生心想中故此解脫甚深寂靜智慧所知境故此解脫廣大周遍一切如來境故此解脫無壞菩薩智眼之所知故此解脫無底盡於法界之源底故此解脫者即是普門於一事中普見一切諸神變故此解脫者終不可取一切法身等無二故此解脫者終無有生以能了知如幻法故此解脫者猶如影像一切智願光所生故此解脫者猶如變化化生菩薩諸勝行故此解脫者猶如大地為一切衆生所依處故此解脫者猶如大水能以大悲潤一切故此解脫者猶如大火乾竭衆生貪愛水故此解脫者猶如大風令諸衆生速疾趣於一切智故此解脫者猶如大海種種功德莊嚴一切諸衆生故此解脫者如須彌山出一切智法寶海故此解脫者如大城郭一切妙法所莊嚴故此解脫者猶如虗空普容三世佛神力故此解脫者猶如大雲普為衆生雨法雨故此解脫者猶如淨日能破衆生無知暗故此解脫者猶如滿月滿足廣大福德海故此解脫者猶如真如悉能周遍一切處故此解脫者猶如自影從自善業所化出故此解脫者猶如呼響隨其所應為説法故此解脫者猶如影像隨衆生心而照現故此解脫者如大樹王開敷一切神通華故此解脫者猶如金剛從本已來不可壞故此解脫者如如意珠出生無量自在力故此解脫者如離垢藏摩尼寶王示現一切三世如來諸神力故此解脫者如喜幢摩尼寶能平等出一切諸佛法輪聲故善男子我今為汝説此譬喻汝應思惟隨順悟入爾時善財童子白寂靜音海夜神言大聖云何修行得此解脫夜神言善男子菩薩修行十大法藏得此解脫何等為十一修布施廣大法藏隨衆生心悉令滿足二修淨戒廣大法藏普入一切佛功德海三修堪忍廣大法藏能遍思惟一切法性四修精進廣大法藏趣一切智恆不退轉五修禪定廣大法藏能滅一切衆生熱惱六修般若廣大法藏能遍了知一切法海七修方便廣大法藏能遍成熟諸衆生海八修諸願廣大法藏遍一切佛剎一切衆生海盡未來劫修菩薩行九修諸力廣大法藏念念現於一切法界海一切佛國土成等正覺常不休息十修淨智廣大法藏得如來智遍知三世一切諸法無有障礙善男子若諸菩薩安住如是十大法藏則能獲得如是解脫清淨增長積集堅固安住圓滿善財童子言聖者汝發阿耨多羅三藐三菩提心其已久如夜神言善男子此華藏莊嚴世界海東過十世界海有世界海名一切淨光寶此世界海中有世界種名一切如來願光明音中有世界名清淨光金莊嚴一切香金剛摩尼王為體形如樓閣衆妙寶雲以為其際住於一切寶纓絡海妙宮殿雲而覆其上淨穢相雜此世界中乃往古世有劫名普光幢國名普滿妙藏道場名一切寶藏妙月光明有佛名不退轉法界音於此成阿耨多羅三藐三菩提我於爾時作菩提樹神名具足福德燈光明幢守護道場我見彼佛成等正覺示現神力發阿耨多羅三藐三菩提心即於此時獲得三昧名普照如來功德海此道場中次有如來出興於世名法樹威德山我時命終還生此中為道場主夜神名殊妙福智光見彼如來轉正法輪現大神通即得三昧名普照一切離貪境界次有如來出興於世名一切法海音聲王我於彼時身為夜神因得見佛承事供養即獲三昧名生長一切善法地次有如來出興於世名寶光明燈幢王我於彼時身為夜神因得見佛承事供養即獲三昧名普現神通光明雲次有如來出興於世名功德須彌光我於彼時身為夜神因得見佛承事供養即獲三昧名普照諸佛海次有如來出興於世名法雲音聲王我於彼時身為夜神因得見佛承事供養即獲三昧名一切法海燈次有如來出興於世名智燈照耀王我於彼時身為夜神因得見佛承事供養即獲三昧名滅一切衆生苦清淨光明燈次有如來出興於世名法勇妙德幢我於彼時身為夜神因得見佛承事供養即獲三昧名三世如來光明藏次有如來出興於世名師子勇猛法智燈我於彼時身為夜神因得見佛承事供養即獲三昧名一切世間無障礙智慧輪次有如來出興於世名智力山王我於彼時身為夜神因得見佛承事供養即獲三昧名普照三世衆生諸根行善男子清淨光金莊嚴世界普光明幢劫中有如是等佛剎微塵數如來出興於世我於彼時或為天王或為龍王或為夜叉王或為乾闥婆王或為阿修羅王或為迦樓羅王或為緊那羅王或為摩睺羅伽王或為人王或為梵王或為天身或為人身或為男子身或為女人身或為童男身或為童女身悉以種種諸供養具供養於彼一切如來亦聞其佛所説諸法從此命終還即於此世界中生經佛剎微塵數劫修菩薩行然後命終生此華藏莊嚴世界海娑婆世界值迦羅鳩孫馱如來承事供養得三昧名離一切塵垢光明次值拘那含牟尼如來承事供養得三昧名普現一切諸剎海次值迦葉如來承事供養得三昧名演一切衆生言音海次值毗盧遮那如來於此道場成等正覺念念示現大神通力我時得見即獲此念念出生廣大喜莊嚴解脫得此解脫已能入十不可説不可説佛剎微塵數法界安立海見彼一切法界安立海一切佛剎所有微塵一一塵中有十不可説不可説佛剎微塵數佛國土一一佛土皆有毗盧遮那如來坐於道場於念念中成等正覺現諸神變所現神變一一皆遍一切法界海亦見自身在彼一切諸如來所又亦聞其所説妙法又亦見彼一切諸佛一一毛孔出變化海現神通力於一切法界海一切世界海一切世界種一切世界中隨衆生心轉正法輪我得速疾陀羅尼力受持思惟一切文義以明了智普入一切清淨法藏以自在智普遊一切甚深法海以周遍智普知三世諸廣大義以平等智普達諸佛無差別法如是悟解一切法門一一法門中悟解一切修多羅雲一一修多羅雲中悟解一切法海一一法海中悟解一切法品一一法品中悟解一切法雲一一法雲中悟解一切法流一一法流中出生一切大喜海一一大喜海出生一切地一一地出生一切三昧海一一三昧海得一切見佛海一一見佛海得一切智光海一一智光海普照三世遍入十方知無量如來往昔諸行海知無量如來所有本事海知無量如來難捨能施海知無量如來清淨戒輪海知無量如來清淨堪忍海知無量如來廣大精進海知無量如來甚深禪定海知無量如來般若波羅蜜海知無量如來方便波羅蜜海知無量如來願波羅蜜海知無量如來力波羅蜜海知無量如來智波羅蜜海知無量如來往昔超菩薩地知無量如來往昔住菩薩地無量劫海現神通力知無量如來往昔入菩薩地知無量如來往昔修菩薩地知無量如來往昔治菩薩地知無量如來往昔觀菩薩地知無量如來昔為菩薩時常見諸佛知無量如來昔為菩薩時盡見佛海劫海同住知無量如來昔為菩薩時以無量身遍生剎海知無量如來昔為菩薩時周遍法界修廣大行知無量如來昔為菩薩時示現種種諸方便門調伏成熟一切衆生知無量如來放大光明普照十方一切剎海知無量如來現大神力普現一切諸衆生前知無量如來廣大智地知無量如來轉正法輪知無量如來示現相海知無量如來示現身海知無量如來廣大力海彼諸如來從初發心乃至法滅我於念念悉得知見善男子汝問我言汝發心來其已久如善男子我於往昔過二佛剎微塵數劫如上所説於清淨光金莊嚴世界中為菩提樹神聞不退轉法界音如來説法發阿耨多羅三藐三菩提心於二佛剎微塵數劫中修菩薩行然後乃生此娑婆世界賢劫之中從迦羅鳩孫馱佛至釋迦牟尼佛及此劫中未來所有一切諸佛我皆如是親近供養如於此世界賢劫之中供養未來一切諸佛一切世界一切劫中所有未來一切諸佛悉亦如是親近供養善男子彼清淨光金莊嚴世界今猶現在諸佛出現相續不斷汝當一心修此菩薩大勇猛門爾時寂靜音海主夜神欲重宣此解脫義為善財童子而説頌曰善財聽我説清淨解脫門聞已生歡喜勤修令究竟我昔於劫海生大信樂心清淨如虗空常觀一切智我於三世佛皆生信樂心并及其衆會悉願常親近我昔曾見佛為衆生供養得聞清淨法其心大歡喜常尊重父母恭敬而供養如是無休懈入此解脫門老病貧窮人諸根不具足一切皆愍濟令其得安隱水火及王賊海中諸恐怖我昔修諸行為救彼衆生煩惱恆熾然業障所纏覆墮於諸險道我救彼衆生一切諸惡趣無量楚毒苦生老病死等我當悉除滅願盡未來劫普為諸羣生滅除生死苦得佛究竟樂善男子我唯知此念念出生廣大喜莊嚴解脫如諸菩薩摩訶薩深入一切法界海悉知一切諸劫數普見一切剎成壞而我云何能知能説彼功德行善男子此菩提場如來會中有主夜神名守護一切城增長威力汝詣彼問菩薩云何學菩薩行修菩薩道爾時善財童子一心觀察寂靜音海主夜神身而説頌曰我因善友教來詣夜神所見神處寶座身量無有邊非是著色相計有於諸法劣智淺識人能知尊境界世間天及人無量劫觀察亦不能測度色相無邊故遠離於五蘊亦不住於處永斷世間疑顯現自在力不取內外法無動無所礙清淨智慧眼見佛神通力身為正法藏心是無礙智既得智光照復照諸羣生心集無邊業莊嚴諸世間了世皆是心現身等衆生知世悉如夢一切佛如影諸法皆如響令衆無所著為三世衆生念念示現身而心無所住十方遍説法無邊諸剎海佛海衆生海悉在一塵中此尊解脫力時善財童子説此偈已頂禮其足繞無量匝殷勤瞻仰辭退而去論第一正入當位法門中從初長行科為十段一爾時善財童子已下至了知信解自在安住有兩行半經是念前善友教而不忘失分二而往寂靜音海夜神所已下至云何修菩薩道有五行經明善財申自所求分三時彼夜神告善財言已下至廣大喜莊嚴解脫門有兩行半經明夜神為善財説自行法門分四善財言大聖此解脫門為何事業已下至我為説其菩薩直心有六十五行經明夜神答善財修此法門所行事業及方便分五善男子我以此等無量法施已下至無量無邊生大歡喜有十七行半經明夜神答前善財所問行何境界分六善男子我觀毗盧遮那如來已下至能説一切無邊法故有三十二行經是答前所問作何觀察分七善男子我入此菩薩念念出生廣大喜莊嚴解脫光明海已下至汝應思惟隨順悟入有三十三行半經答前善財所問行何境界分八爾時善財童子白寂靜音海夜神已下至增長積集堅固安住圓滿有十七行經答善財所問云何修行此法門分以十波羅蜜為修行九善財童子言聖者已發阿耨多羅三藐三菩提心其已久如已下至念念出生廣大喜莊嚴解脫有五十四行半經答善財所問所發大菩提心其已久如分十得此解脫已能入十不可説已下至頌有五十八行經明寂靜音海神自説所行此行念念出生廣大喜莊嚴解脫已所入法門所供養三世諸佛及所發心世界今猶現在分此表定體時不遷故一切時總如是已下有十行頌明夜神自説本行勸善財修行如文自明善男子我唯知此念念出生廣大喜莊嚴解脫已下推德升進隨文釋義者云念念出生廣大喜莊嚴解脫者明禪悅遍周利生廣大稱本願行以立其名理行互嚴名之莊嚴夜神號寂靜音海者明理性無為故名寂靜言音響應等利含生名為音海明即音是定體用故如善財問夜神發心久如夜神云此華藏世界海東過十世界海有世界海名一切淨光寶已下至然後命終生此華藏莊嚴世界海娑婆世界中四十六行半經明夜神所供養十佛出興一一佛皆以身承事供養及所聞法此是所行之事答善財所問發心久近若以表法門中是一地中修十地行次生娑婆世界先見三佛然後見毗盧遮那如來得此念念出生廣大喜莊嚴解脫者是一地入十地十一地法門得三世智印印三世佛悉皆承事悉皆聞法如經具明以表禪體遍該三世一念普印諸法無去來今是所答善財發菩提心之久近十佛之後供養佛剎微塵數佛者表十地之後智印普周於一塵中遍多佛剎以多佛剎住一塵中以智無障礙故無表裏故等諸佛智同衆生心故此約法界禪定體用論也言華藏世界東過十世界海者表十地升進故東者發明初首也有世界海名一切淨光寶者表第五地禪體遍該諸位故中有世界種名一切如來願光明音者即表此第五地中初歡喜地發十不可壞心為世界種故此明法界大智智悲為種以初地依十方諸佛勝願發心名如來願光明音又以古德云以三千大千世界數至恆沙名一世界海海世界數至恆沙為一世界性性至恆沙為一世界種中有世界名清淨光金莊嚴者約禪體普收直至金剛智一切香金剛摩尼王為體者以戒定慧解脫解脫知見香金剛智性自無垢為體此為五位十地升進之體王者表智自在也形如樓閣者十地之智重重重重無盡知見慈悲喜捨衆法莊嚴衆妙寶雲以為其際者以悲願大雲而成十種地住於一切寶纓絡海者以萬行纓絡海安立十地次第妙宮殿雲而覆其上者無性廣大悲宮智殿而含覆衆生淨穢雜居者明法界大寂定門智悲齊進佛國與衆生國不礙同體該含性無裏外淨穢等見此世界中乃往古世有劫名普光幢者表本普光明智國名普滿也妙藏者表普光明智等一切衆生共有名之為藏道場名一切寶藏妙月光明者表第五地自性清淨禪為道場能顯現智慧寶藏皆於其中出故有佛名不退轉法界音者得此如上道場法門方便治惑即得不退轉法界轉法輪音故於此成阿耨多羅三藐三菩提者以如上法顯法惑亡即菩提也無別成壞也我於爾時菩提樹神名具足福德燈光明幢表無性理之菩提妙智為神從智起無量慈悲萬行為樹萬行中報德功果名具足福德以智慧恆能照根攝化名燈光明智恆無體可以傾動常能破一切衆生煩惱為幢守護道場者明此第五地定體不動是守護義亦是道場故以定能發慧惑亡守護道場總在其中從此已下總供養十佛并往生娑婆世界供養四佛及以入法總表十一地升進之門一一次第配當自見眉目從此初佛配初地次二地次三地於中所生之身是隨地位中之行所供之佛是行中之果設約事中亦不違此表法若設欲見他佛者智不及此法門行不相應無由相應得見佛故如供養十佛及佛剎微塵數佛者是十地果終之相智眼所觀此明五地禪體中十地總相後生娑婆世界供養四佛者即明五地已前初二三四地中之果一時供養三世一切世界諸佛者即明此五地中十一地智圓普賢行滿智印三世古今未來悉皆一際無別時故約實如是無虗假故亦明此地禪體理智之中性圓三世總皆一性三世諸佛一時無前後故直以定體法身智境以實而論若約妄情不可見也此是難勝地善知識以禪波羅蜜為主餘九為伴治寂用不自在障令得自在此地所以名難勝者以此地於禪定中善學世智五明世技一切皆知定用功及故六地入寂滅大用般若門如下主城神是亦如前十住中第六住海幢比丘是入寂滅定離出入息化身如雲設教如海第二推德升進中從如諸菩薩摩訶薩已下至辭退而去并頌有十八行經約立五門一推德升進二示善知識所在云在此菩提場如來會中三舉神之名守護一切城增長威力四善財説頌讚寂靜音海之德五禮敬辭去隨文釋義此菩提場內如來會中者表不離菩提心真如體大會海中故有夜神者明菩提性真如中妙理智慧為神能破一切衆生無明執著為主夜神常不離生死大夜發起一切衆生大明生故守護一切城增長威力者表常守護一切衆生心城增長第六地中及一切衆生智慧威力使三空現前寂滅定力世間出世間智慧悉現前力永超生死海常住世間得一切出世間智慧海力如下文具明如善財以十行頌歎寂靜音海神法界身無邊佛海衆生海悉在一塵中此尊解脫力明前五地中禪體法身性無邊際大小量故如世水鏡空中乾體普含衆像皆現其中不相礙也以定力印之自現餘如頌中自明音切攀普班切預羊洳切怡與之切
