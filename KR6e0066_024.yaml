body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論毗盧遮那品第六論將釋此品約作三門分別一釋品來意二釋品名目三隨文釋義一釋品來意者前之五品以舉現世毗盧遮那佛果恐不成信何以然者為古無舊迹今何所來以此引古證今明道不謬故又明古今諸佛三世法相似故成其信者不狐疑故二釋品名毗盧遮那品者此品依主得名明引古佛成今信還以佛號以為品名毗云種種遮那云光明言以法身悲智設種種教行之光破衆生之業暗故問曰古佛今佛為一為異答曰為一為異何以然者為法身智身九十七大人之相大慈大悲智慧解脫是一各各衆生發心成佛是異又無量三世諸佛皆同一念成佛無前後際是一然亦不壞一念中見無量衆生三世劫量是異以十玄門六相義該通可解經云一切諸佛身唯是一法身一身一智慧力無畏亦然三隨文釋義者於此一品經中長科總有十五段經文於此十五段文中有四佛出世總明毗盧遮那一號各隨世間應緣名異非是佛名號異此經下文佛名號品一一佛皆具等法界衆生界隨緣名號世間一切名號皆是諸佛名為如來德遍一切法故猶如虗空遍含衆法無不淨故一切衆生名入佛名號無不淨故又如有香名為象藏因龍鬬而生燒之一丸凝停七日降金色雨霑人身者悉皆金色一切名言入佛名號者悉皆清淨亦復如是如是佛名號遍一切世界名字故始名毗盧遮那以種種教行之光遍照一切以法眼照之其長科十五段者經爾時普賢菩薩復告大衆言諸佛子乃往古世過世界微塵數劫復倍是數有世界海名普門淨光明此世界海中有世界名勝音依摩尼華網海住須彌山微塵數世界而為眷屬其形正圓其地具有無量莊嚴三百重衆寶樹輪圍山所共圍繞一切寶雲而覆其上清淨無垢光明照耀城邑宮殿如須彌山衣服飲食隨念而至其劫名曰種種莊嚴論一爾時已下一段八行經明普賢告衆欲說其法於此段中復分為十一舉古佛所過之劫數二舉古世界海之名三舉世界海中別有世界之號四舉世界所依住處五舉世界周圍眷屬之數六舉世界形狀七舉世界地上莊嚴八舉世界寶樹及山輪圍重數九舉世界城邑宮殿十舉世界人飲食衣服隨念而至及舉劫名此已上但隨文自具不煩更解經諸佛子彼勝音世界中有香水海名清淨光明其海中有大蓮華須彌山出現名華𦦨普莊嚴幢十寶欄楯周匝圍繞於其山上有一大林名摩尼華枝輪無量華樓閣無量寶臺觀周回布列無量妙香幢無量寶山幢迥極莊嚴無量寶芬陀利華處處敷榮無量香摩尼蓮華網周匝垂布樂音和悅香雲照耀數各無量不可紀極有百萬億那由他城周匝圍繞種種衆生於中止住論二諸佛子已下有八行半經於中大意義分為八一明勝音世界中香水海及舉其名二明海中有華山出現形如須彌三明山上莊嚴有十四明山上有一大樹林及舉林名五舉山上五種無量衆事莊嚴六明都舉莊嚴難紀七明山上諸城之數八明雜類衆生共居云芬陀利華者此云白蓮華也此上一段文自顯著不煩更解經諸佛子此林東有一大城名𦦨光明人王所都百萬億那由他城周匝圍繞清淨妙寶所共成立縱廣各有七千由旬七寶為郭樓櫓却敵悉皆崇麗七重寶塹香水盈滿優鉢羅華波頭摩華拘物頭華芬陀利華悉是衆寶處處分布以為嚴飾寶多羅樹七重圍繞宮殿樓閣悉寶莊嚴種種妙網張施其上塗香散華芬瑩其中有百萬億那由他門悉寶莊嚴一一門前各有四十九寶尸羅幢次第行列復有百萬億園林周匝圍繞其中皆有種種雜香摩尼樹香周流普熏衆鳥和鳴聽者歡悅此大城中所有居人靡不成就業報神足乘空往來行同諸天心有所欲應念皆至其城次南有一天城名樹華莊嚴其次右旋有大龍城名曰究竟次有夜叉城名金剛勝妙幢次有乾闥婆城名曰妙宮次有阿修羅城名曰寶輪次有迦樓羅城名妙寶莊嚴次有梵天王城名種種妙莊嚴如是等百萬億那由他數此一一城各有百萬億那由他樓閣所共圍繞一一皆有無量莊嚴論三諸佛子已下十九行半經明林東之城於此段中義分為十一舉城之名二舉人王所居三舉諸城圍繞四明城體衆寶所成五明城廣狹六明城郭莊嚴悉皆崇麗七明城上下衆事莊嚴言櫓者依音義解云城上守禦曰櫓出頭前引曰敵衆飾高勝曰崇美而可觀曰麗城下繞而長坑深廣者曰壕狹者曰塹優鉢羅華者此云青色華根似藕其葉狹長近下小圓上漸尖似佛眼故其華莖無刺准歎佛中目淨修廣如青蓮即是青蓮華葉也波頭摩華此云赤蓮華其華莖有刺拘物頭華其莖有刺或曰赤白華也其華葉頭稍短未開敷時狀如郁蹙然也芬陀利華者白蓮華也寶多羅樹者或云無憂樹此之未定撿文未得也七重圍繞法事中或一三五七九契陽數也尸羅此云清淨寶幢已上莊嚴總為衆寶八明城中居人九明人得業報神通也所念皆至十明城四繞天龍乾闥婆等七種雜類諸城所居及都結城及莊嚴無量問曰此中一種是人非天龍神何得業報神通衣服飲食隨念而至又所居高勝依報寶嚴以何業故報得如是答曰為因廣大故業報廣大為因高勝故業報所居高勝問曰何者是因廣大高勝答曰為於往因於此毗盧遮那法界智體用無依住門性清淨法而生信心修信解力常信自他凡聖一體同知來智無所依住無我無我所心境平等無二相故無我所故一切凡聖本唯法界無造作性無生滅性依真而住住無所住與一切諸佛衆生同一心智住性真法界所有分別是一切諸佛本不動智凡聖一真共同此智全信自心是佛種智及一切智故不於心外別有信佛之心亦不於自心之內見自心有佛相故信如斯法自力未充以此是人獲諸人中一切勝報以是信力還得毗盧遮那佛在國同居而恆出現神足通力與天同處一切諸城所居神天龍八部等皆是同緣於此法中而生信解故以此信因高勝廣大獲得如斯勝妙依正果報故經諸佛子此寶華枝輪大林之中有一道場名寶華遍照以衆大寶分布莊嚴摩尼華輪遍滿開敷然以香燈具衆寶色𦦨雲彌覆光網普照諸莊嚴具常出妙寶一切樂中恆奏雅音摩尼寶王現菩薩身種種妙華周遍十方其道場前有一大海名香摩尼金剛出大蓮華名華蘂𦦨輪其華廣大百億由旬莖葉鬚臺皆是妙寶十不可說百千億那由他蓮華所共圍繞常放光明恆出妙音周遍十方論四諸佛子已下有九行經明華枝林中道場并陳嚴飾廣大此林衆華嚴飾常有妓樂之音經諸佛子彼勝音世界最初劫中有十須彌山微塵數如來出興於世其第一佛號一切功德山須彌勝雲諸佛子應知彼佛將出現時一百年前此摩尼華枝輪大林中一切莊嚴周遍清淨所謂出不思議寶𦦨雲發歎佛功德音演無數佛音聲舒光布網彌覆十方宮殿樓閣互相照耀寶華光明騰聚成雲復出妙音說一切衆生前世所行廣大善根說三世一切諸佛名號說諸菩薩所修願行究竟之道說諸如來轉妙法輪種種言辭現如是等莊嚴之相顯示如來當出於世其世界中一切諸王見此相故善根成熟悉欲見佛而來道場論五諸佛子已下有十二行半經明初劫中佛出現之數并陳初佛名號及舉華枝大林先現之瑞經爾時一切功德山須彌勝雲佛於其道場大蓮華中忽然出現其身周普等真法界一切佛剎皆示出生一切道場悉詣其所無邊妙色具足清淨一切世間無能映奪具衆寶相一一分明一切宮殿悉現其像一切衆生咸得目見無邊化佛從其身出種種色光充滿世界如於此清淨光明香水海華𦦨莊嚴幢須彌頂上摩尼華枝輪大林中出現其身而坐於座其勝音世界有六十八千億須彌山頂悉亦於彼現身而坐論六爾時已下有九行半經明初佛蓮華中忽然出現并陳佛身遍坐一切法界道場衆生皆見等事問曰何故此佛蓮華化現出興釋迦佛母胎出現答曰隨根所見母胎出現唯劣解衆生自根見爾如離世間品云為劣解衆生母胎出爾應大根衆生皆見蓮華出現也經爾時彼佛即於眉間放大光明其光名發起一切善根音十佛剎微塵數光明而為眷屬充滿一切十方國土若有衆生應可調伏其光照觸即自開悟息諸惑熱裂諸蓋網摧諸障山淨諸垢濁發大信解生勝善根永離一切諸難恐怖滅除一切身心苦惱起見佛心趣一切智時一切世間主并其眷屬無量百千蒙佛光明所開覺故悉詣佛所頭面禮足論七爾時已下有八行經明初佛出現放光集衆并陳光德大衆來集經諸佛子彼𦦨光明大城中有王名喜見善慧統領百萬億那由他城夫人婇女三萬七千人福吉祥為上首王子五百人別本云二萬五千人大威光為上首大威光太子有十千夫人妙見為上首爾時大威光太子見佛光明已以昔所修善根力故即時證得十種法門何謂為十所謂證得一切諸佛功德輪三昧證得一切佛法普門陀羅尼證得廣大方便藏般若波羅蜜證得調伏一切衆生大莊嚴大慈證得普雲音大悲證得生無邊功德最勝心大喜證得如實覺悟一切法大捨證得廣大方便平等藏大神通證得增長信解力大願證得普入一切智光明辨才門爾時大威光太子獲得如是法光明已承佛威力普觀大衆而說頌言世尊坐道場清淨大光明譬如千日出普照虗空界無量億千劫導師時乃現佛今出世間一切所瞻奉汝觀佛光明化佛難思議一切宮殿中寂然而正受汝觀佛神通毛孔出𦦨雲照耀於世間光明無有盡汝應觀佛身光網極清淨現形等一切遍滿於十方妙音遍世間聞者皆欣樂隨諸衆生語讚歎佛功德世尊光所照衆生悉安樂有苦皆滅除心生大歡喜觀諸菩薩衆十方來萃止悉放摩尼雲現前稱讚佛道場出妙音其音極深遠能滅衆生苦此是佛神力一切咸恭敬心生大歡喜共在世尊前瞻仰於法王論八諸佛子已下有十四行經明光明大城有人王名喜見善慧王與眷屬俱集并陳太子威光以自善根見佛光明得十種法門具如經說最下三句明威光說頌歎佛於此十行頌中歎佛之德及德與衆生益如文可知經諸佛子彼大威光太子說此頌時以佛神力其聲普遍勝音世界時喜見善慧王聞此頌已心大歡喜觀諸眷屬而說頌言汝應速召集一切諸王衆王子及大臣城邑宰官等普告諸城內疾應擊大鼓共集所有人俱行往見佛一切四衢道悉應鳴寶鐸妻子眷屬俱共往觀如來一切諸城郭宜令悉清淨普建勝妙幢摩尼以嚴飾寶帳羅衆網妓樂如雲布嚴備在虗空處處令充滿道路皆嚴淨普雨妙衣服巾馭汝寶乘與我同觀佛各各隨自力普雨莊嚴具一切如雲布遍滿虗空中香𦦨蓮華蓋半月寶纓珞及無數妙衣汝等皆應雨須彌香水海上妙摩尼輪及清淨栴檀悉應雨滿空衆寶華纓珞莊嚴淨無垢及以摩尼燈皆令在空住一切持向佛心生大歡喜妻子眷屬俱往見世所尊論九諸佛子已下有兩行半經明威光說頌以佛神力其聲遍聞父王聞之歡喜說頌於此十一行頌中明其善慧王敕衆令集并令辦供具經爾時喜見善慧王與三萬七千夫人婇女俱福吉祥為上首五百王子俱大威光為上首六萬大臣俱慧力為上首如是等七十七百千億那由他衆前後圍繞從𦦨光明大城出以王力故一切大衆乘空而往諸供養具遍滿虗空至於佛所頂禮佛足却坐一面復有妙華城善化幢天王與十億那由他眷屬俱復有究竟大城淨光龍王與二十五億眷屬俱復有金剛勝幢城猛健夜叉王與七十七億眷屬俱復有無垢城喜見乾闥婆王與九十七億眷屬俱復有妙輪城淨色思惟阿修羅王與五十八億眷屬俱復有妙莊嚴城十方行迦樓羅王與九十九千眷屬俱復有遊戲快樂城金剛德緊那羅王與十八億眷屬俱復有金剛幢城寶稱幢摩睺羅伽王與三億百千那由他眷屬俱復有淨妙莊嚴城最勝梵王與十八億眷屬俱如是等百萬億那由他大城中所有諸王并其眷屬悉共往詣一切功德須彌勝雲如來所頂禮佛足却坐一面時彼如來為欲調伏諸衆生故於衆會道場海中說普集一切三世佛自在法修多羅世界微塵數修多羅而為眷屬隨衆生心悉令獲益是時大威光菩薩聞是法已即獲一切功德須彌勝雲佛宿世所集法海光明所謂得一切法聚平等三昧智光明一切法悉入最初菩提心中住智光明十方法界普光明藏清淨眼智光明觀察一切佛法大願海智光明入無邊功德海清淨行智光明趣向不退轉大力速疾藏智光明法界中無量變化力出離輪智光明決定入無量功德圓滿海智光明了知一切佛決定解莊嚴成就海智光明了知法界無邊佛現一切衆生前神通海智光明了知一切佛力無所畏法智光明爾時大威光菩薩得如是無量智光明已承佛威力而說頌言我聞佛妙法而得智光明以是見世尊往昔所行事一切所生處名號身差別及供養於佛如是我咸見往昔諸佛所一切皆承事無量劫修行嚴淨諸剎海捨施於自身廣大無涯際修治最勝行嚴淨諸剎海耳鼻頭手足及以諸宮殿捨之無有量嚴淨諸剎海能於一一剎億劫不思議修習菩提行嚴淨諸剎海普賢大願力一切佛海中修行無量行嚴淨諸剎海如因日光照還見於日輪我以佛智光見佛所行道我觀佛剎海清淨大光明寂靜證菩提法界悉周遍我當如世尊廣淨諸剎海以佛威神力修習菩提行論十爾時已下有三十四行半經明十王興供見佛并陳所聞修多羅經威光獲益修多羅者此為長行經也最下兩句明威光說偈此十行頌中明威光聞法獲益得宿命智力見佛所行往因之事并自立願如佛所行經諸佛子時大威光菩薩以見一切功德山須彌勝雲佛承事供養故於如來所心得悟了為一切世間顯示如來往昔行海顯示往昔菩薩行方便顯示一切佛功德海顯示普入一切法界清淨智顯示一切道場中成佛自在力顯示佛力無畏無差別智顯示普示現如來身顯示不可思議佛神變顯示莊嚴無量清淨佛土顯示普賢菩薩所有行願令如須彌山微塵數衆生發菩提心佛剎微塵數衆生成就如來清淨國土爾時一切功德山須彌勝雲佛為大威光菩薩而說頌言善哉大威光福藏廣名稱為利衆生故發趣菩提道汝獲智光明法界悉充滿福慧咸廣大當得深智海一剎中修行經於剎塵劫如汝見於我當獲如是智非諸劣行者能知此方便獲大精進力乃能淨剎海一一微塵中無量劫修行彼人乃能得莊嚴諸佛剎為一一衆生輪回經劫海其心不疲懈當成世導師供養一一佛悉盡未來際心無暫疲厭當成無上道三世一切佛當共滿汝願一切佛會中汝身安住彼一切諸如來誓願無有邊大智通達者能知此方便大光供養我故獲大威力令塵數衆生成熟向菩提諸修普賢行大名稱菩薩莊嚴佛剎海法界普周遍論十一諸佛子已下有十一行經明威光菩薩以見初佛承事供養故得十種顯示如來所行法令須彌山塵數衆生發菩提心功德山須彌勝雲如來為威光說頌歎威光之德於此十一行頌中明功德山如來歎威光所得如佛所行廣大如文可知經諸佛子汝等應知彼大莊嚴劫中有恆河沙數小劫人壽命二小劫諸佛子彼一切功德須彌勝雲佛壽命五十億歲彼佛滅度後有佛出世名波羅蜜善眼莊嚴王亦於彼摩尼華枝輪大林中而成正覺爾時大威光童子見彼如來成等正覺現神通力即得念佛三昧名無邊海藏門即得陀羅尼名大智力法淵即得大慈名普隨衆生調伏度脫即得大悲名遍覆一切境界雲即得大喜名一切佛功德海威力藏即得大捨名法性虗空平等清淨即得般若波羅蜜名自性離垢法界清淨身即得神通名無礙光普隨現即得辨才名善入離垢淵即得智光名一切佛法清淨藏如是等十千法門皆得通達爾時大威光童子承佛威力為諸眷屬而說頌言不可思議億劫中導世明師難一遇此土衆生多善利而今得見第二佛佛身普放大光明色相無邊極清淨如雲充滿一切土處處稱揚佛功德光明所照咸歡喜衆生有苦悉除滅各令恭敬起慈心此是如來自在用出不思議變化雲放無量色光明網十方國土皆充滿此佛神通之所現一一毛孔現光雲普遍虗空發大音所有幽冥靡不照地獄衆苦咸令滅如來妙音遍十方一切言音咸具演隨諸衆生宿善力此是大師神變用無量無邊大衆海佛於其中皆出現普轉無盡妙法輪調伏一切諸衆生佛神通力無有邊一切剎中皆出現善逝如是智無礙為利衆生成正覺汝等應生歡喜心踊躍愛樂極尊重我當與汝同詣彼若見如來衆苦滅發心回向趣菩提慈念一切諸衆生悉住普賢廣大願當如法王得自在論十二諸佛子已下有十四行半經明莊嚴劫中佛及人壽命長短初佛去世第二佛出興并明威光見第二佛得十種利并為眷屬說頌此二十行頌中明威光歎佛慈悲出世難遇勸其眷屬同往佛所經諸佛子大威光童子說此頌時以佛神力其聲無礙一切世界皆悉得聞無量衆生發菩提心時大威光王子與其父母并諸眷屬及無量百千億那由他衆生前後圍繞寶蓋如雲遍覆虗空共詣波羅蜜善眼莊嚴王如來所其佛為說法界體性清淨莊嚴修多羅世界海微塵等修多羅而為眷屬彼諸大衆聞此經已得清淨智名入一切淨方便得於地名離垢光明得波羅蜜輪名示現一切世間愛樂莊嚴得增廣行輪名普入一切剎土無邊光明清淨見得趣向行輪名離垢福德雲光明幢得隨入證輪名一切法海廣大光明得轉深發趣行名大智莊嚴得灌頂智慧海名無功用修極妙見得顯了大光明名如來功德海相光影遍照得出生願力清淨智名無量願力信解藏時彼佛為大威光菩薩而說頌言善哉功德智慧海發心趣向大菩提汝當得佛不思議普為衆生作依處汝已出生大智海悉能遍了一切法當以難思妙方便入佛無盡所行境已見諸佛功德雲已入無盡智慧地諸波羅蜜方便海大名稱者當滿足已得方便總持門及以無盡辨才門種種行願皆修習當成無等大智慧汝已出生諸願海汝已入於三昧海當具種種大神通不可思議諸佛法究竟法界不思議廣大深心已清淨普見十方一切佛離垢莊嚴衆剎海汝已入我菩提行昔時本事方便海如我修行所淨治如是妙行汝皆悟我於無量一一剎種種供養諸佛海如彼修行所得果如是莊嚴汝咸見廣大劫海無有盡一切剎中修淨行堅固誓願不可思當得如來此神力諸佛供養盡無餘國土莊嚴悉清淨一切劫中修妙行汝當成佛大功德論十三諸佛子已下有十六行經明威光說頌其聲遍聞威光與眷屬同往佛所得十種利第二佛為威光說頌此二十行頌中明第二如來歎威光入道得益所得之益是八地法門如經云得灌頂智慧海名無功用修極妙見經諸佛子波羅蜜善眼莊嚴王如來入涅槃已喜見善慧王尋亦去世大威光童子受轉輪王位彼摩尼華枝輪大林中第三如來出現於世名最勝功德海時大威光轉輪聖王見彼如來成佛之相與其眷屬及四兵衆城邑聚落一切人民并持七寶俱往佛所以一切香摩尼莊嚴大樓閣奉上於佛時彼如來於其林中說菩薩普眼光明行修多羅世界微塵數修多羅而為眷屬爾時大威光菩薩聞此法已得三昧名大福德普光明得此三昧故悉能了知一切菩薩一切衆生過現未來福非福海時彼佛為大威光菩薩而說頌言善哉福德大威光汝等今來至我所愍念一切衆生海發勝菩提大願心汝為一切苦衆生起大悲心令解脫當作羣迷所依怙是名菩薩方便行若有菩薩能堅固修諸勝行無厭怠最勝最上無礙解如是妙智彼當得福德光者福幢者福德處者福海者普賢菩薩所有願是汝大光能趣入汝能以此廣大願入不思議諸佛海諸佛福海無有邊汝以妙解皆能見汝於十方國土中悉見無量無邊佛彼佛往昔諸行海如是一切汝咸見若有住此方便海必得入於智地中地是隨順諸佛學決定當成一切智汝於一切剎海中微塵劫海修諸行一切如來諸行海汝皆學已當成佛如汝所見十方中一切剎海極嚴淨汝剎嚴淨亦如是無邊願者所當得今此道場衆會海聞汝願已生欣樂皆入普賢廣大乘發心回向趣菩提無邊國土一一中悉入修行經劫海以諸願力能圓滿普賢菩薩一切行論十四諸佛子已下有十二行經明第二佛去世善慧王亦去世大威光受輪王位第三如來於舊道場出興於世威光見佛聞法得益第三如來說頌歎威光之德此二十二行頌明第三如來歎威光所得之法經諸佛子彼摩尼華枝輪大林中復有佛出號名稱普聞蓮華眼幢是時大威光於此命𣧩生須彌山上寂靜寶宮天城中為大天王名離垢福德幢共諸天衆俱詣佛所雨寶華雲以為供養時彼如來為說廣大方便普門遍照修多羅世界海微塵數修多羅而為眷屬時天王衆聞此經已得三昧名普門歡喜藏以三昧力能入一切法實相海獲是益已從道場出還歸本處論十五諸佛子已下有八行半經明第四如來於舊道場中出現大威光去世生須彌山頂為大天王還來見佛獲益而去此一品經來文未足未有結終之處此品但明引古印今毗盧遮那出世之法古今相襲不異又明所信樂道高法勝人壽命長遠福德所居依正果勝見佛聞法所獲利益勝故音切縱足容切櫓魯音崇土弓切敵徒力切塹七焰切奪徒活切裂列音萃秦醉切妓奇綺切馭魚據切乘去聲劣力月切怙胡古切禦魚舉切壕乎刀切郁於六切蹙子六切
