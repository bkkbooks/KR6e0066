body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論世主妙嚴品第一之十經爾時如來師子之座衆寶妙華輪臺基陛及諸戶牖如是一切莊嚴具中一一各出佛剎微塵數菩薩摩訶薩其名曰海慧自在神通王菩薩摩訶薩雷音普震菩薩摩訶薩衆寶光明髻菩薩摩訶薩大智日勇猛慧菩薩摩訶薩不思議功德寶智印菩薩摩訶薩百目蓮華髻菩薩摩訶薩金𦦨圓滿光菩薩摩訶薩法界普音菩薩摩訶薩雲音淨月菩薩摩訶薩善勇猛光明幢菩薩摩訶薩如是等而為上首有衆多佛剎微塵數同時出現此諸菩薩各興種種供養雲所謂一切摩尼寶華雲一切蓮華妙香雲一切寶圓滿光雲無邊境界香𦦨雲日藏摩尼輪光明雲一切悅意樂音雲無邊色相一切寶燈光𦦨雲衆寶樹枝華果雲無盡寶清淨光明摩尼王雲一切莊嚴具摩尼王雲如是等諸供養雲有佛世界微塵數彼諸菩薩一一皆興如是供養雲雨於一切道場衆海相續不絶現是雲已右繞世尊經無量百千匝隨其方面去佛不遠化作無量種種寶蓮華師子之座各於其上結跏趺坐是諸菩薩所行清淨廣大如海得智慧光照普門法隨順諸佛所行無礙能入一切辨才法海得不思議解脫法門住於如來普門之地巳得一切陀羅尼門悉能容受一切法海善住三世平等智地巳得深信廣大喜樂無邊福聚極善清淨虗空法界靡不觀察十方世界一切國土所有佛興咸勤供養爾時海慧自在神通王菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言論如來座內衆經云如來師子之座衆寶妙華輪臺基陛及諸戶牖如是一切莊嚴具中一一各出佛剎微塵數菩薩摩訶薩於此段中義分為二一述衆來意二長科經文一述衆來意者是中其意有三一明諸菩薩是古佛舊行二明今佛契同三明古今不二為門所坐之座合古所行菩薩行依舊故如下頌中諸佛所悟我巳知常以法身為座體以普賢萬行為莊嚴以無作大悲之智為座上佛前佛後佛皆同此也明今佛契同古迹定衆生狐疑是故須來是名為如來自行與古同因衆為座體體是法界所行行亦是法界以此無礙自在故座身是正報座上莊嚴是行所招依報今還從本行報得之果內還出本自行因菩薩衆也亦明因果不二體故如法界品如來師子之座普遍法界為座體故第二長科經文者從爾時如來師子座已下有二十九行經四百九十言今二十五行於中其義有七一明座上莊嚴出衆二列所出衆名三來衆與供四其衆繞佛致敬五致敬已升座而坐六歎來衆之德七乘威説頌從此已下有十菩薩各説二十行頌歎如來成道福智依正及往昔所修之因任其後哲隨文隨義稱歎不煩更釋此一段明今佛合古行古行合今佛明座外普賢之衆是佛利他之行座內之人是佛自行所契普賢之衆此之大衆古今一切諸佛同道更無二路衆生乘之即名乘不思議乘如來乘最勝乘無上乘至於道場此以一切法皆為道場也以法界為場地諸波羅蜜為人功治一切垢本自淨故治無明成根本智故教文弘廣略申體意隨文讚歎任在後賢此十箇頌中向下歎佛十波羅蜜及十地有二十行頌自餘皆二十行也準知經諸佛所悟悉已知如空無礙皆明照光遍十方無量土處於衆會普嚴潔如來功德不可量十方法界悉充滿普坐一切樹王下諸大自在共雲集佛有如是神通力一念現於無盡相如來境界無有邊各隨解脫能觀見如來往昔經劫海在於諸有勤修行種種方便化衆生令彼受行諸佛法毗盧遮那具嚴好坐蓮華藏師子座一切衆會皆清淨寂然而住同瞻仰摩尼寶藏放光明普發無邊香𦦨雲無量華纓共垂布如是座上如來坐種種嚴飾吉祥門恆放燈光寶𦦨雲廣大熾然無不照牟尼處上增嚴好種種摩尼綺麗窗妙寶蓮華所垂飾恆出妙音聞者悅佛坐其上特明顯寶輪承座半月形金剛為臺色𦦨明持髻菩薩常圍繞佛在其中最光耀種種變化滿十方演説如來廣大願一切影像於中現如是座上佛安坐爾時雷音普震菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言世尊往集菩提行供養十方無量佛善逝威力所加持如來座中無不覩香𦦨摩尼如意王填飾妙華師子座種種莊嚴皆影現一切衆會悉明矚佛座普現莊嚴相念念色類各差別隨諸衆生解不同各見佛坐於其上寶枝垂布蓮華網華開踊現諸菩薩各出微妙悅意聲稱讚如來坐於座佛功德量如虗空一切莊嚴從此生一一地中嚴飾事一切衆生不能了金剛為地無能壞廣博清淨極夷坦摩尼為網垂布空菩提樹下皆周遍其地無邊色相殊真金為末布其中普散名華及衆寶悉以光瑩如來座地神歡喜而踊躍剎那示現無有盡普與一切莊嚴雲恆在佛前瞻仰住寶燈廣大極熾然香𦦨流光無斷絶隨時示現各差別地神以此為供養十方一切剎土中彼地所有諸莊嚴今此道場無不現以佛威神故能爾爾時衆寶光明髻菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言世尊往昔修行時見諸佛土皆圓滿如是所見地無盡此道場中皆顯現世尊廣大神通力舒光普雨摩尼寶如是寶藏散道場其地周回悉嚴麗如來福德神通力摩尼妙寶普莊嚴其地及以菩提樹遞發光音而演説寶燈無量從空雨寶王間錯為嚴飾悉吐微妙演法音如是地神之所現寶地普現妙光雲寶炬𦦨明如電發寶網遐張覆其上寶枝雜布為嚴好汝等普觀於此地種種妙寶所莊嚴顯示衆生諸業海令彼了知真法性普遍十方一切佛所有圓滿菩提樹莫不皆現道場中演説如來清淨法隨諸衆生心所樂其地普出妙音聲如佛座上所應演一一法門咸具説其地恆出妙香光光中普演清淨音若有衆生堪受法悉使得聞煩惱滅一一莊嚴悉圓滿假使億劫無能説如來神力靡不周是故其地皆嚴淨爾時大智日勇猛慧菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言世尊凝睟處法堂炳然照耀宮殿中隨諸衆生心所樂其身普現十方土如來宮殿不思議摩尼寶藏為嚴飾諸莊嚴具咸光耀佛坐其中特明顯摩尼為柱種種色真金鈴鐸如雲布寶階四面列成行門闥隨方咸洞啓妙華繒綺莊嚴帳寶樹枝條共嚴飾摩尼纓珞四面垂智海於中湛然坐摩尼為網妙香幢光𦦨燈明若雲布覆以種種莊嚴具超世正知於此坐十方普現變化雲其雲演説遍世間一切衆生悉調伏如是皆從佛宮現摩尼為樹發妙華十方所有無能匹三世國土莊嚴事莫不於中現其影處處皆有摩尼聚光𦦨熾然無量種門牖隨方相間開棟宇莊嚴極殊麗如來宮殿不思議清淨光明具衆相一切宮殿於中現一一皆有如來坐如來宮殿無有邊自然覺者處其中十方一切諸衆會莫不向佛而來集爾時不思議功德寶智印菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言佛昔修治衆福海一切剎土微塵數神通願力所出生道場嚴淨無諸垢如意珠王作樹根金剛摩尼以為身寶網遐施覆其上妙香氛氳共旋繞樹枝嚴飾備衆寶摩尼為幹爭聳擢枝條密布如重雲佛於其下坐道場道場廣大不思議其樹周回盡彌覆密葉繁華相庇映華中悉結摩尼果一切枝間發妙光其光遍照道場中清淨熾然無有盡以佛願力如斯現摩尼寶藏以為華布影騰輝若綺雲匝樹垂芳無不遍於道場中普嚴飾汝觀善逝道場中蓮華寶網俱清淨光𦦨成輪從此現鈴音鐸響雲間發十方一切國土中所有妙色莊嚴樹菩提樹中無不現佛於其下離衆垢道場廣大福所成樹枝雨寶恆無盡寶中出現諸菩薩悉往十方供事佛諸佛境界不思議普令其樹出樂音如昔所集菩提道衆會聞音咸得見爾時百目蓮華髻菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言一切摩尼出妙音稱揚三世諸佛名彼佛無量神通事此道場中皆現覩衆華競發如纓布光雲流演遍十方菩提樹神持向佛一心瞻仰為供養摩尼光𦦨悉成幢幢中熾然發妙香其香普熏一切衆是故其處皆嚴潔蓮華垂布金色光其光演佛妙聲雲普蔭十方諸剎土永息衆生煩惱熱菩提樹王自在力常放光明極清淨十方衆會無有邊莫不影現道場中寶枝光𦦨若明燈其光演音宣大願如佛往昔於諸有本所修行皆具説樹下諸神剎塵數悉共依於此道場各各如來道樹前念念宣揚解脫門世尊往昔修諸行供養一切諸如來本所修行及名聞摩尼寶中皆悉現道場一切出妙音其音廣大遍十方若有衆生堪受法莫不調伏令清淨如來往昔普修治一切無量莊嚴事十方一切菩提樹一一莊嚴無量種爾時金𦦨圓滿光菩薩摩訶薩承佛威力普觀一切道場衆海即説頌言佛昔修習菩提行於諸境界解明了處與非處淨無疑此是如來初智力如昔等觀諸法性一切業海皆明徹如是今於光網中普遍十方能具演往劫修治大方便隨衆生根而化誘普使衆會心清淨故佛能成根智力如諸衆生解不同欲樂諸行各差別隨其所應為説法佛以智力能如是普盡十方諸剎海所有一切衆生界佛智平等如虗空悉能顯現毛孔中一切處行佛盡知一念三世畢無餘十方剎劫衆生時悉能開示令現了禪定解脫力無邊三昧方便亦復然佛為示現令歡喜普使滌除煩惱暗佛智無礙包三世剎那悉現毛孔中佛法國土及衆生所現皆由隨念力佛眼廣大如虗空普見法界盡無餘無礙地中無等用彼眼無量佛能演一切衆生具諸結所有隨眠與習氣如來出現遍世間悉以方便令除滅爾時法界普音菩薩摩訶薩承佛威力普觀一切道場衆會海已即説頌言佛威神力遍十方廣大示現無分別大菩提行波羅蜜昔所滿足皆令見昔於衆生起大悲修行布施波羅蜜以是其身最殊妙能令見者生歡喜昔在無邊大劫海修治淨戒波羅蜜故獲淨身遍十方普滅世間諸重苦往昔修行忍清淨信解真實無分別是故色相皆圓清普放光明照十方往昔勤修多劫海能轉衆生深重障故能分身遍十方悉現菩提樹王下佛久修行無量劫禪定大海普清淨故令見者心歡喜煩惱障垢悉除滅如來往修諸行海具足般若波羅蜜是故舒光普照明克殄一切愚癡暗種種方便化衆生令所修治悉成就一切十方皆遍往無邊際劫不休息佛昔修行大劫海淨治諸願波羅蜜是故出現遍世間盡未來際救衆生佛無量劫廣修治一切法力波羅蜜由是能成自然力普現十方諸國土佛昔修治普門智一切智性如虗空是故得成無礙力舒光普照十方剎爾時雲音淨月菩薩摩訶薩承佛威力普觀一切道場衆會海已即説頌言神通境界等虗空十方衆生靡不見如昔修行所成地摩尼果中咸具説清淨勤修無量劫入於初地極歡喜出生法界廣大智普見十方無量佛一切法中離垢地等衆生數持淨戒已於多劫廣修行供養無邊諸佛海積集福德發光地奢摩他藏堅固忍法雲廣大悉已聞摩已果中如是説𦦨海慧明無等地善了境界起慈悲一切國土平等身如佛所治皆演暢普藏等門難勝地動寂相順無違反佛法境界悉平等如佛所淨皆能説廣大修行慧海地一切法門咸遍了普現國土如虗空樹中演暢此法音周遍法界虗空身普照衆生智慧燈一切方便皆清淨昔所遠行今具演一切願行所莊嚴無量剎海皆清淨所有分別無能動此無等地咸宣説無量境界神通力善入教法光明力此是清淨善慧地劫海所行皆備闡法雲廣大第十地含藏一切遍虗空諸佛境界聲中演此聲是佛威神力爾時善勇猛光幢菩薩摩訶薩承佛威力普觀一切道場衆會海已即説頌言無量衆生處會中種種信解心清淨悉能悟入如來智了達一切莊嚴境各起淨願修諸行悉曾供養無量佛能見如來真實體及以一切諸神變或有能見佛法身無等無礙普周遍所有無邊諸法性悉入其身無不盡或有見佛妙色身無邊色相光熾然隨諸衆生解不同種種變現十方中或見無礙智慧身三世平等如虗空普隨衆生心樂轉種種差別皆令見或有能了佛音聲普遍十方諸國土隨諸衆生所應解為出言音無障礙或見如來種種光種種照耀遍世間或有於佛光明中復見諸佛現神通或有見佛海雲光從毛孔出色熾然示現往昔修行道令生深信入佛智或見佛相福莊嚴及見此福所從生往昔修行諸度海皆佛相中明了見如來功德不可量充滿法界無邊際及以神通諸境界以佛力故能宣説爾時華藏莊嚴世界海以佛神力其地一切六種十八相震動所謂動遍動普遍動起遍起普遍起踊遍踊普遍踊震遍震普遍震吼遍吼普遍吼擊遍擊普遍擊此諸世主一一皆現不思議諸供養雲雨於如來道場衆海所謂一切香華莊嚴雲一切摩尼妙飾雲一切寶𦦨華網雲無邊種類摩尼寶圓光雲一切衆色寶真珠藏雲一切寶栴檀香雲一切寶蓋雲清淨妙聲摩尼王雲日光摩尼纓珞輪雲一切寶光明藏雲一切各別莊嚴具雲如是等諸供養雲其數無量不可思議此諸世主一一皆現如是供養雲雨於如來道場衆海靡不周遍如此世界中一一世主心生歡喜如是供養其華藏莊嚴世界海中一切世界所有世主悉亦如是而為供養其一切世界中悉有如來坐於道場一一世主各各信解各各所緣各各三昧方便門各各修習助道法各各成就各各歡喜各各趣入各各悟解諸法門各各入如來神通境界各各入如來力境界各各入如來解脫門如於此華藏世界海十方盡法界虗空界一切世界海中悉亦如是論從爾時華藏莊嚴世界海已下有二十一行經三百六十二言今十八行半明動地興供於此一段經文其意有七一明舉世界之名二推佛神力地六震動三世主興供歡喜四明以此例同多土五明佛遍興於世六明世主各隨自解七明法會興供普同十方問曰何為地動答曰其地動大意有五一此會大衆得道二智人出現三智人去世四世間災變五得道歡悅此明大衆獲益歡悅故地動推佛神力者明師弟之敬推德於上問曰何故於此段中地動興供答曰為至此中一段明初會中常隨佛衆當境之內神天衆及如來座內古今諸佛同因衆菩提樹內流光衆并如來宮殿內大悲衆如是當佛自衆來集復得益及賀佛出興心歡喜故衆心喜動故地亦隨心動故此明初會當境之內大集一終然後面門放光普集他土亦來此會此是無自他中他也以明化儀主伴此乃龍行雲應法事合然為化衆生軌模如是以真法性塵剎普周一剎那之中三世同際還以一多相容不同門該括如是放光集衆意令知佛境界相參無二已上是初成正覺顯示五位行門一終因果此一部之經總有六重因果一從世主妙嚴品及至華藏世果品五品經明初成正覺顯示五位行門報得及示現入法一重因果二毗盧遮那品是古佛因果引古證今明佛佛相襲道不虗來三第二會普光明殿顯示十信因果四從須彌之頂直至離世間品顯菩薩證修因果五入法界品明古今本法不思議因果此是一切諸佛共所乘宗為一切佛之本體衆生同具只為迷之六覺城東會明顯示菩薩利生行門善知識攝生形狀法則進修因果若但説其法在行猶迷此經設教及行證修前後六度總舉解行證修因果令使啓蒙易解不滯其功音切基居之切陛傍禮切牖焉久切跏加音趺夫音綺去倚切麗郎計切填田音瑩烏定切凝魚陵切睟宣醉切炳彼永切鈴令音鐸徒各切闥他達切繒疾陵切棟都弄切氛符分切聳息勇切擢直角切覆敷救切庇𢍉至切映於敬切響許兩切競渠敬切薰許云切狐戶吳切遞特計切模莫胡切總作孔切
