body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論入法界品第三十九之八論第一正入當位法門中從爾時善財已下至我唯知此一解脫門於此段中約分為十三門一念善知識教思惟勝進二漸漸南行至海潮處三見普莊嚴園林莊嚴衆寶四入其園中周遍推求五見優婆夷往詣其所六致敬禮拜正申所求七休捨優婆夷為説自己所行之法八善財白言聖者發無上菩提心其已久如九善財童子言聖者久如當得成無上菩提十休捨優婆夷正答成佛久近因緣十一善財請説解脫法門如何名目十二休捨優婆夷正答其名名離憂安隱幢十三我唯知此一解脫門已下推德升進如園林衆寶及宮殿衆事皆衆寶所嚴者表約行願廣大盡佛界衆生界故依報莊嚴廣大無限容貌端正及諸嚴飾表慈心悲愍益物利生調順柔和體道無我十波羅蜜無不順行十方諸佛身遍奉侍供養所感正報容止可觀見者除惑人天崇重表大悲行示現女身而非女心所有莊嚴及以宮殿樓閣池沼皆約悲智萬行報生如前先約略表示所有嚴飾如經自明意明此位方便波羅蜜慈悲行廣莊嚴報廣經云善男子其有衆生得見我者皆於阿耨多羅三藐三菩提得不退轉者明來至此位要修至三空解脫世間智出世間智慧現前成廣大慈悲行方來至方便入生死門達生死性與佛福智海本來一性便得離憂安隱幢解脫門方名不退住雖復知空無我常於生死有畏未入離憂安隱幢常居退位設不退還凡夫還退作二乘及生淨土別欣樂果故云十方諸佛悉來至我所於寶座上為我説法表悲與智會明此位以悲成無功之智門第十位中王女慈行童女明以智成悲自在門師子幢王表是十住位中無功用智自在女表無染之慈也至第十灌頂住智悲滿故第十地是蘊積大悲成行門以九箇女天一箇如來妻表之十一地是大悲行滿以悲起智成佛門即以摩耶生佛表之以此十一地中十箇善知識總佛果已滿善知識以具普賢行故遍作世間人中仁士之行童子師居士長者童子童女行同凡士此明果極行遍故大約以智發心從初發心住即悲智齊發為其始學出世道根本智為先以此立五位五十箇行門以簡生熟同別由茲五十箇波羅蜜五位中五重鍊磨簡其智悲廣狹生熟出世入纏逆順和會福慧多少勝劣不同令發心者不住一法及三四五十百千即以為足故意令進升至於無限廣大如法界故就之設五位五十重中一一具有智悲二行五十箇波羅蜜互相參徹約有五百箇波羅蜜門互為主伴圓此悲智世及出世心量廣狹生熟之門方明總別同異成壞六義如此十住門十波羅蜜直以約法界體實法安立十法圓融互參成一百法門以初發菩提心以此佛本果行為樣修行從此本樣修行五重加行鍊磨方始得依初樣雖復鍊磨生熟差別然智悲不異初心日月時節亦無遷轉以約智發心本無三世時分故此優婆夷者表對第六住是世間出世間法故為回彼出世心多者令依滿本願故起愛處生死愛度衆生成慈悲行故以優婆夷名滿願表之以取其志養育子孫無疲勞故表大悲菩薩養育一切法界衆生若善不善曾無捨離未曾起不濟之心化種種身未曾捨一衆生如毛髮許恆常對現一切衆生前種種教詔使令成熟故此位約回第六住出世心多令不斷生死愛度衆生猶存愛習以優婆夷表之故名有行有開發第十灌頂中以一分無功智成以智生悲無有愛習以師子幢王女慈行童女表之此是當十住位中調治和會智悲生熟之意如上我有八萬四千那由他同行眷屬常居此園明以衆生八萬四千那由他諸煩惱園林悉皆與之同行而接引之善財問優婆夷發菩提心久近者意明求解脫無有久近一發即三世一時求解脫體中無有久近故明大悲行中問發心久近者意明大慈大悲深厚還與衆生界住劫久近相似若衆生界無盡大悲願行無盡後問久如成佛意亦如之且舉三十恆河沙為量已去唯佛所知意不可極也又前三比丘得出世心是一十至彌伽海幢比丘得了世間出世間心是二十至此第七住入世行慈悲是三十也明發心久近俱枳羅鳥梵本未譯毗盧遮那摩尼寶者名為光明遍照如意無垢寶也寶多羅樹形如此方棕櫚以妙寶所成阿盧那香此云赤色婆樓那天佛此云水天解脫名離憂安隱幢者此有二義一教化衆生使令離憂是菩薩安隱幢衆生未離生死菩薩不自取安隱故因化成名二菩薩雖達生死性空於生死有畏未為究竟安隱無憂若能入生死教化衆生達生死衆生及以教化者總涅槃行無出無沒方名離憂安隱幢故此是十住中第七不退住方便波羅蜜為主餘九為伴約智門中五位通治約位門中偏治世間出世間心多大悲心劣而令悲智得圓滿故第二推德升進前位中如諸菩薩摩訶薩已下至辭退而行有十六行半經於中文義約分五門一推德於先令其勝進二示善知識處名為海潮三示其國土名那羅素四舉善知識名號五頂禮流淚辭退而行此流淚者表大悲弘深又敬法貴人情至厚重又表智悲自在垂悲俗流傷嗟苦趣聖心廣濟悲歎難勝此南方有海潮處與前位同名海潮處者表悲智同會以將前位慈悲之門升進會於智體以將第八願波羅蜜發起智業會其悲門智若不發興大願行悲趣寂無由起用是故十地中至第八地位諸佛三加七勸令念本願方能生大慈悲是故二位同名海潮明以第八願波羅蜜會其悲智一體方得無功大用行廣利而無思猶如海潮泛洪波而不作故像此位菩薩以無功智化諸羣品知根而不失時也是故二位同名海潮此會智悲不二國名那羅素者此云不懶墮為第八住入無功之智本稱智遍周利生無懈無疲勞懶墮之心此位是十地中八地之樣從此而起初迹至第八地方與本樣會同此中一分相應十地中第八地大用一體無功智周佛地方滿至如來出現品是其滿處以法界品為源始根本智恆爾無功大用故以初發大菩提心者元依法界音光智體發心功熟即是本來法界但約智悲生熟廣狹上明位次第仙人名毗目瞿沙者此云出聲可畏為智目增明善摧邪論出言契當異論息心故名出聲可畏善財悲泣流淚思惟有十難事如經具明第八海潮處毗目瞿沙仙人主童真住經爾時善財童子隨順思惟菩薩正教隨順思惟菩薩淨行生增長菩薩福力心生明見一切諸佛心生出生一切諸佛心生增長一切大願心生普見十方諸法心生明照諸法實性心生普散一切障礙心生觀察法界無暗心生清淨意寶莊嚴心生摧伏一切衆魔心漸漸遊行至那羅素國周遍推求毗目瞿沙見一大林阿僧祇樹以為莊嚴所謂種種葉樹扶疏布濩種種華樹開敷鮮榮種種果樹相續成熟種種寶樹雨摩尼果大栴檀樹處處行列諸沈水樹常出好香悅意香樹妙香莊嚴波吒羅樹四面圍繞尼拘律樹其身聳擢閻浮檀樹常雨甘果優鉢羅華波頭摩華以嚴池沼時善財童子見彼仙人在栴檀樹下敷草而坐領徒一萬或著鹿皮或著樹皮或復編草以為衣服髻鬟垂鬢前後圍繞善財見已往詣其所五體投地作如是言我今得遇真善知識善知識者則是趣向一切智門令我得入真實道故善知識者則是趣向一切智乘令我得至如來地故善知識者則是趣向一切智船令我得至智寶洲故善知識者則是趣向一切智炬令我得生十力光故善知識者則是趣向一切智道令我得入涅槃城故善知識者則是趣向一切智燈令我得見夷險道故善知識者則是趣向一切智橋令我得度險惡處故善知識者則是越向一切智蓋令我得生大慈涼故善知識者則是趣向一切智眼令我得見法性門故善知識者則是趣向一切智潮令我滿足大悲水故作是語已從地而起繞無量匝合掌前住白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能誘誨願為我説時毗目瞿沙顧其徒衆而作是言善男子此童子已發阿耨多羅三藐三菩提心善男子此童子普施一切衆生無畏此童子普與一切衆生利益此童子常觀一切諸佛智海此童子欲飲一切甘露法雨此童子欲測一切廣大法海此童子欲令衆生住智海中此童子欲普發起廣大悲雲此童子欲普雨於廣大法雨此童子欲以智月普照世間此童子欲滅世間煩惱毒熱此童子欲長含識一切善根時諸仙衆聞是語已各以種種上妙香華散善財上投身作禮圍繞恭敬作如是言今此童子必當救護一切衆生必當除滅諸地獄苦必當永斷諸畜生道必當轉去閻羅王界必當關閉諸難處門必當乾竭諸愛欲海必令衆生永滅苦蘊必當永破無明黑暗必當永斷貪愛繫縛必以福德大輪圍山圍繞世間必以智慧大寶須彌顯示世間必當出現清淨智日必當開示善根法藏必使世間明識險易時毗目瞿沙告羣仙言善男子若有能發阿耨多羅三藐三菩提心必當成就一切智道此善男子已發阿耨多羅三藐三菩提心當淨一切佛功德地時毗目瞿沙告善財童子言善男子我得菩薩無勝幢解脫善財白言聖者無勝幢解脫境界云何時毗目仙人即伸右手摩善財頂執善財手即時善財自見其身往十方十佛剎微塵數世界中到十佛剎微塵數諸佛所見彼佛剎及其衆會諸佛相好種種莊嚴亦聞彼佛隨諸衆生心之所樂而演説法一文一句皆悉通達各別受持無有雜亂亦知彼佛以種種解淨治諸願亦知彼佛以清淨願成就諸力亦見彼佛隨衆生心所現色相亦見彼佛大光明網種種諸色清淨圓滿亦知彼佛無礙智慧大光明力又自見身於諸佛所經一日夜或七日夜半月一月一年十年百年千年或經億年或阿庾多億年或那由他億年或經半劫或經一劫百劫千劫或百千億乃至不可説不可説佛剎微塵數劫爾時善財童子為菩薩無勝幢解脫智光明照故得毗盧遮那藏三昧光明為無盡智解脫三昧光明照故得普攝諸方陀羅尼光明為金剛輪陀羅尼門光明照故得極清淨智慧心三昧光明為普門莊嚴藏般若波羅蜜光明照故得佛虗空藏輪三昧光明為一切佛法輪三昧光明照故得三世無盡智三昧光明時彼仙人放善財手善財童子即自見身還在本處時彼仙人告善財言善男子汝憶念耶善財言唯此是聖者善知識力仙人言善男子我唯知此菩薩無勝幢解脫如諸菩薩摩訶薩成就一切殊勝三昧於一切時而得自在於一念頃出生諸佛無量智慧以佛智燈而為莊嚴普照世間一念普入三世境界分形遍往十方國土智身普入一切法界隨衆生心普現其前觀其根行而為利益放淨光明甚可愛樂而我云何能知能説彼功德行彼殊勝願彼莊嚴剎彼智境界彼三昧所行彼神通變化彼解脫遊戲彼身相差別彼音聲清淨彼智慧光明善男子於此南方有一聚落名伊沙耶有婆羅門名曰勝熱汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子歡喜踊躍頂禮其足繞無數匝殷勤瞻仰辭退南行論第一正入當位法門中從初爾時善財童子已下至我得無勝幢解脫門此一段文約分十三門一念教誨思惟勝進二漸遊行至那羅素國三周遍推求毗目瞿沙四見一大林阿僧祇樹以為莊嚴五見仙人栴檀樹下敷草而坐領徒一萬六申其所求七仙人稱歎善財八仙人示其善財法門名字九善財問其無勝幢解脫境界十仙人以手摩善財頂執其手令善財自見其身往十方佛剎微塵數世界中十一善財見佛獲益十二仙人放善財手還在本處十三我唯知此無勝幢解脫已下是推德升進波吒羅樹者似此方楸樹甚有香氣其華紫色尼拘律樹葉似此方柿葉其子似枇杷子子下承蒂如柿其種類耐老於諸樹中最高大領徒一萬明萬行具足問何故此位見仙人何意答曰此有二義一表智淨如仙為明此位無功智現無染如仙二為無功智現以大悲行能同異道同事接生其居處林樹莊嚴明陰覆利物池沼蓮華莊嚴明慈悲處世無染行仙人於栴檀樹下敷草而坐表智樹覆陰熏戒定慧解脫知見香遍周法界敷草而坐明無功之智能善治貪亂明少欲之相鹿皮草衣示行少欲知足髻鬟垂鬢者無功之智圓滿如是徒衆前後圍繞者明主伴萬行圓滿善財見已往詣其所五體投地者明敬法重人之禮又表以五塵之境皆歸智地歎言真善知識真善知識者無功之智本自真故無勝幢解脫者明此位無功用智地自遍周利益一切衆生摧破煩惱無有斷絶下位不如故云無勝幢仙人以手摩善財頂者示以安慰接善財手者表引接也善財自見其身往詣十方十佛剎微塵數世界中及到十佛剎微塵數佛所者明會智境遍周也凡至十住中第八住十地中第八地皆須諸佛聖者灌頂勸發加持及第十灌頂住及第十法雲地總須諸佛灌頂加持故若不加持或時滯寂或不了佛境界故無能自進為創初不達佛無功用智之境界故已下見佛境界如經具明阿庾多者此方一兆之數那由他者此方一億仙人放善財手善財即見自身還本處明以智力加持入法既得法已自力常然雖復聖者捨其加持一見見無有異故如舟濟渡於岸不可負舟而行此是童真住明創初童蒙入真無功智之境界以願波羅蜜為主餘九為伴明此位無功智現恐當滯寂以大願門興其智用故又令念本願廣度衆生有此節級以法防之令不滯故以智門中諸位通治約位門中此位會七住中悲行第八住中無功之智光八願波羅蜜興作令使智悲任用自在第一推德升進中從如諸菩薩摩訶薩已下至辭退南行有十二行半經於中義意約分六門一推德於先二示善知識所在三舉聚落名伊沙那四示知識名為勝熱五勸令致問所行法門六禮敬辭退南行南方如初所釋聚落名伊沙那者此云長直為表此善知識攝化長其直道無諸諂誑故名長直婆羅門者此云淨也為表此善知識無染寂靜故名勝熱者表勝世間煩惱熱故示勝盛火炎熱故此是第九法王子住得法自在明第九力波羅蜜法力自在示同外道五熱炙身引接邪徒令歸正智明得智同邪接諸邪見妄行苦行者令皆信伏下自有具文第九伊沙那聚落勝熱婆羅門主法王子住經爾時善財童子為菩薩無勝幢解脫所照故住諸佛不思議神力證菩薩不思議解脫神通智得菩薩不思議三昧智光明得一切時熏修三昧智光明得了知一切境界皆依想所住三昧智光明得一切世間殊勝智光明於一切處悉現其身以究竟智説無二無分別平等法以明淨智普照境界凡所聞法皆能忍受清淨信解於法自性決定明了心恆不捨菩薩妙行求一切智永無退轉獲得十力智慧光明勤求妙法常無厭足以正修行入佛境界出生菩薩無量莊嚴無邊大願悉已清淨以無窮盡智知無邊世界網以無怯弱心度無量衆生海了無邊菩薩諸行境界見無邊世界種種差別見無邊世界種種莊嚴入無邊世界微細境界知無邊世界種種名號知無邊世界種種言説知無邊衆生種種解見無邊衆生種種行見無邊衆生成熟行見無邊衆生差別想念善知識漸次遊行至伊沙那聚落見彼勝熱修諸苦行求一切智四面火聚猶如大山中有刀山高峻無極登彼山上投身入火時善財童子頂禮其足合掌而立作如是言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能誘誨願為我説婆羅門言善男子汝今若能上此刀山投身火聚諸菩薩行悉得清淨時善財童子作如是念得人身難離諸難難得無難難得淨法難得值佛難具諸根難聞佛法難遇善人難逢真善知識難受如理正教難得正命難隨法行難此將非魔魔所使耶將非是魔險惡徒黨詐現菩薩善知識相而欲為我作善根難作壽命難障我修行一切智道牽我令入諸惡道中欲障我法門障我佛法作是念時十千梵天在虗空中作如是言善男子莫作是念莫作是念今此聖者得金剛𦦨三昧光明發大精進度諸衆生心無退轉欲竭一切貪愛海欲截一切邪見網欲燒一切煩惱薪欲照一切惑稠林欲斷一切老死怖欲壞一切三世障欲放一切法光明善男子我諸梵天多著邪見皆悉自謂是自在者是能作者於世間中我是最勝見婆羅門五熱炙身於自宮殿心不樂著於諸禪定不得滋味皆共來詣婆羅門所時婆羅門以神通力示大苦行為我説法能令我等滅一切見除一切慢住於大慈行於大悲起廣大心發菩提意常見諸佛恆聞妙法於一切處心無所礙復有十千諸魔在虗空中以天摩尼寶散婆羅門上告善財言善男子此婆羅門五熱炙身時其火光明映奪於我所有宮殿諸莊嚴具皆如聚墨令我於中不生樂著我與眷屬來詣其所此婆羅門為我説法令我及餘無量天子諸天女等皆於阿耨多羅三藐三菩提得不退轉復有十千自在天王於虗空中各散天華作如是言善男子此婆羅門五熱炙身時其火光明映奪我等所有宮殿諸莊嚴具皆如聚墨令我於中不生愛著即與眷屬來詣其所此婆羅門為我説法令我於心而得自在於煩惱中而得自在於受生中而得自在於諸業障而得自在於諸三昧而得自在於莊嚴具而得自在於壽命中而得自在乃至能於一切佛法而得自在復有十千化樂天王於虗空中作天音樂恭敬供養作如是言善男子此婆羅門五熱炙身時其火光明照我宮殿諸莊嚴具及諸婇女能令我等不受欲樂不求欲樂身心柔軟即與衆俱來詣其所時婆羅門為我説法能令我等心得清淨心得明潔心得純善心得柔軟心生歡喜乃至令得清淨十力清淨之身生無量身乃至令得佛身佛語佛聲佛心具足成就一切智智復有十千兜率天王天子天女無量眷屬於虗空中雨衆妙香恭敬頂禮作如是言善男子此婆羅門五熱炙身時令我等諸天及其眷屬於自宮殿無有樂著共詣其所聞其説法能令我等不貪境界少欲知足心生歡喜心得充滿生諸善根發菩提心乃至圓滿一切佛法復有十千三十三天并其眷屬天子天女前後圍繞於虗空中雨天曼陀羅華恭敬供養作如是言善男子此婆羅門五熱炙身時令我等諸天於天音樂不生樂著共詣其所時婆羅門為我等説一切諸法無常敗壞令我捨離一切欲樂令我斷除憍慢放逸令我愛樂無上菩提又善男子我當見此婆羅門時須彌山頂六種震動我等恐怖皆發菩提心堅固不動復有十千龍王所謂伊那跋羅龍王難陀優波難陀龍王等於虗空中雨黑栴檀無量龍女奏天音樂雨天妙華及天香水恭敬供養作如是言善男子此婆羅門五熱炙身時其火光明普照一切諸龍宮殿令諸龍衆離熱沙怖金翅鳥怖滅除瞋恚身得清涼心無垢濁聞法信解厭惡龍趣以至誠心悔除業障乃至發阿耨多羅三藐三菩提意住一切智復有十千夜叉王於虗空中以種種供具恭敬供養此婆羅門及以善財作如是言善男子此婆羅門五熱炙身時令我及眷屬悉於衆生發慈愍心一切羅剎鳩槃茶等亦生慈心以慈心故於諸衆生無所惱害而來見我我及彼等於自宮殿不生樂著即與共俱來詣其所時婆羅門即為我等如應説法一切皆得身心安樂又令無量夜叉羅剎鳩槃茶等發於無上菩提之心復有十千乾闥婆王於虗空中作如是言善男子此婆羅門五熱炙身時其火光明照我宮殿悉令我等受不思議無量快樂是故我等來詣其所此婆羅門為我説法能令我等於阿耨多羅三藐三菩提得不退轉復有十千阿修羅王從大海出住在虗空舒右膝輪合掌前禮作如是言善男子此婆羅門五熱炙身時我阿修羅所有宮殿大海大地悉皆震動令我等捨憍慢放逸是故我等來詣其所從其聞法捨離諂誑安住忍地堅固不動圓滿十力復有十千迦樓羅王勇力持王而為上首化作外道童子之形於虗空中唱如是言善男子此婆羅門五熱炙身時其火光明照我宮殿一切震動皆悉恐怖是故我等來詣其所時婆羅門即為我等如應説法令修習大慈稱讚大悲渡生死海於欲泥中拔濟衆生歎菩提心起方便智隨其所宜調伏衆生復有十千緊那羅王於虗空中唱如是言善男子此婆羅門五熱炙身時我等所住宮殿諸多羅樹諸寶鈴網諸寶繒帶諸音樂樹諸妙寶樹及諸樂器自然而出佛聲法聲及不退轉菩薩僧聲願求無上菩提之聲云某方某國有某菩薩發菩提心某方某國有某菩薩修行苦行難捨能捨乃至清淨一切智行某方某國有某菩薩往詣道場乃至某方某國有某如來作佛事已而般涅槃善男子假使有人以閻浮提一切草木抹為微塵此微塵數可知邊際我宮殿中寶多羅樹乃至樂器所説菩薩名如來名所發大願所修行等無有能得知其邊際善男子我等以聞佛聲法聲菩薩僧聲生大歡喜來詣其所時婆羅門即為我等如應説法令我及餘無量衆生於阿耨多羅三藐三菩提得不退轉復有無量欲界諸天於虗空中以妙供具恭敬供養唱如是言善男子此婆羅門五熱炙身時其火光明照阿鼻等一切地獄諸所受苦悉令休息我等見此火光明故心生淨信以信心故從彼命終生於天中為知恩故而來其所恭敬瞻仰無有厭足時婆羅門為我説法令無量衆生發菩提心爾時善財童子聞如是法心大歡喜於婆羅門所發起真實善知識心頭頂禮敬唱如是言我於大聖善知識所生不善心唯願聖者容我悔過時婆羅門即為善財而説頌言若有諸菩薩順善知識教一切無疑懼安住心不動當知如是人必獲廣大利坐菩提樹下成於無上竟爾時善財童子即登刀山自投火聚未至中間即得菩薩善住三昧才觸火𦦨又得菩薩寂靜樂神通三昧善財白言甚奇聖者如是刀山及大火聚我身觸時安隱快樂時婆羅門告善財言善男子我唯得此菩薩無盡輪解脫如諸菩薩摩訶薩大功德𦦨能燒一切衆生見惑令無有餘必不退轉無窮盡心無懈怠心無怯弱心發如金剛藏那羅延心疾修諸行無遲緩心願如風輪普持一切精進大誓皆無退轉而我云何能知能説彼功德行善男子於此南方有城名師子奮迅中有童女名曰慈行汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子頂禮其足繞無數匝辭退而去論第一正入當位法門中從爾時善財童子已下至我唯得此無盡輪解脫此一段經約分為二十五門一得無勝幢法光所照入諸佛不思議神力二念善知識教漸次南行三至長直聚落見彼勝熱修苦行四面火聚猶如大山四中有刀山高峻無極登彼山上投身入火五善財頂禮咨問所求六婆羅門令善財上其刀山投身入火七善財念言人身難得心有懷疑八十千梵天在虗空中勸喻此是金剛𦦨定光明九有十千諸魔在虗空中勸喻善財歎婆羅門德行十復有十千自在天王於虗空中告語善財不令生疑十一復有化樂天王亦在虗空歎婆羅門德十二復有十千兜率天王在空稱歎十三復有十千三十三天王在空稱歎十四十千龍十五十千夜叉十六十千乾闥婆王十七十千阿修羅王十八十千迦樓羅王十九十千緊那羅王二十有無量欲界諸天如是等十三種衆皆在空中稱歎婆羅門德勸喻善財不生疑惑二十一善財悔過二十二婆羅門為善財説頌二十三善財順教登其刀山入大火聚二十四善財入火聚時獲益二十五我唯得此菩薩無盡輪已下是推德升進如上婆羅門示行此行時隨諸衆生總見行門各自差別約表法中刀山是法王子住中力波羅蜜智慧為體成修行者達生死苦難但見法界性解脫須得無有怖畏方堪力用自在火𦦨是金剛智之光明亦名金剛三昧如上諸天已説伊那跋羅龍王此龍往因由破戒損其極臰樹遂頭上生此臰樹故以名之也難陀此云歡喜優婆者清信也明此龍聞法信樂歡喜故菩薩無盡輪解脫者意明法王子住得法師位以此一行隨諸衆生樂欲不同各見説法及行門無盡差別明稱衆生根圓滿故名無盡輪此是法王子住以力波羅蜜為主餘九為伴以約智門中以五位通治約位門中治説法不自在障令得自在同十地中第九地從此果行修行至第九善慧地功熟倣此十住中本果還以法界體普光明智為大用第二推德升進門中約分為四門一推德升進二示善知識處云南方有城名師子奮迅三舉善知識名云童女慈行四頂禮勝熱婆羅門足辭退而去南方義如前初位釋城名師子奮迅者是師子幢王所居之城其王是慈行女父表智自在為王大悲行遍為女明此從智生悲處生死染而與不染等明習氣盡故前第七住中休捨優婆夷明故存愛習用成悲門以未斷度衆生之愛習故號優婆夷以此成大慈悲之行滿八住中無功之智方成即明以從悲生智此位以從智生悲故即師子幢王女是童女也表此位任運利生無染習也音切釧尺絹切陂彼為切瞿求于切紺古暗切棕子紅切櫚力居切泛泛音擢直角切編必綿切鬟還音鬢必刃切楸七遊切枇傍脂切杷蒲巴切蒂帝音耐奴代切峻私閏切詐側駕切軟而兗切黨都朗切炙之石切緩乎管切庾以主切
