body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論世界成就品第四論今釋此品略作三門分別一釋品名目二釋品來意三隨文釋義一釋品名目者為明世界海依住形相苦樂淨穢皆是衆生自業果報之所莊嚴不從他有佛菩薩世界海依大願力依自體清淨法性力依諸波羅蜜諸行海等自體清淨力依為度衆生大慈悲智力以不思議變化力之所成就故名世界成就品二釋品來意者此品所來大意有五一答前世主三十七問佛海衆生海波羅蜜海等此品示業果報示法果報答前所問故明向前是佛光明神力答此品示其佛行海眼耳鼻舌波羅蜜海遍法界海衆生業行海故三十七問一時總答令大衆海悟佛所行入普賢菩薩所行也故號佛華嚴經二令諸現在未來始發菩提心者識佛所行及菩薩行海佛菩薩大慈悲海能普遍法界海衆生行業海而利益之令到究竟岸故既見是已而倣效之學佛行故令始發心者悲智圓滿行解不錯謬故三令始發心菩薩知衆生業報同異差別由心造故四令始發心者知衆生界廣大等法界虗空界如影相入重重無盡依住各別佛菩薩行悉充滿故五令始發心菩薩知諸佛菩薩境界海衆生境界一異不可得故隨衆生自業轉變剎海轉變故隨自業成壞剎海成壞故以衆因緣故此品須來發初蒙故若無比品初心菩薩云何知其如來攝生如來行門及以衆行業世界廣狹之相若不知者依何發心乘佛大悲普濟願行廣度以是義故如下頌云離諸諂誑心清淨常樂慈悲性歡喜志欲廣大深信人彼聞此法生欣悅安住普賢諸願地修行菩薩清淨道觀察法界虗空界此乃能知佛行處若不說衆生界法界佛界菩薩境界虗空界無二無盡如影重重依住者所有發心者設不入二乘道修菩薩行但得權教菩薩心常染淨而有限礙不入佛境界故有自佛他佛及以國剎分劑有往來所依處故如三乘中所說淨土在於他方菩薩願生其中是也說此品者意欲令初發菩提心者知衆生境界諸佛境界廣大之相重重無礙無盡之相佛及菩薩願行含覆利益纖塵無遺故此品須來三隨文釋義者此之一品有十一段經文從初一段長行一段偈頌是此品中序分後十段長行及十段偈頌是正說乃至華藏世界海總通此品為世界成就品總為正說分經爾時普賢菩薩摩訶薩以佛神力遍觀察一切世界海一切衆生海一切諸佛海一切法界海一切衆生業海一切衆生根欲海一切諸佛法輪海一切三世海一切如來願力海一切如來神變海如是觀察已普告一切道場衆海諸菩薩言佛子諸佛世尊知一切世界海成壞清淨智不可思議知一切衆生業海智不可思議知一切法界安立海智不可思議說一切無邊佛海智不可思議入一切欲解根海智不可思議一念普知一切三世智不可思議顯示一切如來無量願海智不可思議示現一切佛神變海智不可思議轉法輪智不可思議建立演說海不可思議清淨佛身不可思議無邊色相海普照明不可思議相及隨好皆清淨不可思議無邊色相光明輪海具足清淨不可思議種種色相光明雲海不可思議殊勝寶𦦨海不可思議成就言音海不可思議示現三種自在海調伏成熟一切衆生不可思議勇猛調伏諸衆生海無空過者不可思議安住佛地不可思議入如來境界不可思議威力護持不可思議觀察一切佛智所行不可思議諸力圓滿無能摧伏不可思議無畏功德無能過者不可思議住無差別三昧不可思議神通變化不可思議清淨自在智不可思議一切佛法無能毀壞不可思議如是等一切法我當承佛神力及一切如來威神力故具足宣說為令衆生入佛智慧海故為令一切菩薩於佛功德海中得安住故為令一切世界海一切佛自在所莊嚴故為令一切劫海中如來種性恆不斷故為令於一切世界海中顯示諸法真實性故為令隨一切衆生無量解海而演說故為令隨一切衆生諸根海方便令生諸佛法故為令隨一切衆生樂欲海摧破一切障礙山故為令隨一切衆生心行海令淨修治出要道故為令一切菩薩安住普賢願海中故是時普賢菩薩復欲令無量道場衆海生歡喜故令於一切法增長愛樂故令生廣大真實信解海故令淨治普門法界藏身故令安立普賢願海故令淨治入三世平等智眼故令增長普照一切世間藏大慧海故令生陀羅尼力持一切法輪故令於一切道場中盡佛境界悉開示故令開闡一切如來法門故令增長法界廣大甚深一切智性故即說頌言智慧甚深功德海普現十方無量國隨諸衆生所應見光明遍照轉法輪十方剎海叵思議佛無量劫皆嚴淨為化衆生使成熟出興一切諸國土佛境甚深難可思普示衆生令得入其心樂小著諸有不能通達佛所悟若有淨信堅固心常得親近善知識一切諸佛與其力此乃能入如來智離諸諂誑心清淨常樂慈悲性歡喜志欲廣大深信人彼聞此法生欣悅安住普賢諸願地修行菩薩清淨道觀察法界如虗空此乃能知佛行處此諸菩薩獲善利見佛一切神通力修餘道者莫能知普賢行人方得悟衆生廣大無有邊如來一切皆護念轉正法輪靡不至毗盧遮那境界力一切剎土入我身所住諸佛亦復然汝應觀我諸毛孔我今示汝佛境界普賢行願無邊際我已修行得具足普眼境界廣大身是佛所行應諦聽論從初序分中長科為六段一爾時已下四行半經是普賢觀察十海分二如是觀察已下可八行經明普賢告衆歎諸佛十種之智海十不可思議三建立演說海已下可六行經明普賢歎佛十種身業教化不可思議四從勇猛調伏諸衆生海無空過者已下七行經是普賢歎佛身智二業隨轉法輪成就之衆入佛之地十不可思議五如是等一切法已下十八行半經明普賢乘佛神力說佛智業身業教化饒益成就衆生海之德令多菩薩一切衆生入佛境界海故六明普賢說頌重明前法於此二十行頌中兩行為一頌於中意有二十總答前三十七問為頌含多義故一明佛智慧甚深二明佛身業隨根普應三明佛語業普周四明佛行多剎遍嚴五明諸佛大悲成熟衆生六明佛普現出興與益七明衆生根劣隨迷八明大心淨信堅固者堪為九明諸佛與力方知十明離諂慈悲志欲深廣能入十一明觀察法界如虗空而獲善利十二簡修餘道者不堪普賢行人得入十三明衆生界廣大法輪普至十四明普賢自示身廣大十五勸衆令觀毛孔十六明普賢示法與衆之益十七明普賢行願無邊十八明普賢自歎行具十九歎法眼智眼法身智身廣大二十歎是佛所行應諦聽此已上經文自具可知略科眉目如是第二正說分中有十段經經爾時普賢菩薩摩訶薩告諸大衆言諸佛子世界海有十種事過去現在未來諸佛已說現說當說何者為十所謂世界海起具因緣世界海所依住世界海形狀世界海體性世界海莊嚴世界海清淨世界海佛出興世界海劫住世界海劫轉變差別世界海無差別門諸佛子略說世界海有此十事若廣說者與世界海微塵數等過去現在未來諸佛已說現說當說諸佛子略說以十種因緣故一切世界海已成現成當成何者為十所謂如來神力故法應如是故一切衆生行業故一切菩薩成一切智所得故一切衆生及諸菩薩同集善根故一切菩薩嚴淨國土願力故一切菩薩成就不退行願故一切菩薩清淨勝解自在故一切如來善根所流及一切諸佛成道時自在勢力故普賢菩薩自在願力故諸佛子是為略說十種因緣若廣說者有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言所說無邊衆剎海毗盧遮那悉嚴淨世尊境界不思議智慧神通力如是菩薩修行諸願海普隨衆生心所欲衆生心行廣無邊菩薩國土遍十方菩薩趣於一切智勤修種種自在力無量願海普出生廣大剎土皆成就修諸行海無有邊入佛境界亦無量為淨十方諸國土一一土經無量劫衆生煩惱所擾濁分別欲樂非一相隨心造業不思議一切剎海斯成立佛子剎海莊嚴藏離垢光明寶所成斯由廣大信解心十方所住咸如是菩薩能修普賢行遊行法界微塵道塵中悉現無量剎清淨廣大如虗空等虗空界現神通悉詣道場諸佛所蓮華座上示衆相一一身包一切剎一念普現於三世一切剎海皆成立佛以方便悉入中此是毗盧所嚴淨論第一段中長行有十八行半經於中大意有六一明普賢告衆欲說其法二正說世界海有十事之法一切三世諸佛同敷三正舉世界形狀體性有十廣大無盡四正說世界已成現成當成具十種因緣五正說由如來神力法如是等如下十事因緣是也六承佛神力說頌於此十八行頌中重頌前長行之法明衆生界廣多佛菩薩悲願含覆故以行廣大故莊嚴國土廣大以衆生業無量故菩薩行無量以菩薩信心廣大離垢所住國剎光明寶成清淨無垢此明淨穢同居業現各異如文可知是故經云菩薩修行諸願海普隨衆生心所欲衆生心行廣無邊菩薩國土遍十方經爾時普賢菩薩復告大衆言諸佛子一一世界海有世界海微塵數所依住所謂或依一切莊嚴住或依虗空住或依一切寶光明住或依一切佛光明住或依一切寶色光明住或依一切佛音聲住或依如幻業生大力阿修羅形金剛手住或依一切世主身住或依一切菩薩身住或依普賢菩薩願所生一切差別莊嚴海住諸佛子世界海有如是等世界海微塵數所依住爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言遍滿十方虗空界所有一切諸國土如來神力之所加處處現前皆可見或有種種諸國土無非離垢寶所成清淨摩尼最殊妙熾然普現光明海或有清淨光明剎依止虗空界而住或在摩尼寶海中復有安住光明藏如來處此衆會海演說法輪皆巧妙諸佛境界廣無邊衆生見者心歡喜有以摩尼作嚴飾狀如華燈廣分布香𦦨光雲色熾然覆以妙寶光明網或有剎土無邊際安住蓮華深大海廣博清淨與世殊諸佛妙善莊嚴故或有剎海隨輪轉以佛威神得安住諸菩薩衆遍在中常見無央廣大寶或有住於金剛手或復有住天主身毗盧遮那無上尊常於此處轉法輪或依寶樹平均住香𦦨雲中亦復然或有依諸大水中有住堅固金剛海或有依止金剛幢或有住於華海中廣大神變無不周毗盧遮那此能現或修或短無量種其相旋環亦非一妙莊嚴藏與世殊清淨修治乃能見如是種種各差別一切皆依願海住或有國土常在空諸佛如雲悉充遍或有在空懸覆住或時而有或無有或有國土極清淨住於菩薩寶冠中十方諸佛大神通一切皆於此中見諸佛音聲咸遍滿斯由業力之所化或有國土周法界清淨離垢從心起如影如幻廣無邊如因陀網各差別或現種種莊嚴藏依止虗空而建立諸業境界不思議佛力顯示皆令見一一國土微塵內念念示現諸佛剎數皆無量等衆生普賢所作恆如是為欲成熟衆生故是中修行經劫海廣大神變靡不興法界之中悉周遍法界國土一一塵諸大剎海住其中佛雲平等悉彌覆於一切處咸充滿如一塵中自在用一切塵內亦復然諸佛菩薩大神通毗盧遮那悉能現一切廣大諸剎土如影如幻亦如𦦨十方不見所從生亦復無來無去處滅壞生成互循復於虗空中無暫已莫不皆由清淨願廣大業力之所持論第二段中爾時已下九行半經并四十四行頌明世界依住如文具明經爾時普賢菩薩復告大衆言諸佛子世界海有種種差別形相所謂或圓或方或非圓方無量差別或如水漩形或如山𦦨形或如樹形或如華形或如宮殿形或如衆生形或如佛形如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言諸國土海種種別種種莊嚴種種上殊形共美遍十方汝等咸應共觀察其狀或圓或有方或復三維及八隅摩尼輪狀蓮華等一切皆由業令異或有清淨𦦨莊嚴真金間錯多殊好門闥競開無擁滯斯由業廣意無雜剎海無邊差別藏譬如雲布在虗空寶輪布地妙莊嚴諸佛光明照耀中一切國土心分別種種光明而照現佛於如是剎海中各各示現神通力或有雜染或清淨受苦受樂各差別斯由業海不思議諸流轉法恆如是一毛孔內難思剎等微塵數種種住一一皆有遍照尊在衆會中宣妙法於一塵中大小剎種種差別如塵數平坦高下各不同佛悉往詣轉法輪一切塵中所現剎皆是本願神通力隨其心樂種種殊於虗空中悉能作一切國土所有塵一一塵中佛皆入普為衆生起神變毗盧遮那法如是論第三段中爾時已下有六行經并二十行頌明世界差別形由業如文具明經爾時普賢菩薩復告大衆言諸佛子應知世界海有種種體所謂或以一切寶莊嚴為體或以一寶種種莊嚴為體或以一切寶光明為體或以種種色光明為體或以一切莊嚴光明為體或以不可壞金剛為體或以佛力持為體或以妙寶相為體或以佛變化為體或以日摩尼輪為體或以極微細寶為體或以一切寶𦦨為體或以種種香為體或以一切寶華冠為體或以一切寶影像為體或以一切莊嚴所示現為體或以一念心普示現境界為體或以菩薩形寶為體或以寶華蘂為體或以佛言音為體爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言或有諸剎海妙寶所合成堅固不可壞安住寶蓮華或是淨光明出生不可知一切光莊嚴依止虗空住或淨光為體復依光明住光雲作嚴飾菩薩共遊處或有諸剎海從於願力生猶如影像住取說不可得或以摩尼成普放日藏光珠輪以嚴地菩薩悉充滿有剎寶𦦨成𦦨雲覆其上衆寶光殊妙皆由業所得或從妙相生衆相莊嚴地如冠共持戴斯由佛化起或從心海生隨心所解住如幻無處所一切是分別或以佛光明摩尼光為體諸佛於中現各起神通力或普賢菩薩化現諸剎海願力所莊嚴一切皆殊妙論第四段爾時已下有十三行經十行頌明世界體差別經爾時普賢菩薩復告大衆言諸佛子應知世界海有種種莊嚴所謂或以一切莊嚴具中出上妙雲莊嚴或以說一切菩薩功德莊嚴或以說一切衆生業報莊嚴或以示現一切菩薩願海莊嚴或以表示一切三世佛影像莊嚴或以一念頃示現無邊劫神通境界莊嚴或以出現一切佛身莊嚴或以出現一切寶香雲莊嚴或以示現一切道場中諸珍妙物光明照耀莊嚴或以示現一切普賢行願莊嚴如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言廣大剎海無有邊皆由清淨業所成種種莊嚴種種住一切十方皆遍滿無邊色相寶𦦨雲廣大莊嚴非一種十方剎海常出現普演妙音而說法菩薩無邊功德海種種大願所莊嚴此土俱時出妙音普震十方諸剎網衆生業海廣無量隨其感報各不同於一切處莊嚴中皆由諸佛能演說三世所有諸如來神通普現諸剎海一一事中一切佛如是嚴淨汝應觀過去未來現在劫十方一切諸國土於彼所有大莊嚴一一皆於剎中見一切事中無量佛數等衆生遍世間為令調伏起神通以此莊嚴國土海一切莊嚴吐妙雲種種華雲香𦦨雲摩尼寶雲常出現剎海以此為嚴飾十力所有成道處種種莊嚴皆具足流光布迥若彩雲於此剎海咸令見普賢願行諸佛子等衆生劫勤修習無邊國土悉莊嚴一切處中皆顯現論第五段爾時已下有十一行經二十行頌明世界莊嚴差別經爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數清淨方便海所謂諸菩薩親近一切善知識同善根故增長廣大功德雲遍法界故淨修廣大諸勝解故觀察一切菩薩境界而安住故修治一切諸波羅蜜悉圓滿故觀察一切菩薩諸地而入住故出生一切淨願海故修習一切出要行故入於一切莊嚴海故成就清淨方便力故如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言一切剎海諸莊嚴無數方便願力生一切剎海常光曜無量清淨業力起久遠親近善知識同修善業皆清淨慈悲廣大遍衆生以此莊嚴諸剎海一切法門三昧等禪定解脫方便地於諸佛所悉淨治以此出生諸剎海發生無量決定解能解如來等無異忍海方便已修治故能嚴淨無邊剎為利衆生修勝行福德廣大常增長譬如雲布等虗空一切剎海皆成就諸度無量等剎塵悉已修行令具足願波羅蜜無有盡清淨剎海從此生淨修無等一切法生起無邊出要行種種方便化羣生如是莊嚴國土海修習莊嚴方便地入佛功德法門海普使衆生竭苦源廣大淨剎皆成就力海廣大無與等普使衆生種善根供養一切諸如來國土無邊悉清淨論第六段爾時已下有十行經并二十行頌明所修行方便願力故出生諸世界海莊嚴故業清淨故莊嚴清淨業垢濁故莊嚴垢濁經爾時普賢菩薩復告大衆言諸佛子應知一一世界海有世界海微塵數佛出現差別所謂或現小身或現大身或現短壽或現長壽或唯嚴淨一佛國土或有嚴淨無量佛土或唯顯示一乘法輪或有顯示不可思議諸乘法輪或現調伏少分衆生或示調伏無邊衆生如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言諸佛種種方便門出興一切諸剎海皆隨衆生心所樂此是如來善權力諸佛法身不思議無色無形無影像能為衆生現衆相隨其心樂悉令見或為衆生現短壽或現住壽無量劫法身十方普現前隨宜出現於世間或有嚴淨不思議十方所有諸剎海或唯嚴淨一國土於一示現悉無餘或隨衆生心所樂示現難思種種乘或有唯宣一乘法一中方便現無量或有自然成正覺令少衆生住於道或有能於一念中開悟羣迷無有數或於毛孔出化雲示現無量無邊佛一切世間皆現覩種種方便度羣生或有言音普周遍隨其心樂而說法不可思議大劫中調伏無量衆生海或有無量莊嚴國衆會清淨儼然坐佛如雲布在其中十方剎海靡不充諸佛方便不思議隨衆生心悉現前普住種種莊嚴剎一切國土皆周遍論第七段爾時已下有八行經并二十行頌明諸世界諸佛出現差別依衆生業行壽命修短佛出現不同經爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數劫住所謂或有阿僧祇劫住或有無量劫住或有無邊劫住或有無等劫住或有不可數劫住或有不可稱劫住或有不可思劫住或有不可量劫住或有不可說劫住如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言世界海中種種劫廣大方便所莊嚴十方國土咸觀見數量差別悉明了我見十方世界海劫數無量等衆生或長或短或無邊以佛音聲今演說我見十方諸剎海或住國土微塵劫或有一劫或無數以願種種各不同或有純淨或純染或復染淨二俱雜願海安立種種殊住於衆生心想中往昔修行剎塵劫獲大清淨世界海諸佛境界具莊嚴永住無邊廣大劫有名種種寶光明或名等音𦦨眼藏離塵光明及賢劫此清淨劫攝一切有清淨劫一佛興或一劫中無量現無盡方便大願力入於一切種種劫或無量劫入一劫或復一劫入多劫一切劫海種種門十方國土皆明現或一切劫莊嚴事於一劫中皆現覩或一劫內所莊嚴普入一切無邊劫始從一念終成劫悉依衆生心想生一切剎海劫無邊以一方便皆清淨論第八段爾時已下有七行經并二十行頌明世界劫住不同由業經爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數劫轉變差別所謂法如是故世界海無量成壞劫轉變染汙衆生住故世界海成染汙劫轉變修廣大福衆生住故世界海成染淨劫轉變信解菩薩住故世界海成染淨劫轉變無量衆生發菩提心故世界海純清淨劫轉變諸菩薩各各遊諸世界故世界海無邊莊嚴劫轉變十方一切世界海諸菩薩雲集故世界海無量大莊嚴劫轉變諸佛世尊入涅槃故世界海莊嚴滅劫轉變諸佛出現於世故一切世界海廣博嚴淨劫轉變如來神通變化故世界海普清淨劫轉變如是等有世界海微塵數爾時普賢菩薩欲重宣其義承佛威力觀察十方而說頌言一切諸國土皆隨業力生汝等應觀察轉變相如是染汙諸衆生業惑纏可怖彼心令剎海一切成染汙若有清淨心修諸福德行彼心令剎海雜染及清淨信解諸菩薩於彼劫中生隨其心所有雜染清淨者無量諸衆生悉發菩提心彼心令剎海住劫恆清淨無量億菩薩往詣於十方莊嚴所有殊劫中差別見一一微塵內佛剎如塵數菩薩共雲集國土皆清淨世尊入涅槃彼土莊嚴滅衆生無法器世界成雜染若有佛興世一切悉珍好隨其心清淨莊嚴皆具足諸佛神通力示現不思議是時諸剎海一切普清淨論第九段爾時已下有十四行經并十行頌明劫隨業轉變淨穢經爾時普賢菩薩復告大衆言諸佛子應知世界海有世界海微塵數無差別所謂一一世界海中有世界海微塵數世界無差別一一世界海中諸佛出現所有威力無差別一一世界海中一切道場遍十方法界無差別一一世界海中一切如來道場衆會無差別一一世界海中一切佛光明遍法界無差別一一世界海中一切佛變化名號無差別一一世界海中一切佛音聲普遍世界海無邊劫住無差別一一世界海中法輪方便無差別一一世界海中一切世界海普入一塵無差別一一世界海中一一微塵一切三世諸佛世尊廣大境界皆於中現無差別諸佛子世界海無差別略說如是若廣說者有世界海微塵數無差別爾時普賢菩薩欲重宣其義承佛神力觀察十方而說頌言一微塵中多剎海處所各別悉嚴淨如是無量入一中一一區分無雜越一一塵內難思佛隨衆生心普現前一切剎海靡不周如是方便無差別一一塵中諸樹王種種莊嚴悉垂布十方國土皆同現如是一切無差別一一塵內微塵衆悉共圍繞人中主出過一切遍世間亦不迫隘相雜亂一一塵中無量光普遍十方諸國土悉現諸佛菩提行一切剎海無差別一一塵中無量身變化如雲普周遍以佛神通導羣品十方國土亦無別一一塵中說衆法其法清淨如輪轉種種方便自在門一切皆演無差別一塵普演諸佛音充滿法器諸衆生遍住剎海無央劫如是音聲亦無異剎海無量妙莊嚴於一塵中無不入如是諸佛神通力一切皆由業性起一一塵中三世佛隨其所樂悉令見體性無來亦無去以願力故遍世間論第十爾時已下有十五行半經二十行頌明一切世界海如來出現無差別一一如文具明此之一品答前三十七問意令現在未來發菩提心者識佛所行衆生業海無際如來以普賢行普濟以法性理智無礙從初發心與大願雲悲智普覆以波羅蜜海無剎不現其身無行不同其事塵毫內剎影現重重平等智身莫不隨入以法界之體而無往來法常如是令學者倣之趣求不謬此乃如大王路法爾常然更有異求偏僻不當也音切諂丑琰切誑居況切擾如沼切央於良切懸胡涓切覆方木切循巡音隅牛俱切擁於拱切戴帶音儼魚險切斆胡教切錯倉各切狹胡夾切劑在計切隘於芥切僻普擊切
