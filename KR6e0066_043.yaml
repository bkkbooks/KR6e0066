body:
  text: 唐于闐國三藏沙門實叉難陀譯經唐太原方山長者李通玄造論唐福州開元寺沙門志寧釐經合論十回向品第二十五之二經佛子菩薩摩訶薩回向有幾種佛子菩薩摩訶薩回向有十種三世諸佛咸共演說何等為十一者救護一切衆生離衆生相回向二者不壞回向三者等一切諸佛回向四者至一切處回向五者無盡功德藏回向六者入一切平等善根回向七者等隨順一切衆生回向八者真如相回向九者無縛無著解脫回向十者入法界無量回向佛子是為菩薩摩訶薩十種回向過去未來現在諸佛已說當說今說論第二佛子菩薩摩訶薩已下至過去未來現在諸佛已說當說今說有九行半經是正舉十回向之名目分自此已下佛子云何為菩薩摩訶薩已下至第三十三卷內至皆得清淨到於彼岸總有十卷經明正說十回向隨十波羅蜜進修行門分已上十箇回向一箇是一箇波羅蜜行都共為十段科至後隨當位分中方釋第三正說十回向隨十波羅蜜進修分中從佛子是為菩薩摩訶薩十種回向已下至云何為菩薩摩訶薩救護一切衆生離衆生相回向於此一段中有二義一科其當段經意二隨文解說此十箇回向中長科有一百八十段經文一科其當段經意者於此救護一切衆生離衆生相回向段中長科為十段經佛子云何為菩薩摩訶薩救護一切衆生離衆生相回向佛子此菩薩摩訶薩行檀波羅蜜淨尸波羅蜜修羼提波羅蜜起精進波羅蜜入禪波羅蜜住般若波羅蜜大慈大悲大喜大捨修如是等無量善根論第一佛子云何為菩薩摩訶薩救護一切衆生相回向已下至如是等無量善根可五行經明修六波羅蜜四無量心成就初回向分第二隨文釋義云何行檀波羅蜜淨戒波羅蜜以能捨惡法戒體自淨故云何修忍波羅蜜施戒已成當修忍力為施體能捨故與戒體為淨因忍體須加行修學為忍防他凌辱非由己自捨故須如行學忍云何起精進波羅蜜以忍體是自息其忿恨非是欣修利物之行故須起利物之行是此位精進義云何起精進波羅蜜入禪波羅蜜以精進勤行利物之行恐多散動相應故須入禪波羅蜜云何住般若波羅蜜以禪能發生淨慧故云何大慈大悲大喜大捨為六波羅蜜是出世心多故加以慈悲喜捨利衆生法均調諸行故此以上六度四無量心使令均平智悲得所成此初回向門此回向法門從十信十住十行總具有之至此本位方令齊等若以解行門中有此差降若以理智門中總無前後始終之法已下當位有十度調治之法如下文中具明不煩更釋但如文以行行之云何但以六波羅蜜為利生行為明大悲門中但令衆生出世間故然後方令入生死中經修善根時作是念言願此善根普能饒益一切衆生皆使清淨至於究竟永離地獄餓鬼畜生閻羅王等無量苦惱菩薩摩訶薩種善根時以己善根如是回向我當為一切衆生作舍令免一切諸苦事故為一切衆生作護悉令解脫諸煩惱故為一切衆生作歸皆令得離諸怖畏故為一切衆生作趣令得至於一切智故為一切衆生作安令得究竟安隱處故為一切衆生作明令得智光滅癡暗故為一切衆生作炬破彼一切無明暗故為一切衆生作燈令住究竟清淨處故為一切衆生作導師引其令入真實法故為一切衆生作大導師與其無礙大智慧故佛子菩薩摩訶薩以諸善根如是回向平等饒益一切衆生究竟皆令得一切智論第二修善根時已下至皆令得一切智有十四行半經明起願念度衆生分經佛子菩薩摩訶薩於非親友守護回向與其親友等無差別何以故菩薩摩訶薩入一切法平等性故不於衆生而起一念非親友想設有衆生於菩薩所起怨害心菩薩亦以慈眼視之終無恚怒普為衆生作善知識演說正法令其修習譬如大海一切衆毒不能變壞菩薩亦爾一切愚蒙無有智慧不知恩德瞋很頑毒憍慢自大其心盲瞽不識善法如是等類諸惡衆生種種逼惱無能動亂譬如日天子出現世間不以生盲不見故隱而不現又復不以乾闥婆城阿修羅手閻浮提樹崇巖𨗉谷塵霧煙雲如是等物之所覆障故隱而不現亦復不以時節變改故隱而不現菩薩摩訶薩亦復如是有大福德其心深廣正念觀察無有退屈為欲究竟功德智慧於上勝法心生志欲法光普照見一切義於諸法門智慧自在常為利益一切衆生而修善法曾不誤起捨衆生心不以衆生其性弊惡邪見瞋濁難可調伏便即棄捨不修回向但以菩薩大願甲胄而自莊嚴救護衆生恆無退轉不以衆生不知報恩退菩薩行捨菩提道不以凡愚共同一處捨離一切如實善根不以衆生數起過惡難可忍受而於彼所生疲厭心何以故譬如日天子不但為一事故出現世間菩薩摩訶薩亦復如是不但為一衆生故修諸善根回向阿耨多羅三藐三菩提普為救護一切衆生故而修善根回向阿耨多羅三藐三菩提如是不但為淨一佛剎故不但為信一佛故不但為見一佛故不但為了一法故起大智願回向阿耨多羅三藐三菩提為普淨一切佛剎故普信一切諸佛故普承事供養一切諸佛故普解一切佛法故發起大願修諸善根回向阿耨多羅三藐三菩提論第三佛子菩薩摩訶薩已下至阿耨多羅三藐三菩提有三十三行半經明親疏善惡平等分經佛子菩薩摩訶薩以諸佛法而為所緣起廣大心不退轉心無量劫中修集希有難得心寶與一切諸佛悉皆平等菩薩如是觀諸善根信心清淨大悲堅固以甚深心歡喜心清淨心最勝心柔耎心慈悲心憐愍心攝護心利益心安樂心普為衆生真實回向非但口言佛子菩薩摩訶薩以諸善根回向之時作是念言以我善根願一切趣生一切衆生皆得清淨功德圓滿不可沮壞無有窮盡常得尊重正念不忘獲決定慧具無量智身口意業一切功德圓滿莊嚴又作是念以此善根令一切衆生承事供養一切諸佛無空過者於諸佛所淨信不壞聽聞正法斷諸疑惑憶持不忘如說修行於如來所起恭敬心身業清淨安住無量廣大善根永離貧窮七財滿足於諸佛所常隨修學成就無量勝妙善根平等悟解住一切智以無礙眼等視衆生衆相嚴身無有玷缺言音淨妙功德圓滿諸根調伏十力成就善心滿足無所依住令一切衆生普得佛樂得無量住住佛所住論第四佛子菩薩摩訶薩已下至住佛所住有二十行經明以諸佛法而為勝緣深植自善根願與衆生分經佛子菩薩摩訶薩見諸衆生造作惡業受諸重苦以是障故不見佛不聞法不識僧便作是念我當於彼諸惡道中代諸衆生受種種苦令其解脫菩薩如是受苦毒時轉更精勤不捨不避不驚不怖不退不怯無有疲厭何以故如其所願決欲荷負一切衆生令解脫故菩薩爾時作是念言一切衆生在生老病死諸苦難處隨業流轉邪見無智喪諸善法我應救之令得出離又諸衆生愛網所纏癡蓋所覆染著諸有隨逐不捨入苦籠檻作魔業行福智都盡常懷疑惑不見安隱處不知出離道在於生死輪轉不息諸苦淤泥恆所沒溺菩薩見已起大悲心大饒益心欲令衆生悉得解脫以一切善根回向以廣大心回向如三世菩薩所修回向如大回向經所說回向願諸衆生普得清淨究竟成就一切種智復作是念我所修行欲令衆生皆悉得成無上智王不為自身而求解脫但為救濟一切衆生令其咸得一切智心度生死流解脫衆苦復作是念我當普為一切衆生備受衆苦令其得出無量生死衆苦大壑我當普為一切衆生於一切世界一切惡趣中盡未來劫受一切苦然常為衆生勤修善根何以故我寧獨受如是衆苦不令衆生墮於地獄我當於彼地獄畜生閻羅王等險難之處以身為質救贖一切惡道衆生令得解脫復作是念我願保護一切衆生終不棄捨所言誠實無有虗妄何以故我為救度一切衆生發菩提心不為自身求無上道亦不為求五欲境界及三有中種種樂故修菩提行何以故世間之樂無非是苦衆魔境界愚人所貪諸佛所阿一切苦患因之而起地獄餓鬼及以畜生閻羅王處忿恚鬬訟更相毀辱如是諸惡皆因貪著五欲所致耽著五欲遠離諸佛障礙生天何況得於阿耨多羅三藐三菩提菩薩如是觀諸世間貪少欲味受無量苦終不為彼五欲樂故求無上菩提修菩薩行但為安樂一切衆生發心修習成滿大願斷截衆生諸苦罥索令得解脫論第五佛子菩薩摩訶薩已下至令得解脫有三十八行半經明菩薩入於惡道代諸衆生受苦令諸衆生得樂分經佛子菩薩摩訶薩復作是念我當以善根如是回向令一切衆生得究竟樂利益樂不受樂寂靜樂無依樂無動樂無量樂不捨不退樂不滅樂一切智樂復作是念我當與一切衆生作調御師作主兵臣執大智炬示安隱道令離險難以善方便俾知實義又於生死海作一切智善巧船師度諸衆生使到彼岸論第六佛子菩薩摩訶薩復作是念已下至使到彼岸有七行經明菩薩以自善根令諸衆生得十種究竟樂分經佛子菩薩摩訶薩以諸善根如是回向所謂隨宜救護一切衆生令出生死承事供養一切諸佛得無障礙一切智智捨離衆魔遠惡知識親近一切菩薩善友滅諸過罪成就淨業具足菩薩廣大行願無量善根論第七佛子菩薩摩訶薩已下至無量善根有五行經明菩薩隨宜救護衆生得出生死供養諸佛親近善友分經佛子菩薩摩訶薩以諸善根正回向已作如是念不以四天下衆生多故多日出現但一日出悉能普照一切衆生又諸衆生不以自身光明故知有晝夜遊行觀察興造諸業皆由日天子出成辦斯事然彼日輪但一無二菩薩摩訶薩亦復如是修集善根回向之時作是念言彼諸衆生不能自救何能救他唯我一人志獨無侶修集善根如是回向所謂為欲廣度一切衆生故普照一切衆生故示導一切衆生故開悟一切衆生故顧復一切衆生故攝受一切衆生故成就一切衆生故令一切衆生歡喜故令一切衆生悅樂故令一切衆生斷疑故論第八佛子已下至令一切衆生斷疑故有十二行半經明菩薩大願衆生雖多不假多聖唯我一人獨能度盡分經佛子菩薩摩訶薩復作是念我應如日普照一切不求恩報衆生有惡悉能容受終不以此而捨誓願不以一衆生惡故捨一切衆生但勤修習善根回向普令衆生皆得安樂善根雖少普攝衆生以歡喜心廣大回向若有善根不欲饒益一切衆生不名回向隨一善根普以衆生而為所緣乃名回向安置衆生於無所著法性回向見衆生自性不動不轉回向於回向無所依無所取回向不取善根相回向不分別業報體性回向不著五蘊相回向不壞五蘊相回向不取業回向不求報回向不染著因緣回向不分別因緣所起回向不著名稱回向不著處所回向不著虗妄法回向不著衆生相世界相心意相回向不起心顛倒想顛倒見顛倒回向不著語言道回向觀一切法真實性回向觀一切衆生平等相回向以法界印印諸善根回向觀諸法離貪欲回向解一切法無種植善根亦如是觀諸法無二無生無滅回向亦如是以如是等善根回向修行清淨對治之法所有善根皆悉隨順出世間法不作二相非即業修習一切智非離業回向一切智一切智非即是業然不離業得一切智以業如光影清淨故報亦如光影清淨報如光影清淨故一切智智亦如光影清淨離我我所一切動亂思惟分別如是了知以諸善根方便回向菩薩如是回向之時度脫衆生常無休息不住法相雖知諸法無業無報善能出生一切業報而無違諍如是方便善修回向菩薩摩訶薩如是回向時離一切過諸佛所讚佛子是為菩薩摩訶薩第一救護一切衆生離衆生相回向論第九佛子已下至救護一切衆生離衆生相回向有三十一行經明菩薩如日普照不求恩報不著衆生法回向分經爾時金剛幢菩薩觀察十方一切衆會暨于法界入深句義以無量心修習勝行大悲普覆一切衆生不斷三世諸如來種入一切佛功德法藏出生一切諸佛法身善能分別諸衆生心知其所種善根成熟住於法身而為示現清淨色身承佛神力即說頌言論第十爾時已下至說頌有五行半經明金剛幢菩薩觀衆說頌分經不思議劫修行道精進堅固心無礙為欲饒益羣生類常求諸佛功德法調御世間無等人修治其意甚明潔發心普救諸含識彼能善入回向藏勇猛精進力具足智慧聰達意清淨普救一切諸羣生其心堪忍不傾動心善安住無與等意常清淨大歡悅如是為物勤修行譬如大地普容受不為自身求快樂但欲救護諸衆生如是發起大悲心疾得入於無礙地十方一切諸世界所有衆生皆攝受為救彼故善住心如是修學諸回向修行布施大欣悅護持淨戒無所犯勇猛精進心不動回向如來一切智其心廣大無邊際忍力安住不傾動禪定甚深恆照了智慧微妙難思議十方一切世界中具足修治清淨行如是功德皆回向為欲安樂諸含識大士勤修諸善業無量無邊不可數如是悉以益衆生令住難思無上智普為一切衆生故不思議劫處地獄如是曾無厭退心勇猛決定常回向不求色聲香與味亦不希求諸妙觸但為救度諸羣生常求無上最勝智智慧清淨如虗空修習無邊大士行如佛所行諸行法彼人如是常修學大士遊行諸世界悉能安隱諸羣生普使一切皆歡喜修菩薩行無厭足除滅一切諸心毒思惟修習最上智不為自己求安樂但願衆生得離苦此人回向得究竟心常清淨離衆毒三世如來所付囑住於無上大法城未曾染著於諸色受想行識亦如是其心永出於三有所有功德盡回向佛所知見諸衆生盡皆攝取無有餘誓願皆令得解脫為彼修行大歡喜其心念念恆安住智慧廣大無與等離癡正念常寂然一切諸業皆清淨彼諸菩薩處於世不著內外一切法如風無礙行於空大士用心亦復然所有身業皆清淨一切語言無過失心常歸向於如來能令諸佛悉歡喜十方無量諸國土所有佛處皆往詣於中覩見大悲尊靡不恭敬而瞻奉心常清淨離諸失普入世間無所畏已住如來無上道復為三有大法池精勤觀察一切法隨順思惟有非有如是趣於真實理得入甚深無諍處以此修成堅固道一切衆生莫能壞善能了達諸法性普於三世無所著如是回向到彼岸普使羣生離衆垢永離一切諸所依得入究竟無依處一切衆生語言道隨其種類各差別菩薩悉能分別說而心無著無所礙菩薩如是修回向功德方便不可說能令十方世界中一切諸佛皆稱歎論已下頌中有五十六行頌頌此救護衆生離衆生相回向此一段中明菩薩所行之行均調得所兩行一頌如文自具得意以行行之第二隨文解釋者何故名為救護一切衆生離衆生相回向釋此名目有二義一明隨位修行次第之法二明本位名號一明隨位修行次第之法者如十住中於初發心住求一切智此菩薩所緣十種難得法而發於心所謂處非處等十種如來智力而發於心生佛家為佛真子如十行之中行歡喜行為大施主凡所有物悉能惠施無有悔吝行菩薩行以為所緣如此十回向中初回向名救護衆生離衆生相者即以六波羅蜜四無量心以為所緣明即以十住十行所得大智法身無著淨行起廣大願行處於生死以六波羅蜜以為行首慈悲喜捨以為處生死利物之緣是故即名為救護衆生離衆生相回向即以慈悲喜捨為救護以六波羅蜜出世間法為離衆生相故為六度行門是出世行故是故如是安立次第總在十住初發心位一時總具只為紙素竹帛名言次第遂生分段非是法有前後義故如十住位中善財童子表法之中海門國觀大海具有阿修羅等十王供養等是回向義然教門次第升進不可不存若不如斯使後學之流行沉淪而不進二明本位之名者又以大智法身以為離體十波羅蜜四無量心以為處生死救護衆生所緣是故名救護衆生離衆生相回向以智體無依所救護者無性衆生無相正為救護而無作者故衆生自真無出沒故名救護衆生離衆生相回向成此初回向法門具足五緣一具自了法身本自清淨解脫緣二得大智慧解脫緣三具大願力奉事諸佛利衆生緣四十波羅蜜具足勝行緣五慈悲喜捨一切衆生緣具此五法方能成就此初回向此之一段以檀波羅蜜為主九波羅蜜為伴善財以鬻香長者號青蓮華表所行行之人以名下義思之可解於中所行法則鬻香長者賣香人也能辨諸香和合諸香賣鬻與人用表此位之行前已釋竟第二不壞回向以戒波羅蜜為體餘九為伴善財以船師號婆施羅為表行行之人此云自在住樓閣城城門外海岸上住修大悲幢行法門明此回向位中以大悲為戒體視一切生死之海令得一切大智之海居生死海而得自在故名自在廣說如經又表戒體如海性淨不宿死尸明法身本淨不宿煩惱染淨死尸也廣義如文經云佛子云何為菩薩摩訶薩不壞回向者於此一段經文義分為二一長科此一段經意二隨文解說第一長科此一段經意者自佛子已下至說頌已來總科為六段經佛子云何為菩薩摩訶薩不壞回向佛子此菩薩摩訶薩於去來今諸如來所得不壞信悉能承事一切佛故於諸菩薩乃至初發一念之心求一切智得不壞信誓修一切菩薩善根無疲厭故於一切佛法得不壞信發深志樂故於一切佛教得不壞信守護住持故於一切衆生得不壞信慈眼等觀善根回向普利益故於一切白淨法得不壞信普集無邊諸善根故於一切菩薩回向道得不壞信滿足殊勝諸欲解故於一切菩薩法師得不壞信於諸菩薩起佛想故於一切佛自在神通得不壞信深信諸佛難思議故於一切菩薩善巧方便行得不壞信攝取種種無量無數行境界故論一佛子已下至無量無數行境界故有十三行半經明菩薩得信不壞分經佛子菩薩摩訶薩如是安住不壞信時於諸菩薩聲聞獨覺若諸佛教若諸衆生如是等種種境界中種諸善根無量無邊令菩提心轉更增長慈悲廣大平等觀察隨順修學諸佛所作攝取一切清淨善根入真實義集福德行行大惠施修諸功德等觀三世菩薩摩訶薩以如是等善根功德回向一切智願常見諸佛親近善友與諸菩薩同共止住念一切智心無暫捨受持佛教勤加守護教化成熟一切衆生心常回向出世之道供養瞻侍一切法師解了諸法憶持不忘修行大願悉使滿足論二佛子已下至大願悉使滿足有十一行經明菩薩住持教化衆生分經菩薩如是積集善根成就善根增長善根思惟善根繫念善根分別善根愛樂善根修習善根安住善根菩薩摩訶薩如是積集諸善根已以此善根所得依果修菩薩行於念念中見無量佛如其所應承事供養以阿僧祇寶阿僧祇華阿僧祇鬘阿僧祇衣阿僧祇蓋阿僧祇幢阿僧祇幡阿僧祇莊嚴具阿僧祇給侍阿僧祇塗飾地阿僧祇塗香阿僧祇粖香阿僧祇和香阿僧祇燒香阿僧祇深信阿僧祇愛樂阿僧祇淨心阿僧祇尊重阿僧祇讚歎阿僧祇禮敬阿僧祇寶座阿僧祇華座阿僧祇香座阿僧祇鬘座阿僧祇栴檀座阿僧祇衣座阿僧祇金剛座阿僧祇摩尼座阿僧祇寶繒座阿僧祇寶色座阿僧祇寶經行處阿僧祇華經行處阿僧祇香經行處阿僧祇鬘經行處阿僧祇衣經行處阿僧祇寶間錯經行處阿僧祇一切寶繒綵經行處阿僧祇一切寶多羅樹經行處阿僧祇一切寶欄楯經行處阿僧祇一切寶鈴網彌覆經行處阿僧祇一切寶宮殿阿僧祇一切華宮殿阿僧祇一切香宮殿阿僧祇一切鬘宮殿阿僧祇一切栴檀宮殿阿僧祇一切堅固妙香藏宮殿阿僧祇一切金剛宮殿阿僧祇一切摩尼宮殿皆悉殊妙出過諸天阿僧祇諸雜寶樹阿僧祇種種香樹阿僧祇諸寶衣樹阿僧祇諸音樂樹阿僧祇寶莊嚴具樹阿僧祇妙音聲樹阿僧祇無厭寶樹阿僧祇寶繒綵樹阿僧祇寶璫樹阿僧祇一切華香幢幡鬘蓋所嚴飾樹如是等樹扶疏蔭映莊嚴宮殿其諸宮殿復有阿僧祇軒檻莊嚴阿僧祇窗牖莊嚴阿僧祇門闥莊嚴阿僧祇樓閣莊嚴阿僧祇半月莊嚴阿僧祇帳莊嚴阿僧祇金網彌覆其上阿僧祇香周匝普熏阿僧祇衣敷布其地論三菩薩如是已下至阿僧祇衣敷布其地有三十三行經明舉依果報嚴分釋義云如是阿僧祇寶是本行中以法利生依果也阿僧祇華者是以行能利自他開敷衆善之依果阿僧祇鬘是忍所報也阿僧祇衣從慚愧生也阿僧祇蓋大慈悲所生也阿僧祇幡回向心所生也阿僧祇幢是隨行不退力所生也阿僧祇莊嚴具諸助道法所生也阿僧祇侍從謙敬離慢所生也阿僧祇塗飾地從戒品生也阿僧祇塗香以戒遍諸法生也阿僧祇粖香以往昔散華香報所生大綱以行知果如影隨形一一相餘准物類以義解之可解亦以音曾以如是物供養佛法僧獲得斯果故餘准此知之經佛子菩薩摩訶薩以如是等諸供養具於無量無數不可說不可說劫淨心尊重恭敬供養一切諸佛恆不退轉無有休息一一如來滅度之後所有舍利悉亦如是恭敬供養為令一切衆生生淨信故一切衆生攝善根故一切衆生離諸苦故一切衆生廣大解故一切衆生以大莊嚴而莊嚴故無量莊嚴而莊嚴故諸有所作得究竟故知諸佛興難可植故滿足如來無量力故莊嚴供養佛塔廟故住持一切諸佛法故如是供養現在諸佛及滅度後所有舍利其諸供養於阿僧祇劫說不可盡如是修集無量功德皆為成熟一切衆生無有退轉無有休息無有疲厭無有執著離諸心想無有依止永絶所依遠離於我及以我所如實法印印諸業門得法無生住無所住觀無生性印諸境界諸佛護念發心回向與諸法性相應回向入無作法成就所作方便回向捨離一切諸事想著方便回向住於無量善巧回向永出一切諸有回向修行諸行不住於相善巧回向普攝一切善根回向普淨一切菩薩諸行廣大回向發無上菩提心回向與一切善根同住回向滿足最上信解心回向論四佛子已下至最上信解心回向有二十二行半經明菩薩以如上依果所有莊嚴供養諸佛皆為度脫衆生分經佛子菩薩摩訶薩以諸善根如是回向時雖隨生死而不改變求一切智未曾退轉在於諸有心無動亂悉能度脫一切衆生不染有為法不失無礙智菩薩行位因緣無盡世間諸法無能變動具足清淨諸波羅蜜悉能成就一切智力菩薩如是離諸癡暗成菩提心開示光明增長淨法回向勝道具足衆行以清淨意善能分別了一切法悉隨心現知業如幻業報如像諸行如化因緣生法悉皆如響菩薩諸行一切如彰出生無著清淨法眼見於無作廣大境界證寂滅性了法無二得法實相具菩薩行於一切相皆無所著善能修行同事諸業於白淨法恆無廢捨離一切著住無著行菩薩如是善巧思惟無有迷惑不違諸法不壞業因明見真實善巧回向知法自性以方便力成就業報到於彼岸智慧觀察一切諸法獲神通智諸業善根無作而行隨心自在菩薩摩訶薩以諸善根如是回向為欲度脫一切衆生不斷佛種永離魔業見一切智無有邊際信樂不捨離世境界斷諸雜染亦願衆生得清淨智入深方便出生死法獲佛善根永斷一切諸魔事業以平等印普印諸業發心趣入一切種智成就一切出世間法佛子是為菩薩摩訶薩第二不壞回向論五佛子已下至第二不壞回向有二十四行經明菩薩能隨生死度脫衆生同事諸業求一切智白淨等法恆不捨分經菩薩摩訶薩住此回向時得見一切無數諸佛成就無量清淨妙法普於衆生得平等心於一切法無有疑惑一切諸佛神力所加降伏衆魔永離其業成就生貴滿菩提心得無礙智不由他解善能開闡一切法義能隨想力入一切剎普照衆生悉使清淨菩薩摩訶薩以此不壞回向之力攝諸善根如是回向爾時金剛幢菩薩承佛神力觀察十方即說頌言論六菩薩摩訶薩已下至說頌有八行經明菩薩得於諸佛妙法斷疑如聞自達能隨想力入一切剎普照衆生分經菩薩已得不壞意修行一切諸善業是故能令佛歡喜智者以此而回向供養無量無邊佛布施持戒伏諸根為欲利益諸衆生普使一切皆清淨一切上妙諸香華無量差別勝衣服寶蓋及以莊嚴具供養一切諸如來如是供養於諸佛無量無數難思劫恭敬尊重常歡喜未曾一念生疲厭專心想念於諸佛一切世間大明燈十方所有諸如來靡不現前如目覩不可思議無量劫種種布施心無厭百千萬億衆劫中修諸善法悉如是彼諸如來滅度已供養舍利無厭足悉以種種妙莊嚴建立難思衆塔廟造立無等最勝形寶藏淨金為莊嚴巍巍高大如山王其數無量百千億淨心尊重供養已復生歡喜利益意不思議劫處世間救護衆生令解脫了知衆生皆妄想於彼一切無分別而能善別衆生根普為羣生作饒益菩薩修集諸巧德廣大最勝無與比了達體性悉非有如是決定皆回向以最勝智觀諸法其中無有一法生如是方便修回向功德無量不可盡以是方便令心淨悉與一切如來等此方便力不可盡是故福報無盡極發起無上菩提心一切世間無所依普至十方諸世界而於一切無所礙一切如來出世間為欲啓導衆生心如其心性而觀察畢竟推求不可得一切諸法無有餘悉入於如無體性以是淨眼而回向開彼世間生死獄雖令諸有悉清淨亦不分別於諸有知諸有性無所有而令歡喜意清淨於一佛土無所依一切佛土悉如是亦不染著有為法知彼法性無依處以是修成一切智以是無上智莊嚴以是諸佛皆歡喜是為菩薩回向業菩薩專心念諸佛無上智慧巧方便如佛一切無所依願我修成此功德專心救護於一切令其遠離衆惡業如是饒益諸羣生繫念思惟未曾捨住於智地守護法不以餘乘取涅槃唯願得佛無上道菩薩如是善回向不取衆生所言說一切有為虗妄事雖復不依言語道亦復不著無言說十方所有諸如來了達諸法無有餘雖知一切皆空寂而不於空起心念以一莊嚴嚴一切亦不於法生分別如是開悟諸羣生一切無性無所觀論已上頌有五十行兩行一頌皆頌當位之中回向所行之行如文自具不煩更釋如文行之第二隨文解義者云何為不壞回向雖隨生死海不壞法身雖隨分別而不壞無作雖隨諸見而不壞法眼雖隨諸行而不壞菩提心雖教化成熟衆生皆至佛果不壞身心無依住門雖隨一切衆生知根同事而不壞戒體恆自白淨是故名為不壞回向又一切世間出世間法無成壞體此回向體如經云如實法印印諸業門得法無生住佛所住觀無生性印諸境界諸佛護念發心回向與諸法性相應回向入無作法成就所作方便回向此是不壞回向之大體也智不壞生死不壞大願不壞大悲不壞皆如實故如十住位以離染大悲為戒體即以海門國海雲比丘為所表十行位中即以工巧笇術以為戒體即以釋天童子於河渚中笇印法以為所表為明行為河流歸海故十回向中以處俗大悲為戒體即以海師自在為所表音切羼初限切沮在預切狠乎墾切頑五還切盲莫耕切瞽古音巖五咸切邃雖遂切霧亡遇切憋并列切胄直救切玷丁念切籠力紅切檻戶減切荷乎箇切負婦音溺奴的切淤於句切壑許各切贖似玉切鬬都豆切耽丁含切恚於避切截才結切罥古兗切索所各切祇支音鬘莫還切錯七各切鈴力丁切璫當音蔭於禁切闥他達切巍語韋切觸樞玉切扶防無切軒許言切渚之與切
